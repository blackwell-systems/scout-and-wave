pre_mortem:
    overall_risk: low
    rows:
        - scenario: Agent B renames `/saw wave` skill invocations in addition to binary commands
          likelihood: medium
          impact: high
          mitigation: Agent B's constraints and verification gate explicitly check that /saw wave, /saw scout, /saw bootstrap remain unchanged. The verification grep for '/saw wave' must return >0 results.
        - scenario: The existing ~/.local/bin/saw is the orchestration binary (saw serve), not the toolkit binary
          likelihood: low
          impact: medium
          mitigation: Agent C checks file size and checks whether binary responds to `saw serve` before moving. If it is the web binary, only add sawtools; do not touch the saw symlink.
        - scenario: Natural language 'saw' in blog/docs prose gets renamed (e.g. 'I saw', 'we saw')
          likelihood: low
          impact: low
          mitigation: Agents are instructed to search for `saw <subcommand>` patterns (with a known subcommand following), not bare 'saw'. Verification search confirms no false positives.
        - scenario: Agent A renames cmd/saw/ directory, breaking Go package imports
          likelihood: low
          impact: high
          mitigation: 'Constraints explicitly state: do NOT rename the cmd/saw/ directory. Only root.go''s Use field and documentation change.'
        - scenario: Scout-and-wave-web cmd/saw commands (set-completion, validate, etc.) get renamed by Agent B
          likelihood: low
          impact: medium
          mitigation: The web repo's cmd/saw is out of scope for all agents. Agent B only touches the scout-and-wave repo's prompt files. The web repo has its own saw binary that is unaffected.
