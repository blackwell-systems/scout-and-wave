pre_mortem:
  overall_risk: "low"
  rows:
    - scenario: "Agent B modifies pkg/protocol/extract.go; if the existing markdown ExtractAgentContext tests break, the build fails."
      likelihood: "low"
      impact: "medium"
      mitigation: "Agent B must run the full extract test suite, not just the new tests. The constraint explicitly says do not modify the existing function. If tests break, they were broken by the new code and must be fixed before completion."

    - scenario: "main.go wiring step missed post-merge — commands built but not registered."
      likelihood: "medium"
      impact: "low"
      mitigation: "Orchestrator post-merge checklist explicitly includes adding all 9 AddCommand calls. Running 'saw --help' after rebuild confirms registration."

    - scenario: "YAML round-trip via Load/Save reorders or reformats fields, breaking idempotency tests elsewhere."
