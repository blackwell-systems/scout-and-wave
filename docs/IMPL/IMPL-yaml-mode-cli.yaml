waves:
  - number: 1
    agents:
      - id: "A"
        files:
          - "cmd/saw/validate_cmd.go"
        task: |
          ## What to Implement

          Implement the `saw validate` CLI command in `cmd/saw/validate_cmd.go`.

          This command validates a YAML IMPL manifest. It runs two complementary checks:
          1. `protocol.Validate(m)` — struct-level invariant checks (I1-I6, agent IDs,
             gate types, state machine, etc.) on the parsed IMPLManifest.
          2. `protocol.ValidateIMPLDoc(path)` — E16 typed-block validation (only applicable
             to markdown IMPL docs; for YAML files this will return nil with no errors,
             which is acceptable — YAML manifests do not have typed blocks).

          The command prints a JSON summary to stdout. Exit code 0 if valid, exit code 1
          if any errors are found.

          ## Command Signature

          ```
          saw validate <manifest-path>
          ```

          No flags beyond the inherited `--repo-dir`.

          ## Interfaces to Call

          ```go
          // Load the manifest
          m, err := protocol.Load(manifestPath)

          // Run struct-level validation
          structErrs := protocol.Validate(m)

          // Run E16 typed-block validation (markdown only; returns nil for YAML)
          // Import: "github.com/blackwell-systems/scout-and-wave-go/pkg/types"
          docErrs, err := protocol.ValidateIMPLDoc(manifestPath)
          ```

          Note: `ValidateIMPLDoc` returns `[]types.ValidationError` (from `pkg/types`),
          while `Validate` returns `[]protocol.ValidationError`. Both types have a
          `Message` string field. Merge them into a unified output slice.

          ## Output Format

          Print a JSON object to stdout:
          ```json
          {
            "valid": true,
            "error_count": 0,
            "errors": []
          }
          ```

          When invalid:
          ```json
          {
            "valid": false,
            "error_count": 2,
            "errors": [
              {"code": "I1_VIOLATION", "message": "...", "field": "file_ownership"},
              {"code": "e16a", "message": "missing required block: impl-file-ownership", "line": 0}
            ]
          }
          ```

          Errors from `Validate()` include `code`, `message`, `field`.
          Errors from `ValidateIMPLDoc()` include `block_type` (as `code`), `line_number`
          (as `line`), `message`. Normalize these into a unified error object with at least
          `code` and `message` populated.

          ## File to Create

          `cmd/saw/validate_cmd.go` — package main, cobra pattern matching
          `cmd/saw/verify_build.go` as the style template.

          ## Tests to Write

          No test file required for this agent — the underlying `protocol.Validate` and
          `protocol.ValidateIMPLDoc` functions already have tests. Write a brief inline
          smoke test if you want, but it is optional.

          ## Verification Gate

          ```bash
          cd /Users/dayna.blackwell/code/scout-and-wave-go
          go build ./cmd/saw/...
          go vet ./cmd/saw/...
          go test ./cmd/saw/... -run TestValidate -timeout 60s
          ```

          If no TestValidate exists yet, `go test ./cmd/saw/... -timeout 60s` is fine
          (will report "no test files" or pass existing tests).

          ## Constraints

          - Do NOT modify `cmd/saw/main.go`. The orchestrator adds
            `newValidateCmd()` to `main.go` post-merge.
          - The exported constructor must be named `newValidateCmd()`.
          - If `protocol.Load` fails (bad YAML), surface that as an error, not a
            validation failure. Return the error from `RunE`.
          - Exit code 1 when `valid == false`. Use `os.Exit(1)` after printing,
            matching the pattern in `verify_build.go`.

      - id: "B"
        files:
          - "cmd/saw/extract_context_cmd.go"
          - "pkg/protocol/extract.go"
        task: |
          ## What to Implement

          Two tasks in this agent:

          ### Task 1 — Add ExtractAgentContextFromManifest to pkg/protocol/extract.go

          The existing `ExtractAgentContext` in `extract.go` works on **markdown** IMPL
          docs by parsing text sections with a line scanner. YAML manifests are structured
          data; they need a different approach that reads the parsed struct directly.

          Add a new function `ExtractAgentContextFromManifest` to `pkg/protocol/extract.go`:

          ```go
          // ExtractAgentContextFromManifest builds a per-agent context payload from a
          // parsed IMPLManifest. It is the YAML-mode equivalent of ExtractAgentContext.
          // Returns ErrAgentNotFound (wrapped) if agentID is not in any wave.
          func ExtractAgentContextFromManifest(m *IMPLManifest, agentID string) (*AgentContextJSONPayload, error)
          ```

          Also add the output struct:

          ```go
          // AgentContextJSONPayload is the structured JSON output of 'saw extract-context'
          // for YAML-mode manifests (E23).
          type AgentContextJSONPayload struct {
              IMPLDocPath        string              `json:"impl_doc_path"`
              AgentID            string              `json:"agent_id"`
              AgentTask          string              `json:"agent_task"`
              FileOwnership      []FileOwnership     `json:"file_ownership"`
              InterfaceContracts []InterfaceContract `json:"interface_contracts"`
              Scaffolds          []ScaffoldFile      `json:"scaffolds"`
              QualityGates       *QualityGates       `json:"quality_gates"`
          }
          ```

          Implementation of `ExtractAgentContextFromManifest`:
          - Search all waves for the agent with ID == agentID.
          - If not found, return `fmt.Errorf("%w: %s", ErrAgentNotFound, agentID)`.
          - Collect FileOwnership entries where `fo.Agent == agentID`.
          - Use ALL interface contracts from `m.InterfaceContracts` (all agents need them).
          - Use ALL scaffolds from `m.Scaffolds`.
          - Include `m.QualityGates` as-is (pointer, may be nil).
          - Set `AgentTask` from `agent.Task`.

          ### Task 2 — Implement saw extract-context CLI command

          File: `cmd/saw/extract_context_cmd.go`

          ```
          saw extract-context <manifest-path> --agent <ID>
          ```

          The command:
          1. Calls `protocol.Load(manifestPath)` to parse the YAML manifest.
          2. Calls `protocol.ExtractAgentContextFromManifest(m, agentID)`.
          3. Prints the `AgentContextJSONPayload` as JSON to stdout (indented).
          4. Exits 0 on success, returns error from RunE on failure.

          This is the HIGHEST PRIORITY command — the orchestrator calls it every wave
          to build agent prompts. Get the output schema correct.

          ## Interfaces to Call

          ```go
          m, err := protocol.Load(manifestPath)
          payload, err := protocol.ExtractAgentContextFromManifest(m, agentID)
          out, _ := json.MarshalIndent(payload, "", "  ")
          fmt.Println(string(out))
          ```

          ## Tests to Write

          Add to `pkg/protocol/extract_test.go` (or a new `extract_yaml_test.go`):

          1. `TestExtractAgentContextFromManifest_Found` — build a minimal IMPLManifest
             with 2 agents, call for agent "A", verify AgentTask, FileOwnership (only A's
             files), InterfaceContracts (all), and QualityGates populated correctly.
          2. `TestExtractAgentContextFromManifest_NotFound` — call for agent "Z", verify
             ErrAgentNotFound is returned (use `errors.Is`).
          3. `TestExtractAgentContextFromManifest_FiltersByAgent` — verify agent "B"'s
             FileOwnership does not include agent "A"'s files.

          ## Verification Gate

          ```bash
          cd /Users/dayna.blackwell/code/scout-and-wave-go
          go build ./...
          go vet ./...
          go test ./pkg/protocol/... -run TestExtractAgentContext -timeout 60s
          ```

          ## Constraints

          - Do NOT modify `cmd/saw/main.go`. Orchestrator registers post-merge.
          - The exported constructor must be named `newExtractContextCmd()`.
          - `--agent` flag is required (use `MarkFlagRequired`).
          - Do NOT modify or break the existing `ExtractAgentContext` markdown function
            or its tests. The new function is additive.
          - `AgentContextJSONPayload` must be defined in `pkg/protocol/extract.go`
            (not in cmd/saw/) so it is importable by the web server if needed.

      - id: "C"
        files:
          - "cmd/saw/set_completion_cmd.go"
          - "cmd/saw/mark_complete_cmd.go"
        task: |
          ## What to Implement

          Two CLI commands that mutate the YAML manifest and write it back to disk.

          ### Command 1: saw set-completion

          File: `cmd/saw/set_completion_cmd.go`

          ```
          saw set-completion <manifest-path> \
            --agent <ID> \
            --status <complete|partial|blocked> \
            --commit <sha> \
            --worktree <path> \
            --branch <name>
          ```

          Steps:
          1. `protocol.Load(manifestPath)` to parse the manifest.
          2. Build a `protocol.CompletionReport` from the flags.
          3. `protocol.SetCompletionReport(m, agentID, report)` — returns
             `protocol.ErrAgentNotFound` if agent not in manifest.
          4. `protocol.Save(m, manifestPath)` to write back.
          5. Print success JSON to stdout: `{"agent": "A", "status": "complete", "saved": true}`.

          Required flags: `--agent`, `--status`, `--commit`.
          Optional flags: `--worktree`, `--branch`.

          Additional optional flags for richer reports (all optional):
          `--files-changed` (comma-separated), `--files-created` (comma-separated),
          `--tests-added` (comma-separated), `--verification` (string).

          ### Command 2: saw mark-complete

          File: `cmd/saw/mark_complete_cmd.go`

          ```
          saw mark-complete <manifest-path> [--date YYYY-MM-DD]
          ```

          Steps:
          1. If `--date` not provided, use `time.Now().Format("2006-01-02")`.
          2. Call `protocol.WriteCompletionMarker(manifestPath, date)`.
          3. Print JSON: `{"marked": true, "date": "2026-03-09", "path": "..."}`.

          No required flags. `--date` is optional.

          ## Interfaces to Call

          ```go
          // set-completion
          m, err := protocol.Load(manifestPath)
          report := protocol.CompletionReport{
              Status:   status,
              Commit:   commit,
              Worktree: worktree,
              Branch:   branch,
              FilesChanged: splitCSV(filesChanged),   // helper: strings.Split + trim
              FilesCreated: splitCSV(filesCreated),
              TestsAdded:   splitCSV(testsAdded),
              Verification: verification,
          }
          err = protocol.SetCompletionReport(m, agentID, report)
          err = protocol.Save(m, manifestPath)

          // mark-complete
          err = protocol.WriteCompletionMarker(manifestPath, date)
          ```

          ## Tests to Write

          No test file required — `SetCompletionReport`, `WriteCompletionMarker`,
          `Load`, and `Save` all have existing tests. The CLI wrappers are thin.

          ## Verification Gate

          ```bash
          cd /Users/dayna.blackwell/code/scout-and-wave-go
          go build ./cmd/saw/...
          go vet ./cmd/saw/...
          go test ./cmd/saw/... -timeout 60s
          ```

          ## Constraints

          - Do NOT modify `cmd/saw/main.go`.
          - Constructors named `newSetCompletionCmd()` and `newMarkCompleteCmd()`.
          - For `set-completion`: validate that `--status` is one of
            `complete`, `partial`, `blocked` before calling SetCompletionReport.
            Return a cobra error (not os.Exit) if invalid.
          - For comma-separated flags (files-changed, etc.): use a private helper
            `splitCSV(s string) []string` that splits on comma, trims whitespace,
            and drops empty strings. Place it in the same file.
          - If `SetCompletionReport` returns `ErrAgentNotFound`, surface it as a
            clear error message (not a panic).

      - id: "D"
        files:
          - "cmd/saw/run_gates_cmd.go"
          - "cmd/saw/check_conflicts_cmd.go"
          - "cmd/saw/validate_scaffolds_cmd.go"
          - "cmd/saw/freeze_check_cmd.go"
          - "cmd/saw/update_agent_prompt_cmd.go"
        task: |
          ## What to Implement

          Five CLI commands — all read-only manifest queries or simple mutations.
          Each follows the cobra pattern in `cmd/saw/verify_build.go` and
          `cmd/saw/update_status.go`.

          ### Command 1: saw run-gates

          File: `cmd/saw/run_gates_cmd.go`

          ```
          saw run-gates <manifest-path> [--wave <N>] [--repo-dir <path>]
          ```

          Steps:
          1. `protocol.Load(manifestPath)`.
          2. `protocol.RunGates(m, waveNum, repoDir)` — `repoDir` comes from the
             inherited `--repo-dir` persistent flag (package-level `repoDir` var).
             Default `--wave 0` means "use gates as-is" (RunGates ignores waveNumber
             in its current implementation — it runs all gates).
          3. Print JSON array of `GateResult` objects.
          4. Exit 1 if any required gate failed (`!result.Passed && result.Required`).

          ### Command 2: saw check-conflicts

          File: `cmd/saw/check_conflicts_cmd.go`

          ```
          saw check-conflicts <manifest-path>
          ```

          Steps:
          1. `protocol.Load(manifestPath)`.
          2. `protocol.DetectOwnershipConflicts(m, m.CompletionReports)`.
          3. Print JSON: `{"conflict_count": N, "conflicts": [...]}`.
          4. Exit 1 if `conflict_count > 0`.

          ### Command 3: saw validate-scaffolds

          File: `cmd/saw/validate_scaffolds_cmd.go`

          ```
          saw validate-scaffolds <manifest-path>
          ```

          Steps:
          1. `protocol.Load(manifestPath)`.
          2. `protocol.ValidateScaffolds(m)` — returns `[]protocol.ScaffoldStatus`.
          3. `protocol.AllScaffoldsCommitted(m)` — boolean convenience.
          4. Print JSON: `{"all_committed": true, "scaffold_count": N, "statuses": [...]}`.
          5. Exit 1 if `!all_committed`.

          ### Command 4: saw freeze-check

          File: `cmd/saw/freeze_check_cmd.go`

          ```
          saw freeze-check <manifest-path>
          ```

          Steps:
          1. `protocol.Load(manifestPath)`.
          2. `protocol.CheckFreeze(m)` — returns `([]protocol.FreezeViolation, error)`.
          3. Print JSON: `{"frozen": true, "violation_count": N, "violations": [...]}`.
             Set `"frozen": true` if `m.WorktreesCreatedAt != nil`.
             Set `"frozen": false` and `"violation_count": 0` if no freeze timestamp.
          4. Exit 1 if `violation_count > 0`.

          ### Command 5: saw update-agent-prompt

          File: `cmd/saw/update_agent_prompt_cmd.go`

          ```
          saw update-agent-prompt <manifest-path> --agent <ID> --prompt <text>
          ```

          Steps:
          1. `protocol.Load(manifestPath)`.
          2. `protocol.UpdateAgentPrompt(m, agentID, newPrompt)`.
          3. `protocol.Save(m, manifestPath)`.
          4. Print JSON: `{"agent": "A", "updated": true}`.

          Both `--agent` and `--prompt` are required flags.

          ## Interfaces to Call

          ```go
          // run-gates
          results, err := protocol.RunGates(m, waveNum, repoDir)

          // check-conflicts
          conflicts := protocol.DetectOwnershipConflicts(m, m.CompletionReports)

          // validate-scaffolds
          statuses := protocol.ValidateScaffolds(m)
          allOK := protocol.AllScaffoldsCommitted(m)

          // freeze-check
          violations, err := protocol.CheckFreeze(m)

          // update-agent-prompt
          err = protocol.UpdateAgentPrompt(m, agentID, newPrompt)
          err = protocol.Save(m, manifestPath)
          ```

          ## Tests to Write

          No test files required for these thin CLI wrappers.

          ## Verification Gate

          ```bash
          cd /Users/dayna.blackwell/code/scout-and-wave-go
          go build ./cmd/saw/...
          go vet ./cmd/saw/...
          go test ./cmd/saw/... -timeout 60s
          ```

          ## Constraints

          - Do NOT modify `cmd/saw/main.go`. Orchestrator registers all 5 constructors
            post-merge.
          - Constructor names: `newRunGatesCmd()`, `newCheckConflictsCmd()`,
            `newValidateScaffoldsCmd()`, `newFreezeCheckCmd()`,
            `newUpdateAgentPromptCmd()`.
          - For `run-gates`: the `--repo-dir` flag is already inherited as the
            package-level `repoDir` variable — use it directly, do not redeclare.
          - For `freeze-check`: if `CheckFreeze` returns an error (hash computation
            failure), return that error from RunE rather than treating it as a violation.
          - For `update-agent-prompt`: if the prompt text is long or contains newlines,
            cobra flag parsing handles it — document in the Short description that
            users can pass multi-line prompts via `$'...'` or a file redirect if needed.
          - Exit codes: 0 = success/clean, 1 = violations/failures found, non-zero
            returned from RunE = system/parse error.

