state: "SCOUT_PENDING"

# Suitability Assessment
#
# Verdict: SUITABLE
#
# 1. File decomposition: 9 new CLI command files in cmd/saw/ (one per command), plus
#    one new pkg/protocol function (ExtractAgentContextFromManifest for YAML mode),
#    plus one main.go modification. All cmd/saw/ files are new; main.go is orchestrator-owned
#    (append-only AddCommand registrations). Fully disjoint.
#
# 2. Investigation-first: No root cause analysis needed. All backing SDK functions
#    already exist in pkg/protocol/. This is pure CLI wiring.
#
# 3. Interface discoverability: All interfaces are defined — each command calls one
#    existing SDK function with well-known signatures.
#
# 4. Pre-implementation scan:
#    Total items: 9 commands
#    Already implemented (SDK layer): 9 functions (validate, extract, set-completion,
#      mark-complete, run-gates, check-conflicts, validate-scaffolds, freeze-check,
#      update-agent-prompt) — all backing functions exist.
#    CLI wrappers missing: 9 commands (100% of work remaining is cobra wrappers).
#    Special case: extract-context — existing ExtractAgentContext in extract.go
#      works on markdown IMPL docs (text-section parsing). YAML manifests require
#      a new function ExtractAgentContextFromManifest that reads the parsed struct
#      directly. Agent B owns this new pkg/protocol function.
#    Agent adjustments: None changed to "verify + add tests" — all are new wrappers.
#
# 5. Parallelization value: High. All 9 commands are independent (no cross-command
#    dependencies). Build cycle is go build + go test, moderate length. Single wave,
#    maximum parallelism. Only main.go is shared and is orchestrator-owned.
#
# Estimated times:
# - Scout phase: ~15 min (dependency mapping, reading source, writing IMPL doc)
# - Agent execution: ~25 min (4 agents x ~8 min avg, fully parallel)
# - Merge & verification: ~5 min
# Total SAW time: ~45 min
# Sequential baseline: ~60 min (9 commands x ~7 min each)
# Time savings: ~15 min (25% faster). Clear speedup.

quality_gates:
  level: "standard"
  gates:
    - type: "build"
      command: "go build ./..."
      required: true
    - type: "lint"
      command: "go vet ./..."
      required: false
    - type: "test"
      command: "go test ./..."
      required: true

# No scaffolds needed — agents have independent file ownership.
# The only shared file is cmd/saw/main.go (AddCommand registrations),
# which is orchestrator-owned and applied post-merge.

interface_contracts:
  - name: "Validate"
    description: "Runs all I1-I6 invariant checks on an IMPLManifest. Returns slice of ValidationError (empty if valid)."
    definition: |
      func Validate(m *IMPLManifest) []ValidationError
    location: "pkg/protocol/validation.go"

  - name: "ValidateIMPLDoc"
    description: "E16 typed-block validation on a markdown IMPL doc at path. Returns nil if valid or no typed blocks."
    definition: |
      func ValidateIMPLDoc(path string) ([]types.ValidationError, error)
    location: "pkg/protocol/validator.go"

  - name: "ExtractAgentContextFromManifest"
    description: |
      New YAML-mode function. Reads a parsed IMPLManifest and returns the per-agent
      context payload for the given agentID. Extracts agent task, file ownership entries
      for that agent, all interface contracts, all scaffolds, and quality gates.
      Returns ErrAgentNotFound if agentID is not in any wave.
      This is the YAML equivalent of ExtractAgentContext (markdown) in extract.go.
    definition: |
      func ExtractAgentContextFromManifest(m *IMPLManifest, agentID string) (*AgentContextPayload, error)
    location: "pkg/protocol/extract.go"

  - name: "AgentContextPayload (JSON output schema)"
    description: |
      The JSON object written to stdout by 'saw extract-context'. All fields are strings.
      impl_doc_path: absolute path to the manifest file
      agent_id: the agent letter (e.g. "A")
      agent_task: the agent's full task field from the manifest
      file_ownership: JSON array of FileOwnership entries for this agent
      interface_contracts: JSON array of all InterfaceContract entries
      scaffolds: JSON array of all ScaffoldFile entries
      quality_gates: JSON object of QualityGates (or null)
    definition: |
      type AgentContextJSONPayload struct {
          IMPLDocPath        string             `json:"impl_doc_path"`
          AgentID            string             `json:"agent_id"`
          AgentTask          string             `json:"agent_task"`
          FileOwnership      []FileOwnership    `json:"file_ownership"`
          InterfaceContracts []InterfaceContract `json:"interface_contracts"`
          Scaffolds          []ScaffoldFile      `json:"scaffolds"`
          QualityGates       *QualityGates       `json:"quality_gates"`
      }
    location: "pkg/protocol/extract.go"

  - name: "SetCompletionReport"
    description: "Registers a CompletionReport for an agent. Returns ErrAgentNotFound if agent ID is not in any wave."
    definition: |
      func SetCompletionReport(m *IMPLManifest, agentID string, report CompletionReport) error
    location: "pkg/protocol/manifest.go"

  - name: "WriteCompletionMarker"
    description: "Writes SAW:COMPLETE marker with date. For YAML files sets completion_date field."
    definition: |
      func WriteCompletionMarker(implDocPath string, date string) error
    location: "pkg/protocol/marker.go"

  - name: "RunGates"
    description: "Executes quality gates for a wave from the manifest. Returns GateResult slice."
    definition: |
      func RunGates(manifest *IMPLManifest, waveNumber int, repoDir string) ([]GateResult, error)
    location: "pkg/protocol/gates.go"

  - name: "DetectOwnershipConflicts"
    description: "Cross-references completion reports to find files modified by multiple agents in the same wave."
    definition: |
      func DetectOwnershipConflicts(manifest *IMPLManifest, reports map[string]CompletionReport) []OwnershipConflict
    location: "pkg/protocol/conflict.go"

  - name: "ValidateScaffolds"
    description: "Checks that all scaffold files have status 'committed'. Returns ScaffoldStatus per scaffold."
    definition: |
      func ValidateScaffolds(m *IMPLManifest) []ScaffoldStatus
    location: "pkg/protocol/scaffold_validation.go"

  - name: "CheckFreeze"
    description: "Checks if interface contracts or scaffolds were modified after worktree creation. Returns FreezeViolation slice."
    definition: |
      func CheckFreeze(manifest *IMPLManifest) ([]FreezeViolation, error)
    location: "pkg/protocol/freeze.go"

  - name: "UpdateAgentPrompt"
    description: "Updates the task field for a specific agent in a manifest. Returns ErrAgentNotFound if not found."
    definition: |
      func UpdateAgentPrompt(m *IMPLManifest, agentID string, newPrompt string) error
    location: "pkg/protocol/updater.go"

  - name: "Load / Save"
    description: "Load reads a YAML IMPL manifest from path. Save writes an IMPLManifest to path as YAML."
    definition: |
      func Load(path string) (*IMPLManifest, error)
      func Save(m *IMPLManifest, path string) error
    location: "pkg/protocol/manifest.go"

