suitability_assessment: |
    SUITABLE - All five gates pass cleanly.

    1. File decomposition: 9 files across 2 repos, cleanly partitioned into 4 agents.
       No conflicting modifications to the same file.

    2. Investigation-first: No unknowns. The audit clearly identifies the problem
       (validation scattered across CLI/web with different rules enforced) and the
       solution (centralize in SDK, thin wrappers everywhere else).

    3. Interface discoverability: Yes. The new SDK functions (FullValidate,
       FullValidateProgram) have clear signatures derivable from existing code.
       Cross-agent interfaces are the new SDK functions consumed by CLI and web.

    4. Pre-implementation status: SDK already has all core validation logic.
       CLI and web both call protocol.Validate() but CLI adds 3 extra checks
       (ValidateDuplicateKeys, DetectUnknownKeys, ValidateIMPLDoc) that web
       skips entirely. The unification moves the orchestration into SDK.

    5. Parallelization value: High. Build/test cycle for Go repos is ~30s each.
       Wave 1 has 2 independent agents (SDK new functions + web cleanup), Wave 2
       has 2 agents updating CLI commands. 4 agents across 2 waves.

    Key divergence found during investigation:
    - CLI validate_cmd.go runs 4 separate validation passes with auto-fix logic
    - Web ValidateManifest() only runs protocol.Validate() - MISSING duplicate
      key detection, unknown key detection, and typed-block validation
    - CLI defines 6 local output types (validateOutput, validateError,
      validateFixOutput, validateProgramOutput, validateProgramError, combinedReport)
      that duplicate result.SAWError
    - validate_integration.go has 77-line appendWiringReport YAML manipulation
      function that belongs in SDK

    Estimated times:
    - Scout phase: ~8 min
    - Agent execution: ~12 min (4 agents x 8 min avg, 2 waves)
    - Merge & verification: ~4 min
    Total SAW time: ~24 min

    Sequential baseline: ~32 min (4 agents x 8 min)
    Time savings: ~8 min (25% faster)

    Recommendation: Clear speedup, plus consistency benefit (web will enforce
    same validation rules as CLI after unification).
