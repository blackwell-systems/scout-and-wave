interface_contracts:
    - name: FullValidate
      description: |
        Unified IMPL manifest validation that combines all checks in one call.
        Replaces the 4-step orchestration currently in validate_cmd.go.
        Runs: struct validation (Validate), duplicate key detection, unknown key
        detection, and typed-block validation (ValidateIMPLDoc). Returns
        Result[FullValidateData] using the standard result pattern.
      definition: |
        // FullValidateData holds the result of a complete manifest validation.
        type FullValidateData struct {
            Valid      bool            `json:"valid"`
            ErrorCount int             `json:"error_count"`
            Errors     []result.SAWError `json:"errors"`
            Fixed      int             `json:"fixed,omitempty"`
        }

        // FullValidateOpts controls validation behavior.
        type FullValidateOpts struct {
            AutoFix    bool   // auto-correct fixable issues (gate types, unknown keys)
            UseSolver  bool   // use CSP solver for wave assignment validation
        }

        // FullValidate runs all validation checks on an IMPL manifest file.
        // This is the single entry point for CLI, web, and programmatic validation.
        // When AutoFix is true, correctable issues are fixed in-place before validation.
        func FullValidate(manifestPath string, opts FullValidateOpts) result.Result[FullValidateData]
      location: pkg/protocol/full_validate.go
    - name: FullValidateProgram
      description: |
        Unified PROGRAM manifest validation combining parse + validate + optional
        import-mode checks. Replaces orchestration in validate_program_cmd.go.
      definition: |
        // FullValidateProgramData holds the result of program manifest validation.
        type FullValidateProgramData struct {
            Valid      bool              `json:"valid"`
            ErrorCount int              `json:"error_count"`
            Errors     []result.SAWError `json:"errors"`
        }

        // FullValidateProgramOpts controls program validation behavior.
        type FullValidateProgramOpts struct {
            ImportMode bool   // run import-mode checks (P1/P2 against on-disk IMPLs)
            RepoDir    string // repo root for import-mode (default: cwd)
        }

        // FullValidateProgram runs all validation checks on a PROGRAM manifest file.
        func FullValidateProgram(manifestPath string, opts FullValidateProgramOpts) result.Result[FullValidateProgramData]
      location: pkg/protocol/full_validate.go
    - name: AppendWiringReport
      description: |
        Persists a WiringValidationData to the manifest YAML under
        wiring_validation_reports.{waveKey}. Currently a local function in
        validate_integration.go CLI command; moves to SDK for reuse by web.
      definition: |
        // AppendWiringReport persists a WiringValidationData report to the manifest
        // file under wiring_validation_reports.{waveKey}. Uses raw YAML manipulation
        // to avoid re-marshaling the entire manifest.
        func AppendWiringReport(manifestPath, waveKey string, data *WiringValidationData) error
      location: pkg/protocol/wiring_validation.go
waves:
    - number: 1
      agents:
        - id: A
          task: |
            ## What to implement

            Create `pkg/protocol/full_validate.go` with two unified validation entry points
            that centralize ALL validation orchestration currently scattered across CLI commands.

            ### 1. FullValidate function

            Create `FullValidate(manifestPath string, opts FullValidateOpts) result.Result[FullValidateData]`
            that combines ALL validation steps currently in `cmd/saw/validate_cmd.go`:

            1. Load manifest via `protocol.Load(manifestPath)`
            2. If `opts.AutoFix` is true:
               - Call `FixGateTypes(m)` and save if changes made
               - Call `StripUnknownKeys(rawData)` and write + reload if keys stripped
            3. Read raw YAML bytes for byte-level checks
            4. Run `ValidateDuplicateKeys(rawData)` on raw bytes
            5. Run `DetectUnknownKeys(rawData)` on raw bytes
            6. Run `Validate(m)` or `ValidateWithSolver(m)` based on opts.UseSolver
            7. Run `ValidateIMPLDoc(manifestPath)` for typed-block checks
            8. Collect all errors into FullValidateData, return Result

            The FullValidateData struct:
            ```go
            type FullValidateData struct {
                Valid      bool              `json:"valid"`
                ErrorCount int              `json:"error_count"`
                Errors     []result.SAWError `json:"errors"`
                Fixed      int              `json:"fixed,omitempty"`
            }

            type FullValidateOpts struct {
                AutoFix   bool
                UseSolver bool
            }
            ```

            ### 2. FullValidateProgram function

            Create `FullValidateProgram(manifestPath string, opts FullValidateProgramOpts) result.Result[FullValidateProgramData]`
            that combines steps currently in `cmd/saw/validate_program_cmd.go`:

            1. Parse manifest via `ParseProgramManifest(manifestPath)`
            2. Run `ValidateProgram(manifest)`
            3. If `opts.ImportMode` is true, run `ValidateProgramImportMode(manifest, repoDir)`
            4. Collect all errors into FullValidateProgramData, return Result

            ```go
            type FullValidateProgramData struct {
                Valid      bool              `json:"valid"`
                ErrorCount int              `json:"error_count"`
                Errors     []result.SAWError `json:"errors"`
            }

            type FullValidateProgramOpts struct {
                ImportMode bool
                RepoDir    string
            }
            ```

            ### 3. Move AppendWiringReport to SDK

            Move the `appendWiringReport` function from `cmd/saw/validate_integration.go`
            into `pkg/protocol/wiring_validation.go` as an exported function
            `AppendWiringReport(manifestPath, waveKey string, data *WiringValidationData) error`.

            The function is 77 lines of raw YAML node manipulation. Copy it exactly,
            just make it exported. It persists a WiringValidationData under the
            `wiring_validation_reports.{waveKey}` path in the manifest YAML.

            ### Tests

            Create `pkg/protocol/full_validate_test.go` with:
            - TestFullValidate_ValidManifest: valid YAML returns Valid=true, no errors
            - TestFullValidate_InvalidManifest: manifest with I1 violation returns errors
            - TestFullValidate_AutoFix: manifest with invalid gate type gets fixed
            - TestFullValidate_DuplicateKeys: YAML with duplicate keys returns errors
            - TestFullValidateProgram_Valid: valid program manifest returns Valid=true
            - TestFullValidateProgram_ImportMode: tests import-mode validation path
            - TestAppendWiringReport: moved function persists correctly

            ### Verification gate
            ```
            cd /Users/dayna.blackwell/code/scout-and-wave-go && go build ./... && go vet ./... && go test ./pkg/protocol/ -run TestFullValidate -count=1 -v
            ```

            ### Constraints
            - Do NOT modify existing Validate() or ValidateProgram() signatures
            - FullValidate/FullValidateProgram are NEW functions that compose existing ones
            - Use result.NewSuccess / result.NewFailure / result.NewPartial consistently
            - Import "os" for file I/O (reading raw YAML bytes, writing fixes)
          files:
            - pkg/protocol/full_validate.go
            - pkg/protocol/full_validate_test.go
            - pkg/protocol/wiring_validation.go
        - id: B
          task: |
            ## What to implement

            Update the web app's `ValidateManifest()` in `pkg/api/impl_handlers.go` to use
            the SDK's `protocol.FullValidate()` instead of the current incomplete validation.

            ### Current problem

            `ValidateManifest()` currently only calls `protocol.Validate(manifest)`, which
            MISSES three validation checks that the CLI performs:
            - `ValidateDuplicateKeys` (duplicate YAML keys)
            - `DetectUnknownKeys` (unknown top-level keys)
            - `ValidateIMPLDoc` (typed-block validation)

            This means the web UI and CLI enforce DIFFERENT validation rules.

            ### Changes to impl_handlers.go

            Replace the `ValidateManifest` function body:

            **Before:**
            ```go
            func ValidateManifest(yamlPath string) ([]result.SAWError, error) {
                manifest, err := protocol.Load(yamlPath)
                if err != nil {
                    return nil, fmt.Errorf("failed to load manifest for validation: %w", err)
                }
                validationErrs := protocol.Validate(manifest)
                if len(validationErrs) == 0 {
                    return nil, nil
                }
                return validationErrs, nil
            }
            ```

            **After:**
            ```go
            func ValidateManifest(yamlPath string) ([]result.SAWError, error) {
                res := protocol.FullValidate(yamlPath, protocol.FullValidateOpts{})
                if res.IsFatal() {
                    return nil, fmt.Errorf("failed to validate manifest: %s", res.Errors[0].Message)
                }
                data := res.GetData()
                if data.Valid {
                    return nil, nil
                }
                return data.Errors, nil
            }
            ```

            This is a 1:1 behavioral replacement. The function signature does not change,
            so all callers (HandleValidateManifest, etc.) continue to work unchanged.
            The only difference: web now runs the SAME validation as CLI.

            ### Update tests in impl_handlers_test.go

            The existing tests (TestValidateManifest_Valid, TestValidateManifest_Invalid,
            TestValidateManifest_MissingFile) should continue to pass with no changes.
            Add one new test:

            - TestValidateManifest_DetectsUnknownKeys: create a YAML with an unknown
              top-level key (e.g., `bogus_field: true`), verify ValidateManifest returns
              an error with code containing "UNKNOWN_KEY". This confirms the web now
              catches issues it previously missed.

            ### Verification gate
            ```
            cd /Users/dayna.blackwell/code/scout-and-wave-web && go build ./... && go vet ./... && go test ./pkg/api/ -run TestValidateManifest -count=1 -v
            ```

            ### Constraints
            - Do NOT change the ValidateManifest function signature
            - Do NOT modify HandleValidateManifest or manifest_routes.go
            - The LoadManifest function is unchanged (it does not do validation)
            - Ensure go.mod points to the version of scout-and-wave-go with FullValidate
          files:
            - pkg/api/impl_handlers.go
            - pkg/api/impl_handlers_test.go
