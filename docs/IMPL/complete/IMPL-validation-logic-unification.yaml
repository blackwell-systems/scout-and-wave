        - id: C
          task: |
            ## What to implement

            Simplify `cmd/saw/validate_cmd.go` and `cmd/saw/validate_program_cmd.go`
            to be thin wrappers around the new SDK functions.

            ### Changes to validate_cmd.go

            1. DELETE the local types: `validateOutput`, `validateError`, `validateFixOutput`
            2. Replace the entire RunE body with a call to `protocol.FullValidate`:

            ```go
            RunE: func(cmd *cobra.Command, args []string) error {
                manifestPath := args[0]
                res := protocol.FullValidate(manifestPath, protocol.FullValidateOpts{
                    AutoFix:   autoFix,
                    UseSolver: useSolver,
                })
                if res.IsFatal() {
                    return fmt.Errorf("validate: %s", res.Errors[0].Message)
                }
                data := res.GetData()
                out, _ := json.MarshalIndent(data, "", "  ")
                fmt.Println(string(out))
                if !data.Valid {
                    os.Exit(1)
                }
                return nil
            },
            ```

            The JSON output shape is identical because FullValidateData has the same
            fields (valid, error_count, errors, fixed) as the old validateFixOutput.

            ### Changes to validate_program_cmd.go

            1. DELETE the local types: `validateProgramOutput`, `validateProgramError`
            2. Replace the entire RunE body:

            ```go
            RunE: func(cmd *cobra.Command, args []string) error {
                manifestPath := args[0]
                rd := repoDir
                if rd == "" {
                    rd, _ = os.Getwd()
                }
                res := protocol.FullValidateProgram(manifestPath, protocol.FullValidateProgramOpts{
                    ImportMode: importMode,
                    RepoDir:    rd,
                })
                if res.IsFatal() {
                    fmt.Fprintf(os.Stderr, "validate-program: %s\n", res.Errors[0].Message)
                    os.Exit(2)
                }
                data := res.GetData()
                out, _ := json.MarshalIndent(data, "", "  ")
                fmt.Fprintln(cmd.OutOrStdout(), string(out))
                if !data.Valid {
                    os.Exit(1)
                }
                return nil
            },
            ```

            Note: preserve the exit code 2 for parse errors (Fatal result from
            FullValidateProgram when ParseProgramManifest fails).

