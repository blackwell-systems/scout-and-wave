            **File 1: pkg/engine/scout_correction_loop.go — E16 Correction Loop (Gap 10)**

            Create `ScoutCorrectionLoop(ctx, opts) error` that:
            1. After RunScout() completes, runs `sawtools validate --fix` on the output IMPL doc
            2. If validation passes, return nil (success)
            3. If validation fails, parse the JSON error output to extract specific failures
            4. Construct a correction prompt: "The IMPL doc you produced has validation errors.
               Fix the following issues:\n" + error details
            5. Re-launch RunScout() with the correction prompt prepended to the feature description
            6. Repeat up to 3 times (MaxScoutCorrectionRetries = 3)
            7. After 3 failures, set IMPL doc state to SCOUT_VALIDATION_FAILED and return error

            ```go
            type ScoutCorrectionOpts struct {
                ScoutOpts    RunScoutOpts
                MaxRetries   int  // default 3
                OnRetry      func(attempt int, errors []string)
            }
            ```

            Reference existing patterns:
            - `pkg/engine/runner.go` RunScout() for the Scout launch interface
            - `pkg/engine/finalize_impl.go` for how validation is currently called post-Scout
            - The correction loop wraps RunScout, NOT replaces it

            **File 2: pkg/engine/gate_cache.go — E38 Gate Result Caching (Gap 16)**

            Create a gate result cache that stores pass/fail results keyed by
            (command + input file hashes). This ensures repeated gate runs within the
            same wave execution reuse prior results.

            ```go
            type GateResultCache struct {
                mu      sync.RWMutex
                entries map[string]CachedGateResult
            }

            type CachedGateResult struct {
                Passed    bool
                Output    string
                CachedAt  time.Time
                InputHash string  // hash of files that affect this gate
            }

            func NewGateResultCache() *GateResultCache
            func (c *GateResultCache) Get(command string, inputHash string) (CachedGateResult, bool)
            func (c *GateResultCache) Set(command string, inputHash string, result CachedGateResult)
            func (c *GateResultCache) Invalidate()
            func (c *GateResultCache) InvalidateCommand(command string)
            ```

            The cache is invalidated when:
            - Format gate runs in fix mode (files changed)
            - New wave merges (files changed)
            - Explicit invalidation by orchestrator

