            - Test ScoutCorrectionLoop exhausts retries and sets SCOUT_VALIDATION_FAILED
            - Test GateResultCache get/set/invalidate
            - Test GateResultCache returns miss for different inputHash
            - Test GateResultCache Invalidate clears all entries

