            ## Agent A — Tier Execution Loop (E28/E28A/E29/E30/E33/E34)

            **Repo:** scout-and-wave-go (Go engine)
            **Files:** pkg/engine/program_tier_loop.go, pkg/engine/program_tier_loop_test.go

            ### What to Implement

            Create `pkg/engine/program_tier_loop.go` containing the full tier execution loop
            that ties together all existing standalone functions into a cohesive orchestration flow.

            **Core function: `RunTierLoop(ctx, opts) (*TierLoopResult, error)`**

            The loop implements E28's tier execution sequence:
            1. Parse PROGRAM manifest from opts.ManifestPath
            2. Determine current tier (lowest tier with incomplete IMPLs)
            3. Call `PartitionIMPLsByStatus()` (E28A) to split tier into needsScout vs preExisting
            4. For needsScout IMPLs: call `LaunchParallelScouts()` (E31, implemented by Agent B)
               - For now, stub this as a function variable `launchParallelScoutsFunc` so it compiles
                 independently. Agent B implements the real function.
            5. For preExisting IMPLs: validate via existing `protocol.ValidateProgramImportMode()`
            6. Wait for all Scouts + validations to complete
            7. If NOT autoMode: return with RequiresReview=true (human gate for IMPL review)
            8. Execute waves for each IMPL using existing engine.RunWaveFull()
            9. When all IMPLs complete: run existing `protocol.RunTierGate()` (E29)
            10. If gate passes: call existing `protocol.FreezeContracts()` (E30)
            11. If gate fails and autoMode: call `AutoTriggerReplan()` (E34)
                - AutoTriggerReplan wraps existing `engine.ReplanProgram()` with gate failure context
            12. If gate passes and autoMode: call existing `engine.AdvanceTierAutomatically()` (E33)
            13. Loop back to step 2 for next tier (if auto mode)
            14. If final tier complete: set ProgramComplete=true

            **Helper: `PartitionIMPLsByStatus(manifest, tierNumber) (needsScout, preExisting)`**
            - needsScout: IMPLs with status "pending" or "scouting"
            - preExisting: IMPLs with status "reviewed" or "complete"

            **Helper: `AutoTriggerReplan(manifestPath, tierNumber, gateResult, model) (*ReplanResult, error)`**
            - Constructs reason string from gate failure details
            - Calls existing engine.ReplanProgram() with the constructed opts

            **Event emission:** Call opts.OnEvent() at each major step for observability.

            ### Existing Code to Reference
            - `pkg/engine/program_auto.go` — AdvanceTierAutomatically(), ReplanProgram() (use these, don't reimplement)
            - `pkg/protocol/program_tier_gate.go` — RunTierGate()
