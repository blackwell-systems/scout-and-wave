        - scenario: Agent A changes Get signature before Agent D updates callers
          likelihood: low
          impact: high
          mitigation: |
            Wave structure enforces sequencing. Agent A is in wave 1, Agent D in wave 2.
            Merge only happens after wave 1 verification passes, so callers are updated
            before the breaking change lands on main.
        - scenario: Agent B test changes conflict with Agent A implementation changes
          likelihood: low
          impact: low
          mitigation: |
            Both in wave 1 but touch different files (cache.go vs cache_test.go).
            Disjoint ownership eliminates merge conflicts.
        - scenario: Forgotten caller of cache.Get outside pkg/protocol
          likelihood: low
          impact: medium
          mitigation: |
            Pre-scout grep found only 1 call site (pkg/protocol/gates.go line 136).
            Wave 2 verification will catch any missed callers (build failure).
        - scenario: Error code "CACHE_MISS" already exists with different meaning
          likelihood: low
          impact: low
          mitigation: |
            Pre-scout grep of pkg/result/codes.go found no existing CACHE_* codes.
            Agent C will fail if duplicate constant names are added.
