interface_contracts:
    - name: Cache.Get
      description: Migrate from (bool, *CachedResult) to Result[GetData]
      definition: |
        // GetData wraps successful cache hits
        type GetData struct {
            Result    CachedResult `json:"result"`
            Key       string       `json:"key"`        // hex hash of CacheKey
            FromCache bool         `json:"from_cache"` // always true for Get
        }

        // Get returns the cached result for (key, gateType) if it exists and has not expired.
        // Returns Result[GetData] with code="CACHE_MISS" (non-fatal) on miss or expiry.
        func (c *Cache) Get(ctx context.Context, key CacheKey, gateType string) result.Result[GetData]
      location: pkg/gatecache/cache.go:163
    - name: Error codes for cache operations
      description: Structured error codes for cache failures
      definition: |
        // Add to pkg/result/codes.go in the appropriate range (likely C001-C099 for Cache):
        const (
            CodeCacheMiss            = "C001_CACHE_MISS"            // non-fatal
            CodeCacheBuildKeyFailed  = "C002_CACHE_BUILD_KEY_FAILED" // fatal
            CodeCachePutFailed       = "C003_CACHE_PUT_FAILED"       // fatal
            CodeCacheInvalidateFailed = "C004_CACHE_INVALIDATE_FAILED" // fatal
            CodeCacheLoadFailed      = "C005_CACHE_LOAD_FAILED"      // internal, non-fatal
            CodeCacheSaveFailed      = "C006_CACHE_SAVE_FAILED"      // internal, fatal
        )
      location: pkg/result/codes.go
waves:
    - number: 1
      agents:
        - id: A
          task: |
            **Goal**: Migrate Cache.Get to Result[GetData] pattern and update internal error handling.

            **Files to modify**:
            - pkg/gatecache/cache.go

            **Changes required**:

            1. Define GetData struct in cache.go (after CachedResult):
               ```go
               type GetData struct {
                   Result    CachedResult `json:"result"`
                   Key       string       `json:"key"`
                   FromCache bool         `json:"from_cache"` // always true
               }
               ```

            2. Migrate Get method signature:
               - FROM: `func (c *Cache) Get(ctx context.Context, key CacheKey, gateType string) (*CachedResult, bool)`
               - TO: `func (c *Cache) Get(ctx context.Context, key CacheKey, gateType string) result.Result[GetData]`

            3. Update Get implementation:
               - Cache miss (no entry or expired) → `result.NewFailure[GetData]([]result.SAWError{result.NewWarning("CACHE_MISS", "cache entry not found or expired")})`
               - Cache hit → `result.NewSuccess(GetData{Result: r, Key: h, FromCache: true})`

            4. Update internal error handling in load() and save():
               - These remain `error` return type (private methods)
               - Change error messages to use structured format:
                 - `"CACHE_LOAD_FAILED: read cache file: %w"`
                 - `"CACHE_SAVE_FAILED: write cache file: %w"`

            5. Remove redundant TTL population logic:
               - In Get, the line `r.TTL = c.ttl` exists solely to pass TTL to IsExpired
               - Move this logic into IsExpired itself: accept cache TTL as parameter
               - Signature: `func (r *CachedResult) IsExpired(cacheTTL time.Duration) bool`

            **Tests**: No test changes needed in this agent. Agent B will update tests.

            **Verification gate**:
            ```bash
            go build ./pkg/gatecache/... && \
            go test ./pkg/gatecache/... -run TestCache_PutGet
            ```

            **Constraints**:
            - Do NOT change callers (pkg/protocol/gates.go) — Agent D handles that
            - Do NOT add new error codes to pkg/result/codes.go — Agent C handles that
            - Preserve all existing behavior (cache hits, misses, expiry, persistence)
          files:
            - pkg/gatecache/cache.go
        - id: B
          task: |
            **Goal**: Update tests to match new Get signature and verify Result[GetData] behavior.

            **Files to modify**:
            - pkg/gatecache/cache_test.go

            **Changes required**:

            1. Update all Get calls from:
               ```go
               got, ok := c.Get(ctx, key, "build")
               if !ok { ... }
               ```
               TO:
               ```go
               getResult := c.Get(ctx, key, "build")
               if getResult.Code == "CACHE_MISS" {
                   // expected miss
               }
               if !getResult.IsSuccess() {
                   t.Fatalf("Get failed: %v", getResult.Errors)
               }
               got := getResult.GetData().Result
               ```

            2. Add new test for GetData struct fields:
               ```go
               func TestCache_Get_ReturnsGetDataStruct(t *testing.T) {
                   // ... put an entry ...
                   getResult := c.Get(ctx, key, "test")
                   if !getResult.IsSuccess() {
                       t.Fatal("expected success")
                   }
                   data := getResult.GetData()
                   if data.Key == "" {
                       t.Error("Key should not be empty")
                   }
                   if !data.FromCache {
                       t.Error("FromCache should be true for Get")
                   }
                   if data.Result.GateType != "test" {
                       t.Errorf("Result.GateType: got %q", data.Result.GateType)
                   }
               }
               ```

            3. Add test for CACHE_MISS code on expiry:
               ```go
               func TestCache_Get_ReturnsMissCodeOnExpiry(t *testing.T) {
                   // ... put an expired entry ...
                   getResult := c.Get(ctx, key, "test")
                   if getResult.Code != "CACHE_MISS" {
                       t.Errorf("expected CACHE_MISS code on expiry, got %q", getResult.Code)
                   }
                   if getResult.IsFatal() {
                       t.Error("CACHE_MISS should be non-fatal")
                   }
               }
               ```

            4. Update TTL tests to match IsExpired signature change (if Agent A modified it).

            **Verification gate**:
            ```bash
            go test ./pkg/gatecache/... -v
            ```

            **Constraints**:
            - Do NOT modify cache.go — Agent A handles implementation
            - Run tests against Agent A's changes
          files:
            - pkg/gatecache/cache_test.go
        - id: C
          task: |
            **Goal**: Add cache-related error codes to pkg/result/codes.go.

            **Files to modify**:
            - pkg/result/codes.go

            **Changes required**:

            1. Add new error code range comment after existing ranges:
               ```go
               //  C001-C099: Cache errors (gatecache operations)
               ```

            2. Add cache error code constants before or after the B001-B099 section:
               ```go
               // Cache error codes (C001-C099)
               const (
                   // CodeCacheMiss is emitted when Get finds no entry or entry is expired
                   CodeCacheMiss = "CACHE_MISS"
                   // CodeCacheBuildKeyFailed is emitted when BuildKey/BuildKeyForGate fails
                   CodeCacheBuildKeyFailed = "CACHE_BUILD_KEY_FAILED"
                   // CodeCachePutFailed is emitted when Put fails to save cache to disk
                   CodeCachePutFailed = "CACHE_PUT_FAILED"
                   // CodeCacheInvalidateFailed is emitted when Invalidate fails to remove cache file
                   CodeCacheInvalidateFailed = "CACHE_INVALIDATE_FAILED"
                   // CodeCachePutCancelled is emitted when Put is cancelled via context
                   CodeCachePutCancelled = "CACHE_PUT_CANCELLED"
                   // CodeCacheInvalidateCancelled is emitted when Invalidate is cancelled
                   CodeCacheInvalidateCancelled = "CACHE_INVALIDATE_CANCELLED"
               )
               ```

            3. Update pkg/result/codes.go documentation comment at top to list C001-C099 range.

            **Tests**: No test changes needed (error codes are constants).

            **Verification gate**:
            ```bash
            go build ./pkg/result/... && \
            go vet ./pkg/result/...
            ```

            **Constraints**:
            - Follow existing naming convention: CodeXxxYyy format
            - Use SCREAMING_SNAKE_CASE for string values
            - Add doc comments for each code
          files:
            - pkg/result/codes.go
