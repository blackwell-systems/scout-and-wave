    - number: 2
      agents:
        - id: D
          task: |
            **Goal**: Update all gatecache callers to use new Result[GetData] signature.

            **Files to modify**:
            - pkg/protocol/gates.go
            - pkg/protocol/baseline_gates.go
            - pkg/protocol/gates_test.go

            **Changes required**:

            1. In pkg/protocol/gates.go, update executeSingleGate (lines 118-150):
               - FROM:
                 ```go
                 if cached, ok := cache.Get(ctx, cacheKey, gate.Type); ok {
                     return GateResult{..., Passed: cached.Passed, ...}
                 }
                 ```
               - TO:
                 ```go
                 getResult := cache.Get(ctx, cacheKey, gate.Type)
                 if getResult.IsSuccess() {
                     cached := getResult.GetData().Result
                     return GateResult{..., Passed: cached.Passed, ...}
                 }
                 // CACHE_MISS is non-fatal, fall through to run gate
                 ```

            2. No changes needed in baseline_gates.go — it doesn't call Get directly.

            3. In pkg/protocol/gates_test.go, update TestRunGatesWithCache (line 296):
               - FROM:
