        - id: C
          task: |
            # Agent C: Enhanced finalize-wave Guidance + Command Registration

            ## What to Implement

            1. Enhance `cmd/sawtools/finalize_wave.go` to print human-readable integration
               gap guidance to stderr after detecting gaps
            2. Register new commands in `cmd/sawtools/root.go`

            ## Implementation Steps

            ### Part 1: Enhanced finalize-wave Output

            **Location:** `cmd/sawtools/finalize_wave.go`, lines 383-399 (Step 3.5a: ValidateIntegration)

            **Current code:**
            ```go
            if integrationReport != nil {
                result.IntegrationReport = integrationReport
                if !integrationReport.Valid {
                    fmt.Fprintf(os.Stderr, "finalize-wave: %d integration gap(s) detected\n", len(integrationReport.Gaps))
                }
            }
            ```

            **Change to:**
            ```go
            if integrationReport != nil {
                result.IntegrationReport = integrationReport
                if !integrationReport.Valid {
                    fmt.Fprintf(os.Stderr, "finalize-wave: %d integration gap(s) detected\n\n", len(integrationReport.Gaps))

                    // Print gap summary
                    fmt.Fprintf(os.Stderr, "Integration gaps found:\n")
                    for _, gap := range integrationReport.Gaps {
                        fmt.Fprintf(os.Stderr, "  - %s (exported from %s, severity: %s)\n",
                            gap.ExportName, gap.FilePath, gap.Severity)
                    }
                    fmt.Fprintf(os.Stderr, "\n")

                    // Print next-step guidance
                    fmt.Fprintf(os.Stderr, "Next step: sawtools run-integration-agent \"%s\" --wave %d\n",
                        manifestPath, waveNum)
                }
            }
            ```

            **Rationale:** Orchestrator gets clear guidance on (a) what gaps exist,
            (b) what command to run next. No need to "read failure-routing.md" —
            the command is right there.

            ### Part 2: Command Registration

            **Location:** `cmd/sawtools/root.go`

            Add these two commands to the root command:
            ```go
            rootCmd.AddCommand(newRunIntegrationAgentCmd())
            rootCmd.AddCommand(newRunIntegrationWaveCmd())
            ```

            Place them near the other run-* commands (run-scout, run-wave, run-gates, etc.)
            for organizational consistency.

            ## Test Plan

            1. Create test IMPL with integration gaps
            2. Run: `sawtools finalize-wave <impl-path> --wave 1`
            3. Verify stderr output shows:
               - Gap count
               - List of gaps with symbol, file, severity
               - "Next step: sawtools run-integration-agent ..." guidance
            4. Verify JSON output still contains integration_report field
            5. Test command registration: `sawtools --help | grep run-integration`
               Should show both new commands.

