        - id: D
          task: |
            # Agent D: Orchestrator Prompt Update (Step 8a)

            ## What to Implement

            Replace vague meta-instruction in `saw-skill.md` step 8a with explicit substeps
            the orchestrator can execute directly.

            ## Implementation Steps

            **Location:** `implementations/claude-code/prompts/saw-skill.md`, line 176

            **Current text:**
            ```
            8a. **E25/E26/E35: Integration gap detection.** After finalization succeeds, read `references/failure-routing.md` § E25/E26/E35 for integration validation and wiring flow.
            ```

            **Replace with:**
            ```
            8a. **E25/E26/E35: Integration gap detection.** After finalization succeeds:
               1. Check `finalize-wave` JSON output for `integration_report.valid` field
               2. If `valid == false`, integration gaps were detected
               3. Read stderr output for gap summary and next-step guidance
               4. Run the command shown in stderr (typically: `sawtools run-integration-agent "<manifest-path>" --wave <N>`)
               5. Read integration agent's completion report from IMPL doc (agent ID: `integrator`)
               6. If completion report shows `status: complete`, proceed to step 9 (next wave or IMPL completion)
               7. If `status: blocked` or `status: partial`, apply E19 failure routing (see `references/failure-routing.md` § E19)

               **Config:** Integration agent model is read from `saw.config.json` under `agent.integration_model`. If empty, inherits parent session's model.

               **E27 planned integration waves:** If the IMPL doc includes a wave with `type: integration`, use `sawtools run-integration-wave` instead of reactive gap detection. Planned integration waves run before gap detection (between steps 3 and 8a).
            ```

            **Rationale:**
            - Removes meta-instruction ("read failure-routing.md")
            - Provides explicit command to run (`run-integration-agent`)
            - Explains where to find the command (in stderr output)
            - Covers both reactive (E25/E26) and planned (E27) integration flows
            - Documents config lookup for integration agent model

            ## Test Plan

            1. Verify markdown formatting is correct (bullet nesting, code blocks)
            2. Check line numbers haven't shifted other steps (step 9 should still be E15)
            3. Confirm no other step references "step 8a" with old expectations
            4. Search for other mentions of "failure-routing.md § E25" to ensure consistency

            ## Verification Gate

            No build/test required (markdown only). Visual inspection:
            - Markdown renders correctly
            - Step numbering is consistent
            - No broken internal references

            ## Files You Own

            - `implementations/claude-code/prompts/saw-skill.md` (modify)

            ## Constraints

            - Do NOT renumber other steps
            - Keep E25/E26/E35 anchor text for cross-referencing
            - Maintain same formatting style as other steps (numbered substeps)
          files:
            - implementations/claude-code/prompts/saw-skill.md
