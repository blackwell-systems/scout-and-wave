interface_contracts:
    - name: newRunIntegrationAgentCmd
      description: CLI command constructor for run-integration-agent
      definition: |
        func newRunIntegrationAgentCmd() *cobra.Command

        Command: sawtools run-integration-agent "<manifest-path>" --wave <N>

        Flow:
        1. Load manifest from <manifest-path>
        2. Run validate-integration (or use existing integration_report from manifest)
        3. If no gaps (valid=true), exit 0 with message "No integration gaps detected"
        4. If gaps found, read agent.integration_model from saw.config.json
           (use config.Load(repoPath), fall back to parent model if empty)
        5. Call engine.RunIntegrationAgent() with opts
        6. Verify build: run test_command from manifest
        7. Read completion report from manifest (agent ID: "integrator")
        8. Return structured JSON result

        Returns JSON:
        {
          "success": bool,
          "gap_count": int,
          "agent_launched": bool,
          "build_passed": bool,
          "completion_report": {...}
        }
      location: cmd/sawtools/run_integration_agent_cmd.go
    - name: newRunIntegrationWaveCmd
      description: CLI command constructor for run-integration-wave (E27 planned integration waves)
      definition: |
        func newRunIntegrationWaveCmd() *cobra.Command

        Command: sawtools run-integration-wave "<manifest-path>" --wave <N>

        Flow:
        1. Load manifest, find wave N
        2. Verify wave.Type == "integration" (error if not)
        3. For each agent in wave:
           a. Run sawtools prepare-agent --no-worktree (extract brief, init journal)
           b. Launch integration-agent via Agent tool with agent.files as constraints
           c. Read completion report
        4. Verify build: run test_command from manifest
        5. Return structured JSON result

        Returns JSON:
        {
          "success": bool,
          "wave": int,
          "agents": [{"id": "X", "status": "complete"}, ...],
          "build_passed": bool
        }
      location: cmd/sawtools/run_integration_wave_cmd.go
    - name: Enhanced finalize-wave stderr output
      description: Human-readable integration gap guidance after finalize-wave detects gaps
      definition: |
        After StepValidateIntegration completes in finalize-wave, if integration_report.valid == false:

        Print to stderr:
        ```
        finalize-wave: %d integration gap(s) detected

        Integration gaps found:
          - <symbol> (exported from <file>, no callers found)
          - <symbol> (exported from <file>, no callers found)
          ...

        Next step: sawtools run-integration-agent "<manifest-path>" --wave <N>
        ```

        This gives the orchestrator clear guidance on what to run next.
      location: cmd/sawtools/finalize_wave.go (lines 383-399)
    - name: Updated orchestrator step 8a
      description: Explicit orchestrator instructions replacing vague meta-instruction
      definition: |
        Replace current step 8a (line 176 in saw-skill.md):
        "8a. **E25/E26/E35: Integration gap detection.** After finalization succeeds, read `references/failure-routing.md` § E25/E26/E35 for integration validation and wiring flow."

        With explicit substeps:
        ```
        8a. **E25/E26/E35: Integration gap detection.** After finalization succeeds:
           1. Check finalize-wave JSON output for `integration_report.valid` field
           2. If `valid == false`, integration gaps were detected
           3. Read stderr output for gap summary and next-step guidance
           4. Run: `sawtools run-integration-agent "<manifest-path>" --wave <N>`
           5. Read integration agent's completion report (agent ID: "integrator")
           6. If completion report shows status: complete, proceed to next wave
           7. If status: blocked or partial, see `references/failure-routing.md` § E19
        ```

        This replaces the meta-instruction with concrete steps the orchestrator can execute.
      location: implementations/claude-code/prompts/saw-skill.md (line 176)
waves:
