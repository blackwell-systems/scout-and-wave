          task: |
            # Agent A: run-integration-agent CLI Command

            ## What to Implement

            Create `cmd/sawtools/run_integration_agent_cmd.go` implementing the CLI command:
            ```bash
            sawtools run-integration-agent "<manifest-path>" --wave <N>
            ```

            This is the CLI equivalent of the web app's automatic integration agent flow
            (lines 753-783 in scout-and-wave-web/pkg/api/wave_runner.go). It provides a
            1-command solution for fixing integration gaps after wave agents complete.

            ## Interface Contracts to Implement

            ```go
            func newRunIntegrationAgentCmd() *cobra.Command
            ```

            ## Implementation Steps

            1. **Command setup:**
               - Use: `run-integration-agent <manifest-path>`
               - Short: "Launch integration agent to wire integration gaps (E26)"
               - Flags: `--wave <N>` (required)
               - Args: ExactArgs(1) for manifest path

            2. **Validation flow:**
               ```go
               manifestPath := args[0]

               // Load manifest
               manifest, err := protocol.Load(manifestPath)
               if err != nil { return err }

               // Check if integration_report already exists in manifest
               waveKey := fmt.Sprintf("wave%d", waveNum)
               existingReport := manifest.IntegrationReports[waveKey]

               // If no existing report, run validate-integration
               if existingReport == nil {
                   report, err := protocol.ValidateIntegration(manifest, waveNum, repoDir)
                   if err != nil { return err }
                   existingReport = report
               }

               // If no gaps, exit early
               if existingReport.Valid {
                   fmt.Println(`{"success": true, "gap_count": 0, "agent_launched": false}`)
                   return nil
               }
               ```

            3. **Model selection:**
               ```go
               // Read agent.integration_model from saw.config.json
               // Pattern: config.Load(repoDir), check cfg.Agent.IntegrationModel
               // If empty, fall back to parent model (inherit)
               cfgRes := config.Load(repoDir)
               var integrationModel string
               if cfgRes.IsSuccess() {
                   cfg := cfgRes.GetData()
                   integrationModel = cfg.Agent.IntegrationModel
               }
               // If still empty, inherit from parent (orchestrator's model)
               ```

            4. **Launch integration agent:**
               ```go
               fmt.Printf("Launching integration agent to fix %d gap(s)...\n", len(existingReport.Gaps))

               err := engine.RunIntegrationAgent(context.Background(), engine.RunIntegrationAgentOpts{
                   IMPLPath: manifestPath,
                   RepoPath: repoDir,
                   WaveNum:  waveNum,
                   Report:   existingReport,
                   Model:    integrationModel,
                   Logger:   newSawLogger(),
               }, func(ev engine.Event) {
                   // Print progress events to stderr
                   if ev.Event == "integration_agent_output" {
                       if data, ok := ev.Data.(map[string]string); ok {
                           fmt.Fprint(os.Stderr, data["chunk"])
                       }
                   }
               })

               if err != nil {
                   return fmt.Errorf("run-integration-agent: %w", err)
               }
               ```

            5. **Verify build:**
               ```go
               // Re-load manifest to get updated completion report
               manifest, _ = protocol.Load(manifestPath)

               // Run test_command from manifest
               if manifest.TestCommand != "" {
                   fmt.Println("Verifying build...")
                   cmd := exec.Command("bash", "-c", manifest.TestCommand)
                   cmd.Dir = repoDir
                   cmd.Stdout = os.Stdout
                   cmd.Stderr = os.Stderr
                   if err := cmd.Run(); err != nil {
                       return fmt.Errorf("run-integration-agent: build verification failed: %w", err)
                   }
               }
               ```

            6. **Read completion report and output JSON:**
               ```go
               report := manifest.CompletionReports["integrator"]
               result := map[string]interface{}{
                   "success": true,
                   "gap_count": len(existingReport.Gaps),
                   "agent_launched": true,
                   "build_passed": true,
                   "completion_report": report,
               }
               out, _ := json.MarshalIndent(result, "", "  ")
               fmt.Println(string(out))
               ```

            ## Registration (DO NOT IMPLEMENT — Agent C handles this)

            Agent C will add this command to `cmd/sawtools/root.go`. Do NOT modify root.go yourself.

            ## Test Plan

            1. Create test IMPL with integration gaps (exports with no callers)
            2. Run: `sawtools run-integration-agent <impl-path> --wave 1`
            3. Verify: agent launches, gaps are wired, build passes, JSON output correct
            4. Test no-gaps case: run on IMPL with valid integration (should skip agent)
            5. Test config loading: verify agent.integration_model is read from saw.config.json

            ## Verification Gate

            ```bash
            cd /Users/dayna.blackwell/code/scout-and-wave-go
            go build ./cmd/sawtools
            go test ./cmd/sawtools -run TestRunIntegrationAgent
            go vet ./cmd/sawtools
            ```

            ## Files You Own

            - `cmd/sawtools/run_integration_agent_cmd.go` (new)

            ## Constraints

            - Use same pattern as run-wave, run-scout for command structure
            - Use config.Load(repoDir) for model selection (not direct JSON parsing)
            - Print progress to stderr, JSON result to stdout
            - Non-fatal errors should log warnings but still output JSON (success: false)
