            # Agent B: run-integration-wave CLI Command

            ## What to Implement

            Create `cmd/sawtools/run_integration_wave_cmd.go` implementing the CLI command
            for E27 planned integration waves:
            ```bash
            sawtools run-integration-wave "<manifest-path>" --wave <N>
            ```

            This handles waves with `type: integration` where Scout pre-plans the wiring
            work instead of relying on reactive E25/E26 gap detection.

            ## Interface Contracts to Implement

            ```go
            func newRunIntegrationWaveCmd() *cobra.Command
            ```

            ## Implementation Steps

            1. **Command setup:**
               - Use: `run-integration-wave <manifest-path>`
               - Short: "Execute planned integration wave (E27)"
               - Flags: `--wave <N>` (required)
               - Args: ExactArgs(1) for manifest path

            2. **Validate wave type:**
               ```go
               manifestPath := args[0]
               manifest, err := protocol.Load(manifestPath)
               if err != nil { return err }

               // Find wave N
               var targetWave *protocol.Wave
               for i := range manifest.Waves {
                   if manifest.Waves[i].Number == waveNum {
                       targetWave = &manifest.Waves[i]
                       break
                   }
               }
               if targetWave == nil {
                   return fmt.Errorf("run-integration-wave: wave %d not found", waveNum)
               }

               // Verify type: integration
               if targetWave.Type != "integration" {
                   return fmt.Errorf("run-integration-wave: wave %d is not type: integration (found: %s)",
                       waveNum, targetWave.Type)
               }
               ```

            3. **For each agent in wave:**
               ```go
               for _, agent := range targetWave.Agents {
                   fmt.Printf("Preparing integration agent %s...\n", agent.ID)

                   // Extract brief (no worktree needed)
                   briefPath := filepath.Join(repoDir, ".saw-agent-brief.md")
                   if err := os.WriteFile(briefPath, []byte(agent.Task), 0644); err != nil {
                       return fmt.Errorf("run-integration-wave: failed to write brief for %s: %w", agent.ID, err)
                   }

                   // Launch integration-agent
                   // NOTE: In real CLI usage, this would use the Agent tool via orchestrator.
                   // For this command, document that it's a CLI helper — the orchestrator
                   // still launches agents via Agent tool in step 3 of saw-skill.md.

                   fmt.Printf("Agent %s ready. Orchestrator should launch with:\n", agent.ID)
                   fmt.Printf("  subagent_type: integration-agent\n")
                   fmt.Printf("  files: %v\n", agent.Files)
                   fmt.Printf("  prompt: see .saw-agent-brief.md\n")
               }
               ```

            4. **Output result:**
               ```go
               result := map[string]interface{}{
                   "success": true,
                   "wave": waveNum,
                   "agents": agentStatuses,
                   "message": "Integration wave agents prepared. Launch via orchestrator.",
               }
               out, _ := json.MarshalIndent(result, "", "  ")
               fmt.Println(string(out))
               ```

