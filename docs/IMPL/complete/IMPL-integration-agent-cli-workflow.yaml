            - `cmd/sawtools/root.go` (modify)

            ## Constraints

            - Do NOT change JSON output structure (backward compatibility)
            - Only enhance stderr output for human readability
            - Print gap details before the "Next step" line
            - Use absolute manifest path in the "Next step" command suggestion
          files:
