pre_mortem:
    overall_risk: low
    rows:
        - scenario: Gate population writes malformed markdown that breaks agent task parsing
          likelihood: low
          impact: high
          mitigation: TestFormatVerificationBlock explicitly validates markdown structure. Include end-to-end test (TestFinalizeIMPL_Success) that loads manifest after population and verifies agent.Task field parses correctly.
        - scenario: Focused test pattern inference fails for non-Go languages
          likelihood: medium
          impact: low
          mitigation: DetermineFocusedTestPattern gracefully falls back to full suite command when pattern inference fails. Explicitly test Rust/JavaScript/Python in TestDetermineFocusedTestPattern suite.
        - scenario: Transactional rollback fails, leaving IMPL doc in partial state
          likelihood: low
          impact: high
          mitigation: Use atomic write pattern (write to temp file, validate, rename). TestFinalizeIMPL_PopulationFailure explicitly verifies file is unchanged after failure.
        - scenario: Agent C discovers pkg/engine/ does not exist in scout-and-wave-go yet
          likelihood: high
          impact: low
          mitigation: If pkg/engine/ missing, defer Agent C to scout-and-wave-web repo (separate feature). Agents A and B are self-contained and deliver core value.
