interface_contracts:
    - name: PopulateVerificationGates
      description: |
        Core gate population logic. Takes an IMPL manifest and H2 CommandSet,
        determines focused test patterns from file ownership, and writes verification
        blocks to each agent's task field. Returns updated manifest or error.
        Transactional: does not modify input manifest; returns new copy.
      definition: |
        func PopulateVerificationGates(m *IMPLManifest, commandSet *commands.CommandSet) (*IMPLManifest, error)
      location: pkg/protocol/gate_populator.go
    - name: DetermineFocusedTestPattern
      description: |
        Helper function that takes an agent's file list and the full CommandSet,
        infers the package/module path from file ownership, and returns a focused
        test command string. For Go: "go test ./pkg/auth -run TestAuth". For Rust:
        "cargo test auth". Returns empty string if focused pattern cannot be determined.
      definition: |
        func DetermineFocusedTestPattern(files []string, commandSet *commands.CommandSet) string
      location: pkg/protocol/gate_populator.go
    - name: FormatVerificationBlock
      description: |
        Formats build/lint/test commands into a markdown verification block string
        that will be appended to an agent's task field. Uses standard format:
        "## Verification Gate\n```bash\n<commands>\n```"
      definition: |
        func FormatVerificationBlock(buildCmd, lintCmd, testCmd string) string
      location: pkg/protocol/gate_populator.go
    - name: FinalizeIMPL
      description: |
        Batching command that combines: (1) validate (E16 structure check),
        (2) populate-verification-gates (M4 gate generation), (3) validate again
        (confirm gates valid). Atomic operation with rollback on failure.
        Returns FinalizeIMPLResult with validation errors and population stats.
      definition: |
        type FinalizeIMPLResult struct {
          Success           bool                `json:"success"`
          Validation        ValidateResult      `json:"validation"`
          GatePopulation    GatePopulationStats `json:"gate_population"`
          FinalValidation   ValidateResult      `json:"final_validation"`
        }

        type ValidateResult struct {
          Passed bool              `json:"passed"`
          Errors []ValidationError `json:"errors"`
        }

        type GatePopulationStats struct {
          AgentsUpdated     int    `json:"agents_updated"`
          Toolchain         string `json:"toolchain"`
          H2DataAvailable   bool   `json:"h2_data_available"`
        }

        func FinalizeIMPL(implPath, repoRoot string) (*FinalizeIMPLResult, error)
      location: pkg/protocol/gate_populator.go
    - name: newFinalizeImplCmd (CLI wrapper)
      description: |
        Cobra command wrapper for finalize-impl. Reads implPath and optional --repo-root
        flag, calls FinalizeIMPL from pkg/protocol, marshals result to JSON, and exits
        with code 1 if Success=false.
      definition: |
        func newFinalizeImplCmd() *cobra.Command
      location: cmd/saw/finalize_impl_cmd.go
waves:
    - number: 1
      agents:
        - id: A
          task: |
            Implement the core verification gate population logic in pkg/protocol/gate_populator.go.

            ## What to Implement

            Create PopulateVerificationGates function that:
            1. Takes IMPLManifest and commands.CommandSet as input
            2. For each wave, for each agent:
               - Extract agent's file list from agent.Files
               - Call DetermineFocusedTestPattern(files, commandSet) to get focused test command
               - Call FormatVerificationBlock(build, lint, focusedTest) to create markdown block
               - Append verification block to agent.Task field (preserve existing content)
            3. Return updated manifest copy (do not modify input)
            4. Handle edge cases:
               - Agent already has "## Verification Gate" section: skip population (idempotent)
               - CommandSet is nil: return error "H2 data unavailable - run extract-commands first"
               - Empty file list: use full test suite command (no focused pattern)

            DetermineFocusedTestPattern algorithm:
            - Extract package path from file list (e.g., ["pkg/auth/handler.go", "pkg/auth/handler_test.go"] → "pkg/auth")
            - Use CommandSet.Commands.Test.FocusedPattern template:
              - Go: "go test ./{package} -run {TestPrefix}" where TestPrefix is inferred from package name
              - Rust: "cargo test {module_name}"
              - JavaScript: "npm test -- --grep \"{module}\""
              - Python: "pytest {path}/test_*.py"
            - If multiple packages in file list, use full suite command (cannot focus)
            - If FocusedPattern is empty, use Commands.Test.Full

            FormatVerificationBlock format:
            ```
            ## Verification Gate

            Run these commands to verify your implementation:

            ```bash
            {buildCmd}
            {lintCmd}
            {testCmd}
            ```
            ```

            (Note: literal backtick fence inside the markdown block, not YAML triple-quote)

            ## Interfaces to Implement

            - PopulateVerificationGates(m *IMPLManifest, commandSet *commands.CommandSet) (*IMPLManifest, error)
            - DetermineFocusedTestPattern(files []string, commandSet *commands.CommandSet) string
            - FormatVerificationBlock(buildCmd, lintCmd, testCmd string) string
            - FinalizeIMPL(implPath, repoRoot string) (*FinalizeIMPLResult, error)

            ## Interfaces to Call

            - protocol.Load(path string) (*IMPLManifest, error) — load IMPL manifest
            - protocol.Save(m *IMPLManifest, path string) error — save manifest (use for rollback tracking)
            - protocol.Validate(m *IMPLManifest) []ValidationError — E16 validation
            - commands.New() *Extractor — create H2 extractor
            - extractor.Extract(repoRoot string) (*CommandSet, error) — get H2 data

            ## Tests to Write

            1. TestPopulateVerificationGates_GoProject — full integration test with Go project
               - Input: manifest with 2 agents, CommandSet with Go commands
               - Verify: both agents have verification blocks appended to Task field
               - Verify: focused test patterns use correct package paths

            2. TestPopulateVerificationGates_Idempotent — verify no double-population
               - Input: manifest where one agent already has "## Verification Gate"
               - Verify: that agent's Task field unchanged, others populated

            3. TestPopulateVerificationGates_MissingH2Data — error handling
               - Input: manifest with agents, nil CommandSet
               - Verify: returns error "H2 data unavailable"

            4. TestDetermineFocusedTestPattern_SinglePackage
               - Input: ["pkg/auth/handler.go", "pkg/auth/handler_test.go"], Go CommandSet
               - Verify: returns "go test ./pkg/auth -run TestAuth"

            5. TestDetermineFocusedTestPattern_MultiplePackages
               - Input: ["pkg/auth/handler.go", "pkg/db/store.go"], Go CommandSet
               - Verify: returns full suite command (cannot focus across packages)

            6. TestFormatVerificationBlock
               - Input: "go build ./...", "go vet ./...", "go test ./pkg/auth"
               - Verify: returns properly formatted markdown block with bash fence

            7. TestFinalizeIMPL_Success — full atomic workflow
               - Setup: create temp IMPL file with 2 agents, no verification blocks
               - Run: FinalizeIMPL(path, repoRoot)
               - Verify: Success=true, GatePopulation.AgentsUpdated=2, file updated with gates

            8. TestFinalizeIMPL_ValidationFailure — rollback on initial validation error
               - Setup: create IMPL file with I1 violation (duplicate file ownership)
               - Run: FinalizeIMPL(path, repoRoot)
               - Verify: Success=false, Validation.Passed=false, file unchanged (rollback)

            9. TestFinalizeIMPL_PopulationFailure — rollback on gate population error
               - Setup: create IMPL file with no H2 data available (mock Extract to return nil)
               - Run: FinalizeIMPL(path, repoRoot)
               - Verify: Success=false, GatePopulation not populated, file unchanged

            ## Verification Gate

            ```bash
            go build ./pkg/protocol/...
            go vet ./pkg/protocol/...
            go test ./pkg/protocol -run TestPopulateVerificationGates -run TestDetermineFocusedTestPattern -run TestFormatVerificationBlock -run TestFinalizeIMPL
            ```

            ## Constraints

            - MUST be transactional: if any step fails (validation, population, final validation),
              the IMPL file must be unchanged. Use atomic write pattern: write to temp file,
              validate, then rename.
            - MUST be idempotent: running finalize-impl twice produces same result (no duplicate
              verification blocks).
            - MUST preserve existing agent Task content: append verification block, do not replace.
            - MUST handle missing H2 data gracefully: if extract-commands fails, return structured
              error (not panic).
            - Test coverage: ≥85% of gate_populator.go (critical path for determinism).
          files:
            - pkg/protocol/gate_populator.go
            - pkg/protocol/gate_populator_test.go
        - id: B
          task: |
            Implement the finalize-impl CLI command wrapper in cmd/saw/finalize_impl_cmd.go.

            ## What to Implement

            Create Cobra command that:
            1. Accepts <manifest-path> as required positional argument
            2. Accepts optional --repo-root flag (defaults to "." current directory)
            3. Calls protocol.FinalizeIMPL(manifestPath, repoRoot)
            4. Marshals FinalizeIMPLResult to JSON (pretty-printed)
            5. Prints JSON to stdout
            6. Exits with code 1 if result.Success == false
            7. Registers command in cmd/saw/main.go rootCmd

            Command help text:
            ```
            Use:   "finalize-impl <manifest-path>"
            Short: "Finalize IMPL doc: validate, populate verification gates, validate again"
            Long:  `Atomic batching command that combines:
            1. Initial validation (E16 structure check)
            2. Extract build/test/lint commands from project (H2)
            3. Populate verification gate blocks for all agents
            4. Final validation (confirm gates are valid)

            Transactional: rolls back manifest on failure (no partial writes).
            Idempotent: safe to run multiple times.

            Typical usage (orchestrator workflow after Scout completes):
              sawtools finalize-impl docs/IMPL/IMPL-feature-x.yaml

            Output: JSON with validation results and gate population stats.`
            ```

            ## Interfaces to Implement

            - newFinalizeImplCmd() *cobra.Command

            ## Interfaces to Call

            - protocol.FinalizeIMPL(implPath, repoRoot string) (*FinalizeIMPLResult, error)
            - json.MarshalIndent(result, "", "  ") — pretty JSON output
            - cmd.OutOrStdout() — write to stdout (testable)
            - os.Exit(1) — exit code on failure

            ## Tests to Write

            1. TestFinalizeImplCmd_Success — full integration test
               - Setup: create temp IMPL file with valid structure, 2 agents, no gates
               - Setup: create temp repo with go.mod (for H2 detection)
               - Run: cobra command with manifest path and repo root
               - Verify: exit code 0, JSON output has Success=true, AgentsUpdated=2
               - Verify: IMPL file updated with verification blocks

            2. TestFinalizeImplCmd_ValidationFailure
               - Setup: create IMPL file with I1 violation
               - Run: command
               - Verify: exit code 1, JSON has Success=false, Validation.Passed=false

            3. TestFinalizeImplCmd_MissingRepoRoot
               - Setup: valid IMPL file
               - Run: command without --repo-root flag (should default to ".")
               - Verify: command runs (does not fail on missing flag)

            4. TestFinalizeImplCmd_InvalidManifestPath
               - Run: command with non-existent manifest path
               - Verify: exit code 1, error message "failed to load manifest"

            5. TestFinalizeImplCmd_Registration
               - Verify: newFinalizeImplCmd() is registered in main.go rootCmd
               - Verify: "sawtools finalize-impl --help" works

            ## Verification Gate

            ```bash
            go build ./cmd/saw/...
            go vet ./cmd/saw/...
            go test ./cmd/saw -run TestFinalizeImplCmd
            ```

            ## Constraints

            - MUST register command in main.go (add to rootCmd.AddCommand list)
            - MUST output valid JSON (always, even on errors) for structured parsing by orchestrator
            - MUST use cmd.OutOrStdout() not fmt.Println for testability
            - MUST exit code 1 on any failure (validation, population, or final validation)
            - Follow existing finalize-wave.go pattern for result struct and JSON marshaling
          files:
            - cmd/saw/finalize_impl_cmd.go
            - cmd/saw/finalize_impl_cmd_test.go
            - cmd/saw/main.go
