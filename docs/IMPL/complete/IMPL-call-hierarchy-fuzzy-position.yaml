suitability_assessment: |-
    Two independently implementable features with clean disjoint file ownership.

    Feature 1 (Call Hierarchy) adopts the single-tool design from mcp-lsp-bridge
    (/Users/dayna.blackwell/code/competitors/mcp-lsp-bridge/mcpserver/tools/call_hierarchy.go):
    one `call_hierarchy` tool with a `direction` parameter ("incoming", "outgoing", "both").
    This is preferred over cclsp's 3-tool design because:
    - One round-trip for callers wanting both directions (default: "both")
    - Simpler mental model for AI assistants -- no prepare/incoming/outgoing dance
    - The LSP prepare step is internal; users never need to call it directly

    LSP-MCP-GO outputs JSON (not formatted text like mcp-lsp-bridge). The handler
    follows the existing repo pattern: JSON-marshal the result via types.TextResult.

    Feature 1 decomposes into:
    - Agent A: LSP client methods (internal/lsp/client.go) -- adds PrepareCallHierarchy,
      GetIncomingCalls, GetOutgoingCalls, callHierarchyProvider capability in Initialize,
      and requestTimeouts entries.
    - Agent B: tool handler (internal/tools/callhierarchy.go, new file) -- single
      HandleCallHierarchy handler with direction switch.
    - Agent C: server registration (cmd/lsp-mcp-go/server.go) -- one tool, one arg struct,
      count 24 to 25.

    Feature 2 (Fuzzy Fallback) is a single agent:
    - Agent D: adds fuzzyPositionFallback in internal/tools/fuzzy.go (new file) and
      applies it in HandleGoToDefinition and HandleGetReferences in
      internal/tools/navigation.go.

    Agents A and B are fully parallel: B calls client methods that A adds, but the
    interface contract is fixed before launch so both agents compile against the spec.
    Agent C is in Wave 2 (depends on B exported symbol name).
    Agent D is independent of A/B/C entirely.

    Wave 1: A + B + D
    Wave 2: C

    Pre-implementation status: none of the call hierarchy tools exist today (confirmed
    by grep). Fuzzy fallback helpers do not exist. All work is TODO.

    Parallelization value: HIGH. 3 Wave 1 agents run in parallel. Build cycle ~2-4s.

    Estimated times:
    - Scout phase: ~15 min
    - Agent execution: ~20 min (3 Wave 1 agents x ~10 min avg; Wave 2 ~6 min)
    - Merge and verification: ~5 min
    Total SAW time: ~40 min

    Sequential baseline: ~4 agents x 11 min = ~44 min
    Time savings: ~4 min (coordination value + interface contract precision)
    Recommendation: Clear speedup for Feature 1 (3 parallel agents) plus precise
    cross-agent interface contract at the client/handler boundary.
