known_issues:
  - title: "validate_cmd.go calls GetData() without checking Result success"
    description: |
      cmd/sawtools/validate_cmd.go:59 calls res.GetData() without first checking
      if res.IsSuccess(). When FullValidate returns a failure Result (e.g., YAML
      parse error), calling GetData() on nil Data causes a panic:
      
      panic: GetData called on Result with nil Data
      
      This is a dogfooding error found during gatecache-review-fixes scout phase.
      The validate command is unusable when the IMPL doc has any parse errors.
    severity: high
    workaround: |
      Use Python YAML validation or manual review for syntax errors. The bug does
      not affect valid IMPL docs that pass FullValidate.
    discovered_during: gatecache-review-fixes scout phase (2026-04-01)
    affected_files:
      - cmd/sawtools/validate_cmd.go
