interface_contracts:
  - name: Get
    description: |
      Retrieves cached gate result. Currently returns (*CachedResult, bool) but
      should return Result[GetData] for protocol conformance. This is a fallible
      operation (cache miss, expiry) that must use Result[T] pattern.
    definition: |
      // Before:
      func (c *Cache) Get(ctx context.Context, key CacheKey, gateType string) (*CachedResult, bool)

      // After:
      type GetData struct {
          Result    CachedResult
          FromCache bool
      }
      func (c *Cache) Get(ctx context.Context, key CacheKey, gateType string) result.Result[GetData]

      // On cache miss or expiry:
      return result.NewFailure[GetData]([]result.SAWError{
          {Code: "CACHE_MISS", Message: "cache miss", Severity: "info"},
      })

      // On success:
      return result.NewSuccess(GetData{Result: r, FromCache: true})
    location: pkg/gatecache/cache.go:163

  - name: load
    description: |
      Private function that uses hardcoded error strings. Must use error code
      constants from pkg/result/codes.go for consistency with the codebase.
    definition: |
      // Current implementation uses:
      return fmt.Errorf("gatecache: read cache file: %w", err)
      return fmt.Errorf("gatecache: parse cache file: %w", err)

      // Should use error codes (add to pkg/result/codes.go if needed):
      // If reading cache file fails and file exists:
      return fmt.Errorf("gatecache: %s: %w", result.CodeCacheLoadFailed, err)

      // If parsing JSON fails:
      return fmt.Errorf("gatecache: %s: %w", result.CodeCacheParseFailed, err)
    location: pkg/gatecache/cache.go:245

  - name: save
    description: |
      Private function that uses hardcoded error strings. Must use error code
      constants from pkg/result/codes.go for consistency with the codebase.
    definition: |
      // Current implementation uses:
      return fmt.Errorf("gatecache: create state dir: %w", err)
      return fmt.Errorf("gatecache: marshal cache: %w", err)
      return fmt.Errorf("gatecache: write cache file: %w", err)

      // Should use error codes (add to pkg/result/codes.go if needed):
      return fmt.Errorf("gatecache: %s: %w", result.CodeCacheSaveFailed, err)
    location: pkg/gatecache/cache.go:269

  - name: CodeCacheLoadFailed
    description: Error code constant for cache file read/parse failures
    definition: |
      // Add to Cache error codes section (C001-C099 range, next available: C012)
      const (
          CodeCacheLoadFailed  = "C012_CACHE_LOAD_FAILED"
          CodeCacheParseFailed = "C013_CACHE_PARSE_FAILED"
          CodeCacheSaveFailed  = "C014_CACHE_SAVE_FAILED"
          CodeCacheMiss        = "C015_CACHE_MISS"
      )
    location: pkg/result/codes.go

waves:
  - number: 1
    agents:
      - id: A
        task: |
          **Objective**: Update Cache.Get to return Result[GetData] and refactor load/save
          to use error code constants.

          **Files to modify**:
          - pkg/gatecache/cache.go (lines 163-182 for Get, 245-286 for load/save)

          **Changes**:

          1. Add GetData struct before Get function (around line 62):
             ```go
             // GetData is returned on successful Get operations.
             type GetData struct {
                 Result    CachedResult
                 FromCache bool
             }
             ```

          2. Update Get signature and implementation:
             ```go
             // Change function signature from:
             func (c *Cache) Get(ctx context.Context, key CacheKey, gateType string) (*CachedResult, bool)

             // To:
             func (c *Cache) Get(ctx context.Context, key CacheKey, gateType string) result.Result[GetData]

             // Update implementation:
             func (c *Cache) Get(ctx context.Context, key CacheKey, gateType string) result.Result[GetData] {
                 c.mu.RLock()
                 defer c.mu.RUnlock()

                 h := hashKey(key)
                 inner, ok := c.entries[h]
                 if !ok {
                     return result.NewFailure[GetData]([]result.SAWError{
                         {Code: result.CodeCacheMiss, Message: "cache miss: key not found", Severity: "info"},
                     })
                 }
                 r, ok := inner[gateType]
                 if !ok {
                     return result.NewFailure[GetData]([]result.SAWError{
                         {Code: result.CodeCacheMiss, Message: fmt.Sprintf("cache miss: gate type %q not found", gateType), Severity: "info"},
                     })
                 }
                 // Populate TTL for expiry check
                 r.TTL = c.ttl
                 if r.IsExpired() {
                     return result.NewFailure[GetData]([]result.SAWError{
                         {Code: result.CodeCacheMiss, Message: "cache miss: entry expired", Severity: "info"},
                     })
                 }
                 return result.NewSuccess(GetData{Result: r, FromCache: true})
             }
             ```

          3. Update load function to use error codes (lines 245-265):
             ```go
             func (c *Cache) load(ctx context.Context) error {
                 if err := ctx.Err(); err != nil {
                     return fmt.Errorf("%s: %w", result.CodeCacheLoadFailed, err)
                 }
                 path := filepath.Join(c.stateDir, cacheFileName)
                 data, err := os.ReadFile(path)
                 if err != nil {
                     if os.IsNotExist(err) {
                         return nil // No cache file yet; that's fine
                     }
                     return fmt.Errorf("%s: read cache file: %w", result.CodeCacheLoadFailed, err)
                 }
                 var cf cacheFile
                 if err := json.Unmarshal(data, &cf); err != nil {
                     return fmt.Errorf("%s: parse cache file: %w", result.CodeCacheParseFailed, err)
                 }
                 if cf.Entries != nil {
                     c.entries = cf.Entries
                 }
                 return nil
             }
             ```

          4. Update save function to use error codes (lines 269-286):
             ```go
             func (c *Cache) save(ctx context.Context) error {
                 if err := ctx.Err(); err != nil {
                     return fmt.Errorf("%s: %w", result.CodeCacheSaveFailed, err)
                 }
                 if err := os.MkdirAll(c.stateDir, 0755); err != nil {
                     return fmt.Errorf("%s: create state dir: %w", result.CodeCacheSaveFailed, err)
                 }
                 cf := cacheFile{Entries: c.entries}
                 data, err := json.MarshalIndent(cf, "", "  ")
                 if err != nil {
                     return fmt.Errorf("%s: marshal cache: %w", result.CodeCacheSaveFailed, err)
                 }
                 path := filepath.Join(c.stateDir, cacheFileName)
                 if err := os.WriteFile(path, data, 0644); err != nil {
                     return fmt.Errorf("%s: write cache file: %w", result.CodeCacheSaveFailed, err)
                 }
                 return nil
             }
             ```

          **Interfaces**: GetData struct, updated Get signature.

          **Tests**: Agent B will update all Get call sites in tests.

          **Verification gate**:
          ```bash
          cd /Users/dayna.blackwell/workspace/code/scout-and-wave-go
          go build ./pkg/gatecache/... && \
          go vet ./pkg/gatecache/... && \
          go test ./pkg/gatecache/... -run TestCache_PutGet
          ```

          **Constraints**:
          - Do NOT modify any other functions (BuildKey, BuildKeyForGate, Put, Invalidate)
          - Do NOT change CachedResult struct
          - Do NOT modify test files (Agent B owns all test changes)

      - id: B
        task: |
            **Objective**: Update all test call sites for Cache.Get to use Result[GetData]
            pattern and add coverage for IsExpired TTL==0 edge case.

            **Files to modify**:
            - pkg/gatecache/cache_test.go (all tests calling Get)

            **Changes**:

            1. Update all Get call sites (appears in 11 test functions):

               Change from:
