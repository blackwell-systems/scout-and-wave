               Tests to update:
               - TestCache_PutGet (lines 39-54)
               - TestCache_TTLExpiry (lines 103-106)
               - TestCache_TTLNotExpired (lines 125-131)
               - TestCache_Invalidate (lines 159-161)
               - TestCache_Persistence (lines 233-248)
               - TestCache_MultipleGateTypes (lines 274-283)
               - TestCache_CommandDifferentiation (lines 413-418)
               - TestCacheThreadSafety (lines 505-509)
               - TestConcurrentPut (lines 578-590)

            2. Add test for IsExpired TTL==0 edge case (insert after TestCache_TTLNotExpired):
               ```go
               func TestCache_IsExpiredWithZeroTTL(t *testing.T) {
                   // When CachedResult.TTL is 0, IsExpired should fall back to DefaultTTL
                   r := &CachedResult{
                       TTL:      0,
                       CachedAt: time.Now().Add(-10 * time.Minute), // Older than DefaultTTL (5 min)
                   }
                   if !r.IsExpired() {
                       t.Error("expected IsExpired=true when TTL=0 and age > DefaultTTL")
                   }

                   // Not expired if age < DefaultTTL
                   r2 := &CachedResult{
                       TTL:      0,
                       CachedAt: time.Now().Add(-2 * time.Minute), // Younger than DefaultTTL
                   }
                   if r2.IsExpired() {
                       t.Error("expected IsExpired=false when TTL=0 and age < DefaultTTL")
                   }
               }
               ```

            3. Add test for GetData.FromCache field:
               ```go
               func TestCache_GetData_FromCacheField(t *testing.T) {
                   ctx := context.Background()
                   dir := t.TempDir()
                   c := New(ctx, dir, DefaultTTL)

                   key := CacheKey{HeadCommit: "abc123"}
                   r := CachedResult{GateType: "build", Passed: true}

                   putResult := c.Put(ctx, key, "build", r)
                   if putResult.IsFatal() {
                       t.Fatalf("Put failed: %v", putResult.Errors)
                   }

                   getResult := c.Get(ctx, key, "build")
                   if !getResult.IsSuccess() {
                       t.Fatalf("Get failed: %v", getResult.Errors)
                   }
                   data := getResult.GetData()
                   if !data.FromCache {
                       t.Error("expected FromCache=true after successful Get")
                   }
               }
               ```

