            install + init + first scout.

            ### File: implementations/claude-code/prompts/saw-skill.md

            In the Pre-flight Validation section, step 4 currently says
            `saw.config.json (informational): Check project root for config — not a blocker`.
            Update it to: if `saw.config.json` is missing, suggest running
            `sawtools init` to auto-generate it. Still not a blocker, but now with
            actionable guidance.

            ### File: docs/onboarding-improvement-plan.md

            Mark §4.1 (`sawtools init` command) as COMPLETE with today's date (2026-03-25).
            If there are other items that reference init, update their status too.

            ## Verification gate

            Verify all 4 files were updated and contain `sawtools init` references.
            ```
            grep -l "sawtools init" docs/INSTALLATION.md README.md implementations/claude-code/prompts/saw-skill.md docs/onboarding-improvement-plan.md
            ```
            All 4 files should match.
          files:
            - docs/INSTALLATION.md
            - README.md
            - implementations/claude-code/prompts/saw-skill.md
            - docs/onboarding-improvement-plan.md
