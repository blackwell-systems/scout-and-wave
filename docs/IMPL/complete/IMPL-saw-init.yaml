pre_mortem:
    overall_risk: low
    rows:
        - scenario: |-
            The "build" and "test" keys with "detected" markers are not part of
            SAWConfig, so config.Save will not write them. Agent A must do a
            second merge pass after Save. If this two-phase write has a bug,
            the output config may be missing the build/test keys or the file
            may be left in an inconsistent state.
          likelihood: medium
          impact: low
          mitigation: |-
            Agent A's test TestInitCmd_WritesConfig explicitly verifies the
            build.detected and test.command fields are present in the written JSON.
            If those assertions fail, the agent will fix the write logic before
            completing.
        - scenario: |-
            detectProject uses os.Stat priority ordering. If a project has both
            go.mod and package.json (common in monorepos with embedded frontends),
            Go will win because it is checked first. This may surprise users with
            Node-primary projects that also have go.mod for tooling.
          likelihood: low
          impact: low
          mitigation: |-
            The design spec does not address priority conflicts. The Go-wins ordering
            matches the majority of projects this tool targets. The --force flag and
            direct saw.config.json editing remain available for overrides.
        - scenario: |-
            runInstallChecks() is defined in verify_install_cmd.go in the same
            package (main). If the function signature or behavior changes in a
            future PR that merges before this one, Agent A's call site may fail
            to compile.
          likelihood: low
          impact: medium
          mitigation: |-
            Both files are in package main in the same directory. The function
            signature is stable (returns installResult, no arguments). If it changes,
            the compile error is caught immediately by the build gate.
