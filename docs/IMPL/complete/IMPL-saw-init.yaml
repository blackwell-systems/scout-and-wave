            - Auto-detects language (go, rust, node, python, ruby, makefile)
            - Auto-detects build and test commands
            - Writes `saw.config.json` with repos, agent models, build/test config
            - Flags: `--repo <path>` (default: cwd), `--force` (overwrite existing)
            - Runs install checks and prints next steps

            ## What to update

            ### File: docs/INSTALLATION.md

            Add `sawtools init` as the recommended first step after binary installation.
            Find the "Getting Started" or "Quick Start" section and insert:

            ```
