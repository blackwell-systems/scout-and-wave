            ## What to Implement

            Update wave-agent.md to document H7 build failure diagnosis integration.
            Add a new subsection after "## Verification Gates" (around line 251) that
            explains how wave agents should use diagnose-build-failure when builds fail.

            ## Interfaces to Call

