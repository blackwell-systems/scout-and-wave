          go vet ./cmd/saw
          go test ./cmd/saw -run TestDetectCascades -v
          ```

          ## Constraints

          - Do NOT modify cmd/saw/main.go in this agent (Agent B already modifies it).
            This agent only creates detect_cascades_cmd.go and its test.
          - Renames flag must accept valid JSON or fail fast with clear error message.
          - Output YAML format must match the schema in interface contracts.
          - No default value for --renames (required flag).
        files:
