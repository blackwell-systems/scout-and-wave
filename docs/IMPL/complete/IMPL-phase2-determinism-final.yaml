waves:
  - number: 1
    agents:
      - id: "A"
        task: |
          ## What to Implement

          Implement pre-implementation status scanner for H1a. This tool scans
          a codebase to classify requirements/audit items as DONE/PARTIAL/TODO
          by analyzing file content and test coverage.

          Create pkg/suitability package with:
          - types.go: SuitabilityResult, PreImplStatus, ItemStatus structs
          - scanner.go: classification logic
          - scanner_test.go: unit tests with fixtures

          ## Classification Heuristics

          **DONE status (completeness = 1.0):**
          - Function/type exists in target file
          - Test file exists with coverage >70%
          - No TODO/FIXME comments in implementation

          **PARTIAL status (completeness 0.4-0.9):**
          - Function/type exists but incomplete (has TODO/FIXME/stub patterns)
          - Test coverage 30-70%
          - Missing edge case handling

          **TODO status (completeness = 0.0):**
          - Function/type does not exist
          - No test file
          - File referenced in requirement does not exist

          ## Interfaces to Implement

          ```go
          package suitability

          // ScanPreImplementation analyzes files against requirements to classify status
          func ScanPreImplementation(repoRoot string, requirements []Requirement) (*SuitabilityResult, error)

          // Requirement represents a single item from audit/requirements doc
          type Requirement struct {
              ID          string   // "F1", "SEC-01", etc.
              Description string
              Files       []string // Files expected to implement this requirement
          }

          // ClassifyFile determines if a file is DONE/PARTIAL/TODO for a requirement
          func ClassifyFile(filePath string, req Requirement) (ItemStatus, error)
          ```

          ## Interfaces to Call

          - Standard library only: os.ReadFile, filepath.Walk, strings, regexp
          - No dependencies on protocol or analyzer packages

          ## Tests to Write

          1. TestScanPreImplementation_AllDone - all requirements fully implemented
          2. TestScanPreImplementation_Mixed - mix of DONE/PARTIAL/TODO items
          3. TestScanPreImplementation_AllTodo - empty codebase
          4. TestClassifyFile_Done - file with function + tests
          5. TestClassifyFile_Partial - file with TODO comments
          6. TestClassifyFile_Todo - file does not exist
          7. TestClassifyFile_TestCoverage - parse test coverage from test file size heuristic

          ## Verification Gate

          ```bash
          cd /Users/dayna.blackwell/code/scout-and-wave-go
          go build ./cmd/saw
          go vet ./pkg/suitability
          go test ./pkg/suitability -v
          ```

          ## Constraints

          - Do NOT parse AST for classification (too slow). Use grep/regex patterns.
          - Test coverage heuristic: if test file exists and has >100 lines, assume >70% coverage.
          - Time estimate heuristic: 7 min per TODO item, 3 min per PARTIAL item (conservative).
          - Output JSON must match the schema in interface contracts exactly.
        files:
