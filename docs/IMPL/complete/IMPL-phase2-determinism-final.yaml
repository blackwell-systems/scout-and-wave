      - id: "C"
        task: |
          ## What to Implement

          Extend pkg/analyzer with cascade detection for type renames (M2). This
          adds rename tracking to the existing DepGraph infrastructure.

          Create:
          - pkg/analyzer/cascade.go: rename cascade detection
          - pkg/analyzer/cascade_test.go: unit tests

          ## Algorithm

          Given a list of type renames (old name → new name), scan the codebase
          for files that reference the old name. Classify each match as:

          - **Syntax cascade (high severity):** Import statement or type declaration
            will cause compilation failure. Example: `import "pkg/auth.AuthToken"`
            or `var t AuthToken` in a file not being modified.

          - **Semantic cascade (low/medium severity):** Comment, documentation, or
            string literal mentioning old name. Does not affect compilation but
            creates inconsistency.

          ## Interfaces to Implement

          ```go
          package analyzer

          // DetectCascades scans repoRoot for files referencing old type names
          func DetectCascades(repoRoot string, renames []RenameInfo) (CascadeResult, error)

          // RenameInfo describes a type rename
          type RenameInfo struct {
              Old   string // Old type name (e.g., "AuthToken")
              New   string // New type name (e.g., "SessionToken")
              Scope string // Package scope (e.g., "pkg/auth")
          }

          // CascadeCandidate represents a file that references an old type name
          type CascadeCandidate struct {
              File        string
              Line        int
              Match       string
              CascadeType string // "syntax" | "semantic"
              Severity    string // "high" | "medium" | "low"
              Reason      string
          }
          ```

          ## Detection Strategy

          1. Parse each .go file in repoRoot (skip vendor/, .git/)
          2. For each rename, search file content for old type name
          3. Classify match context:
             - Syntax: appears in import statement, type declaration, or variable declaration
             - Semantic: appears in comment or string literal
          4. Determine severity:
             - High: import statement or type declaration in file not being modified
             - Medium: variable declaration in file not being modified
             - Low: comment or string literal

          ## Interfaces to Call

          - Extend existing detectCascades() in graph.go (current semantic-only version)
          - Use go/parser and go/ast for syntax analysis (already in graph.go pattern)
          - Reuse IsStdlib() and ResolveImportPath() from analyzer.go

          ## Tests to Write

          1. TestDetectCascades_SyntaxImport - file imports old type name
          2. TestDetectCascades_SyntaxTypeDecl - file declares variable with old type
          3. TestDetectCascades_SemanticComment - comment mentions old type
          4. TestDetectCascades_SemanticString - string literal contains old type
          5. TestDetectCascades_MultipleRenames - multiple type renames in single scan
          6. TestDetectCascades_NoMatches - no files reference old names

          ## Verification Gate

          ```bash
          cd /Users/dayna.blackwell/code/scout-and-wave-go
          go build ./cmd/saw
          go vet ./pkg/analyzer
          go test ./pkg/analyzer -run TestDetectCascades -v
          ```

          ## Constraints

          - Do NOT modify existing graph.go detectCascades() function signature.
            Create new DetectCascades() function in cascade.go.
          - Syntax vs. semantic classification must be conservative: if unsure,
            classify as syntax (high severity) to avoid missing compilation failures.
          - Skip test files (*_test.go) — they are not part of the production cascade.
          - Output must be deterministic (sort by file path, then line number).
        files:
          - "pkg/analyzer/cascade.go"
          - "pkg/analyzer/cascade_test.go"

      - id: "D"
        task: |
          ## What to Implement

          Implement `sawtools detect-cascades` CLI command for M2. This command
          wraps pkg/analyzer cascade detection and outputs YAML results.

          Create:
          - cmd/saw/detect_cascades_cmd.go: CLI command definition
          - cmd/saw/detect_cascades_cmd_test.go: integration tests

          ## Command Specification

          ```bash
          sawtools detect-cascades <repo-root> \
            --renames '[{"old":"AuthToken","new":"SessionToken","scope":"pkg/auth"}]'
          ```

          Parse JSON array of renames, pass to analyzer.DetectCascades(), output YAML.

          ## Interfaces to Implement

          Follow the existing pattern from analyze_deps_cmd.go:

          ```go
          func newDetectCascadesCmd() *cobra.Command {
              var renamesFlag string

              cmd := &cobra.Command{
                  Use:   "detect-cascades <repo-root>",
                  Short: "Detect files affected by type renames",
                  Args:  cobra.ExactArgs(1),
                  RunE: func(cmd *cobra.Command, args []string) error {
                      repoRoot := args[0]

                      // Parse renames JSON
                      var renames []analyzer.RenameInfo
                      if err := json.Unmarshal([]byte(renamesFlag), &renames); err != nil {
                          return fmt.Errorf("invalid --renames JSON: %w", err)
                      }

                      // Detect cascades
                      result, err := analyzer.DetectCascades(repoRoot, renames)
                      if err != nil {
                          return fmt.Errorf("detect cascades: %w", err)
                      }

                      // Output YAML
                      data, err := yaml.Marshal(result)
                      if err != nil {
                          return fmt.Errorf("marshal YAML: %w", err)
                      }

                      fmt.Fprintln(cmd.OutOrStdout(), string(data))
                      return nil
                  },
              }

              cmd.Flags().StringVar(&renamesFlag, "renames", "", "JSON array of renames")
              cmd.MarkFlagRequired("renames")

              return cmd
          }
          ```

          ## Interfaces to Call

          - analyzer.DetectCascades() (from Agent C)
          - encoding/json for unmarshaling renames
          - gopkg.in/yaml.v3 for output marshaling
          - github.com/spf13/cobra for CLI

          ## Tests to Write

