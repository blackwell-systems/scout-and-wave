          2. TestDetectCascadesCmd_MultipleRenames - multiple renames
          3. TestDetectCascadesCmd_NoMatches - renames but no files reference old names
          4. TestDetectCascadesCmd_InvalidJSON - malformed --renames flag
          5. TestDetectCascadesCmd_InvalidRepoRoot - non-existent directory

          ## Verification Gate

