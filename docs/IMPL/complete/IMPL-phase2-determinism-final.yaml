    description: "Output schema for pre-implementation status scanning"
    definition: |
      type SuitabilityResult struct {
          PreImplementation PreImplStatus `json:"pre_implementation"`
      }

      type PreImplStatus struct {
          TotalItems       int                `json:"total_items"`
          Done             int                `json:"done"`
          Partial          int                `json:"partial"`
          Todo             int                `json:"todo"`
          TimeSavedMinutes int                `json:"time_saved_minutes"`
          ItemStatus       []ItemStatus       `json:"item_status"`
      }

      type ItemStatus struct {
          ID           string   `json:"id"`
          Status       string   `json:"status"` // "DONE" | "PARTIAL" | "TODO"
          File         string   `json:"file,omitempty"`
          TestCoverage string   `json:"test_coverage,omitempty"`
          Completeness float64  `json:"completeness"`
          Missing      []string `json:"missing,omitempty"`
      }
    location: "pkg/suitability/types.go"

  - name: "RenameTracking"
    description: "Extension to DepGraph for cascade detection with type renames"
    definition: |
      type RenameInfo struct {
          Old   string `json:"old"`
          New   string `json:"new"`
          Scope string `json:"scope"`
      }

      type CascadeResult struct {
          CascadeCandidates []CascadeCandidate `json:"cascade_candidates"`
      }

      type CascadeCandidate struct {
          File         string `json:"file"`
          Line         int    `json:"line"`
          Match        string `json:"match"`
          CascadeType  string `json:"cascade_type"` // "syntax" | "semantic"
          Severity     string `json:"severity"`     // "high" | "medium" | "low"
          Reason       string `json:"reason"`
      }
