interface_contracts:
    - name: inject-agent-context new interface
      description: |
        The refactored inject-agent-context script replaces YAML frontmatter parsing
        with direct conditional logic. Same CLI interface (--type, --prompt), same
        output format (injection markers + file content), but no SKILL.md dependency.
      definition: |
        #!/usr/bin/env bash
        # Arguments: --type <agent-type> --prompt <prompt-text>
        # Output: concatenated reference file contents with injection markers
        # Exit 0: success (empty output = nothing to inject)
        # Exit 1: error (--type missing)
        #
        # Conditional logic (replaces YAML parsing):
        #   scout + "--program" in prompt -> inject scout-program-contracts.md
        #   wave-agent + "baseline_verification_failed" in prompt -> inject wave-agent-build-diagnosis.md
        #   wave-agent + "frozen_contracts" in prompt -> inject wave-agent-program-contracts.md
        #   All other agent types -> no injection (empty output)
      location: implementations/claude-code/prompts/scripts/inject-agent-context
    - name: inject-context new interface
      description: |
        The refactored inject-context script replaces YAML frontmatter parsing
        with direct conditional logic for 2 orchestrator triggers. Same CLI
        interface (prompt as $1 or stdin), same output format.
      definition: |
        #!/usr/bin/env bash
        # Arguments: prompt text as $1 or stdin
        # Output: concatenated reference file contents with injection markers
