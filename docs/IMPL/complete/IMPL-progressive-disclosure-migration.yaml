                   inject_content=$("$inject_script" --type scout --prompt "$prompt" 2>/dev/null) || true
                 fi

                 # Emit updatedInput if content was injected or description was fixed
                 if [[ -n "$inject_content" || "$fixed_description" != "$description" ]]; then
                   jq -n --arg inject "$inject_content" --arg orig "$prompt" --arg desc "$fixed_description" --argjson orig_input "$tool_input" \
                     '{"hookSpecificOutput": {"hookEventName": "PreToolUse", "permissionDecision": "allow", "updatedInput": ($orig_input | .prompt = (if $inject != "" then ($inject + "\n\n" + $orig) else $orig end) | .description = $desc)}}'
                   exit 0
                 fi
                 exit 0
               fi
