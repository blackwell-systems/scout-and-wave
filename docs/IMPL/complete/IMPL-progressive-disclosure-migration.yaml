          task: |
            ## What to Implement

            Refactor TWO scripts to replace YAML frontmatter parsing with direct conditional logic.
            Also update comment headers in 3 conditional reference files.

            ### Script 1: inject-agent-context

            Rewrite `implementations/claude-code/prompts/scripts/inject-agent-context` (currently
            116 lines) to ~40-50 lines. Replace the awk-based YAML frontmatter parser (lines 56-83)
            and generic entry-matching loop (lines 88-114) with direct case/if logic.

            New logic:
            ```bash
            #!/usr/bin/env bash
            # inject-agent-context -- conditional agent reference injection
            #
            # Injects conditional reference files based on agent type and prompt content.
            # Always-needed references are inlined in agent definitions (agents/*.md).
            # This script handles only the 3 conditional references.
            #
            # Usage: inject-agent-context --type <agent-type> --prompt <prompt-text>

            set -euo pipefail

            agent_type=""
            prompt=""
            while [[ $# -gt 0 ]]; do
              case $1 in
                --type)   agent_type="$2"; shift 2 ;;
                --prompt) prompt="$2";     shift 2 ;;
                *)        shift ;;
              esac
            done

            [[ -z "$agent_type" ]] && { echo "error: --type is required" >&2; exit 1; }

            SKILL_DIR="${CLAUDE_SKILL_DIR:-$(cd "$(dirname "$0")/.." && pwd)}"

            inject_file() {
              local file="$1"
              local ref_path="${SKILL_DIR}/${file}"
              local marker="<!-- injected: ${file} -->"
              # Dedup: skip if marker already in prompt
              echo "$prompt" | grep -qF "$marker" && return 0
              [[ -f "$ref_path" ]] || { echo "warn: not found: ${ref_path}" >&2; return 0; }
              printf '%s\n' "$marker"
              command cat "$ref_path"
              printf '\n\n'
            }

            case "$agent_type" in
              scout)
                if [[ "$prompt" =~ --program ]]; then
                  inject_file "references/scout-program-contracts.md"
                fi
                ;;
              wave-agent)
                if [[ "$prompt" =~ baseline_verification_failed ]]; then
                  inject_file "references/wave-agent-build-diagnosis.md"
                fi
                if [[ "$prompt" =~ frozen_contracts ]]; then
                  inject_file "references/wave-agent-program-contracts.md"
                fi
                ;;
              # critic-agent, planner, integration-agent: no conditional references
              # All content inlined in agent definitions
            esac
            ```

            ### Script 2: inject-context

            Rewrite `implementations/claude-code/prompts/scripts/inject-context` (currently 85 lines)
            to ~40 lines. Replace the awk-based YAML frontmatter parser (lines 38-59) and generic
            trigger-matching loop (lines 62-79) with direct conditional logic.

            New logic:
            ```bash
            #!/usr/bin/env bash
            # inject-context -- orchestrator-level context injection for SAW skill
            #
            # Matches user prompt against orchestrator trigger patterns and outputs
            # reference file contents. Called by inject_skill_context hook.
            #
            # Usage: scripts/inject-context "user prompt text"

            set -euo pipefail

            PROMPT="${1:-$(cat)}"
            [[ -z "$PROMPT" ]] && exit 0

            SKILL_DIR="$(cd "$(dirname "$0")/.." && pwd)"

            inject_file() {
              local file="$1"
              local ref_path="${SKILL_DIR}/${file}"
              [[ -f "$ref_path" ]] || { echo "warn: not found: ${ref_path}" >&2; return 0; }
              printf '<!-- injected: %s -->\n' "$file"
              command cat "$ref_path"
              printf '\n\n'
            }

            injected=""

            if echo "$PROMPT" | grep -qE "^/saw program"; then
              injected+="$(inject_file "references/program-flow.md")"
            fi

            if echo "$PROMPT" | grep -qE "^/saw amend"; then
              injected+="$(inject_file "references/amend-flow.md")"
            fi

            [[ -n "$injected" ]] && printf '%s' "$injected"
            ```

