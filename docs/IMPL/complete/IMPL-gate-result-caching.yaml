pre_mortem:
    overall_risk: low
    rows:
        - scenario: |-
            Existing cache_test.go tests construct CacheKey literals without the new
            Command field. Go will fail to compile if the struct literal uses positional
            initialization or if named fields are checked for exhaustiveness.
          likelihood: medium
          impact: high
          mitigation: |-
            Agent A must update all existing CacheKey{} struct literals in cache_test.go
            to include Command: "" (explicit zero value). The build gate catches this
            immediately. The CacheKey change is additive; callers using named fields
            require only the new field added, not all literals rewritten.
        - scenario: |-
            Existing entries in .saw-state/gate-cache.json (live in the repo) were
            written with the old 3-field key hash. After the Command field is added,
            all existing entries become orphaned (new hash never matches old hash).
            This is not a correctness bug but will cause a cold-cache restart on next
            gate run.
          likelihood: high
          impact: low
          mitigation: |-
            This is acceptable by design — stale entries are treated as cache misses
            and re-populated. Document in the protocol rule (E38) that adding or
            changing gate commands invalidates all prior cache entries. No migration
            needed.
        - scenario: |-
            Agent A moves BuildKey() call inside the gate loop (one BuildKey call per
            gate instead of one per RunGatesWithCache invocation). For large manifests
            with many gates, this adds N git subprocess calls where there was previously
            1. If BuildKeyForGate calls BuildKey internally for each gate, performance
            regresses.
          likelihood: medium
          impact: medium
          mitigation: |-
            Agent A should cache the repo-state portion of the key (headCommit,
            stagedStat, unstagedStat) once per RunGatesWithCache invocation by calling
            BuildKey once at the top, then constructing per-gate CacheKey structs by
            appending the Command field — no need for N BuildKey calls. The interface
            contract specifies BuildKeyForGate as a thin wrapper; the gate loop
            implementation should call BuildKey once and set Command per iteration.
        - scenario: |-
            wave_runner.go (Agent C, scout-and-wave-web) publishes gate results in
            two different places (finalize bridge path and direct StepRunGates path).
            Agent C misses one location, causing inconsistent UI behavior.
          likelihood: medium
          impact: low
          mitigation: |-
            Agent C prompt explicitly calls out both locations (~line 265 finalize path
            and ~line 467-492 StepRunGates path). Agent must grep for all
            publish("quality_gate_result" occurrences and add gate_cache_hit beside
            each one.
