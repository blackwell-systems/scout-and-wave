interface_contracts:
    - name: CacheKey
      description: |-
        Cache key struct extended with Command field so each gate command string participates
        in cache key hashing. Changing a gate's command string (e.g. adding a flag) will
        produce a different hash and trigger a cache miss, preventing stale hits.
      definition: |
        // CacheKey uniquely identifies a snapshot of a gate run.
        // HeadCommit + StagedStat + UnstagedStat capture repository state.
        // Command is the gate command string; it ensures that changing the command
        // (e.g. "go test ./..." -> "go test -count=1 ./...") invalidates the cache.
        type CacheKey struct {
            HeadCommit   string `json:"head_commit"`
            StagedStat   string `json:"staged_stat"`
            UnstagedStat string `json:"unstaged_stat"`
            Command      string `json:"command"`
        }
      location: pkg/gatecache/cache.go
    - name: hashKey
      description: |-
        Updated hash function that incorporates the Command field into the MD5 digest.
        All four fields are null-byte separated before hashing.
      definition: |
        func hashKey(key CacheKey) string {
            h := md5.New()
            _, _ = fmt.Fprintf(h, "%s\x00%s\x00%s\x00%s",
                key.HeadCommit, key.StagedStat, key.UnstagedStat, key.Command)
            return fmt.Sprintf("%x", h.Sum(nil))
        }
      location: pkg/gatecache/cache.go
    - name: Cache.BuildKeyForGate
      description: |-
        New method that builds a CacheKey for a specific gate command. This replaces
        direct use of BuildKey() in RunGatesWithCache — callers pass the gate command
        so it is included in the key. BuildKey() (no gate command) remains for
        backward compatibility but is no longer used by the gate runner.
      definition: |
        // BuildKeyForGate computes a CacheKey for the repository at repoDir
        // combined with the given gate command string.
        func (c *Cache) BuildKeyForGate(repoDir string, command string) (CacheKey, error)
      location: pkg/gatecache/cache.go
    - name: RunGatesWithCache cache-hit log message
      description: |-
        When a cache hit occurs in RunGatesWithCache, emit a human-readable message
        to stderr so orchestrators and agents can see that a gate was skipped.
        Format: "gate [TYPE]: skipped (cached at SHA <headCommit>)\n"
        The message must be written to os.Stderr (not included in GateResult.Stdout/Stderr
        to avoid polluting structured output). SkipReason on GateResult is also set.
      definition: |
        // In RunGatesWithCache, when cache.Get returns a hit:
        fmt.Fprintf(os.Stderr, "gate [%s]: skipped (cached at SHA %s)\n",
            gate.Type, cacheKey.HeadCommit)
        // And set on the returned GateResult:
        result.SkipReason = fmt.Sprintf("cached at SHA %s", cacheKey.HeadCommit)
      location: pkg/protocol/gates.go
    - name: E38 protocol rule
      description: |-
        New execution rule E38 documents the gate result caching behavior:
        cache key scheme, TTL, --no-cache opt-out, gitignore requirement,
        and the "skipped (cached)" log format.
      definition: |
        ## E38: Gate Result Caching

        **Trigger:** `run-gates` or `finalize-wave` runs quality gates with caching
        enabled (the default; opt out with --no-cache on run-gates).

        **Cache key:** Each gate result is keyed on sha256(headCommit + stagedStat +
        unstagedStat + gateCommand). Changing any component — including the gate
        command string — produces a cache miss.

        **Cache hit behavior:** When a valid (non-expired) cached result exists, the
        gate is skipped and the result is returned immediately. A message is emitted
        to stderr: "gate [TYPE]: skipped (cached at SHA <headCommit>)". GateResult
        has FromCache=true and SkipReason set.

        **Cache miss behavior:** The gate runs normally and the result is stored for
        future runs. Transparent to the caller.

        **TTL:** Default 5 minutes. Cache entries older than the TTL are treated as
        misses.

        **Storage:** .saw-state/gate-cache.json (runtime artifact, must be gitignored).

        **Opt-out:** Pass --no-cache to sawtools run-gates to bypass caching entirely.
        finalize-wave always uses caching for pre-merge gates; post-merge gates always
        run fresh (RunPostMergeGates never uses cache).
      location: protocol/execution-rules.md
    - name: gate_cache_hit SSE event
      description: |-
        When quality_gate_result has from_cache=true, the web wave_runner also emits
        a separate gate_cache_hit event for UI components that want to display a
        distinct "skipped (cached)" indicator without parsing from_cache on every
        quality_gate_result event.
      definition: |
        // In wave_runner.go, after publishing quality_gate_result:
        if gate.FromCache {
            publish("gate_cache_hit", map[string]interface{}{
                "gate_type":  gate.Type,
                "command":    gate.Command,
                "sha":        gate.SkipReason, // "cached at SHA <sha>"
                "wave":       waveNum,
            })
        }
      location: pkg/api/wave_runner.go
waves:
    - number: 1
      agents:
        - id: A
          task: |-
            ## Agent A — Gate Cache Key Enhancement + Logging + Gitignore

            ### Context
            The gate result caching infrastructure already exists and is fully wired:
            - pkg/gatecache/cache.go — Cache struct with BuildKey/Get/Put/Invalidate
            - pkg/protocol/gates.go — RunGatesWithCache uses the cache
            - cmd/saw/run_gates_cmd.go — --no-cache flag already present

            What is missing:
            1. The gate command string is not part of the cache key. Two gates with the
               same type label ("build") but different commands ("go build ./..." vs
               "go build -race ./...") will incorrectly share a cache entry.
            2. No human-readable "skipped (cached)" log message is emitted to stderr
               when a cache hit occurs.
            3. .saw-state/gate-cache.json is not gitignored.

            ### Files to modify
            - pkg/gatecache/cache.go (repo: scout-and-wave-go)
            - pkg/gatecache/cache_test.go (repo: scout-and-wave-go)
            - pkg/protocol/gates.go (repo: scout-and-wave-go)
            - .gitignore (repo: scout-and-wave-go)

            ### What to implement

            **1. Extend CacheKey with Command field (cache.go)**

            Add a Command string field to CacheKey:

            ```go
            type CacheKey struct {
                HeadCommit   string `json:"head_commit"`
                StagedStat   string `json:"staged_stat"`
                UnstagedStat string `json:"unstaged_stat"`
                Command      string `json:"command"`   // NEW: gate command string
            }
            ```

            Update hashKey() to include Command in the digest (null-byte separated):

            ```go
            func hashKey(key CacheKey) string {
                h := md5.New()
                _, _ = fmt.Fprintf(h, "%s\x00%s\x00%s\x00%s",
                    key.HeadCommit, key.StagedStat, key.UnstagedStat, key.Command)
                return fmt.Sprintf("%x", h.Sum(nil))
            }
            ```

            Add BuildKeyForGate method that wraps BuildKey and sets Command:

            ```go
            // BuildKeyForGate computes a CacheKey for the repository at repoDir
            // combined with the given gate command string.
            func (c *Cache) BuildKeyForGate(repoDir string, command string) (CacheKey, error) {
                key, err := c.BuildKey(repoDir)
                if err != nil {
                    return CacheKey{}, err
                }
                key.Command = command
                return key, nil
            }
            ```

            Note: BuildKey() still exists unchanged for callers that do not yet pass
            a command. Its Command field will be empty string, which is a valid (if
            less discriminating) key.

            **2. Update RunGatesWithCache to use per-gate keys (gates.go)**

            Currently, RunGatesWithCache calls cache.BuildKey once before the loop and
            uses the same key for all gates. Change it to call BuildKeyForGate inside
            the loop per gate command:

            ```go
            for _, gate := range manifest.QualityGates.Gates {
                // ... (existing repo filter and docsOnly skip) ...

                // Build per-gate key including the command string
                cacheKey, err := cache.BuildKeyForGate(repoDir, gate.Command)
                if err != nil {
                    // Fall back to running the gate without cache
                    // (run it normally and skip caching for this gate)
                    // ... existing RunGates logic for this gate ...
                    continue
                }

                // Check cache
                if cached, ok := cache.Get(cacheKey, gate.Type); ok {
                    fmt.Fprintf(os.Stderr, "gate [%s]: skipped (cached at SHA %s)\n",
                        gate.Type, cacheKey.HeadCommit)
                    results = append(results, GateResult{
                        Type:       gate.Type,
                        Command:    gate.Command,
                        Required:   gate.Required,
                        Passed:     cached.Passed,
                        ExitCode:   cached.ExitCode,
                        Stdout:     cached.Stdout,
                        Stderr:     cached.Stderr,
                        FromCache:  true,
                        SkipReason: fmt.Sprintf("cached at SHA %s", cacheKey.HeadCommit),
                    })
                    continue
                }
                // ... rest of existing miss path unchanged ...
            }
            ```

            Add `"os"` to imports in gates.go if not already present.

            **3. Update .gitignore (scout-and-wave-go repo)**

            Append the following line to .gitignore:
            ```
            .saw-state/gate-cache.json
            ```

            **4. Update tests (cache_test.go)**

            Update existing tests that construct CacheKey literals — add `Command: ""` to
            preserve backward compatibility (empty command is valid). Add new tests:

            - TestCache_CommandDifferentiation: same HeadCommit+staged+unstaged but
              different Command strings should produce different cache keys (different
              entries, not sharing results).
            - TestBuildKeyForGate: verifies BuildKeyForGate sets the Command field and
              that two calls with different commands produce different hashKey outputs.
            - TestRunGatesWithCache_CommandChange: integration test in pkg/protocol
              (add to the existing gates test file) — run a gate, cache it, then run
              again with a modified command string, verify it is NOT served from cache.

            ### Constraints
            - Do NOT remove BuildKey() — it is public API used by existing callers.
            - BuildKeyForGate is additive; do not break existing cache_test.go tests.
            - The "skipped (cached)" message goes to os.Stderr only, not GateResult output
              fields (to avoid polluting JSON output consumed by callers).
            - Existing cache entries in .saw-state/gate-cache.json will become stale
              (they lack the Command field in their key hash). This is acceptable — they
              will be treated as misses on next run and re-populated.

            ### Verification gate
            ```
            go build ./...
            go vet ./...
            go test ./pkg/gatecache/... ./pkg/protocol/... -v -run TestCache
            ```
          files:
            - pkg/gatecache/cache.go
            - pkg/gatecache/cache_test.go
            - pkg/protocol/gates.go
            - .gitignore
        - id: B
          task: |-
            ## Agent B — Protocol Rule E38: Gate Result Caching

            ### Context
            Gate result caching is implemented in the Go engine (pkg/gatecache/cache.go,
            pkg/protocol/gates.go). The protocol documentation does not yet have a rule
            documenting this behavior. Add E38 to execution-rules.md.

            ### File to modify
            - protocol/execution-rules.md (repo: scout-and-wave)

            ### What to implement

            Append rule E38 after the existing E37 rule at the end of the file.
            Follow the established rule format used by E21, E21A, E21B:

            ```markdown
            ## E38: Gate Result Caching

            **Trigger:** `run-gates` or `finalize-wave` runs quality gates with caching
            enabled (the default). Opt out with `--no-cache` on `run-gates`.

            **Required Action:** For each quality gate in the manifest:

            1. Compute a cache key: `hash(headCommit + stagedDiffStat + unstagedDiffStat + gateCommand)`.
               The gate command string is part of the key, so changing a gate's command
               (e.g. adding a flag) automatically invalidates its cached result.

            2. Check `.saw-state/gate-cache.json` for a non-expired entry matching the key.

            3. **Cache hit:** Return the cached result immediately without re-executing the
               gate. Emit to stderr: `gate [TYPE]: skipped (cached at SHA <headCommit>)`.
               Set `from_cache: true` and `skip_reason: "cached at SHA <sha>"` in the
               GateResult.

            4. **Cache miss:** Execute the gate command normally. Store the result in the
               cache under the computed key with a timestamp.

            **TTL:** Cached entries expire after 5 minutes. Expired entries are treated
            as misses and re-executed.

            **Storage:** `.saw-state/gate-cache.json` — a runtime artifact. This file
            MUST be listed in `.gitignore` and is not committed to version control.

            **Opt-out:** Pass `--no-cache` to `sawtools run-gates` to bypass caching
            entirely for that invocation. `finalize-wave` always uses caching for
            pre-merge gates (steps 3, 3.5). Post-merge gates (step 5.5) always execute
            fresh via `RunPostMergeGates`, which never consults the cache.

            **Rationale:** Quality gate commands on large projects (full test suites,
            slow linters) can take minutes per run. When the underlying codebase has not
            changed between invocations — same HEAD commit, no staged/unstaged changes,
            same command — re-execution produces identical output. Caching eliminates
            this redundant work at wave boundaries, especially during iterative
            development where gates are run multiple times before merge.

            **Related Rules:** See E21 (post-wave verification gates), E21A (pre-wave
            baseline), E21B (parallel gate execution).
            ```

            ### Constraints
            - Append after E37, not inline — do not renumber any existing rules.
            - Use the exact section header format `## E38: Gate Result Caching`.
            - Do not modify any existing rule text.

            ### Verification gate
            ```
            grep -n "E38" /path/to/protocol/execution-rules.md
            ```
            (Verify the rule header appears once at the end of the file.)
          files:
            - protocol/execution-rules.md
        - id: C
          task: |-
            ## Agent C — Web SSE gate_cache_hit Event

            ### Context
            The web wave runner (pkg/api/wave_runner.go in scout-and-wave-web) already
            calls RunGatesWithCache and publishes quality_gate_result events for each
            gate. When a gate is served from cache, GateResult.FromCache is true.
            Currently, the UI must inspect every quality_gate_result event's from_cache
            field to detect cache hits. Adding a distinct gate_cache_hit event allows
            UI components to show a "skipped (cached)" indicator without parsing all
            gate results.

            ### File to modify
            - pkg/api/wave_runner.go (repo: scout-and-wave-web)

            ### What to implement

            Find the loop in wave_runner.go that publishes quality_gate_result events
            for finalize wave results (around line 265, inside the wave merge handler):

            ```go
            for _, gate := range finalizeResult.GateResults {
                publish("quality_gate_result", gate)
            }
            ```

            The gate result is a map (map[string][]protocol.GateResult keyed by repo).
            The actual iteration may be over a map value ([]protocol.GateResult). Extend
            the existing gate publishing loop to also emit gate_cache_hit when applicable:

            ```go
            for _, gate := range gateSlice {
                publish("quality_gate_result", gate)
                if gate.FromCache {
                    publish("gate_cache_hit", map[string]interface{}{
                        "gate_type": gate.Type,
                        "command":   gate.Command,
                        "wave":      waveNum,
                        "sha":       gate.SkipReason, // "cached at SHA <sha>"
                    })
                }
            }
            ```

            Also find the StepRunGates section (around line 467-492) which calls
            RunGatesWithCache and publishes results directly. Add the same cache hit
            event emission there:

            ```go
            for _, gate := range gateResults {
                if gate.Required && !gate.Passed {
                    // existing failure handling
                }
            }
            // After the required-gate failure check, also emit cache hit events:
            for _, gate := range gateResults {
                publish("quality_gate_result", gate)
                if gate.FromCache {
                    publish("gate_cache_hit", map[string]interface{}{
                        "gate_type": gate.Type,
                        "command":   gate.Command,
                        "wave":      waveNum,
                        "sha":       gate.SkipReason,
                    })
                }
            }
            ```

            Verify the exact line structure by reading the file before patching —
            the above is approximate; adjust to match actual variable names and
            control flow at those locations.

            ### Constraints
            - Do not change any existing publish("quality_gate_result", ...) calls —
              only ADD the new conditional gate_cache_hit emission.
            - gate_cache_hit is informational only; never block or error on it.
            - The sha field will be empty string if SkipReason is not set (Agent A
              populates it); guard with a check: only emit gate_cache_hit if
              gate.FromCache is true, regardless of SkipReason content.

            ### Verification gate
            ```
            go build ./...
            go vet ./...
            ```
            (Full tests require the web server running; CLI build verification is sufficient.)
          files:
            - pkg/api/wave_runner.go
