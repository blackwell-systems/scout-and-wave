          task: |
            ## What to implement

            Make the FileOwnershipTable and useFileActivity work in "static" mode when
            rendering from IMPL doc data (no live SSE stream), and add a fetchPipelineState
            API method to allow on-demand pipeline state refresh.

            ## Files to modify

            1. **web/src/components/FileOwnershipTable.tsx** — The `liveStatus` prop
               is already optional (`liveStatus?: Map<string, FileActivityEntry>` at
               line 20) and the component already hides the Status column when
               `liveStatus` is undefined (via `hasStatus` guard at line 109).
               No prop type changes needed.

               Add a visual distinction for static/plan data: when liveStatus is
               undefined and the table is rendering from plan data (passed via a new
               `isStatic?: boolean` prop), show a subtle "from plan" badge or muted
               styling to indicate this is plan data, not live data.

            2. **web/src/hooks/useFileActivity.ts** — Handle empty/null input gracefully:

               The hook derives file activity from SSE-driven agent state. When called with
               agents that have no running status (all from disk seeding), it should return
               an empty map without errors. Verify the hook handles this case. If it throws
               or returns incorrect data when all agents are 'complete' or 'pending', fix it.

               Add a new export:
               ```typescript
               export function useStaticFileOwnership(
                 fileOwnership: FileOwnershipEntry[] | undefined
               ): Map<string, { agent: string; status: string }> {
                 // Convert IMPL file_ownership entries to the same shape as liveStatus
                 // but with status = 'planned' (not live)
                 return useMemo(() => {
                   const map = new Map<string, { agent: string; status: string }>()
                   if (!fileOwnership) return map
                   for (const fo of fileOwnership) {
                     map.set(fo.file, { agent: fo.agent, status: 'planned' })
                   }
                   return map
                 }, [fileOwnership])
               }
               ```

            ## Interface contracts

            - FileOwnershipTable: add `isStatic?: boolean` prop for plan-data styling
            - useStaticFileOwnership: new export, same shape as useFileActivity return type

