               Include these in the returned state object.

            3. **web/src/hooks/useWaveEvents.ts** — Pass enriched data through dispatch:

               In the fetchDiskWaveStatus .then() callback (line ~37), add the new fields
               to the SEED_DISK_STATUS dispatch:
               ```typescript
               dispatch({
                 type: 'SEED_DISK_STATUS',
                 agents,
                 waves,
                 scaffoldStatus,
                 hasScaffolds: disk.scaffold_status !== 'none',
                 mergedWaves,
                 pipelineSteps: disk.pipeline_steps,
                 runFailed: disk.run_failed,
                 runComplete: disk.run_complete,
               })
               ```

            ## Interface contracts

            - DiskWaveStatus TypeScript type gains 4 optional fields (backward compatible)
            - SEED_DISK_STATUS action type gains 3 optional fields
            - waveEventsReducer seeds pipelineSteps, runFailed, runComplete from disk

