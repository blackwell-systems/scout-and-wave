pre_mortem:
    overall_risk: low
    rows:
        - scenario: Disk-status endpoint returns stale pipeline state after server restart
          likelihood: low
          impact: low
          mitigation: |
            Pipeline state files persist in .saw-state/ and survive server restarts.
            The pipelineTracker.Read() method reads from disk, not memory.
        - scenario: Race between disk seeding and SSE events causes duplicate agents
          likelihood: medium
          impact: low
          mitigation: |
            The existing SEED_DISK_STATUS reducer already handles this race with the
            liveKeys dedup pattern (lines 176-182 of waveEventsReducer.ts). The same
            pattern applies to the new fields.
        - scenario: Large completion reports slow down disk-status endpoint
          likelihood: low
          impact: low
          mitigation: |
            Completion reports are typically <1KB per agent. The endpoint already loads
            the full manifest. Adding completion_info is marginal overhead.
        - scenario: Frontend tests fail due to missing mock data for new fields
          likelihood: medium
          impact: medium
          mitigation: |
            All new fields are optional (?). Existing mocks will work without changes.
            New tests should mock the enriched response shape.
