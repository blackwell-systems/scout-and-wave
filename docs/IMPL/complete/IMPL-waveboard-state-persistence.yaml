waves:
    - number: 1
      agents:
        - id: A
          task: |
            ## What to implement

            Enrich the GET /api/wave/{slug}/disk-status endpoint to include pipeline step
            state, run completion/failure status, and per-agent completion report details.
            This data enables the frontend to fully reconstruct WaveBoard state on mount.

            ## Files to modify

            1. **pkg/api/wave_status_disk.go** — Expand DiskWaveStatus struct and handler:

               Add these fields to `DiskWaveStatus`:
               - `PipelineSteps map[string]StepStateJSON` — read from defaultPipelineTracker.Read(slug)
               - `RunFailed string` — if the IMPL's state indicates a failed run (check for
                 incomplete waves where agents have failure status in completion reports)
               - `RunComplete bool` — true when all waves have all agents complete AND all
                 waves are merged (waves_merged covers all wave numbers)
               - `CompletionInfo map[string]AgentCompletionInfo` — per-agent details from
                 completion reports: status, commit, files_changed, verification notes

               Add helper structs:
               ```go
               type StepStateJSON struct {
                   Status string `json:"status"`
                   Error  string `json:"error,omitempty"`
               }

               type AgentCompletionInfo struct {
                   Status       string   `json:"status"`
                   Commit       string   `json:"commit,omitempty"`
                   FilesChanged []string `json:"files_changed,omitempty"`
                   Verification string   `json:"verification,omitempty"`
               }
               ```

               In handleWaveDiskStatus, after the existing agent loop:
               - Read pipeline state: `if defaultPipelineTracker != nil { state := defaultPipelineTracker.Read(slug); ... }`
               - Convert PipelineState.Steps to map[string]StepStateJSON
               - Populate CompletionInfo from manifest.CompletionReports
               - Set RunComplete = true when len(result.WavesMerged) == len(manifest.Waves) && all agents complete
               - Set RunFailed from any agent with status "blocked" or "failed" in completion reports,
                 or if pipeline state has a failed step

            2. **pkg/api/wave_status_disk_test.go** — Add tests:
               - Test that pipeline_steps is populated when pipelineTracker has state
               - Test that completion_info is populated from manifest completion reports
               - Test that run_complete is true when all waves merged
               - Test that run_failed is set when an agent has failed status

            ## Interface contracts

            The DiskWaveStatus struct gains 4 new JSON fields. All are omitempty so existing
            consumers are not affected. The frontend will read these new fields in wave 2.

            ## Verification gate

            ```
            go test ./pkg/api/ -run TestDiskStatus -v
            go vet ./pkg/api/
            ```

            ## Constraints

            - Do not change the function signature of handleWaveDiskStatus
            - All new fields must be `omitempty` for backward compatibility
            - Access defaultPipelineTracker with nil-check (it may be nil in tests)
            - Use the existing protocol.Load and manifest.CompletionReports patterns
          files:
            - pkg/api/wave_status_disk.go
            - pkg/api/wave_status_disk_test.go
        - id: B
          task: |
            ## What to implement

            Update the frontend state layer to consume enriched disk-status data and
            seed WaveBoard state (pipeline steps, run state) from disk on mount.

            ## Files to modify

            1. **web/src/lib/apiClient.ts** — Expand the DiskWaveStatus TypeScript type:

