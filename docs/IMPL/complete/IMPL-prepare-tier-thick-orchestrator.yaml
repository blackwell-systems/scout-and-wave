pre_mortem:
    overall_risk: medium
    rows:
        - scenario: |-
            IMPL-prepare-wave-program-context is not yet merged when this IMPL is waved.
            Agent A (and then Agent B) will find CommitState absent in PrepareWaveOpts
            and fail to compile.
          likelihood: high
          impact: high
          mitigation: |-
            Wave IMPL-prepare-wave-program-context first. Both agents have a precondition
            check (grep for CommitState) that surfaces this clearly before they write any
            code. If CommitState is absent, the agent STOPs and reports a blocker rather
            than producing broken code.
        - scenario: |-
            Circular import: pkg/protocol imports pkg/engine. This would cause a compile
            failure since engine imports protocol.
          likelihood: medium
          impact: high
          mitigation: |-
            Agent A's prompt explicitly prohibits importing pkg/engine from pkg/protocol
            and instructs the agent to verify with go build ./... before finishing.
            The prepare-wave loop is explicitly placed in the CLI adapter (Agent B),
            not in the protocol layer. Both agents have this constraint documented.
        - scenario: |-
            The tier slug list needed for the prepare-wave loop is not easily accessible
            after PrepareTier returns — Agent B must re-parse the program manifest to get
            the ordered slug list.
          likelihood: low
          impact: low
          mitigation: |-
            Agent B's prompt explicitly instructs parsing the program manifest a second
            time (ParseProgramManifest) after PrepareTier returns to get the tier.Impls
            slice. This is a read-only parse, not a write, so it is safe and cheap.
        - scenario: |-
            protocol.ResolveIMPLPath does not exist or has a different signature than
            expected. Agent B references it in the loop.
          likelihood: low
          impact: medium
          mitigation: |-
            Agent B's constraints section instructs the agent to grep for ResolveIMPLPath
            in pkg/protocol before using it. If absent, the agent must find the correct
            path-resolution function (e.g., manual path construction matching the existing
            pattern in program_tier_prepare.go).
        - scenario: |-
            The second prepare-wave call still fails with "working directory is dirty"
            if CommitState logic in prepare.go does not correctly identify the IMPL yaml
            as SAW-owned (e.g., absolute vs relative path mismatch).
          likelihood: low
          impact: medium
