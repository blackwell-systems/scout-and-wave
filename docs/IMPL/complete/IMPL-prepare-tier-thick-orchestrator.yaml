title: 'prepare-tier: absorb prepare-wave calls as thick orchestrator'
feature_slug: prepare-tier-thick-orchestrator
verdict: SUITABLE
suitability_assessment: |-
    The feature touches 3 files across 2 layers (protocol + cmd). File ownership
    is cleanly disjoint: Agent A owns the protocol layer (program_tier_prepare.go),
    and Agent B owns the CLI adapter (prepare_tier_cmd.go). The engine layer
    (step_types.go + prepare.go) is owned by the sibling IMPL
    prepare-wave-program-context, which must be waved FIRST. This IMPL depends on
    CommitState bool in PrepareWaveOpts being present before it can call engine.PrepareWave
    with commit-state semantics.

    SEQUENCING DEPENDENCY: IMPL-prepare-wave-program-context (SCOUT_PENDING in
    /Users/dayna.blackwell/code/scout-and-wave/docs/IMPL/IMPL-prepare-wave-program-context.yaml)
    must be waved before this IMPL. That IMPL adds CommitState bool to PrepareWaveOpts
    and the isSAWOwnedPath/commit-state logic in prepare.go. This IMPL calls
    engine.PrepareWave with CommitState: true to absorb the per-IMPL prepare-wave
    calls inside prepare-tier.

    Wave structure: 2 waves, 2 agents. Agent A (wave 1) is the protocol-layer work —
    add PrepareWave calls + new result fields to PrepareTier. Agent B (wave 2) wires
    the new result fields to the CLI output.

    Parallelization value: marginal (2 agents, sequential dependency), but the IMPL
    doc provides interface contracts preventing field-name drift between layers.

    Estimated times:
    - Scout phase: ~15 min
    - Agent execution: ~20 min (agent A ~12 min, agent B ~8 min, sequential)
    - Merge and verification: ~5 min
    Total SAW time: ~40 min

    Sequential baseline: ~30 min
    Time savings: marginal. Coordination value (interface contract) is primary benefit.

    Precondition: wave IMPL-prepare-wave-program-context before launching this IMPL.
