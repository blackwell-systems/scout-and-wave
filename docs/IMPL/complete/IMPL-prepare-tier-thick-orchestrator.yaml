interface_contracts:
    - name: PrepareTierOpts.RunPrepareWave
      description: |-
        New boolean field on PrepareTierOpts. When true, PrepareTier calls
        engine.PrepareWave (with CommitState: true) for each IMPL in the tier after
        the existing conflict-check + validate + worktree-create steps. Requires
        prepare-wave-program-context IMPL to be merged first (adds CommitState to
        PrepareWaveOpts).
      definition: |
        // RunPrepareWave controls whether PrepareTier absorbs prepare-wave calls
        // for each IMPL in the tier after worktree creation. When true, it calls
        // engine.PrepareWave with CommitState: true so SAW-owned state changes are
        // auto-committed between IMPL preparations. User code changes still fail fast.
        RunPrepareWave bool
      location: pkg/protocol/program_tier_prepare.go
    - name: IMPLPrepareWaveResult
      description: |-
        New struct capturing the result of prepare-wave for a single IMPL in the
        tier. Embedded in PrepareTierResult.PrepareWaveResults slice. Contains the
        IMPL slug, success flag, worktrees, agent briefs, and any error message.
        Mirrors relevant fields from engine.PrepareWaveResult to avoid a circular
        import (protocol imports engine is not allowed; engine imports protocol).
        The CLI adapter maps engine.PrepareWaveResult → IMPLPrepareWaveResult.
      definition: |
        // IMPLPrepareWaveResult is the per-IMPL result of a prepare-wave call
        // made by PrepareTier when RunPrepareWave is true.
        type IMPLPrepareWaveResult struct {
            ImplSlug    string                  `json:"impl_slug"`
            Success     bool                    `json:"success"`
            Worktrees   []protocol.WorktreeInfo `json:"worktrees"`
            AgentBriefs []engine.AgentBriefInfo `json:"agent_briefs"`
            Error       string                  `json:"error,omitempty"`
        }
      location: pkg/protocol/program_tier_prepare.go
    - name: PrepareTierResult.PrepareWaveResults
      description: |-
        New slice field on PrepareTierResult. Present and non-nil only when
        RunPrepareWave was true. Each entry corresponds to one IMPL in the tier
        (ordered by tier.Impls order). If prepare-wave failed for an IMPL, the
        entry has Success=false and Error set; subsequent IMPLs still attempted
        (fail-all-collect pattern already used in the validation step).
      definition: |
        // PrepareWaveResults holds per-IMPL prepare-wave results when
        // PrepareTierOpts.RunPrepareWave is true. Nil when RunPrepareWave is false.
        PrepareWaveResults []IMPLPrepareWaveResult `json:"prepare_wave_results,omitempty"`
      location: pkg/protocol/program_tier_prepare.go
    - name: PrepareTierOpts.WaveNum
      description: |-
        New int field on PrepareTierOpts. Passed to engine.PrepareWave as WaveNum
        when RunPrepareWave is true. Defaults to 1 (the standard first-wave case
        for program tier execution). Must be >= 1 when RunPrepareWave is true.
      definition: |
        // WaveNum is the wave number passed to engine.PrepareWave when
        // RunPrepareWave is true. Defaults to 1.
        WaveNum int
      location: pkg/protocol/program_tier_prepare.go
    - name: PrepareTierOpts.MergeTarget
      description: |-
        New string field on PrepareTierOpts. Passed to engine.PrepareWave as
        MergeTarget when RunPrepareWave is true. Allows the caller to specify the
        baseline branch. Empty string means current HEAD (same default as prepare-wave).
      definition: |
        // MergeTarget is the baseline branch for prepare-wave calls.
        // Empty string uses current HEAD (prepare-wave default).
        MergeTarget string
      location: pkg/protocol/program_tier_prepare.go
    - name: prepare-tier --run-prepare-wave flag
      description: |-
        New CLI flag added to prepare-tier command. Maps to PrepareTierOpts.RunPrepareWave.
        When passed, prepare-tier also runs prepare-wave for each IMPL in the tier,
        outputting the full set of agent worktrees and briefs in the JSON result.
      definition: |
        --run-prepare-wave   Also run prepare-wave for each IMPL in the tier after
                             worktree creation. Auto-commits SAW state between IMPLs
                             so subsequent IMPLs do not fail with "working directory
                             is dirty". Does not commit user code changes.
      location: cmd/sawtools/prepare_tier_cmd.go
    - name: prepare-tier --wave flag
      description: |-
        New CLI flag for wave number, forwarded to engine.PrepareWave when
        --run-prepare-wave is set. Defaults to 1.
      definition: |
        --wave int   Wave number to pass to prepare-wave (default 1). Only used
                     when --run-prepare-wave is set.
      location: cmd/sawtools/prepare_tier_cmd.go
    - name: prepare-tier --merge-target flag
      description: |-
        New CLI flag for merge target branch, forwarded to engine.PrepareWave when
        --run-prepare-wave is set. Empty string uses current HEAD.
      definition: |
        --merge-target string   Baseline branch for prepare-wave calls (default: current HEAD).
                                Only used when --run-prepare-wave is set.
      location: cmd/sawtools/prepare_tier_cmd.go
waves:
    - number: 1
      agents:
        - id: A
          task: |
            ## Role
            You are a Wave Agent. Implement the protocol-layer changes for the
            `prepare-tier-thick-orchestrator` feature in the scout-and-wave-go repo.

            ## Precondition — check before writing any code
            This IMPL depends on IMPL-prepare-wave-program-context being merged first.
            That IMPL adds `CommitState bool` to `PrepareWaveOpts` in
            `pkg/engine/step_types.go`. Before writing your changes, verify that field
            exists:

            ```bash
            grep -n "CommitState" /Users/dayna.blackwell/workspace/code/scout-and-wave-go/pkg/engine/step_types.go
            ```

            If `CommitState` is absent, STOP and report this as a blocker. Do not proceed.

            ## Context
            `prepare-tier` currently stops after validating IMPLs and creating IMPL-branch
            worktrees. The orchestrator then calls `prepare-wave` for each IMPL manually.
            This causes the second `prepare-wave` call to fail with "working directory is
            dirty" because the first call advanced IMPL state and wrote the gate cache.

            The fix: add `RunPrepareWave bool` to `PrepareTierOpts`. When true, PrepareTier
            calls `engine.PrepareWave` for each IMPL in the tier (with `CommitState: true`)
            after the existing steps, collecting results. SAW-owned state changes are
            auto-committed between IMPL preparations so the next call starts clean.

            ## Package import note
            `pkg/protocol` MUST NOT import `pkg/engine` (engine imports protocol, not
            the reverse — circular import). PrepareTier already receives the engine
            call results from a different layer. To avoid the circular import, define
            `IMPLPrepareWaveResult` in `pkg/protocol/program_tier_prepare.go` using
            only protocol-level types (`protocol.WorktreeInfo`). The engine-level
            `AgentBriefInfo` struct must be mapped at the call site (CLI adapter). Read
            the import graph carefully before writing.

            CORRECTION: Since PrepareTier lives in `pkg/protocol` and engine.PrepareWave
            lives in `pkg/engine`, and `pkg/protocol` is imported BY `pkg/engine`, calling
            `engine.PrepareWave` from `pkg/protocol` creates a circular import. Therefore,
            the `RunPrepareWave` logic CANNOT live in `pkg/protocol/program_tier_prepare.go`.

            Instead: the `RunPrepareWave` logic must be lifted to the CLI adapter
            (`cmd/sawtools/prepare_tier_cmd.go`). The CLI adapter can import both
            `pkg/protocol` (for PrepareTier) and `pkg/engine` (for PrepareWave). The
            `PrepareTierResult` struct gets a new `PrepareWaveResults` field of type
            `[]IMPLPrepareWaveResult`, where `IMPLPrepareWaveResult` holds only protocol-
            level types (no engine imports needed in protocol package).

            ## Files to Modify

            ### `pkg/protocol/program_tier_prepare.go`

            **1. Add new fields to `PrepareTierOpts`:**

            After `SkipCritic bool` (line ~14), add:

            ```go
            // RunPrepareWave controls whether the caller should run prepare-wave for
            // each IMPL. When true, the CLI adapter iterates IMPLs and calls
            // engine.PrepareWave with CommitState: true between calls.
            // This field is informational for the protocol layer; actual prepare-wave
            // calls happen in the CLI adapter to avoid circular imports.
            RunPrepareWave bool
            WaveNum        int    // Wave number to pass to prepare-wave (defaults to 1)
            MergeTarget    string // Baseline branch for prepare-wave calls (empty = HEAD)
            ```

            **2. Add `IMPLPrepareWaveResult` struct** (new type, add near `IMPLValidationResult`):

            ```go
            // IMPLPrepareWaveResult captures the result of a prepare-wave call for a
            // single IMPL within a tier. Used when PrepareTierOpts.RunPrepareWave is true.
            // AgentBriefs and Worktrees use protocol-level types to avoid a circular import
            // with pkg/engine.
            type IMPLPrepareWaveResult struct {
                ImplSlug  string               `json:"impl_slug"`
                Success   bool                 `json:"success"`
                Worktrees []WorktreeInfo       `json:"worktrees"`
                Error     string               `json:"error,omitempty"`
            }
            ```

            Note: `AgentBriefInfo` is an engine type; omit it from `IMPLPrepareWaveResult`
            here. The CLI adapter (Agent B) will add agent_briefs to a separate struct or
            embed them at the CLI layer.

            **3. Add `PrepareWaveResults` field to `PrepareTierResult`:**

            After `Success bool` (line ~26), add:

            ```go
            // PrepareWaveResults holds per-IMPL prepare-wave results.
            // Non-nil only when PrepareTierOpts.RunPrepareWave is true.
            PrepareWaveResults []IMPLPrepareWaveResult `json:"prepare_wave_results,omitempty"`
            ```

            **4. No changes to the `PrepareTier` function body** — the prepare-wave loop
            lives in the CLI adapter to avoid circular imports. PrepareTier continues to
            perform steps 1–5 (conflict-check, validate, worktree create) as today.

            ## Tests

            Add tests to `pkg/protocol/program_tier_prepare_test.go`:

            1. `TestPrepareTierResult_PrepareWaveResults_JSONFields` — verify that
               `PrepareTierResult` serializes `prepare_wave_results` field correctly when
               set, and omits it when nil (omitempty). Use the existing
               `TestPrepareTierResult_JSONFields` test pattern.

            2. `TestIMPLPrepareWaveResult_JSONFields` — verify that `IMPLPrepareWaveResult`
               serializes with expected field names: `impl_slug`, `success`, `worktrees`,
               and that `error` is omitted when empty (omitempty).

            3. `TestPrepareTierOpts_NewFields` — compile-time test verifying the new
               fields exist on `PrepareTierOpts` by constructing the struct:

               ```go
               func TestPrepareTierOpts_NewFields(t *testing.T) {
                   opts := PrepareTierOpts{
                       ProgramManifestPath: "test.yaml",
                       TierNumber:          1,
                       RepoDir:             ".",
                       SkipCritic:          false,
                       RunPrepareWave:      true,
                       WaveNum:             1,
                       MergeTarget:         "main",
                   }
                   if !opts.RunPrepareWave {
                       t.Error("expected RunPrepareWave=true")
                   }
                   if opts.WaveNum != 1 {
                       t.Error("expected WaveNum=1")
                   }
               }
               ```

            ## Verification Gate
            ```
            go build ./...
            go vet ./...
            go test ./pkg/protocol/... -run "TestPrepareTier|TestIMPLPrepareWaveResult|TestPrepareTierOpts" -timeout 60s
            ```

            ## Constraints
            - Do NOT import `pkg/engine` from `pkg/protocol` — this creates a circular
              import (engine imports protocol). Verify with `go build ./...` before finishing.
            - `IMPLPrepareWaveResult` must use only types from `pkg/protocol` or stdlib.
            - Do NOT change the existing `PrepareTier` function body logic — only add
              struct fields and types. The prepare-wave loop lives in Agent B's work.
            - Follow existing Go conventions in this package: no public unexported fields,
              use `omitempty` on optional JSON fields, keep error messages lowercase.
          files:
            - pkg/protocol/program_tier_prepare.go
            - pkg/protocol/program_tier_prepare_test.go
