    - number: 2
      agents:
        - id: B
          task: |
            ## Role
            You are a Wave Agent. Implement the CLI adapter changes for the
            `prepare-tier-thick-orchestrator` feature in the scout-and-wave-go repo.

            ## Precondition — check before writing any code
            Agent A (Wave 1) has already added:
            - `PrepareTierOpts.RunPrepareWave bool` to `pkg/protocol/program_tier_prepare.go`
            - `PrepareTierOpts.WaveNum int` to `pkg/protocol/program_tier_prepare.go`
            - `PrepareTierOpts.MergeTarget string` to `pkg/protocol/program_tier_prepare.go`
            - `PrepareTierResult.PrepareWaveResults []IMPLPrepareWaveResult` to the result struct
            - `IMPLPrepareWaveResult` struct in `pkg/protocol/program_tier_prepare.go`

            Also verify that IMPL-prepare-wave-program-context is merged (CommitState field exists):
            ```bash
            grep -n "CommitState" /Users/dayna.blackwell/workspace/code/scout-and-wave-go/pkg/engine/step_types.go
            ```

            If either precondition is absent, STOP and report as a blocker.

            ## Context
            The CLI adapter `cmd/sawtools/prepare_tier_cmd.go` currently calls
            `protocol.PrepareTier(...)` and outputs JSON. This wave adds:

            1. Three new flags: `--run-prepare-wave`, `--wave`, `--merge-target`
            2. After `protocol.PrepareTier` succeeds, when `--run-prepare-wave` is set,
               call `engine.PrepareWave` for each IMPL in the tier (ordered by tier.Impls
               slug list from the program manifest) with `CommitState: true` to auto-commit
               SAW state between calls.
            3. Collect per-IMPL results into `result.PrepareWaveResults` and output the
               enriched JSON.

            ## Design: where the loop lives
            Because `pkg/protocol` cannot import `pkg/engine` (circular import), the
            prepare-wave loop runs in the CLI adapter which can freely import both packages.
            The loop:

            ```go
            if runPrepareWave {
                // Determine projectRoot the same way prepare-wave does
                waveNum := waveNumFlag
                if waveNum == 0 {
                    waveNum = 1
                }
                for _, slug := range tier.Impls {
                    implPath, resolveErr := protocol.ResolveIMPLPath(repoDir, slug)
                    if resolveErr != nil {
                        result.PrepareWaveResults = append(result.PrepareWaveResults,
                            protocol.IMPLPrepareWaveResult{
                                ImplSlug: slug,
                                Success:  false,
                                Error:    resolveErr.Error(),
                            })
                        continue
                    }
                    pwResult, pwErr := engine.PrepareWave(context.Background(), engine.PrepareWaveOpts{
                        IMPLPath:    implPath,
                        RepoPath:    projectRoot,
                        WaveNum:     waveNum,
                        MergeTarget: mergeTargetFlag,
                        CommitState: true,
                        Logger:      newSawLogger(),
                        OnEvent: func(step, status, detail string) {
                            fmt.Fprintf(os.Stderr, "prepare-tier[%s]: [%s] %s — %s\n", slug, step, status, detail)
                        },
                    })
                    entry := protocol.IMPLPrepareWaveResult{
                        ImplSlug: slug,
                    }
                    if pwErr != nil {
                        entry.Success = false
                        entry.Error = pwErr.Error()
                    } else {
                        entry.Success = pwResult.Success
                        entry.Worktrees = pwResult.Worktrees
                    }
                    result.PrepareWaveResults = append(result.PrepareWaveResults, entry)
                }
                // Mark overall success false if any prepare-wave failed
                for _, pw := range result.PrepareWaveResults {
                    if !pw.Success {
                        result.Success = false
                        break
                    }
                }
            }
            ```

            ## Files to Modify

            ### `cmd/sawtools/prepare_tier_cmd.go`

            **1. Add three new variable declarations** alongside `tierNum` and `skipCritic`:

            ```go
            var runPrepareWave bool
            var waveNumFlag   int
            var mergeTargetFlag string
            ```

            **2. Import `pkg/engine`** (add to imports block):

            ```go
            "github.com/blackwell-systems/scout-and-wave-go/pkg/engine"
            ```

            **3. Add the prepare-wave loop** after the `result, err := protocol.PrepareTier(...)`
            call succeeds and before the final JSON output. Insert the loop (shown in the
            Design section above) between the err-check and the JSON marshal block:

            ```go
            result, err := protocol.PrepareTier(protocol.PrepareTierOpts{
                ProgramManifestPath: manifestPath,
                TierNumber:          tierNum,
                RepoDir:             repoDir,
                SkipCritic:          skipCritic,
                RunPrepareWave:      runPrepareWave,
                WaveNum:             waveNumFlag,
                MergeTarget:         mergeTargetFlag,
            })
            if err != nil {
                ... (existing error handling)
            }

            // Run prepare-wave for each IMPL if requested
            if runPrepareWave && result.Success {
                ... (the loop from Design section)
            }

            out, _ := json.MarshalIndent(result, "", "  ")
            fmt.Fprintln(cmd.OutOrStdout(), string(out))
            ```

            Note: only run the prepare-wave loop when `result.Success` is true (all
            prior steps passed). If conflicts or validation failed, skip the loop.

            **4. Determine `tier` for slug iteration.** The loop needs the list of IMPL
            slugs in the tier. Parse the program manifest after PrepareTier succeeds:

            ```go
            manifest, parseErr := protocol.ParseProgramManifest(manifestPath)
            if parseErr == nil {
                for i := range manifest.Tiers {
                    if manifest.Tiers[i].Number == tierNum {
                        tier = &manifest.Tiers[i]
                        break
                    }
                }
            }
            ```

            Store the tier pointer in `var tier *protocol.ProgramTier` declared before
            RunE. Use it in the prepare-wave loop.

            **5. Determine `projectRoot`** — use the same logic as `prepare-wave`:

            ```go
            projectRoot := repoDir
            if projectRoot == "" {
                projectRoot = "."
            }
            ```

            The `repoDir` global flag is already available in `cmd/sawtools` package scope.

            **6. Register three new flags** at the bottom of `newPrepareTierCmd`, after
            the `--skip-critic` line:

            ```go
            cmd.Flags().BoolVar(&runPrepareWave, "run-prepare-wave", false,
                "Also run prepare-wave for each IMPL in the tier. Auto-commits SAW state between IMPLs.")
            cmd.Flags().IntVar(&waveNumFlag, "wave", 1,
                "Wave number to pass to prepare-wave (default 1). Only used with --run-prepare-wave.")
            cmd.Flags().StringVar(&mergeTargetFlag, "merge-target", "",
                "Baseline branch for prepare-wave calls (default: current HEAD). Only used with --run-prepare-wave.")
            ```

            **7. Update Long description** to document the new behavior. After the
            existing example lines, add:

            ```
            When --run-prepare-wave is set, prepare-tier also runs prepare-wave for
            each IMPL in the tier after worktree creation, using --commit-state
            internally to auto-commit SAW state between IMPL preparations. The JSON
            output gains a prepare_wave_results array with per-IMPL worktrees and
            success status.
            ```

            ## Tests
            No new tests required in the CLI layer. The protocol-layer tests from Agent A
            cover struct correctness. Verify the CLI compiles and the flag registration
            is correct:

            ```bash
            go build ./cmd/sawtools/...
            ./sawtools prepare-tier --help 2>&1 | grep run-prepare-wave
            ```

            (The grep should print the flag description line.)

            ## Verification Gate
            ```
            go build ./...
            go vet ./...
            go test ./cmd/sawtools/... -timeout 60s
            go test ./pkg/protocol/... -timeout 60s
            ```

            ## Constraints
            - Only run the prepare-wave loop when `result.Success == true`. If PrepareTier
              itself failed (conflicts, validation errors), skip the loop entirely.
            - Pass `CommitState: true` to every `engine.PrepareWave` call. This is the
              key fix: it auto-commits SAW state between IMPL preparaions.
            - Do NOT pass `--commit-state` as a user-facing flag on `prepare-tier`. It is
              always true when `--run-prepare-wave` is set (implementation detail, not
              user-controlled).
            - Collect all prepare-wave results even if one fails (fail-all-collect pattern,
              consistent with existing validation step).
            - Set `result.Success = false` if any prepare-wave entry has `Success=false`.
            - The prepare-wave loop uses `protocol.ResolveIMPLPath` to find each IMPL's
              path. Check that function exists: grep for it in
              `/Users/dayna.blackwell/workspace/code/scout-and-wave-go/pkg/protocol/`.
            - Do NOT use `os.Exit` — return errors through cobra's RunE error return.
          files:
            - cmd/sawtools/prepare_tier_cmd.go
          dependencies:
            - A
          context_source: prepared-brief
