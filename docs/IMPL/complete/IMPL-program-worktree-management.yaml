            ## Task: Thread merge-target into agent brief content and metadata

            ### Context
            `prepare-wave --merge-target` currently:
            - Accepts the flag (line 545, prepare_wave.go)
            - Checks out the IMPL branch before baseline quality gates (line 234-239)

            It does NOT:
            - Include the merge target in the agent brief markdown (agents don't know
              which branch to merge to)
            - Include the merge target in the AgentBriefInfo struct output (callers
              like the web app cannot read it from the JSON result)

            The protocol spec (Step 3b) says: "prepare-wave: sawtools prepare-wave <impl-doc>
            --wave W --merge-target <impl-branch>" so agents know to merge to the IMPL branch.

            ### What to implement

            **File: cmd/saw/prepare_wave.go (modify)**

            Change 1: Add `MergeTarget` field to `AgentBriefInfo` struct.
            The struct is defined starting at line 30. Add at the end:
            ```go
            type AgentBriefInfo struct {
                Agent       string `json:"agent"`
                BriefPath   string `json:"brief_path"`
                BriefLength int    `json:"brief_length"`
                JournalDir  string `json:"journal_dir"`
                FilesOwned  int    `json:"files_owned"`
                Repo        string `json:"repo,omitempty"`
                MergeTarget string `json:"merge_target,omitempty"`  // target IMPL branch for merge
            }
            ```

            Change 2: Build a mergeTargetSection before the brief Sprintf call (around line 446).
            Insert before the `brief := fmt.Sprintf(...)` call:
            ```go
            // Merge target section — included when running under /saw program execute
            var mergeTargetSection string
            if mergeTarget != "" {
                mergeTargetSection = fmt.Sprintf(
                    "\n\n## Merge Target\n\n**Merge your branch to:** `%s`\n\n"+
                    "Do NOT merge to HEAD or main. All wave commits must land on "+
                    "this IMPL branch. The finalize-tier command will merge the "+
                    "IMPL branch to main after all IMPLs in the tier complete.\n",
                    mergeTarget,
                )
            }
            ```

            Change 3: Inject mergeTargetSection into the brief template. The current
            template format string at line 447 ends with:
            ```go
            brief := fmt.Sprintf(`# Agent %s Brief - Wave %d
            ...
            %s
            %s%s%s
            `,
                agentID, waveNum, manifestPath,
                formatFileList(agentFiles),
                agentTask,
                contractsSection,   // currently first %s in final group
                wiringSection,
                gatesSection,
            )
            ```

            Add mergeTargetSection between agentTask and contractsSection:
            ```go
            brief := fmt.Sprintf(`# Agent %s Brief - Wave %d

            **IMPL Doc:** %s

            ## Files Owned

            %s

            ## Task

            %s
            %s%s%s%s
            `,
                agentID,
                waveNum,
                manifestPath,
                formatFileList(agentFiles),
                agentTask,
                mergeTargetSection,   // NEW: appears right after task
                contractsSection,
                wiringSection,
                gatesSection,
            )
            ```

            Change 4: Set MergeTarget on the AgentBriefInfo struct when recording
            agent brief info (around line 510 where agentBriefs is appended):
            ```go
            agentBriefs = append(agentBriefs, AgentBriefInfo{
                Agent:       agentID,
                BriefPath:   briefPath,
                BriefLength: len(brief),
                JournalDir:  observer.JournalDir,
                FilesOwned:  len(agentFiles),
                Repo:        agentRepoName,
                MergeTarget: mergeTarget,  // NEW: thread through to output
            })
            ```

            **File: cmd/saw/prepare_wave_test.go (modify)**

            Add tests for the merge-target brief threading. Look at existing test
            patterns in the file to match style. Add at minimum:

            1. `TestPrepareWave_MergeTargetIncludedInBrief` — when --merge-target is set,
               verify the brief content contains "## Merge Target" and the branch name.
               This requires a test that exercises the brief-building code path without
               triggering real git operations. Look at existing tests that mock or stub
               git calls, or use a test that checks the brief template logic directly
               by invoking the string-building logic in isolation.

            2. `TestPrepareWave_NoMergeTargetNoBriefSection` — when --merge-target is
               empty (the default), verify the brief does NOT contain "## Merge Target".

            3. `TestPrepareWave_AgentBriefInfo_MergeTargetField` — verify that the
               AgentBriefInfo struct has a MergeTarget field accessible via JSON tag
               "merge_target". Use struct literal and json.Marshal to confirm.

            Example for test 3:
            ```go
            func TestPrepareWave_AgentBriefInfo_MergeTargetField(t *testing.T) {
                info := AgentBriefInfo{
                    Agent:       "A",
                    BriefPath:   "/tmp/brief.md",
                    BriefLength: 100,
                    JournalDir:  "/tmp/journal",
                    FilesOwned:  3,
                    MergeTarget: "saw/program/my-prog/tier1-impl-foo",
                }
                data, err := json.Marshal(info)
                if err != nil {
                    t.Fatalf("json.Marshal failed: %v", err)
                }
                if !strings.Contains(string(data), `"merge_target"`) {
                    t.Errorf("expected merge_target in JSON, got: %s", string(data))
                }
                if !strings.Contains(string(data), "tier1-impl-foo") {
                    t.Errorf("expected impl slug in JSON, got: %s", string(data))
                }
            }
            ```

            ### Verification gate
            ```
            go build ./...
            go vet ./...
            go test ./cmd/saw/ -run "TestPrepareWave" -v
            ```

            ### Constraints
            - Backward compatible: when --merge-target is empty, brief is identical to current output
            - The mergeTargetSection only appears when mergeTarget != "" (zero-value = no section)
            - MergeTarget field uses omitempty so empty strings don't appear in JSON
            - Do NOT modify any other existing fields in AgentBriefInfo
            - Do NOT change the --merge-target flag definition or its baseline-checkout behavior
          files:
            - cmd/saw/prepare_wave.go
            - cmd/saw/prepare_wave_test.go
