            Document the limitation in a comment. Add a table-driven test for flag registration
            shape (--tier required, no default) that validates command structure without triggering
            RunE. Follow the same accepted pattern used by finalize_tier_cmd_test.go.
        - scenario: |
            Agent B's brief template change (adding mergeTargetSection %s) shifts existing
            %s argument positions, causing formatting bugs or test failures.
          likelihood: low
          impact: medium
          mitigation: |
            Interface contract specifies exact order of Sprintf arguments. Agent B must
            read the current brief template carefully before editing and verify that
            existing test output is unchanged when mergeTarget is empty.
        - scenario: |
            main.go is owned by Agent A but the wiring test (wiring_cmd_test.go) might
