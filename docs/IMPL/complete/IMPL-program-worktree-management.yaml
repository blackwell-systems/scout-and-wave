waves:
    - number: 1
      agents:
        - id: A
          task: |
            ## Task: Implement create-program-worktrees CLI command

            ### Context
            The engine function `protocol.CreateProgramWorktrees()` is fully implemented
            at `pkg/protocol/program_worktree.go`. It parses a PROGRAM manifest, finds
            the tier by number, and creates git worktrees for each IMPL in that tier.
            The CLI command wrapping it does NOT exist and is NOT registered in main.go.

            ### What to implement

            **File 1: cmd/saw/create_program_worktrees_cmd.go (new file)**

            Create a Cobra command following the exact same pattern as `newFinalizeTierCmd()`
            in `cmd/saw/finalize_tier_cmd.go`.

            Registration comment at top: `// Registration: add newCreateProgramWorktreesCmd() to main.go AddCommand list.`

            ```go
            package main

            import (
                "encoding/json"
                "fmt"
                "os"

                "github.com/blackwell-systems/scout-and-wave-go/pkg/protocol"
                "github.com/spf13/cobra"
            )

            func newCreateProgramWorktreesCmd() *cobra.Command {
                var tierNum int

                cmd := &cobra.Command{
                    Use:   "create-program-worktrees <program-manifest>",
                    Short: "Create IMPL branches and worktrees for all IMPLs in a program tier",
                    Long: `Creates long-lived IMPL branches for all IMPLs in a program tier.
            Branch naming: saw/program/{program-slug}/tier{N}-impl-{impl-slug}
            These branches serve as merge targets for all wave executions within each IMPL.
            Waves merge to the IMPL branch, not to main.

            Examples:
              sawtools create-program-worktrees docs/PROGRAM.yaml --tier 1
              sawtools create-program-worktrees program.yaml --tier 2 --repo-dir /path/to/repo

            Exit codes:
              0 - All worktrees created successfully
              1 - One or more worktrees failed
              2 - Parse error or tier not found`,
                    Args: cobra.ExactArgs(1),
                    RunE: func(cmd *cobra.Command, args []string) error {
                        manifestPath := args[0]

                        res := protocol.CreateProgramWorktrees(manifestPath, tierNum, repoDir)

                        if res.IsFatal() {
                            // Print structured error and exit 2 for parse/tier-not-found errors
                            for _, e := range res.Errors {
                                fmt.Fprintf(os.Stderr, "create-program-worktrees: %s: %s\n", e.Code, e.Message)
                            }
                            os.Exit(2)
                        }

                        data := res.GetData()
                        out, _ := json.MarshalIndent(data, "", "  ")
                        fmt.Fprintln(cmd.OutOrStdout(), string(out))

                        if !res.IsSuccess() {
                            os.Exit(1)
                        }

                        return nil
                    },
                }

                cmd.Flags().IntVar(&tierNum, "tier", 0, "Tier number (required)")
                _ = cmd.MarkFlagRequired("tier")

                return cmd
            }
            ```

            **File 2: cmd/saw/main.go (modify)**

            Add `newCreateProgramWorktreesCmd()` to the AddCommand list. Place it
            immediately after `newCreateProgramCmd()` (line 77), so program-related
            commands are grouped together:

            ```go
            newCreateProgramCmd(),
            newCreateProgramWorktreesCmd(),  // ADD THIS LINE
            newCheckIMPLConflictsCmd(),
            ```

            ### Tests to write

            Add a new file `cmd/saw/create_program_worktrees_cmd_test.go` with tests
            following the pattern in `cmd/saw/finalize_tier_cmd_test.go`.

            Test cases (all in package main):
            1. `TestCreateProgramWorktreesCmd_NoArgs` — verify ExactArgs(1) is enforced
            2. `TestCreateProgramWorktreesCmd_NoTierFlag` — verify --tier is required
            3. `TestCreateProgramWorktreesCmd_MissingManifest` — verify error for nonexistent file

            ```go
            package main

            import (
                "bytes"
                "os"
                "path/filepath"
                "testing"
            )

            func TestCreateProgramWorktreesCmd_NoArgs(t *testing.T) {
                var stdout bytes.Buffer
                var stderr bytes.Buffer
                cmd := newCreateProgramWorktreesCmd()
                cmd.SetOut(&stdout)
                cmd.SetErr(&stderr)
                cmd.SetArgs([]string{"--tier", "1"})
                err := cmd.Execute()
                if err == nil {
                    t.Fatal("expected error when no manifest argument provided, got nil")
                }
            }

            func TestCreateProgramWorktreesCmd_NoTierFlag(t *testing.T) {
                tmpDir := t.TempDir()
                manifestPath := filepath.Join(tmpDir, "PROGRAM-test.yaml")
                var stdout bytes.Buffer
                var stderr bytes.Buffer
                cmd := newCreateProgramWorktreesCmd()
                cmd.SetOut(&stdout)
                cmd.SetErr(&stderr)
                cmd.SetArgs([]string{manifestPath})
                err := cmd.Execute()
                if err == nil {
                    t.Fatal("expected error when --tier flag missing, got nil")
                }
            }

            func TestCreateProgramWorktreesCmd_MissingManifest(t *testing.T) {
                nonexistent := filepath.Join(os.TempDir(), "does-not-exist-program.yaml")
                var stdout bytes.Buffer
                var stderr bytes.Buffer
                cmd := newCreateProgramWorktreesCmd()
                cmd.SetOut(&stdout)
                cmd.SetErr(&stderr)
                cmd.SetArgs([]string{nonexistent, "--tier", "1"})
                err := cmd.Execute()
                // Should exit 2 for parse error — cobra RunE returns nil after os.Exit(2),
                // so we rely on the fatal result branch triggering os.Exit. In tests,
                // os.Exit cannot be intercepted, so verify the command at least accepts
                // valid flags (non-panic) by checking error is nil (os.Exit bypasses RunE return).
                // This test primarily validates cobra flag parsing, not the engine call.
                _ = err // os.Exit(2) in RunE means err may be nil
            }
            ```

            Note: The test for MissingManifest is necessarily limited because os.Exit(2)
            in RunE cannot be intercepted in unit tests. Document this limitation in a comment.
            Consider adding a table-driven test for the flag registration shape (tier required,
            no default) to validate the command is wired correctly without triggering os.Exit.

            ### Verification gate
            ```
            go build ./...
            go vet ./...
            go test ./cmd/saw/ -run "TestCreateProgramWorktreesCmd" -v
            ```

            ### Constraints
            - Follow existing patterns from finalize_tier_cmd.go exactly
            - `repoDir` is a persistent flag from root.go — do NOT re-declare it
            - JSON output goes to stdout; errors/warnings to stderr
            - Exit codes: 0 = success, 1 = runtime failure, 2 = parse/validation error
            - No backward compat aliases needed (purely additive)
