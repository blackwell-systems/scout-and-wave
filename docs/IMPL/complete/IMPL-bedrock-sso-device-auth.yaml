suitability_assessment: |
    SUITABLE - All five gates pass cleanly.

    1. File decomposition: 6+ distinct files across backend (Go) and frontend (React/TS),
       naturally split into SSO service logic, API handler, frontend component, and types.
       No single-file bottleneck.

    2. No investigation-first items: AWS SSO OIDC device auth flow is well-documented.
       The ssooidc SDK package is already in go.mod as an indirect dependency.

    3. Interface discoverability: All cross-agent interfaces can be fully specified upfront.
       The SSO flow has a clear request/response contract (start auth -> poll -> token).

    4. Pre-implementation status: No existing SSO device auth code exists. The Bedrock
       provider card supports static credentials and profile names only. The ssooidc
       package is already a transitive dependency via aws-sdk-go-v2.

    5. Parallelization value: High. Backend Go service + API handler are independent from
       frontend React component work. Build/test cycle is >30s (Go build + npm build).
       3 parallel agents in wave 1, 1 integration agent in wave 2.

    Estimated times:
    - Scout phase: ~8 min
    - Agent execution: ~12 min (3 agents x 8 min avg, parallel in wave 1, then 1 agent in wave 2)
    - Merge and verification: ~4 min
    Total SAW time: ~24 min
    Sequential baseline: ~40 min (4 agents x 10 min avg)
    Time savings: ~16 min (40% faster)
    Recommendation: Clear speedup.
