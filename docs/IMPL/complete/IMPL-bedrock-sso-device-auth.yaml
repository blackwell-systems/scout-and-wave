waves:
    - number: 1
      agents:
        - id: A
          task: |
            ## Agent A - SSO Service Layer

            **What to implement:**
            Create `pkg/service/sso_service.go` implementing the AWS SSO OIDC device authorization
            flow. This is the core business logic with no HTTP concerns.

            **Files:** `pkg/service/sso_service.go`, `pkg/service/sso_service_test.go`

            **Implementation details:**

            1. **ParseSSOProfile(profile string) function:**
               - Read `~/.aws/config` using manual INI parsing (read file, parse sections)
               - Extract `sso_start_url`, `sso_account_id`, `sso_role_name`, `sso_region` from
                 the `[profile <name>]` section
               - Return a struct with these fields, error if profile not found or missing required fields

            2. **StartSSODeviceAuth(ctx, SSOStartRequest) function:**
               - Parse the SSO profile config to get sso_start_url and sso_region
               - Use `github.com/aws/aws-sdk-go-v2/service/ssooidc` client:
                 - Call `RegisterClient` with ClientName="saw-web", ClientType="public"
                 - Call `StartDeviceAuthorization` with the client ID/secret from RegisterClient
                   and the sso_start_url
               - Generate a unique PollID (use crypto/rand hex string)
               - Store the pending auth state in a package-level sync.Map keyed by PollID
                 (device code, client ID, client secret, sso_region, sso_account_id, sso_role_name, expiry)
               - Return SSOStartResponse with verification URL, user code, poll ID, interval, expiry
               - CRITICAL: Never log client_secret, device_code, or any token values

            3. **PollSSODeviceAuth(ctx, SSOPollRequest) function:**
               - Look up pending auth state by PollID from sync.Map
               - If not found or expired, return status="expired"
               - Call ssooidc.CreateToken with grant_type="urn:ietf:params:oauth:grant-type:device_code"
               - If AuthorizationPendingException: return status="pending"
               - If SlowDownException: return status="pending"
               - If ExpiredTokenException: return status="expired", clean up state
               - On success: cache the SSO token, call STS GetCallerIdentity to get ARN,
                 return status="complete" with identity

            4. **SSO token caching (cacheSSOToken function):**
               - Cache directory: `~/.aws/sso/cache/`
               - File name: SHA1 hash of sso_start_url + ".json" (matches `aws sso login` convention)
               - Cache file JSON format:
                 ```json
                 {
                   "startUrl": "https://my-org.awsapps.com/start",
                   "region": "us-east-1",
                   "accessToken": "...",
                   "expiresAt": "2024-01-01T00:00:00UTC",
                   "clientId": "...",
                   "clientSecret": "...",
                   "registrationExpiresAt": "2024-01-01T00:00:00UTC"
                 }
                 ```
               - This format is compatible with what `aws sso login` produces
               - Set file permissions to 0600

            5. **Cleanup:** Use time.AfterFunc or lazy check to remove expired pending auth states.

            **Testing:**
            - Unit test ParseSSOProfile with a temp config file
            - Unit test PollID generation for uniqueness
            - Unit test cacheSSOToken writes correct JSON format and 0600 permissions
            - Unit test expired state cleanup
            - For StartSSODeviceAuth and PollSSODeviceAuth, define an ssooidcClient interface
              and use a mock implementation in tests

            **Verification gate:**
            ```
            cd /Users/dayna.blackwell/code/scout-and-wave-web && go build ./pkg/service/ && go test ./pkg/service/ -run TestSSO -v
            ```

            **Constraints:**
            - Only modify files listed in your file ownership
            - Never log or include in error messages: access tokens, client secrets, device codes
            - SSO token cache must be compatible with `aws sso login` format
            - Use existing aws-sdk-go-v2 packages (ssooidc is already an indirect dep in go.mod)
          files:
            - pkg/service/sso_service.go
            - pkg/service/sso_service_test.go
        - id: B
          task: |
            ## Agent B - SSO HTTP Handler

            **What to implement:**
            Create `pkg/api/sso_handler.go` with HTTP handlers that expose the SSO service
            layer via REST endpoints. Route registration happens in wave 2.

            **Files:** `pkg/api/sso_handler.go`, `pkg/api/sso_handler_test.go`

            **Implementation details:**

            1. **handleSSOStart (POST /api/config/providers/bedrock/sso/start):**
               - Decode JSON body: `{ "profile": "my-sso-profile", "region": "us-east-1" }`
               - Profile is required; region is optional
               - Call `service.StartSSODeviceAuth(ctx, req)`
               - Return JSON with: verification_uri, verification_uri_complete, user_code,
                 poll_id, expires_in, interval
               - CRITICAL: Do NOT include device_code, client_id, or client_secret in response
               - On error: return appropriate HTTP status with JSON error

            2. **handleSSOPoll (POST /api/config/providers/bedrock/sso/poll):**
               - Decode JSON body: `{ "poll_id": "..." }`
               - Call `service.PollSSODeviceAuth(ctx, req)`
               - Return JSON: `{ "status": "pending"|"complete"|"expired"|"error",
                 "identity": "arn:...", "error": "..." }`

            3. **RegisterSSORoutes method:**
               - Create `func (s *Server) RegisterSSORoutes()` that registers both routes
               - Follows the pattern of RegisterConflictRoutes, RegisterAmendRoutes, etc.

            **HTTP response type for start endpoint** (define in sso_handler.go):
            ```go
            type ssoStartHTTPResponse struct {
                VerificationURI         string `json:"verification_uri"`
                VerificationURIComplete string `json:"verification_uri_complete"`
                UserCode                string `json:"user_code"`
                PollID                  string `json:"poll_id"`
                ExpiresIn               int32  `json:"expires_in"`
                Interval                int32  `json:"interval"`
            }
            ```

            **Testing:**
            - Test handleSSOStart with valid/invalid/missing-profile JSON bodies
            - Test handleSSOPoll with valid/invalid/expired poll IDs
            - Verify sensitive fields are NOT in HTTP responses
            - Use httptest.NewRecorder for handler tests

            **Verification gate:**
