                 onComplete: (identity: string) => void
                 onError: (error: string) => void
               }
               ```

            2. **State machine:**
               - `idle` - Shows "SSO Login" button
               - `starting` - Button shows spinner while calling start endpoint
               - `awaiting` - Shows verification URL, user code, countdown timer
               - `complete` - Shows success checkmark and identity ARN
               - `error` - Shows error message with retry button
               - `expired` - Shows "Session expired" with retry button

            3. **UI for `awaiting` state:**
               - User code displayed prominently (large, monospace, selectable text)
               - Verification URL as clickable link (target="_blank")
               - Instructional text: "Open the URL above and enter the code to authenticate"
               - Countdown timer showing remaining seconds
               - Do NOT auto-open the URL (app may be running remotely)

            4. **Polling logic:**
               - On start response, poll POST /api/config/providers/bedrock/sso/poll
                 at the interval from the response (default 5s)
               - Handle status transitions: pending->continue, complete->done, expired/error->stop
               - Clean up interval on unmount (useEffect cleanup)

            5. **Styling:**
               - Tailwind classes matching existing components
               - lucide-react icons: Loader2, CheckCircle2, XCircle, ExternalLink
               - Compact button matching "Test Connection" size in ProviderCard

            6. **Disable when:** profile is empty, or during starting/awaiting states

            **Verification gate:**
