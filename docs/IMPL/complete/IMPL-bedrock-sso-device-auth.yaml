pre_mortem:
    overall_risk: medium
    rows:
        - scenario: AWS SSO profile not found in ~/.aws/config on user's machine
          likelihood: medium
          impact: low
          mitigation: ParseSSOProfile returns a clear error guiding the user to run 'aws configure sso' first
        - scenario: ssooidc SDK calls fail due to network or firewall restrictions
          likelihood: low
          impact: medium
          mitigation: Standard error handling with descriptive messages. The 5-second polling interval avoids rate limits.
        - scenario: SSO token cache format diverges from what aws-sdk-go-v2 credential chain expects
          likelihood: low
          impact: high
          mitigation: Agent A tests must verify exact JSON field names and date format match aws CLI output. SHA1 hash of start_url for filename.
        - scenario: Concurrent SSO auth attempts cause stale state in sync.Map
          likelihood: low
          impact: low
          mitigation: Each auth gets a unique PollID. Expired entries cleaned up lazily. sync.Map is goroutine-safe.
        - scenario: go.mod needs ssooidc promoted from indirect to direct dependency
          likelihood: medium
          impact: medium
          mitigation: ssooidc already in go.mod as indirect. Agent A runs go mod tidy after importing the package.
