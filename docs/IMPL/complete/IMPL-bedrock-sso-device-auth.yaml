            ## Agent C - SSO Login Frontend Component

            **What to implement:**
            Create `web/src/components/SSOLoginButton.tsx` - a React component for the SSO
            device auth flow UI. Integration into SettingsScreen happens in wave 2.

            **Files:** `web/src/components/SSOLoginButton.tsx`

            **Implementation details:**

            1. **Component props:**
               ```typescript
