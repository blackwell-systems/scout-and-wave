interface_contracts:
    - name: SSODeviceAuthStart
      description: Initiates AWS SSO OIDC device authorization flow by reading SSO profile config, registering a client, and starting device authorization.
      definition: |
        // In pkg/service/sso_service.go
        type SSOStartRequest struct {
            Profile string `json:"profile"`
            Region  string `json:"region,omitempty"`
        }

        type SSOStartResponse struct {
            VerificationURI         string `json:"verification_uri"`
            VerificationURIComplete string `json:"verification_uri_complete"`
            UserCode                string `json:"user_code"`
            DeviceCode              string `json:"device_code"`
            ClientID                string `json:"client_id"`
            ClientSecret            string `json:"client_secret"`
            ExpiresIn               int32  `json:"expires_in"`
            Interval                int32  `json:"interval"`
            PollID                  string `json:"poll_id"`
        }

        func StartSSODeviceAuth(ctx context.Context, req SSOStartRequest) (*SSOStartResponse, error)
      location: pkg/service/sso_service.go
    - name: SSODeviceAuthPoll
      description: Polls AWS SSO OIDC CreateToken until authentication completes or times out. Caches the resulting SSO token.
      definition: |
        // In pkg/service/sso_service.go
        type SSOPollRequest struct {
            PollID string `json:"poll_id"`
        }

        type SSOPollResponse struct {
            Status   string `json:"status"`
            Identity string `json:"identity,omitempty"`
            Error    string `json:"error,omitempty"`
        }

        func PollSSODeviceAuth(ctx context.Context, req SSOPollRequest) (*SSOPollResponse, error)
      location: pkg/service/sso_service.go
    - name: HandleSSOStart
      description: HTTP handler for POST /api/config/providers/bedrock/sso/start
      definition: |
        func (s *Server) handleSSOStart(w http.ResponseWriter, r *http.Request)
      location: pkg/api/sso_handler.go
    - name: HandleSSOPoll
      description: HTTP handler for POST /api/config/providers/bedrock/sso/poll
      definition: |
        func (s *Server) handleSSOPoll(w http.ResponseWriter, r *http.Request)
