title: Slug-scoped branch naming - eliminate agent ID collision across IMPLs
feature_slug: slug-scoped-branches
verdict: SUITABLE
suitability_assessment: |
    Cross-repo feature touching Go SDK (engine), web app (UI/API), and protocol docs.
    Branch name construction is duplicated across ~25 call sites in 3 repos.
    The fix is mechanical but widespread: introduce a centralized BranchName(slug, wave, agent)
    helper in the Go SDK, propagate to all callers, update protocol docs, and update
    the field validation regex to accept the new format.

    Key design decisions:
    - New format: saw/<slug>/wave{N}-agent-{ID} (branch) and .claude/worktrees/saw/<slug>/wave{N}-agent-{ID} (worktree path)
    - The saw/ prefix keeps SAW branches visually distinct in git branch listings
    - Backward compatibility: field validation regex accepts BOTH old and new formats during transition
    - .saw-state paths (.saw-state/wave{N}/agent-{ID}/) do NOT need slug-scoping because they are
      already scoped by the manifest directory, not global git namespace. Changing them would break
      journal recovery. Leave them as-is.
    - Journal archive names (wave{N}-agent-{ID}.tar.gz) are already under .saw-state/archive/
      which is per-project. No change needed.
test_command: go test ./...
lint_command: go vet ./...
