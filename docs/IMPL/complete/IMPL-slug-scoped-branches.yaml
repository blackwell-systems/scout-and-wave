pre_mortem:
    overall_risk: medium
    rows:
        - scenario: journal.NewObserver breaks when passed slug-scoped branch name
          likelihood: high
          impact: high
          mitigation: |
            Agent F must NOT pass slug-scoped branch names to journal functions.
            Journal paths are .saw-state/wave{N}/agent-{ID} (no slug). Use
            LegacyBranchName() format for journal identifiers. This is explicitly
            called out in Agent F's constraints.
        - scenario: In-flight IMPL branches use old naming and break after upgrade
          likelihood: medium
          impact: high
          mitigation: |
            All validation and detection code accepts BOTH old and new formats via
            ScopedBranchRegex. Cleanup and merge functions try new format first,
            fall back to legacy. This is a hard requirement for every Wave 2 agent.
        - scenario: worktree.Manager.New() signature change breaks compilation in agent F's files
          likelihood: medium
          impact: medium
          mitigation: |
            Agents E and F both modify files that create/use worktree.Manager. The slug
            parameter is added by Agent E; Agent F must use the new signature. Both agents
            have this dependency documented. If builds break, the slug parameter is trivially
            available from the manifest.
        - scenario: git branch names with slashes cause issues on Windows
          likelihood: low
          impact: low
          mitigation: |
            Git natively supports slashes in branch names (they map to directories in
            .git/refs/heads/). The saw/ prefix is a standard convention (like feature/,
            release/). No Windows-specific issues expected.
        - scenario: Web app go.sum drift after Go SDK changes
          likelihood: medium
          impact: low
          mitigation: |
            Wave 3 (web app) runs after Go SDK waves merge. Agent G runs go mod tidy
            as part of verification. If the Go SDK is a local replace directive, no
            go.sum change is needed.
