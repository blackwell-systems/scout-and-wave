interface_contracts:
    - name: BranchName
      description: |
        Central function for constructing slug-scoped branch names.
        All call sites that currently use fmt.Sprintf("wave%d-agent-%s", ...) must
        migrate to this function.
      definition: |
        func BranchName(slug string, waveNum int, agentID string) string
      location: pkg/protocol/branchname.go
    - name: LegacyBranchName
      description: |
        Returns the old-format branch name for backward compatibility checks.
        Used by code that needs to detect or clean up old-format branches.
      definition: |
        func LegacyBranchName(waveNum int, agentID string) string
      location: pkg/protocol/branchname.go
    - name: WorktreeDir
      description: |
        Central function for constructing slug-scoped worktree directory paths.
        Replaces filepath.Join(repoDir, ".claude", "worktrees", fmt.Sprintf("wave%d-agent-%s", ...))
      definition: |
        func WorktreeDir(repoDir, slug string, waveNum int, agentID string) string
      location: pkg/protocol/branchname.go
    - name: ScopedBranchRegex
      description: |
        Regex that matches BOTH old-format (wave1-agent-A) and new-format
        (saw/my-slug/wave1-agent-A) branch names. Used by field validation
        and resume detection. Captures wave number and agent ID groups.
      definition: |
        var ScopedBranchRegex = regexp.MustCompile(`^(?:saw/[a-z0-9-]+/)?wave(\d+)-agent-([A-Z][2-9]?)$`)
      location: pkg/protocol/branchname.go
