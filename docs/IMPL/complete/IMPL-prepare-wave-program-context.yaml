interface_contracts:
    - name: PrepareWaveOpts.CommitState
      description: |-
        New boolean field on PrepareWaveOpts. When true, the engine will detect
        SAW-owned dirty files (.saw-state/** and the IMPL yaml) and commit them
        before the working_dir_check fails. User code changes still produce the
        existing fatal error. This field is set by --commit-state CLI flag.
      definition: |
        // CommitState auto-commits SAW-owned state changes (IMPL yaml + gate-cache)
        // before the working-directory check. Does NOT commit user code changes.
        // Intended for program-context prepare-wave calls.
        CommitState bool
      location: pkg/engine/step_types.go
    - name: isSAWOwnedPath
      description: |-
        Helper function in prepare.go that classifies a git-status path as
        SAW-owned (safe to auto-commit) vs user-code (must still fail). A path
        is SAW-owned if it matches the IMPL yaml file or is under .saw-state/.
      definition: |
        // isSAWOwnedPath reports whether the given git-porcelain path (relative
        // to repo root) is a SAW-managed state file safe to auto-commit.
        func isSAWOwnedPath(path, implPath, projectRoot string) bool
      location: pkg/engine/prepare.go
    - name: commitStateFlag
      description: CLI flag name added to prepare-wave command. Maps to PrepareWaveOpts.CommitState.
      definition: |
        --commit-state   Auto-commit SAW-owned state changes (IMPL yaml + gate-cache)
                         before the working-directory check. Does not commit user code.
      location: cmd/sawtools/prepare_wave.go
waves:
    - number: 1
      agents:
        - id: A
          task: |
            ## Role
            You are a Wave Agent. Implement the engine-side changes for the
            `prepare-wave-program-context` feature in the scout-and-wave-go repo.

            ## Context
            In a PROGRAM execution flow, `sawtools prepare-wave` is called once per
            IMPL in a tier. The first call advances the IMPL state (SCOUT_PENDING →
            REVIEWED) and writes to the gate cache, dirtying the working directory.
            The second call then fails with "working directory is dirty". The fix adds
            a `--commit-state` flag that auto-commits only SAW-owned state files
            (IMPL yaml + `.saw-state/` directory) before the dirty-check, so user
            code changes still fail as expected.

            ## Files to Modify

            ### `pkg/engine/step_types.go`
            Add one new field to `PrepareWaveOpts`:

            ```go
            // CommitState auto-commits SAW-owned state changes (IMPL yaml + gate-cache)
            // before the working-directory check. Does NOT commit user code changes.
            // Intended for program-context prepare-wave calls.
            CommitState bool
            ```

            Add it after the existing `CommitBaseline bool` field (line ~29).

            ### `pkg/engine/prepare.go`

            **1. Add helper function `isSAWOwnedPath`** (add near the top of the file,
            after the `loadSAWConfigRepos` helper, before `PrepareWave`):

            ```go
            // isSAWOwnedPath reports whether the given git-porcelain relative path
            // is a SAW-managed state file that is safe to auto-commit in program context.
            // A path is SAW-owned if it is the IMPL yaml file or falls under .saw-state/.
            func isSAWOwnedPath(path, implPath, projectRoot string) bool {
                // Normalize implPath to repo-relative
                rel, err := filepath.Rel(projectRoot, implPath)
                if err != nil {
                    rel = implPath
                }
                // git porcelain output has a 3-char prefix (e.g. " M "), trim it
                trimmed := strings.TrimSpace(path)
                if len(trimmed) > 3 {
                    trimmed = strings.TrimSpace(trimmed[2:])
                }
                return trimmed == rel ||
                    strings.HasPrefix(trimmed, ".saw-state/") ||
                    strings.HasPrefix(trimmed, ".saw-state\\")
            }
            ```

            **2. Extend the working-directory-check block** (lines ~305–346 in
            `prepare.go`). The current block reads:

            ```go
            } else if len(out) > 0 {
                // Working directory is dirty
                modifiedFiles := strings.Split(strings.TrimSpace(string(out)), "\n")
                fileCount := len(modifiedFiles)

                if opts.CommitBaseline {
                    ...
                } else {
                    // Working directory is dirty but auto-commit not requested
                    detail := fmt.Sprintf(...)
                    recordStep(...)
                    return res, fmt.Errorf("working directory is dirty: ...")
                }
            ```

            Add an `else if opts.CommitState` branch between the `CommitBaseline`
            block and the final `else` block:

            ```go
            } else if opts.CommitState {
                // Classify dirty files: SAW-owned vs user code
                var sawFiles []string
                var userFiles []string
                for _, f := range modifiedFiles {
                    if isSAWOwnedPath(f, opts.IMPLPath, projectRoot) {
                        sawFiles = append(sawFiles, f)
                    } else {
                        userFiles = append(userFiles, f)
                    }
                }
                if len(userFiles) > 0 {
                    detail := fmt.Sprintf("%d user-code file(s) modified — --commit-state only commits SAW state files; commit user code manually", len(userFiles))
                    recordStep(res, opts.OnEvent, "working_dir_check", "failed", detail)
                    return res, fmt.Errorf("working directory has user-code changes: %d file(s) (--commit-state does not commit user code)", len(userFiles))
                }
                if len(sawFiles) == 0 {
                    recordStep(res, opts.OnEvent, "working_dir_check", "success", "working directory is clean")
                } else {
                    os.Setenv("SAW_ALLOW_MAIN_COMMIT", "1")
                    defer os.Unsetenv("SAW_ALLOW_MAIN_COMMIT")
                    for _, f := range sawFiles {
                        // Stage each SAW-owned file individually (not -A)
                        trimmed := strings.TrimSpace(f)
                        if len(trimmed) > 3 {
                            trimmed = strings.TrimSpace(trimmed[2:])
                        }
                        if _, addErr := git.Run(projectRoot, "add", trimmed); addErr != nil {
                            recordStep(res, opts.OnEvent, "commit_state", "failed",
                                fmt.Sprintf("failed to stage %s: %v", trimmed, addErr))
                            return res, fmt.Errorf("failed to stage SAW state file %s: %w", trimmed, addErr)
                        }
                    }
                    commitMsg := fmt.Sprintf("chore: update SAW state for wave %d preparation\n\nAuto-committed %d SAW state file(s): %s",
                        opts.WaveNum, len(sawFiles), strings.Join(sawFiles, ", "))
                    if _, commitErr := git.Run(projectRoot, "commit", "-m", commitMsg); commitErr != nil {
                        recordStep(res, opts.OnEvent, "commit_state", "failed",
                            fmt.Sprintf("failed to commit: %v", commitErr))
                        return res, fmt.Errorf("failed to commit SAW state files: %w", commitErr)
                    }
                    recordStep(res, opts.OnEvent, "commit_state", "success",
                        fmt.Sprintf("committed %d SAW state file(s)", len(sawFiles)))
                }
            ```

            ## Tests
            Add or extend tests in `pkg/engine/prepare_test.go` to cover:

            1. `TestPrepareWave_CommitState_CleanDir` — when CommitState=true and
               working dir is clean, working_dir_check step status is "success" (no commit).
            2. `TestPrepareWave_CommitState_UserCodeDirty` — when CommitState=true but
               dirty files are user code, the step fails with a descriptive error
               containing "user-code changes".
            3. `TestIsSAWOwnedPath` — unit test the helper directly:
               - IMPL yaml path → true
               - `.saw-state/gate-cache.json` → true
               - `cmd/sawtools/main.go` → false
               - `docs/IMPL/something.yaml` that does NOT match implPath → false

            If the existing prepare_test.go uses table-driven patterns, follow that
            style. Keep the helper tests simple (no git subprocess needed).

            ## Verification Gate
            ```
            go build ./...
            go vet ./...
            go test ./pkg/engine/... -run "TestPrepareWave|TestIsSAWOwnedPath" -timeout 60s
            ```

            ## Constraints
            - Do NOT set `SAW_ALLOW_MAIN_COMMIT` globally at the start of the
              function; only set it immediately before the targeted git commit.
            - Do NOT use `git add -A`; stage SAW-owned files individually.
            - The `isSAWOwnedPath` function must handle both Unix and Windows
              path separators in the `.saw-state` prefix check.
            - The helper must be unexported (lowercase).
            - Do not modify the CommitBaseline branch behavior.
          files:
            - pkg/engine/step_types.go
            - pkg/engine/prepare.go
      base_commit: 9bf4ae99fa8c29b413b54342637edb67b269ec72
    - number: 2
