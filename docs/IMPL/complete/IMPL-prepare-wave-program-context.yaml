title: 'prepare-wave: auto-commit SAW state in program context'
feature_slug: prepare-wave-program-context
verdict: SUITABLE
suitability_assessment: |-
    The fix touches 3 files across 2 Go packages (pkg/engine and cmd/sawtools).
    File ownership is naturally disjoint: Agent A owns both engine files
    (step_types.go adds the new field; prepare.go implements the logic), and
    Agent B owns the CLI adapter (prepare_wave.go adds the flag and passes it).
    Agent B must depend on Agent A completing first because prepare_wave.go
    references the new PrepareWaveOpts.CommitState field defined in step_types.go.

    Parallelization value: marginal (only 2 agents, 1 sequential dependency), but
    the IMPL doc provides interface contracts that prevent the agents from choosing
    conflicting field names or flag spellings. The scout produces a binding
    contract that both agents can reference independently, which is the primary
    value here.

    Option B (--commit-state flag) is the cleaner approach: it matches the
    existing --commit-baseline pattern, gives the program orchestrator explicit
    opt-in control, and avoids implicit behavior tied to --merge-target presence
    (which could have unintended side effects). The flag is narrowly scoped to
    SAW-owned state files only; user code dirty-check behavior is unchanged.

    Estimated times:
    - Scout phase: ~10 min
    - Agent execution: ~15 min (2 agents x ~8 min avg; wave 2 blocked on wave 1)
    - Merge and verification: ~5 min
    Total SAW time: ~30 min

    Sequential baseline: ~25 min (2 tasks x ~12 min each)
    Time savings: marginal. Coordination value (interface contract) is the
    primary benefit.
