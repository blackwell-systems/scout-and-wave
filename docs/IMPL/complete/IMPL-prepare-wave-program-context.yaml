pre_mortem:
    overall_risk: low
    rows:
        - scenario: |-
            git porcelain output format differs between Git versions (e.g. XY prefix
            handling). The isSAWOwnedPath helper trims the first 3 chars assuming
            standard porcelain format (" M path" or "M  path"). If format varies,
            the helper could mis-classify a file.
          likelihood: low
          impact: medium
          mitigation: |-
            Agent A should test the helper against both tracked-modified (" M path")
            and untracked ("?? path") git porcelain entries. If the format is wrong
            the classification fails safe (user-code branch) and returns a descriptive
            error rather than committing the wrong files.
        - scenario: |-
            The IMPL yaml path might be absolute while git porcelain reports relative
            paths, causing isSAWOwnedPath to never match the IMPL file. This would
            mean the IMPL yaml stays unstaged and the commit_state step succeeds
            without committing it — the root cause of the original bug would persist.
          likelihood: low
          impact: high
          mitigation: |-
            The helper calls filepath.Rel(projectRoot, implPath) to normalize the
            IMPL path to repo-relative before comparing. Agent A must verify this
            normalization in the TestIsSAWOwnedPath unit test with both absolute
            and relative implPath inputs.
        - scenario: |-
            A user who has both user-code changes AND SAW state changes (e.g. they
            edited a Go file while the state advance was also pending) would get an
            error message that blames all dirty files as "user-code changes" even
            though some are SAW-owned. This could be confusing.
          likelihood: medium
          impact: low
          mitigation: |-
            The error message in the user-code branch should include the count of
            SAW-owned files alongside the user-code count so the user understands
            the split. Agent A should ensure the error message says something like
            "1 SAW state file(s) and 2 user-code file(s) modified" rather than just
            the user-code count.
