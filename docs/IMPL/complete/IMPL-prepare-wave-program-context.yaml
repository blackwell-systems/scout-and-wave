            ```

            ## Tests
            No new tests are required in the CLI layer (the engine has unit test
            coverage from Agent A). Verify the flag is wired correctly by checking
            that the cobra flag registration compiles and the struct field assignment
            is present.

            ## Verification Gate
            ```
            go build ./...
            go vet ./...
            go test ./cmd/sawtools/... -timeout 60s
            ```

            ## Constraints
            - Do NOT change any existing flag names or behaviors.
            - Do NOT pass `--commit-state` as mutually exclusive with
              `--commit-baseline`; both can coexist (they handle different
              dirty-file scenarios). No MarkFlagsMutuallyExclusive call.
            - The flag description must clearly state it does not commit user code.
          files:
            - cmd/sawtools/prepare_wave.go
          dependencies:
            - A
