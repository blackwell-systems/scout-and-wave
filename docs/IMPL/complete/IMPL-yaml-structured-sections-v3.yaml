## Typed-Block Extraction Helper (Agent E)

**Agent E creates in parser.go:**

```go
// extractTypedBlock reads lines from scanner until closing fence.
// Returns (blockLines, found). blockLines excludes fence markers.
// Scanner is positioned after closing fence on return.
func extractTypedBlock(scanner *bufio.Scanner, blockType string) ([]string, bool) {
	var lines []string
	for scanner.Scan() {
		line := scanner.Text()
		if strings.HasPrefix(strings.TrimSpace(line), "```") {
			return lines, true
		}
		lines = append(lines, line)
	}
	return lines, false // EOF without closing fence
}
```

**Usage in parseQualityGatesSection replacement:**

```go
// Find typed block: ```yaml type=impl-quality-gates
if strings.Contains(trimmed, "type=impl-quality-gates") {
	blockLines, found := extractTypedBlock(scanner, "impl-quality-gates")
	if !found {
		return nil // malformed block
	}
	yamlBytes := []byte(strings.Join(blockLines, "\n"))
	var gates QualityGates
	if err := yaml.Unmarshal(yamlBytes, &gates); err != nil {
		return nil // invalid YAML
	}
	return &gates
}
```

**Consumers:** parseQualityGatesSection replacement, parsePostMergeChecklistSection (new), parseKnownIssuesSection (replacement)

