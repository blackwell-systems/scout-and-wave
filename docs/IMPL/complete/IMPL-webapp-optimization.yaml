            ## App.tsx state consolidation, useCallback, and context unification

            **What to implement:**

            1. **Consolidate 6 model useState calls (lines 78-83) into single state object:**
               Replace:
               ```tsx
               const [scoutModel, setScoutModel] = useState<string>('claude-sonnet-4-6')
               const [scaffoldModel, setScaffoldModel] = useState<string>('claude-sonnet-4-6')
               // ... 4 more
               ```
               With:
               ```tsx
               const [models, setModels] = useState<ModelsState>({
                 scout: 'claude-sonnet-4-6', scaffold: 'claude-sonnet-4-6',
                 wave: 'claude-sonnet-4-6', integration: 'claude-sonnet-4-6',
                 chat: 'claude-sonnet-4-6', planner: 'claude-sonnet-4-6',
               })
               ```
               Update all references: scoutModel -> models.scout, setScoutModel(v) ->
               setModels(m => ({...m, scout: v})), etc. Update saveModel, handleSettingsClose,
               the initial config load, and the ModelPicker rendering.

            2. **Wrap handler functions with useCallback (lines 179-251):**
               - handleSelect — useCallback with deps: []
               - handleApprove — useCallback with deps: [selectedSlug]
               - handleReject — useCallback with deps: [selectedSlug]
               - handleDelete — useCallback with deps: [selectedSlug]
               - handleViewWaves — useCallback with deps: []
               - handleScoutReady — useCallback with deps: []
               - handleScoutComplete — useCallback with deps: []
               - saveModel — useCallback with deps: []

               Note: Some of these currently reference selectedSlug via closure. Convert
               to useCallback and include selectedSlug in deps where needed, or use
               functional state updates.

            3. **Unify with AppContext (finding #9):**
               App.tsx lines 66-94 duplicate state that AppContext.tsx already manages
               (repos, entries, models, sseConnected, programs). Instead of maintaining
               both, have App.tsx consume AppContext for: repos, entries, models, programs,
