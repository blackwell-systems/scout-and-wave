               - `fetch(/api/impl/${slug}/raw, {method:'PUT',...})` -> `sawClient.impl.saveRaw(slug, content)`

            5. **web/src/components/SettingsScreen.tsx** (line 66):
               - `fetch('/api/config/validate-repo',...)` -> This endpoint is NOT in SawClient.
                 Add a new method `config.validateRepo(path: string)` to both the SawClient
                 interface and createHttpClient implementation in apiClient.ts.

            6. **web/src/components/AmendPanel.tsx** (line 20):
               - `fetch(/api/impl/${slug}/amend,...)` -> This endpoint is NOT in SawClient.
                 Add a new method `impl.amend(slug: string, wave: number, agents: string[], scopeHint?: string)`
                 to both the SawClient interface and createHttpClient.

            7. **web/src/hooks/useNotifications.ts** (lines 34, 42):
               - `fetch('/api/notifications/preferences')` -> These are NOT in SawClient.
                 Add `notifications: { getPreferences(): Promise<NotifPrefs>; savePreferences(prefs: NotifPrefs): Promise<void> }`
                 to SawClient interface and implementation.

            8. **web/src/lib/bootstrapApi.ts** (line 16):
