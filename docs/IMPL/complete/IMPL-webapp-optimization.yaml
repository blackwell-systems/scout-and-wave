            10. **web/src/components/review/FileDiffPanel.tsx** (line 6):
                - Check if this uses the api.ts fetchFileDiff or direct fetch. Migrate to
                  `sawClient.impl.diff(slug, agent, wave, file)`.

            **For endpoints not yet in SawClient:** Add the method to both the `SawClient`
