          mitigation: Agent A should test with Go, TypeScript, and Python code blocks. Visual regression is cosmetic only.
        - scenario: Lazy-loaded panels cause visible loading flash on slow connections
          likelihood: low
          impact: low
          mitigation: Suspense fallback uses skeleton animation matching panel height. Panels are small chunks.
        - scenario: IMPL cache serves stale data after rapid file changes
          likelihood: medium
          impact: medium
          mitigation: Cache invalidation tied to fsnotify events. isExecuting computed live, not cached.
        - scenario: Agent D's SawClient additions conflict with apiClient.ts imports in other agents
          likelihood: low
          impact: low
          mitigation: Agent D owns apiClient.ts additions. Agent E only reads ReviewLayout.tsx. No overlap.
        - scenario: App.tsx useCallback conversion changes closure behavior
          likelihood: medium
