               Check if AppProvider is already wrapping App in main.tsx or index.tsx. If
               not, this unification should be documented as a follow-up (don't change
               the component tree structure in this task — just prepare App.tsx to use
               useAppContext() for shared state IF the provider is already in place).

            **Verification gate:**
