            **Files and specific migrations:**

            1. **web/src/components/WaveBoard.tsx** (lines 115, 117):
               - `fetch(/api/wave/${slug}/gate/proceed, {method:'POST'})` -> `sawClient.wave.proceedGate(slug)`
               - `fetch(/api/wave/${slug}/start, {method:'POST'})` -> `sawClient.wave.start(slug)`

            3. **web/src/components/ScoutLauncher.tsx** (line 143):
