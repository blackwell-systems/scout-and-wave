interface_contracts:
    - name: SawClient singleton import
      description: |
        All components migrating from direct fetch() must import and use the
        sawClient singleton from apiClient.ts. Agent D owns apiClient.ts and
        will add new methods for endpoints not yet in SawClient (config.validateRepo,
        impl.amend, notifications.*, bootstrap.run, impl.manifest).
      definition: |
        import { sawClient } from '../lib/apiClient'
        // or from '../../lib/apiClient' depending on depth
      location: web/src/lib/apiClient.ts
    - name: Models state object shape
      description: |
        The consolidated models state in App.tsx must match the shape already
        defined in AppContext.tsx. This is the single source of truth.
      definition: |
        interface ModelsState {
          scout: string
          scaffold: string
          wave: string
          integration: string
          chat: string
          planner: string
        }
      location: web/src/contexts/AppContext.tsx
    - name: implCache type for Go backend
      description: |
        In-memory cache for parsed IMPL doc metadata in handleListImpls.
        Uses sync.RWMutex for concurrent read access and fsnotify invalidation.
      definition: |
        type implCache struct {
          mu      sync.RWMutex
          entries map[string]cachedImplEntry  // key: absolute file path
          valid   bool
        }
        type cachedImplEntry struct {
          entry   implListEntry
          modTime time.Time
        }
      location: pkg/api/impl.go
waves:
    - number: 1
      agents:
        - id: A
          task: |
            ## Remove react-syntax-highlighter dependency

            **What to implement:**
            1. In web/package.json: Remove "react-syntax-highlighter" from dependencies
               and "@types/react-syntax-highlighter" from dependencies.
            2. In web/src/components/review/MarkdownContent.tsx: Replace the
               react-syntax-highlighter import and usage with CodeMirror-based syntax
               highlighting (already available via @uiw/react-codemirror dependency).
               The component uses `Prism as SyntaxHighlighter` from react-syntax-highlighter
               with vscDarkPlus/vs themes. Replace with a simple <pre><code> block that
               uses CodeMirror's highlighting extensions, or a lightweight approach using
               CSS classes for syntax tokens. The key requirement is that fenced code blocks
               in markdown still render with syntax highlighting.

            **Approach:** Use @uiw/react-codemirror's `CodeMirrorMerge` or a read-only
            CodeMirror instance for code blocks. Alternatively, since these are read-only
            display blocks, a simpler approach is to use a minimal CodeMirror editor in
            readOnly mode with the appropriate language extension. The language extensions
            @codemirror/lang-go, @codemirror/lang-javascript, and @codemirror/lang-python
            are already in package.json.

            **Verification gate:**
            ```
            cd web && npx tsc --noEmit && npx vite build
            ```
            Confirm react-syntax-highlighter is no longer in the build output.

            **Constraints:**
            - Do NOT touch apiClient.ts or any other component files
            - The guessLanguage() function in MarkdownContent.tsx should be preserved
            - Markdown rendering must still work for code fences with and without language tags
          files:
            - web/package.json
            - web/src/components/review/MarkdownContent.tsx
        - id: B
          task: |
            ## Debounce impl_list_updated SSE events in Go backend

            **What to implement:**
            In pkg/api/global_events.go, add a 500ms debounce window to the
            impl_list_updated broadcast in startIMPLWatcher. Currently, every single
            fsnotify event (Create, Rename, Remove) immediately calls
            `s.globalBroker.broadcast("impl_list_updated")`. When multiple files change
            rapidly (e.g., scout writes IMPL doc + .saw-state files), this causes a
            flood of SSE events that each trigger a full listImpls() + YAML parse on
            the frontend.

            **Implementation:**
            Add a debounce mechanism using time.AfterFunc or a timer pattern:
            ```go
            var debounceTimer *time.Timer
            var debounceMu sync.Mutex
            ```
            In the goroutine's select case for fsnotify events, instead of calling
            broadcast directly, reset the debounce timer to 500ms. When the timer
            fires, call broadcast once.

            Keep the existing broadcast behavior for non-filesystem events (the
            broker.broadcast calls in handleApprove, handleReject, handleArchiveImpl
            should NOT be debounced — those are user-initiated and should be immediate).

            **Verification gate:**
            ```
            cd /Users/dayna.blackwell/code/scout-and-wave-web && go build ./...
            ```

            **Constraints:**
            - Only modify startIMPLWatcher's goroutine — do not change the broker API
            - Do not debounce broadcastJSON or the explicit broadcast calls in handlers
            - The debounce timer must be properly cleaned up when the watcher closes
          files:
            - pkg/api/global_events.go
        - id: C
          task: |
            ## Cache IMPL doc metadata in Go backend

            **What to implement:**
            In pkg/api/impl.go, add an in-memory cache for handleListImpls so it does
            not re-read and re-parse every IMPL YAML file on every request.

            **Current behavior (lines 30-150):** handleListImpls reads saw.config.json,
            scans all IMPL directories with os.ReadDir, and calls protocol.Load(fullPath)
            for EVERY .yaml file on EVERY request. protocol.Load parses the full YAML
            manifest just to extract wave count, agent count, and multi-repo status.

            **Implementation:**
            1. Add an implCache struct to the Server (or as a package-level variable):
               - Map from absolute file path to cachedImplEntry (implListEntry + modTime)
               - sync.RWMutex for concurrent access
               - A "valid" flag that gets set to false on invalidation
            2. In handleListImpls, check cache first:
               - If cache is valid, serve from cache
               - If cache is invalid, rebuild by scanning + parsing, then store
            3. Invalidation: Add a method InvalidateImplCache() and call it from:
               - startIMPLWatcher when filesystem changes are detected (in the debounced
                 callback if Agent B's debounce is merged, or directly on fsnotify events)
               - handleDeleteImpl after removing a file
               - handleArchiveImpl after moving a file
            4. Use os.Stat modTime as staleness check: even when cache is "valid",
               compare file modTime to skip re-parsing unchanged files during rebuild.

            **Verification gate:**
            ```
            cd /Users/dayna.blackwell/code/scout-and-wave-web && go build ./... && go vet ./...
            ```

            **Constraints:**
            - Do NOT modify handleGetImpl — it loads full manifests and should not be cached
            - The isExecuting field must still be computed live (from activeRuns/mergingRuns/
              testingRuns sync.Maps) — do not cache execution status
            - Keep findImplPath unchanged
            - Cache invalidation must be safe for concurrent access
          files:
            - pkg/api/impl.go
        - id: D
          task: |
            ## Consolidate direct fetch() calls into SawClient

            **What to implement:**
            Migrate all remaining direct fetch() calls to use the sawClient singleton
            from web/src/lib/apiClient.ts. The SawClient interface already has methods
