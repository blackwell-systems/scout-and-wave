title: Comprehensive Webapp Optimization
feature_slug: webapp-optimization
verdict: SUITABLE
suitability_assessment: |
    Suitability gate analysis:

    1. File decomposition: 11 findings map to ~15 distinct files across frontend (TypeScript/React)
       and backend (Go). Work decomposes cleanly into 7 agents with disjoint file ownership.
       No two agents need conflicting modifications to the same file.

    2. Investigation-first items: None. All optimization targets are identified with specific
       file locations and line numbers. No unknown root causes.

    3. Interface discoverability: All cross-agent interfaces are known. SawClient interface
       already exists at web/src/lib/apiClient.ts. The models state consolidation in App.tsx
       has a clear target shape (already defined in AppContext.tsx). No ambiguity.

    4. Pre-implementation status check: AppContext already has a consolidated models object
       (lines 17-19). App.tsx still maintains 6 separate useState calls that duplicate this.
       SawClient already has methods for critic-review, run-critic, getRaw, saveRaw — but
       components still use direct fetch() instead. react-syntax-highlighter is imported only
       in MarkdownContent.tsx.

    5. Parallelization value: 7 agents across 2 waves. Build/test cycle (tsc + vite build +
       go build) takes >30s. Each agent touches 1-3 files. High parallelization value.

    Estimated times:
    - Scout phase: ~8 min
    - Agent execution: ~15 min (7 agents, ~8 min avg, 2 waves with parallelism)
    - Merge & verification: ~5 min
    Total SAW time: ~28 min

    Sequential baseline: ~56 min (7 agents x 8 min avg)
    Time savings: ~28 min (50% faster)

    Recommendation: Clear speedup. Proceed.
test_command: cd web && npx vitest run
lint_command: cd web && npx tsc --noEmit
