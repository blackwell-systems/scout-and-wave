interface_contracts:
    - name: StripUnknownKeys
      description: |
        New function in SDK that removes unknown top-level YAML keys from a
        manifest's raw YAML, returning the cleaned bytes and a list of stripped keys.
        Used by validate --fix to auto-strip keys that aren't in the schema.
      definition: |
        func StripUnknownKeys(yamlData []byte) (cleaned []byte, stripped []string, err error)
      location: pkg/protocol/schema_unknown_keys.go
    - name: DependencyGraphPanel fallback props
      description: |
        DependencyGraphPanel gains an optional impl prop (waves + file_ownership)
        so it can build a visual graph from structured data when dep_graph text is empty.
      definition: |
        interface DependencyGraphPanelProps {
          dependencyGraphText?: string
          impl?: { waves: WaveInfo[]; file_ownership: FileOwnershipEntry[] }
          executionState?: ExecutionSyncState
        }
      location: web/src/components/review/DependencyGraphPanel.tsx
    - name: knownKeys map update
      description: |
        The knownKeys["top"] map in schema_unknown_keys.go must include
        integration_connectors and integration_reports to match types.go.
        The knownKeys["quality_gate"] map must include repo.
      definition: |
        // Add to knownKeys["top"]:
        "integration_connectors": true,
        "integration_reports":    true,
        // Add to knownKeys["quality_gate"]:
        "repo": true,
      location: pkg/protocol/schema_unknown_keys.go
waves:
    - number: 1
      agents:
        - id: A
          task: |
            ## What to Implement
            Update the Scout agent prompt to prevent generation of invalid IMPL schema keys
            (Gap 1 and Gap 5).

            Two changes to `implementations/claude-code/prompts/agents/scout.md`:

            1. **Gap 5: Add valid schema key reference.** In the YAML Manifest Structure
               section (near the top of the prompt where the schema is defined), add a
               comment block listing ALL valid top-level YAML keys. Use this exact list
               derived from pkg/protocol/types.go IMPLManifest struct tags:

               ```
               # Valid top-level keys (from IMPLManifest schema):
               # title, feature_slug, verdict, suitability_assessment, test_command,
               # lint_command, file_ownership, interface_contracts, waves, quality_gates,
               # post_merge_checklist, scaffolds, completion_reports, stub_reports,
               # integration_reports, integration_connectors, pre_mortem, known_issues,
               # state, merge_state, worktrees_created_at, frozen_contracts_hash,
               # frozen_scaffolds_hash, completion_date
               ```

            2. **Gap 1: Add explicit warning.** Near the schema section or in the Rules
               section at the bottom, add a clear constraint:

               ```
               **CRITICAL: Do NOT invent YAML keys.** Only use the keys listed in the
               schema above. Unknown keys (e.g., `dep_graph`, `cascade_candidates`,
               `integration_connectors_extra`) will be flagged by E16 validation and
               may be auto-stripped by `sawtools validate --fix`.
               ```

            ## Interfaces to Implement
            No code interfaces - this is documentation only.

            ## Interfaces to Call
            None.

            ## Tests to Write
            No automated tests for prompt changes. Manual verification:
            the key list must match types.go exactly.

            ## Verification Gate
            Verify the file is valid markdown and the key list matches types.go.

            ## Constraints
            - Do NOT change any behavior of the Scout prompt beyond adding the key list
              and warning. Do not restructure sections.
            - The key list must be complete - every yaml tag from IMPLManifest must appear.
            - Keep the warning concise (2-3 sentences max).
          files:
            - implementations/claude-code/prompts/agents/scout.md
        - id: B
          task: |
            ## What to Implement
            Fix the SDK's unknown key detection and add auto-strip capability (Gap 1 partial + Gap 6 core).

            ### Part 1: Sync knownKeys map with types.go (Gap 1 root cause)
            In `pkg/protocol/schema_unknown_keys.go`, the `knownKeys["top"]` map is missing
            keys that exist in IMPLManifest:
            - Add `"integration_connectors": true`
            - Add `"integration_reports": true`

            Also `knownKeys["quality_gate"]` is missing:
            - Add `"repo": true`

            ### Part 2: Implement StripUnknownKeys function (Gap 6 core)
            Add a new exported function `StripUnknownKeys` that:
            1. Parses raw YAML bytes into a `yaml.Node` tree
            2. Walks the top-level MappingNode
            3. Removes any key-value pairs where the key is not in `knownKeys["top"]`
            4. Re-marshals the cleaned node tree back to YAML bytes
            5. Returns `(cleanedYAML []byte, strippedKeys []string, err error)`

            Implementation approach: iterate `node.Content` in reverse, removing pairs
            (key node + value node) where the key is unknown. This preserves YAML
            comments and formatting for known keys.

            ### Part 3: Tests
            Update `pkg/protocol/schema_unknown_keys_test.go`:
            - Add test that `integration_connectors` and `integration_reports` are NOT
              flagged as unknown keys
            - Add test that `quality_gate.repo` is NOT flagged
            - Add test for `StripUnknownKeys`: input YAML with 2 unknown keys, verify
              they are removed and known keys are preserved
            - Add test for `StripUnknownKeys` with no unknown keys (no-op)

            ## Interfaces to Implement
            ```go
            func StripUnknownKeys(yamlData []byte) (cleaned []byte, stripped []string, err error)
            ```

            ## Interfaces to Call
            Uses existing `knownKeys` map and `yaml.v3` package.

            ## Tests to Write
            1. TestDetectUnknownKeys_IntegrationConnectors - verify not flagged
            2. TestDetectUnknownKeys_QualityGateRepo - verify not flagged
            3. TestStripUnknownKeys_RemovesUnknown - verify strip works
            4. TestStripUnknownKeys_NoUnknown - verify no-op case

            ## Verification Gate
            ```bash
            cd /Users/dayna.blackwell/code/scout-and-wave-go && go build ./... && go vet ./... && go test ./pkg/protocol/ -run TestDetectUnknownKeys -v && go test ./pkg/protocol/ -run TestStripUnknownKeys -v
            ```

            ## Constraints
            - Do NOT remove or rename any existing functions.
            - StripUnknownKeys must only strip TOP-LEVEL unknown keys. Do not strip
              nested unknown keys (those are handled differently).
            - Preserve YAML formatting/comments for known keys as much as possible.
            - The knownKeys map must stay in sync with IMPLManifest yaml struct tags.
          files:
            - pkg/protocol/schema_unknown_keys.go
            - pkg/protocol/schema_unknown_keys_test.go
        - id: C
          task: |
            ## What to Implement
            Fix DependencyGraphPanel to build a visual graph from structured IMPL data
            when the dep_graph text block is empty (Gap 2).

            ### Changes to DependencyGraphPanel.tsx:
            1. Add optional `impl` prop with type `{ waves: WaveInfo[]; file_ownership: FileOwnershipEntry[] }`
               Import `WaveInfo` and `FileOwnershipEntry` from `../../types`.

            2. Add a new function `buildWavesFromImpl(impl)` that converts structured
               IMPL data into `ParsedWave[]` (same format `parseDependencyGraph` returns):
               - For each wave in `impl.waves`, create a `ParsedWave`
               - For each agent ID in the wave, create a `ParsedAgent` with:
                 - `letter`: the agent ID
                 - `description`: list the agent's owned files from `impl.file_ownership`
                   (filter by matching agent and wave)
                 - `dependencies`: from `impl.waves` dependency info (wave.dependencies
                   maps to prior wave agents)
                 - `wave`: the wave number

            3. Modify the empty-text fallback (line 192-203): instead of showing
               "No dependency graph", check if `impl?.waves?.length > 0`. If so,
               call `buildWavesFromImpl(impl)` and render the SVG graph with that data.
               Only show "No dependency graph" when BOTH text and impl data are absent.

            ### Changes to DependencyGraphPanel.test.tsx:
            Add tests for the fallback behavior.

            ### Changes to ReviewScreen.tsx caller:
            The caller at line 303 already has access to `impl`. Update the prop to also
            pass `impl={{ waves: impl.waves, file_ownership: impl.file_ownership }}`.
            BUT: ReviewScreen.tsx is NOT in your file ownership. Instead, document in
            your completion report that ReviewScreen.tsx needs updating to pass the
            `impl` prop. The integration agent will wire this.

            ## Interfaces to Implement
            ```typescript
            interface DependencyGraphPanelProps {
              dependencyGraphText?: string
              impl?: { waves: WaveInfo[]; file_ownership: FileOwnershipEntry[] }
              executionState?: ExecutionSyncState
            }

            function buildWavesFromImpl(impl: { waves: WaveInfo[]; file_ownership: FileOwnershipEntry[] }): ParsedWave[]
            ```

            ## Interfaces to Call
            Existing types: `WaveInfo`, `FileOwnershipEntry` from `../../types`.
            Existing internal types: `ParsedWave`, `ParsedAgent`.

            ## Tests to Write
            1. Test that when dependencyGraphText is empty but impl has waves, SVG renders
            2. Test that when both are empty, "No dependency graph" still shows
            3. Test that buildWavesFromImpl produces correct ParsedWave structure

            ## Verification Gate
            ```bash
            cd /Users/dayna.blackwell/code/scout-and-wave-web/web && npx vitest run src/components/review/DependencyGraphPanel.test.tsx
            ```

            ## Constraints
            - Do NOT modify ReviewScreen.tsx (not in your ownership).
            - The `impl` prop must be optional for backward compatibility.
            - buildWavesFromImpl is a private helper, not exported.
            - Reuse the existing SVG rendering pipeline (layoutNodes, edges, etc).
          files:
            - web/src/components/review/DependencyGraphPanel.tsx
            - web/src/components/review/DependencyGraphPanel.test.tsx
        - id: D
          task: |
            ## What to Implement
            Three fixes across web and SDK repos:

            ### Fix 1: Remove duplicate window.confirm in WaveBoard (Gap 3)
            In `web/src/components/WaveBoard.tsx`, there are TWO places where
            `onForceComplete` is wrapped with `window.confirm`:
            - Line ~379: `onForceComplete={async () => { if (window.confirm(...)) { await forceMarkComplete(slug) } }}`
            - Line ~421: Same pattern repeated

            RecoveryControlsPanel.tsx already has its own `window.confirm` in
            `handleForceComplete` (line 120). So the user sees two dialogs.

            **Fix:** Remove the `window.confirm` wrapper from BOTH `onForceComplete`
            callbacks in WaveBoard.tsx. Change them to simply:
            ```typescript
            onForceComplete={async () => { await forceMarkComplete(slug) }}
            ```

            ### Fix 2: Add git worktree prune to cleanup (Gap 4)
            After finalize-wave removes individual worktrees, stale entries can
            remain in git's worktree list. LSP and other tools still index them.

            1. In `internal/git/commands.go`, add a new function:
               ```go
               func WorktreePrune(repoPath string) error {
                   _, err := Run(repoPath, "worktree", "prune")
                   if err != nil {
                       return fmt.Errorf("git worktree prune failed: %w", err)
                   }
                   return nil
               }
               ```

            2. In `pkg/protocol/cleanup.go`, call `git.WorktreePrune(repoDir)` at the
               END of the `Cleanup` function, after all individual agent worktrees and
               branches have been processed. This is best-effort (log error but don't
               fail the cleanup).

            3. Add a test in `pkg/protocol/cleanup_test.go` that verifies WorktreePrune
               is called (or at minimum, that cleanup still works correctly).

            ## Interfaces to Implement
            ```go
            // internal/git/commands.go
            func WorktreePrune(repoPath string) error
            ```

            ## Interfaces to Call
            - `git.WorktreePrune` from `cleanup.go`
            - `git.Run` from `commands.go` (existing)

            ## Tests to Write
            1. Verify WaveBoard renders only ONE confirm dialog for force-complete
               (manual verification - component test if feasible)
            2. TestCleanup_PrunesWorktrees - verify git worktree prune is called

            ## Verification Gate
            ```bash
            cd /Users/dayna.blackwell/code/scout-and-wave-go && go build ./... && go vet ./... && go test ./pkg/protocol/ -run TestCleanup -v && go test ./internal/git/ -v
            ```

            ## Constraints
            - WorktreePrune must be best-effort in cleanup (log errors, don't fail).
            - Do NOT change RecoveryControlsPanel.tsx (keep its confirm dialog).
            - The WaveBoard fix is two specific lines - do not refactor other parts.
          files:
            - web/src/components/WaveBoard.tsx
            - pkg/protocol/cleanup.go
            - pkg/protocol/cleanup_test.go
            - internal/git/commands.go
    - number: 2
      agents:
        - id: E
          task: |
            ## What to Implement
            Wire StripUnknownKeys into the validate --fix command (Gap 6 integration).

            In `cmd/saw/validate_cmd.go`, the `--fix` flag currently only calls
            `protocol.FixGateTypes(m)`. Extend it to also strip unknown keys.

            ### Changes:
            1. After `protocol.FixGateTypes(m)`, add a call to strip unknown keys:
               ```go
               // Strip unknown top-level keys
               rawData, err := os.ReadFile(manifestPath)
               if err == nil {
                   cleaned, stripped, stripErr := protocol.StripUnknownKeys(rawData)
                   if stripErr == nil && len(stripped) > 0 {
                       if writeErr := os.WriteFile(manifestPath, cleaned, 0644); writeErr != nil {
                           return fmt.Errorf("validate --fix: failed to write stripped YAML: %w", writeErr)
                       }
                       totalFixed += len(stripped)
                       // Re-load manifest after stripping keys
                       m, err = protocol.Load(manifestPath)
                       if err != nil {
                           return fmt.Errorf("validate --fix: reload after strip: %w", err)
                       }
                   }
               }
               ```

            2. The strip must happen BEFORE the unknown key detection pass (line 65-75)
               so that stripped keys don't show up as errors in the output.

            3. Update the `--fix` flag description to mention unknown key stripping:
               `"auto-correct fixable issues (e.g. invalid gate types -> custom, unknown keys -> stripped)"`

            ## Interfaces to Implement
            No new interfaces - wiring existing ones.

            ## Interfaces to Call
            - `protocol.StripUnknownKeys(yamlData []byte) ([]byte, []string, error)` (from Agent B)
            - `protocol.FixGateTypes(m)` (existing)
            - `protocol.Load(path)` (existing)
            - `os.ReadFile`, `os.WriteFile` (stdlib)

            ## Tests to Write
            No new test file (validate_cmd.go is a CLI entry point tested via
            integration tests). Verify manually:
            ```bash
            # Create a test IMPL with an unknown key, run validate --fix, confirm it's stripped
            ```

            ## Verification Gate
            ```bash
            cd /Users/dayna.blackwell/code/scout-and-wave-go && go build ./... && go vet ./... && go build ./cmd/saw/
            ```

            ## Constraints
            - Strip MUST happen before the DetectUnknownKeys validation pass.
            - After stripping, re-load the manifest so subsequent FixGateTypes and
              validation operate on the cleaned data.
            - Log stripped keys in the JSON output (they appear in the `fixed` count).
            - Do NOT modify any other command files.
          files:
            - cmd/saw/validate_cmd.go
          dependencies:
            - B
