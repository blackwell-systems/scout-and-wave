    rows:
        - scenario: |-
            G10 phase_complete SSE event: the previousPhase capture in runInterviewLoop
            requires careful mutex sequencing. If Agent B reads previousPhase inside the
            mutex AFTER doc is already updated, the event would always show the same phase.
          likelihood: medium
          impact: low
          mitigation: |-
            The interface contract explicitly specifies the mutex sequencing order (lock,
            read doc and previousPhase, unlock, then call mgr.Answer). Agent B's task
            description makes this explicit with a numbered step sequence.
        - scenario: |-
            G4 resume endpoint route conflict: `POST /api/interview/resume` might be parsed
            by Go 1.22 ServeMux as matching `POST /api/interview/{runID}/...` patterns
            if registered in the wrong order.
          likelihood: low
          impact: medium
          mitigation: |-
            The paths have different depths (`/api/interview/resume` vs
            `/api/interview/{runID}/answer`), so no conflict exists. Agent B's task
            notes this explicitly and instructs to verify placement.
        - scenario: |-
            G9 frontend phase labels: after replacing PHASES with PHASE_KEYS/PHASE_LABELS,
            there may be additional render locations in InterviewLauncher.tsx that still
            reference the old PHASES constant.
