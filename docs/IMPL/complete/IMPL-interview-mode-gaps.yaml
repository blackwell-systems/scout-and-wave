        // Add to SawClient.interview interface:
        resume(docPath: string): Promise<{ runId: string }>

        // Implementation:
        async resume(docPath: string): Promise<{ runId: string }> {
          const r = await fetch('/api/interview/resume', {
            method: 'POST',
