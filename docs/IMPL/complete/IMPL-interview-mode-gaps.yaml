interface_contracts:
    - name: POST /api/interview/resume
      description: HTTP endpoint to resume a paused interview from a YAML doc on disk
      definition: |
        // Request body
        type InterviewResumeRequest struct {
            DocPath string `json:"doc_path"` // absolute or relative path to INTERVIEW-<slug>.yaml
        }

        // Response body (202 Accepted)
        type InterviewResumeResponse struct {
            RunID string `json:"run_id"` // new run ID; client subscribes to /api/interview/{runID}/events
        }

        // Error cases:
        // 400 Bad Request — doc_path missing or empty
        // 404 Not Found — file does not exist
        // 409 Conflict — interview already complete (status: "complete")
        // 500 Internal Server Error — failed to parse YAML or start manager
      location: pkg/api/interview_handlers.go
    - name: phase_complete SSE event payload
      description: SSE event emitted by runInterviewLoop when phase changes between answer iterations
      definition: |
        // Event name: "phase_complete"
        // Data payload:
        type PhaseCompleteEvent struct {
            Phase     string `json:"phase"`      // completed phase name, e.g. "overview"
            NextPhase string `json:"next_phase"` // upcoming phase name, e.g. "scope"
        }

        // Emitted in runInterviewLoop after run.mgr.Answer() returns, when
        // updatedDoc.Phase != doc.Phase (before the phase field on doc was updated).
        // Emit BEFORE the next "question" event.
      location: pkg/api/interview_handlers.go
