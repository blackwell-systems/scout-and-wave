        // Before: fmt.Sprintf("%x", b)  → "a1b2c3d4e5f6..."  (32 hex chars, no hyphens)
        // After: format as UUID xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx
        func newID() string {
            b := make([]byte, 16)
            _, _ = rand.Read(b)
