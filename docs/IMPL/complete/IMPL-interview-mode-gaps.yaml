            ```
            IMPORTANT: This route must be registered BEFORE any `{runID}` pattern routes to
            avoid Go 1.22+ ServeMux ambiguity. Check whether `POST /api/interview/resume`
            could conflict with `POST /api/interview/{runID}/cancel` — it won't (different
            path depth), but confirm placement is correct.

