waves:
    - number: 1
      agents:
        - id: A
          task: |
            ## What to Implement

            Create `pkg/collision/` package with AST-based type collision detection.

            **Core algorithm:**
            1. Load IMPL manifest, identify all agents in target wave
            2. For each agent, get branch name (saw/{slug}/waveN-agent-{ID} or legacy waveN-agent-{ID})
            3. Run `git diff main...branch --name-only` to get changed .go files
            4. For each changed .go file, parse AST and extract new type declarations:
               - `type Foo struct {...}`
               - `type Bar interface {...}`
               - `type Baz = OtherType` (alias)
            5. Group extracted types by package path
            6. Detect collisions: any type name appearing in 2+ agent branches within same package
            7. For each collision, suggest resolution (pick canonical agent based on alphabetical
               order or explicit heuristic)

            **Files to create:**
            - `pkg/collision/types.go` — CollisionReport, TypeCollision, TypeDeclaration structs
            - `pkg/collision/detector.go` — DetectCollisions(manifestPath, waveNum, repoPath) function
            - `pkg/collision/detector_test.go` — unit tests with mock git diffs

            ## Interface Contracts

            **Exports:**
            ```go
            // types.go
            type CollisionReport struct {
                Collisions []TypeCollision `json:"collisions"`
                Valid      bool            `json:"valid"` // false if any collisions detected
            }

            type TypeCollision struct {
                TypeName    string   `json:"type_name"`    // e.g. "RepoEntry"
                Package     string   `json:"package"`      // e.g. "pkg/service"
                Agents      []string `json:"agents"`       // e.g. ["A", "B", "C"]
                Resolution  string   `json:"resolution"`   // e.g. "Keep A, remove from B and C"
            }

            type TypeDeclaration struct {
                Name    string `json:"name"`
                Package string `json:"package"`
                Kind    string `json:"kind"` // "struct" | "interface" | "alias"
            }

            // detector.go
            func DetectCollisions(manifestPath string, waveNum int, repoPath string) (CollisionReport, error)
            ```

            **Imports:**
            - `github.com/blackwell-systems/scout-and-wave-go/pkg/protocol` (IMPLManifest loading)
            - `github.com/blackwell-systems/scout-and-wave-go/internal/git` (git diff execution)
            - `go/ast`, `go/parser`, `go/token` (AST parsing)

            ## Implementation Guidance

            **AST extraction pattern (reuse from pkg/analyzer/cascade.go):**
            ```go
            func extractTypeDecls(filePath string) ([]TypeDeclaration, error) {
                fset := token.NewFileSet()
                node, err := parser.ParseFile(fset, filePath, nil, parser.ParseComments)
                if err != nil {
                    return nil, err
                }

                var decls []TypeDeclaration
                ast.Inspect(node, func(n ast.Node) bool {
                    switch t := n.(type) {
                    case *ast.TypeSpec:
                        kind := "alias"
                        switch t.Type.(type) {
                        case *ast.StructType:
                            kind = "struct"
                        case *ast.InterfaceType:
                            kind = "interface"
                        }
                        decls = append(decls, TypeDeclaration{
                            Name:    t.Name.Name,
                            Package: node.Name.Name,
                            Kind:    kind,
                        })
                    }
                    return true
                })
                return decls, nil
            }
            ```

            **Git diff execution (reuse from internal/git):**
            ```go
            import igit "github.com/blackwell-systems/scout-and-wave-go/internal/git"

            changedFiles, err := igit.Run(repoPath, "diff", "main..."+branchName, "--name-only", "--", "*.go")
            ```

            **Branch name format detection (reuse from pkg/git/activity.go):**
            Support both legacy (`wave1-agent-A`) and slug-scoped (`saw/my-slug/wave1-agent-A`) formats.

            **Resolution heuristic:**
            For each collision, suggest keeping the type from the agent with the alphabetically
            first ID (Agent A > Agent B > Agent C). If all colliding agents are essential,
            recommend extracting to a scaffold file.

            ## Tests

            Unit tests in `detector_test.go`:
            1. No collisions — 3 agents define different types in different packages
            2. Single collision — Agents A and B both define `RepoEntry` in `pkg/service`
            3. Multi-collision — Agents A, B, C all define `SAWConfig` in same package
            4. Cross-package safety — Agent A defines `Foo` in pkg/a, Agent B defines `Foo` in pkg/b (no collision)
            5. Mixed kinds — Agent A defines `type Logger interface`, Agent B defines `type Logger struct` (collision)

            Mock git diff output using test fixtures. Do not require real git branches for unit tests.

            ## Verification Gate

            ```bash
            cd /Users/dayna.blackwell/code/scout-and-wave-go
            go build ./pkg/collision/...
            go test ./pkg/collision/...
            go vet ./pkg/collision/...
            ```

            ## Constraints

            - Follow existing AST parsing patterns from `pkg/analyzer/cascade.go`
            - Use `internal/git.Run()` for all git operations (no direct exec.Command)
            - Support both legacy and slug-scoped branch name formats
            - Sort all output slices deterministically (alphabetical by type name, then agent ID)
            - Error on unparseable Go files (do not skip silently)
          files:
            - pkg/collision/detector.go
            - pkg/collision/detector_test.go
            - pkg/collision/types.go
