            ## What to Implement

            Create `check-type-collisions` CLI command that wraps `pkg/collision.DetectCollisions`.

            **Command signature:**
            ```bash
            sawtools check-type-collisions <manifest-path> --wave N [--repo-dir PATH]
            ```

            **Output format:** JSON with structured CollisionReport
            **Exit code:** 0 if no collisions, 1 if collisions detected

            **Files to create:**
