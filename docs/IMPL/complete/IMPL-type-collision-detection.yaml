pre_mortem:
    overall_risk: low
    rows:
        - scenario: AST parsing fails on generated Go code (e.g., protobuf, gRPC stubs)
          likelihood: low
          impact: medium
          mitigation: |
            Skip unparseable files with warning, do not block finalize-wave. Log skipped
            files to collision report for manual review.
        - scenario: Git diff returns deleted files, causing file-not-found errors
          likelihood: medium
          impact: low
          mitigation: |
            Filter git diff output to only include added/modified files (exclude deleted).
            Use `git diff --diff-filter=AM` to get only additions and modifications.
        - scenario: Legacy branch format (wave1-agent-A) vs slug-scoped (saw/slug/wave1-agent-A) causes branch name mismatch
          likelihood: low
          impact: medium
          mitigation: |
            Support both formats in branch name construction. Check manifest.FeatureSlug —
            if present, use slug-scoped format; if empty, use legacy format. Reuse logic
            from pkg/git/activity.go agentBranchRe regex.
        - scenario: Type collision on private (unexported) types causes false positive
          likelihood: low
          impact: low
          mitigation: |
            Private types in the same package are legitimate — agents working in different
            files within the same package may independently define private helpers. Filter
            collisions to only flag exported types (names starting with uppercase letter).
