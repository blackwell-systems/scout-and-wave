            6. **Remove the `engine.RunSingleWave` import if it becomes unused.**

            7. **Keep waveAgentsHaveCommitsWithManifest.** Both packages need
               their own copy (unexported, different packages).

            ### Interfaces

            Consume `engine.PrepareWave()`, `engine.PrepareWaveOpts` from
            `github.com/blackwell-systems/scout-and-wave-go/pkg/engine`, and
            `orchestrator.New` from
            `github.com/blackwell-systems/scout-and-wave-go/pkg/orchestrator`.

            ### Tests

            Update `pkg/service/wave_service_test.go`:
            - Existing tests should still pass.
            - Add test verifying that PrepareWave failure causes `run_failed`
