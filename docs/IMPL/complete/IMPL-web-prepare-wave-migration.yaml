            2. **Import `orchestrator` package.** Add import for
               `github.com/blackwell-systems/scout-and-wave-go/pkg/orchestrator`.

            3. **Remove the inline PreWaveGate check.** Grep for
               `protocol.PreWaveGate` -- remove this block. PrepareWave performs
