pre_mortem:
    overall_risk: low
    rows:
        - scenario: PrepareWave fails on checks that previously were not run
          likelihood: medium
          impact: medium
          mitigation: |
            The whole point of the migration is to add these checks. If PrepareWave
            fails on a check that was previously skipped (e.g., baseline gates,
            freeze check), that is correct behavior. The SSE events will surface the
            failure reason to the user via prepare_step events. This is a feature,
            not a bug -- but it may surprise users who had waves succeeding before.
        - scenario: orchestrator.New or RunWave API mismatch
          likelihood: low
          impact: medium
          mitigation: |
            Agents now call orchestrator.New and orch.RunWave directly instead
            of going through engine.RunSingleWave. If the orchestrator package
            API changes (method signatures, import path), the build will fail
            immediately. Check the current orchestrator package API before
            writing code -- do not assume the code examples in this brief are
            exact. The examples are based on engine.RunSingleWave's implementation
            which is the canonical usage pattern.
        - scenario: SSE event ordering changes confuse frontend
          likelihood: low
          impact: medium
          mitigation: |
            New prepare_step events are emitted BEFORE the existing wave_execute
            stage events. Frontend should ignore unknown events gracefully (it
            already does for other event types). No existing events are removed
            or reordered.
        - scenario: Scaffold RunScaffold still called after PrepareWave validates scaffolds
          likelihood: medium
          impact: low
          mitigation: |
            RunScaffold (the scaffold agent) and PrepareWave's scaffold_validation
            step are different operations. Validation checks that scaffolds are
            committed; RunScaffold creates them if they are not. The correct order
            is: RunScaffold first (creates uncommitted scaffolds), then PrepareWave
            (validates they are committed). Agents must preserve RunScaffold BEFORE
            PrepareWave in the execution order.
