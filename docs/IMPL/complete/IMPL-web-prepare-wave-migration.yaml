interface_contracts:
    - name: engine.PrepareWave
      description: |
        Full wave preparation pipeline. Already exists in scout-and-wave-go.
        Web app should call this instead of reimplementing preparation steps inline.
        Returns a PrepareWaveResult with worktree paths, agent briefs, and step results.
      definition: |
        func PrepareWave(ctx context.Context, opts PrepareWaveOpts) (*PrepareWaveResult, error)

        type PrepareWaveOpts struct {
            IMPLPath    string
            RepoPath    string
            WaveNum     int
            MergeTarget string
            NoCache     bool
            OnEvent     EventCallback
        }

        type EventCallback func(step string, status string, detail string)

        type PrepareWaveResult struct {
            Wave        int                     `json:"wave"`
            Worktrees   []protocol.WorktreeInfo `json:"worktrees"`
            AgentBriefs []AgentBriefInfo        `json:"agent_briefs"`
            Steps       []StepResult            `json:"steps"`
            Success     bool                    `json:"success"`
        }

        type StepResult struct {
            Step   string      `json:"step"`
            Status string      `json:"status"`
            Detail string      `json:"detail,omitempty"`
            Data   interface{} `json:"data,omitempty"`
        }

        type AgentBriefInfo struct {
            Agent       string `json:"agent"`
            BriefPath   string `json:"brief_path"`
            BriefLength int    `json:"brief_length"`
            JournalDir  string `json:"journal_dir"`
            FilesOwned  int    `json:"files_owned"`
            Repo        string `json:"repo,omitempty"`
            MergeTarget string `json:"merge_target,omitempty"`
        }
      location: github.com/blackwell-systems/scout-and-wave-go/pkg/engine/prepare.go
    - name: engine.RunSingleWave
      description: |
        Existing function that creates worktrees and runs agents. Currently the web
        app calls this directly. After migration, engine.PrepareWave() should run
        BEFORE RunSingleWave to perform all pre-flight checks. RunSingleWave itself
        still calls protocol.CreateWorktrees internally, so PrepareWave's worktree
        creation output is informational (used for SSE events) -- RunSingleWave
        handles the actual worktree setup for the orchestrator.
      definition: |
        func RunSingleWave(ctx context.Context, opts RunWaveOpts, waveNum int, onEvent func(Event)) error

        type RunWaveOpts struct {
            IMPLPath         string
            RepoPath         string
            Slug             string
            WaveModel        string
            ScaffoldModel    string
            IntegrationModel string
        }
      location: github.com/blackwell-systems/scout-and-wave-go/pkg/engine/runner.go
waves:
    - number: 1
      agents:
        - id: A
          task: |
            ## Agent A: Replace RunSingleWave with PrepareWave + orchestrator.RunWave in wave_runner.go

            ### What to implement

            **WARNING: Line numbers in this brief may be stale.** The predecessor
            IMPL (web-engine-migration) recently modified wave_runner.go extensively,
            cutting ~320 lines from runFinalizeSteps. Grep for function names and
            patterns rather than relying on line numbers.

            Replace the `engine.RunSingleWave()` call in `runWaveLoop` in
            `pkg/api/wave_runner.go` with `engine.PrepareWave()` followed by
            direct orchestrator usage. This eliminates double worktree creation
            (PrepareWave creates worktrees, and RunSingleWave would redundantly
            create them again).

            `engine.RunSingleWave` is only 33 lines. It does 3 things:
            1. Creates an orchestrator + sets model/event publisher
            2. Calls `protocol.CreateWorktrees` (redundant -- PrepareWave does this)
            3. Calls `orch.RunWave(waveNum)`

            After migration, the flow becomes:
            ```
            RunScaffold (if needed) → PrepareWave → orchestrator.RunWave
            ```

            Instead of the current:
            ```
            RunScaffold (if needed) → RunSingleWave (which creates worktrees internally)
            ```

            **Key changes:**

            1. **Replace RunSingleWave with PrepareWave + orch.RunWave.** Inside
               the wave loop, replace the `engine.RunSingleWave()` call with:
               ```go
               // Stage: wave_prepare
               onStage("wave_prepare", StageStatusRunning, waveNum, "")
               prepResult, prepErr := engine.PrepareWave(ctx, engine.PrepareWaveOpts{
                   IMPLPath: implPath,
                   RepoPath: repoPath,
                   WaveNum:  waveNum,
                   OnEvent: func(step, status, detail string) {
                       publish("prepare_step", map[string]interface{}{
                           "slug":   slug,
                           "wave":   waveNum,
                           "step":   step,
                           "status": status,
                           "detail": detail,
                       })
                   },
               })
               if prepErr != nil {
                   onStage("wave_prepare", StageStatusFailed, waveNum, prepErr.Error())
                   publish("run_failed", map[string]string{"error": prepErr.Error()})
                   return
               }
               onStage("wave_prepare", StageStatusComplete, waveNum, "")

               // Create orchestrator and run wave (replaces RunSingleWave)
               orch, orchErr := orchestrator.New(repoPath, implPath)
               if orchErr != nil {
                   publish("run_failed", map[string]string{"error": orchErr.Error()})
                   return
               }
               if waveModel != "" {
                   orch.SetDefaultModel(waveModel)
               }
               orch.SetEventPublisher(func(ev orchestrator.OrchestratorEvent) {
                   publish(ev.Event, ev.Data)
               })
               // Feed worktree paths from PrepareWave result
               if len(prepResult.Worktrees) > 0 {
                   paths := make(map[string]string, len(prepResult.Worktrees))
                   for _, wt := range prepResult.Worktrees {
                       paths[wt.Agent] = wt.Path
                   }
                   orch.SetWorktreePaths(paths)
               }
               if err := orch.RunWave(waveNum); err != nil {
                   // ... existing error handling ...
               }
               ```

            2. **Import `orchestrator` package.** Add import for
               `github.com/blackwell-systems/scout-and-wave-go/pkg/orchestrator`.
               Check the existing imports -- it may already be imported for other
               purposes. The orchestrator.New, SetDefaultModel, SetEventPublisher,
               SetWorktreePaths, and RunWave methods are the ones you need.

            3. **Remove the inline AllScaffoldsCommitted check but preserve
               RunScaffold ordering.** The current code runs
               `protocol.AllScaffoldsCommitted(manifest)` and
               `engine.RunScaffold()` inline. PrepareWave handles scaffold
               validation. Remove the AllScaffoldsCommitted check. BUT:
               RunScaffold (creates scaffold files) MUST run BEFORE PrepareWave
               (validates scaffolds are committed). The correct order is:
               ```
               RunScaffold (if needed) → PrepareWave → orch.RunWave
               ```

            4. **Skip PrepareWave when resuming with existing agent commits.**
               The existing `waveAgentsHaveCommitsWithManifest` check detects
               when agents already have commits and skips execution. In this
               case, also skip PrepareWave -- go straight to finalization.

            5. **Remove the `engine.RunSingleWave` import if it becomes unused.**
               After replacing the call, check if RunSingleWave is still
               referenced anywhere in this file. If not, remove the import or
               let the compiler tell you.

            6. **Preserve all SSE event publishing.** The PrepareWave OnEvent
               callback emits `prepare_step` SSE events. The orchestrator event
               publisher emits existing wave execution events. Both must work.

            7. **Handle PrepareWave failure gracefully.** If PrepareWave fails,
               publish `run_failed` with the error details from
               PrepareWaveResult.Steps and return.

            ### Interfaces

            Consume `engine.PrepareWave()`, `engine.PrepareWaveOpts` from
            `github.com/blackwell-systems/scout-and-wave-go/pkg/engine`, and
            `orchestrator.New` from
            `github.com/blackwell-systems/scout-and-wave-go/pkg/orchestrator`.

            ### Tests

            Update `pkg/api/wave_runner_test.go`:
            - Existing tests should still pass (PrepareWave fails early on bad
              paths, same behavior as before).
            - Add test verifying that `prepare_step` SSE events are emitted
              before wave execution events.

            ### Verification gate

            ```
            go build ./... && go vet ./... && go test ./pkg/api/ -run "TestRunWaveLoop|TestRunFinalizeSteps" -count=1 -v
            ```

            ### Constraints

            - Do NOT modify any files in `pkg/service/` -- that is Agent B's scope.
            - Do NOT change SSE event names or payload shapes for existing events.
            - Do NOT modify `stage_state.go` -- it is outside your file list.
            - Keep `waveAgentsHaveCommitsWithManifest` -- both packages need it.
            - The `runFinalizeSteps` function is NOT affected by this migration.
          files:
            - pkg/api/wave_runner.go
            - pkg/api/wave_runner_test.go
