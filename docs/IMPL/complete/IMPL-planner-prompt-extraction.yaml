interface_contracts:
    - name: Dedup marker format (planner)
      description: |
        HTML comment markers wrapping injected reference content. Used by
        validate_agent_launch hook to avoid double-injection.
      definition: |
        Format: <!-- injected: references/planner-{name}.md -->
        Where {name} is one of: suitability-gate, implementation-process,
        example-manifest

        The hook checks the agent prompt for these markers before injecting.
        The planner.md core file instructs: "skip reading reference if marker
        already in context."
      location: implementations/claude-code/hooks/validate_agent_launch
    - name: Reference file back-link header (planner)
      description: |
        Each extracted reference file begins with a back-link comment.
      definition: |
        First line of each reference file:
        <!-- Part of planner agent procedure. Loaded by validate_agent_launch hook. -->
      location: implementations/claude-code/prompts/references/
    - name: Planner core reference loading block
      description: |
        Block in slim planner.md that instructs the agent about reference files
        and dedup behavior.
      definition: |
        ## Reference Files

        The following reference files contain detailed procedure steps. They are
        normally injected by the validate_agent_launch hook before this prompt
        is delivered. If you see `<!-- injected: references/planner-X.md -->`
        markers in your context, the content is already loaded — do not re-read
        those files.

        If the markers are absent (e.g., hook not installed), read these files:
        - `${CLAUDE_SKILL_DIR}/references/planner-suitability-gate.md` — The
          4-question program suitability gate with verdicts and time estimate format.
          Always required.
        - `${CLAUDE_SKILL_DIR}/references/planner-implementation-process.md` —
          Steps 1-10 for analyzing the project and producing the PROGRAM manifest.
          Always required.
        - `${CLAUDE_SKILL_DIR}/references/planner-example-manifest.md` — A complete
          annotated example PROGRAM manifest for a fictional project. Always required.
      location: implementations/claude-code/prompts/agents/planner.md
    - name: Hook injection for planner subagent_type
      description: |
        New check in validate_agent_launch that detects planner agent launches
        and injects all three reference files via updatedInput.prompt.
        All three files are always injected — no conditional injection.
      definition: |
        Detection: If description contains "[SAW:planner" OR tool_input contains
        "subagent_type: planner" OR prompt contains
        "# Planner Agent: Project-Level Decomposition":

        1. Resolve reference directory
        2. Always inject: planner-suitability-gate.md, planner-implementation-process.md,
           planner-example-manifest.md
        3. Dedup: skip injection if <!-- injected: references/planner-X.md --> already in prompt
        4. Output: JSON using updatedInput to prepend injected content into the
           agent's prompt parameter:
           {"hookSpecificOutput": {"hookEventName": "PreToolUse",
            "permissionDecision": "allow",
            "updatedInput": {"prompt": "<injected>\n\n<orig>"}}}
      location: implementations/claude-code/hooks/validate_agent_launch
