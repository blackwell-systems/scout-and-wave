            ## What to implement

            Modify SIX files to complete the hook-enforced context injection for
            planner agent launches.

            **Important context:** The scout, wave-agent, and critic-agent extraction
            IMPLs are running in parallel with this IMPL. When you read
            validate_agent_launch, it may already have additional checks (up to Check
            11). Either way, add the planner injection as the NEXT check after whatever
