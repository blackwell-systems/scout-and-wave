suitability_assessment: |
    File decomposition: 6 distinct files across 4 agents with disjoint ownership.
    Three new reference files (extract from planner.md), one modified core prompt
    (planner.md slim-down), one modified hook (validate_agent_launch), and
    4 doc updates.

    Investigation-first: None. Extraction boundaries are precisely defined with
    line ranges from the current planner.md (551 lines).

    Interface discoverability: Yes. Uses the exact same pattern as
    IMPL-scout-prompt-extraction as blueprint.

    Pre-implementation status: Fresh feature, nothing implemented yet.

    Parallelization value: Same extraction pattern. Wave 1 agents A/B/C work in
    parallel with fully disjoint file ownership. Wave 2 Agent D wires the hook
    and updates docs.

    Estimated times:
    - Agent execution: ~8 min (3 wave 1 agents + 1 wave 2 agent, ~5 min avg)
    - Merge & verification: ~2 min
    Total SAW time: ~10 min

    Note: All three planner reference files are always-injected — no conditional
    injection (unlike scout's --program or wave-agent's frozen contracts).
