pre_mortem:
    overall_risk: medium
    rows:
        - scenario: Generic type compile errors in Go 1.18+ (type parameter constraints, instantiation failures)
          likelihood: low
          impact: high
          mitigation: Agent A tests with multiple concrete types (Result[string], Result[int], Result[struct]) to verify generics work correctly. All Wave 2 agents test with actual data types from their domains.
        - scenario: Breaking change cascade - consumers of Result types exist outside SDK/CLI/web (external importers)
          likelihood: medium
          impact: high
          mitigation: This is internal refactor only (scout-and-wave-go is not yet v1.0). Document breaking change in CHANGELOG. Consider deprecation warnings if external consumers detected.
        - scenario: JSON serialization issues - Result[T] doesn't marshal/unmarshal correctly
          likelihood: low
          impact: medium
          mitigation: Agent A includes comprehensive JSON marshal/unmarshal tests. Web API handlers (V-Z) test full request/response cycle.
        - scenario: Wave 2 agent conflicts - 18 agents modifying pkg/protocol may create merge conflicts
          likelihood: medium
          impact: medium
          mitigation: File ownership is disjoint (18 different files). No conflicts expected. If agents touch shared types (WorktreeInfo, GateResult), extract to separate file in Wave 1.
        - scenario: GetData() panic in production - callers forget to check IsSuccess() first
          likelihood: medium
          impact: medium
          mitigation: Add panic recovery in GetData() with helpful error message ("GetData called on failed Result - check IsSuccess() first"). Document requirement in godoc.
        - scenario: Test failures in Wave 3 - CLI/API tests break due to Result[T] changes
          likelihood: high
          impact: low
          mitigation: Expected. Wave 3 agents responsible for fixing their tests. Agents should update test assertions from error-checking pattern to IsSuccess() pattern.
