            Create the unified `Result[T]` generic type in `pkg/result/result.go` with complete implementation.

            ## Implementation Requirements

            1. **Create pkg/result/result.go:**
               - Define `Result[T any]` struct with fields: Data *T, Errors []StructuredError, Code string
               - Define `StructuredError` struct matching interface contract exactly
               - Implement methods: IsSuccess(), IsFatal(), IsPartial(), HasErrors(), GetData()
               - Implement constructors: NewSuccess[T], NewPartial[T], NewFailure[T]
               - Add package documentation explaining the unification rationale

            2. **Create pkg/result/result_test.go:**
               - Test NewSuccess: verify Data is set, Code is "SUCCESS", IsSuccess() returns true
               - Test NewPartial: verify Data + Errors both set, Code is "PARTIAL", IsPartial() returns true
               - Test NewFailure: verify Code is "FATAL", IsFatal() returns true, Data is nil
               - Test GetData panic: verify GetData() panics when Data is nil
               - Test HasErrors: verify returns true when Errors is non-empty
               - Test JSON marshaling: verify Result[T] serializes correctly to/from JSON

            ## Interface Contract

            See interface_contracts section for full Result[T] definition.

            ## Tests Required

            - Unit tests for all methods (IsSuccess, IsFatal, IsPartial, HasErrors, GetData)
            - Unit tests for all constructors (NewSuccess, NewPartial, NewFailure)
            - JSON marshal/unmarshal tests
            - GetData panic test (nil Data)
            - Generic type instantiation tests (Result[string], Result[int], Result[struct])

            ## Verification Gate

            ```bash
            cd /Users/dayna.blackwell/code/scout-and-wave-go
            gofmt -l .
            go build ./pkg/result
            go vet ./pkg/result
            go test ./pkg/result -v
            ```

            ## Constraints

            - Go 1.18+ generics syntax required (project uses Go 1.25)
            - No dependencies outside stdlib (use encoding/json for JSON tags)
            - Must be importable from all packages (no internal/ prefix)
