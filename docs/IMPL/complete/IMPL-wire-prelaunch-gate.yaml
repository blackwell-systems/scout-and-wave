pre_mortem:
    overall_risk: low
    rows:
        - scenario: |
            Agent A uses `preLaunchGate` (lowercase) instead of `PreLaunchGate` (uppercase)
            when calling the function from prepare_agent.go, causing a compile error since
            the lowercase version is being removed.
          likelihood: low
          impact: high
          mitigation: |
            Brief explicitly states: rename the function definition AND update all 15 call
            sites in the test file. Postcondition (b) checks that the lowercase version
            no longer exists in prelaunch_gate.go.
        - scenario: |
            Agent B calls hooks.PreLaunchGate before Agent A has exported it, causing
            Agent B's branch to fail to compile in isolation.
          likelihood: low
          impact: medium
          mitigation: |
            Both agents are in Wave 1 (parallel). Each agent's worktree compiles
            independently. Agent B's compile will fail until merged with Agent A's changes.
            Mitigation: Agent B should verify the exported symbol is expected to exist
            post-merge. The merge ordering matters: A must merge before B, or both
            branches must be merged together. The orchestrator handles merge order.
            If Agent B's tests fail to compile in isolation, that is acceptable —
            the finalize-wave step runs tests on the merged result.
        - scenario: |
            The gate check for worktree_branch (check 4) uses wtInfo.Path which is the
            actual git worktree directory. If the worktree branch name doesn't match
            the expected saw/{slug}/wave{N}-agent-{ID} pattern, all PrepareWave calls
            will fail with a gate error even when the worktree was legitimately created.
          likelihood: medium
          impact: high
          mitigation: |
            The checkWorktreeBranch function already handles both the full
            saw/{slug}/wave{N}-agent-{ID} pattern and the legacy wave{N}-agent-{ID}
            pattern. PrepareWave creates worktrees via protocol.CreateWorktrees which
            always uses one of these patterns. The risk is low in practice.
            Brief makes it explicit: use wtInfo.Path (the actual worktree path),
            not "". If the check incorrectly blocks, the error message includes the
            actual branch name and both expected patterns, making diagnosis easy.
        - scenario: |
            Agent A adds a `wtPath` local variable in PrepareAgent that shadows or
            conflicts with an existing variable name in the function scope.
          likelihood: low
          impact: low
          mitigation: |
            PrepareAgent (prepare_agent.go) does not have a local variable named
            wtPath in its current scope. Brief specifies `wtPath := ""` as a new
            local variable declaration. No shadowing risk.
        - scenario: |
            The E37 critic check inside preLaunchGate fires for small manifests
            that don't require a critic review, incorrectly blocking PrepareAgent
            for common solo-agent workflows.
          likelihood: low
          impact: high
          mitigation: |
            checkCriticReviewRequired already calls protocol.E37Required(m) before
            requiring a report, which only triggers for 3+ wave-1 agents or 2+ repos.
            Solo waves (1 agent, 1 repo) will pass this check. The existing test
            TestPreLaunchGate_AllPass with a 2-agent manifest verifies this passes.
