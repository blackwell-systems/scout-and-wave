waves:
    - number: 1
      agents:
        - id: A
          task: |-
            ## Overview

            Fix quality gates with `repo:` fields so they execute in the correct repo
            directory instead of being silently skipped when the primary `repoDir` is a
            docs-only repo.

            **The bug:** In `pkg/protocol/gates.go`, both the internal gate executor and
            the cached gate executor use `gate.Repo` only to FILTER gates — a gate whose
            `gate.Repo` does not match `filepath.Base(repoDir)` is silently skipped. For
            cross-repo IMPLs where the primary repo is `scout-and-wave` (no go.mod), gates
            scoped to `scout-and-wave-go` are entirely skipped. The protocol (E21) says
            gates with `repo:` set "run only in that repo's directory" — but the
            implementation never changes the execution directory.

            **The fix:** Add a `manifestPath string` parameter to the four public/internal
            gate functions (`runGates`, `RunGatesWithCache`, `RunPreMergeGates`, `RunPostMergeGates`).
            When a gate has `repo:` set, resolve that repo's absolute path from
            `saw.config.json` (via the existing loadSAWConfigRepos helper in
            `brief_validator.go`, same package) and run the command there. When `repo:` is
            absent or `manifestPath` is empty, run in `repoDir` as before.

            ## Repo Locations

            - Go engine: `/Users/dayna.blackwell/code/scout-and-wave-go/`
            - Protocol repo: `/Users/dayna.blackwell/code/scout-and-wave/`

            ## Callers That Must Be Updated

            The signature changes cascade to these callers outside the owned files:

            1. `pkg/engine/finalize_steps.go` — the engine step that calls `protocol.RunGatesWithCache`.
               Find this exact call site:
               ```
               gateRes := protocol.RunGatesWithCache(ctx, manifest, opts.WaveNum, opts.RepoPath, cache, opts.Logger)
               ```
               Change to pass `opts.IMPLPath` as the new fifth argument (after `opts.RepoPath`):
               ```
               gateRes := protocol.RunGatesWithCache(ctx, manifest, opts.WaveNum, opts.RepoPath, opts.IMPLPath, cache, opts.Logger)
               ```

            2. `cmd/sawtools/run_gates_cmd.go` — two call sites for `protocol.RunGatesWithCache`.
               The manifest path is already available as `manifestPath` (from `args[0]`).
               Find and update both occurrences.

            These files are NOT in the ownership list, but updating them is required for
            compilation. The build gate (`GOWORK=off go build ./...`) will fail if they
            are missed.

            ## Implementation Steps

            ### Step 1: Add helper functions to `gates.go`

            Add a new helper that resolves a gate's working directory, and a small helper
            for sorted map keys. Add these before the existing `runGates` function.
            Also add `"sort"` to the import block:

            Implement two functions with these bodies (see interface contracts for their signatures):

            resolveGateRepoDir body:
            ```
                if gate.Repo == "" {
                    return defaultRepoDir, ""
                }
                if p, ok := configRepos[gate.Repo]; ok {
                    return p, ""
                }
                return "", fmt.Sprintf("gate repo %q not found in saw.config.json (known repos: %v)",
                    gate.Repo, sortedMapKeys(configRepos))
            ```

            sortedMapKeys body:
            ```
                keys := make([]string, 0, len(m))
                for k := range m {
                    keys = append(keys, k)
                }
                sort.Strings(keys)
                return keys
            ```

            ### Step 2: Update `runGates`

            Current signature:
            ```
            func runGates(ctx context.Context, manifest *IMPLManifest, waveNumber int, repoDir string, logger *slog.Logger) result.Result[GatesData] {
            ```
            New signature (add `manifestPath string` before `logger`):
            ```
            func runGates(ctx context.Context, manifest *IMPLManifest, waveNumber int, repoDir string, manifestPath string, logger *slog.Logger) result.Result[GatesData] {
            ```

            At the top of the function body, after the early-return nil-gates check, add:
            ```go
            var configRepos map[string]string
            if manifestPath != "" {
                configRepos = loadSAWConfigRepos(filepath.Dir(manifestPath))
            } else {
                configRepos = make(map[string]string)
            }
            ```

            Remove this existing filter block (it appears once in the per-gate loop):
            ```
            // Skip gates scoped to a different repo.
            if gate.Repo != "" && gate.Repo != repoName {
                continue
            }
            ```
            Remove `repoName := filepath.Base(repoDir)` since it is no longer used.

            After the removal, add gate-directory resolution at the top of the per-gate loop
            (before the docs-only and build-system checks):
            ```go
            runDir, dirErr := resolveGateRepoDir(gate, repoDir, configRepos)
            if dirErr != "" {
                gates = append(gates, GateResult{
                    Type:     gate.Type,
                    Command:  gate.Command,
                    Required: gate.Required,
                    Passed:   false,
                    Stderr:   dirErr,
                })
                continue
            }
            ```

            Then update every repoDir reference in the loop body to runDir (the resolved gate directory):
            - detectBuildSystems(repoDir) → detectBuildSystems(runDir)
            - runFormatGate(ctx, gate, repoDir, ...) → runFormatGate(ctx, gate, runDir, ...)
            - cmd.Dir = repoDir → cmd.Dir = runDir

            ### Step 3: Update `RunGatesWithCache`

            Current signature:
            ```
            func RunGatesWithCache(ctx context.Context, manifest *IMPLManifest, waveNumber int, repoDir string, cache *gatecache.Cache, logger *slog.Logger) result.Result[GatesData] {
            ```
            New signature:
            ```
            func RunGatesWithCache(ctx context.Context, manifest *IMPLManifest, waveNumber int, repoDir string, manifestPath string, cache *gatecache.Cache, logger *slog.Logger) result.Result[GatesData] {
            ```

            When `cache == nil`, the function delegates to `runGates`. Update that call to
            pass `manifestPath`:
            ```
            return runGates(ctx, manifest, waveNumber, repoDir, manifestPath, logger)
            ```

            For the cached path, add the same configRepos loading block, then remove the
            existing repo filter:
            ```
            // Skip gates scoped to a different repo
            if gate.Repo != "" && gate.Repo != repoName {
                continue
            }
            ```
            Remove `repoName := filepath.Base(repoDir)` if no longer used.

            In the per-group sequential execution loop, resolve the gate directory:
            ```go
            for _, gate := range activeGates {
                runDir, dirErr := resolveGateRepoDir(gate, repoDir, configRepos)
                if dirErr != "" {
                    groupResults = append(groupResults, GateResult{
                        Type: gate.Type, Command: gate.Command,
                        Required: gate.Required, Passed: false, Stderr: dirErr,
                    })
                    continue
                }
                gateResult := executeSingleGate(ctx, gate, runDir, cache, logger)
                groupResults = append(groupResults, gateResult)
            }
            ```

            For the concurrent case, resolve all dirs before launching goroutines:
            ```go
            resolvedDirs := make([]string, len(activeGates))
            dirErrors := make([]string, len(activeGates))
            for i, g := range activeGates {
                resolvedDirs[i], dirErrors[i] = resolveGateRepoDir(g, repoDir, configRepos)
            }
            ```
            Then inside the goroutine body: use `resolvedDirs[idx]` for `executeSingleGate`.
            If `dirErrors[idx] != ""`, append a failed GateResult without calling `executeSingleGate`.

            ### Step 4: Update `RunPreMergeGates` and `RunPostMergeGates`

            Both functions need the same parameter added. Update their signatures and thread
            `manifestPath` through to `RunGatesWithCache` and `runGates` respectively.

            In `RunPreMergeGates`, find:
            ```
            return RunGatesWithCache(ctx, &tmp, waveNumber, repoDir, cache, logger)
            ```
            Change to:
            ```
            return RunGatesWithCache(ctx, &tmp, waveNumber, repoDir, manifestPath, cache, logger)
            ```

            In `RunPostMergeGates`, find:
            ```
            return runGates(ctx, &tmp, waveNumber, repoDir, logger)
            ```
            Change to:
            ```
            return runGates(ctx, &tmp, waveNumber, repoDir, manifestPath, logger)
            ```

            ### Step 5: Fix `VerifyBuild` in `verify_build.go`

            `VerifyBuild` has its own gate-selection block that picks test/lint commands
            from quality gates but discards the `gate.Repo` field. Fix it to capture the
            repo name and resolve the directory.

            Find this exact block:
            ```
            testCmd := manifest.TestCommand
            lintCmd := manifest.LintCommand
            if manifest.QualityGates != nil {
            	for _, gate := range manifest.QualityGates.Gates {
            		if gate.Type == "test" && gate.Command != "" && testCmd == manifest.TestCommand {
            			testCmd = gate.Command
            		}
            		if gate.Type == "lint" && gate.Command != "" && lintCmd == manifest.LintCommand {
            			lintCmd = gate.Command
            		}
            	}
            }
            ```

            Replace with:
            ```go
            testCmd := manifest.TestCommand
            lintCmd := manifest.LintCommand
            testGateRepo := ""
            lintGateRepo := ""
            if manifest.QualityGates != nil {
                for _, gate := range manifest.QualityGates.Gates {
                    if gate.Type == "test" && gate.Command != "" && testCmd == manifest.TestCommand {
                        testCmd = gate.Command
                        testGateRepo = gate.Repo
                    }
                    if gate.Type == "lint" && gate.Command != "" && lintCmd == manifest.LintCommand {
                        lintCmd = gate.Command
                        lintGateRepo = gate.Repo
                    }
                }
            }
            configRepos := loadSAWConfigRepos(filepath.Dir(manifestPath))
            testDir := repoDir
            if testGateRepo != "" {
                if p, ok := configRepos[testGateRepo]; ok {
                    testDir = p
                }
            }
            lintDir := repoDir
            if lintGateRepo != "" {
                if p, ok := configRepos[lintGateRepo]; ok {
                    lintDir = p
                }
            }
            ```

            Then update the two runCommand call sites to use testDir/lintDir
            and update commandApplies checks the same way:
            ```go
            if isRealCommand(testCmd) && commandApplies(testCmd, testDir) {
                testPassed, testOutput := runCommand(ctx, testCmd, testDir)
                ...
            }
            if isRealCommand(lintCmd) && commandApplies(lintCmd, lintDir) {
                lintPassed, lintOutput := runCommand(ctx, lintCmd, lintDir)
                ...
            }
            ```

            Note: loadSAWConfigRepos is already in brief_validator.go in the same
            `protocol` package. Call it directly — no import needed.

            ### Step 6: Add tests in `gates_test.go`

            Append two new test functions after the existing test functions.

            The first test (name it TestRunGates_CrossRepoRouting) verifies a gate runs in
            the named repo dir, not the primary repoDir. Use a sentinel file present only
            in the target repo:

            ```go
            func TestRunGates_CrossRepoRouting(t *testing.T) {
                tmpDir := t.TempDir()
                primaryRepo := filepath.Join(tmpDir, "primary-repo")
                targetRepo := filepath.Join(tmpDir, "target-repo")
                os.MkdirAll(primaryRepo, 0755)
                os.MkdirAll(targetRepo, 0755)
                os.WriteFile(filepath.Join(targetRepo, "sentinel.txt"), []byte("here"), 0644)

                configJSON := `{"repos":[{"name":"target-repo","path":"` + targetRepo + `"}]}`
                os.WriteFile(filepath.Join(tmpDir, "saw.config.json"), []byte(configJSON), 0644)
                manifestPath := filepath.Join(tmpDir, "IMPL.yaml")

                manifest := &IMPLManifest{
                    QualityGates: &QualityGates{
                        Level: "quick",
                        Gates: []QualityGate{
                            {Type: "test", Command: "test -f sentinel.txt", Required: true, Repo: "target-repo"},
                        },
                    },
                }
                res := runGates(context.Background(), manifest, 1, primaryRepo, manifestPath, nil)
                if !res.IsSuccess() {
                    t.Fatalf("runGates returned error: %v", res.Errors)
                }
                data := res.GetData()
                if len(data.Gates) != 1 {
                    t.Fatalf("expected 1 gate, got %d", len(data.Gates))
                }
                if !data.Gates[0].Passed {
                    t.Errorf("gate should pass (ran in targetRepo with sentinel), stderr: %s", data.Gates[0].Stderr)
                }
            }
            ```

            The second test (name it TestRunGates_CrossRepoUnknownRepo) verifies an unknown
            repo name surfaces as a failed gate with a descriptive error:

            ```go
            func TestRunGates_CrossRepoUnknownRepo(t *testing.T) {
                tmpDir := t.TempDir()
                primaryRepo := filepath.Join(tmpDir, "primary-repo")
                os.MkdirAll(primaryRepo, 0755)
                manifestPath := filepath.Join(tmpDir, "IMPL.yaml")

                manifest := &IMPLManifest{
                    QualityGates: &QualityGates{
                        Level: "quick",
                        Gates: []QualityGate{
                            {Type: "test", Command: "echo ok", Required: true, Repo: "unknown-repo"},
                        },
                    },
                }
                res := runGates(context.Background(), manifest, 1, primaryRepo, manifestPath, nil)
                if !res.IsSuccess() {
                    t.Fatalf("runGates should return success (gate failures are in GateResult)")
                }
                data := res.GetData()
                if len(data.Gates) != 1 {
                    t.Fatalf("expected 1 gate, got %d", len(data.Gates))
                }
                if data.Gates[0].Passed {
                    t.Errorf("gate should fail for unknown repo")
                }
                if data.Gates[0].Stderr == "" {
                    t.Errorf("expected error message in Stderr, got empty string")
                }
            }
            ```

            ### Step 7: Add test in `verify_build_test.go`

            Append a new test function (name it TestVerifyBuild_CrossRepoGateRouting).
            The test verifies that when a quality gate has `repo:` set, `VerifyBuild`
