pre_mortem:
    overall_risk: low
    rows:
        - scenario: |-
            Signature changes to RunGatesWithCache, RunPreMergeGates, RunPostMergeGates,
            and runGates break callers in finalize_steps.go and run_gates_cmd.go.
            Agent may forget to update these files.
          likelihood: medium
          impact: high
          mitigation: |-
            The task prompt explicitly names both caller files and the exact call sites
            to update. The build gate (GOWORK=off go build ./...) will fail immediately
            if any caller is missed, before any tests run.
        - scenario: |-
            Agent removes the repo-name filter but omits the routing logic, causing all
            gates to run in repoDir regardless of the repo: field. Single-repo tests pass
            but cross-repo behavior is broken.
          likelihood: low
          impact: medium
          mitigation: |-
            The cross-repo routing test catches this: the sentinel file exists only in
            the target repo, so if routing is absent the gate fails in primaryRepo.
        - scenario: |-
            Agent adds manifestPath to RunGatesWithCache but misses RunPreMergeGates or
            RunPostMergeGates, causing a compilation error.
          likelihood: low
          impact: medium
          mitigation: |-
            go build ./... catches this immediately. All four functions are named in the
            task. The instructions are structured to update all four before moving to callers.
