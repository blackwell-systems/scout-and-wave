            ```go
            func TestVerifyBuild_CrossRepoGateRouting(t *testing.T) {
                tmpDir := t.TempDir()
                primaryRepo := filepath.Join(tmpDir, "primary-repo")
                targetRepo := filepath.Join(tmpDir, "target-repo")
                os.MkdirAll(primaryRepo, 0755)
                os.MkdirAll(targetRepo, 0755)
                os.WriteFile(filepath.Join(targetRepo, "sentinel.txt"), []byte("here"), 0644)

                configJSON := `{"repos":[{"name":"target-repo","path":"` + targetRepo + `"}]}`
                os.WriteFile(filepath.Join(tmpDir, "saw.config.json"), []byte(configJSON), 0644)
                manifestPath := filepath.Join(tmpDir, "IMPL.yaml")

                manifestContent := `
            title: "Test"
            feature_slug: "test"
            verdict: "SUITABLE"
            test_command: "false"
            lint_command: "true"
            file_ownership: []
            waves: []
            quality_gates:
              level: quick
              gates:
                - type: test
                  command: "test -f sentinel.txt"
                  required: true
                  repo: target-repo
            `
                os.WriteFile(manifestPath, []byte(manifestContent), 0644)

                res := VerifyBuild(context.Background(), manifestPath, primaryRepo)
                if !res.IsSuccess() {
                    t.Fatalf("VerifyBuild returned error: %v", res.Errors)
                }
                data := res.GetData()
                if !data.TestPassed {
                    t.Errorf("TestPassed should be true (gate ran in targetRepo); output: %s", data.TestOutput)
                }
            }
            ```

            ### Step 8: Update execution-rules.md

            File: `/Users/dayna.blackwell/code/scout-and-wave/protocol/execution-rules.md`

            Find this exact paragraph (search for "Cross-repo gate scoping"):
            ```
            **Cross-repo gate scoping:** Each `QualityGate` has an optional `repo` field. When set, the gate runs only in that repo's directory. When omitted, the gate runs in every repo the IMPL touches. For cross-repo IMPLs (file_ownership spans 2+ repos), every gate MUST include `repo:` — a docs-only repo has no build system and `go build ./...` will fail. The validator enforces this: `MR02_UNSCOPED_GATE` blocks IMPLs with 2+ repos and un-scoped gates at validation time (E16).
            ```

            Replace with:
            ```
            **Cross-repo gate scoping and routing:** Each `QualityGate` has an optional `repo` field. When `repo:` is set, the engine resolves that repo's absolute path from `saw.config.json` (walking up from the IMPL manifest directory) and executes the gate command in that directory. When `repo:` is omitted, the gate runs in the primary `repoDir` passed to `finalize-wave`. For cross-repo IMPLs (file_ownership spans 2+ repos), every gate MUST include `repo:` — a docs-only repo has no build system and `go build ./...` will fail. The validator enforces this: MR02_UNSCOPED_GATE blocks IMPLs with 2+ repos and un-scoped gates at validation time (E16). If a gate's `repo:` value is not found in `saw.config.json`, the gate fails immediately with an error message listing the known repo names.
            ```

            ## Constraints

