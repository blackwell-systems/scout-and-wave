title: Fix finalize-wave gate routing for cross-repo quality gates
feature_slug: finalize-wave-gate-routing
verdict: SUITABLE
suitability_assessment: |-
    All changes are in pkg/protocol/{gates.go,verify_build.go} and their test files.
    Single agent, 4 Go files plus one markdown update, no cross-agent interfaces needed.
    The fix is well-scoped: add a manifest path parameter to gate execution functions
    so they can resolve repo: field entries to absolute paths via saw.config.json.

    The protocol (E21) already documents that gates with repo: set "run only in that
    repo's directory", but the implementation only filters (skips gates whose repo name
    doesn't match the current repoDir basename). The fix closes the gap between
    protocol and implementation.

    Estimated times:
    - Scout phase: ~10 min
    - Agent execution: ~15 min (1 agent, targeted changes)
    - Merge and verification: ~3 min
    Total SAW time: ~28 min

    Sequential baseline: ~20 min
    Recommendation: Marginal parallelism gain. Running via SAW for coordination
    artifact and traceability, not raw speed.
