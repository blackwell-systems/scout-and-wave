interface_contracts:
  - name: integration_map YAML schema
    description: |
      New top-level section in IMPL manifest that maps exports to their expected
      callsites. Scout produces this during analysis; validation tools consume it.
    definition: |
      # YAML structure added to IMPL manifest
      integration_map:
        - export: "function or type name"
          export_location: "path/to/defining/file.go"
          export_type: "function" | "type" | "interface" | "middleware" | "constant"
          callsites:
            - file: "path/to/caller/file.go"
              function: "callingFunction()"  # optional, for precision
              action: "modify"
              wave: 2
              status: "existing" | "todo" | "planned"
              note: "Why this callsite is required"  # optional

      Field definitions:
      - export: Name of the exported symbol (function, type, etc.)
      - export_location: File where the export is defined
      - export_type: Category of export
      - callsites: Array of locations where the export must be called/referenced
      - callsites[].file: Path to file that must reference the export
      - callsites[].function: Optional specific function containing the callsite
      - callsites[].action: Always "modify" (callsite file must be updated)
      - callsites[].wave: Which wave creates/modifies this callsite
      - callsites[].status: Implementation status
        - "existing": Already implemented
        - "todo": Must be implemented in specified wave
        - "planned": Will be implemented in future wave
      - callsites[].note: Optional explanation
    location: protocol/scout-agent.md

  - name: IntegrationCheckResult struct
    description: |
      Go struct returned by integration_check command and engine function.
      Contains per-export verification status and detected gaps.
    definition: |
      package protocol

      // IntegrationGap represents a missing integration callsite.
      type IntegrationGap struct {
          Export         string   `json:"export" yaml:"export"`
          ExportLocation string   `json:"export_location" yaml:"export_location"`
          ExportType     string   `json:"export_type" yaml:"export_type"`
          MissingFile    string   `json:"missing_file" yaml:"missing_file"`
          ExpectedFunc   string   `json:"expected_function,omitempty" yaml:"expected_function,omitempty"`
          Wave           int      `json:"wave" yaml:"wave"`
          Severity       string   `json:"severity" yaml:"severity"` // "critical", "warning", "info"
          Reason         string   `json:"reason" yaml:"reason"`
      }

      // IntegrationVerified represents a successfully verified callsite.
      type IntegrationVerified struct {
          Export   string `json:"export" yaml:"export"`
          File     string `json:"file" yaml:"file"`
          Function string `json:"function,omitempty" yaml:"function,omitempty"`
          Line     int    `json:"line,omitempty" yaml:"line,omitempty"`
      }

      // IntegrationCheckResult is the result of integration_check validation.
      type IntegrationCheckResult struct {
          TotalExports int                    `json:"total_exports" yaml:"total_exports"`
          TotalSites   int                    `json:"total_callsites" yaml:"total_callsites"`
          Verified     []IntegrationVerified  `json:"verified" yaml:"verified"`
          Gaps         []IntegrationGap       `json:"gaps" yaml:"gaps"`
          Summary      string                 `json:"summary" yaml:"summary"`
      }
    location: pkg/protocol/integration_map.go

  - name: sawtools integration-check command
    description: |
      CLI command that reads an IMPL doc, parses its integration_map, and verifies
      all expected callsites exist in the codebase. Runs as a post-merge gate.
    definition: |
      # Command signature
      sawtools integration-check <impl-doc-path> [flags]

      # Flags
      --repo-root <path>     Repository root (default: auto-detect from IMPL path)
      --format <json|text>   Output format (default: text)
      --severity <level>     Minimum severity to report (critical|warning|info, default: warning)

      # Exit codes
      0 - All callsites verified OR only info-level gaps
      1 - Critical or warning gaps detected
      2 - Invalid IMPL doc or parsing error

      # Output (text format)
      Integration Check: IMPL-feature-slug.yaml

      Checking 3 exports with 7 expected callsites...

      ✓ dedup.WithDedup
        ✓ pkg/agent/backend/api/client.go:91 (verified)
        ✓ pkg/agent/backend/bedrock/client.go:87 (verified)
        ✗ pkg/agent/backend/openai/client.go (NOT FOUND)
        → WARNING: Expected in buildWorkshop() function

      Summary: 2 gaps detected (0 critical, 2 warning)

      # Output (json format)
      {
        "total_exports": 3,
        "total_callsites": 7,
        "verified": [{"export": "dedup.WithDedup", "file": "...", "line": 91}],
        "gaps": [{"export": "dedup.WithDedup", "missing_file": "...", "severity": "warning"}],
        "summary": "2 gaps detected (0 critical, 2 warning)"
      }
    location: cmd/saw/integration_check_cmd.go

  - name: engine.CheckIntegration function
    description: |
      SDK function for programmatic integration checking. Used by web API and
      custom orchestration scripts. Returns structured result.
    definition: |
      package engine

      import "github.com/blackwell-systems/scout-and-wave-go/pkg/protocol"

      // CheckIntegration validates integration_map entries against the codebase.
      // Returns nil error if validation completes (gaps are reported in result.Gaps,
      // not as errors). Only returns error if IMPL doc cannot be parsed or repo
      // operations fail.
      func CheckIntegration(implPath string, repoRoot string) (*protocol.IntegrationCheckResult, error)

      // Severity classification heuristics:
      // - critical: export_type "function" with name matching Register*, Init*, Build*
      //             and status "todo" for current/past wave
      // - warning: export_type "function" with status "todo", other naming patterns
      // - info: export_type "type" or "interface" with no callers yet
    location: pkg/engine/integration_check.go

