          ## Go SDK: Integration Map Types and Parser

          **Objective**: Define Go types for integration_map and implement parsing/validation logic.

          **Context**: The IMPL manifest schema (pkg/protocol/types.go) needs types for the
          integration_map section. These types support both YAML unmarshaling (from IMPL docs)
          and JSON marshaling (for CLI/API output).

          **Files to create/modify**:
          - `pkg/protocol/integration_map.go` (NEW - types + validation)
          - `pkg/protocol/integration_map_test.go` (NEW - tests)
          - `pkg/protocol/types.go` (MODIFY - add IntegrationMap field to IMPLManifest)

          **Types to define** (in integration_map.go):

          ```go
          package protocol

          // IntegrationCallsite represents an expected callsite for an export.
          type IntegrationCallsite struct {
              File     string `json:"file" yaml:"file"`
              Function string `json:"function,omitempty" yaml:"function,omitempty"`
              Action   string `json:"action" yaml:"action"` // always "modify"
              Wave     int    `json:"wave" yaml:"wave"`
              Status   string `json:"status" yaml:"status"` // "existing", "todo", "planned"
              Note     string `json:"note,omitempty" yaml:"note,omitempty"`
          }

          // IntegrationMapEntry represents one export and its expected callsites.
          type IntegrationMapEntry struct {
              Export         string                 `json:"export" yaml:"export"`
              ExportLocation string                 `json:"export_location" yaml:"export_location"`
              ExportType     string                 `json:"export_type" yaml:"export_type"`
              Callsites      []IntegrationCallsite  `json:"callsites" yaml:"callsites"`
          }

          // IntegrationGap represents a missing integration callsite.
          type IntegrationGap struct {
              Export         string `json:"export" yaml:"export"`
              ExportLocation string `json:"export_location" yaml:"export_location"`
              ExportType     string `json:"export_type" yaml:"export_type"`
              MissingFile    string `json:"missing_file" yaml:"missing_file"`
              ExpectedFunc   string `json:"expected_function,omitempty" yaml:"expected_function,omitempty"`
              Wave           int    `json:"wave" yaml:"wave"`
              Severity       string `json:"severity" yaml:"severity"` // "critical", "warning", "info"
              Reason         string `json:"reason" yaml:"reason"`
          }

          // IntegrationVerified represents a successfully verified callsite.
          type IntegrationVerified struct {
              Export   string `json:"export" yaml:"export"`
              File     string `json:"file" yaml:"file"`
              Function string `json:"function,omitempty" yaml:"function,omitempty"`
              Line     int    `json:"line,omitempty" yaml:"line,omitempty"`
          }

          // IntegrationCheckResult is the result of integration_check validation.
          type IntegrationCheckResult struct {
              TotalExports int                    `json:"total_exports" yaml:"total_exports"`
              TotalSites   int                    `json:"total_callsites" yaml:"total_callsites"`
              Verified     []IntegrationVerified  `json:"verified" yaml:"verified"`
              Gaps         []IntegrationGap       `json:"gaps" yaml:"gaps"`
              Summary      string                 `json:"summary" yaml:"summary"`
          }

          // ValidateIntegrationMap validates integration_map entries.
          func ValidateIntegrationMap(entries []IntegrationMapEntry) []ValidationError

          // ClassifyGapSeverity classifies an integration gap by severity.
          func ClassifyGapSeverity(export string, exportType string, status string, currentWave int, targetWave int) string
          ```

          **Add to IMPLManifest struct** (in types.go):
          ```go
          type IMPLManifest struct {
              // ... existing fields ...
              IntegrationMap []IntegrationMapEntry `json:"integration_map,omitempty" yaml:"integration_map,omitempty"`
          }
          ```

          **Validation logic** (ValidateIntegrationMap):
          - Check each entry for required fields (export, export_location, export_type not empty)
          - export_type must be in allowed set (function, type, interface, middleware, constant)
          - Each callsite must have file, action, wave, status
          - action must be "modify"
          - status must be in allowed set (existing, todo, planned)
          - wave must be >= 1

          **Severity classification** (ClassifyGapSeverity):
          - critical: exportType "function" with export matching Register*|Init*|Build* AND status "todo" AND targetWave <= currentWave
          - warning: exportType "function" with status "todo"
          - info: exportType "type" or "interface", or status "planned"

          **Tests** (in integration_map_test.go):

          Table-driven tests covering:
          1. ValidateIntegrationMap accepts valid entries
          2. ValidateIntegrationMap rejects missing required fields
          3. ValidateIntegrationMap rejects invalid export_type values
          4. ValidateIntegrationMap rejects invalid status values
          5. ValidateIntegrationMap rejects action != "modify"
          6. ValidateIntegrationMap rejects wave < 1
          7. ClassifyGapSeverity returns "critical" for Register*/Init*/Build* with status "todo"
          8. ClassifyGapSeverity returns "warning" for other functions with status "todo"
          9. ClassifyGapSeverity returns "info" for types/interfaces
          10. YAML unmarshaling of integration_map section
          11. JSON marshaling of IntegrationCheckResult

          **Verification gate**:
          ```bash
          cd /Users/dayna.blackwell/code/scout-and-wave-go
          go build ./pkg/protocol/...
          go vet ./pkg/protocol/...
          go test ./pkg/protocol/... -v -run TestIntegrationMap
          go test ./pkg/protocol/... -v -run TestClassifyGapSeverity
          go test ./pkg/protocol/... -v -run TestValidateIntegrationMap
          ```
