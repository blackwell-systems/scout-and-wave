suitability_assessment: |
  SUITABLE. The work decomposes into 7 agents across 4 waves with disjoint file
  ownership. Wave 1 updates protocol documentation (Scout prompt + E-rule). Wave 2
  implements the integration_map data types. Wave 3 implements CLI and SDK wrappers
  that depend on the types. Wave 4 wires it into web app and updates changelog.

  File decomposition: 10+ files across 3 repositories (scout-and-wave, scout-and-wave-go,
  scout-and-wave-web). Each agent owns distinct files. No conflicting modifications within
  a wave.

  Investigation-first items: None. The integration_connectors pattern already exists
  (E25/E26/E27) and provides a template. The integration_map structure is well-defined
  in the requirements.

  Interface discoverability: All interfaces can be defined up front. The integration_map
  YAML schema is fixed. The Go SDK function signature is standard (parse YAML, run
  checks, return structured result). The web API endpoint follows existing SSE patterns.

  Pre-implementation status: No components of this feature exist yet. The integration_map
  YAML key is not mentioned in the codebase. The Scout prompt does not include integration
  analysis instructions. No sawtools command performs integration completeness checking
  beyond the existing E25/E26 reactive detection.

  Parallelization value: High. Three repositories, Go test suite >30s, multiple agents
  can work independently within waves. Wave 1 (protocol docs) has 2 parallel agents.
  Wave 3 (CLI + SDK) has 2 parallel agents. Wave 4 (web + changelog) has 2 parallel agents.

  Cross-repo considerations: This feature touches all 3 SAW repositories. Agents specify
  repo: field in file_ownership. Protocol repo changes commit first, Go SDK second, web
  app last (standard propagation pattern from MEMORY.md).

  Estimated times:
  - Scout phase: ~10 min (dependency mapping, interface contracts, IMPL doc)
  - Agent execution: ~24 min (7 agents, 4 waves, ~6 min avg per agent accounting for parallelism)
  - Merge and verification: ~5 min
  Total SAW time: ~39 min
  Sequential baseline: ~63 min (7 agents × ~9 min avg sequential)
  Time savings: ~24 min (38% faster)
  Recommendation: Clear speedup plus coordination value across 3 repos. The IMPL doc
  itself serves as design documentation for the dual-layer system.

