      - id: B
        task: |
          ## Protocol: Add E42 Execution Rule

          **Objective**: Document the integration completeness requirement as execution rule E42.

          **Context**: The execution rules document (protocol/execution-rules.md) defines
          orchestrator behavior. E41 is the current highest rule number. This task adds E42
          to document the dual-layer integration completeness verification system.

          **File to modify**: `protocol/execution-rules.md`

          **Changes required**:

          Insert E42 section after E41 (after line ~1563):

          ```markdown
          ## E42: Integration Completeness Verification

          **Trigger:** (Layer 1) Scout produces IMPL doc, (Layer 2) Wave merge completes

          **Required Action:** Two-layer defense against the "built but not hooked up" pattern
          where features are implemented with passing tests but critical integration points are
          missed (exports never called in production flows).

          ### Layer 1: Scout-Phase Integration Mapping (Preventative)

          During IMPL doc creation, Scout must identify and plan integration callsites when
          agents create new exports.

          **Scout responsibilities:**
          1. Analyze interface contracts for exports matching detection heuristics
          2. Search codebase for parallel patterns (e.g., if API backend uses X, check Bedrock/OpenAI)
          3. Identify where new exports must be called
          4. Create `integration_map` section in IMPL doc with export-to-callsite mappings
          5. Ensure callsite files are in file_ownership or integration_connectors

          **integration_map structure:**
          ```yaml
          integration_map:
            - export: "function or type name"
              export_location: "path/to/file.go"
              export_type: "function" | "type" | "middleware" | ...
              callsites:
                - file: "path/to/caller.go"
                  function: "callerFunc()"  # optional
                  action: "modify"
                  wave: 2
                  status: "existing" | "todo" | "planned"
                  note: "Explanation"  # optional
          ```

          **Detection heuristics for integration-required exports:**
          - Functions matching `Register*`, `Init*`, `Build*` patterns → likely require callsites
          - Middleware functions (`WithX(...)`) → check all backends for consistent usage
          - Stats collection functions → verify orchestrator persists to reports
          - Webhook/event handlers → verify wired into notification bus

          ### Layer 2: Post-Merge Integration Gate (Detective)

          After wave merges, validate that expected callsites from integration_map exist.

          **Orchestrator behavior:**
          1. Run `sawtools integration-check <impl-doc>` or call `engine.CheckIntegration()`
          2. Parse integration_map from IMPL doc
          3. For each export, verify callsites exist via grep or AST parsing
          4. Classify gaps by severity (critical/warning/info)
          5. Report missing integrations

          **Gate behavior:**
          - Non-blocking warning (not error) by default
          - Allows "define now, use later" patterns
          - Runs after each wave merge (early detection)
          - Runs after final merge (comprehensive check)
          - Exit code 0 if all verified, 1 if gaps detected

          **Severity classification:**
          - `critical`: Register*, Init*, Build* functions with status "todo" in current/past wave
          - `warning`: Other functions with status "todo", inconsistent middleware usage
          - `info`: Types/interfaces exported but not required immediately

          ### Relationship to E25/E26/E27

          - **E25/E26** (reactive): Detects integration gaps post-merge via grep, launches Integration Agent
          - **E27** (proactive): Scout plans integration work as explicit integration wave
          - **E42** (preventative + detective): Scout maps callsites up front, gate verifies after merge

          All three mechanisms are complementary:
          - E42 Layer 1 runs at planning time (Scout phase)
          - E27 runs for planned integration waves (known wiring work)
          - E42 Layer 2 runs post-merge (verifies integration_map entries)
          - E25/E26 runs post-merge (catches gaps integration_map missed)

          **Related Rules:** See E25 (Integration Validation), E26 (Integration Agent), E27 (Planned Integration Waves)

          ---
          ```

          **Testing**: After modification, verify E42 section includes:
          - Two-layer structure (preventative + detective)
          - integration_map YAML schema
          - Detection heuristics
          - Severity classification
          - Relationship to E25/E26/E27

          **Verification gate**:
