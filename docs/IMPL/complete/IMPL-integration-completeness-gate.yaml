          ## v0.64.0 (Unreleased)

          ### Added

          #### E42: Integration Completeness Verification (Dual-Layer Defense)

          Introduces a two-layer system to prevent the "built but not hooked up" pattern where
          features are implemented with passing tests but critical integration points are missed.

          **Layer 1: Scout-Phase Integration Mapping (Preventative)**
          - Scout agent now produces `integration_map` section in IMPL docs
          - Maps exports (functions, types, middleware) to expected callsites
          - Identifies parallel patterns (e.g., if API backend uses X, check Bedrock/OpenAI)
          - Detection heuristics for Register*, Init*, Build* functions
          - Status tracking: "existing", "todo", "planned"

          **Layer 2: Post-Merge Integration Gate (Detective)**
          - New `sawtools integration-check` command verifies callsites exist
          - New `engine.CheckIntegration()` SDK function for programmatic access
          - Severity classification: critical, warning, info
          - Non-blocking by default (warning mode)
          - Web app integration: SSE events for UI feedback

