          **Objective**: Update the SAW skill orchestrator procedure to call `sawtools integration-check` post-merge.

          **Context**: The /saw skill defines the orchestrator's execution logic. Currently step 8a references only E25/E26/E35 (reactive integration gap detection). This task adds E42 Layer 2 (integration completeness verification) as a separate post-merge step that runs BEFORE E25/E26.

