          - Scout prompt: `implementations/claude-code/prompts/agents/scout.md` (integration analysis)
          - Go SDK: `pkg/protocol/integration_map.go` (types), `pkg/engine/integration_check.go` (logic)
          - CLI: `cmd/saw/integration_check_cmd.go` (command)
          - Web API: `pkg/api/wave_completion.go` (SSE integration)

