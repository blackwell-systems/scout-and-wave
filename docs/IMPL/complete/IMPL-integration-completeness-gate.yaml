pre_mortem:
  overall_risk: medium
  rows:
    - scenario: Scout prompt integration analysis adds too much complexity, agents struggle to produce correct integration_map
      likelihood: medium
      impact: medium
      mitigation: Make integration_map optional. Provide clear examples in Scout prompt. Start with simple heuristics (Register*, Init*, Build*) rather than complex pattern matching.

    - scenario: grep-based export detection misses callsites (dynamic calls, reflection, indirect references)
      likelihood: high
      impact: low
      mitigation: integration_check is detective layer (catches obvious gaps). E25/E26 provides reactive detection for complex cases. Mark integration_check as non-blocking by default. Use AST parsing for Go projects (future enhancement).

    - scenario: integration_map bloats IMPL docs for features with many exports
      likelihood: medium
      impact: low
      mitigation: Scout guidance emphasizes selectivity (Register*, Init*, Build* functions, not every exported type). If integration_map exceeds 50 entries, scout should flag as design smell.

    - scenario: False positives from integration_check when export is intentionally unused (defensive exports for future use)
      likelihood: medium
      impact: low
      mitigation: Severity classification handles this - mark as "info" level. Allow status "planned" for future waves. integration_check is non-blocking by default, so false positives don't break builds.

    - scenario: Cross-repo integration_map entries hard to track (export in scout-and-wave-go, callsite in scout-and-wave-web)
      likelihood: low
      impact: medium
      mitigation: integration_map callsites already include file paths. Multi-repo IMPL docs already have repo field in file_ownership. integration-check command can handle multiple repo roots via --repo-root flag or auto-detection.

    - scenario: Web app SSE integration fails silently if engine.CheckIntegration errors
      likelihood: low
      impact: medium
      mitigation: Agent F task explicitly makes integration_check non-fatal (log error, emit SSE error event, continue to merge). This preserves existing behavior while adding opt-in validation.

