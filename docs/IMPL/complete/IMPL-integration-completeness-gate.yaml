             )
             ```

          2. **Add integration check call** in wave completion handler (after quality gates pass):
             ```go
             // After quality gates pass, before final merge
             // Run integration check (E42 Layer 2)
             sseWriter.WriteEvent("integration_check", map[string]interface{}{
                 "status": "running",
                 "message": "Verifying integration completeness...",
             })

             result, err := engine.CheckIntegration(implPath, repoRoot)
             if err != nil {
                 sseWriter.WriteEvent("integration_check", map[string]interface{}{
                     "status": "error",
                     "error": err.Error(),
                 })
                 log.Printf("Integration check failed: %v", err)
             } else {
                 criticalCount := 0
                 warningCount := 0
                 for _, gap := range result.Gaps {
                     if gap.Severity == "critical" {
                         criticalCount++
                     } else if gap.Severity == "warning" {
                         warningCount++
                     }
                 }

                 status := "pass"
                 if criticalCount > 0 {
                     status = "critical_gaps"
                 } else if warningCount > 0 {
                     status = "warning_gaps"
                 }

                 sseWriter.WriteEvent("integration_check", map[string]interface{}{
                     "status": status,
                     "total_exports": result.TotalExports,
                     "total_callsites": result.TotalSites,
                     "verified_count": len(result.Verified),
                     "gap_count": len(result.Gaps),
                     "critical_count": criticalCount,
                     "warning_count": warningCount,
                     "gaps": result.Gaps,
                     "summary": result.Summary,
                 })
             }
             ```

          **Non-fatal behavior**: Integration check errors do not block merge. Log error and continue.

