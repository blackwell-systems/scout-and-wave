# Interface Contracts
# These define the exact terminology, names, and cross-references that all agents
# must use consistently. This is the primary coordination mechanism for this feature.
interface_contracts:
  - name: "Review Agent Participant"
    description: |
      The Review Agent is the 6th participant role in SAW. It runs as a Generator-Critic
      pattern: Scout generates the IMPL (optimistic), Review Agent critiques against
      ground truth (adversarial, verification-focused). It is read-only with respect to
      source code and produces a structured review document.
    definition: |
      Participant name: Review Agent
      Execution mode: Asynchronous
      Subagent type: review-agent
      Constraint: Read-only (no source code modification, no IMPL doc modification)
      Output: Structured review document written to IMPL doc under review_report field
      Launches: After SCOUT_VALIDATING passes (E16), before REVIEWED state
      Failure behavior: Non-fatal after retry limit. If review fails after 2 revision
        rounds, orchestrator enters REVIEWED with review findings attached for human review.
    location: "protocol/participants.md"

  - name: "E28 Execution Rule"
    description: |
      E28 defines the Pre-Review Semantic Validation rule. It governs the orchestrator's
      behavior when launching the Review Agent and handling the Scout revision loop.
    definition: |
      Rule number: E28
      Rule name: Pre-Review Semantic Validation
      Trigger: E16 validation passes (SCOUT_VALIDATING -> structural validation complete)
      Required action: Orchestrator launches Review Agent to cross-reference IMPL doc
        against actual codebase. Review Agent reads all source files referenced in IMPL
        and verifies: function signatures match, referenced types exist, routes are
        registered, SSE events match between emitter/listener, pipeline steps are complete.
      Output: Structured review with categories: signature_mismatch, missing_type,
        unwired_connection, missing_edge_case, architectural_gap
      Severity levels: critical, high, medium, low
      Revision loop: If review finds critical or high issues, orchestrator feeds review
        back to Scout. Scout revises IMPL doc. Review Agent re-reviews. Max 2 rounds.
      On loop exhaustion: Enter REVIEWED with review findings attached. Human decides
        whether to proceed or revise further.
      Retry limit: 2 revision rounds (Scout -> Review -> Scout revision -> Review verify)
    location: "protocol/execution-rules.md"

  - name: "SCOUT_REVIEWING State"
    description: |
      New state in the SAW state machine, inserted between SCOUT_VALIDATING and REVIEWED.
      The Review Agent executes during this state.
    definition: |
      State name: SCOUT_REVIEWING
      Position in flow: SCOUT_VALIDATING -> SCOUT_REVIEWING -> REVIEWED
      Entry condition: E16 validation passes
      Exit condition: Review Agent finds no critical/high issues, OR revision loop
        exhausted (max 2 rounds)
      Entry actions: Orchestrator launches Review Agent with IMPL doc path and list
        of source files to verify
      Self-loop: SCOUT_REVIEWING -> SCOUT_REVIEWING when review finds critical/high
        issues and revision rounds remain. Orchestrator feeds review to Scout, Scout
        revises, Review Agent re-reviews.
      Transition to REVIEWED: Review passes (no critical/high issues) OR revision
        limit reached (findings attached for human review)
      Transition to BLOCKED: Review Agent itself fails (not review findings, but
        agent execution failure)
    location: "protocol/state-machine.md"

  - name: "Review Agent Procedure"
    description: |
      Operational procedure for Review Agent execution, following the same pattern
      as existing procedures in procedures.md (Scout, Scaffold Agent, Wave Execution,
      Merge, Inter-Wave Checkpoint, Protocol Completion).
    definition: |
      Procedure number: Procedure 1.5 (between Scout and Scaffold Agent)
      Procedure name: Review Agent (Pre-Review Semantic Validation)
      Entry state: SCOUT_REVIEWING
      Exit state: REVIEWED (if review passes or revision limit reached) or
        BLOCKED (if agent execution fails)
      Executor: Review Agent (asynchronous)
    location: "protocol/procedures.md"

  - name: "Review Document Structure"
    description: |
      The structured review output format that the Review Agent produces and that
      gets written to the IMPL doc.
    definition: |
      YAML structure written to IMPL doc under review_report field:
        review_report:
          status: pass | issues_found | revision_requested
          round: 1 | 2
          findings:
            - id: R1
              category: signature_mismatch | missing_type | unwired_connection |
                        missing_edge_case | architectural_gap | naming_mismatch
              severity: critical | high | medium | low
              location: "path/to/file.go:function_name"
              impl_reference: "Agent A task, Interface Contract X"
              description: "What is wrong"
              evidence: "What the codebase actually shows"
              recommendation: "How to fix it in the IMPL doc"
          summary:
            critical: N
            high: N
            medium: N
            low: N
            verdict: "pass | revise | escalate"
    location: "protocol/message-formats.md (informational, not a file ownership target)"

  - name: "SSE Review Events"
    description: |
      SSE event names used by the web backend to stream review progress to the frontend.
      These names are the binding contract between backend emitters and frontend listeners.
    definition: |
      Event names (snake_case, matching existing SSE event pattern):
        review_started:    { slug: string, round: number }
        review_finding:    { slug: string, finding: ReviewFinding }
        review_complete:   { slug: string, status: "pass"|"issues_found", summary: ReviewSummary }
        review_revision_started:  { slug: string, round: number }
        review_revision_complete: { slug: string, round: number }
        review_skipped:    { slug: string }
        review_failed:     { slug: string, error: string }
    location: "scout-and-wave-web/pkg/api/review_handler.go"

  - name: "Review API Endpoints"
    description: |
      HTTP API endpoints for review agent operations.
    definition: |
      GET  /api/wave/{slug}/review      -> ReviewFindingsResponse (JSON)
      POST /api/wave/{slug}/review/skip  -> 204 No Content
      Patterns: Follow existing handleWaveStart/handleWaveMerge patterns in wave_runner.go
    location: "scout-and-wave-web/pkg/api/review_handler.go"

  - name: "ReviewModel Config Field"
    description: |
      New field in AgentConfig struct and SAWConfig for the review agent model.
    definition: |
      Go: AgentConfig.ReviewModel string `json:"review_model"`
      TypeScript: SAWConfig.agent.review_model: string
      Default: same as scout_model if unset
    location: "scout-and-wave-web/pkg/api/types.go"

  - name: "Reducer Review Actions"
    description: |
      New action types for the frontend waveEventsReducer to handle review SSE events.
    definition: |
      Action types (TypeScript union members):
        | { type: 'REVIEW_STARTED'; round: number }
        | { type: 'REVIEW_FINDING'; finding: ReviewFinding }
        | { type: 'REVIEW_COMPLETE'; status: string; summary: ReviewSummary }
        | { type: 'REVIEW_REVISION_STARTED'; round: number }
        | { type: 'REVIEW_REVISION_COMPLETE'; round: number }
        | { type: 'REVIEW_SKIPPED' }
        | { type: 'REVIEW_FAILED'; error: string }

      State additions to AppWaveState:
        reviewStatus: 'idle' | 'running' | 'passed' | 'failed' | 'skipped'
        reviewRound: number
        reviewFindings: ReviewFinding[]
        reviewSummary?: ReviewSummary
        reviewError?: string
    location: "scout-and-wave-web/web/src/hooks/waveEventsReducer.ts"

  - name: "sawtools review-impl Command"
    description: |
      CLI command for deterministic/mechanical review checks (Phase 2 of hybrid approach).
      Fast, cheap checks that run before the full Review Agent.
    definition: |
      Command: sawtools review-impl <impl-doc-path> [--repo-root <path>]
      Output: JSON with check results
        {
          "checks": [
            { "check": "function_signature_match", "status": "pass"|"fail", "details": "..." },
            { "check": "file_exists", "status": "pass"|"fail", "details": "..." },
            { "check": "route_wiring", "status": "pass"|"fail", "details": "..." },
            { "check": "sse_event_match", "status": "pass"|"fail", "details": "..." }
          ],
          "summary": { "pass": N, "fail": N },
          "verdict": "pass"|"issues_found"
        }
      Checks performed:
        1. All files in file_ownership with action:"modify" exist on disk
        2. Interface contract function signatures match actual source (regex-based)
        3. SSE event names in agent tasks match between emitter and listener references
        4. Route paths in agent tasks match registered routes in server.go
    location: "scout-and-wave-go/cmd/saw/review_impl_cmd.go"

