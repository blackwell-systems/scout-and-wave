          Response (200):
          ```json
          {
            "status": "pass|issues_found|revision_requested",
            "round": 1,
            "findings": [...],
            "summary": { "critical": 0, "high": 0, "medium": 0, "low": 0, "verdict": "pass" }
          }
          ```
          Response (404): No review report exists yet.

          ### POST /api/wave/{slug}/review/skip
          Marks the review as skipped. Sets a flag in the stage state so the
          wave runner skips the review step.
          Response: 204 No Content.

          ## SSE Events

          Emit the following events through the slug's SSE broker (s.broker.Publish):
          - `review_started`:    { slug, round }
          - `review_finding`:    { slug, finding: { id, category, severity, location, description, evidence, recommendation } }
          - `review_complete`:   { slug, status, summary: { critical, high, medium, low, verdict } }
          - `review_revision_started`:  { slug, round }
          - `review_revision_complete`: { slug, round }
          - `review_skipped`:    { slug }
          - `review_failed`:     { slug, error }

