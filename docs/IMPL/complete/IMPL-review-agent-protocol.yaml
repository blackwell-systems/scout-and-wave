  - number: 1
    agents:
      - id: "A"
        task: |
          ## What to Implement

          Add the Review Agent as the 6th participant role in `protocol/participants.md`.
          Insert the new section AFTER the Integration Agent section and BEFORE the
          "Correctness Rationale" section.

          ## Exact Content to Add

          Add a new `## Review Agent` section following the exact pattern of existing
          participants (Orchestrator, Scout, Scaffold Agent, Wave Agent, Integration Agent).
          The section must include:

          1. **Execution mode:** Asynchronous

          2. **Responsibilities paragraph:** An asynchronous agent launched by the orchestrator
             after E16 validation passes and before entering REVIEWED state. Reads the IMPL doc
             and ALL source files referenced in agent tasks, interface contracts, and file
             ownership table. Cross-references the IMPL against the actual codebase to find:
             function signature mismatches, missing types, unwired connections, missing pipeline
             steps, and architectural gaps. Produces a structured review document (not IMPL
             modifications). The orchestrator feeds review findings back to Scout for revision.
             Runs up to 2 review rounds (Scout -> Review -> Scout revision -> Review verification).
             Never modifies source files or the IMPL doc directly.

          3. **Constraint role:** `reviewer`
             The `reviewer` constraint restricts the Review Agent to read-only operations on
             source files and produces output only as a review document appended to the IMPL doc.

          4. **Required capabilities:**
             - Read source files (all files referenced in IMPL doc)
             - Read IMPL docs (full manifest including agent tasks, interface contracts,
               file ownership, scaffolds)
             - Execute read-only analysis commands (grep, find, AST queries)
             - Write structured review document to IMPL doc
             - Parse function signatures and type definitions from source code

          5. **Forbidden actions:**
             - Modify any source files
             - Modify the IMPL doc (except appending review report)
             - Create or delete files
             - Execute build or test commands that modify state
             - Launch other agents
             - Implement features or fix code

