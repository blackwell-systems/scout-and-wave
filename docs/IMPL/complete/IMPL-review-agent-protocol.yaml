      mitigation: |
        Interface contract "SSE Review Events" defines exact event names. Both Agent H
        (backend) and Agent J (frontend) reference this contract. Post-merge grep
        verification confirms event names match.
    - scenario: "TypeScript type duplication between reducer and types.ts"
      likelihood: high
      impact: low
      mitigation: |
        Both Agent J and Agent L define ReviewFinding/ReviewSummary types. This is
        intentional — reducer types are canonical, types.ts are convenience re-exports.
        If they drift, tsc --noEmit catches it at type-check time.
    - scenario: "wave_runner.go review integration conflicts with Agent H handler"
      likelihood: medium
      impact: medium
      mitigation: |
        Agent I (wave_runner.go changes) and Agent H (review_handler.go) are in the
        same wave with disjoint file ownership. Agent I only adds the call site;
        Agent H creates the implementation. The function signature is defined in the
        interface contract.
    - scenario: "root.go AddCommand registration missed for review-impl"
      likelihood: medium
      impact: medium
      mitigation: |
        Listed as integration_connector. Integration Agent will wire this after Wave 3.

