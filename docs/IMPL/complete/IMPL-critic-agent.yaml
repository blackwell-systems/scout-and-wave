interface_contracts:
    - name: CriticResult
      description: |
        Structured output written by the critic agent to the IMPL doc. Contains
        per-agent verdicts and an overall pass/fail decision. Persisted as YAML
        in the IMPL manifest under critic_report.
      definition: |
        // CriticResult is the structured output of a critic-agent review run.
        // Written to the IMPL doc by WriteCriticReview after the critic agent completes.
        type CriticResult struct {
            // Verdict is the overall decision: "PASS" or "ISSUES"
            Verdict     string         `yaml:"verdict" json:"verdict"`
            // AgentReviews contains per-agent verdicts indexed by agent ID
            AgentReviews map[string]AgentCriticReview `yaml:"agent_reviews" json:"agent_reviews"`
            // Summary is a human-readable summary of the overall findings
            Summary     string         `yaml:"summary" json:"summary"`
            // ReviewedAt is an ISO8601 timestamp of when the review completed
            ReviewedAt  string         `yaml:"reviewed_at" json:"reviewed_at"`
            // IssueCount is the total number of issues found across all agents
            IssueCount  int            `yaml:"issue_count" json:"issue_count"`
        }

        // AgentCriticReview is the per-agent verdict from the critic.
        type AgentCriticReview struct {
            // AgentID is the agent identifier (e.g. "A", "B2")
            AgentID     string   `yaml:"agent_id" json:"agent_id"`
            // Verdict is "PASS" or "ISSUES"
            Verdict     string   `yaml:"verdict" json:"verdict"`
            // Issues lists specific problems found, empty if Verdict is PASS
            Issues      []CriticIssue `yaml:"issues,omitempty" json:"issues,omitempty"`
        }

        // CriticIssue describes a single problem found by the critic.
        type CriticIssue struct {
            // Check is the verification category (e.g. "file_existence", "symbol_accuracy")
            Check       string `yaml:"check" json:"check"`
            // Severity is "error" (blocks wave) or "warning" (advisory)
            Severity    string `yaml:"severity" json:"severity"`
            // Description is a human-readable explanation of the problem
            Description string `yaml:"description" json:"description"`
            // File is the specific file referenced in the brief, if applicable
            File        string `yaml:"file,omitempty" json:"file,omitempty"`
            // Symbol is the specific function/type name that failed verification, if applicable
            Symbol      string `yaml:"symbol,omitempty" json:"symbol,omitempty"`
        }
      location: pkg/protocol/critic.go
    - name: WriteCriticReview
      description: |
        Writes a CriticResult to the IMPL doc's critic_report field. Called by
        run-critic command after the critic agent completes. Persists result atomically
        by loading, updating, and saving the YAML manifest.
      definition: |
        // WriteCriticReview writes the critic result to the IMPL manifest at implPath.
        // It loads the existing manifest, sets the CriticReport field, and saves.
        // Returns an error if the manifest cannot be loaded or saved.
        func WriteCriticReview(implPath string, result CriticResult) error
      location: pkg/protocol/critic.go
    - name: GetCriticReview
      description: |
        Reads the CriticResult from a loaded IMPL manifest. Returns nil if no
        critic review has been written yet. Used by the web API handler to serve
        GET /api/impl/{slug}/critic-review.
      definition: |
        // GetCriticReview returns the critic review from a loaded manifest, or nil
        // if no review has been written. Does not load from disk; caller must load
        // the manifest first using protocol.Load.
        func GetCriticReview(manifest *IMPLManifest) *CriticResult
      location: pkg/protocol/critic.go
    - name: CriticReviewPanel
      description: |
        React component that displays a CriticResult. Shows an overall verdict
        banner (PASS green / ISSUES red) and a per-agent accordion with issue
        details. Imported by ReviewScreen.tsx.
      definition: |
        // TypeScript interface matching CriticResult Go type
        interface CriticResultType {
          verdict: 'PASS' | 'ISSUES';
          agent_reviews: Record<string, AgentCriticReview>;
          summary: string;
          reviewed_at: string;
          issue_count: number;
        }
        interface AgentCriticReview {
          agent_id: string;
          verdict: 'PASS' | 'ISSUES';
          issues?: CriticIssue[];
        }
        interface CriticIssue {
          check: string;
          severity: 'error' | 'warning';
          description: string;
          file?: string;
          symbol?: string;
        }

        interface CriticReviewPanelProps {
          result: CriticResultType;
        }
        export function CriticReviewPanel({ result }: CriticReviewPanelProps): JSX.Element
      location: web/src/components/CriticReviewPanel.tsx
    - name: handleGetCriticReview
      description: |
        HTTP handler for GET /api/impl/{slug}/critic-review. Loads the IMPL manifest
        for the given slug, reads the critic_report field, and returns it as JSON.
        Returns 404 if no review exists, 200 with JSON CriticResult if one does.
      definition: |
        func (s *Server) handleGetCriticReview(w http.ResponseWriter, r *http.Request)
        // Route: GET /api/impl/{slug}/critic-review
        // Response 200: JSON-encoded CriticResult
        // Response 404: { "error": "no critic review for this IMPL" }
        // Response 500: { "error": "..." }
      location: pkg/api/critic_handler.go
