            3. Flag `--model <string>`: override the model used for the critic agent (optional)
            4. Flag `--skip` (bool): alias for --no-review (same behavior)
            5. Launch the critic agent using the same agent-launch pattern as run-scout:
               - Read the IMPL doc to extract repo root(s) from repositories/repository field
               - Construct the critic agent prompt payload (include IMPL path + repo roots)
               - Launch via the engine's agent runner (follow the pattern in run_scout_cmd.go)
               - Wait for completion (poll for critic_report field appearing in the IMPL doc,
                 or use the engine's wait-for-completion pattern)
            6. After agent completes, read critic_report from IMPL doc
            7. Print human-readable summary to stdout
            8. Exit 0 if PASS, exit 1 if ISSUES

