        - scenario: |
            scout-and-wave-go module is a dependency of scout-and-wave-web. If Wave 1 Agent B
            adds CriticResult type to a published module version, Agent E (Wave 2) needs that
            type available. If the go.mod in scout-and-wave-web pins an older version, Agent E
            will get compile errors.
          likelihood: high
          impact: high
          mitigation: |
            scout-and-wave-web uses a local replace directive in go.mod pointing to the local
            scout-and-wave-go checkout. As long as both repos are on the same machine and Agent B
            commits to its worktree, Agent E can use the replace directive to pick up the new types.
            Verify go.mod replace directive before launching Wave 2. If missing, add it before
            wave 2 launches.
        - scenario: |
            ReviewScreen.tsx is complex enough that Agent G's changes (adding CriticReviewPanel
            and SSE handler) conflict with its existing state management, causing TypeScript errors
            that block the Wave 2 build gate.
          likelihood: medium
          impact: medium
          mitigation: |
            Agent G is explicitly instructed to read ReviewScreen.tsx in full before making
            changes and to match its existing patterns. Agent G's verification gate is `npm run build`
            which catches TypeScript errors. If blocked, Agent G reports partial with specific
            TypeScript error and the orchestrator can apply a targeted fix.
        - scenario: |
            sawtools set-critic-review command is what the critic agent uses to write results.
            If this command doesn't exist when Wave 1 merges (Agent C's work), the critic agent
            prompt (Agent A's work) will reference a non-existent command.
          likelihood: low
          impact: low
          mitigation: |
            Both A and C are in Wave 1, so they merge together. The critic-agent.md prompt is not
            executed until a critic agent is actually launched (which requires the binary to be rebuilt
            post-merge per the post_merge_checklist). Binary rebuild happens after merge, which is
            after both A and C complete. No timing issue.
