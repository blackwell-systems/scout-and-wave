suitability_assessment: |
    This IMPL executes a FULL DELETION of both legacy error types (no aliases, no adapters)
    and migrates every caller to result.SAWError. This replaces the prior v2 Scout that
    proposed a type alias for ValidationError — that approach is explicitly rejected.

    THREE PARALLEL ERROR SYSTEMS TO ELIMINATE:
    1. result.StructuredError (pkg/result/result.go) — rename to SAWError in-place, add
       Error()/Unwrap()/IsFatal()/WithContext()/WithCause() methods. Add error code constants
       in pkg/result/codes.go (new file). All 12 protocol files that import result and use
       StructuredError get updated to SAWError in the same wave via explicit agent ownership.
    2. ValidationError (pkg/protocol/types.go) — DELETED. All 22 protocol validator files
       that return []ValidationError must be updated to return []result.SAWError. These 22
       files are divided across multiple agents by file ownership (4 agents, ~5 files each)
       in Wave 1.
    3. errparse.StructuredError (pkg/errparse/types.go) — DELETED. Every parser file
       (go_parsers.go, js_parsers.go, python_parsers.go, format_parsers.go) updated to
       return []result.SAWError directly. ParseResult.Errors changes to []result.SAWError.
       GateResult.ParsedErrors in pkg/protocol/gates.go changes to []result.SAWError.

    WAVE STRATEGY:
    Wave 1 is the critical foundation: rename StructuredError->SAWError in result.go,
    delete ValidationError from types.go, and migrate ALL 22 protocol validator files
    simultaneously. Since all validators are in pkg/protocol/ and return []ValidationError,
    they must all change in the same wave to avoid a broken intermediate state where some
    files return the old type and others return the new type. Wave 1 runs 5 agents in
    parallel across disjoint file sets.

    Wave 2 handles downstream callers that consumed []ValidationError or errparse types:
    errparse package deletion (Agent F), CLI commands (Agent G), and web API handlers (Agent H).
    Wave 2 can only start after Wave 1 completes because Wave 2 callers reference the new type.

    Wave 3: pkg/protocol/gates.go (Agent G2) depends on errparse (Agent F, wave 2) so it
    moves to wave 3. Also in wave 3: pkg/result/codes.go + render_errors.go (Agent I, additive)
    and web/src/types.ts (Agent J, TypeScript).

    FIELD MAPPING (ValidationError -> SAWError):
    ValidationError.Code      -> SAWError.Code
    ValidationError.Message   -> SAWError.Message
    ValidationError.Field     -> SAWError.Field
    ValidationError.Line      -> SAWError.Line
    ValidationError.Slug      -> SAWError.Context["slug"]
    ValidationError.Wave      -> SAWError.Context["wave"]
    ValidationError.AgentID   -> SAWError.Context["agent_id"]
    (new)                     -> SAWError.Severity ("error" default for validator errors)
    (new)                     -> SAWError.Tool (empty for validation errors)
    (new)                     -> SAWError.Suggestion

    FIELD MAPPING (errparse.StructuredError -> SAWError):
    StructuredError.File      -> SAWError.File
    StructuredError.Line      -> SAWError.Line
    StructuredError.Column    -> SAWError.Context["column"]
    StructuredError.Severity  -> SAWError.Severity
    StructuredError.Message   -> SAWError.Message
    StructuredError.Rule      -> SAWError.Context["rule"]
    StructuredError.Suggestion -> SAWError.Suggestion
    StructuredError.Tool      -> SAWError.Tool
    (new)                     -> SAWError.Code (set to "TOOL_ERROR" or tool-specific code)

    SUITABILITY:
    1. File decomposition: YES — 22 protocol files split across 4 agents (A,B,C,D),
       result.go/SAWError foundation in agent E, errparse in agent F. Wave 2: 2 independent
       agents (G=CLI, H=web API). Wave 3: gates.go (G2), codes+render (I), TypeScript (J).
       All ownership disjoint.
    2. Investigation-first: NO — all types are well-understood, no root cause work needed.
    3. Interface discoverability: YES — SAWError struct fully specified below before agents launch.
    4. Pre-implementation status: PARTIAL — result.StructuredError exists as the base.
       errparse.StructuredError still exists and must be deleted. ValidationError still exists.
    5. Parallelization value: HIGH — Go test cycle ~45s, 9+ agents across 3 waves.

    Estimated times:
    - Scout phase: ~20 min (large scope, 22 protocol files)
    - Agent execution: ~65 min (9 agents, Wave 1 runs 5 in parallel)
    - Merge and verification: ~15 min (3 waves)
    Total SAW time: ~100 min

    Sequential baseline: ~150 min (9 agents x ~17 min avg given large file counts)
    Time savings: ~50 min (33% faster)

    Recommendation: Clear speedup. Wave 1 parallelism across 5 agents is the key gain.
