            Wave 1 quality gate deliberately runs `go build ./pkg/protocol/...` not
            `go test ./...`. The post-merge full test suite (test_command) runs after all
            waves. If tests still fail after all waves, add a Wave 4 cleanup agent owning
            those test files to update ValidationError references to result.SAWError.
        - scenario: |
            Wave 1 has 5 parallel agents all modifying pkg/protocol/ files. Even with
            disjoint file ownership, mismatched SAWError construction patterns across agents
            (e.g., one agent sets Severity, another doesn't) may cause inconsistent behavior.
          likelihood: medium
          impact: medium
          mitigation: |
            All agents share the same field mapping specification in their task prompts.
            The Severity: "error" default is explicitly required in every agent's instructions.
            Post-merge lint gate (`go vet`) will catch any structural mismatches.
