interface_contracts:
    - name: SAWError
      description: |
        Unified error type replacing ValidationError and errparse.StructuredError.
        Implements the error interface. Supports errors.Is/As chains via Unwrap.
      definition: |
        // SAWError is the unified structured error type for all SAW operations.
        // Replaces: protocol.ValidationError, errparse.StructuredError, result.StructuredError.
        type SAWError struct {
            Code       string            `json:"code"`                // e.g. "V001_MANIFEST_INVALID"
            Message    string            `json:"message"`             // human-readable
            Severity   string            `json:"severity"`            // "fatal"|"error"|"warning"|"info"
            File       string            `json:"file,omitempty"`
            Line       int               `json:"line,omitempty"`
            Field      string            `json:"field,omitempty"`     // for validation errors
            Tool       string            `json:"tool,omitempty"`      // for tool/parse errors
            Suggestion string            `json:"suggestion,omitempty"`
            Context    map[string]string `json:"context,omitempty"`   // slug, wave, agent_id, rule, column
            Cause      error             `json:"-"`                   // wrapped error for errors.Is/As
        }

        func (e SAWError) Error() string
        func (e SAWError) Unwrap() error
        func (e SAWError) IsFatal() bool
        func (e SAWError) WithContext(key, value string) SAWError
        func (e SAWError) WithCause(cause error) SAWError
      location: pkg/result/result.go
    - name: Result[T] updated Errors field
      description: |
        Result[T].Errors changes from []StructuredError to []SAWError.
        All constructors (NewSuccess, NewPartial, NewFailure) updated accordingly.
      definition: |
        type Result[T any] struct {
            Data   *T         `json:"data,omitempty"`
            Errors []SAWError `json:"errors,omitempty"`
            Code   string     `json:"code"` // "SUCCESS" | "PARTIAL" | "FATAL"
        }

        func NewFailure[T any](errors []SAWError) Result[T]
        func NewPartial[T any](data T, warnings []SAWError) Result[T]
        func NewError(code, message string) SAWError
        func NewFatal(code, message string) SAWError
        func NewWarning(code, message string) SAWError
      location: pkg/result/result.go
    - name: ParseResult updated
      description: |
        errparse.ParseResult.Errors changes from []StructuredError to []result.SAWError.
        All parsers return *ParseResult with SAWError elements.
      definition: |
        // In pkg/errparse/types.go:
        import "github.com/blackwell-systems/scout-and-wave-go/pkg/result"

        type ParseResult struct {
            Tool   string            `json:"tool"`
            Errors []result.SAWError `json:"errors"`
            Raw    string            `json:"raw"`
        }

        type Parser interface {
            Name() string
            Parse(stdout, stderr string) *ParseResult
        }
      location: pkg/errparse/types.go
    - name: GateResult.ParsedErrors updated
      description: |
        GateResult.ParsedErrors changes from []errparse.StructuredError to []result.SAWError.
      definition: |
        // In pkg/protocol/gates.go:
        type GateResult struct {
            // ... existing fields unchanged ...
            ParsedErrors []result.SAWError `json:"parsed_errors,omitempty"`
        }
      location: pkg/protocol/gates.go
    - name: protocol.Validate return type
      description: |
        All protocol validator functions return []result.SAWError instead of []protocol.ValidationError.
        The top-level Validate(), ValidateBytes(), ValidateIMPLDoc(), ValidateProgram() all updated.
      definition: |
        // pkg/protocol/validation.go
        func Validate(m *IMPLManifest) []result.SAWError
        func ValidateBytes(raw []byte, m *IMPLManifest) []result.SAWError

        // pkg/protocol/validator.go
        func ValidateIMPLDoc(path string) ([]result.SAWError, error)

        // pkg/protocol/program_validation.go
        func ValidateProgram(manifest *PROGRAMManifest) []result.SAWError
        func ValidateP1FileDisjointness(tier int, impls []*IMPLManifest) []result.SAWError
      location: pkg/protocol/validation.go
    - name: ValidateManifest (web API)
      description: |
        Web API wrapper in impl_handlers.go updated to return []result.SAWError.
      definition: |
        // pkg/api/impl_handlers.go
        import "github.com/blackwell-systems/scout-and-wave-go/pkg/result"

        func ValidateManifest(yamlPath string) ([]result.SAWError, error)
      location: pkg/api/impl_handlers.go
    - name: GateResult (TypeScript)
      description: |
        New TypeScript SAWError interface matching Go JSON shape, plus updated GateResult type.
      definition: |
        // web/src/types.ts
        export interface SAWError {
          code: string
          message: string
          severity: 'fatal' | 'error' | 'warning' | 'info'
          file?: string
          line?: number
          field?: string
          tool?: string
          suggestion?: string
          context?: Record<string, string>
        }

        export interface GateResult {
          type: string
          command: string
          exit_code: number
          stdout: string
          stderr: string
          required: boolean
          passed: boolean
          skipped?: boolean
          skip_reason?: string
          from_cache?: boolean
          parsed_errors?: SAWError[]
        }
      location: web/src/types.ts
waves:
    - number: 1
      agents:
        - id: E
          task: |
            ## Role
            Rename result.StructuredError to result.SAWError and add the full error interface
            in pkg/result/result.go. This is the foundation that all other agents depend on.

            ## What to implement

            In pkg/result/result.go:

            1. Rename `StructuredError` struct to `SAWError` in-place. Do NOT create an alias.
               The struct already has these fields: Code, Message, Severity, File, Line, Field,
               Tool, Suggestion, Context. Add one new field:
               ```go
               Cause error `json:"-"`
               ```

            2. Add these methods to SAWError:
               ```go
               func (e SAWError) Error() string {
                   if e.Severity != "" {
                       return fmt.Sprintf("[%s] %s: %s", e.Severity, e.Code, e.Message)
                   }
                   return fmt.Sprintf("[%s] %s", e.Code, e.Message)
               }

               func (e SAWError) Unwrap() error { return e.Cause }

               func (e SAWError) IsFatal() bool { return e.Severity == "fatal" }

               func (e SAWError) WithContext(key, value string) SAWError {
                   if e.Context == nil {
                       e.Context = make(map[string]string)
                   }
                   e.Context[key] = value
                   return e
               }

               func (e SAWError) WithCause(cause error) SAWError {
                   e.Cause = cause
                   return e
               }
               ```

            3. Add convenience constructors:
               ```go
               func NewError(code, message string) SAWError {
                   return SAWError{Code: code, Message: message, Severity: "error"}
               }

               func NewFatal(code, message string) SAWError {
                   return SAWError{Code: code, Message: message, Severity: "fatal"}
               }

               func NewWarning(code, message string) SAWError {
                   return SAWError{Code: code, Message: message, Severity: "warning"}
               }
               ```

            4. Update Result[T].Errors field type from []StructuredError to []SAWError.
               Update all constructors (NewSuccess, NewPartial, NewFailure) to use SAWError.

            5. In result_test.go: update all StructuredError references to SAWError.
               Update any test helper types or literals that reference the old name.

            The scaffold file pkg/result/codes.go will be created by the Scaffold Agent before
            this wave starts. Do NOT create it yourself.

            ## Constraints
            - Do NOT create a type alias `StructuredError = SAWError`. Full rename only.
            - pkg/result must NOT import pkg/protocol or pkg/errparse (no circular imports).
            - All existing Result[T] method behavior (IsSuccess, IsFatal, IsPartial, HasErrors,
              GetData) is preserved unchanged.

            ## Verification gate
