            ```
          files:
            - pkg/result/result.go
            - pkg/result/result_test.go
        - id: A
          task: |
            ## Role
            Migrate protocol validator files group 1 from []ValidationError to []result.SAWError.
            Mechanical migration: change return types and ValidationError{} literals.

            ## What to implement

            Files: validation.go, program_validation.go, jsonschema_validator.go,
            schema_enum_validation.go, schema_unknown_keys.go

            For EACH file:

            1. Add import: `"github.com/blackwell-systems/scout-and-wave-go/pkg/result"`

            2. Change ALL function signatures from `[]ValidationError` to `[]result.SAWError`.

            3. Change ALL ValidationError{} literals to result.SAWError{} literals.
               Field mapping:
               - Code, Message, Field, Line stay identical
               - Slug → .WithContext("slug", slug) chained call
               - Wave (int) → .WithContext("wave", strconv.Itoa(wave))
               - AgentID → .WithContext("agent_id", agentID)
               - Add `Severity: "error"` to every literal

            4. Replace `newValidationError(code, message)` with `result.NewError(code, message)`.

            5. Replace `.WithContext(slug, wave, agentID)` with chained .WithContext() calls:
               ```go
