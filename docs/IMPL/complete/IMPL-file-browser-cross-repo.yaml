pre_mortem:
    overall_risk: low
    rows:
        - scenario: |-
            The resolve endpoint iterates all configured repos and returns the first
            match. If two repos contain a file at the same relative path (e.g. both
            have `pkg/config/config.go`), the first repo in the config wins, which
            may not be the intended one.
          likelihood: low
          impact: low
          mitigation: |-
            This edge case is rare in practice (repos tend to have distinct directory
            structures). The file browser's existing behavior also has no way to
            distinguish ambiguous paths. The fix still improves over the current
            hard 404 for the common cross-repo case.
        - scenario: |-
            Agent D's async `handleViewFile` opens the modal with a fallback repo,
            then updates it if resolve returns a different repo. If the user clicks
            into the file tree before the resolve completes, the tree loads for the
            wrong repo before switching. This could appear as a flash of wrong content.
          likelihood: medium
          impact: low
          mitigation: |-
            The resolve call is fast (just os.Stat across local filesystem paths).
            In practice the flash will be sub-100ms. The alternative (showing a
            loading spinner before opening) would make the UI feel sluggish. The
            approach in the brief (open immediately, update on resolve) is the
            correct UX tradeoff. If the flash becomes a user complaint, a loading
            state can be added in a follow-up.
        - scenario: |-
            Agent C modifies apiClient.ts, which is a large file (>900 lines). The
            TypeScript interface update (adding `resolve` to the `files:` interface
            and the implementation in the `createHttpClient` function body) are in
            two separate locations in the file. If the agent only updates one
            location, the TypeScript compiler will catch the mismatch.
          likelihood: low
          impact: low
          mitigation: |-
            Agent C's verification gate (`npx tsc --noEmit`) must pass. TypeScript
            will error if the interface declares `resolve` but the implementation
            object does not provide it (or vice versa). This is caught before merge.
        - scenario: |-
            The IMPL-saw-init.yaml file in the scout-and-wave repo needs `repo: scout-and-wave-go`
            added to its 3 file_ownership entries. This is noted as a manual pre-wave
            step in the suitability assessment. If it is not done before waves run,
            the existing IMPL doc continues to have the bug but the new feature
            resolves it dynamically via the endpoint.
          likelihood: low
          impact: low
          mitigation: |-
            The manual edit is a 3-line YAML change. Document it clearly so the
            operator applies it before or alongside the wave run. Even if skipped,
            the Layer 1+2 fix (resolve endpoint + frontend fallback) will fix the
            404 for IMPL-saw-init.yaml automatically at runtime.
