interface_contracts:
    - name: FileResolveResponse
      description: |-
        JSON response type for GET /api/files/resolve. Returned when a file
        path is searched across all configured repos.
      definition: |
        // Go (pkg/api/files_handler.go)
        type FileResolveResponse struct {
            Repo  string `json:"repo"`
            Path  string `json:"path"`
            Found bool   `json:"found"`
        }

        // TypeScript (web/src/types/filebrowser.ts)
        export interface FileResolveResponse {
          repo: string
          path: string
          found: boolean
        }
      location: pkg/api/files_handler.go
    - name: handleFilesResolve
      description: |-
        New HTTP handler for GET /api/files/resolve?path=<relpath>.
        Iterates all configured repos via s.getConfiguredRepos() and returns
        the first repo where os.Stat succeeds for the given relative path.
        Returns found: false if no repo contains the file.
      definition: |
        func (s *Server) handleFilesResolve(w http.ResponseWriter, r *http.Request)
      location: pkg/api/files_handler.go
    - name: sawClient.files.resolve
      description: |-
        New method in the files namespace of apiClient.ts.
        Calls GET /api/files/resolve?path=<path> and returns FileResolveResponse.
      definition: |
        resolve(path: string): Promise<FileResolveResponse>
      location: web/src/lib/apiClient.ts
    - name: fetchResolveFile
      description: |-
        Thin wrapper in api.ts over sawClient.files.resolve. Follows the same
        pattern as fetchFileTree and fetchFileContent.
      definition: |
        export async function fetchResolveFile(path: string): Promise<FileResolveResponse>
      location: web/src/api.ts
waves:
    - number: 1
      agents:
        - id: A
          task: |-
            ## Context

            You are fixing a file browser 404 bug in the Scout-and-Wave web app.
            When a user clicks the eye icon on a file in the File Ownership table,
            the request uses `impl.repo` (the repo that *contains* the IMPL doc),
            but the owned files may live in a *different* repo. The result is a 404.

            Your task is to add a new `/api/files/resolve` endpoint to
            `pkg/api/files_handler.go` that searches all configured repos for a
            file by relative path and returns which repo contains it.

            ## What to implement

            ### File: pkg/api/files_handler.go (scout-and-wave-web repo)

            **Step 1: Add FileResolveResponse struct** near the other response types
            at the top of the file (after FileContentResponse, before GitFileStatus):

            ```go
            // FileResolveResponse is the JSON body for GET /api/files/resolve.
            type FileResolveResponse struct {
                Repo  string `json:"repo"`
                Path  string `json:"path"`
                Found bool   `json:"found"`
            }
            ```

            **Step 2: Add handleFilesResolve handler** at the end of the file,
            after handleFilesStatus and before collectGitStatus:

            ```go
            // handleFilesResolve serves GET /api/files/resolve?path=<relpath>
            // Searches all configured repos for a file matching the given relative path.
            // Returns {"repo": "...", "path": "...", "found": true} on success,
            // or {"found": false} if the file is not found in any repo.
            func (s *Server) handleFilesResolve(w http.ResponseWriter, r *http.Request) {
                relPath := r.URL.Query().Get("path")
                if relPath == "" {
                    http.Error(w, "missing path query param", http.StatusBadRequest)
                    return
                }

                for _, repo := range s.getConfiguredRepos() {
                    absPath, ok := safeRepoPath(repo.Path, relPath)
                    if !ok {
                        continue
                    }
                    if _, err := os.Stat(absPath); err == nil {
                        respondJSON(w, http.StatusOK, FileResolveResponse{
                            Repo:  repo.Name,
                            Path:  relPath,
                            Found: true,
                        })
                        return
                    }
                }

                respondJSON(w, http.StatusOK, FileResolveResponse{Found: false})
            }
            ```

            No new imports are needed — `os`, `net/http`, and the existing helpers
            (`safeRepoPath`, `respondJSON`, `s.getConfiguredRepos`) are all already
            in scope in this file.

