suitability_assessment: |
    Suitability gate passed on all five criteria:

    1. File decomposition: 10 files across 2 repos split cleanly into 2 agents
       with disjoint file ownership. Agent A owns Go adapter code (scout-and-wave-go),
       Agent B owns web API + frontend (scout-and-wave-web). No file conflicts.

    2. Investigation-first: No unknowns. The current field names and target field
       names are fully specified. This is a straightforward rename + restructure.

    3. Interface discoverability: The cross-agent interface is the config field name
       convention (mode, webhook_url, token, destination). Both agents implement
       against the same field names independently — Go adapters read from
       map[string]string keys, web layer writes those keys. No runtime coordination.

    4. Pre-implementation status: All items are TODO. No partial implementations exist.

    5. Parallelization value: 2 agents, each touching 4-5 files with non-trivial
       logic (backward compat fallback, UI mode toggle, test updates). Go build+test
       cycle is ~15s, npm build is ~10s. Both run independently in parallel.

    Estimated times:
    - Scout phase: ~8 min
    - Agent execution: ~8 min (2 agents x 8 min avg, fully parallel single wave)
    - Merge and verification: ~3 min
    Total SAW time: ~19 min

    Sequential baseline: ~20 min (2 agents x 10 min avg)
    Time savings: ~5 min (25% faster)

    Recommendation: Clear speedup from parallel cross-repo execution. Proceed.
