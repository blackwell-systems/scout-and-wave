pre_mortem:
    overall_risk: low
    rows:
        - scenario: Existing saw.config.json files use old field names (bot_token, chat_id, channel)
          likelihood: high
          impact: low
          mitigation: Go adapters have backward-compat fallback reading old field names. Web layer writes new names going forward.
        - scenario: Agent B's web changes reference new Go adapter behavior before Agent A merges
          likelihood: low
          impact: low
          mitigation: Agents are in different repos with no compile-time dependency on field name strings. The web layer writes config JSON; Go adapters read it. Both can change independently.
        - scenario: Mode field missing in existing configs causes adapter creation failure
          likelihood: medium
          impact: medium
          mitigation: Go adapters infer mode from populated fields when mode is empty — if webhook_url is set, mode=webhook; if token is set, mode=token. Explicit mode is optional.
