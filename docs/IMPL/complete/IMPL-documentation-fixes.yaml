    overall_risk: low
    rows:
        - scenario: Agent updates E-rule range inconsistently (e.g., E1-E41 in one place, E1-E40 in another)
          likelihood: low
          impact: low
          mitigation: Each agent prompt specifies the exact string 'E1-E41' to use. Post-merge grep verification.
        - scenario: Agent misses a finding in a file with multiple findings
          likelihood: medium
          impact: low
          mitigation: Each finding is numbered and listed explicitly in agent prompts. Verification grep commands catch omissions.
        - scenario: ROADMAP.md edits land on wrong line numbers due to large file size
          likelihood: medium
          impact: low
          mitigation: Agent A should search for section headers rather than relying on line numbers. Findings reference section names.
        - scenario: Worktree path format update in agent-template.md breaks placeholder syntax
          likelihood: low
          impact: medium
          mitigation: Agent C prompt specifies to keep {slug}/{N}/{ID} placeholder syntax while adding the saw/ prefix.
