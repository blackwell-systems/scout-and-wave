interface_contracts:
    - name: GatePhase (enum type)
      description: |
        Execution phase for quality gates. Determines when a gate runs during
        finalize-wave and whether it participates in parallel execution.
      definition: |
        type GatePhase string

        const (
            GatePhasePre  GatePhase = "PRE_VALIDATION"   // Sequential: auto-fix gates (format --fix, lint --fix)
            GatePhaseMain GatePhase = "VALIDATION"       // Parallel: independent checks (typecheck, test, lint)
            GatePhasePost GatePhase = "POST_VALIDATION"  // Parallel: review gates (code_review, implementation_verify)
        )
      location: scout-and-wave-go/pkg/protocol/types.go
    - name: QualityGate.Phase (new field)
      description: |
        Phase field added to QualityGate struct. Defaults to VALIDATION when empty
        for backward compatibility with existing IMPL docs.
      definition: |
        type QualityGate struct {
            Type         string    `yaml:"type" json:"type"`
            Command      string    `yaml:"command" json:"command"`
            Required     bool      `yaml:"required" json:"required"`
            Description  string    `yaml:"description,omitempty" json:"description,omitempty"`
            Repo         string    `yaml:"repo,omitempty" json:"repo,omitempty"`
            Fix          bool      `yaml:"fix,omitempty" json:"fix,omitempty"`
            Timing       string    `yaml:"timing,omitempty" json:"timing,omitempty"`
            // NEW: Phase controls execution ordering and parallelization
            Phase        GatePhase `yaml:"phase,omitempty" json:"phase,omitempty"` // defaults to VALIDATION
            // NEW: ParallelGroup enables parallel execution within a phase
            ParallelGroup string   `yaml:"parallel_group,omitempty" json:"parallel_group,omitempty"` // empty = sequential
        }
      location: scout-and-wave-go/pkg/protocol/types.go
    - name: Cache.mu (new field for thread-safety)
      description: |
        Read-write mutex protecting concurrent access to Cache.entries map.
        CRITICAL: Parallel gate execution requires mutex protection to prevent data races.
      definition: |
        type Cache struct {
            stateDir string
            ttl      time.Duration
            mu       sync.RWMutex // NEW: Protects entries map
            entries  map[string]map[string]CachedResult
        }
      location: scout-and-wave-go/pkg/gatecache/cache.go
    - name: ValidateQualityGate (new function)
      description: |
        Validates that format gates with fix=true are placed in PRE_VALIDATION phase.
        Prevents misconfiguration that would cause cache invalidation during parallel execution.
      definition: |
        func ValidateQualityGate(gate QualityGate) error {
            if gate.Fix && gate.Phase != GatePhasePre && gate.Phase != "" {
                return fmt.Errorf("format gates with fix=true must be in PRE_VALIDATION phase (got %s)", gate.Phase)
            }
            return nil
        }
      location: scout-and-wave-go/pkg/protocol/gates.go
    - name: RunGates (function signature unchanged)
      description: |
        Existing RunGates function signature remains unchanged. Internal implementation
        is refactored to group gates by phase and parallel_group, but callers see no
        API change. This maintains backward compatibility with existing engine code.
      definition: |
        func RunGates(manifest *IMPLManifest, waveNumber int, repoDir string) result.Result[GatesData]
        func RunGatesWithCache(manifest *IMPLManifest, waveNumber int, repoDir string, cache *gatecache.Cache) result.Result[GatesData]
      location: scout-and-wave-go/pkg/protocol/gates.go
    - name: groupGatesByPhase (new internal function)
      description: |
        Internal helper that groups gates by Phase field. Returns a map of
        GatePhase → []QualityGate. Gates with empty Phase default to VALIDATION.
      definition: |
        func groupGatesByPhase(gates []QualityGate) map[GatePhase][]QualityGate {
            grouped := make(map[GatePhase][]QualityGate)
            for _, gate := range gates {
                phase := gate.Phase
                if phase == "" {
                    phase = GatePhaseMain // backward compat default
                }
                grouped[phase] = append(grouped[phase], gate)
            }
            return grouped
        }
      location: scout-and-wave-go/pkg/protocol/gates.go
    - name: groupGatesByParallelGroup (new internal function)
      description: |
        Internal helper that partitions a slice of gates into parallel groups.
        Gates with empty ParallelGroup are sequential. Gates with the same non-empty
        ParallelGroup run concurrently.
      definition: |
        func groupGatesByParallelGroup(gates []QualityGate) []gateGroup {
            // gateGroup is { parallel bool, gates []QualityGate }
            // Returns ordered list of groups: sequential first, then parallel groups
        }
      location: scout-and-wave-go/pkg/protocol/gates.go
    - name: executeGatesConcurrently (new internal function)
      description: |
        Executes a slice of gates in parallel using goroutines. Returns when all
        gates complete. Collects all results and errors before returning.
        Uses sync.WaitGroup for coordination.
      definition: |
        func executeGatesConcurrently(gates []QualityGate, repoDir string, cache *gatecache.Cache) []GateResult {
            var wg sync.WaitGroup
            results := make([]GateResult, len(gates))
            for i, gate := range gates {
                wg.Add(1)
                go func(idx int, g QualityGate) {
                    defer wg.Done()
                    results[idx] = executeSingleGate(g, repoDir, cache)
                }(i, gate)
            }
            wg.Wait()
            return results
        }
      location: scout-and-wave-go/pkg/protocol/gates.go
