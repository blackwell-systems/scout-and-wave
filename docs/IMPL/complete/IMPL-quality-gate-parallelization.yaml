            go test ./pkg/gatecache/... -v -race
            go vet ./pkg/gatecache/...
            ```

            ## Constraints
            - Do NOT change Cache method signatures (external API must remain stable)
            - Use `sync.RWMutex` (not `sync.Mutex`) to allow concurrent reads
            - All map access MUST be protected by lock/unlock
            - Race detection test MUST pass with `go test -race`
            - Ensure load/save are called within lock-protected regions
