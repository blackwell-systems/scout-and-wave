            # Agent B: Cache Thread-Safety (BLOCKER 1 FIX)

            ## What to implement
            Fix the data race vulnerability in `pkg/gatecache/cache.go` by adding mutex protection:
            1. Add `mu sync.RWMutex` field to Cache struct
            2. Wrap all Cache.Get operations with `mu.RLock()/mu.RUnlock()`
            3. Wrap all Cache.Put operations with `mu.Lock()/mu.Unlock()`
            4. Wrap Invalidate with `mu.Lock()/mu.Unlock()`
            5. Ensure load() and save() are called within lock-protected regions

            **CRITICAL CONTEXT**: This fix is a **hard blocker** for parallel gate execution. Without mutex protection,
            concurrent goroutines will cause data races on the `entries` map. The existing code assumes single-threaded
            access; parallel gates in Wave 2 will break this assumption.

            ## Implementation details

            Current vulnerable code (Cache struct):
            ```go
            type Cache struct {
                stateDir string
                ttl      time.Duration
                entries  map[string]map[string]CachedResult // NO MUTEX — data race!
            }
            ```

            Fixed code (add mutex):
            ```go
            type Cache struct {
                stateDir string
                ttl      time.Duration
                mu       sync.RWMutex // NEW: Protects entries map
                entries  map[string]map[string]CachedResult
            }
            ```

            Update all methods:

            **Get (read lock):**
            ```go
            func (c *Cache) Get(key CacheKey, gateType string) (*CachedResult, bool) {
                c.mu.RLock()
                defer c.mu.RUnlock()
                // ... existing logic ...
            }
            ```

            **Put (write lock):**
            ```go
            func (c *Cache) Put(key CacheKey, gateType string, result CachedResult) error {
                c.mu.Lock()
                defer c.mu.Unlock()
                // ... existing logic including c.save() ...
            }
            ```

            **Invalidate (write lock):**
            ```go
            func (c *Cache) Invalidate() error {
                c.mu.Lock()
                defer c.mu.Unlock()
                c.entries = make(map[string]map[string]CachedResult)
                // ... existing disk cleanup ...
            }
            ```

            **load (write lock — caller must hold lock):**
            ```go
            // load reads the cache file from disk into c.entries.
            // MUST be called with c.mu held (write lock).
            func (c *Cache) load() error {
                // ... existing logic ...
            }
            ```

            **save (read lock — caller must hold lock):**
            ```go
            // save writes c.entries to the cache file on disk.
            // MUST be called with c.mu held (lock already acquired by caller).
            func (c *Cache) save() error {
                // ... existing logic ...
            }
            ```

            Update `New()` to call load with lock held:
            ```go
            func New(stateDir string, ttl time.Duration) *Cache {
                if ttl == 0 {
                    ttl = DefaultTTL
                }
                c := &Cache{
                    stateDir: stateDir,
                    ttl:      ttl,
                    entries:  make(map[string]map[string]CachedResult),
                }
                c.mu.Lock()
                _ = c.load() // ignore load errors; start with empty cache
                c.mu.Unlock()
                return c
            }
            ```

            ## Tests required
            Add test cases to `pkg/gatecache/cache_test.go`:
            1. **TestCacheThreadSafety** — Launch 10 goroutines that call Get/Put concurrently. Run with `go test -race`.
            2. **TestConcurrentInvalidate** — One goroutine calls Invalidate while others call Get/Put. Verify no panics.
            3. **TestConcurrentPut** — Multiple goroutines Put different gate results to same cache key. Verify no corruption.

            Example race detection test:
            ```go
            func TestCacheThreadSafety(t *testing.T) {
                cache := New(t.TempDir(), DefaultTTL)
                key := CacheKey{HeadCommit: "abc123", Command: "go test"}

                var wg sync.WaitGroup
                for i := 0; i < 10; i++ {
                    wg.Add(1)
                    go func(idx int) {
                        defer wg.Done()
                        // Concurrent writes
                        _ = cache.Put(key, fmt.Sprintf("type-%d", idx), CachedResult{Passed: true})
                        // Concurrent reads
                        _, _ = cache.Get(key, fmt.Sprintf("type-%d", idx))
                    }(i)
                }
                wg.Wait()
            }
            ```

