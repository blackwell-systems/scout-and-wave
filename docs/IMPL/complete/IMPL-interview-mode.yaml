pre_mortem:
    overall_risk: medium
    rows:
        - scenario: |
            Agent C (CLI) builds against pkg/interview interfaces before Agent A (DeterministicManager)
            commits. The Manager interface is in the scaffold, but concrete NewDeterministicManager
            is in Agent A's file. If C's build runs before A commits, cmd/saw/interview_cmd.go
            will fail to link.
          likelihood: medium
          impact: medium
          mitigation: |
            Agent C implements against the Manager interface only (from scaffold), and defers
            concrete construction to a factory function in interview_cmd.go. The build tag
            workaround is documented in C's constraints. Alternatively, finalize-wave runs
            after all Wave 1 agents complete — link errors are caught then, not during agent work.
        - scenario: |
            REQUIREMENTS.md output format drifts from what saw-bootstrap.md Phase 0 expects.
            If the compiler section headers don't match the template exactly, the Scout will
            fail to extract required fields (Language, Key Concerns, etc.).
          likelihood: medium
          impact: high
          mitigation: |
            Agent B's task includes the exact section headers from saw-skill.md bootstrap template.
            Compiler tests verify specific section headings are present. Post-merge manual check:
            run a test interview, inspect REQUIREMENTS.md, verify /saw bootstrap can launch.
        - scenario: |
            saw-skill.md edit in Wave 2 inadvertently breaks existing bootstrap/scout/wave
            command parsing (e.g., regex mismatch on argument-hint or block misplacement).
          likelihood: low
          impact: high
          mitigation: |
            Agent D's constraints explicitly limit changes to additive-only lines. The saw-skill.md
            file should be read in full before any edit. Post-merge: verify existing commands
            still work by running /saw status in a test repo.
        - scenario: |
            LLM mode stub in CLI confuses users who try --mode llm and get unexpected
            deterministic behavior without a clear error.
          likelihood: medium
          impact: low
          mitigation: |
            Agent C's task specifies printing an explicit fallback warning: "LLM mode not yet
            implemented, falling back to deterministic". This is surfaced before the first question.
        - scenario: |
            Interview YAML doc format is valid YAML but sawtools validate rejects unknown
            top-level keys if someone tries to validate it as an IMPL doc.
          likelihood: low
          impact: low
          mitigation: |
            The INTERVIEW-<slug>.yaml is a separate schema from IMPLManifest and is never
            passed to sawtools validate. Its location (docs/, not docs/IMPL/) prevents
            accidental confusion.
