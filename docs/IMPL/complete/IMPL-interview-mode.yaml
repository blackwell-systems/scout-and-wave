            1. TestInterviewCmd_Help — verify --help output includes key flags
            2. TestInterviewCmd_MissingDescription — verify exit 1 when no args and no --resume
            3. TestInterviewCmd_NonInteractive_ShortFlow — pipe minimal answers via stdin,
               verify REQUIREMENTS.md written to temp dir
            4. TestInterviewCmd_Resume_NotFound — verify error message when --resume path missing
            5. TestInterviewCmd_LLMModeFallback — verify --mode llm falls back to deterministic with warning

            ## Verification Gate
            go build ./cmd/saw/... && go vet ./cmd/saw/... && go test ./cmd/saw/... -run TestInterviewCmd -v

            ## Constraints
            - Do NOT modify cmd/saw/main.go — Agent D handles that in Wave 2
            - Do NOT modify any existing cmd/saw/*.go files
            - The scaffold types.go is in pkg/interview/types.go; read it first
