title: Interview Mode for SAW Bootstrap
feature_slug: interview-mode
verdict: SUITABLE
suitability_assessment: |
    SUITABLE. The work decomposes cleanly into 4 agents across 2 repos with disjoint file
    ownership. Cross-repo build/test cycles (go test ./...) amplify parallelization benefit.

    File decomposition: 4 distinct concern areas — Go engine types/state machine (scout-and-wave-go),
    Go engine interview manager (scout-and-wave-go), sawtools CLI command (scout-and-wave-go),
    and protocol update (scout-and-wave). No single file is a bottleneck; types are scaffolded
    before Wave 1 so agents share a stable contract.

    Interface discoverability: All cross-agent interfaces are definable before implementation.
    The YAML schema for InterviewDoc, the InterviewManager interface, and the CLI command
    contract can all be specified as binding contracts.

    Output contract: The interview command produces docs/INTERVIEW-<slug>.yaml (structured state
    with full conversation history) and docs/REQUIREMENTS.md (existing bootstrap artifact).
    The Scout reads REQUIREMENTS.md unchanged — no Scout modification needed. The orchestrator
    extracts REQUIREMENTS.md from the interview doc at completion.

    Command surface: /saw interview "<description>" as a standalone command (not a --interview
    flag on bootstrap). Rationale: bootstrap reads a pre-existing REQUIREMENTS.md; interview
    generates that file. The two commands are sequential steps in the same workflow but
    separate concerns. Adding --interview to bootstrap would merge gathering and architecture
    design into one command, violating I6 (requirements intake is orchestrator duty).

    Repo placement: IMPL lives in scout-and-wave (protocol repo) since the feature spans
    all 3 repos and the protocol spec is the source of truth. Same pattern as
    IMPL-resumable-wave-sessions.yaml.

    Pre-implementation status: No existing interview machinery in any of the 3 repos. All
    TODO. Reference implementation studied: plan-cascade interview.rs (2411 lines, Rust/SQLite/
    Tauri). SAW adaptation: YAML persistence (no SQLite), CLI AskUserQuestion loop (no React),
    LLM-driven mode via orchestrator Claude (no separate LLM service). Deterministic mode
    uses fixed question set covering all 6 phases.

    Parallelization value: HIGH. Go build+test cycle >30s, 3 agents each touch 3+ files,
    tasks involve non-trivial logic (state machine, YAML I/O, CLI parsing).

    Estimated times:
    - Scout phase: ~15 min
    - Agent execution: ~4 agents x 20 min avg, Wave 1 parallel = ~20 min + Wave 2 ~15 min
    - Merge and verification: ~5 min
    Total SAW time: ~55 min
    Sequential baseline: ~4 agents x 25 min = ~100 min
    Time savings: ~45 min (45% faster)
    Recommendation: Clear speedup. Proceed.
