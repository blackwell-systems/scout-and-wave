interface_contracts:
    - name: Manager
      description: |
        Core interface for the interview state machine. Both deterministic and
        LLM-driven implementations satisfy this. The CLI command uses this interface;
        it never calls concrete implementations directly.
      definition: |
        type Manager interface {
            Start(cfg InterviewConfig) (*InterviewDoc, *InterviewQuestion, error)
            Resume(docPath string) (*InterviewDoc, *InterviewQuestion, error)
            Answer(doc *InterviewDoc, answer string) (*InterviewDoc, *InterviewQuestion, error)
            Compile(doc *InterviewDoc, outputPath string) (string, error)
            Save(doc *InterviewDoc, docPath string) error
        }
      location: pkg/interview/types.go
    - name: DeterministicManager
      description: |
        Fixed question-set implementation. Covers all 6 phases with required fields
        checked before phase advance. Works without LLM; used for testing and offline use.
        Phase transition logic: advance when all required fields for the current phase
        are non-empty in SpecData.
      definition: |
        // pkg/interview/deterministic.go
        type DeterministicManager struct {
            docsDir string // base dir for writing INTERVIEW-<slug>.yaml files
        }

        func NewDeterministicManager(docsDir string) *DeterministicManager

        // Implements Manager interface.
      location: pkg/interview/deterministic.go
    - name: InterviewDoc (YAML schema)
      description: |
        YAML file written to docs/INTERVIEW-<slug>.yaml. Persists the full interview
        state including history, spec_data being built, and output path.
        This file is git-trackable and survives process restarts.
      definition: |
        # docs/INTERVIEW-<slug>.yaml schema
        id: <uuid>
        slug: <feature-slug>
        status: in_progress | complete
        mode: deterministic | llm
        description: "original description string"
        created_at: 2026-01-01T00:00:00Z
        updated_at: 2026-01-01T00:00:00Z
        phase: overview | scope | requirements | interfaces | stories | review | complete
        question_cursor: 0
        max_questions: 18
        progress: 0.0
        spec_data:
          overview:
            title: ""
            goal: ""
            success_metrics: []
            non_goals: []
          scope:
            in_scope: []
            out_of_scope: []
            assumptions: []
          requirements:
            functional: []
            non_functional: []
            constraints: []
          interfaces:
            data_models: []
            apis: []
            external: []
          stories: []
          open_questions: []
        history:
          - turn_number: 1
            phase: overview
            question: "What is the title of this project/feature?"
            answer: "Interview Mode for SAW Bootstrap"
            timestamp: 2026-01-01T00:00:00Z
        requirements_path: docs/REQUIREMENTS.md
      location: pkg/interview/types.go
    - name: newInterviewCmd (sawtools CLI)
      description: |
        CLI command: sawtools interview "<description>" [--mode deterministic|llm]
        [--max-questions N] [--project-path <path>] [--resume <interview-doc-path>]
        [--output <requirements-output-path>]

        Drives the AskUserQuestion interaction loop: prints each question to stdout,
        reads stdin for each answer, writes state to INTERVIEW-<slug>.yaml after each
        turn. On completion writes docs/REQUIREMENTS.md.

        Exit codes: 0 = interview complete and REQUIREMENTS.md written,
        1 = error, 2 = interview started but not yet complete (resumable).
      definition: |
        // cmd/saw/interview_cmd.go
        func newInterviewCmd() *cobra.Command
      location: cmd/saw/interview_cmd.go
    - name: CompileToRequirements
      description: |
        Converts a complete InterviewDoc into the REQUIREMENTS.md template format
        expected by saw-bootstrap.md Phase 0. This is the output contract linking
        /saw interview to /saw bootstrap.
      definition: |
        // pkg/interview/compiler.go
        // CompileToRequirements generates a REQUIREMENTS.md-compatible markdown string
        // from a completed InterviewDoc. The output matches the template in saw-skill.md
        // bootstrap section exactly (Language, Project Type, Key Concerns, Storage,
        // External Integrations, Architectural Decisions Already Made sections).
        func CompileToRequirements(doc *InterviewDoc) (string, error)
      location: pkg/interview/compiler.go
    - name: /saw interview (protocol command)
      description: |
        Orchestrator command added to saw-skill.md. Invocation:
          /saw interview "<description>"
        Launches sawtools interview command as a subprocess (or uses AskUserQuestion
        loop inline). On completion, the REQUIREMENTS.md is present and the orchestrator
        can immediately launch /saw bootstrap or /saw scout with that file as input.
      definition: |
        # In saw-skill.md Invocation Modes table:
        | /saw interview "<description>" | Conduct structured requirements interview, write docs/REQUIREMENTS.md |
        | /saw interview --resume <path>  | Resume an in-progress interview from its YAML doc |
      location: implementations/claude-code/prompts/saw-skill.md
waves:
    - number: 1
      agents:
        - id: A
          task: |
            ## Role
            Implement the DeterministicManager — the fixed-question-set interview state machine.

            ## What to Implement

            ### pkg/interview/deterministic.go
            Implement `DeterministicManager` satisfying the `Manager` interface from the scaffold:

            ```go
            type DeterministicManager struct {
                docsDir string
            }

            func NewDeterministicManager(docsDir string) *DeterministicManager
            ```

            The `Start` method:
            - Generates a slug from `cfg.Description` (lowercase, hyphenated, max 40 chars)
            - Creates an `InterviewDoc` with status="in_progress", phase=PhaseOverview,
              question_cursor=0, max_questions defaulting to 18 if cfg.MaxQuestions == 0
            - Returns the doc and the first question from `generateQuestion(doc)`

            The `Answer` method:
            - Records the answer as an `InterviewTurn` appended to `doc.History`
            - Calls `applyAnswerToSpec(doc, answer)` to update `doc.SpecData`
            - Increments `doc.QuestionCursor`
            - Calls `checkPhaseTransition(doc)` — if required fields for current phase
              are all non-empty, advance `doc.Phase` to the next phase
            - If new phase is PhaseComplete, set `doc.Status = "complete"`
            - Sets `doc.UpdatedAt = time.Now()`
            - Calls `generateQuestion(doc)` to get next question (nil if complete)
            - Calls `Save` to persist state
            - Returns updated doc and next question

            The `Resume` method:
            - Reads the YAML file at `docPath`, unmarshals into `InterviewDoc`
            - If status == "complete", returns the doc with nil question
            - Otherwise returns doc + `generateQuestion(doc)`

            The `Save` method:
            - Marshals doc to YAML, writes to `<docsDir>/INTERVIEW-<doc.Slug>.yaml`
            - Creates directory if needed

            The `Compile` method: delegates to `CompileToRequirements(doc)` from compiler.go.

            ### pkg/interview/phase_questions.go
            The `generateQuestion(doc *InterviewDoc) *InterviewQuestion` function.

            Fixed question set per phase. Check `doc.SpecData` to determine which field
            is missing; return the first missing required question. Pattern mirrors plan-cascade
            gen_overview_question logic but adapted to Go/SAW context.

            Phase transition requirements (all fields must be non-empty to advance):
            - Overview: Title + Goal (success_metrics and non_goals are optional)
            - Scope: InScope (out_of_scope and assumptions are optional)
            - Requirements: Functional (at least 1 item)
            - Interfaces: at least 1 of DataModels/APIs/External non-empty, OR
              user answered "none" to skip
            - Stories: at least 1 story, OR user answered "none" to skip
            - Review: always advances after one turn (open_questions captured)

            **Overview questions (in order):**
            1. field=title: "What is the title of this project or feature?"
            2. field=goal: "What is the primary goal? (one sentence)"
            3. field=success_metrics: "What are the success metrics? (comma-separated, or 'skip')"
            4. field=non_goals: "What is explicitly out of scope? (comma-separated, or 'skip')"

            **Scope questions:**
            1. field=in_scope: "What is in scope? List the key deliverables (comma-separated)"
            2. field=out_of_scope: "What is out of scope? (comma-separated, or 'skip')"
            3. field=assumptions: "What assumptions are you making? (comma-separated, or 'skip')"

            **Requirements questions:**
            1. field=functional: "List the functional requirements (one per line or comma-separated)"
            2. field=non_functional: "Any non-functional requirements? (e.g., performance, security — or 'skip')"
            3. field=constraints: "Any technical constraints? (e.g., Go 1.21+, no CGO — or 'skip')"

            **Interfaces questions:**
            1. field=data_models: "What are the key data models or types? (or 'skip')"
            2. field=apis: "What are the key APIs or command interfaces? (or 'skip')"
            3. field=external: "Any external integrations? (or 'skip')"

            **Stories questions:**
            1. field=stories: "List the key user stories or tasks (one per line, or 'skip')"

            **Review questions:**
            1. field=open_questions: "Any open questions or unresolved decisions? (or 'skip')"
            2. field=_confirm: "Review complete. Ready to generate REQUIREMENTS.md? (yes/no)"

            Answer parsing: comma-separated values are split into string slices.
            "skip" clears the field and allows phase to advance.
            Boolean confirmation ("yes"/"y") on _confirm transitions to Complete.

            ## Interfaces to Implement
            - `Manager` interface from `pkg/interview/types.go` (scaffold)

            ## Interfaces to Call
            - `InterviewDoc`, `InterviewQuestion`, `InterviewTurn`, `SpecData` from scaffold
            - `CompileToRequirements` from `pkg/interview/compiler.go` (Agent B) — call via Manager.Compile delegation

            ## Tests to Write (pkg/interview/deterministic_test.go)
            1. TestDeterministicManager_Start — verifies first question is Overview/title
            2. TestDeterministicManager_FullFlow — drives all 6 phases with minimal answers, verifies reaching Complete
            3. TestDeterministicManager_PhaseTransition_Overview — verifies phase advances after title+goal filled
            4. TestDeterministicManager_PhaseTransition_RequiresTitle — verifies phase does NOT advance if title empty
            5. TestDeterministicManager_SkipOptional — verifies "skip" answers advance phase correctly
            6. TestDeterministicManager_Resume — writes a partial doc, resumes, verifies correct question returned
            7. TestGenerateQuestion_AllPhases — smoke test: one question generated for each phase

            ## Verification Gate
            go build ./pkg/interview/... && go vet ./pkg/interview/... && go test ./pkg/interview/... -run TestDeterministic -v

            ## Constraints
            - Do NOT import or reference cmd/ packages
            - Do NOT read saw-skill.md or any protocol files — this is pure Go logic
            - The scaffold file pkg/interview/types.go is already committed; read it first
            - Slug generation: lowercase, spaces→hyphens, strip non-alphanumeric except hyphens, max 40 chars
            - YAML persistence uses gopkg.in/yaml.v3 (check go.mod for existing import)
            - All answers are strings from stdin; no type coercion needed beyond comma-split
            - "skip" handling: if the answer is "skip" (case-insensitive), record empty slice and allow phase advance
          files:
            - pkg/interview/deterministic.go
            - pkg/interview/deterministic_test.go
            - pkg/interview/phase_questions.go
        - id: B
          task: |
            ## Role
            Implement the requirements compiler — converts a completed InterviewDoc into
            a REQUIREMENTS.md file and a doc.go package documentation file.

            ## What to Implement

            ### pkg/interview/compiler.go
            ```go
            package interview

            // CompileToRequirements converts a completed InterviewDoc into the
            // REQUIREMENTS.md format expected by saw-bootstrap.md Phase 0.
            // Returns the rendered markdown string.
            func CompileToRequirements(doc *InterviewDoc) (string, error)
            ```

            The output REQUIREMENTS.md format must match the template in saw-skill.md
            bootstrap section exactly:

            ```markdown
            # Requirements: <title>

            ## Language & Ecosystem
            <!-- extracted from interfaces.external or left as placeholder -->

            ## Project Type
            <!-- extracted from overview.goal context or left as placeholder -->

            ## Deployment Target
            <!-- extracted from requirements.constraints or left as placeholder -->

            ## Key Concerns (3-6 major responsibility areas)
            <!-- These become packages/modules. Each gets its own agent. -->
            1. <from scope.in_scope items>
            2. ...

            ## Storage
            <!-- extracted from interfaces.data_models or left as placeholder -->

            ## External Integrations
            <!-- from interfaces.external -->

            ## Source Codebase (if porting/adapting)
            <!-- left as placeholder unless doc.SpecData.Interfaces.External contains "source:" prefix -->

            ## Architectural Decisions Already Made
            <!-- from requirements.constraints + requirements.non_functional -->
            ```

            Mapping logic:
            - `# Requirements: <title>` → `doc.SpecData.Overview.Title`
            - Key Concerns → `doc.SpecData.Scope.InScope` items (numbered list)
            - External Integrations → `doc.SpecData.Interfaces.External`
            - Architectural Decisions Already Made → `doc.SpecData.Requirements.Constraints`
              joined with `doc.SpecData.Requirements.NonFunctional`
            - All other sections → literal `<!-- placeholder — fill in before running /saw bootstrap -->`
              comment if the source field is empty, otherwise render the value

            Additionally implement:
            ```go
            // WriteRequirementsFile writes the compiled REQUIREMENTS.md to disk.
            func WriteRequirementsFile(doc *InterviewDoc, outputPath string) error
            ```

            ### pkg/interview/doc.go
            Package-level godoc comment:
            ```go
            // Package interview implements the SAW requirements interview state machine.
            // It provides a multi-turn CLI-driven conversation that elicits project
            // requirements and produces a REQUIREMENTS.md compatible with /saw bootstrap.
            //
            // Two modes are supported:
            //   - deterministic: fixed question set, no LLM required (default)
            //   - llm: LLM-driven contextual questions (requires orchestrator integration)
            //
            // State is persisted to docs/INTERVIEW-<slug>.yaml after each turn.
            // Interviews are resumable across process restarts.
            package interview
            ```

            ## Interfaces to Implement
            - `Manager.Compile` contract: `Compile(doc *InterviewDoc, outputPath string) (string, error)`

            ## Interfaces to Call
            - `InterviewDoc`, `SpecData` from `pkg/interview/types.go` (scaffold)

            ## Tests to Write (pkg/interview/compiler_test.go)
            1. TestCompileToRequirements_FullDoc — complete doc with all fields, verify all sections rendered
            2. TestCompileToRequirements_EmptyFields — doc with empty optional fields, verify placeholder comments
            3. TestCompileToRequirements_KeyConcernsFromScope — verifies InScope items become numbered Key Concerns
            4. TestCompileToRequirements_ArchDecisionsFromConstraints — verifies constraints appear in Arch Decisions
            5. TestWriteRequirementsFile — writes to temp dir, reads back, verifies content matches

            ## Verification Gate
            go build ./pkg/interview/... && go vet ./pkg/interview/... && go test ./pkg/interview/... -run TestCompile -v

            ## Constraints
            - Do NOT import cmd/ packages
            - The scaffold file pkg/interview/types.go is already committed; read it first before writing any code
            - Use text/template or direct string building — no external templating library
            - Output must be valid markdown; verify with a string contains check in tests
            - Placeholder comments use HTML comment syntax: <!-- ... -->
          files:
            - pkg/interview/compiler.go
            - pkg/interview/compiler_test.go
            - pkg/interview/doc.go
        - id: C
          task: |
            ## Role
            Implement the sawtools interview CLI command that drives the AskUserQuestion
            interaction loop.

            ## What to Implement

            ### cmd/saw/interview_cmd.go
            ```go
            func newInterviewCmd() *cobra.Command
            ```

            Command signature:
            ```
            sawtools interview "<description>" [flags]

            Flags:
              --mode string           Question mode: deterministic or llm (default "deterministic")
              --max-questions int     Soft cap on total questions (default 18)
              --project-path string   Optional path to existing project for context
              --resume string         Path to an existing INTERVIEW-<slug>.yaml to resume
              --output string         Path for output REQUIREMENTS.md (default "docs/REQUIREMENTS.md")
              --docs-dir string       Directory to write INTERVIEW doc (default "docs")
              --non-interactive       Read answers from stdin without prompts (for testing/piping)
            ```

            Behavior:
            1. If --resume is provided: load existing InterviewDoc, skip to current question
            2. Otherwise: create InterviewConfig from flags+args, call manager.Start()
            3. Print current question to stdout:
               ```
               [Phase: Overview | Q 1/18]
               What is the title of this project or feature?
               >
               ```
            4. Read one line from stdin as the answer
            5. Call manager.Answer(doc, answer)
            6. If next question is nil (complete): call manager.Compile + WriteRequirementsFile,
               print completion message with output path, exit 0
            7. Otherwise: loop to step 3

            Output format for each question:
            ```
            [Phase: Overview | Q 1/18 | 0%]
            What is the title of this project or feature?
            >
            ```

            On completion:
            ```
            Interview complete. (18/18 questions)
            REQUIREMENTS.md written to: docs/REQUIREMENTS.md
            Interview doc saved to: docs/INTERVIEW-my-feature.yaml
            Next step: /saw bootstrap or /saw scout
            ```

            Error handling:
            - If description is empty and --resume is not set: print usage and exit 1
            - If --resume path does not exist: print error and exit 1
            - If stdin is closed before interview completes: save state, print resume command, exit 2

            Manager construction:
            - mode == "deterministic": `interview.NewDeterministicManager(docsDir)`
            - mode == "llm": print "LLM mode not yet implemented, falling back to deterministic"
              and use DeterministicManager (stub for future)

