pre_mortem:
    overall_risk: low
    rows:
        - scenario: Agent A's GetWorktreeBaseCommit logic fails on worktrees with no commits (fresh worktrees)
          likelihood: medium
          impact: low
          mitigation: Test explicitly covers fresh worktree case; fallback to current HEAD is safe default
        - scenario: Agent B's staleness detection removes valid worktree due to false positive on base commit check
          likelihood: low
          impact: medium
          mitigation: Base commit comparison is SHA-based (deterministic); test coverage includes "reuse valid worktree" case
        - scenario: Hook verification fails to detect corrupted hooks (false negative)
          likelihood: low
          impact: high
          mitigation: VerifyHookInWorktree checks both file existence + content markers (two-layer validation); matches prepare-wave's existing verifyHookInstalled logic
        - scenario: Unmerged branch from failed session blocks CreateWorktrees, preventing wave start
          likelihood: medium
          impact: medium
          mitigation: Error message explicitly guides user to manual cleanup; this is correct behavior (preserves potentially valuable work)
