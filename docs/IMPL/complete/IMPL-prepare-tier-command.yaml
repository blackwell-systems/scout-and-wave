pre_mortem:
    overall_risk: low
    rows:
        - scenario: Agent B imports protocol.PrepareTier before Agent A creates it
          likelihood: medium
          impact: low
          mitigation: |
            Both agents are in Wave 1 with isolated worktrees. Agent B's build gate
            will fail in isolation but succeed post-merge. The function signature is
            defined in interface contracts so Agent B can code against it.
        - scenario: resolveIMPLPath behavior differs when called from PrepareTier vs standalone
          likelihood: low
          impact: low
          mitigation: |
            resolveIMPLPath is a simple path resolution function with no side effects.
            PrepareTier calls it identically to CheckIMPLConflicts.
        - scenario: CreateProgramWorktrees modifies git state making operation non-idempotent
          likelihood: medium
          impact: medium
          mitigation: |
            CreateProgramWorktrees already handles stale branches (auto-cleans merged ones).
            Document that re-running prepare-tier after partial failure may require manual
            branch cleanup if branches were created but not merged.
