feature_slug: h5-prelaunch-validation-gate
verdict: SUITABLE
suitability_assessment: |
    SUITABLE. H5 requires implementation in two separate repositories with disjoint
    concerns: (1) a CLI bash hook in scout-and-wave (protocol repo) and (2) a Go
    engine-level validation function in scout-and-wave-go (Go SDK repo). The work
    decomposes cleanly into 3 agents across 2 waves.

    File decomposition: 3 agents with fully disjoint file ownership across 2 repos.
    No shared files within a wave.

    Investigation-first items: None. The validation checks are well-defined in the
    hooks-determinism-roadmap.md and the existing code patterns (check_wave_ownership,
    PreWaveGate, VerifyIsolation) provide clear templates.

    Interface discoverability: The interface between CLI hook and Go engine is the
    .saw-ownership.json file and IMPL doc YAML — both already standardized.

    Pre-implementation status: H2 (basic IMPL path check) exists only as a roadmap
    item, not implemented. PreWaveGate exists in pkg/protocol/pre_wave_gate.go but
    runs at prepare-wave time, not at agent launch time. The CLI hooks directory has
    5 existing hooks but none for the Agent tool matcher. All H5 checks are TODO.

    Parallelization value: High. Two repos, independent file sets, Go test suite
    takes >30s. Wave 1 agents (CLI hook + Go engine) are fully independent.
    Wave 2 wires installer updates.

    Estimated times:
    - Scout phase: ~8 min (dependency mapping, interface contracts, IMPL doc)
    - Agent execution: ~10 min (3 agents, 2 waves, ~5 min avg per agent)
    - Merge and verification: ~3 min
    Total SAW time: ~21 min
    Sequential baseline: ~25 min (3 agents x ~8 min avg)
    Time savings: ~4 min (16% faster)
    Recommendation: Clear speedup plus coordination value across 2 repos.
