interface_contracts:
    - name: validate_agent_launch CLI hook
      description: |
        Bash script that runs as a PreToolUse hook with matcher "Agent".
        Reads JSON from stdin, validates SAW agent launch preconditions,
        exits 1 to block or 0 to allow.
      definition: |
        Input (stdin JSON):
          {
            "tool_name": "Agent",
            "tool_input": {
              "prompt": "<agent prompt text>",
              "description": "<agent description with SAW tag>"
            },
            "agent_type": "wave-agent" | "scout" | "integration-agent" | "scaffold-agent"
          }

        Validation checks (in order):
          1. Extract IMPL path from prompt (regex: docs/IMPL/IMPL-[a-z0-9-]+\.yaml)
          2. Verify IMPL file exists on disk
          3. Extract wave number from SAW tag in description ([SAW:wave{N}:agent-{ID}])
          4. Extract agent ID from SAW tag
          5. Find .saw-ownership.json — verify agent ID and wave match
          6. Verify worktree branch matches expected pattern (saw/{slug}/wave{N}-agent-{ID})
          7. Check scaffolds committed (if any exist in IMPL doc, via sawtools validate)
          8. Verify no I1 ownership conflicts with .saw-ownership.json

        Exit codes:
          0 — allow launch
          1 — block with diagnostic on stderr

        Non-SAW agents (no SAW tag in description): exit 0 (allow)
      location: implementations/claude-code/hooks/validate_agent_launch
    - name: PreLaunchGate
      description: |
        Go function for engine-level pre-launch validation. Called by the
        orchestrator before dispatching each agent. Returns structured result
        with per-check pass/fail status.
      definition: |
        package hooks

        // PreLaunchCheck is a single pre-launch validation result.
        type PreLaunchCheck struct {
            Name    string `json:"name"`
            Status  string `json:"status"`  // "pass", "fail", "warn"
            Message string `json:"message"`
        }

        // PreLaunchResult is the aggregate pre-launch validation result.
        type PreLaunchResult struct {
            Ready  bool              `json:"ready"`
            Checks []PreLaunchCheck  `json:"checks"`
        }

        // PreLaunchGate validates all preconditions before launching a wave agent.
        // Parameters:
        //   manifest  — parsed IMPL manifest
        //   waveNum   — wave number being launched
        //   agentID   — agent letter/ID being launched
        //   repoRoot  — absolute path to repository root
        //   wtPath    — absolute path to agent's worktree (empty for integration waves)
        //
        // Checks performed:
        //   1. IMPL doc validates (calls protocol.Validate)
        //   2. Wave exists and is not already completed
        //   3. Agent ID exists in the specified wave
        //   4. Worktree path exists and is on correct branch
        //   5. Scaffolds are committed (I2 defense-in-depth)
        //   6. File ownership has no I1 conflicts
        //   7. Critic report exists if E37 threshold met
        func PreLaunchGate(
            manifest *protocol.IMPLManifest,
            waveNum int,
            agentID string,
            repoRoot string,
            wtPath string,
        ) *PreLaunchResult
      location: pkg/hooks/prelaunch_gate.go
waves:
    - number: 1
      agents:
        - id: A
          task: |
            ## CLI Hook: validate_agent_launch

            Create a new bash script at `implementations/claude-code/hooks/validate_agent_launch`
            that implements the H5 pre-launch validation gate as a Claude Code PreToolUse hook
            with matcher "Agent".

            **Context**: This hook fires before every Agent tool call. It must be fast (<100ms)
            and only enforce on SAW agents (identified by [SAW:wave{N}:agent-{ID}] tag in the
            description field). Non-SAW agents must pass through (exit 0).

            **Follow the existing hook pattern** in `check_wave_ownership` and `check_scout_boundaries`:
            - `set -euo pipefail`
            - Read JSON from stdin via `cat` + `jq`
            - Extract `tool_name`, `agent_type`, `tool_input.prompt`, `tool_input.description`
            - Early exit 0 for non-matching conditions

            **Validation checks to implement (in order, fail-fast)**:

            1. **SAW tag extraction**: Parse `[SAW:wave{N}:agent-{ID}]` from `tool_input.description`.
               If no SAW tag found, exit 0 (not a SAW agent, allow).

            2. **IMPL path extraction**: Grep the prompt for `docs/IMPL/IMPL-[a-z0-9-]+\.yaml`.
               If not found, exit 1: "H5: No IMPL doc path found in agent prompt."

            3. **IMPL file exists**: Check file exists on disk.
               If missing, exit 1: "H5: IMPL doc not found at {path}." (subsumes H2)

            4. **Wave state check**: Use `sawtools validate` to verify IMPL parses.
               If invalid, exit 1: "H5: IMPL doc validation failed."

            5. **Agent exists in wave**: Use `jq` to check the IMPL YAML for the agent ID
               in the specified wave. Parse with `yq` if available, fall back to grep pattern.
               If not found, exit 1: "H5: Agent {ID} not found in wave {N}."

            6. **.saw-ownership.json check**: Walk up from CWD to find `.saw-ownership.json`.
               If found, verify agent ID and wave number match the SAW tag.
               If mismatch, exit 1: "H5: Ownership file mismatch."

            7. **Worktree branch check**: If `.saw-ownership.json` exists, verify current
               git branch matches expected pattern `saw/{slug}/wave{N}-agent-{ID}` or
               legacy `wave{N}-agent-{ID}`.

            8. **Scaffold check**: If IMPL has scaffolds section, check all have status "committed"
               via simple yaml/grep parsing.

            **Error output format**: All errors to stderr, diagnostic message includes check name.
            Exit 1 to block, exit 0 to allow.

            **Testing**: Add a comment block at the top with manual test commands, similar
            to the README test examples for check_scout_boundaries.

            **File**: `implementations/claude-code/hooks/validate_agent_launch`
            Make it executable (chmod +x).

            **Verification gate**:
            ```bash
            # Verify script is syntactically valid bash
            bash -n implementations/claude-code/hooks/validate_agent_launch
            # Verify non-SAW agent passes through
            echo '{"tool_name":"Agent","tool_input":{"prompt":"hello","description":"general task"}}' | bash implementations/claude-code/hooks/validate_agent_launch
            echo $?  # Should be 0
            ```
          files:
            - implementations/claude-code/hooks/validate_agent_launch
        - id: B
          task: |
            ## Go Engine: PreLaunchGate

            Create `pkg/hooks/prelaunch_gate.go` and `pkg/hooks/prelaunch_gate_test.go` in
            the scout-and-wave-go repository.

            **Context**: The existing `pkg/hooks/` package has `scout_boundaries.go` (I6 enforcement).
            Add a new `PreLaunchGate` function that validates all preconditions before launching
            a wave agent from the Go orchestrator.

            **Follow the existing pattern** in `pkg/protocol/pre_wave_gate.go`:
            - Return a structured result with per-check pass/fail
            - Use `PreLaunchCheck` and `PreLaunchResult` types (see interface contract)
            - Ready = true only if no check has status "fail"

            **Types to define** (in prelaunch_gate.go):

            ```go
            type PreLaunchCheck struct {
                Name    string `json:"name"`
                Status  string `json:"status"`  // "pass", "fail", "warn"
                Message string `json:"message"`
            }

            type PreLaunchResult struct {
                Ready  bool              `json:"ready"`
                Checks []PreLaunchCheck  `json:"checks"`
            }
            ```

            **PreLaunchGate function signature**:

            ```go
            func PreLaunchGate(
                manifest *protocol.IMPLManifest,
                waveNum int,
                agentID string,
                repoRoot string,
                wtPath string,
            ) *PreLaunchResult
            ```

            **Validation checks to implement (in order)**:

            1. **validation** — Call `protocol.Validate(manifest)` and check for errors.
               Status "fail" if any validation errors.

            2. **wave_exists** — Verify the wave number exists in manifest.Waves and is not
               already complete (check completion_reports for all agents in that wave).

            3. **agent_exists** — Verify agentID exists in the specified wave's agents list.

            4. **worktree_branch** — If wtPath is non-empty, verify:
               a. The directory exists
               b. Current git branch matches expected pattern using `git.Run(wtPath, "rev-parse", "--abbrev-ref", "HEAD")`
               Expected branch: `saw/{slug}/wave{N}-agent-{ID}` or legacy `wave{N}-agent-{ID}`
               Import `internal/git` for git operations.

            5. **scaffolds_committed** — Call `protocol.AllScaffoldsCommitted(manifest)`.
               Status "fail" if scaffolds exist but not all committed.

            6. **ownership_disjoint** — Filter `protocol.Validate(manifest)` errors for
               code "I1_VIOLATION". Status "fail" if any I1 violations found.

            7. **critic_review** — Reuse logic from `protocol.PreWaveGate` checkCriticReview.
               Count total agents; if >= 3 or multi-repo, require critic report.
               Status "fail" if required but missing/failed.

            **Import requirements**:
            - `github.com/blackwell-systems/scout-and-wave-go/pkg/protocol`
            - `github.com/blackwell-systems/scout-and-wave-go/internal/git`
            - `fmt`, `os`, `strings`

            **Tests** (in prelaunch_gate_test.go):

            Write table-driven tests covering:
            - Valid manifest with all checks passing
            - Missing wave number (wave_exists fails)
            - Missing agent ID (agent_exists fails)
            - Uncommitted scaffolds (scaffolds_committed fails)
            - All agents completed (wave_exists warns about re-launch)
            - I1 violation (ownership_disjoint fails)

            Use `protocol.IMPLManifest` struct literals for test fixtures (no file I/O needed
            for most tests). For worktree_branch test, use t.TempDir() with a git init.

            **Verification gate**:
            ```bash
            cd /Users/dayna.blackwell/code/scout-and-wave-go
            go build ./pkg/hooks/...
            go vet ./pkg/hooks/...
            go test ./pkg/hooks/... -v -run TestPreLaunchGate
            ```
          files:
            - pkg/hooks/prelaunch_gate.go
            - pkg/hooks/prelaunch_gate_test.go
