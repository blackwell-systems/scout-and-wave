               echo "   Installing validate_agent_launch..."
               if [ -L "$VALIDATE_LAUNCH_SYMLINK" ]; then
                 ln -sf "$VALIDATE_LAUNCH_SCRIPT" "$VALIDATE_LAUNCH_SYMLINK"
