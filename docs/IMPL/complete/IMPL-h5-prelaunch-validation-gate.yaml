pre_mortem:
    overall_risk: low
    rows:
        - scenario: CLI hook too slow (>100ms) due to sawtools validate call
          likelihood: medium
          impact: medium
          mitigation: Make sawtools validate optional — only call if available. Use grep/jq for fast checks. sawtools validate is defense-in-depth, not primary.
        - scenario: yq not available on all systems for YAML parsing in bash
          likelihood: high
          impact: low
          mitigation: Use jq with yaml2json conversion or grep-based pattern matching as fallback. Do not require yq.
        - scenario: Hook blocks legitimate non-SAW Agent tool calls
          likelihood: low
          impact: high
          mitigation: Exit 0 early if no SAW tag in description. Only enforce on agents with [SAW:wave{N}:agent-{ID}] pattern.
        - scenario: Git operations in hook fail in non-git directories
          likelihood: medium
          impact: low
          mitigation: Wrap git commands in conditionals. If not in a git repo, skip branch checks (exit 0).
