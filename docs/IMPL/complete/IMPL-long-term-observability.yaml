            - Use `github.com/lib/pq` or `github.com/jackc/pgx/v5`
            - RecordEvent: INSERT event as JSONB in data column, extract common fields to indexed
              columns
            - QueryEvents: SELECT with WHERE clauses built from filters, ORDER BY timestamp DESC
            - GetRollup: Use SQL GROUP BY aggregations, leverage JSONB operators for nested fields
            - Close: close connection pool

            **Connection string:**
            - Support standard Postgres DSN: `postgres://user:pass@host:port/dbname?sslmode=...`
            - Use connection pooling (pgx.ConnPool or sql.DB with SetMaxOpenConns)
            - Auto-create schema if not exists (CREATE TABLE IF NOT EXISTS)
            - Run migrations on connect

            **Concurrency:**
            - Postgres handles concurrent writes natively
            - Use connection pool (5-10 connections for typical workload)
            - Prepared statements for query performance

            **Tests:**
