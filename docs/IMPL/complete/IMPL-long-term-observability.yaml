interface_contracts:
    - name: Event
      description: Base event interface for all observability events
      definition: |
        type Event interface {
            EventID() string
            EventType() string
            Timestamp() time.Time
            Metadata() map[string]interface{}
        }
      location: pkg/observability/events.go
    - name: CostEvent
      description: Token usage and cost tracking event
      definition: |
        type CostEvent struct {
            ID            string
            Type          string // "cost"
            Time          time.Time
            AgentID       string
            WaveNumber    int
            IMPLSlug      string
            ProgramSlug   string // optional, if part of a program
            Model         string
            InputTokens   int
            OutputTokens  int
            CostUSD       float64
            Metadata      map[string]interface{}
        }
      location: pkg/observability/events.go
    - name: AgentPerformanceEvent
      description: Agent execution outcome tracking
      definition: |
        type AgentPerformanceEvent struct {
            ID              string
            Type            string // "agent_performance"
            Time            time.Time
            AgentID         string
            WaveNumber      int
            IMPLSlug        string
            ProgramSlug     string // optional
            Status          string // "success" | "failed" | "blocked" | "partial"
            FailureType     string // if failed: "transient" | "fixable" | "needs_replan" | "escalate"
            RetryCount      int
            DurationSeconds int
            FilesModified   []string
            TestsPassed     int
            TestsFailed     int
            Metadata        map[string]interface{}
        }
      location: pkg/observability/events.go
    - name: ActivityEvent
      description: High-level orchestrator actions (Scout launch, Wave start, merge, etc.)
      definition: |
        type ActivityEvent struct {
            ID           string
            Type         string // "activity"
            Time         time.Time
            ActivityType string // "scout_launch" | "wave_start" | "wave_merge" | "impl_complete"
            IMPLSlug     string
            ProgramSlug  string // optional
            WaveNumber   int    // if wave-related
            User         string // who triggered the action
            Details      string
            Metadata     map[string]interface{}
        }
      location: pkg/observability/events.go
    - name: Store
      description: Storage interface for observability events (SQLite/PostgreSQL implementations)
      definition: |
        type Store interface {
            // RecordEvent writes a new event to storage
            RecordEvent(ctx context.Context, event Event) error

            // QueryEvents retrieves events matching filters
            QueryEvents(ctx context.Context, filters QueryFilters) ([]Event, error)

            // GetRollup computes aggregated metrics
            GetRollup(ctx context.Context, rollup RollupRequest) (*RollupResult, error)

            // Close releases resources
            Close() error
        }
      location: pkg/observability/store.go
    - name: QueryFilters
      description: Query filter parameters for event retrieval
      definition: |
        type QueryFilters struct {
            EventTypes   []string   // filter by event type ("cost", "agent_performance", "activity")
            IMPLSlugs    []string   // filter by IMPL slug
            ProgramSlugs []string   // filter by program slug
            AgentIDs     []string   // filter by agent ID
            StartTime    *time.Time // events after this time
            EndTime      *time.Time // events before this time
            Limit        int        // max results (default 100)
            Offset       int        // pagination offset
        }
      location: pkg/observability/query.go
    - name: RollupRequest
      description: Aggregation request for metrics rollup
      definition: |
        type RollupRequest struct {
            Type         string     // "cost" | "success_rate" | "retry_count"
            GroupBy      []string   // "agent" | "wave" | "impl" | "program" | "model"
            IMPLSlug     string     // optional: scope to specific IMPL
            ProgramSlug  string     // optional: scope to specific program
            StartTime    *time.Time
            EndTime      *time.Time
        }
      location: pkg/observability/rollups.go
    - name: RollupResult
      description: Aggregated metrics result
      definition: |
        type RollupResult struct {
            Type      string
            Groups    []RollupGroup
            TotalCost float64 // if cost rollup
            AvgRate   float64 // if success_rate rollup
        }

        type RollupGroup struct {
            Key       map[string]string // e.g., {"agent": "A", "wave": "1"}
            Count     int
            TotalCost float64
            SuccessRate float64
            AvgRetries float64
        }
      location: pkg/observability/rollups.go
