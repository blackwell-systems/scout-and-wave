pre_mortem:
    overall_risk: medium
    rows:
        - scenario: Database schema incompatibility between SQLite and PostgreSQL implementations
          likelihood: medium
          impact: high
          mitigation: Define unified schema in Agent B's store.go as documentation. Both C and D implement identical schema with database-specific types. Add schema validation tests.
        - scenario: Query performance degrades with large event volumes (>100k events)
          likelihood: high
          impact: medium
          mitigation: Add database indexes on common query fields (type, timestamp, impl_slug, agent_id). Document recommended PostgreSQL maintenance (VACUUM, REINDEX). Consider pagination for large result sets.
        - scenario: Store interface too generic, forces reimplementation in both SQLite and PostgreSQL
          likelihood: medium
          impact: low
          mitigation: Agent B defines clear interface with well-scoped methods. Shared query-building logic can be extracted to helper functions if duplication emerges during implementation.
        - scenario: Web API becomes import bottleneck (scout-and-wave-web imports scout-and-wave-go SDK)
          likelihood: low
          impact: low
          mitigation: scout-and-wave-web already imports scout-and-wave-go as dependency. No new import patterns. If circular dependency emerges, observability stays in SDK (no web→SDK dependency).
        - scenario: CLI commands conflict with existing sawtools command names
          likelihood: low
          impact: low
          mitigation: Use namespaced commands (sawtools observability metrics, sawtools observability query) if "metrics" or "query" already exist. Scout to verify no conflicts during file ownership assignment.
        - scenario: Event emission overhead slows orchestrator operations
          likelihood: medium
          impact: medium
          mitigation: E40 rule specifies non-blocking emission (fire-and-forget). Use buffered channel + background goroutine for batch writes. Log errors but don't fail orchestrator operations.
