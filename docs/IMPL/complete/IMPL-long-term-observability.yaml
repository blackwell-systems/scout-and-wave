          task: |
            ## Agent A — Protocol Event Schema & E40 Execution Rule

            **What to implement:**

            Create `protocol/observability-events.md` defining the observability event schema
            (Event interface, CostEvent, AgentPerformanceEvent, ActivityEvent) based on the
            interface contracts. Add E40 execution rule to `protocol/execution-rules.md`
            specifying when and how observability events must be emitted.

            **Event schema requirements:**
            - Three event types: cost (token usage), agent_performance (success/failure/retry),
              activity (orchestrator actions like Scout launch, Wave start, merge)
            - All events have: ID, timestamp, type, metadata map
            - Cost events track: agent, wave, IMPL, program (optional), model, tokens, cost USD
            - Performance events track: agent, wave, status, failure type, retry count, duration,
              files modified, test results
            - Activity events track: activity type (scout_launch, wave_start, wave_merge, etc.),
              IMPL slug, program slug (optional), user, details

            **E40 execution rule:**
            - Title: "Observability Event Emission"
            - Trigger: Various orchestrator actions (Scout launch, agent start/complete, wave merge,
              IMPL completion, gate execution)
            - Required action: Emit appropriate event to observability store
            - Implementation guidance: Use SDK `observability.RecordEvent()` function, non-blocking
              (log errors but don't fail orchestrator operations), batch writes preferred
            - Wire format: Events stored as JSONB in database, no specific wire protocol

            **Interface contracts to reference:**
            - Event (base interface)
            - CostEvent
            - AgentPerformanceEvent
            - ActivityEvent

            Use language-agnostic protocol specification style (no Go-specific syntax in protocol
            docs). Include examples of each event type in JSON format.

            **Tests:**
            No automated tests for protocol docs. Manual review verification: check that event
            schema is complete, E40 rule is clear about when events are emitted, and examples are
            valid JSON.

            **Verification gate:**
            ```bash
            # Verify protocol docs are well-formed markdown
            grep -q "## E40: Observability Event Emission" protocol/execution-rules.md && \
            grep -q "# Observability Events" protocol/observability-events.md && \
            echo "Protocol docs verified"
            ```

            **Constraints:**
            - Follow existing protocol doc style (see execution-rules.md, message-formats.md)
            - Keep schema implementation-agnostic (no Go types in protocol docs)
            - E40 should follow same structure as other execution rules (Trigger, Required Action,
              Why This Matters, Related Rules)
          files:
            - protocol/observability-events.md
            - protocol/execution-rules.md
        - id: B
          task: |
            ## Agent B — SDK Core (Events, Store Interface)

            **What to implement:**

            Create the core observability package in `pkg/observability/` with:
            - Event types (CostEvent, AgentPerformanceEvent, ActivityEvent) implementing Event interface
            - Store interface defining CRUD operations for events
            - Package documentation

            **Event types:**
            Implement the three event types from interface contracts:
