            - `CostEvent` struct with all fields from contract
            - `AgentPerformanceEvent` struct with all fields from contract
            - `ActivityEvent` struct with all fields from contract

            Each concrete type should implement the Event interface. Include JSON struct tags for
            database serialization.

            **Store interface:**
            Define the storage abstraction:
            ```go
            type Store interface {
                RecordEvent(ctx context.Context, event Event) error
                QueryEvents(ctx context.Context, filters QueryFilters) ([]Event, error)
                GetRollup(ctx context.Context, rollup RollupRequest) (*RollupResult, error)
                Close() error
            }
            ```

            Agents C and D will implement this interface for SQLite and PostgreSQL respectively.

            **Package documentation:**
            Create `doc.go` with package overview, architecture summary (Store interface +
