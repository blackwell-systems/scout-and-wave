          task: |
            ## Agent C — SQLite Store Implementation

            **What to implement:**

            Implement the Store interface using SQLite for local/desktop/single-user deployments.
            Create `pkg/observability/sqlite.go` and `pkg/observability/sqlite_test.go`.

            **SQLiteStore implementation:**
            - Implements Store interface from Agent B
            - Schema: single `events` table with columns: id (text primary key), type (text),
              timestamp (integer unix time), data (jsonb), impl_slug (text), program_slug (text),
              agent_id (text), wave_number (integer)
            - Indexes on: type, timestamp, impl_slug, program_slug, agent_id for fast queries
            - Use `github.com/mattn/go-sqlite3` or `modernc.org/sqlite` (pure Go)
            - RecordEvent: INSERT event as JSON blob in data column, extract common fields to
              indexed columns
            - QueryEvents: SELECT with WHERE clauses built from filters, ORDER BY timestamp DESC
            - GetRollup: Use SQL GROUP BY aggregations (SUM for costs, AVG for success rates)
            - Close: close database connection

            **Database location:**
            - Default: `~/.saw/observability.db` (or XDG_DATA_HOME on Linux)
            - Support custom path via constructor param
            - Auto-create parent directories if missing
            - Run schema migrations on open (create tables if not exist)

            **Concurrency:**
            - SQLite supports multiple readers, single writer
            - Use WAL mode for better concurrency
            - Set busy_timeout=5000 to handle write conflicts gracefully

            **Tests:**
            - Test RecordEvent (insert cost event, verify retrieval)
            - Test QueryEvents with various filters (type, time range, IMPL slug)
            - Test GetRollup (cost rollup by agent, success rate rollup by wave)
            - Test concurrent writes (multiple goroutines recording events)
            - Use in-memory database for tests (`:memory:` or `file::memory:?cache=shared`)

            **Verification gate:**
            ```bash
            cd /Users/dayna.blackwell/code/scout-and-wave-go && \
            go build ./pkg/observability/... && \
            go test ./pkg/observability -run TestSQLite && \
            go vet ./pkg/observability/sqlite.go
            ```

            **Constraints:**
            - Follow interface contract exactly (Store interface from Agent B)
            - Handle missing optional fields gracefully (program_slug may be empty)
            - Return errors with context (wrap with fmt.Errorf or errors.Wrap)
            - Use prepared statements to prevent SQL injection
          files:
            - pkg/observability/sqlite.go
            - pkg/observability/sqlite_test.go
        - id: D
          task: |
            ## Agent D — PostgreSQL Store Implementation

            **What to implement:**

            Implement the Store interface using PostgreSQL for production/multi-user deployments.
            Create `pkg/observability/postgres.go` and `pkg/observability/postgres_test.go`.

            **PostgresStore implementation:**
