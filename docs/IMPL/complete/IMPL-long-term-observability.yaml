            ## Agent E — Rollups & Aggregations

            **What to implement:**

            Create `pkg/observability/rollups.go` with aggregation logic for computing metrics
            rollups (cost totals, success rates, retry counts, trends over time).

            **Rollup functions:**

            Implement functions that use the Store interface to compute aggregations:

            - `ComputeCostRollup(ctx context.Context, store Store, req RollupRequest) (*RollupResult, error)`
              - Group cost events by requested dimensions (agent, wave, IMPL, program, model)
              - Return total cost per group, overall total, average cost per group

            - `ComputeSuccessRateRollup(ctx context.Context, store Store, req RollupRequest) (*RollupResult, error)`
              - Group agent performance events by requested dimensions
              - Calculate success rate (success / total attempts) per group
              - Return average success rate across groups

            - `ComputeRetryRollup(ctx context.Context, store Store, req RollupRequest) (*RollupResult, error)`
              - Group agent performance events by requested dimensions
              - Calculate average retry count per group
              - Identify agents with high retry rates (>2 retries avg)

            - `ComputeTrend(ctx context.Context, store Store, metric string, timeRange time.Duration, buckets int) (*TrendResult, error)`
              - Time-series trend (e.g., cost per day over last 30 days)
              - Split time range into N buckets, compute metric per bucket
              - Return timeseries data for charting

            **RollupRequest and RollupResult:**
            Defined in interface contracts. Implement per contract specification.

            **Aggregation strategy:**
            - Use Store.QueryEvents() to fetch raw events matching filters
            - Perform aggregation in-memory (Go map reduce)
            - For SQL stores, could push aggregation to database (future optimization)

            **Tests:**
            - Test ComputeCostRollup (insert 10 cost events across 3 agents, verify rollup)
            - Test ComputeSuccessRateRollup (insert success/failure events, verify rates)
            - Test ComputeRetryRollup (insert events with varying retry counts)
            - Test ComputeTrend (insert events over 7 days, verify timeseries buckets)
            - Use mock Store or in-memory SQLite for tests

            **Verification gate:**
            ```bash
            cd /Users/dayna.blackwell/code/scout-and-wave-go && \
            go build ./pkg/observability/... && \
            go test ./pkg/observability -run TestRollup && \
            go vet ./pkg/observability/rollups.go
            ```

            **Constraints:**
            - Depends on Agent B (Store interface, Event types)
            - Handle empty result sets gracefully (return zero values, not errors)
            - Support time-based filtering (StartTime, EndTime in RollupRequest)
            - Group by multiple dimensions (e.g., "agent+wave" rollup)
          files:
