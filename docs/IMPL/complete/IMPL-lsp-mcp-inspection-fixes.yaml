    overall_risk: medium
    rows:
        - scenario: |
            Agent H changes LSPMessage to a union type and tsc errors propagate into
            src/lspClient.ts which accesses message.result?.capabilities — a field that
            only exists on LSPResponse but not all union members.
          likelihood: high
          impact: medium
          mitigation: |
            Agent H is instructed to document but NOT fix errors in files outside its
            ownership. The tsc errors in lspClient.ts after the type change are expected
            and must be fixed in a follow-up (or by carefully widening the union check
            with type guards). Scout has noted this as a known issue.
        - scenario: |
            Agent G's initLogging() wiring lands before Agent B's Wave 1 is merged,
            causing a "not exported" TypeScript error on initLogging.
          likelihood: low
          impact: low
          mitigation: |
            Wave 2 runs strictly after Wave 1 is merged. Orchestrator enforces wave
            ordering. Agent G should verify the export exists before building.
        - scenario: |
            Agent I's logError rename misses a call site in one of the 6 files,
            leaving a broken import that fails tsc.
          likelihood: medium
          impact: medium
          mitigation: |
            Agent I's verification gate runs `grep -rn "logError" src/ index.ts` to
            confirm zero remaining references. The build gate catches broken imports.
        - scenario: |
            Agent E's handler extraction changes the closure variables captured, causing
            subtle runtime bugs (e.g., lspClient captured by value rather than by reference).
          likelihood: medium
          impact: high
          mitigation: |
            Each named handler function must receive lspClient as a parameter (not close
            over a stale value). The task explicitly specifies passing closure variables
            as explicit function parameters. Agent E must verify that lspClient is read
            at call time from the enclosing scope via the factory function parameter.
        - scenario: |
            Agent C's URL parsing of lsp-diagnostics:// URIs behaves differently from
            the old slice(18) for URIs with triple-slash (lsp-diagnostics:///path).
          likelihood: low
          impact: medium
          mitigation: |
            `parseUriPath` already handles leading slashes via `path.posix.normalize`.
            Agent C should test the parsing with both `lsp-diagnostics://path` and
            `lsp-diagnostics:///path` forms to confirm correct behavior.
        - scenario: |
            Agent F's test file uses `../dist/src/shared/waitForDiagnostics.js` but
            dist/ is not built before tests run, causing import failure.
          likelihood: medium
          impact: low
          mitigation: |
            Agent F's verification gate runs `npm run build` before
            `node test/waitForDiagnostics.test.js`. The test script in package.json
            implicitly requires a prior build. Document this in a README note if needed.
        - scenario: |
            Agent G's server-side subscriptionContexts Map becomes stale if a client
            subscribes to the same URI twice without unsubscribing first.
          likelihood: low
          impact: low
          mitigation: |
            The Map overwrite behavior (second subscribe replaces first context) is
            acceptable for the current use case. The old callback is still registered
            in the lspClient's diagnosticSubscribers Set and will continue firing;
            only the unsubscribe lookup is affected. This is a known limitation, not
            a regression from the previous (always-broken) behavior.
