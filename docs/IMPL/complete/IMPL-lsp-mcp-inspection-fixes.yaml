            ## Finding 11 — coverage_gap:715-716 — getCodeActions sends empty diagnostics

            `getCodeActions` always sends `context: { diagnostics: [] }`. It should filter
            `this.documentDiagnostics` for diagnostics whose range overlaps the requested range.

            Locate the exact text in `getCodeActions`:
