            ## Finding 16 — cross_field_consistency:47-56 — existence check vs import path mismatch

            In `importExtension`, the existence check uses:
            ```typescript
            const extensionPath = path.resolve(process.cwd(), 'dist', 'src', 'extensions', `${safeLanguageId}.js`);
            ```
            But the dynamic `import()` uses:
            ```typescript
            const extensionModule = await import(`./${safeLanguageId}.js`);
            ```

            The `import()` resolves relative to the compiled module's location
            (`<repo>/dist/src/extensions/`), which agrees with `process.cwd()` ONLY when
            the server is launched from the repo root. When launched from any other
            directory, `fs.access` may succeed (file found at cwd-relative path) but
            `import()` fails (or vice versa).

            Fix: use `import.meta.url` to build an absolute path for both checks:

            Locate this exact text:
            ```typescript
              // Check if extension file exists
              const extensionPath = path.resolve(process.cwd(), 'dist', 'src', 'extensions', `${safeLanguageId}.js`);
              try {
                await fs.access(extensionPath);
              } catch (error) {
                info(`No extension found for language: ${languageId}`);
                return null;
              }

              // Import the extension module
              const extensionModule = await import(`./${safeLanguageId}.js`);
            ```
            Replace with:
            ```typescript
              // Build an absolute path from this module's location so it's cwd-independent
              const thisDir = path.dirname(new URL(import.meta.url).pathname);
              const extensionPath = path.join(thisDir, `${safeLanguageId}.js`);

              // Check if extension file exists
              try {
                await fs.access(extensionPath);
              } catch (error) {
                info(`No extension found for language: ${languageId}`);
                return null;
              }

              // Import the extension module using the same absolute path
              const extensionModule = await import(extensionPath);
            ```

            Note: `path` is already imported at the top of the file. `import.meta.url`
            is available because the file uses `"type": "module"` (ESM). No new imports
            needed.

