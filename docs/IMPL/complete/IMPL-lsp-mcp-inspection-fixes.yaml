            ## Finding 7 — panic_not_recovered:132 — dropped Promise

            In `handleData` (line 132), `this.processMessageQueue()` is called without
            `.catch()`. Its returned Promise is silently dropped. On Node.js 15+, an
            uncaught rejection inside `processMessageQueue` will crash the process.

            Fix: attach `.catch()` to the call:

            Locate this exact text in `src/lspClient.ts`:
            ```typescript
                  this.messageQueue.push(message);
                  this.processMessageQueue();
            ```
            Replace with:
            ```typescript
                  this.messageQueue.push(message);
                  this.processMessageQueue().catch((err) =>
                    logError("Unhandled error in processMessageQueue:", err)
                  );
            ```

            ## Finding 8 — coverage_gap:75-80 — buffer overflow keeps tail bytes

            When the buffer overflows 10 MB, the current code keeps the LAST
            `MAX_BUFFER_SIZE` bytes: `this.buffer = this.buffer.substring(this.buffer.length - MAX_BUFFER_SIZE)`.
            This guarantees the buffer starts mid-message, causing parse failures.

            Fix: discard the entire buffer on overflow. Locate this exact text:
            ```typescript
                logError(
                  `Buffer size exceeded ${MAX_BUFFER_SIZE} bytes, clearing buffer to prevent memory issues`,
                );
                this.buffer = this.buffer.substring(this.buffer.length - MAX_BUFFER_SIZE);
            ```
            Replace with:
            ```typescript
                logError(
                  `Buffer size exceeded ${MAX_BUFFER_SIZE} bytes, discarding entire buffer to prevent mid-message parse`,
                );
                this.buffer = "";
            ```

