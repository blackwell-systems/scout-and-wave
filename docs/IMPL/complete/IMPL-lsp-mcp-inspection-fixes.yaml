    - name: subscription context store (server-side)
      description: |
        Agent G adds a server-side Map in index.ts to track subscription callbacks by URI,
        fixing the unsubscribe bug where params.context was always undefined. The Map is
        populated by the SubscribeRequestSchema handler and consumed by the
        UnsubscribeRequestSchema handler.
      definition: |
        // In index.ts (module-level):
        const subscriptionContexts = new Map<string, any>();

        // In SubscribeRequestSchema handler, after calling subscriptionHandlers[handlerKey]:
        const result = await subscriptionHandlers[handlerKey](uri);
        if (result.ok && result.context) {
          subscriptionContexts.set(uri, result.context);
        }
        return result;

        // In UnsubscribeRequestSchema handler:
        const { uri } = request.params;  // no more destructuring context from params
        const context = subscriptionContexts.get(uri);
        subscriptionContexts.delete(uri);
        return await unsubscriptionHandlers[handlerKey](uri, context);
      location: index.ts
