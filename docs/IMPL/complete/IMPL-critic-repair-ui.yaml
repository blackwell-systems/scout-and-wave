interface_contracts:
    - name: CriticFix
      description: |
        Go struct for the PATCH /api/impl/{slug}/fix-critic request body.
        Defines the shape of a single auto-fix operation.
      definition: |
        type CriticFix struct {
            Type         string `json:"type"`           // "add_file_ownership", "update_contract", "add_integration_connector"
            AgentID      string `json:"agent_id"`
            Wave         int    `json:"wave"`
            File         string `json:"file,omitempty"`
            Action       string `json:"action,omitempty"`       // "modify", "new", "delete"
            ContractName string `json:"contract_name,omitempty"`
            OldSymbol    string `json:"old_symbol,omitempty"`
            NewSymbol    string `json:"new_symbol,omitempty"`
        }
      location: pkg/api/critic_handler.go
    - name: handleFixCritic
      description: |
        PATCH /api/impl/{slug}/fix-critic handler. Accepts a CriticFix JSON body,
        applies the fix to the IMPL manifest YAML, re-validates with sawtools validate --fix,
        and returns the updated CriticResult. Emits impl_updated SSE event.
      definition: |
        func (s *Server) handleFixCritic(w http.ResponseWriter, r *http.Request)
        // Request: CriticFix JSON
        // Response 200: updated CriticResult JSON (re-read from manifest after fix)
        // Response 400: {"error": "..."} for invalid fix type or missing fields
        // Response 404: {"error": "IMPL doc not found"}
        // Response 500: {"error": "..."} for save/validate failures
      location: pkg/api/critic_handler.go
    - name: CriticFixRequest (TypeScript)
      description: |
        TypeScript interface mirroring the Go CriticFix struct. Used by the
        frontend to construct PATCH requests.
      definition: |
        export interface CriticFixRequest {
          type: 'add_file_ownership' | 'update_contract' | 'add_integration_connector'
          agent_id: string
          wave: number
          file?: string
          action?: string
          contract_name?: string
          old_symbol?: string
          new_symbol?: string
        }
      location: web/src/types.ts
    - name: SawClient.impl.applyCriticFix
      description: |
        New method on the SawClient impl namespace for applying a critic fix.
      definition: |
        applyCriticFix(slug: string, fix: CriticFixRequest): Promise<CriticResult>
        // Calls PATCH /api/impl/{slug}/fix-critic with JSON body
        // Returns the updated CriticResult after fix is applied
      location: web/src/lib/apiClient.ts
waves:
    - number: 1
      agents:
        - id: A
          task: |
            ## Agent A — Backend: PATCH fix-critic endpoint

            ### What to implement
            Add the PATCH /api/impl/{slug}/fix-critic endpoint to critic_handler.go and
            register it in RegisterCriticRoutes (in impl.go).

            **In pkg/api/critic_handler.go:**

            1. Define the `CriticFix` struct (see interface contract above).

            2. Implement `handleFixCritic(w, r)`:
               - Parse slug from path, find IMPL doc via `s.findImplPath(slug)`.
               - Decode JSON body into CriticFix.
               - Load manifest via `protocol.Load(implPath)`.
               - Switch on fix.Type:
                 - `"add_file_ownership"`: Append a FileOwnership entry with File=fix.File,
                   Agent=fix.AgentID, Wave=fix.Wave, Action=fix.Action (default "modify").
                 - `"update_contract"`: Find the InterfaceContract by fix.ContractName,
                   replace occurrences of fix.OldSymbol with fix.NewSymbol in the Definition field.
                 - `"add_integration_connector"`: Append an IntegrationConnector entry with
                   the file and agent fields from the fix.
               - Save manifest via `protocol.Save(manifest, implPath)`.
               - Run `exec.Command("sawtools", "validate", "--fix", implPath)` to re-validate.
               - Reload manifest and return the CriticReport as JSON (or null if no report).
               - Broadcast `s.globalBroker.broadcastJSON("impl_updated", map[string]interface{}{"slug": slug})`
                 so other panels refresh.

            3. Add a helper `EmitImplUpdated(slug string)` to global_events.go if it does not exist,
               or inline the broadcast in the handler.

            **In pkg/api/impl.go:**
            4. In `RegisterCriticRoutes()`, add:
               `s.mux.HandleFunc("PATCH /api/impl/{slug}/fix-critic", s.handleFixCritic)`

            ### Interface contracts
            - CriticFix struct: see contract definition above
            - handleFixCritic: see contract definition above

            ### Tests
            - No unit test file needed; the endpoint will be verified via the build gate.
            - Verify `go build ./...` passes.
            - Verify `go vet ./...` passes.

            ### Verification gate
            ```
            cd /Users/dayna.blackwell/code/scout-and-wave-web && go build ./... && go vet ./...
            ```

            ### Constraints
            - Do NOT modify any frontend files (web/ directory).
            - Do NOT modify the existing handleGetCriticReview or handleRunCriticReview functions.
            - Use the same error response patterns as existing handlers (JSON with "error" key).
            - The CriticFix struct lives in critic_handler.go, not in the protocol package.
          files:
            - pkg/api/critic_handler.go
            - pkg/api/impl.go
        - id: B
          task: |
            ## Agent B — Frontend: TypeScript types + API client method

