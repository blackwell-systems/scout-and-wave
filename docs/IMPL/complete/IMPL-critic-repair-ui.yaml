            Add CriticFixRequest type and applyCriticFix API client method.

            **In web/src/types.ts:**

            1. Add the `CriticFixRequest` interface after the existing `CriticIssue` interface:
               ```typescript
               export interface CriticFixRequest {
                 type: 'add_file_ownership' | 'update_contract' | 'add_integration_connector'
                 agent_id: string
                 wave: number
                 file?: string
                 action?: string
                 contract_name?: string
                 old_symbol?: string
                 new_symbol?: string
               }
               ```

            **In web/src/lib/apiClient.ts:**

            2. Add import of `CriticFixRequest` from `'../types'` (add to existing import list).

            3. Add `applyCriticFix` method to the `impl` namespace of the `SawClient` interface:
               ```typescript
               applyCriticFix(slug: string, fix: CriticFixRequest): Promise<CriticResult>
               ```

            4. Implement in `createHttpClient()` impl namespace:
               ```typescript
               async applyCriticFix(slug: string, fix: CriticFixRequest): Promise<CriticResult> {
                 const r = await fetch(`/api/impl/${enc(slug)}/fix-critic`, {
                   method: 'PATCH',
                   headers: { 'Content-Type': 'application/json' },
                   body: JSON.stringify(fix),
                 })
                 await check(r)
                 return r.json() as Promise<CriticResult>
               },
               ```

