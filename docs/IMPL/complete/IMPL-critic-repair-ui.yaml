pre_mortem:
    overall_risk: low
    rows:
        - scenario: PATCH endpoint modifies IMPL YAML incorrectly, causing validation failure
          likelihood: low
          impact: medium
          mitigation: |
            The handler runs sawtools validate --fix after every modification, which
            auto-corrects minor issues. If validation still fails, the endpoint returns
            500 and the YAML is already saved (but the user can re-run validation or
            edit raw YAML).
        - scenario: CriticReviewPanel local type aliases diverge from canonical types.ts
          likelihood: medium
          impact: low
          mitigation: |
            Agent C is instructed to consolidate local CriticResultType/CriticIssueType
            aliases to use canonical imports from types.ts. TypeScript compiler will
            catch any type mismatches.
        - scenario: impl_updated SSE event not yet broadcast by any existing handler
          likelihood: medium
          impact: low
          mitigation: |
            Agent A creates the impl_updated broadcast in the fix-critic handler.
            If the event name conflicts with an existing event, Agent C's listener
            will still work — it just filters by slug.
