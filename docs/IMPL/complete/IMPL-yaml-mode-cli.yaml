    - definition: |
        func Validate(m *IMPLManifest) []ValidationError
      description: Runs all I1-I6 invariant checks on an IMPLManifest. Returns slice of ValidationError (empty if valid).
      location: pkg/protocol/validation.go
      name: Validate
    - definition: |
        func ValidateIMPLDoc(path string) ([]types.ValidationError, error)
      description: E16 typed-block validation on a markdown IMPL doc at path. Returns nil if valid or no typed blocks.
      location: pkg/protocol/validator.go
      name: ValidateIMPLDoc
    - definition: |
        func ExtractAgentContextFromManifest(m *IMPLManifest, agentID string) (*AgentContextPayload, error)
      description: |
        New YAML-mode function. Reads a parsed IMPLManifest and returns the per-agent
        context payload for the given agentID. Extracts agent task, file ownership entries
        for that agent, all interface contracts, all scaffolds, and quality gates.
        Returns ErrAgentNotFound if agentID is not in any wave.
        This is the YAML equivalent of ExtractAgentContext (markdown) in extract.go.
      location: pkg/protocol/extract.go
      name: ExtractAgentContextFromManifest
    - definition: |
        type AgentContextJSONPayload struct {
            IMPLDocPath        string             `json:"impl_doc_path"`
            AgentID            string             `json:"agent_id"`
            AgentTask          string             `json:"agent_task"`
            FileOwnership      []FileOwnership    `json:"file_ownership"`
            InterfaceContracts []InterfaceContract `json:"interface_contracts"`
            Scaffolds          []ScaffoldFile      `json:"scaffolds"`
            QualityGates       *QualityGates       `json:"quality_gates"`
        }
      description: |
        The JSON object written to stdout by 'saw extract-context'. All fields are strings.
        impl_doc_path: absolute path to the manifest file
        agent_id: the agent letter (e.g. "A")
        agent_task: the agent's full task field from the manifest
        file_ownership: JSON array of FileOwnership entries for this agent
        interface_contracts: JSON array of all InterfaceContract entries
        scaffolds: JSON array of all ScaffoldFile entries
        quality_gates: JSON object of QualityGates (or null)
      location: pkg/protocol/extract.go
      name: AgentContextPayload (JSON output schema)
    - definition: |
        func SetCompletionReport(m *IMPLManifest, agentID string, report CompletionReport) error
      description: Registers a CompletionReport for an agent. Returns ErrAgentNotFound if agent ID is not in any wave.
      location: pkg/protocol/manifest.go
      name: SetCompletionReport
    - definition: |
        func WriteCompletionMarker(implDocPath string, date string) error
      description: Writes SAW:COMPLETE marker with date. For YAML files sets completion_date field.
      location: pkg/protocol/marker.go
      name: WriteCompletionMarker
    - definition: |
        func RunGates(manifest *IMPLManifest, waveNumber int, repoDir string) ([]GateResult, error)
      description: Executes quality gates for a wave from the manifest. Returns GateResult slice.
      location: pkg/protocol/gates.go
      name: RunGates
    - definition: |
        func DetectOwnershipConflicts(manifest *IMPLManifest, reports map[string]CompletionReport) []OwnershipConflict
      description: Cross-references completion reports to find files modified by multiple agents in the same wave.
      location: pkg/protocol/conflict.go
