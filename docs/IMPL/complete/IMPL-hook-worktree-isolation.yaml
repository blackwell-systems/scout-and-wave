pre_mortem:
    overall_risk: medium
    rows:
        - scenario: SubagentStart hook doesn't have environment write capability
          likelihood: medium
          impact: high
          mitigation: |
            Test SubagentStart hooks early (Wave 1). If env var export via hookSpecificOutput
            doesn't work, fall back to writing a temp file that orchestrator sources. Document
            the workaround in hook header comments.
        - scenario: Bash cd injection breaks complex multi-line commands
          likelihood: low
          impact: medium
          mitigation: |
            Keep injection simple (literal prepend, no parsing). Test with common patterns
            (pipes, semicolons, here-docs) in Wave 1. If edge cases break, document them
            and fall back to manual cd discipline for those patterns.
        - scenario: Path validation blocks legitimate orchestrator writes to IMPL doc
          likelihood: low
          impact: high
          mitigation: |
            validate_write_paths must check if agent is orchestrator (no SAW_AGENT_WORKTREE set).
            If worktree is empty, skip validation entirely. Test orchestrator IMPL writes in
            Wave 2 integration testing.
        - scenario: Hook registration conflicts with existing hooks in settings.json
          likelihood: low
          impact: medium
          mitigation: |
            install.sh already handles hook merging (backs up settings.json, uses jq to merge).
            Test on a clean settings.json and on a settings.json with all 11 existing hooks.
            Verify no duplicates after install.
        - scenario: Cross-repo IMPL docs break environment variable detection
          likelihood: medium
          impact: low
          mitigation: |
            inject_worktree_env must walk up to repo root to find .saw-state/active-impl.
            Test with scout-and-wave-go IMPL docs (cross-repo scenario). If detection fails,
            agent falls back to grep-based IMPL path extraction from prompt.
