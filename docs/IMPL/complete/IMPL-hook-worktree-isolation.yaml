interface_contracts:
    - name: SAW_AGENT_WORKTREE
      description: Environment variable containing absolute worktree path
      definition: |
        export SAW_AGENT_WORKTREE="/absolute/path/to/worktree"
        Set by inject_worktree_env hook at SubagentStart time.
        Empty string if agent is not in worktree (solo wave, integration wave).
      location: implementations/claude-code/hooks/inject_worktree_env
    - name: SAW_AGENT_ID
      description: Environment variable containing agent ID (e.g. "A", "B2")
      definition: |
        export SAW_AGENT_ID="A"
        Set by inject_worktree_env hook at SubagentStart time.
        Matches the agent ID from the [SAW:wave{N}:agent-{ID}] description tag.
      location: implementations/claude-code/hooks/inject_worktree_env
    - name: SAW_WAVE_NUMBER
      description: Environment variable containing wave number
      definition: |
        export SAW_WAVE_NUMBER="1"
        Set by inject_worktree_env hook at SubagentStart time.
        Matches the wave number from the [SAW:wave{N}:agent-{ID}] description tag.
      location: implementations/claude-code/hooks/inject_worktree_env
    - name: SAW_IMPL_PATH
      description: Environment variable containing absolute IMPL doc path
      definition: |
        export SAW_IMPL_PATH="/absolute/path/to/docs/IMPL/IMPL-feature.yaml"
        Set by inject_worktree_env hook at SubagentStart time.
        Extracted from agent prompt or read from .saw-state/active-impl.
      location: implementations/claude-code/hooks/inject_worktree_env
    - name: SAW_BRANCH
      description: Environment variable containing agent branch name
      definition: |
        export SAW_BRANCH="saw/feature-slug/wave1-agent-A"
        Set by inject_worktree_env hook at SubagentStart time.
        Derived from slug + wave + agent ID, or queried from worktree git.
      location: implementations/claude-code/hooks/inject_worktree_env
    - name: cd_injection_logic
      description: Bash command auto-injection for worktree navigation
      definition: |
        # If SAW_AGENT_WORKTREE is set and command doesn't already start with cd
        if [[ -n "$SAW_AGENT_WORKTREE" ]] && ! [[ "$command" =~ ^cd\ \$SAW_AGENT_WORKTREE ]]; then
          updated_command="cd \$SAW_AGENT_WORKTREE && $command"
          return updatedInput with updated_command
        fi
      location: implementations/claude-code/hooks/inject_bash_cd
    - name: path_validation_logic
      description: Write/Edit path validation against worktree boundaries
      definition: |
        # Block relative paths
        if ! [[ "$file_path" =~ ^/ ]]; then
          exit 2 with error "Relative paths not allowed in worktree context"
        fi
        # Block paths outside worktree
        if [[ -n "$SAW_AGENT_WORKTREE" ]] && ! [[ "$file_path" =~ ^$SAW_AGENT_WORKTREE ]]; then
          exit 2 with error "Path outside worktree boundaries"
        fi
      location: implementations/claude-code/hooks/validate_write_paths
    - name: compliance_verification_logic
      description: SubagentStop protocol compliance checks
      definition: |
        # Check completion report exists (E42)
        # Check commits exist on branch (I5)
        # Warn but don't block (SubagentStop can't prevent completion)
        # Log violations to stderr for debugging
      location: implementations/claude-code/hooks/verify_worktree_compliance
waves:
    - number: 1
      agents:
        - id: A
          task: |
            **Agent A: SubagentStart Environment Injection Hook**

            Create `implementations/claude-code/hooks/inject_worktree_env` — a SubagentStart
            lifecycle hook that sets 5 environment variables when wave agents launch.

            **What to implement:**

            1. **Hook script basics**
               - Shebang: `#!/usr/bin/env bash`
               - set -euo pipefail
               - Read JSON from stdin (no input for SubagentStart, but stdin is open)
               - Extract agent metadata from environment or Claude Code context

            2. **Environment variable detection**
               Parse agent description tag `[SAW:wave{N}:agent-{ID}]`:
               - Extract wave number → `SAW_WAVE_NUMBER`
               - Extract agent ID → `SAW_AGENT_ID`

               Find worktree path via multiple methods (priority order):
               - Check for `.saw-ownership.json` in parent directories (walk up 5 levels)
               - If found: `dirname` of that file → `SAW_AGENT_WORKTREE`
               - If not found: check `$PWD` contains `.claude/worktrees/saw/` → use that path
               - If not found: leave `SAW_AGENT_WORKTREE` empty (solo wave or integration wave)

               Find IMPL doc path:
               - Check `.saw-state/active-impl` (walk up to repo root)
               - If found: read absolute path from file → `SAW_IMPL_PATH`
               - If not found: grep agent prompt for `docs/IMPL/IMPL-*.yaml` pattern
               - Convert relative to absolute using repo root

               Find branch name:
               - If worktree path found: `git -C $worktree branch --show-current` → `SAW_BRANCH`
               - If not found: construct from slug/wave/agent: `saw/{slug}/wave{N}-agent-{ID}`

            3. **Export via exit convention**
               SubagentStart hooks cannot modify parent process environment directly.
               Two options:
               (a) Write to a temp file that the orchestrator sources
               (b) Use Claude Code's `hookSpecificOutput` with custom env_vars field

               For now, implement option (a):
               ```bash
               echo "export SAW_AGENT_WORKTREE=\"$worktree_path\"" > /tmp/saw-agent-env-$$
               echo "export SAW_AGENT_ID=\"$agent_id\"" >> /tmp/saw-agent-env-$$
               echo "export SAW_WAVE_NUMBER=\"$wave_num\"" >> /tmp/saw-agent-env-$$
               echo "export SAW_IMPL_PATH=\"$impl_path\"" >> /tmp/saw-agent-env-$$
               echo "export SAW_BRANCH=\"$branch_name\"" >> /tmp/saw-agent-env-$$
               ```

               Return JSON:
               ```json
               {
                 "hookSpecificOutput": {
                   "hookEventName": "SubagentStart",
                   "envFile": "/tmp/saw-agent-env-$$"
                 }
               }
               ```

            4. **Non-SAW agent passthrough**
               If no `[SAW:wave` tag in description → exit 0 immediately
               This hook only fires for wave agents

            5. **Testing**
               Write manual test cases in hook header comments:
               ```bash
               # Test 1: Non-SAW agent — should exit 0 (no env file created)
               # Test 2: SAW wave agent with worktree — should set all 5 vars
               # Test 3: SAW solo agent (no worktree) — should set 4 vars (worktree empty)
               ```

            **Files you own:**
            - `implementations/claude-code/hooks/inject_worktree_env` (NEW)

            **Interface contracts you implement:**
            - `SAW_AGENT_WORKTREE` (exported env var)
            - `SAW_AGENT_ID` (exported env var)
            - `SAW_WAVE_NUMBER` (exported env var)
            - `SAW_IMPL_PATH` (exported env var)
            - `SAW_BRANCH` (exported env var)

            **Quality gates:**
            - shellcheck must pass with no warnings
            - Manual test cases must pass (documented in header)
            - Hook must exit 0 for non-SAW agents (no side effects)

            **Verification:**
            ```bash
            cd $WORKTREE
            shellcheck implementations/claude-code/hooks/inject_worktree_env
            # Run manual tests from header comments
            ```

            **Constraints:**
            - Hook must not block agent launch (always exit 0)
            - Environment variables must use absolute paths (no relative paths)
            - If any metadata is unavailable, use empty string (don't fail)
            - Keep detection logic simple (no network calls, no heavy parsing)
          files:
            - implementations/claude-code/hooks/inject_worktree_env
        - id: B
          task: |
            **Agent B: PreToolUse:Bash CD Auto-Injection Hook**

            Create `implementations/claude-code/hooks/inject_bash_cd` — a PreToolUse hook
            that prepends `cd $SAW_AGENT_WORKTREE &&` to every bash command when the agent
            is in a worktree.

            **What to implement:**

            1. **Hook script basics**
               - Shebang: `#!/usr/bin/env bash`
               - set -euo pipefail
               - Read JSON from stdin: `input=$(cat)`
               - Extract fields: `tool_name`, `tool_input.command`, `agent_type`

            2. **Passthrough conditions**
               Exit 0 (no modification) if:
               - `tool_name != "Bash"` (only modify Bash tool calls)
               - `$SAW_AGENT_WORKTREE` is empty (solo wave or integration wave)
               - Command already starts with `cd $SAW_AGENT_WORKTREE &&`

            3. **CD injection logic**
               If passthrough conditions don't apply:
               ```bash
               original_cmd=$(echo "$input" | jq -r '.tool_input.command')
               # Check if already has cd prefix
               if [[ "$original_cmd" =~ ^cd\ \$SAW_AGENT_WORKTREE ]]; then
                 exit 0  # already prefixed, don't double-inject
               fi
               # Prepend cd
               updated_cmd="cd \$SAW_AGENT_WORKTREE && $original_cmd"
               ```

            4. **Return via updatedInput**
               Use the same pattern as validate_agent_launch Check 10+ injection:
               ```bash
               tool_input=$(echo "$input" | jq '.tool_input')
               jq -n --arg cmd "$updated_cmd" --argjson orig_input "$tool_input" \
                 '{"hookSpecificOutput": {"hookEventName": "PreToolUse", "permissionDecision": "allow", "updatedInput": ($orig_input | .command = $cmd)}}'
               ```

               **Preserve all tool_input fields** (timeout, run_in_background, etc.)

            5. **Edge cases**
               - Multi-line commands: injection should work (bash will execute after cd)
               - Commands with semicolons: `cmd1; cmd2` → `cd $WT && cmd1; cmd2` (cd only affects cmd1)
               - Commands with pipes: `cmd1 | cmd2` → `cd $WT && cmd1 | cmd2` (works correctly)
               - Don't try to parse complex bash — simple prepend is sufficient

            6. **Testing**
               Write manual test cases in hook header comments:
               ```bash
               # Test 1: Bash tool with worktree set — should inject cd
               # Test 2: Bash tool without worktree — should passthrough
               # Test 3: Non-Bash tool — should passthrough
               # Test 4: Command already has cd prefix — should not double-inject
               ```

            **Files you own:**
            - `implementations/claude-code/hooks/inject_bash_cd` (NEW)

            **Interface contracts you implement:**
            - `cd_injection_logic` (reads SAW_AGENT_WORKTREE, modifies Bash commands)

            **Interface contracts you consume:**
            - `SAW_AGENT_WORKTREE` (from Agent A's inject_worktree_env)

            **Quality gates:**
            - shellcheck must pass with no warnings
            - Manual test cases must pass
            - Must preserve all tool_input fields (timeout, etc.)
            - Must not double-inject on retry

            **Verification:**
            ```bash
            cd $WORKTREE
            shellcheck implementations/claude-code/hooks/inject_bash_cd
            # Run manual tests from header comments
            ```

            **Constraints:**
            - Hook must always exit 0 (never block bash commands)
            - Injection is best-effort (if cd fails, bash command still runs)
            - Don't parse command syntax (treat as opaque string)
          files:
            - implementations/claude-code/hooks/inject_bash_cd
        - id: C
          task: |
            **Agent C: PreToolUse:Write/Edit Path Validation Hook**

            Create `implementations/claude-code/hooks/validate_write_paths` — a PreToolUse
            hook that validates file paths before Write/Edit operations, blocking relative
            paths and paths outside worktree boundaries.

            **What to implement:**

            1. **Hook script basics**
               - Shebang: `#!/usr/bin/env bash`
               - set -euo pipefail
               - Read JSON from stdin: `input=$(cat)`
               - Extract fields: `tool_name`, `tool_input.file_path`

            2. **Passthrough conditions**
               Exit 0 (allow) if:
               - `tool_name` not in ["Write", "Edit"] (only validate file operations)
               - `$SAW_AGENT_WORKTREE` is empty (solo wave or integration wave — no enforcement)

            3. **Validation logic**
               If agent is in worktree (`$SAW_AGENT_WORKTREE` set):

               **Check 1: Block relative paths**
               ```bash
               file_path=$(echo "$input" | jq -r '.tool_input.file_path')
               if ! [[ "$file_path" =~ ^/ ]]; then
                 echo "Error: Relative paths not allowed in worktree context. Use absolute paths." >&2
                 echo "  Attempted path: $file_path" >&2
                 echo "  Worktree: $SAW_AGENT_WORKTREE" >&2
                 exit 2  # block
               fi
               ```

               **Check 2: Block paths outside worktree**
               ```bash
               if ! [[ "$file_path" =~ ^$SAW_AGENT_WORKTREE ]]; then
                 echo "Error: Path outside worktree boundaries." >&2
                 echo "  Attempted path: $file_path" >&2
                 echo "  Worktree: $SAW_AGENT_WORKTREE" >&2
                 echo "  All file operations must target files within your assigned worktree." >&2
                 exit 2  # block
               fi
               ```

               If both checks pass: `exit 0` (allow)

            4. **Error messages**
               When blocking (exit 2), provide actionable guidance:
               - Show the attempted path
               - Show the worktree boundary
               - Suggest using Read tool to inspect worktree structure
               - Reference wave-agent-worktree-isolation.md for protocol

            5. **Edge cases**
               - Symlinks: Don't resolve — check the literal path string
               - Case sensitivity: Treat paths as case-sensitive (Linux/macOS default)
               - Trailing slashes: Normalize by removing before comparison

            6. **Testing**
               Write manual test cases in hook header comments:
               ```bash
               # Test 1: Write inside worktree — should allow (exit 0)
               # Test 2: Write outside worktree — should block (exit 2)
               # Test 3: Write with relative path — should block (exit 2)
               # Test 4: Write with no worktree set — should allow (exit 0)
               # Test 5: Edit on IMPL doc (orchestrator-owned) — should allow (exit 0)
               ```

            **Files you own:**
            - `implementations/claude-code/hooks/validate_write_paths` (NEW)

            **Interface contracts you implement:**
            - `path_validation_logic` (validates Write/Edit file paths)

            **Interface contracts you consume:**
            - `SAW_AGENT_WORKTREE` (from Agent A's inject_worktree_env)

            **Quality gates:**
            - shellcheck must pass with no warnings
            - Manual test cases must pass
            - Error messages must be actionable (not just "blocked")
            - Must not block orchestrator operations (IMPL doc writes, etc.)

            **Verification:**
            ```bash
            cd $WORKTREE
            shellcheck implementations/claude-code/hooks/validate_write_paths
            # Run manual tests from header comments
            ```

            **Constraints:**
            - Hook must exit 2 to block (not exit 1)
            - Validation is string-based (don't stat files or resolve symlinks)
            - Must work correctly when worktree is empty (solo wave)
          files:
            - implementations/claude-code/hooks/validate_write_paths
        - id: D
          task: |
            **Agent D: SubagentStop Protocol Compliance Hook**

            Create `implementations/claude-code/hooks/verify_worktree_compliance` — a
            SubagentStop hook that verifies protocol compliance (completion report exists,
            commits exist on branch) when wave agents complete.

            **What to implement:**

            1. **Hook script basics**
               - Shebang: `#!/usr/bin/env bash`
               - set -euo pipefail
               - Read JSON from stdin: `input=$(cat)`
               - Extract fields: `agent_description`, `session_id`, `exit_reason`

            2. **Passthrough conditions**
               Exit 0 (no verification) if:
               - No `[SAW:wave` tag in `agent_description` (not a SAW wave agent)
               - `$SAW_AGENT_WORKTREE` is empty (solo wave — different verification path)

            3. **Parse agent metadata**
               From description tag `[SAW:wave{N}:agent-{ID}]`:
               - Extract wave number
               - Extract agent ID

               From environment:
               - Read `$SAW_IMPL_PATH` (set by inject_worktree_env)
               - Read `$SAW_BRANCH` (set by inject_worktree_env)

            4. **Verification checks** (warn-only, don't block)

               **Check 1: Completion report exists (E42/I4)**
               ```bash
               if command -v sawtools &>/dev/null; then
                 if ! sawtools check-completion "$SAW_IMPL_PATH" --agent "$agent_id" &>/dev/null; then
                   echo "WARNING: No completion report found for agent $agent_id" >&2
                   echo "  Protocol violation (E42/I4): Agents must write completion reports." >&2
                 fi
               fi
               ```

               **Check 2: Commits exist on branch (I5)**
               ```bash
               if [[ -n "$SAW_BRANCH" ]]; then
                 commit_count=$(git rev-list --count "$SAW_BRANCH" 2>/dev/null || echo "0")
                 if [[ "$commit_count" -eq 0 ]]; then
                   echo "WARNING: No commits on branch $SAW_BRANCH" >&2
                   echo "  Protocol violation (I5): Agents must commit before reporting." >&2
                 fi
               fi
               ```

               Always exit 0 (never block — SubagentStop can't prevent completion)

            5. **Why warn-only:**
               SubagentStop fires AFTER the agent has already completed and reported success
               to Claude Code. Returning exit 2 here would log an error but wouldn't prevent
               the agent from being marked complete. The validation is informational — it
               creates an audit trail for post-hoc analysis.

               The real enforcement happens at:
               - Wave finalization (I5 verification via sawtools finalize-wave)
               - E42 hook in validate_agent_completion (completion report check)

            6. **Testing**
               Write manual test cases in hook header comments:
               ```bash
               # Test 1: Agent with completion report + commits — should pass silently
               # Test 2: Agent without completion report — should warn (exit 0)
               # Test 3: Agent without commits — should warn (exit 0)
               # Test 4: Non-SAW agent — should passthrough (no checks)
               ```

            **Files you own:**
            - `implementations/claude-code/hooks/verify_worktree_compliance` (NEW)

            **Interface contracts you implement:**
            - `compliance_verification_logic` (checks E42/I5 compliance)

            **Interface contracts you consume:**
            - `SAW_AGENT_WORKTREE` (from Agent A)
            - `SAW_AGENT_ID` (from Agent A)
            - `SAW_IMPL_PATH` (from Agent A)
            - `SAW_BRANCH` (from Agent A)

            **Quality gates:**
            - shellcheck must pass with no warnings
            - Manual test cases must pass
            - Must always exit 0 (never block completion)
            - Warnings must reference specific protocol rules (E42, I5)

            **Verification:**
            ```bash
            cd $WORKTREE
            shellcheck implementations/claude-code/hooks/verify_worktree_compliance
            # Run manual tests from header comments
            ```

            **Constraints:**
            - Hook must always exit 0 (informational only)
            - Warnings logged to stderr for debugging/audit
            - Don't attempt to fix violations (just report them)
          files:
            - implementations/claude-code/hooks/verify_worktree_compliance
