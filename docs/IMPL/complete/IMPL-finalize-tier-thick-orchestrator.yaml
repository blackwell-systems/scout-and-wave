            - All git operations use the git package (internal/git), never exec.Command directly.
            - ProgramTier has no Status field — do not attempt to set one. Use ProgramIMPL.Status.
          files:
            - pkg/engine/finalize_tier.go
            - pkg/engine/finalize_tier_test.go
