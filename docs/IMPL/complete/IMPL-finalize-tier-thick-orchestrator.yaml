pre_mortem:
    overall_risk: medium
    rows:
        - scenario: |-
            ProgramTier struct has no Status field (confirmed by reading program_types.go).
            Agent A's task explicitly addresses this, but if the agent ignores the constraint
            and tries to set Tier.Status, it will fail to compile.
          likelihood: low
          impact: high
          mitigation: |-
            The constraint is explicitly stated twice in Agent A's task. The agent is instructed
            to read program_types.go first. If compilation fails on Tier.Status, the fix is
            immediate: remove that line and update ProgramIMPL.Status entries instead.
        - scenario: |-
            MarkIMPLComplete may return a fatal result even for already-COMPLETE IMPLs if
            WriteCompletionMarker fails due to an already-archived file (file not found).
            The file-existence check before calling MarkIMPLComplete prevents this case,
            but if ResolveIMPLPath returns a path that exists at a stale location, the
            check could pass while MarkIMPLComplete then fails.
          likelihood: low
          impact: low
          mitigation: |-
            Non-fatal: Agent A logs a warning and continues. The IMPL being already closed
            is the normal idempotent case. Stale paths are handled by checking os.Stat before
            calling MarkIMPLComplete.
        - scenario: |-
            Agent B removes the `protocol` import but the --auto path still calls
            `protocol.ParseProgramManifest`, causing a compile error.
          likelihood: medium
          impact: high
          mitigation: |-
            Agent B's task explicitly notes to check whether protocol is still referenced
            by the --auto path before removing the import. The --auto path uses
            protocol.ParseProgramManifest; if still present, the import must stay.
        - scenario: |-
            git.MergeNoFF with a commit SHA (worktree case) may produce a different merge
            commit message than expected if git treats the SHA as an anonymous commit.
            The merge will succeed but the commit message may appear differently in git log.
          likelihood: low
          impact: low
          mitigation: |-
            Non-functional — the merge message is for human readability only. The -m flag
            on git merge --no-ff sets the message explicitly regardless of what is being merged.
        - scenario: |-
            The yaml.Marshal round-trip for the PROGRAM manifest may lose YAML comments or
            reorder keys compared to the original file, making diffs noisy.
          likelihood: high
          impact: low
          mitigation: |-
            This is cosmetic. The PROGRAM manifest is machine-written and does not contain
            human-authored comments that need preserving. The round-trip via gopkg.in/yaml.v3
            is the same pattern used in mark_program_complete.go (via strings manipulation)
            and is acceptable. Document in the completion report if it occurs.
