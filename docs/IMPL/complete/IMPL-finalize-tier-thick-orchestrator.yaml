          task: |
            ## What to implement

            Create `pkg/engine/finalize_tier.go` — the thick orchestrator for `finalize-tier`.
            This file does not exist yet; create it from scratch.

            The package is `engine`. Module: `github.com/blackwell-systems/scout-and-wave-go`.

            ## Read these files first (do not skip)

            Before writing any code, read these files to understand the patterns to follow:
            - `/Users/dayna.blackwell/workspace/code/scout-and-wave-go/pkg/engine/mark_program_complete.go`
            - `/Users/dayna.blackwell/workspace/code/scout-and-wave-go/pkg/engine/finalize.go` (lines 601-657 for MarkIMPLComplete signature)
            - `/Users/dayna.blackwell/workspace/code/scout-and-wave-go/pkg/protocol/program_types.go` (understand ProgramTier and ProgramIMPL structs)
            - `/Users/dayna.blackwell/workspace/code/scout-and-wave-go/pkg/protocol/program_worktree.go` (ProgramBranchName function)
            - `/Users/dayna.blackwell/workspace/code/scout-and-wave-go/internal/git/commands.go` (lines 76-128 for WorktreeList, lines 130-138 for MergeNoFF, lines 245-258 for BranchExists/RevParse)

            ## Types and functions to define

            ### FinalizeTierOpts
            ```go
            type FinalizeTierOpts struct {
                ManifestPath string
                TierNumber   int
                RepoDir      string
                Logger       *slog.Logger
            }
            ```

            ### FinalizeTierResult
            ```go
            type FinalizeTierResult struct {
                TierNumber     int                                  `json:"tier_number"`
                ImplsClosed    []string                             `json:"impls_closed"`
                ImplsSkipped   []string                             `json:"impls_skipped"`
                MergeResults   map[string]*protocol.MergeAgentsData `json:"merge_results"`
                TierGateResult *protocol.TierGateData               `json:"tier_gate_result,omitempty"`
                StateAdvanced  bool                                 `json:"state_advanced"`
                Errors         []string                             `json:"errors,omitempty"`
            }
            ```

            ### FinalizeTierEngine

            This is the main exported function. Follow the `MarkProgramComplete` pattern in
            `pkg/engine/mark_program_complete.go` for structure (logger nil-safe, context passed
            through, steps logged, non-fatal steps warned but continued).

            Steps:

            **Step 1 — Close all complete IMPLs:**
            Parse the PROGRAM manifest via `protocol.ParseProgramManifest(opts.ManifestPath)`.
            Find the target tier (loop over `manifest.Tiers`, match `t.Number == opts.TierNumber`).
            If not found, return an error.

            For each IMPL slug in `targetTier.Impls`:
            - Resolve via `protocol.ResolveIMPLPath(opts.RepoDir, implSlug)`.
              Note: ResolveIMPLPath returns (path, error). If the file does not exist on disk
              (already archived), `os.Stat(implPath)` will return os.IsNotExist. In that case
              append slug to result.ImplsSkipped and continue.
            - Call `MarkIMPLComplete(ctx, MarkIMPLCompleteOpts{IMPLPath: implPath, RepoPath: opts.RepoDir, Logger: opts.Logger})`.
            - If it returns a fatal result, log a warning and append to result.Errors (non-fatal,
              continue to next IMPL). MarkIMPLComplete is idempotent for already-complete IMPLs.
            - On success, append slug to result.ImplsClosed.

            **Step 2 — Merge IMPL branches (worktree-aware):**
            For each IMPL slug in `targetTier.Impls`:
            - Compute `branch = protocol.ProgramBranchName(manifest.ProgramSlug, opts.TierNumber, implSlug)`.
            - If `!git.BranchExists(opts.RepoDir, branch)`: branch already merged or never created.
              Store a "skipped" MergeAgentsData entry and continue.
            - If `git.IsAncestor(opts.RepoDir, branch, "HEAD")`: already merged into HEAD.
              Store a "skipped" MergeAgentsData entry and continue.
            - Otherwise call `mergeIMPLBranchWorktreeAware(opts.RepoDir, branch, message)` where
              `message = fmt.Sprintf("Merge program tier %d impl %s: %s", opts.TierNumber, implSlug, branch)`.
            - If merge fails: append error to result.Errors and return immediately (same stop-on-first
              behavior as the existing protocol.FinalizeTier).
            - On success: record `result.MergeResults[implSlug] = &protocol.MergeAgentsData{...}`.

            MergeAgentsData struct is in `pkg/protocol/merge_agents.go`. Fields to populate:
            ```go
            &protocol.MergeAgentsData{
                Wave:   opts.TierNumber,
                Merges: []protocol.MergeStatus{{Agent: implSlug, Branch: branch, Success: true}},
            }
            ```

            **Step 3 — Run tier gate:**
            Re-parse the manifest: `manifest, err = protocol.ParseProgramManifest(opts.ManifestPath)`.
            Call `gateRes := protocol.RunTierGate(manifest, opts.TierNumber, opts.RepoDir)`.
            Store `result.TierGateResult = gateRes.GetData()`.

            If gate fails or did not pass:
            - Append an error string to result.Errors.
            - Return the partial result (no error from the function itself; return nil error and
              populated result — the caller checks result.Errors).

            **Step 4 — Update IMPL statuses in PROGRAM manifest and commit:**
            This step marks all IMPLs in the tier as "complete" in the PROGRAM manifest YAML.

            IMPORTANT: `ProgramTier` has NO `Status` field. Status is tracked in the
            `ProgramIMPL.Status` field in `manifest.Impls`. Update as follows:

            ```go
            for i := range manifest.Impls {
                for _, slug := range targetTier.Impls {
                    if manifest.Impls[i].Slug == slug {
                        manifest.Impls[i].Status = "complete"
                    }
                }
            }
            ```

            There is no SaveProgramManifest helper. Write using yaml.Marshal + os.WriteFile:
            ```go
            import "gopkg.in/yaml.v3"

            data, err := yaml.Marshal(manifest)
            if err != nil { /* log warn, skip commit, set StateAdvanced=false, return */ }
            if err := os.WriteFile(opts.ManifestPath, data, 0644); err != nil { /* same */ }
            ```

            Then commit: `git.CommitWithMessage(opts.RepoDir, fmt.Sprintf("chore: finalize tier %d", opts.TierNumber))`.
            If git.Add is needed first, call `git.Add(opts.RepoDir, opts.ManifestPath)` before committing.
            On commit error: log warning, do not return error (non-fatal).
            On success: set `result.StateAdvanced = true`.

            Return `result, nil`.

            ### mergeIMPLBranchWorktreeAware (unexported helper)

            ```go
            func mergeIMPLBranchWorktreeAware(repoDir, branch, message string) error
            ```

            Implementation:
            1. Call `git.WorktreeList(repoDir)` to get `[][2]string` where each entry is `{path, branchName}`.
            2. Loop over entries, find one where `entry[1] == branch`.
            3. If found in a worktree:
               a. Get the commit SHA: `sha, err := git.RevParse(entry[0], "HEAD")`.
                  If RevParse fails, fall back to `sha, err = git.RevParse(repoDir, branch)`.
                  If both fail, return the error.
               b. Merge by SHA: `return git.MergeNoFF(repoDir, sha, message)`.
                  Since sha is a commit hash (not a branch name), git accepts it without the
                  "branch is already checked out" error.
            4. If not found in any worktree: `return git.MergeNoFF(repoDir, branch, message)`.

            ## Imports needed
            ```go
            import (
                "context"
                "fmt"
                "log/slog"
                "os"

                "gopkg.in/yaml.v3"
                "github.com/blackwell-systems/scout-and-wave-go/internal/git"
                "github.com/blackwell-systems/scout-and-wave-go/pkg/protocol"
            )
            ```

            Note: `loggerFrom` and `MarkIMPLComplete`/`MarkIMPLCompleteOpts` are in the same
            `engine` package (finalize.go). No import needed for them.

            ## Tests to write (pkg/engine/finalize_tier_test.go)

            All tests in `package engine`.

            1. **TestFinalizeTierEngine_MissingManifest**: Pass a nonexistent manifest path.
               Expect non-nil error from FinalizeTierEngine.

            2. **TestFinalizeTierEngine_TierNotFound**: Write a minimal valid PROGRAM manifest
               YAML to a temp file with one tier (number: 1), call with TierNumber=99. Expect
