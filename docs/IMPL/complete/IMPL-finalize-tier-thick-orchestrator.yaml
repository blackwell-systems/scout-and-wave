            3. **TestMergeIMPLBranchWorktreeAware_NoWorktrees**: Initialize a temp git repo
               (git init, initial commit), call mergeIMPLBranchWorktreeAware with a branch name
               that does not exist. Expect non-nil error (MergeNoFF will fail because the branch
               does not exist — that is the correct behavior; the skip-if-absent logic lives in
               FinalizeTierEngine, not in this helper).

            4. **TestFinalizeTierEngine_AllImplsAlreadyArchived**: Create a temp git repo,
               write a minimal PROGRAM manifest with one tier containing one IMPL slug, but do
               NOT create the IMPL doc file on disk (simulates already-archived). Call
               FinalizeTierEngine. Verify the IMPL slug appears in result.ImplsSkipped (not
               ImplsClosed). This test will likely fail at the merge step too (branch doesn't
               exist), which is fine — just check ImplsSkipped is non-empty before the merge
               step would abort.

            Use `t.TempDir()` for temp dirs. For test manifests, write minimal YAML like:
            ```yaml
            title: test-program
            program_slug: test-prog
            state: TIER_EXECUTING
            impls:
              - slug: test-impl
                title: Test Impl
                tier: 1
                status: reviewed
            tiers:
              - number: 1
                impls:
                  - test-impl
            completion: {}
            ```

            ## Verification gate
            ```
            go build ./pkg/engine/...
            go vet ./pkg/engine/...
            go test ./pkg/engine/... -run TestFinalizeTier -v
            ```

            ## Constraints
            - Do NOT modify cmd/sawtools/finalize_tier_cmd.go — Agent B owns that file.
            - Do NOT modify pkg/protocol/program_tier_finalize.go — it stays as-is.
            - loggerFrom() is defined in pkg/engine/finalize.go (same package, no import needed).
