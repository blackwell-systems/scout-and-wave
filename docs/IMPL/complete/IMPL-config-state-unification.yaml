interface_contracts:
    - name: config.SAWConfig
      description: Unified config type replacing backend.SAWProviders, autonomy.Config, and web SAWConfig
      definition: |
        type SAWConfig struct {
            Providers ProvidersConfig `json:"providers,omitempty"`
            Autonomy  AutonomyConfig `json:"autonomy,omitempty"`
            Repos     []RepoEntry    `json:"repos,omitempty"`
            Agent     AgentConfig    `json:"agent,omitempty"`
            Quality   QualityConfig  `json:"quality,omitempty"`
            Appear    AppearConfig   `json:"appearance,omitempty"`
            Notifications any       `json:"notifications,omitempty"`
            CodeReview    any       `json:"code_review,omitempty"`
        }

        type ProvidersConfig struct {
            Anthropic AnthropicProvider `json:"anthropic,omitempty"`
            Bedrock   BedrockProvider   `json:"bedrock,omitempty"`
            OpenAI    OpenAIProvider    `json:"openai,omitempty"`
        }

        type AnthropicProvider struct {
            APIKey string `json:"api_key,omitempty"`
        }

        type BedrockProvider struct {
            Region         string `json:"region,omitempty"`
            AccessKeyID    string `json:"access_key_id,omitempty"`
            SecretAccessKey string `json:"secret_access_key,omitempty"`
            SessionToken   string `json:"session_token,omitempty"`
            Profile        string `json:"profile,omitempty"`
        }

        type OpenAIProvider struct {
            APIKey string `json:"api_key,omitempty"`
        }

        type AutonomyConfig struct {
            Level          string `json:"level,omitempty"`
            MaxAutoRetries int    `json:"max_auto_retries,omitempty"`
            MaxQueueDepth  int    `json:"max_queue_depth,omitempty"`
        }

        type RepoEntry struct {
            Name string `json:"name"`
            Path string `json:"path"`
        }

        type AgentConfig struct {
            ScoutModel       string `json:"scout_model,omitempty"`
            WaveModel        string `json:"wave_model,omitempty"`
            ChatModel        string `json:"chat_model,omitempty"`
            ScaffoldModel    string `json:"scaffold_model,omitempty"`
            IntegrationModel string `json:"integration_model,omitempty"`
            PlannerModel     string `json:"planner_model,omitempty"`
            ReviewModel      string `json:"review_model,omitempty"`
        }

        type QualityConfig struct {
            RequireTests   bool           `json:"require_tests,omitempty"`
            RequireLint    bool           `json:"require_lint,omitempty"`
            BlockOnFailure bool           `json:"block_on_failure,omitempty"`
            CodeReview     CodeReviewCfg  `json:"code_review,omitempty"`
        }

        type CodeReviewCfg struct {
            Enabled   bool   `json:"enabled,omitempty"`
            Blocking  bool   `json:"blocking,omitempty"`
            Model     string `json:"model,omitempty"`
            Threshold int    `json:"threshold,omitempty"`
        }

        type AppearConfig struct {
            Theme               string   `json:"theme,omitempty"`
            Contrast            string   `json:"contrast,omitempty"`
            ColorTheme          string   `json:"color_theme,omitempty"`
            ColorThemeDark      string   `json:"color_theme_dark,omitempty"`
            ColorThemeLight     string   `json:"color_theme_light,omitempty"`
            FavoriteThemesDark  []string `json:"favorite_themes_dark,omitempty"`
            FavoriteThemesLight []string `json:"favorite_themes_light,omitempty"`
        }
      location: pkg/config/config.go
    - name: config.Load
      description: Single config loader replacing findConfigFile + LoadProvidersFromConfig + autonomy.LoadConfig
      definition: |
        // Load finds saw.config.json starting from startDir, walking up to 10
        // parent directories. Parses the full config into SAWConfig.
        // Returns N013_CONFIG_NOT_FOUND if no config file exists.
        // Returns N014_CONFIG_INVALID if JSON parsing fails.
        func Load(startDir string) result.Result[*SAWConfig]
      location: pkg/config/config.go
    - name: config.Save
      description: Atomic config writer replacing autonomy.SaveConfig
      definition: |
        // Save atomically writes cfg to saw.config.json at repoPath.
        // Uses temp-file + rename pattern. Preserves unknown top-level keys.
        func Save(repoPath string, cfg *SAWConfig) result.Result[bool]
      location: pkg/config/config.go
    - name: config.FindConfigPath
      description: Walks up directories to find saw.config.json
      definition: |
        // FindConfigPath walks up from startDir looking for saw.config.json.
        // Returns the absolute path if found, empty string if not.
        func FindConfigPath(startDir string) string
      location: pkg/config/config.go
    - name: config.GetWaveState
      description: Single query for wave state from IMPL manifest
      definition: |
        // WaveState consolidates all state for a wave from the IMPL manifest.
        type WaveState struct {
            WaveNum         int                     `json:"wave_num"`
            TotalAgents     int                     `json:"total_agents"`
            CompletedAgents []string                `json:"completed_agents"`
            FailedAgents    []string                `json:"failed_agents"`
            PendingAgents   []string                `json:"pending_agents"`
            GateResults     map[string]GateResult   `json:"gate_results,omitempty"`
            IsComplete      bool                    `json:"is_complete"`
            MergeState      string                  `json:"merge_state,omitempty"`
        }

        // GateResult is a cached gate execution outcome.
        type GateResult struct {
            GateType string `json:"gate_type"`
            Command  string `json:"command"`
            Passed   bool   `json:"passed"`
            ExitCode int    `json:"exit_code"`
        }

        // GetWaveState derives the complete state of a wave from the IMPL manifest.
        // This is the single query function — no .saw-state/ directory needed.
        func GetWaveState(manifest *protocol.IMPLManifest, waveNum int) result.Result[*WaveState]
      location: pkg/config/state.go
    - name: Error codes N013-N014
      description: New error codes for config operations
      definition: |
        CodeConfigNotFound = "N013_CONFIG_NOT_FOUND"
        CodeConfigInvalid  = "N014_CONFIG_INVALID"
      location: pkg/result/codes.go
waves:
    - number: 1
      agents:
        - id: A
          task: |
            ## Agent A — Unified Config Package (pkg/config)

            **What to implement:**

            Create `pkg/config/` in scout-and-wave-go with the unified config loader.

            **Files:**
            - `pkg/config/config.go` (NEW)
            - `pkg/config/config_test.go` (NEW)

            **Implementation details:**

            1. Define `SAWConfig` struct that is the SUPERSET of all fields from:
               - `backend.SAWProviders` (providers section only)
               - `autonomy.Config` (autonomy section only)
               - `service.SAWConfig` in web app (full config: repos, agent, quality, appearance, providers, notifications, code_review)

               The unified type must include ALL fields from the web app's SAWConfig since that
               is the most complete. See interface contract for `config.SAWConfig` for exact fields.

            2. Define sub-types: `ProvidersConfig`, `AnthropicProvider`, `BedrockProvider`,
               `OpenAIProvider`, `AutonomyConfig`, `RepoEntry`, `AgentConfig`, `QualityConfig`,
               `CodeReviewCfg`, `AppearConfig`.

               IMPORTANT: `RepoEntry` here REPLACES `protocol.RepoEntry` from `pkg/protocol/repo_resolve.go`.
               For now, keep both — wave 2 agents will update callers. The struct fields are identical
               (Name string, Path string).

            3. Implement `FindConfigPath(startDir string) string`:
               - Walk up from startDir, checking for `saw.config.json` at each level
               - Max 10 levels (same as current `findConfigFile`)
               - Return absolute path if found, empty string if not

            4. Implement `Load(startDir string) result.Result[*SAWConfig]`:
               - Call FindConfigPath to locate the file
               - If not found, return error with code `N013_CONFIG_NOT_FOUND`
               - Read and parse JSON
               - If JSON invalid, return error with code `N014_CONFIG_INVALID`
               - Handle backward compat: if `repos` is empty but `repo.path` exists,
                 migrate to repos array (same logic as web app's GetConfig)
               - Return `result.NewSuccess(&cfg)`

            5. Implement `Save(repoPath string, cfg *SAWConfig) result.Result[bool]`:
               - Read existing file to preserve unknown top-level keys (use map[string]json.RawMessage)
               - Marshal cfg fields into the map
               - Atomic write: temp file + os.Rename
               - Return `result.NewSuccess(true)` on success

            6. Implement `LoadOrDefault(startDir string) *SAWConfig`:
               - Convenience function that returns default config if Load fails
               - Default: empty providers, autonomy level "gated", max_auto_retries 2, max_queue_depth 10

            **Error handling:**
            - Use `result.Result[T]` for all return types
            - Use `result.SAWError` with codes `N013_CONFIG_NOT_FOUND` and `N014_CONFIG_INVALID`
              (use string literals directly: `Code: "N013_CONFIG_NOT_FOUND"` — do NOT reference
              `result.CodeConfigNotFound` or `result.CodeConfigInvalid`; those constants are
              defined by Agent B in parallel and won't exist in your worktree at compile time)
            - No bare `error` returns, no `fmt.Errorf`

            **Tests:**
            - TestLoad_NoFile (returns N013 error)
            - TestLoad_ValidFile (parses all sections)
            - TestLoad_InvalidJSON (returns N014 error)
            - TestLoad_BackwardCompat (repo.path migrated to repos array)
            - TestSave_AtomicWrite (temp file + rename)
            - TestSave_PreservesUnknownKeys
            - TestFindConfigPath_WalksUp
            - TestLoadOrDefault_FallsBack

            **Verification gate:**
            ```
            cd /Users/dayna.blackwell/code/scout-and-wave-go && go build ./pkg/config/... && go test ./pkg/config/... -count=1
            ```

            **Constraints:**
            - No imports from `pkg/agent/backend`, `pkg/autonomy`, or web app
            - Import only `pkg/result` from the SAW codebase
            - No backward-compat aliases or adapters — clean types only
          files:
            - pkg/config/config.go
            - pkg/config/config_test.go
        - id: B
          task: |
            ## Agent B — Wave State Query + Error Codes

            **What to implement:**

            1. Add error codes to `pkg/result/codes.go`
            2. Create `pkg/config/state.go` with wave state query function

            **Files:**
            - `pkg/result/codes.go` (MODIFY — add 2 constants)
            - `pkg/config/state.go` (NEW)
            - `pkg/config/state_test.go` (NEW)

            **Implementation details:**

            1. In `pkg/result/codes.go`, add to the Engine error codes section:
               ```go
               CodeConfigNotFound = "N013_CONFIG_NOT_FOUND"
               CodeConfigInvalid  = "N014_CONFIG_INVALID"
               ```

            2. Create `pkg/config/state.go` with:

               ```go
               package config

               type WaveState struct {
                   WaveNum         int                   `json:"wave_num"`
                   TotalAgents     int                   `json:"total_agents"`
                   CompletedAgents []string              `json:"completed_agents"`
                   FailedAgents    []string              `json:"failed_agents"`
                   PendingAgents   []string              `json:"pending_agents"`
                   GateResults     map[string]GateResult `json:"gate_results,omitempty"`
                   IsComplete      bool                  `json:"is_complete"`
                   MergeState      string                `json:"merge_state,omitempty"`
               }

               type GateResult struct {
                   GateType string `json:"gate_type"`
                   Command  string `json:"command"`
                   Passed   bool   `json:"passed"`
                   ExitCode int    `json:"exit_code"`
               }
               ```

            3. Implement `GetWaveState(manifest *protocol.IMPLManifest, waveNum int) result.Result[*WaveState]`:
               - Find the wave in manifest.Waves by number
               - If wave not found, return error
               - Count agents from the wave definition
               - Determine completed/failed/pending by checking manifest.CompletionReports
                 (agents with reports = completed, agents with failure reports = failed, rest = pending)
               - Leave GateResults as nil/empty (gate execution results are not stored in the manifest; they are runtime outputs only)
               - Set IsComplete = true if all agents have completion reports and no failures
               - Set MergeState from manifest.MergeState if wave matches

            4. Implement `GetAllWaveStates(manifest *protocol.IMPLManifest) result.Result[[]WaveState]`:
               - Iterate all waves, call GetWaveState for each
               - Return slice of all wave states

            **Error handling:**
            - Use `result.Result[T]` for returns
            - Use `result.SAWError` for errors (e.g., wave not found)

            **Tests:**
            - TestGetWaveState_ValidWave
            - TestGetWaveState_WaveNotFound
            - TestGetWaveState_AllComplete
            - TestGetWaveState_PartialComplete
            - TestGetWaveState_WithFailures
            - TestGetAllWaveStates

            **Verification gate:**
            ```
            cd /Users/dayna.blackwell/code/scout-and-wave-go && go build ./pkg/config/... && go build ./pkg/result/... && go test ./pkg/config/... ./pkg/result/... -count=1
            ```

            **Constraints:**
            - Import `pkg/protocol` for IMPLManifest type
            - Import `pkg/result` for Result type and error codes
            - No imports from `pkg/resume`, `pkg/engine`, or `pkg/gatecache`
            - The state.go file is in `pkg/config` but does NOT depend on config.go types
              (it operates on protocol.IMPLManifest, not SAWConfig)
          files:
            - pkg/result/codes.go
            - pkg/config/state.go
            - pkg/config/state_test.go
