title: Config & State Unification
feature_slug: config-state-unification
verdict: SUITABLE
suitability_assessment: |
    Suitability gate analysis:

    1. File decomposition: YES. Work spans 2 repos (SDK + web), ~25 files across
       config loading, state tracking, resume detection, CLI commands, web handlers,
       and tests. Clean separation into config-package creation (SDK), state-query
       consolidation (SDK), caller migration (SDK CLI), and web migration (web app).

    2. Investigation-first items: NONE. Both config loaders and state tracking paths
       are fully mapped. No unknown crash sources or race conditions.

    3. Interface discoverability: YES. The new pkg/config package has a clear contract:
       Load(startDir) returns SAWConfig, GetWaveState(manifest, wave) returns WaveState.
       All signatures can be defined before implementation.

    4. Pre-implementation status: No prior implementation. pkg/config/ does not exist.
       Two parallel config loaders exist (backend/configfile.go, autonomy/config.go)
       plus a third in the web app (service/config_service.go). State is scattered
       across IMPL manifest + .saw-state/ + web in-memory.

    5. Parallelization value: HIGH. Build/test cycle for scout-and-wave-go is >30s.
       4 agents in wave 1 with 3-5 files each, fully independent. Clear speedup.

    Estimated times:
    - Scout phase: ~10 min
    - Agent execution: ~25 min (7 agents, ~8 min avg, 3 waves with parallelism)
    - Merge & verification: ~5 min
    Total SAW time: ~40 min

    Sequential baseline: ~56 min (7 agents x 8 min avg)
    Time savings: ~16 min (29% faster)

    Recommendation: Clear speedup. Proceed.
