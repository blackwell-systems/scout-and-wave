            #[tokio::test]
            async fn test_upgrade_with_routing_table_style()

            #[tokio::test]
            async fn test_upgrade_with_inline_style()

            #[tokio::test]
            async fn test_upgrade_with_back_links_disabled()
            ```

            ## Tests Required

            Integration tests + verify existing tests pass (no regressions).

            ## Verification Gate

            ```bash
            cargo build
            cargo clippy -- -D warnings
            cargo test --all
            ```

            ## Constraints

            - Preserve existing splitter behavior when routing=None (backwards compatibility)
            - --routing-style values: "smart", "inline", "table", "none" (case-insensitive)
            - Do not break existing tests
