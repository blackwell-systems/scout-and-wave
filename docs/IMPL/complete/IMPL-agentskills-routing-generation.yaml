interface_contracts:
    - name: RoutingStyle
      description: |
        Enum representing routing strategy selection. Determines whether to use
        inline breadcrumbs, routing table, or no routing in upgraded skills.
      definition: |
        #[derive(Debug, Clone, PartialEq, Serialize, Deserialize)]
        pub enum RoutingStyle {
            Smart,    // Auto-select based on subcommand count (inline if <4, table if ≥4)
            Inline,   // Always use inline breadcrumbs
            Table,    // Always use routing table
            None,     // No routing generation
        }

        impl Default for RoutingStyle {
            fn default() -> Self { RoutingStyle::Smart }
        }
      location: src/models.rs
    - name: RoutingDetectionResult
      description: |
        Aggregates all detected routing patterns from frontmatter and content analysis.
        Used by routing generator to decide output format.
      definition: |
        #[derive(Debug, Clone)]
        pub struct RoutingDetectionResult {
            pub subcommands: Vec<String>,
            pub agent_types: Vec<String>,
            pub timing_sections: Vec<TimingSection>,
            pub recommended_style: RoutingStyle,
        }

        #[derive(Debug, Clone)]
        pub struct TimingSection {
            pub name: String,
            pub timing: SectionTiming,  // Invocation or Runtime
            pub trigger_pattern: Option<String>,
        }
      location: src/models.rs
    - name: RoutingOutput
      description: |
        Contains generated routing artifacts. Returned by routing generator for
        insertion into core SKILL.md and reference files.
      definition: |
        #[derive(Debug, Clone)]
        pub struct RoutingOutput {
            pub routing_table: Option<String>,      // Markdown table if table style
            pub inline_breadcrumbs: Vec<InlineBreadcrumb>,
            pub back_link_headers: HashMap<String, String>,  // ref_file -> header
        }

        #[derive(Debug, Clone)]
        pub struct InlineBreadcrumb {
            pub section_name: String,
            pub reference_file: String,
            pub condition: Option<String>,
        }
      location: src/models.rs
    - name: UpgradeOptions extension
      description: |
        Add new fields to existing UpgradeOptions struct for routing flags.
      definition: |
        pub struct UpgradeOptions {
            pub dry_run: bool,
            pub with_agent_references: bool,
            pub interactive: Option<bool>,
            pub provider: Option<String>,
            // New fields:
            pub routing_style: Option<RoutingStyle>,
            pub show_timing: bool,
            pub back_links: bool,
        }
      location: src/models.rs
    - name: detect_routing_patterns
      description: |
        Main detection entry point. Analyzes SKILL.md content and returns structured
        routing detection results with recommended style.
      definition: |
        pub fn detect_routing_patterns(
            skill_path: &Path,
            options: &UpgradeOptions,
        ) -> Result<RoutingDetectionResult, Error> {
            // Extract subcommands from argument-hint
            let subcommands = extract_subcommands(content)?;
            // Extract agent types from allowed-tools
            let agent_types = extract_agent_types(content)?;
            // Classify timing sections (invocation vs runtime)
            let timing_sections = classify_timing_sections(content, analyzer)?;
            // Recommend routing style based on subcommand count
            let recommended_style = if subcommands.len() >= 4 {
                RoutingStyle::Table
            } else {
                RoutingStyle::Inline
            };

            Ok(RoutingDetectionResult {
                subcommands,
                agent_types,
                timing_sections,
                recommended_style,
            })
        }
      location: src/upgrade/routing_detector.rs
    - name: generate_routing
      description: |
        Takes detection results and selected style, generates all routing artifacts.
        Returns RoutingOutput with table, breadcrumbs, and back-link headers.
      definition: |
        pub fn generate_routing(
            detection: &RoutingDetectionResult,
            style: RoutingStyle,
            skill_name: &str,
        ) -> Result<RoutingOutput, Error> {
            let routing_table = if style == RoutingStyle::Table {
                Some(generate_routing_table(detection, skill_name))
            } else {
                None
            };

            let inline_breadcrumbs = if style != RoutingStyle::Table {
                generate_inline_breadcrumbs(detection)
            } else {
                vec![]
            };

            let back_link_headers = generate_back_link_headers(detection);

            Ok(RoutingOutput {
                routing_table,
                inline_breadcrumbs,
                back_link_headers,
            })
        }
      location: src/upgrade/routing_generator.rs
    - name: show_interactive_preview
      description: |
        Displays routing detection results and recommendations, gets user confirmation
        before applying changes. Returns user's selected routing style or None if cancelled.
      definition: |
        pub fn show_interactive_preview(
            detection: &RoutingDetectionResult,
            options: &UpgradeOptions,
        ) -> Result<Option<RoutingStyle>, Error> {
            eprintln!("\n--- Routing Analysis ---");
            eprintln!("Detected {} subcommands: {:?}",
                detection.subcommands.len(), detection.subcommands);
            eprintln!("Detected {} agent types: {:?}",
                detection.agent_types.len(), detection.agent_types);
            eprintln!("Recommended routing style: {:?}", detection.recommended_style);

            if options.routing_style.is_some() {
                // User specified style via flag, skip prompt
                return Ok(options.routing_style.clone());
            }

            eprintln!("\nApply recommended routing? [y/N/custom]: ");
            // ... stdin read and parsing logic

            Ok(Some(selected_style))
        }
      location: src/upgrade/interactive_recommender.rs
