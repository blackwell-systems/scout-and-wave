            # Agent D: Integration & CLI Wiring

            ## What to Implement

            Wire routing detection and generation into upgrade command flow.
            Add CLI flags, integrate with splitter, write integration tests.

            ## Interfaces This Agent Depends On

            - `routing_detector::detect_routing_patterns()` (Agent A)
            - `routing_generator::generate_routing()` (Agent B)
            - `interactive_recommender::show_interactive_preview()` (Agent C)
            - All routing types (Agent A)

            ## Changes Required

            ### 1. src/commands/upgrade.rs
            Add CLI flags:
            ```rust
            #[arg(long, value_name = "STYLE")]
            pub routing_style: Option<String>,

            #[arg(long)]
            pub timing: bool,

            #[arg(long, default_value = "true")]
            pub back_links: bool,
            ```

            ### 2. src/upgrade/mod.rs
            Add module declarations:
            ```rust
            pub mod routing_detector;
            pub mod routing_generator;
            pub mod interactive_recommender;
            ```

            Insert routing detection before splitter (after Step 1):
            ```rust
            // Step 1.5: Detect routing patterns
            let detection = routing_detector::detect_routing_patterns(skill_path, options)?;

            // Step 1.6: Interactive preview (if enabled)
            let routing_style = if options.interactive.unwrap_or(false) {
                interactive_recommender::show_interactive_preview(&detection, options)?
                    .unwrap_or(detection.recommended_style)
            } else {
                options.routing_style.unwrap_or(detection.recommended_style)
            };

            // Step 1.7: Generate routing artifacts
            let skill_name = extract_skill_name(&content)?;
            let routing_output = routing_generator::generate_routing(&detection, routing_style, &skill_name)?;

            // Step 2: Split content (pass routing_output)
            let split_result = splitter::split_content(skill_path, &analysis, detection.analyzer, Some(&routing_output)).await?;
            ```

            ### 3. src/upgrade/splitter.rs
            Modify signature:
            ```rust
            pub async fn split_content(
                skill_path: &Path,
                analysis: &BloatAnalysis,
                analyzer: Option<Box<dyn SemanticAnalyzer>>,
                routing: Option<&RoutingOutput>,
            ) -> Result<SplitResult, Error>
            ```

            Integration logic:
            - Prepend routing_table to core SKILL.md if present
            - Use routing.inline_breadcrumbs instead of generate_breadcrumb calls
            - Prepend back_link_headers to reference files

            ### 4. tests/routing_integration_test.rs (new)
            End-to-end tests:
