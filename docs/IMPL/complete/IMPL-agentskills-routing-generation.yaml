            # Agent A: Shared Types & Routing Pattern Detector

            ## What to Implement

            1. Add shared routing types to `src/models.rs`
            2. Create `src/upgrade/routing_detector.rs` for routing pattern detection

            **Core responsibilities:**
            - Define RoutingStyle, RoutingDetectionResult, RoutingOutput, InlineBreadcrumb, TimingSection structs
            - Extend UpgradeOptions struct with routing_style, show_timing, back_links fields
            - Aggregate existing pattern detection (subcommands, agent types)
            - Classify sections by timing (invocation vs runtime) using semantic analyzer
            - Recommend routing style (inline if <4 subcommands, table if ≥4)

            ## Interfaces This Agent Depends On

            - `pattern_detector::extract_subcommands(content: &str)` (existing)
            - `pattern_detector::extract_agent_types(content: &str)` (existing)
            - `semantic_analyzer::SemanticAnalyzer::analyze_section()` (existing)
            - `SectionTiming` enum (existing in models.rs)

            ## Interfaces This Agent Exports

            - All types in interface_contracts above (in src/models.rs)
            - `detect_routing_patterns()` function (in src/upgrade/routing_detector.rs)

            ## Part 1: Extend src/models.rs

            Add the following types at the end of the file:

            ```rust
            use std::collections::HashMap;
            use serde::{Serialize, Deserialize};

            #[derive(Debug, Clone, PartialEq, Serialize, Deserialize)]
            pub enum RoutingStyle {
                Smart,    // Auto-select based on subcommand count (inline if <4, table if ≥4)
                Inline,   // Always use inline breadcrumbs
                Table,    // Always use routing table
                None,     // No routing generation
            }

            impl Default for RoutingStyle {
                fn default() -> Self { RoutingStyle::Smart }
            }

            #[derive(Debug, Clone)]
            pub struct RoutingDetectionResult {
                pub subcommands: Vec<String>,
                pub agent_types: Vec<String>,
                pub timing_sections: Vec<TimingSection>,
                pub recommended_style: RoutingStyle,
            }

            #[derive(Debug, Clone)]
            pub struct TimingSection {
                pub name: String,
                pub timing: SectionTiming,  // Invocation or Runtime (existing enum)
                pub trigger_pattern: Option<String>,
            }

            #[derive(Debug, Clone)]
            pub struct RoutingOutput {
                pub routing_table: Option<String>,
                pub inline_breadcrumbs: Vec<InlineBreadcrumb>,
                pub back_link_headers: HashMap<String, String>,
            }

            #[derive(Debug, Clone)]
            pub struct InlineBreadcrumb {
                pub section_name: String,
                pub reference_file: String,
                pub condition: Option<String>,
            }
            ```

            **ALSO extend the existing UpgradeOptions struct** (do not replace it):
            ```rust
            pub struct UpgradeOptions {
                pub dry_run: bool,
                pub with_agent_references: bool,
                pub interactive: Option<bool>,
                pub provider: Option<String>,
                // NEW FIELDS (add these):
                pub routing_style: Option<RoutingStyle>,
                pub show_timing: bool,
                pub back_links: bool,
            }
            ```

            Update the `Default` implementation for UpgradeOptions:
            ```rust
            impl Default for UpgradeOptions {
                fn default() -> Self {
                    UpgradeOptions {
                        dry_run: false,
                        with_agent_references: false,
                        interactive: None,
                        provider: None,
                        routing_style: None,
                        show_timing: false,
                        back_links: true,
                    }
                }
            }
            ```

            ## Part 2: Create src/upgrade/routing_detector.rs

            Implement the detect_routing_patterns function as specified in interface_contracts.

            ## Tests Required

            Create unit tests in `src/upgrade/routing_detector.rs`:
            1. `test_detect_patterns_recommends_inline_for_few_subcommands`
            2. `test_detect_patterns_recommends_table_for_many_subcommands`
            3. `test_classify_timing_sections_invocation`
            4. `test_classify_timing_sections_runtime`
            5. `test_detect_patterns_with_no_semantic_analyzer`

            ## Verification Gate

            ```bash
            cargo build
            cargo clippy -- -D warnings
            cargo test routing_detector
            ```

            ## Constraints

            - Do not modify existing types in models.rs besides extending UpgradeOptions
            - Append new types at end of models.rs
            - Reuse existing pattern_detector and semantic_analyzer modules
            - Handle missing semantic analyzer gracefully (timing = Unknown)
