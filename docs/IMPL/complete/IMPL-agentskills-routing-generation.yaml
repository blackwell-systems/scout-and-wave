title: Agentskills CLI - Automatic Routing Generation
feature_slug: agentskills-routing-generation
verdict: SUITABLE
suitability_assessment: |
    Adding automatic routing generation to the `upgrade` command in agentskills-cli.
    Work decomposes into 3 agents across 2 waves with disjoint file ownership (Agent A
    owns models.rs in wave 1, preventing I1 violations).

    File decomposition: ~10 files split across routing detection, routing generation,
    interactive preview, CLI flag extensions, and comprehensive tests. Natural boundaries
    at module level (upgrade/routing_detector.rs, upgrade/routing_generator.rs,
    upgrade/interactive_recommender.rs).

    Interface discoverability: All cross-agent types can be defined upfront
    (RoutingDetectionResult, RoutingStyle enum, RoutingOutput). Agent A defines shared
    types in models.rs first, then agents B and C depend on those exports (sequential
    within wave 1 due to cross-wave dependency rule I2).

    Actually, I2 says cross-wave dependencies only (agents in same wave cannot depend
    on each other). This requires restructuring: either (1) Agent A in wave 1 defines
    types, agents B/C in wave 2, or (2) all types in a scaffold file created before
    wave 1.

    Choosing option 2 (scaffold file approach) but without using wave 0 (invalid per V004).
    Instead: Document scaffolds section with status: pending, and instruct orchestrator
    to create them before Wave 1 launches.

    Parallelization value: Rust build cycles (30-60s) amplify parallel execution benefit.
    Wave 1 runs 3 independent agents (routing detector, routing generator, interactive
    preview) after scaffolds created. Wave 2 wires CLI flags and integration tests (1 agent).

    Time estimate: ~25 min total (5 min Scout, 16 min agents, 4 min merge)
    vs ~40 min sequential baseline. 38% speedup from parallelization.

    Target repository: /Users/dayna.blackwell/code/agentskills-cli
    Current state: Existing Rust project with upgrade command infrastructure

    Suitability verdict: SUITABLE - clear speedup from Rust build parallelization
    and independent module boundaries.
