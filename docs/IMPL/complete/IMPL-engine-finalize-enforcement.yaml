      agents:
        - id: A
          task: |
            ## Context

            You are implementing Layer 1 of the engine-finalize-enforcement feature in
            `scout-and-wave-go`. Your task is to add 5 new Step* functions to
            `pkg/engine/finalize_steps.go`. These functions move "CLI-only" enforcement
            steps from `cmd/sawtools/finalize_wave.go` into the engine so both CLI and
            web app enforce the same protocol rules.

            ## What to Implement

            In `pkg/engine/finalize_steps.go`, add these 5 new functions after the
            existing `StepCleanup` function (at the end of the file):

            ### 1. StepVerifyCompletionReports (I4)

            ```go
            func StepVerifyCompletionReports(ctx context.Context, opts FinalizeWaveOpts, manifest *protocol.IMPLManifest, onEvent EventCallback) (*StepResult, error)
            ```

            Logic: Iterate `manifest.Waves[opts.WaveNum-1].Agents`. For each agent,
            check `manifest.CompletionReports[agent.ID]` exists. Collect missing IDs.
            If any missing, return fatal error:
            `fmt.Errorf("verify-completion-reports: missing for agents: %v (I4)", missing)`
            Step name: `"verify-completion-reports"`

            ### 2. StepCheckAgentStatuses (E7)

            ```go
            func StepCheckAgentStatuses(ctx context.Context, opts FinalizeWaveOpts, manifest *protocol.IMPLManifest, onEvent EventCallback) (*StepResult, error)
            ```

            Logic: Iterate agents; for each with a completion report, check
            `report.Status == "partial" || report.Status == "blocked"`. Return fatal
            on first violation:
            `fmt.Errorf("check-agent-statuses: agent %s has status %q — cannot merge (E7)", agent.ID, report.Status)`
            Step name: `"check-agent-statuses"`

            ### 3. StepPredictConflicts (E11)

            ```go
            func StepPredictConflicts(ctx context.Context, opts FinalizeWaveOpts, manifest *protocol.IMPLManifest, onEvent EventCallback) (*StepResult, error)
            ```

            Logic: Call `protocol.PredictConflictsFromReports(manifest, opts.WaveNum)`.
            Wrap any non-nil error: `fmt.Errorf("predict-conflicts: %w", err)`.
            Step name: `"predict-conflicts"`

            ### 4. StepCheckTypeCollisions (opt-in)

            ```go
            func StepCheckTypeCollisions(ctx context.Context, opts FinalizeWaveOpts, onEvent EventCallback) (*StepResult, *collision.CollisionReport, error)
            ```

            Import `"github.com/blackwell-systems/scout-and-wave-go/pkg/collision"`.
            Logic: When `opts.CollisionDetectionEnabled == false`, emit step event
            with status "skipped" and return `(success_result, nil, nil)`. When
            enabled, call `collision.DetectCollisions(opts.IMPLPath, opts.WaveNum, opts.RepoPath)`.
            On detect error, return `(failed_result, nil, fmt.Errorf(...))`.
            When `report.Valid == false`, return `(failed_result, &report, fmt.Errorf("check-type-collisions: collisions detected"))`.
            When valid, return `(success_result, &report, nil)`.
            Set `result.Data = &report` in all non-skip paths.
            Step name: `"check-type-collisions"`

            ### 5. StepCheckWiringDeclarations (E35, non-fatal)

            ```go
            func StepCheckWiringDeclarations(ctx context.Context, opts FinalizeWaveOpts, manifest *protocol.IMPLManifest, onEvent EventCallback) (*StepResult, *protocol.WiringValidationData, error)
            ```

            Logic: When `len(manifest.Wiring) == 0`, return success (skipped).
            Otherwise, call `protocol.ValidateWiringDeclarations(manifest, opts.RepoPath)`.
            When result `IsFatal()`, log warning (non-fatal), return success with
            detail describing the error.
            Otherwise, extract data and return `(success_result, wiringData, nil)`.
            Set `result.Data = wiringData` when data is available.
            Step name: `"check-wiring-declarations"`

            ### 6. StepPopulateIntegrationChecklist (M5, non-fatal)

            ```go
            func StepPopulateIntegrationChecklist(ctx context.Context, opts FinalizeWaveOpts, manifest *protocol.IMPLManifest, onEvent EventCallback) (*StepResult, *protocol.IMPLManifest, error)
            ```

            Logic: Call `protocol.PopulateIntegrationChecklist(manifest)`. If error,
            log warning and return `(success_result, nil, nil)` (non-fatal).
            On success, call `protocol.Save(updated, opts.IMPLPath)`. If save error,
            log warning, return `(success_result, nil, nil)` (non-fatal).
            Return `(success_result, updated, nil)` on full success.
            Step name: `"populate-integration-checklist"`

            ## Patterns to Follow

            Existing functions in this file show the exact pattern:
            - Open with `emitStepEvent(onEvent, stepName, "running", "")`
            - Close success path with `emitStepEvent(onEvent, stepName, "complete", "")`
            - Close failure path with `emitStepEvent(onEvent, stepName, "failed", detail)`
            - Always return a non-nil `*StepResult`
            - Use `loggerFrom(opts.Logger).Warn(...)` for non-fatal log entries
            - `opts.Logger` is available; nil is safe via `loggerFrom`

            ## Imports to Add

            Add `"github.com/blackwell-systems/scout-and-wave-go/pkg/collision"` to the
            import block (needed for StepCheckTypeCollisions).

            The `protocol` import is already present. `context` and `fmt` are already
            present.

            ## Verification Gate

            ```
            go build ./pkg/engine/...
            go vet ./pkg/engine/...
            go test ./pkg/engine/... -run TestStep -v
            ```

            ## Constraints

            - Do NOT modify `finalize.go`, `finalize_steps_test.go`, or any file
              outside `pkg/engine/finalize_steps.go`.
            - Do NOT move or delete existing Step* functions.
            - All 6 new functions must be exported (capital S).
            - Non-fatal steps (5 and 6) must never return a non-nil error.
          files:
