interface_contracts:
    - name: StepVerifyCompletionReports
      description: |-
        I4 check — verify every agent in the wave has a completion report.
        Fatal: returns error listing missing agent IDs.
      definition: |
        func StepVerifyCompletionReports(
            ctx context.Context,
            opts FinalizeWaveOpts,
            manifest *protocol.IMPLManifest,
            onEvent EventCallback,
        ) (*StepResult, error)

        // Returns fmt.Errorf("verify-completion-reports: missing for agents: %v (I4)", missing)
        // when len(missing) > 0. Data field of StepResult is nil for this step.
      location: pkg/engine/finalize_steps.go
    - name: StepCheckAgentStatuses
      description: |-
        E7 check — block merge if any agent in the wave has status "partial" or "blocked".
        Fatal: returns error identifying the offending agent ID and status.
      definition: |
        func StepCheckAgentStatuses(
            ctx context.Context,
            opts FinalizeWaveOpts,
            manifest *protocol.IMPLManifest,
            onEvent EventCallback,
        ) (*StepResult, error)

        // Returns fmt.Errorf("check-agent-statuses: agent %s has status %q — cannot merge (E7)", id, status)
        // Data field is nil. Checks all agents; returns on first violation.
      location: pkg/engine/finalize_steps.go
    - name: StepPredictConflicts
      description: |-
        E11 check — call protocol.PredictConflictsFromReports to detect file-level
        conflicts before merge. Fatal on conflict.
      definition: |
        func StepPredictConflicts(
            ctx context.Context,
            opts FinalizeWaveOpts,
            manifest *protocol.IMPLManifest,
            onEvent EventCallback,
        ) (*StepResult, error)

        // Wraps: protocol.PredictConflictsFromReports(manifest, opts.WaveNum)
        // Returns error from PredictConflictsFromReports wrapped with step name.
      location: pkg/engine/finalize_steps.go
    - name: StepCheckTypeCollisions
      description: |-
        Opt-in type collision detection using pkg/collision.DetectCollisions.
        Only runs when FinalizeWaveOpts.CollisionDetectionEnabled == true.
        Fatal: returns error when CollisionReport.Valid == false.
      definition: |
        func StepCheckTypeCollisions(
            ctx context.Context,
            opts FinalizeWaveOpts,
            onEvent EventCallback,
        ) (*StepResult, *collision.CollisionReport, error)

        // Skips (returns success) when CollisionDetectionEnabled == false.
        // Data field is *collision.CollisionReport when detection runs.
        // Fatal when report.Valid == false.
      location: pkg/engine/finalize_steps.go
    - name: StepCheckWiringDeclarations
      description: |-
        E35 check — call protocol.ValidateWiringDeclarations when manifest.Wiring is
        non-empty. Non-fatal: gaps surface in result but do not block merge.
      definition: |
        func StepCheckWiringDeclarations(
            ctx context.Context,
            opts FinalizeWaveOpts,
            manifest *protocol.IMPLManifest,
            onEvent EventCallback,
        ) (*StepResult, *protocol.WiringValidationData, error)

        // Returns (success, nil, nil) when manifest.Wiring is empty.
        // Data field is *protocol.WiringValidationData when wiring check runs.
        // Never returns a non-nil error (informational only).
      location: pkg/engine/finalize_steps.go
    - name: StepPopulateIntegrationChecklist
      description: |-
        M5 — call protocol.PopulateIntegrationChecklist and save manifest.
        Non-fatal: errors are logged but do not block merge.
      definition: |
        func StepPopulateIntegrationChecklist(
            ctx context.Context,
            opts FinalizeWaveOpts,
            manifest *protocol.IMPLManifest,
            onEvent EventCallback,
        ) (*StepResult, *protocol.IMPLManifest, error)

        // Returns (success, updatedManifest, nil) on success.
        // Returns (success, nil, nil) on error (non-fatal).
        // Caller is responsible for updating its manifest pointer if non-nil returned.
      location: pkg/engine/finalize_steps.go
    - name: FinalizeWaveOpts_NewFields
      description: Two new boolean fields added to FinalizeWaveOpts for opt-in behaviors.
      definition: |
        // CollisionDetectionEnabled: When true, StepCheckTypeCollisions runs before
        // StepMergeAgents. The CLI sets this to true; web app leaves false (default).
        CollisionDetectionEnabled bool

        // ClosedLoopRetryEnabled: When true, after a required gate fails in
        // StepRunGates, engine.ClosedLoopGateRetry is invoked per-agent.
        // The CLI sets this to true; web app leaves false (default).
        ClosedLoopRetryEnabled bool
      location: pkg/engine/finalize.go
    - name: FinalizeWaveResult_NewFields
      description: New fields on FinalizeWaveResult to capture results from the new steps.
      definition: |
        CollisionReport  *collision.CollisionReport    `json:"collision_report,omitempty"`
        WiringReport     *protocol.WiringValidationData `json:"wiring_report,omitempty"`
      location: pkg/engine/finalize.go
