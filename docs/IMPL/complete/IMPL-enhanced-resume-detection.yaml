               - Add RecoverySteps []protocol.RecoveryStep field to SessionState struct (after AgentSessions field)
               - In buildSessionState function (around line 132):
                 a. After loading agent sessions (line 185), call BuildRecoverySteps
                 b. Pass state and manifest to BuildRecoverySteps
                 c. Populate ss.RecoverySteps with the result
               - JSON tag: `json:"recovery_steps,omitempty"`

            3. **Recovery step generation logic** (in recovery.go):
               ```go
               func BuildRecoverySteps(state SessionState, manifest *protocol.IMPLManifest) []protocol.RecoveryStep {
                   var steps []protocol.RecoveryStep

                   // Priority 1: Failed agents
                   for _, agentID := range state.FailedAgents {
                       report := manifest.CompletionReports[agentID]
                       category := "diagnostic"
                       if report.FailureType == "fixable" {
                           category = "fix"
                       }
                       steps = append(steps, protocol.RecoveryStep{
                           Command: fmt.Sprintf("sawtools build-retry-context %s --agent %s", state.IMPLPath, agentID),
                           Reason: fmt.Sprintf("Analyze failure details for agent %s", agentID),
                           Priority: 1,
                           Category: category,
                           AutoRunnable: true,
                       })
                   }

                   // Priority 2: Dirty worktrees (uncommitted work)
                   for _, dw := range state.DirtyWorktrees {
                       if dw.HasChanges {
                           steps = append(steps, protocol.RecoveryStep{
                               Command: fmt.Sprintf("cd %s && git status", dw.Path),
                               Reason: "Review uncommitted changes before resuming",
                               Priority: 1,
                               Category: "verification",
                               AutoRunnable: false,
                           })
                       }
                   }

                   // Priority 3: Resume command
                   steps = append(steps, protocol.RecoveryStep{
                       Command: state.ResumeCommand,
                       Reason: state.SuggestedAction,
                       Priority: 3,
                       Category: "fix",
                       AutoRunnable: false, // requires human review
                   })

                   return steps
               }
               ```

