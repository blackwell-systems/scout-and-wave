               // GenerateActionableCommand produces a concrete sawtools command for a diagnosis.
               func GenerateActionableCommand(diag *Diagnosis, implPath string) string {
                   switch diag.Pattern {
                   case "missing_import":
                       return fmt.Sprintf("sawtools check-deps %s", implPath)
                   case "type_mismatch":
                       return fmt.Sprintf("sawtools check-type-collisions %s", implPath)
                   case "undefined_symbol":
                       return fmt.Sprintf("grep -rn '%s' %s", extractSymbol(diag), implPath)
                   default:
                       return "sawtools diagnose-build-failure <error-log-path>"
                   }
               }
               ```

