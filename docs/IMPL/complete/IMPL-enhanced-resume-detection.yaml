               ### E19.2 — Enhanced Resume Detection and Recovery Guidance

               **Trigger:** sawtools resume-detect or orchestrator resumption after interruption

               **Required Action:** The orchestrator SHOULD use sawtools resume-detect to surface
               structured recovery guidance when a wave is interrupted (user Ctrl-C, system crash,
               network failure, etc.).

               **Recovery Steps Format:**
               Each SessionState returned by resume-detect includes a `recovery_steps` array
               with prioritized actionable commands:

               ```json
               {
                 "impl_slug": "my-feature",
                 "current_wave": 2,
                 "failed_agents": ["B"],
                 "recovery_steps": [
                   {
                     "command": "sawtools build-retry-context docs/IMPL/IMPL-my-feature.yaml --agent B",
                     "reason": "Analyze failure details for agent B",
                     "priority": 1,
                     "category": "diagnostic",
                     "auto_runnable": true
                   },
                   {
                     "command": "sawtools run-wave docs/IMPL/IMPL-my-feature.yaml --wave 2",
                     "reason": "Resume wave 2 after fixing agent B",
                     "priority": 3,
                     "category": "fix",
                     "auto_runnable": false
                   }
                 ]
               }
               ```

               **Failure Categories:** Enhanced beyond E19's 5 failure_type values to include:
               - network_error — transient network failures (dial tcp, EOF)
               - rate_limit_error — API quota exhaustion (429, throttled)
               - worktree_isolation_failure — agent committed to wrong branch/worktree
               - git_conflict — merge conflicts, unstaged changes
               - contract_violation — type errors, missing method implementations
               - timeout — turn limit exceeded, deadline exceeded

               These categories are surfaced in build-retry-context JSON output as
               `failure_category` field alongside legacy `error_class`.

               **Orchestrator Integration:** When resuming after interruption:
               1. Run `sawtools resume-detect` to get SessionState with recovery_steps
               2. For priority 1 steps marked `auto_runnable: true`, run them automatically
               3. For priority 1 steps with `auto_runnable: false`, surface to user before proceeding
               4. For priority 2-3 steps, include in UI but do not block resumption

               **Relationship to E19:** E19.2 extends E19's failure handling with structured
               recovery guidance. E19 defines orchestrator actions during active wave execution;
               E19.2 defines orchestrator actions when resuming after interruption.

               **Related Commands:**
               - sawtools resume-detect — outputs SessionState with recovery_steps
               - sawtools build-retry-context <impl> --agent <id> — outputs RetryAttempt with
                 failure_category, recovery_steps, what_worked, what_changed fields
               ```

