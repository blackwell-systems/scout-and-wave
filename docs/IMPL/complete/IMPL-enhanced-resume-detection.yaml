            **What to implement:**

            1. **Create pkg/resume/recovery.go** (new file):
               - Import protocol types (RecoveryStep, FailureCategory, CompletionReport)
               - Implement BuildRecoverySteps(state SessionState, manifest *protocol.IMPLManifest) []protocol.RecoveryStep
               - Analysis logic:
                 a. If failed agents exist → check their failure_type from completion reports
                 b. Generate diagnostic command: sawtools build-retry-context <impl-path> --agent <id>
                 c. If failure_type=fixable → add "Apply fix and relaunch" step (priority 1)
                 d. If orphaned worktrees exist → add cleanup command (priority 2)
                 e. If dirty worktrees exist → add "Review uncommitted work" step (priority 1)
                 f. Always add "Resume wave" command as final step (priority 3)
               - Return slice ordered by priority (1, then 2, then 3)

