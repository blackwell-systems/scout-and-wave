interface_contracts:
    - name: RecoveryStep
      description: Structured recovery action with command, reason, and priority
      definition: |
        // RecoveryStep is a single actionable recovery step with priority ordering.
        type RecoveryStep struct {
            Command     string `json:"command"`      // Exact sawtools command to run
            Reason      string `json:"reason"`       // Why this step helps
            Priority    int    `json:"priority"`     // 1=critical, 2=recommended, 3=optional
            Category    string `json:"category"`     // "diagnostic" | "fix" | "verification"
            AutoRunnable bool  `json:"auto_runnable"` // Can orchestrator run this automatically?
        }
      location: pkg/protocol/types.go
    - name: FailureCategory
      description: Granular failure classification extending ErrorClass
      definition: |
        // FailureCategory is a detailed failure type for enhanced resume detection.
        type FailureCategory string

        const (
            FailureCategoryImportError         FailureCategory = "import_error"
            FailureCategoryTypeError           FailureCategory = "type_error"
            FailureCategoryTestFailure         FailureCategory = "test_failure"
            FailureCategoryBuildError          FailureCategory = "build_error"
            FailureCategoryLintError           FailureCategory = "lint_error"
            FailureCategoryNetworkError        FailureCategory = "network_error"
            FailureCategoryRateLimitError      FailureCategory = "rate_limit_error"
            FailureCategoryWorktreeIsolation   FailureCategory = "worktree_isolation_failure"
            FailureCategoryGitConflict         FailureCategory = "git_conflict"
            FailureCategoryContractViolation   FailureCategory = "contract_violation"
            FailureCategoryTimeout             FailureCategory = "timeout"
            FailureCategoryUnknown             FailureCategory = "unknown"
        )
      location: pkg/protocol/types.go
    - name: BuildRecoverySteps
      description: Generate recovery steps from SessionState
      definition: |
        // BuildRecoverySteps analyzes a SessionState and returns ordered recovery steps.
        func BuildRecoverySteps(state SessionState, manifest *protocol.IMPLManifest) []protocol.RecoveryStep
      location: pkg/resume/recovery.go
    - name: ClassifyFailureDetailed
      description: Enhanced failure classification with granular categories
      definition: |
        // ClassifyFailureDetailed extends ClassifyError with more granular categories.
        // It parses error output for network errors, rate limits, worktree isolation
        // failures, git conflicts, and contract violations.
        func ClassifyFailureDetailed(report protocol.CompletionReport) protocol.FailureCategory
      location: pkg/retry/classify.go
    - name: BuildRetryContextWithRecovery
      description: Extend RetryAttempt with recovery steps
      definition: |
        // BuildRetryContextWithRecovery builds a RetryAttempt with recovery steps attached.
        // It analyzes the completion report, classifies the failure, and generates
        // actionable recovery steps using BuildRecoverySteps.
        func BuildRetryContextWithRecovery(manifestPath string, agentID string, attemptNum int) (*RetryAttempt, error)
      location: pkg/retry/context.go
    - name: SessionState (extended)
      description: Add RecoverySteps field to SessionState
      definition: |
        // SessionState (existing struct, add new field):
        type SessionState struct {
            // ... existing fields ...
            RecoverySteps []protocol.RecoveryStep `json:"recovery_steps,omitempty"`
        }
      location: pkg/resume/detect.go
    - name: RetryAttempt (extended)
      description: Add RecoverySteps and FailureCategory fields
      definition: |
        // RetryAttempt (existing struct, add new fields):
        type RetryAttempt struct {
            // ... existing fields ...
            FailureCategory   protocol.FailureCategory   `json:"failure_category"`
            RecoverySteps     []protocol.RecoveryStep    `json:"recovery_steps,omitempty"`
            WhatWorked        string                     `json:"what_worked,omitempty"`
            WhatChanged       string                     `json:"what_changed,omitempty"`
            SuggestedApproach string                     `json:"suggested_fix_approach,omitempty"`
        }
      location: pkg/retry/attempt.go
