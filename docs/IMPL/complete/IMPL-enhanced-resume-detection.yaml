      description: Granular failure classification type for recovery guidance
      definition: |
        // FailureCategory classifies an agent failure for recovery step generation.
        type FailureCategory string

        const (
            FailureCategoryTransient   FailureCategory = "transient"
            FailureCategoryFixable     FailureCategory = "fixable"
            FailureCategoryNeedsReplan FailureCategory = "needs_replan"
            FailureCategoryTimeout     FailureCategory = "timeout"
            FailureCategoryUnknown     FailureCategory = "unknown"
        )
      location: pkg/protocol/types.go
    - name: RecoveryStep
      description: A single actionable recovery step with priority and optional command
      definition: |
        // RecoveryStep is one actionable recovery action returned by BuildRecoverySteps.
        type RecoveryStep struct {
            Priority    int             `json:"priority"`
            Description string          `json:"description"`
            Command     string          `json:"command,omitempty"`
            Category    FailureCategory `json:"category,omitempty"`
        }
      location: pkg/protocol/types.go
    - name: BuildRecoverySteps
      description: Generate ordered recovery steps from a SessionState and its manifest
      definition: |
        // BuildRecoverySteps analyzes a SessionState and returns ordered recovery steps.
