suitability_assessment: |
    ## Suitability Assessment

    **1. File decomposition:** ✅ PASS
    Work spans 8 distinct files across 3 packages (resume, retry, protocol types).
    Each file has clear ownership boundaries:
    - pkg/resume/detect.go — Session detection (extend SessionState)
    - pkg/resume/recovery.go — NEW: Recovery step generation logic
    - pkg/retry/classify.go — Error classification (extend beyond 5 types to 10+)
    - pkg/retry/context.go — NEW: Structured retry context builder
    - pkg/protocol/types.go — Add RecoveryStep, FailureCategory types
    - cmd/sawtools/resume_detect_cmd.go — Wire new fields into JSON output
    - cmd/sawtools/build_retry_context_cmd.go — Extend with recovery steps
    - pkg/builddiag/diagnose.go — Enhance with actionable command generation

    No two agents require conflicting modifications to the same file.

    **2. Investigation-first items:** ✅ PASS
    No root cause analysis needed. Feature extends existing detection/classification
    infrastructure with well-defined enhancements. All interfaces are discoverable
    from existing code (SessionState, RetryAttempt, ErrorClass).

    **3. Interface discoverability:** ✅ PASS
    All cross-agent interfaces are defined before implementation:
    - RecoveryStep struct (protocol types) — consumed by resume and retry packages
    - FailureCategory enum — extends ErrorClass, consumed by classify.go
    - BuildRecoverySteps(SessionState) []RecoveryStep — called by resume-detect
    - ClassifyFailureDetailed(CompletionReport) FailureCategory — called by context builder

    **4. Pre-implementation status check:**
    Existing functionality (baseline):
    - SessionState.SuggestedAction exists (string, free-form)
    - ErrorClass has 5 categories (import, type, test, build, lint, unknown)
    - RetryAttempt.SuggestedFixes exists ([]string, generic advice)
    - builddiag package has language-specific pattern matching

    Enhancement scope (net new):
    - RecoverySteps field ([]RecoveryStep with command + reason + priority)
    - FailureCategory with 10+ granular types (network_error, rate_limit, worktree_isolation, git_conflict, contract_violation, etc.)
    - Actionable sawtools commands in recovery steps ("sawtools diagnose-build-failure <path>", "sawtools check-deps <impl>", etc.)
    - Structured retry context (what_worked, what_changed, suggested_fix_approach)

    All baseline functionality remains unchanged; new fields are additive.

    **5. Parallelization value check:** ✅ HIGH VALUE
    - Build/test cycle: ~20s (go test ./... -timeout 120s across 34 packages)
    - 3 waves with 2-3 agents each (8 agents total)
    - Agents are largely independent (Wave 1: protocol types; Wave 2: resume+retry consumers; Wave 3: CLI wiring)
    - Multi-wave chain reduces parallelization benefit slightly (waves run sequentially), but Wave 2's 3 agents benefit from parallel execution

    **Estimated times:**
    - Scout phase: ~8 min (dependency mapping, interface contracts, IMPL doc)
    - Agent execution: ~25 min (8 agents × ~5 min avg, 2 sequential waves = 15 min + 10 min)
    - Merge & verification: ~4 min
    - Total SAW time: ~37 min

    Sequential baseline: ~50 min (8 agents × ~6 min avg sequential time with context switching)
    Time savings: ~13 min (26% faster)

    Recommendation: Clear speedup. Coordination value also high — 8 files across 3 packages
    benefit from explicit interface contracts to prevent integration gaps.
