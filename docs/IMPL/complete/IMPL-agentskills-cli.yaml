interface_contracts:
    - name: SkillMetadata
      description: |
        Parsed representation of Agent Skill SKILL.md frontmatter. Contains
        required fields (name, description) and optional extension fields
        (triggers, agent-references, model, model-context, version).
      definition: |
        pub struct SkillMetadata {
            pub name: String,
            pub description: String,
            pub triggers: Option<Vec<String>>,
            pub agent_references: Option<Vec<String>>,
            pub model: Option<String>,
            pub model_context: Option<String>,
            pub version: Option<String>,
            pub unknown_fields: HashMap<String, serde_yaml::Value>,
        }

        impl SkillMetadata {
            pub fn from_path(path: &Path) -> Result<Self, Error>;
            pub fn from_str(content: &str) -> Result<Self, Error>;
        }
      location: src/models.rs
    - name: ValidationError
      description: |
        Represents a single validation error or warning. Contains error type,
        message, optional file location, and severity level (error vs warning).
      definition: |
        #[derive(Debug, Clone, PartialEq)]
        pub struct ValidationError {
            pub error_type: String,
            pub message: String,
            pub file: Option<PathBuf>,
            pub line: Option<usize>,
            pub severity: Severity,
        }

        #[derive(Debug, Clone, PartialEq)]
        pub enum Severity {
            Error,
            Warning,
        }
      location: src/error.rs
    - name: ValidationResult
      description: |
        Aggregates validation errors and warnings. Provides methods to check
        if validation passed (no errors) and to format output for CLI display.
      definition: |
        #[derive(Debug, Default)]
        pub struct ValidationResult {
            pub errors: Vec<ValidationError>,
            pub warnings: Vec<ValidationError>,
        }

        impl ValidationResult {
            pub fn new() -> Self;
            pub fn add_error(&mut self, error: ValidationError);
            pub fn add_warning(&mut self, warning: ValidationError);
            pub fn is_valid(&self) -> bool;
            pub fn format_output(&self) -> String;
        }
      location: src/error.rs
    - name: validate_skill
      description: |
        Main validation entry point. Runs base spec checks, extension validation,
        and progressive disclosure checks. Returns aggregated ValidationResult.
      definition: |
        pub fn validate_skill(path: &Path) -> Result<ValidationResult, Error> {
            let metadata = SkillMetadata::from_path(path)?;
            let mut result = ValidationResult::new();

            validate_base_spec(&metadata, &mut result);
            validate_extensions(&metadata, &mut result);
            validate_progressive_disclosure(path, &mut result)?;

            Ok(result)
        }
      location: src/validation/mod.rs
    - name: validate_base_spec
      description: |
        Checks that required fields (name, description) are present and non-empty.
        Verifies SKILL.md file exists.
      definition: |
        pub fn validate_base_spec(metadata: &SkillMetadata, result: &mut ValidationResult);
      location: src/validation/base_spec.rs
    - name: validate_extensions
      description: |
        Validates known extension fields (triggers format, agent-references format,
        model values). Warns on unknown fields without blocking (encourages innovation).
      definition: |
        pub fn validate_extensions(metadata: &SkillMetadata, result: &mut ValidationResult);
      location: src/validation/extensions.rs
    - name: validate_progressive_disclosure
      description: |
        Checks progressive disclosure patterns: SKILL.md length (<200 lines),
        references/ structure, inject-context script existence, dedup markers.
      definition: |
        pub fn validate_progressive_disclosure(skill_path: &Path, result: &mut ValidationResult) -> Result<(), Error>;
      location: src/validation/progressive_disclosure.rs
    - name: BloatAnalysis
      description: |
        Analysis result from scanning SKILL.md for upgrade opportunities.
        Identifies sections that should move to references/ and suggests
        trigger patterns.
      definition: |
        pub struct BloatAnalysis {
            pub total_lines: usize,
            pub suggested_splits: Vec<SplitSuggestion>,
            pub trigger_patterns: Vec<String>,
            pub needs_agent_references: bool,
        }

        pub struct SplitSuggestion {
            pub section_name: String,
            pub start_line: usize,
            pub end_line: usize,
            pub target_file: String,
        }
      location: src/upgrade/analyzer.rs
    - name: analyze_bloat
      description: |
        Semantic analysis of SKILL.md to detect bloat and suggest upgrades.
        Returns BloatAnalysis with split suggestions and trigger patterns.
      definition: |
        pub fn analyze_bloat(skill_path: &Path) -> Result<BloatAnalysis, Error>;
      location: src/upgrade/analyzer.rs
    - name: SplitResult
      description: |
        Result of splitting SKILL.md into core + references/. Contains new
        content for each file and list of created reference files.
      definition: |
        pub struct SplitResult {
            pub core_content: String,
            pub reference_files: HashMap<String, String>,
            pub triggers: Vec<String>,
        }
      location: src/upgrade/splitter.rs
    - name: split_content
      description: |
        Splits SKILL.md based on BloatAnalysis. Extracts sections to references/,
        adds dedup markers, generates triggers frontmatter.
      definition: |
        pub fn split_content(
            skill_path: &Path,
            analysis: &BloatAnalysis,
        ) -> Result<SplitResult, Error>;
      location: src/upgrade/splitter.rs
    - name: generate_inject_script
      description: |
        Generates portable bash script (scripts/inject-context) that injects
        references/ content into agent context before SKILL.md is delivered.
      definition: |
        pub fn generate_inject_script(
            skill_path: &Path,
            reference_files: &[String],
        ) -> Result<String, Error>;
      location: src/upgrade/generator.rs
    - name: UpgradeOptions
      description: |
        Configuration for upgrade command. Controls dry-run mode and
        agent-references generation.
      definition: |
        pub struct UpgradeOptions {
            pub dry_run: bool,
            pub with_agent_references: bool,
        }
      location: src/models.rs
    - name: upgrade_skill
      description: |
        Main upgrade entry point. Analyzes skill, splits content, generates
        inject script, writes files (or prints dry-run output).
      definition: |
        pub fn upgrade_skill(
            skill_path: &Path,
            options: &UpgradeOptions,
        ) -> Result<(), Error>;
      location: src/upgrade/mod.rs
