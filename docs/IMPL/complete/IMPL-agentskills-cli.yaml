pre_mortem:
    overall_risk: medium
    rows:
        - scenario: YAML frontmatter parsing edge cases (malformed YAML, non-string values, nested structures)
          likelihood: medium
          impact: high
          mitigation: |
            Agent B includes comprehensive unit tests for frontmatter parsing. Test cases:
            missing closing `---`, invalid YAML syntax, non-string field values,
            deeply nested structures. Use serde_yaml error handling, propagate errors,
            never use unwrap() on user input.
        - scenario: Progressive disclosure dedup marker detection fails for non-standard formats
          likelihood: low
          impact: medium
          mitigation: |
            Agent C uses exact string match `<!-- injected: references/X.md -->` for
            dedup markers. Document marker format in validation error messages.
            If exact match proves too brittle, agent can suggest regex-based detection
            in completion report, but start with simple exact match.
        - scenario: Upgrade splitter breaks markdown formatting (code blocks, lists, tables)
          likelihood: medium
          impact: medium
          mitigation: |
            Agent D tests with complex markdown fixtures (nested lists, fenced code
            blocks, tables). Use line-based splitting (preserve original formatting).
            Dry-run mode lets users preview changes before applying. Warn users to
            review output before committing.
        - scenario: Inject script generates non-portable bash (bashisms, non-POSIX features)
          likelihood: low
          impact: medium
          mitigation: |
            Agent D uses conservative bash subset (no bash 4+ features, no arrays).
            Test script template manually on bash 3.2 (macOS default). Stick to
            simple loops and variable substitution. Document that script requires
            bash (not sh/dash).
        - scenario: Cross-platform issues (Windows path handling, chmod +x on Windows)
          likelihood: medium
          impact: low
          mitigation: |
            Agent D uses `std::fs::set_permissions` with Unix-specific mode bits (0o755).
            On Windows, this is a no-op. Document that inject-context script is
            Unix-only. Lint command works cross-platform (pure Rust, no shell
            dependencies). Windows users can still validate, just not auto-upgrade.
        - scenario: Integration tests fail due to filesystem race conditions (parallel test execution)
          likelihood: low
          impact: medium
          mitigation: |
            Agent F uses `tempfile::TempDir` for isolated test fixtures. Each test
            gets unique temp directory that auto-cleans on drop. Cargo test runner
            handles parallelism safely with isolated temp dirs.
