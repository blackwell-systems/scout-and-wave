              ```rust
              #[derive(Parser)]
              #[command(name = "agentskills")]
              #[command(version, about = "Tool for validating and upgrading Agent Skills")]
              struct Cli {
                  #[command(subcommand)]
                  command: Commands,
              }

              #[derive(Subcommand)]
              enum Commands {
                  Lint(LintCommand),
                  Upgrade(UpgradeCommand),
              }
              ```
            - In main():
              * Parse args using `Cli::parse()`
              * Dispatch to `commands::lint::run()` or `commands::upgrade::run()`
              * Handle Result: if Err, print error to stderr and exit with code 1
              * Use `std::process::exit()` for explicit exit codes
            - Version info: clap derives from `env!("CARGO_PKG_VERSION")`

            Create `tests/integration_test.rs`:
