pre_mortem:
    overall_risk: low
    rows:
        - scenario: Agent B's Result[T] migration fails because error codes aren't available
          likelihood: low
          impact: medium
          mitigation: |
            Agent B runs in Wave 2, after Agent A completes. Agent A adds the error
            codes to pkg/result/codes.go in Wave 1, so they will be available when
            Agent B starts. The dependency is explicit: B.dependencies = [A].
        - scenario: Test coverage targets are not achieved after Agent C completes
          likelihood: low
          impact: low
          mitigation: |
            Coverage gaps are deterministic (identified via go tool cover -func). Each
            gap has a specific test case described in Agent C's task. If coverage does
            not increase, re-run coverage report and add more targeted test cases in
            a follow-up commit.
        - scenario: Agent B's Result[T] migration breaks existing callers outside pkg/retry
          likelihood: medium
          impact: high
          mitigation: |
            pkg/retry is an internal package used only by pkg/engine (E24 verification
            loop). The E24 implementation already uses result.Result for its own
            functions. Callers of BuildRetryAttempt and RetryLoop.Run will need updates
            in a follow-up wave (not in this IMPL scope). Add a Known Issue documenting
            this: "External callers of BuildRetryAttempt and RetryLoop.Run must be
            updated to handle result.Result[T] in a follow-up wave."
