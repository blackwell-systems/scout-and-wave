          task: |
            ## What to Implement

            Add execution rules E33-E34 to `protocol/execution-rules.md` in the
            scout-and-wave repo. These define automatic tier advancement and
            Planner re-engagement for Level C (full autonomous) execution.

            ## Content to Write

            Append two new execution rules after E32, following the exact style
            and format of existing rules:

            **E33: Automatic Tier Advancement (--auto mode)**
            - Trigger: All IMPLs in a tier reach "complete" and tier gate passes (E29)
            - Required Action: When `--auto` flag is active, orchestrator automatically
              advances to the next tier without human review gate. Run
              `sawtools freeze-contracts` (E30), update PROGRAM manifest state to
              next TIER_EXECUTING, and launch Scout agents for next tier (E31).
              If `--auto` is NOT active, pause for human review as normal.
            - Enforcement of P3: Tier N+1 still waits for tier gate to pass
            - Human gate override: PROGRAM_REVIEWED state (initial plan approval)
              is NEVER skipped, even in --auto mode. Only tier boundary gates are
              skipped on success.
            - Failure handling: If tier gate fails (E29), enter PROGRAM_BLOCKED
              regardless of --auto mode. Failures always surface to human.

            **E34: Planner Re-Engagement on Failure**
            - Trigger: Tier gate fails (E29) OR user explicitly requests re-plan
            - Required Action: Launch Planner agent with revision prompt containing:
              (a) current PROGRAM manifest
              (b) failure reason (which tier, which IMPL, what gate failed)
              (c) completion reports from all IMPLs in failed tier
              (d) instruction to revise program contracts or tier structure
              Planner produces revised PROGRAM manifest. Orchestrator validates (E16)
              and presents for human review (PROGRAM_REVIEWED). Execution does NOT
              resume automatically — human must approve revised plan.
            - Relationship to E8: Same-wave interface revision pattern, elevated to
              program scope
            - Non-destructive: Completed tiers are NOT re-run. Only the failed tier
              and subsequent tiers may be revised.

            Also update the Cross-References section at the bottom of the file to
            reference E33-E34.

            Update the version number in the file header (increment minor version).

            ## Verification Gate
            - File is valid markdown
            - E33-E34 sections exist with trigger, required action, and related rules
            - Cross-references section updated
            - Version number incremented

            ## Constraints
            - Do NOT modify any existing E1-E32 rules
            - Only APPEND new sections and update cross-references/version
            - Follow the exact formatting pattern of existing rules
            - Each rule must reference related P-invariants
            - E33 must specify that PROGRAM_REVIEWED is never skipped
