            ## What to Implement

            Create `pkg/engine/program_auto.go` and its test file — engine functions
            for automatic tier advancement and Planner re-engagement.

            ## Interfaces to Implement

            ```go
            func AdvanceTierAutomatically(manifest *PROGRAMManifest, completedTier int, repoPath string, autoMode bool) (*TierAdvanceResult, error)

            func ReplanProgram(opts ReplanProgramOpts) (*ReplanResult, error)
            ```

            Plus the result structs and opts struct from interface contracts.

            ## Implementation Details

            **AdvanceTierAutomatically:**
            1. Run RunTierGate(manifest, completedTier, repoPath) to verify tier completion
            2. If gate fails, return TierAdvanceResult with AdvancedToNext=false, RequiresReview=true
            3. If gate passes and autoMode=false, return RequiresReview=true (human gate)
            4. If gate passes and autoMode=true:
               a. Run FreezeContracts(manifest, completedTier, repoPath)
               b. If freeze fails, return errors (RequiresReview=true)
               c. If freeze succeeds, check if this was the final tier
               d. If final tier, set ProgramComplete=true, AdvancedToNext=false
               e. If not final tier, set AdvancedToNext=true, NextTier=completedTier+1
            5. Return complete TierAdvanceResult

            **ReplanProgram:**
            1. Read existing PROGRAM manifest from opts.ProgramManifestPath
            2. Construct revision prompt:
               - "You are re-engaging to revise this PROGRAM manifest."
               - "Reason: [opts.Reason]"
               - "Failed tier: [opts.FailedTier]" (if non-zero)
               - Include current manifest content
               - "Revise the program contracts or tier structure to address the failure."
               - "Do NOT modify completed tiers or frozen contracts."
            3. Launch Planner agent using the Agent SDK (placeholder for now — return
               mock result in tests)
            4. After Planner completes, read revised manifest
            5. Run ValidateProgram(revised manifest path)
            6. Return ReplanResult with validation status

