suitability_assessment: |
    Phase 4 completes the Program Layer with full autonomous execution (`--auto` mode)
    and automatic re-planning on failure. 6 deliverables decompose into 6 agents
    across 3 waves.

    **Suitability:**
    1. File decomposition: 6 agents with disjoint file ownership across 3 repos
    2. Investigation-first: None - all work builds on Phases 1-3 foundation
    3. Interface discoverability: All interfaces can be defined upfront
    4. Pre-implementation status: Phase 1-3 deliverables confirmed complete
    5. Parallelization value: Medium - 3 waves with dependencies, but high coordination value

    **Wave structure:**
    - Wave 1 (2 agents): Protocol docs (E33-E34 execution rules, replan command doc) - independent
    - Wave 2 (3 agents): SDK implementation (auto-advance engine function, mark-program-complete CLI, replan CLI) - depend on Wave 1 contracts
    - Wave 3 (1 agent): Orchestrator integration (saw-skill.md update for --auto mode)

    **Cross-repo coordination:**
    Protocol docs (scout-and-wave) define semantics. Go SDK (scout-and-wave-go)
    implements engine functions and CLI commands. No web app changes.

    **Time-to-value estimate:**
    - Scout phase: ~8 min (dependency mapping, interface contracts, IMPL doc)
    - Agent execution: ~24 min (6 agents × 4 min avg, 3 waves with wave overhead)
    - Merge & verification: ~6 min
    Total SAW time: ~38 min

    Sequential baseline: ~42 min (6 agents × 7 min avg sequential time)
    Time savings: ~4 min (10% faster)

    Recommendation: Marginal speed gains, but coordination value is high. The IMPL
    doc captures the full --auto mode and re-planning semantics as a reviewable
    artifact. Proceed.
