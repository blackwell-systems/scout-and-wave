interface_contracts:
    - name: AdvanceTierAutomatically
      description: |
        Engine function that implements automatic tier advancement logic for --auto mode.
        Checks tier gate success, freezes contracts, updates PROGRAM state, and returns
        whether to proceed to next tier or enter human review gate.
      definition: |
        // AdvanceTierAutomatically checks tier gate, freezes contracts, and advances
        // to next tier if --auto mode is active. Returns true if advanced, false if
        // human review required.
        func AdvanceTierAutomatically(manifest *PROGRAMManifest, completedTier int, repoPath string, autoMode bool) (*TierAdvanceResult, error)
      location: pkg/engine/program_auto.go
    - name: TierAdvanceResult
      description: |
        Result struct returned by AdvanceTierAutomatically. Contains tier gate status,
        contract freeze status, decision on whether to advance, and any errors.
      definition: |
        type TierAdvanceResult struct {
          TierNumber       int                         `json:"tier_number"`
          GateResult       *TierGateResult             `json:"gate_result"`
          FreezeResult     *FreezeContractsResult      `json:"freeze_result,omitempty"`
          AdvancedToNext   bool                        `json:"advanced_to_next"`
          RequiresReview   bool                        `json:"requires_review"`
          NextTier         int                         `json:"next_tier,omitempty"`
          ProgramComplete  bool                        `json:"program_complete"`
          Errors           []string                    `json:"errors,omitempty"`
        }
      location: pkg/engine/program_auto.go
    - name: ReplanProgramOpts
      description: |
        Options struct for re-engaging the Planner agent to revise a PROGRAM manifest.
        Used when tier gate fails or user explicitly requests re-planning.
      definition: |
        type ReplanProgramOpts struct {
          ProgramManifestPath string // path to existing PROGRAM manifest to revise
          Reason              string // why re-planning was triggered
          FailedTier          int    // tier number that failed (0 if user-initiated)
          PlannerModel        string // optional: model override for Planner agent
        }
      location: pkg/engine/program_auto.go
    - name: ReplanProgram
      description: |
        Engine function that re-engages the Planner agent to revise a PROGRAM manifest.
        Reads current manifest, constructs revision prompt with failure context, launches
        Planner, and returns updated manifest path.
      definition: |
        // ReplanProgram launches Planner agent to revise PROGRAM manifest based on
        // execution feedback (tier gate failure, blocked IMPL, etc.).
        func ReplanProgram(opts ReplanProgramOpts) (*ReplanResult, error)
      location: pkg/engine/program_auto.go - cmd/saw/program_replan_cmd.go
    - name: ReplanResult
      description: |
        Result struct returned by ReplanProgram. Contains path to revised manifest,
        validation status, and Planner agent metadata.
      definition: |
        type ReplanResult struct {
          RevisedManifestPath string `json:"revised_manifest_path"`
          ValidationPassed    bool   `json:"validation_passed"`
          ChangesSummary      string `json:"changes_summary,omitempty"`
          PlannerAgentID      string `json:"planner_agent_id"`
          Errors              []string `json:"errors,omitempty"`
        }
      location: pkg/engine/program_auto.go
