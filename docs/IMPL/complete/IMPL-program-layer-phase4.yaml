            2. **Update the sawtools Commands list:**
            - Add: `sawtools mark-program-complete` — mark PROGRAM manifest complete and update CONTEXT.md
            - (program-replan is orchestrator-only, not a sawtools command)

            3. **Update `/saw program execute` section (Step 3e: Tier Boundary Review):**
            Replace "Pause for human review (unless --auto active, Phase 4)" with:
            ```
            - If --auto flag is active:
              - Run AdvanceTierAutomatically() to check gate, freeze contracts, advance
              - If gate passed, automatically proceed to next tier (no human review)
              - If gate failed, enter PROGRAM_BLOCKED and surface failure
            - If --auto flag is NOT active:
