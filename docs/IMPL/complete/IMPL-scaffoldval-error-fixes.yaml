          task: |
            ## What to implement

            Fix three errors in pkg/scaffoldval/validator.go and update tests
            in pkg/scaffoldval/validator_test.go. All changes are in these two
            files only.

            ### Error 1: findRepoRoot bad fallback (lines 110-123)

            Current code returns `filepath.Dir(startDir)` when no go.mod is found.
            Change signature from `func findRepoRoot(startDir string) string` to
            `func findRepoRoot(startDir string) (string, error)`.

            When no go.mod is found (reaching filesystem root), return
            `("", fmt.Errorf("could not locate go.mod above %s", startDir))`.

            Find the current function starting at this exact text:
            ```go
            // findRepoRoot walks upward from startDir looking for go.mod.
            // Returns the directory containing go.mod if found.
            // Falls back to filepath.Dir(startDir) if go.mod is not found.
            func findRepoRoot(startDir string) string {
            ```

            Replace the entire function with:
            ```go
            // findRepoRoot walks upward from startDir looking for go.mod.
            // Returns the directory containing go.mod, or an error if not found.
            func findRepoRoot(startDir string) (string, error) {
            	dir := startDir
            	for {
            		if _, err := os.Stat(filepath.Join(dir, "go.mod")); err == nil {
            			return dir, nil
            		}
            		parent := filepath.Dir(dir)
            		if parent == dir {
            			return "", fmt.Errorf("could not locate go.mod above %s", startDir)
            		}
            		dir = parent
            	}
            }
            ```

            Update the caller in ValidateScaffold. Find this exact text:
            ```go
            	root := repoRoot
            	if root == "" {
            		root = findRepoRoot(filepath.Dir(implPath))
            	}

            	imports := importsFromAST(astFile)
            	missingImports := checkImports(imports, root)
            ```

            Replace with:
            ```go
            	root := repoRoot
            	if root == "" {
            		var err error
            		root, err = findRepoRoot(filepath.Dir(implPath))
            		if err != nil {
            			vr.Imports.Status = "SKIP"
            			vr.Imports.Errors = []string{err.Error()}
            			// Continue to type references and build steps
            		}
            	}

            	if vr.Imports.Status != "SKIP" {
            		imports := importsFromAST(astFile)
            		missingImports := checkImports(imports, root)

            		if len(missingImports) > 0 {
            			vr.Imports.Status = "FAIL"
            			vr.Imports.Errors = missingImports
            			vr.Imports.Fixes = []string{fmt.Sprintf("Add missing imports: %v", missingImports)}
            			vr.Imports.AutoFixable = true
            		} else {
            			vr.Imports.Status = "PASS"
            		}
            	}
            ```

            ### Error 2: parseGoMod silent failure (lines 171-212)

            Change signature from `func parseGoMod(goModPath string) (string, []string)`
            to `func parseGoMod(goModPath string) (string, []string, error)`.

            Find this exact text:
            ```go
            func parseGoMod(goModPath string) (string, []string) {
            	data, err := os.ReadFile(goModPath)
            	if err != nil {
            		return "", nil
            	}
            ```

            Replace the signature and error handling:
            ```go
            func parseGoMod(goModPath string) (string, []string, error) {
            	data, err := os.ReadFile(goModPath)
            	if err != nil {
            		return "", nil, fmt.Errorf("reading go.mod: %w", err)
            	}
            ```

            At the end of parseGoMod (line 211), change:
            ```go
            	return moduleName, requires
            ```
            to:
            ```go
            	return moduleName, requires, nil
            ```

            Update the caller checkImports. Find this exact text:
            ```go
            func checkImports(imports []string, repoRoot string) []string {
            	moduleName, requires := parseGoMod(filepath.Join(repoRoot, "go.mod"))
            ```

            Change checkImports signature to return an error and propagate:
            ```go
            func checkImports(imports []string, repoRoot string) ([]string, error) {
            	moduleName, requires, err := parseGoMod(filepath.Join(repoRoot, "go.mod"))
            	if err != nil {
            		return nil, fmt.Errorf("parsing go.mod: %w", err)
            	}
            ```

            The rest of checkImports stays the same, but the final return changes from
            `return missing` to `return missing, nil`.

            Then update the call site in ValidateScaffold where checkImports is called.
            The block (from Error 1 fix above) that calls checkImports needs to handle
            the new error return:
            ```go
            	if vr.Imports.Status != "SKIP" {
            		imports := importsFromAST(astFile)
            		missingImports, err := checkImports(imports, root)
            		if err != nil {
            			vr.Imports.Status = "SKIP"
            			vr.Imports.Errors = []string{err.Error()}
            		} else if len(missingImports) > 0 {
            			vr.Imports.Status = "FAIL"
            			vr.Imports.Errors = missingImports
            			vr.Imports.Fixes = []string{fmt.Sprintf("Add missing imports: %v", missingImports)}
            			vr.Imports.AutoFixable = true
            		} else {
            			vr.Imports.Status = "PASS"
            		}
            	}
            ```

