          task: |
            ## Hook Script: validate_agent_completion

            Create `implementations/claude-code/hooks/validate_agent_completion` (new bash script).

            **What to implement:**

            A SubagentStop lifecycle hook that validates SAW agent protocol compliance
            before allowing completion. The script reads JSON from stdin (see interface
            contract for schema), parses the `[SAW:...]` tag from `agent_description`,
            and runs validation checks based on agent type.

            **Validation sequence (run in order, short-circuit on failure):**

            1. **Parse SAW tag** from `agent_description` field. If no `[SAW:...]` tag,
               exit 0 immediately (not a SAW agent).

            2. **Find IMPL doc** — check `.saw-state/active-impl` for the path. If not
               found, try extracting from `agent_description`. If still not found and
               agent has a SAW tag, exit 2 with "Cannot locate IMPL doc".

            3. **I1 ownership verification** (wave agents only): Run
               `git diff --name-only` in the worktree. Compare changed files against
               the agent's file ownership from `.saw-ownership.json`. Any unowned
               modified file = exit 2 with "I1 violation: agent modified unowned
               file(s): <list>".

            4. **I5 commit verification** (wave agents only): Check that the worktree
               branch has at least 1 commit ahead of the merge base. If zero commits
               but a completion report exists in the IMPL doc = exit 2 with
               "I5 violation: completion report written but no commits found".

            5. **Protocol report validation** (varies by agent type):
               - `[SAW:wave*:agent-*]`: Verify agent ID appears in IMPL doc
                 `completion_reports:` section. Use `sawtools check-completion` if
                 available, otherwise grep for the agent ID in completion_reports.
               - `[SAW:critic:*]`: Verify IMPL doc has non-empty `critic_report:`
                 field. Check it has `verdict`, `agents_reviewed`, and `issues` keys
                 using yq or grep.
               - `[SAW:scout]` or `[SAW:scout:*]`: Verify IMPL doc exists at
                 expected path and passes `sawtools validate`.
               - `[SAW:scaffold:*]`: Verify all scaffold entries have
                 `status: committed (...)` using yq or grep.
               - Other SAW tags: exit 0 (pass through).

            Steps 6-7 below are in the SEPARATE `emit_agent_completion` script
            (runs as `async: true` hook — never blocks):

            6. **Journal archival** (all SAW agents): Check for tool journal at
               `.saw-state/journals/wave{N}/agent-{ID}/`. If the journal directory
               doesn't exist but a `.saw-journal.jsonl` exists in the worktree,
               copy it to the expected location. Log a warning if copy fails.

            7. **Observability event emission** (all SAW agents): Emit a structured
               JSON event to stdout (see interface contract for schema). Include
               agent_id, wave, status, files_changed, validation results, and
               timestamp. This is consumed by claudewatch hooks and the web app
               SSE system.

            NOTE: `validate_agent_completion` (steps 1-5) exits BEFORE steps 6-7
            run. The async hook fires independently. This ensures validation never
            waits on journal I/O or network emission.

            **Pattern reference:** Follow the style of `validate_agent_launch` in the
            same directory. Use `set -euo pipefail`, `jq` for JSON parsing, `yq` with
            grep fallback for YAML, and `sawtools` commands with graceful degradation
            if not on PATH.

            **Exit code convention:** Exit 0 = pass, Exit 2 = block. Never exit 1
            (reserved for non-blocking errors in PostToolUse).

            **Performance:** Must be fast. Use compiled sawtools binaries, avoid
            expensive operations. Non-SAW agents must exit 0 within milliseconds.

            **Tests:** Include manual test commands in the script header comments
            (same pattern as validate_agent_launch). Cover: non-SAW agent passthrough,
            wave agent with completion report, wave agent missing completion report,
            critic agent with valid report, scaffold agent with uncommitted scaffold.

            **Verification gate:**
            ```
            bash -n implementations/claude-code/hooks/validate_agent_completion
            ```
            Plus manual test with echo piped input.

            **Constraints:**
            - Do not modify any other file
            - Script must be executable (chmod +x)
            - Use exit 2 to block, exit 0 to allow
            - Graceful degradation when sawtools/yq not available
          files:
            - implementations/claude-code/hooks/validate_agent_completion
            - implementations/claude-code/hooks/emit_agent_completion
