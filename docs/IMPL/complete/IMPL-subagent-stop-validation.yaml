interface_contracts:
    - name: validate_agent_completion hook stdin JSON
      description: |
        The SubagentStop lifecycle hook receives JSON on stdin from Claude Code
        describing the agent session that just completed.
      definition: |
        {
          "session_id": "string",
          "agent_name": "string",
          "agent_description": "[SAW:wave1:agent-A] implement cache layer",
          "exit_reason": "completed"
        }
      location: implementations/claude-code/hooks/validate_agent_completion
    - name: validate_agent_completion exit codes
      description: |
        Exit code semantics for the SubagentStop hook, consistent with
        existing hook conventions.
      definition: |
        Exit 0: Pass (agent fulfilled obligations or is not a SAW agent)
        Exit 2: Block (agent has unfulfilled protocol obligations)
        Stderr: Human-readable error message explaining what is missing
        Stdout: JSON observability event on success (non-blocking)
      location: implementations/claude-code/hooks/validate_agent_completion
    - name: sawtools check-completion
      description: |
        New CLI command that verifies a specific agent's completion report
        exists in the IMPL doc and has valid structure. Used by the hook
        script for wave agent validation.
      definition: |
        sawtools check-completion <manifest-path> --agent <ID>
        Returns JSON:
        {
          "found": true,
          "agent_id": "A",
          "status": "complete",
          "has_commit": true,
          "files_changed": ["pkg/foo/bar.go"]
        }
        Exit 0 if found with status "complete" or "partial".
        Exit 1 if not found or status is empty.
      location: cmd/saw/check_completion_cmd.go
    - name: observability event schema
      description: |
        Structured JSON event emitted to stdout on successful agent
        completion, consumable by claudewatch and web app SSE.
      definition: |
        {
          "event": "agent_complete",
          "agent_id": "A",
          "wave": 1,
          "agent_type": "wave",
          "status": "complete",
          "files_changed": ["file1.go", "file2.go"],
          "validation_checks": {
            "i1_ownership": "pass",
            "i5_commit": "pass",
            "protocol_report": "pass",
            "journal_archived": true
          },
          "duration_ms": 45000,
          "timestamp": "2026-03-23T12:00:00Z"
        }
      location: implementations/claude-code/hooks/validate_agent_completion
