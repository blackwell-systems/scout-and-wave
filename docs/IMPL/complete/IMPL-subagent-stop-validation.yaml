pre_mortem:
    overall_risk: low
    rows:
        - scenario: SubagentStop event schema differs from documented format
          likelihood: low
          impact: high
          mitigation: |
            Hook script uses defensive JSON parsing with jq defaults.
            All field extractions use `// empty` fallback. Non-SAW agents
            pass through immediately regardless of schema shape.
        - scenario: sawtools check-completion not on PATH when hook runs
          likelihood: medium
          impact: low
          mitigation: |
            Hook degrades gracefully — falls back to grep-based detection
            of completion report in IMPL YAML. Same pattern as existing
            validate_agent_launch hook.
        - scenario: I1 ownership check false positive in worktrees with uncommitted scaffold changes
          likelihood: low
          impact: medium
          mitigation: |
            Hook only checks I1 for wave agents (not scaffold agents).
            Scaffold agents have their own validation path that checks
            scaffold status, not file ownership.
        - scenario: Journal archival fails due to permissions or missing directory
          likelihood: medium
          impact: low
          mitigation: |
            Journal archival is explicitly non-blocking (step 6).
            Failure is logged as a warning but does not block agent
            completion. The journal can be recovered from the worktree
            before cleanup.
        - scenario: install.sh SubagentStop key not recognized by older Claude Code versions
          likelihood: low
          impact: medium
          mitigation: |
            SubagentStop is a standard Claude Code lifecycle event.
            If not supported, the hook simply never fires — no breakage.
            Existing hooks continue to work.
