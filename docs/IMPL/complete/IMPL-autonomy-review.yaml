interface_contracts:
    - name: ParseLevel
      description: |
        Validates and parses an autonomy level string. Currently returns (Level, error).
        Must be updated to return Result[ParseLevelData] for protocol conformance.
      definition: |
        // Before:
        func ParseLevel(s string) (Level, error)

        // After:
        type ParseLevelData struct {
            Level Level
        }
        func ParseLevel(s string) result.Result[ParseLevelData]
      location: pkg/autonomy/autonomy.go
    - name: containsSubstring
      description: |
        Test helper that reimplements strings.Contains. Used only in
        TestSaveConfig_PreservesOtherKeys. Should be replaced with strings.Contains.
      definition: |
        // Remove both helpers and replace usage with:
        import "strings"
        if !strings.Contains(content, "other_section") { ... }
      location: pkg/autonomy/config_test.go
    - name: MaxQueueDepth
      description: |
        Config field that is never used in production code. Only appears in test
        fixtures. Agent B must determine if this field has a planned future use
        (check IMPL-autonomy-layer.yaml) or should be removed as dead code.
      definition: |
        // If no future use, remove from Config struct:
        MaxQueueDepth  int   `json:"max_queue_depth" yaml:"max_queue_depth"`
      location: pkg/autonomy/config.go
waves:
    - number: 1
      agents:
        - id: A
          task: |
            **Objective**: Update ParseLevel to return Result[ParseLevelData].

            **Files to modify**:
            - pkg/autonomy/autonomy.go (lines 79-88)
            - pkg/autonomy/autonomy_test.go (lines 93-125)
            - cmd/sawtools/daemon_cmd.go (lines 44-48)

            **Changes**:

            1. Update ParseLevel signature and implementation:
               ```go
               // Add new data type before ParseLevel function:
               type ParseLevelData struct {
                   Level Level
               }

               // Change function signature from:
               func ParseLevel(s string) (Level, error)

               // To:
               func ParseLevel(s string) result.Result[ParseLevelData]

               // Update implementation to use result.NewSuccess and result.NewFailure:
               func ParseLevel(s string) result.Result[ParseLevelData] {
                   switch Level(s) {
                   case LevelGated, LevelSupervised, LevelAutonomous:
                       return result.NewSuccess(ParseLevelData{Level: Level(s)})
                   default:
                       return result.NewFailure[ParseLevelData]([]result.SAWError{
                           result.NewFatal("AUTONOMY_INVALID_LEVEL",
                               fmt.Sprintf("unknown level %q (valid: gated, supervised, autonomous)", s)),
                       })
                   }
               }
               ```

            3. Update ParseLevel callers:
               - autonomy.go EffectiveLevel (line 72): change `if l, err := ParseLevel(overrideLevel); err == nil`
                 to `if r := ParseLevel(overrideLevel); r.IsSuccess()` and access level via `r.GetData().Level`
               - cmd/sawtools/daemon_cmd.go (lines 44-48): change error handling from:
                 ```go
                 lvl, err := autonomy.ParseLevel(autonomyLevel)
                 if err != nil {
                     return fmt.Errorf("daemon: invalid autonomy level: %w", err)
                 }
                 cfg.Level = lvl
                 ```
                 to:
                 ```go
                 r := autonomy.ParseLevel(autonomyLevel)
                 if r.IsFatal() {
                     if len(r.Errors) > 0 {
                         return fmt.Errorf("daemon: invalid autonomy level: %s", r.Errors[0].Message)
                     }
                     return fmt.Errorf("daemon: invalid autonomy level")
                 }
                 cfg.Level = r.GetData().Level
                 ```

            4. Update ParseLevel tests:
               - TestParseLevel_Valid: check r.IsSuccess() instead of err == nil, use r.GetData().Level
               - TestParseLevel_Invalid: check r.IsFatal() instead of err != nil
               - Add test coverage for error code: verify Errors[0].Code == "AUTONOMY_INVALID_LEVEL"

            **Interface contracts**: ParseLevel contract defined above.

            **Quality gate**:
            ```bash
            go build ./pkg/autonomy/... && go build ./cmd/sawtools/...
            go vet ./pkg/autonomy/...
            go test -v -count=1 -run "TestParseLevel|TestEffectiveLevel|TestShouldAutoApprove" ./pkg/autonomy/...
            ```

            **Verification**: After changes, run `go test ./pkg/autonomy/...` to verify all tests pass.
            Build cmd/sawtools to ensure daemon_cmd.go compiles correctly.
          files:
            - pkg/autonomy/autonomy.go
            - pkg/autonomy/autonomy_test.go
            - cmd/sawtools/daemon_cmd.go
        - id: B
          task: |
            **Objective**: Investigate MaxQueueDepth usage and either document its purpose
            or mark it deprecated. Improve LoadConfig/SaveConfig godoc accuracy.

            **Files to modify**:
            - pkg/autonomy/config.go (lines 27-28, 32-37, 79-129)

            **Changes**:

            1. Audit MaxQueueDepth usage:
               - Current usage: only in test fixtures (config_test.go), never in production code
               - grep shows it's defined in Config struct but only daemon.go line 320 references
                 MaxAutoRetries (not MaxQueueDepth)
               - Check docs/IMPL/complete/IMPL-autonomy-layer.yaml for planned usage
               - If no planned usage documented, add godoc comment:
                 ```go
                 MaxQueueDepth  int   `json:"max_queue_depth" yaml:"max_queue_depth"` // Reserved for future queue depth limiting; not currently enforced
                 ```
               - If you determine it should be removed entirely, delete the field and update
                 DefaultConfig() to remove the MaxQueueDepth initialization

            2. Fix LoadConfig godoc (lines 28-31):
               - Current godoc is misleading (doesn't mention Result[T] return type)
               - Update godoc to accurately describe Result[LoadConfigData] return type:
                 ```go
                 // LoadConfig loads autonomy configuration from saw.config.json in repoPath.
                 // Returns Result[LoadConfigData] with success when file is found and parsed,
                 // or with WasDefault=true when file is missing or autonomy section is absent.
                 // Returns fatal result on JSON parse errors.
                 ```

            3. Improve SaveConfig godoc (line 79):
               - Current godoc is adequate but could clarify the merge behavior:
                 ```go
                 // SaveConfig writes cfg to the autonomy section of saw.config.json in repoPath.
                 // If the file exists, other top-level keys (providers, repos, agent, etc.) are
                 // preserved. If the file does not exist, it is created with only the autonomy key.
                 // Returns Result[SaveConfigData] with ConfigPath and BytesWritten on success.
                 ```

            4. Improve error messages:
               - Lines 45, 52, 68, 92, 98, 107, 115, 122: error messages don't include file path
               - Change `fmt.Sprintf("failed to read config file: %v", err)` to
                 `fmt.Sprintf("failed to read %s: %v", path, err)` for better debuggability
               - Apply same pattern to all error messages in both LoadConfig and SaveConfig

            **Interface contracts**: MaxQueueDepth field documentation, LoadConfig/SaveConfig
            godoc improvements.

            **Quality gate**:
            ```bash
            go build ./pkg/autonomy/...
            go vet ./pkg/autonomy/...
            go test -v -count=1 -run "TestLoadConfig|TestSaveConfig" ./pkg/autonomy/...
            go doc github.com/blackwell-systems/scout-and-wave-go/pkg/autonomy LoadConfig
            ```

            **Verification**: Run `go doc` to confirm godoc is accurate. Check that error
            messages now include file paths for easier debugging.
          files:
            - pkg/autonomy/config.go
        - id: C
          task: |
            **Objective**: Replace custom string helpers with strings.Contains and improve
            test coverage for SaveConfig error paths.

            **Files to modify**:
            - pkg/autonomy/config_test.go (lines 170-186)

            **Changes**:

            1. Replace containsSubstring/findSubstring with strings.Contains:
               - Add `"strings"` to the existing import block (lines 3-7)
               - Line 170: replace `if !containsSubstring(content, "other_section")` with
                 `if !strings.Contains(content, "other_section")`
               - Lines 175-186: delete both helper functions entirely
               - Rationale: containsSubstring reimplements stdlib functionality with a
                 manual loop. strings.Contains is clearer, faster, and requires no maintenance.

            2. Add error path coverage for SaveConfig:
               - Current coverage: 72.2% (vs 87.5% for LoadConfig)
               - Missing coverage: write permission error (line 119)
               - Add test case TestSaveConfig_WritePermissionError:
                 ```go
                 func TestSaveConfig_WritePermissionError(t *testing.T) {
                     dir := t.TempDir()
                     path := filepath.Join(dir, "saw.config.json")

                     // Create file as read-only to trigger write error
                     if err := os.WriteFile(path, []byte("{}"), 0444); err != nil {
                         t.Fatal(err)
                     }

                     cfg := Config{Level: LevelGated, MaxAutoRetries: 2, MaxQueueDepth: 10}
                     sr := SaveConfig(dir, cfg)
                     if !sr.IsFatal() {
                         t.Fatalf("expected fatal result when file is read-only, got success")
                     }
                     if len(sr.Errors) == 0 || sr.Errors[0].Code != "CONFIG_SAVE_FAILED" {
                         t.Errorf("expected CONFIG_SAVE_FAILED error code")
                     }
                 }
                 ```
               - Note: testing the "invalid config marshal" path (line 105) is not feasible
                 without reflection hacks because Config is a simple struct with all
                 marshal-safe fields. Add a comment in config.go above line 104 documenting this.

            3. Verify test hermiticity:
               - All tests use t.TempDir(), which is correct
               - No hardcoded paths or reliance on external state
               - Run tests with -count=10 to verify no flakes

            **Interface contracts**: strings.Contains replaces containsSubstring,
            TestSaveConfig_WritePermissionError added.

            **Quality gate**:
            ```bash
            go build ./pkg/autonomy/...
            go vet ./pkg/autonomy/...
            go test -v -count=10 ./pkg/autonomy/...
            go test -coverprofile=/tmp/autonomy-coverage-new.out ./pkg/autonomy/...
            go tool cover -func=/tmp/autonomy-coverage-new.out | grep "SaveConfig"
            ```

            **Verification**: Confirm SaveConfig coverage increases from 72.2% to ≥80%.
            Confirm containsSubstring and findSubstring no longer exist in config_test.go.
            Verify grep -n "containsSubstring" returns zero matches.
          files:
            - pkg/autonomy/config_test.go
