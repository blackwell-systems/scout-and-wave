        - scenario: E11 hash comparison fails silently, falls back to blocking merge
          likelihood: low
          impact: medium
          mitigation: Add explicit error logging when hash computation fails; add test case for hash failure path
        - scenario: --skip-merge used on wave that wasn't actually merged yet (user error)
          likelihood: medium
          impact: high
          mitigation: Add safety check - if worktrees exist, emit warning; verify branch merge status before resuming
        - scenario: Manual merge creates semantic conflict that passes VerifyBuild
          likelihood: low
          impact: high
          mitigation: Document in E11a that manual merge is only for identical edits; VerifyBuild runs full test suite to catch semantic issues
        - scenario: Integration validation (E25/E26) doesn't run after manual merge
          likelihood: medium
          impact: high
          mitigation: --skip-merge MUST preserve step 5.5 (RunPostMergeGates) which includes integration validation; add test case
        - scenario: Backward compatibility break - existing finalize-wave callers break
          likelihood: low
          impact: medium
          mitigation: New --skip-merge flag is opt-in (default false); FinalizeWaveOpts.SkipMerge defaults to false; no behavior change for existing code
        - scenario: Cross-repo waves don't handle --skip-merge correctly
          likelihood: medium
          impact: medium
          mitigation: CLI applies --skip-merge to all repos; synthetic MergeResult per repo; test with multi-repo IMPL
        - scenario: E37 enforcement too strict - blocks legitimate workflows
