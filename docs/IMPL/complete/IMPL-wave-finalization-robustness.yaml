          task: |
            ## P6: Critic action:new Awareness (False Positive Fix)

            **Objective:** Prevent critic from flagging "file does not exist" and "symbol does not exist"
            errors for files marked `action: new` in file_ownership.

            **Problem:** Critic validation produces false positives when agent briefs reference files
            or symbols that will be created by the agent. Example from wave-finalization-robustness:

            ```
            Agent C: ISSUES
            - ERROR: Function newDetectIntegrationGapsCmd must be registered in main.go,
              but main.go does not contain this command registration
              (File will be created: action: new)
            ```

            The file `detect_integration_gaps_cmd.go` is marked `action: new`, so the function
            `newDetectIntegrationGapsCmd` WILL be created by Agent C. Critic should not flag this
            as an error.

            **Desired behavior:**
            - For files with `action: new`: Skip "file does not exist" checks (expected)
            - For symbols in `action: new` files: Skip "symbol does not exist" checks (will be created)
            - For external dependencies: STILL enforce existence checks (must exist before agent runs)

            **Implementation:**

            **IMPORTANT NOTE:** The current `critic.go` file contains only type definitions (CriticResult,
            AgentCriticReview, CriticIssue). There is NO validation logic implemented yet - the file
            is just structs and helper functions (WriteCriticReview, GetCriticReview).

            This task defines the VALIDATION LOGIC that must be added when a critic agent is implemented.
            You are NOT implementing the critic agent itself - you are adding HELPER FUNCTIONS that
            future critic implementations can use.

            1. Add helper function to check if a file is marked action:new:

            ```go
            // IsNewFile returns true if the file is marked action:new in file_ownership.
            // Used by critic validation to skip existence checks for files that will be created.
            func IsNewFile(manifest *IMPLManifest, filePath string) bool {
                for _, fo := range manifest.FileOwnership {
                    if fo.File == filePath {
                        return fo.Action == "new"
                    }
                }
                return false
            }
            ```

            2. Add helper function to check if a symbol is in an action:new file:

            ```go
            // IsSymbolInNewFile returns true if the symbol's defining file is marked action:new.
            // Used by critic validation to skip existence checks for symbols that will be created.
            func IsSymbolInNewFile(manifest *IMPLManifest, symbolFile string) bool {
                return IsNewFile(manifest, symbolFile)
            }
            ```

            3. Add helper function to get agent's action:new files:

            ```go
            // GetAgentNewFiles returns all files owned by an agent marked action:new.
            // Used by critic validation to understand which files/symbols agent will create.
            func GetAgentNewFiles(manifest *IMPLManifest, agentID string) []string {
                var newFiles []string
                for _, fo := range manifest.FileOwnership {
                    if fo.Agent == agentID && fo.Action == "new" {
                        newFiles = append(newFiles, fo.File)
                    }
                }
                return newFiles
            }
            ```

            4. Add validation guidance in godoc comment at top of critic.go:

            ```go
            // Package protocol provides critic validation types and helpers.
            //
            // Critic Validation Rules (for future critic agent implementations):
            //
            // 1. File Existence Checks:
            //    - If file is in file_ownership with action:new, skip "file does not exist" error
            //    - If file is in file_ownership with action:modify, enforce existence check
            //    - If file is NOT in file_ownership (external), enforce existence check
            //
            // 2. Symbol/Function Existence Checks:
            //    - If symbol is defined in a file with action:new, skip "symbol does not exist" error
            //    - If symbol is in existing file (action:modify or external), enforce existence check
            //    - Use GetAgentNewFiles() to determine which symbols agent will create
            //
            // 3. Cross-File References:
            //    - If reference is to external file (not in file_ownership), enforce existence
            //    - If reference is to same-wave agent's file, defer (coordination, not verification)
            //
            // Use IsNewFile() and IsSymbolInNewFile() helpers to implement these rules.
            ```

            5. Add test file: pkg/protocol/critic_test.go

            ```go
            package protocol

            import (
                "testing"
            )

            func TestIsNewFile(t *testing.T) {
                manifest := &IMPLManifest{
                    FileOwnership: []FileOwnershipEntry{
                        {File: "pkg/new.go", Agent: "A", Action: "new"},
                        {File: "pkg/existing.go", Agent: "B", Action: "modify"},
                    },
                }

                if !IsNewFile(manifest, "pkg/new.go") {
                    t.Error("expected pkg/new.go to be marked as new")
                }

                if IsNewFile(manifest, "pkg/existing.go") {
                    t.Error("expected pkg/existing.go to NOT be marked as new")
                }

                if IsNewFile(manifest, "pkg/missing.go") {
                    t.Error("expected missing file to NOT be marked as new")
                }
            }

            func TestGetAgentNewFiles(t *testing.T) {
                manifest := &IMPLManifest{
                    FileOwnership: []FileOwnershipEntry{
                        {File: "pkg/new1.go", Agent: "A", Action: "new"},
                        {File: "pkg/new2.go", Agent: "A", Action: "new"},
                        {File: "pkg/existing.go", Agent: "A", Action: "modify"},
                        {File: "pkg/other.go", Agent: "B", Action: "new"},
                    },
                }

                newFiles := GetAgentNewFiles(manifest, "A")
                if len(newFiles) != 2 {
                    t.Errorf("expected 2 new files for agent A, got %d", len(newFiles))
                }
            }
            ```

            **Constraints:**
            - Do NOT implement full critic validation logic (out of scope - that's a future agent)
            - Only add HELPER FUNCTIONS that critic implementations can use
            - Maintain backward compatibility: existing CriticResult/AgentCriticReview structs unchanged
            - Add godoc comments explaining validation rules for future implementers

