            ## E11 Enhancement: Hash-Based Identical Edit Detection

            **Objective:** Enhance PredictConflictsFromReports to allow identical edits across agents.

            **Current behavior:** E11 blocks merge when a file appears in multiple agents' completion reports,
            even if the edits are identical (auto-resolvable by git octopus merge).

            **Desired behavior:** Compare file content hashes between agent branches. If all agents produced
            identical final content for a file, allow the merge (no conflict). Only block if hashes differ.

            **Implementation:**

            1. In PredictConflictsFromReports (pkg/protocol/conflict_predict.go):
               - After detecting file overlap (line 54: len(agents) > 1), add hash comparison step
               - For each overlapping file, read content from each agent's branch worktree
               - Compute SHA256 hash of file content
               - If all hashes match: skip adding to conflicts list (identical edits are safe)
               - If hashes differ: add to conflicts list (real conflict)

            2. Add helper function:
               ```go
               func computeFileHashInBranch(repoPath, branchName, relFile string) (string, error) {
                   // Use git show {branch}:{file} to read content without checking out
                   // Compute SHA256 hash of content
                   // Return hex-encoded hash
               }
               ```

            3. Update error message format when blocking:
               - Old: "E11 conflict prediction: pkg/file.go (agents: [D F])"
               - New: "E11 conflict prediction: pkg/file.go has differing edits (agents: [D F])"

            4. Add test cases in conflict_predict_test.go:
               - TestPredictConflictsFromReports_IdenticalEditsAllowed
               - TestPredictConflictsFromReports_DifferingEditsBlocked

            **Constraints:**
            - Do NOT change function signature of PredictConflictsFromReports
            - Hash comparison requires manifest.FeatureSlug to construct branch names
