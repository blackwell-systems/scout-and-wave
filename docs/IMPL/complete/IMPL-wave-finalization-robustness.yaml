            3. Command logic:
               ```go
               func newDetectIntegrationGapsCmd() *cobra.Command {
                   var waveNum int
                   var repoDir string

                   cmd := &cobra.Command{
                       Use:   "detect-integration-gaps <manifest-path>",
                       Short: "Detect unconnected exports and wiring gaps (E25/E26/E35)",
                       Args:  cobra.ExactArgs(1),
                       RunE: func(cmd *cobra.Command, args []string) error {
                           manifestPath := args[0]
                           manifest, _ := protocol.Load(manifestPath)

                           // E25: Heuristic integration scan
                           integrationReport, err := protocol.ValidateIntegration(manifest, waveNum, repoDir)

                           // E35: Wiring declaration check
                           var wiringReport *protocol.WiringValidationResult
                           if len(manifest.Wiring) > 0 {
                               wiringReport, _ = protocol.ValidateWiringDeclarations(manifest, repoDir)
                           }

                           // Combine into single output
                           output := map[string]interface{}{
                               "wave": waveNum,
                               "integration_report": integrationReport,
                               "wiring_report": wiringReport,
                           }
                           json.NewEncoder(os.Stdout).Encode(output)

                           // Exit 1 if gaps detected
                           if (integrationReport != nil && !integrationReport.Valid) ||
                              (wiringReport != nil && !wiringReport.Valid) {
                               return fmt.Errorf("integration gaps detected")
                           }
                           return nil
                       },
                   }
                   cmd.Flags().IntVar(&waveNum, "wave", 0, "Wave number (required)")
                   cmd.MarkFlagRequired("wave")
                   cmd.Flags().StringVar(&repoDir, "repo-dir", ".", "Repository directory")
                   return cmd
               }
               ```

