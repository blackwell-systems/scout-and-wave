            3. Command logic:
               ```go
               func newWireIntegrationCmd() *cobra.Command {
                   var waveNum int
                   var repoDir string
                   var dryRun bool

                   cmd := &cobra.Command{
                       Use:   "wire-integration <manifest-path>",
                       Short: "Apply integration gap fixes (import statements, call-sites)",
                       Args:  cobra.ExactArgs(1),
                       RunE: func(cmd *cobra.Command, args []string) error {
                           manifestPath := args[0]

                           // Step 1: Detect gaps using detect-integration-gaps logic
                           manifest, _ := protocol.Load(manifestPath)
                           integrationReport, _ := protocol.ValidateIntegration(manifest, waveNum, repoDir)

                           if integrationReport.Valid {
                               fmt.Println("No integration gaps detected")
                               return nil
                           }

                           // Step 2: For each gap with severity error/warning, apply fix
                           fixes := []map[string]string{}
                           for _, gap := range integrationReport.Gaps {
                               if gap.Severity != "error" && gap.Severity != "warning" {
                                   continue
                               }

                               // Use SearchResults field to find target files (from ValidateIntegration)
                               for _, callerFile := range gap.SearchResults {
                                   edit := generateImportEdit(gap.ExportName, gap.FilePath, callerFile)
                                   if !dryRun {
                                       applyEdit(filepath.Join(repoDir, callerFile), edit)
                                   }
                                   fixes = append(fixes, map[string]string{
                                       "file": callerFile,
                                       "edit": edit,
                                   })
                               }
                           }

                           // Step 3: Output JSON with fixes applied
                           output := map[string]interface{}{
                               "wave": waveNum,
                               "dry_run": dryRun,
                               "fixes": fixes,
                           }
                           json.NewEncoder(os.Stdout).Encode(output)
                           return nil
                       },
                   }
                   cmd.Flags().IntVar(&waveNum, "wave", 0, "Wave number (required)")
                   cmd.MarkFlagRequired("wave")
                   cmd.Flags().StringVar(&repoDir, "repo-dir", ".", "Repository directory")
                   cmd.Flags().BoolVar(&dryRun, "dry-run", false, "Print fixes without applying")
                   return cmd
               }
               ```

