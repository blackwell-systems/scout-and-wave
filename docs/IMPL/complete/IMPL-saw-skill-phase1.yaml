interface_contracts:
    - name: ResolveImplData
      description: JSON output schema for sawtools resolve-impl command
      definition: |
        // ResolveImplData is the structured JSON output for resolve-impl command.
        // Used by orchestrator to parse IMPL targeting flags and auto-select logic.
        type ResolveImplData struct {
          ImplPath         string `json:"impl_path"`          // Absolute path to IMPL doc
          Slug             string `json:"slug"`               // Feature slug
          ResolutionMethod string `json:"resolution_method"`  // "auto-select" | "explicit-slug" | "explicit-filename" | "explicit-path"
          PendingCount     int    `json:"pending_count"`      // Number of pending IMPLs found (for diagnostics)
        }
      location: cmd/sawtools/resolve_impl_cmd.go (scout-and-wave-go)
    - name: newResolveImplCmd
      description: Cobra command factory for resolve-impl CLI command
      definition: |
        // newResolveImplCmd returns a cobra.Command that implements IMPL doc resolution logic.
        // Parses --impl flag (slug, filename, or path) and auto-selects if exactly 1 pending IMPL exists.
        // Always returns JSON (ResolveImplData) on success.
        func newResolveImplCmd() *cobra.Command
      location: cmd/sawtools/resolve_impl_cmd.go (scout-and-wave-go)
    - name: integration-gap-detection.md
      description: Reference file documenting E25/E26/E35 integration gap detection workflow
      definition: |
        # Integration Gap Detection (E25/E26/E35)

        **Trigger:** After `sawtools finalize-wave` succeeds.

        ## 7-Step Workflow

        1. Check `finalize-wave` JSON output for `integration_report.valid` field
        2. If `valid == false`, integration gaps were detected
        3. Read stderr output for gap summary and next-step guidance
        4. Run the command shown in stderr (typically: `sawtools run-integration-agent "<manifest-path>" --wave <N>`)
        5. Read integration agent's completion report from IMPL doc (agent ID: `integrator`)
        6. If completion report shows `status: complete`, proceed to next wave or IMPL completion
        7. If `status: blocked` or `status: partial`, apply E19 failure routing (see `references/failure-routing.md`)

        ## Integration Agent Model Config

        Integration agent model is read from `saw.config.json` under `agent.integration_model`.
        If empty, inherits parent session's model.

        ## E27 Planned Integration Waves

        If the IMPL doc includes a wave with `type: integration`, use `sawtools run-integration-wave`
        instead of reactive gap detection. Planned integration waves run before gap detection.
      location: implementations/claude-code/prompts/references/integration-gap-detection.md (scout-and-wave)
