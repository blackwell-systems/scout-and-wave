              "After finalization succeeds, read `references/integration-gap-detection.md` for
              the 7-step E25/E26/E35 integration gap detection workflow."
            - Preserve line 189 (E27 comment about planned integration waves)
            - Maintain surrounding context (lines 176 and 190+)

            **Interfaces/Contracts:**
            - Reference file path: `references/integration-gap-detection.md`
            - File is auto-symlinked by install.sh Phase 1 (lines 84-90) — no install.sh changes needed
            - Loaded on-demand by orchestrator when `finalize-wave` returns `integration_report.valid == false`

            **Tests:**
            None — documentation file, validated by E16 hook on Write.

            **Verification Gate:**
            ```bash
            # Verify reference file exists and is well-formed
            test -f implementations/claude-code/prompts/references/integration-gap-detection.md
            grep -q "7-Step Workflow" implementations/claude-code/prompts/references/integration-gap-detection.md

