            # Verify line count reduction (~10 lines saved)
            LINES=$(wc -l < implementations/claude-code/prompts/saw-skill.md)
            test "$LINES" -lt 190
            ```

            **Constraints:**
            - DO NOT modify install.sh (Phase 1 already symlinks all references/*.md files)
            - DO NOT change the 7-step workflow semantics, only extract it
            - DO NOT add new execution rules or modify E25/E26/E35 behavior
            - Preserve markdown formatting for readability

            **Context:**
            Lines saved: ~10 (specified in roadmap line 46)
            Pattern: Progressive disclosure (detail loads on-demand when gaps occur)
            Cross-repo: Protocol repo only (scout-and-wave)
          files:
            - implementations/claude-code/prompts/references/integration-gap-detection.md
            - implementations/claude-code/prompts/saw-skill.md
        - id: B
          task: |
            ## Agent B: sawtools resolve-impl Command

            **Role:** Create new Go CLI command to replace manual IMPL targeting logic in
            orchestrator, enabling deterministic resolution of --impl flag values.

            **What to Implement:**

            Create `cmd/sawtools/resolve_impl_cmd.go`:
            - Implement `newResolveImplCmd() *cobra.Command` function
            - Parse `--impl <value>` flag (accepts slug, filename, or absolute/relative path)
            - Resolution logic (in priority order):
              1. If `--impl` is absolute path and file exists → use directly
              2. If `--impl` is relative path → resolve from cwd, verify exists
              3. If `--impl` is filename (IMPL-*.yaml) → resolve to `docs/IMPL/<filename>`
              4. If `--impl` is slug → call `protocol.ListIMPLs()`, find matching `feature_slug`
              5. If `--impl` omitted → auto-select if exactly 1 pending IMPL exists
            - Return JSON (ResolveImplData struct) on success
            - Exit 1 with error message on failure (multiple pending, no match, etc.)
            - Use `protocol.ListIMPLs()` function from scout-and-wave-go/pkg/protocol/discovery.go

            Update `cmd/sawtools/main.go`:
            - Add `newResolveImplCmd()` to rootCmd.AddCommand() list (insert after newRetryCmd)
            - No other changes needed

            Update `implementations/claude-code/prompts/references/impl-targeting.md`:
            - Add new "sawtools resolve-impl" section after "IMPL Discovery" (after line 40)
            - Document command usage: `sawtools resolve-impl --impl <value> --repo-dir <path>`
            - Document JSON output schema (ResolveImplData)
            - Add note: "Orchestrator calls this command instead of manual parsing logic."
            - Update "Integration with Orchestrator Flow" section to reference resolve-impl

            **Interfaces/Contracts:**
            - Command: `sawtools resolve-impl --impl <value> --repo-dir <path>`
            - JSON output: ResolveImplData (see interface_contracts section above)
            - Input: --impl flag (slug | filename | path) or omitted (auto-select)
            - Exit codes: 0 = success, 1 = failure (no match, multiple pending, etc.)
            - Reuses `protocol.ListIMPLs()` function (no new protocol functions needed)

            **Tests:**
            Create `cmd/sawtools/resolve_impl_cmd_test.go`:
            - Test explicit slug resolution (finds matching IMPL)
            - Test explicit filename resolution (resolves to docs/IMPL/)
            - Test explicit absolute path resolution (uses directly)
            - Test auto-select (exactly 1 pending IMPL)
            - Test auto-select failure (multiple pending IMPLs)
            - Test auto-select failure (no pending IMPLs)
            - Test invalid slug (no match)

            **Verification Gate:**
            ```bash
            # Build command
            cd /Users/dayna.blackwell/code/scout-and-wave-go
            go build ./cmd/sawtools

            # Lint
            go vet ./cmd/sawtools/resolve_impl_cmd.go

            # Run tests
            go test ./cmd/sawtools/resolve_impl_cmd_test.go

            # Integration smoke test (requires active IMPL in protocol repo)
            cd /Users/dayna.blackwell/code/scout-and-wave
            sawtools resolve-impl --impl saw-skill-phase1 --repo-dir . | jq -e '.slug == "saw-skill-phase1"'
            ```

            **Constraints:**
            - DO NOT modify protocol package (reuse existing ListIMPLs function)
            - DO NOT change saw-skill.md (Agent A handles that in parallel)
            - Use cobra.Command pattern matching existing sawtools commands (see list_impls.go)
            - JSON output must be valid and match schema exactly
            - Command must be idempotent (safe to call multiple times)

            **Context:**
            Lines saved in saw-skill.md: ~5 (specified in roadmap line 120)
            Pattern: Determinism via scripts (eliminate manual parsing)
            Cross-repo: Go SDK (scout-and-wave-go) + protocol repo (impl-targeting.md update)
            Web app integration: Optional future improvement (not in this IMPL scope)
          files:
            - cmd/sawtools/resolve_impl_cmd.go
            - cmd/sawtools/main.go
            - implementations/claude-code/prompts/references/impl-targeting.md
