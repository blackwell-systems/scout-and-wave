pre_mortem:
    overall_risk: low
    rows:
        - scenario: Tooltip component CSS conflicts with existing styles
          likelihood: low
          impact: medium
          mitigation: Use high z-index (50+) and scoped CSS variables. Test with all themes.
        - scenario: Tooltip content is too verbose and clutters UI
          likelihood: medium
          impact: low
          mitigation: Keep content under 2 sentences. Use plain language, not protocol jargon.
        - scenario: npm build fails due to TypeScript errors in new component
          likelihood: low
          impact: medium
          mitigation: Agent A creates tooltip.tsx first. Strict typing from start.
        - scenario: Tooltip doesn't work in dark mode
          likelihood: medium
          impact: low
          mitigation: Use CSS variables (--tooltip-bg, --tooltip-text) defined in root theme.
