interface_contracts:
    - name: Tooltip
      description: Reusable tooltip component for inline concept explanations
      definition: |
        // React component with hover/click interaction
        export interface TooltipProps {
          children: React.ReactNode  // Element to wrap (triggers tooltip on hover)
          content: string | React.ReactNode  // Tooltip content (text or JSX)
          position?: 'top' | 'bottom' | 'left' | 'right'  // Default: 'top'
          maxWidth?: number  // Max width in pixels, default: 300
        }
        export function Tooltip(props: TooltipProps): JSX.Element

        // Implementation: CSS-only tooltip using ::before pseudo-element and
        // data attributes. No external dependencies (no Radix UI). Accessible
        // via aria-label fallback. Dark mode aware via CSS variables.
      location: web/src/components/ui/tooltip.tsx
    - name: ScoutCompletionBanner
      description: Banner shown after Scout completes, before ReviewScreen loads
      definition: |
        // Inline banner component (not standalone file)
        interface BannerProps {
          agentCount: number
          waveCount: number
          fileCount: number
          onReview: () => void
        }

        // Render location: ScoutLauncher.tsx, between output panel and "Review" button
        // Visual: Green background, checkmark icon, summary stats, CTA button
      location: web/src/components/ScoutLauncher.tsx (inline)
    - name: FailureTypeExplanations
      description: Human-readable explanations for agent failure_type enum values
      definition: |
        // Mapping from failure_type to user-friendly explanation
        const FAILURE_EXPLANATIONS: Record<string, { title: string; why: string; action: string }> = {
          merge_conflict: {
            title: "Merge Conflict",
            why: "File ownership overlap detected (I1 violation)",
            action: "Check File Ownership table - two agents modified the same file"
          },
          failed_gate: {
            title: "Quality Gate Failed",
            why: "Build, test, or lint check did not pass",
            action: "Review gate output above. Fix errors and retry agent."
          },
          timeout: {
            title: "Agent Timeout",
            why: "Agent exceeded max execution time (10 minutes)",
            action: "Check for infinite loops or blocking operations. Simplify task."
          },
          // ... (add more as needed)
        }
      location: web/src/components/AgentCard.tsx (inline const)
waves:
    - number: 1
      agents:
        - id: A
          task: |
            **Agent A: Create Tooltip Component**

            Create `web/src/components/ui/tooltip.tsx` implementing the Tooltip interface contract.

            **Requirements:**
            1. Pure CSS tooltip using ::before pseudo-element (no JS libraries)
            2. Supports top/bottom/left/right positioning (default: top)
            3. Triggered by hover on children element
            4. Max width: 300px (configurable via prop)
            5. Dark mode support via CSS variables (--tooltip-bg, --tooltip-text)
            6. Accessible: include aria-label fallback
            7. TypeScript: strict typing, no `any`

            **Implementation notes:**
            - Use `position: relative` on wrapper, `position: absolute` on ::before
            - Arrow via ::after pseudo-element with CSS triangle
            - Fade-in animation (opacity 0 → 1, 200ms)
            - z-index: 50 (above most UI elements)

            **Example usage:**
            ```tsx
            <Tooltip content="Prevents merge conflicts (I1 invariant)">
              <span className="underline decoration-dotted">File Ownership</span>
            </Tooltip>
            ```

            **Tests:** Create tooltip.test.tsx with rendering and prop validation tests.

            **Verification gate:**
            ```bash
            cd web && npm test -- tooltip.test.tsx
            ```
          files:
            - web/src/components/ui/tooltip.tsx
