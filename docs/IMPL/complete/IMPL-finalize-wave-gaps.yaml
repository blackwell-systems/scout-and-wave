waves:
    - number: 1
      agents:
        - id: A
          task: |-
            ## Agent A — finalize_wave.go: gaps 1, 2, 3, 4

            Modify `cmd/sawtools/finalize_wave.go` to close four batching gaps.

            ### Gap 1: WAVE_VERIFIED state transition

            After step 5.5 (RunPostMergeGates) succeeds and before setting
            `result.Success = true`, call `protocol.SetImplState` to advance the
            IMPL doc to `WAVE_VERIFIED`:

            ```go
            stateRes := protocol.SetImplState(manifestPath, protocol.StateWaveVerified, protocol.SetImplStateOpts{})
            if stateRes.IsFatal() {
                fmt.Fprintf(os.Stderr, "finalize-wave: warning: SetImplState(WAVE_VERIFIED) failed: %v\n", stateRes.Errors)
            } else {
                fmt.Fprintf(os.Stderr, "finalize-wave: IMPL state -> WAVE_VERIFIED\n")
            }
            ```

            This call is non-fatal: log a warning on failure, do not block the
            success result. The state transition is allowed because finalize-wave
            leaves the doc in WAVE_EXECUTING or WAVE_MERGING, both of which have
            WAVE_VERIFIED as a valid next state (see allowedTransitions in
            pkg/protocol/state_transition.go).

            ### Gap 2: Per-agent update-status on finalize success

            Immediately after the SetImplState call (still before `result.Success = true`),
            loop over all agents in the wave and call `protocol.UpdateStatus` for each:

            ```go
            for _, agent := range manifest.Waves[waveNum-1].Agents {
                updateRes := protocol.UpdateStatus(manifestPath, waveNum, agent.ID, "complete")
                if updateRes.IsFatal() {
                    fmt.Fprintf(os.Stderr, "finalize-wave: warning: update-status for agent %s failed: %v\n",
                        agent.ID, updateRes.Errors)
                }
            }
            ```

            Non-fatal: log per-agent warning on failure, continue loop.

            ### Gap 3: populate-integration-checklist (M5) post-merge

            After step 4 (MergeAgents) completes successfully — just before step 5
            (VerifyBuild) — call M5 as a non-blocking informational step:

            ```go
            // Step 4.5: M5 populate-integration-checklist (non-blocking)
            m5Updated, m5Err := protocol.PopulateIntegrationChecklist(manifest)
            if m5Err != nil {
                fmt.Fprintf(os.Stderr, "finalize-wave: M5 populate-integration-checklist: %v\n", m5Err)
            } else {
                manifest = m5Updated
                if saveErr := protocol.Save(manifest, manifestPath); saveErr != nil {
                    fmt.Fprintf(os.Stderr, "finalize-wave: M5 save: %v\n", saveErr)
                } else {
                    fmt.Fprintf(os.Stderr, "finalize-wave: M5 integration checklist populated\n")
                }
            }
            ```

            Place this in the `postMerge:` label section, after all repos have
            confirmed a successful merge result but before the VerifyBuild loop.
            This runs once (not per-repo) since it operates on the manifest itself.

            Note: `manifest` is already in scope as the loaded `*protocol.IMPLManifest`.
            `protocol.PopulateIntegrationChecklist` and `protocol.Save` are already
            imported; no new imports needed.

            ### Gap 4: Structured integration_action_required + wiring_gaps fields

            Add two fields to the `FinalizeWaveResult` struct:

            ```go
            IntegrationActionRequired bool     `json:"integration_action_required"`
            WiringGaps                []string `json:"wiring_gaps,omitempty"`
            ```

            In step 3.5b (ValidateWiringDeclarations block), after the existing
            per-gap stderr logging, populate these fields:

            ```go
            if !wiringData.Valid {
                result.IntegrationActionRequired = true
                for _, gap := range wiringData.Gaps {
                    result.WiringGaps = append(result.WiringGaps,
                        fmt.Sprintf("%s not called in %s",
                            gap.Declaration.Symbol, gap.Declaration.MustBeCalledFrom))
                }
            }
            ```

            The existing stderr logging stays in place. The new fields supplement
            it with programmatic access.

            ### Tests

            Add or update tests in `cmd/sawtools/finalize_wave_test.go` (create if
            it doesn't exist) or an appropriate `_test.go` file co-located with
            finalize_wave.go. At minimum verify:
            - `FinalizeWaveResult` struct serializes `integration_action_required`
              and `wiring_gaps` fields correctly.
            - The new fields are zero-valued (false / nil) when wiring is clean.

            ### Verification gate

            ```
            go build ./cmd/sawtools/...
            go vet ./cmd/sawtools/...
            go test ./cmd/sawtools/... ./pkg/protocol/...
            ```

            ### Constraints

            - Do NOT change any function signatures in pkg/protocol/.
            - The SetImplState and UpdateStatus calls must be non-fatal (warning on
              failure, not error return).
            - M5 call must be non-fatal (stderr warning only).
            - Place the M5 call after merge succeeds and before VerifyBuild — it
              must NOT run if merge failed.
            - The `goto postMerge` paths (skipMerge, isSolo, allGone) all jump past
              the merge loop and land at `postMerge:`. Place the M5 call inside the
              `postMerge:` section, after the label, so it also runs in skip/solo
              cases if desired — OR place it only in the successful merge path by
              adding it just before `goto postMerge` in the main merge loop. The
              former (post-label placement) is preferred so all paths get M5.
