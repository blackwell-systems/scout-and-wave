pre_mortem:
    overall_risk: low
    rows:
        - scenario: |-
            SetImplState rejects the transition because the IMPL doc is in an
            unexpected state (e.g., WAVE_PENDING instead of WAVE_EXECUTING) when
            finalize-wave runs.
          likelihood: low
          impact: low
          mitigation: |-
            The call is non-fatal — log warning to stderr and continue. The allowed
            transitions table in state_transition.go shows WAVE_EXECUTING -> WAVE_VERIFIED
            and WAVE_MERGING -> WAVE_VERIFIED are both valid. Only edge cases (e.g.,
            IMPL already COMPLETE) would reject; those are benign.
        - scenario: |-
            M5 (PopulateIntegrationChecklist) modifies the manifest and writes it
            to disk between VerifyCommits and VerifyBuild, causing a dirty working
            tree that interferes with git operations in VerifyBuild.
          likelihood: low
          impact: medium
          mitigation: |-
            PopulateIntegrationChecklist modifies the YAML file at manifestPath, not
            files in the agent worktrees. VerifyBuild runs test_command/lint_command
            on the source repo, not the docs/ directory. No interference expected.
            The call is also non-fatal so any failure is logged and skipped.
        - scenario: |-
            UpdateStatus overwrites a completion report's fields beyond `status`,
            losing FilesChanged/FilesCreated data already written by the agent.
          likelihood: low
          impact: medium
          mitigation: |-
            UpdateStatus in status_update.go reads the existing report, sets only
            the Status field, and writes back the full struct — it preserves all
            other fields. Reviewed the implementation; this is safe.
        - scenario: |-
            staleCleanupWarnings variable declared before the staleErr/sameSlug block
            conflicts with Go's goto-jump-over-declaration rules in prepare_wave.go.
          likelihood: low
          impact: low
          mitigation: |-
            prepare_wave.go does not use goto statements (only finalize_wave.go does).
            Variable declaration placement is unrestricted. No conflict expected.
