        - id: B
          task: |-
            ## Agent B — prepare_wave.go: gap 5

            Modify `cmd/sawtools/prepare_wave.go` to surface stale worktree cleanup
            failures as warnings in the result JSON instead of silently swallowing them.

            ### Gap 5: Stale cleanup failures as warnings in result JSON

            **Step 1: Add field to PrepareWaveResult struct.**

            Add `StaleCleanupWarnings []string` to the existing struct:

            ```go
            type PrepareWaveResult struct {
                Wave                 int                     `json:"wave"`
                Worktrees            []protocol.WorktreeInfo `json:"worktrees"`
                AgentBriefs          []AgentBriefInfo        `json:"agent_briefs"`
                Repos                []string                `json:"repos,omitempty"`
                StaleCleanupWarnings []string                `json:"stale_cleanup_warnings,omitempty"`
            }
            ```

            **Step 2: Collect warnings from CleanStaleWorktrees.**

            In step 0a2 (the `CleanStaleWorktrees` block, around line 180), the
            current code only acts on `IsSuccess()/IsPartial()` success cases and
            prints a cleanup count. Extend it to capture warnings:

            ```go
            var staleCleanupWarnings []string
            if len(sameSlug) > 0 {
                cleanRes := protocol.CleanStaleWorktrees(sameSlug, true)
                cleanData := cleanRes.GetData()
                if cleanData != nil {
                    if cleanRes.IsSuccess() || cleanRes.IsPartial() {
                        fmt.Fprintf(os.Stderr, "prepare-wave: cleaned %d stale worktree(s) from previous runs\n",
                            len(cleanData.Cleaned))
                    }
                    for _, e := range cleanData.Errors {
                        msg := fmt.Sprintf("stale cleanup failed for %s: %s", e.Worktree.BranchName, e.Error)
                        fmt.Fprintf(os.Stderr, "prepare-wave: warning: %s\n", msg)
                        staleCleanupWarnings = append(staleCleanupWarnings, msg)
                    }
                }
            }
            ```

            Replace the existing `if len(sameSlug) > 0 { cleanRes := ... }` block
            with this version. The `staleCleanupWarnings` variable is declared
            before the block so it is in scope when the result struct is built.

            **Step 3: Populate the result struct.**

            When building the final `PrepareWaveResult` (near the bottom, around
            line 540), set the new field:

            ```go
            result := PrepareWaveResult{
                Wave:                 waveNum,
                Worktrees:            worktreeResult.Worktrees,
                AgentBriefs:          agentBriefs,
                Repos:                repoList,
                StaleCleanupWarnings: staleCleanupWarnings,
            }
            ```

            **Important scope note:** `staleCleanupWarnings` is declared in step 0a2
            which is inside the `RunE` closure but before the worktree creation block.
            The result struct is built at the end of the same closure, so the variable
            will be in scope. Verify the declaration placement doesn't conflict with
            the `goto`-related variable scoping constraints already present in the file
            (finalize_wave.go uses gotos; prepare_wave.go does not, so this is safe).

            ### Tests

            Verify the new field serializes correctly. A simple struct initialization
            test in a `_test.go` file is sufficient:

            ```go
            r := PrepareWaveResult{StaleCleanupWarnings: []string{"test warning"}}
            out, _ := json.Marshal(r)
            // assert "stale_cleanup_warnings" key present in output
            ```

            ### Verification gate

            ```
            go build ./cmd/sawtools/...
            go vet ./cmd/sawtools/...
            go test ./cmd/sawtools/...
            ```

            ### Constraints

            - The change is purely additive: existing behavior (cleanup count log,
              IsSuccess/IsPartial branch logic) must remain intact.
            - Failures are warnings only — do NOT return an error or block wave
              creation on stale cleanup failure.
            - `omitempty` on the JSON tag ensures the field is absent from output
              when there are no warnings (clean path).
          files:
            - cmd/sawtools/prepare_wave.go
