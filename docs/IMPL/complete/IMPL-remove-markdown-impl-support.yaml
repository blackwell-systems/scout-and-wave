pre_mortem:
    overall_risk: low
    rows:
        - scenario: Agent A misses a `.md` reference in scout-and-wave-web, leaving a dormant bug
          likelihood: low
          impact: medium
          mitigation: |
            Grep verification at merge time: `rg '\.md["\)]' --type go` in scout-and-wave-web
            should return zero matches in production code (excluding comments and docs).
            The only valid `.md` references should be in documentation files themselves.
        - scenario: Test fails with 'file not found' because test setup expects `.md` but agent changed to `.yaml`
          likelihood: low
          impact: low
          mitigation: |
            Verification gate runs full test suite (`go test ./...`) before commit. Any
            path mismatches will cause immediate test failures. Agents must fix before
            completing.
        - scenario: scout-and-wave-web depends on scout-and-wave-go test fixtures (unlikely but possible)
          likelihood: very-low
          impact: medium
          mitigation: |
            Agents work in separate repos and only modify test files. Test files are not
            imported across repo boundaries. The `go.mod` replace directive only affects
            production code in `pkg/`, not test files.
