waves:
    - number: 1
      agents:
        - id: A
          task: |
            ## What to Implement

            Remove all Markdown (`.md`) IMPL doc support from scout-and-wave-web.

            **Critical Bugs (Priority 1 - Broken Today):**

            1. **pkg/api/chat_handler.go:94** — Hardcoded `.md` extension prevents chat from working with YAML docs
               - Change: `implPath := filepath.Join(s.cfg.IMPLDir, "IMPL-"+slug+".md")`
               - To: `implPath := filepath.Join(s.cfg.IMPLDir, "IMPL-"+slug+".yaml")`

            2. **pkg/api/impl_edit.go:89,91,198** — Manual editor saves convert YAML→MD
               - Line 89: Change `implPath := filepath.Join(s.cfg.IMPLDir, "IMPL-"+slug+".md")`
               - Line 91: Change `tmpFile, err := os.CreateTemp(s.cfg.IMPLDir, "impl-edit-*.md.tmp")`
               - Line 198: Change `implPath := filepath.Join(s.cfg.IMPLDir, "IMPL-"+slug+".md")`
               - All three: Replace `.md` with `.yaml`

            3. **cmd/saw/commands.go:456** — Scout command creates `.md` files instead of `.yaml`
               - Change: `implOut = filepath.Join(repoRoot, "docs", "IMPL", fmt.Sprintf("IMPL-%s.md", slug))`
               - To: `implOut = filepath.Join(repoRoot, "docs", "IMPL", fmt.Sprintf("IMPL-%s.yaml", slug))`

            **Legacy Fallbacks (Priority 2 - Remove After Bug Fixes):**

            4. **pkg/api/wave_runner.go:282-286** — Remove markdown fallback logic
               - Delete lines 283-286 (the entire if-block that falls back to `.md`)
               - Keep only the primary `.yaml` path at line 282

            5. **pkg/api/scaffold_handler.go:29-32** — Remove markdown fallback logic
               - Delete lines 30-32 (the entire if-block that falls back to `.md`)
               - Keep only the primary `.yaml` path at line 29

            6. **pkg/api/impl_edit.go:34** — Remove `.md` from extension search array
               - Change: `for _, ext := range []string{".yaml", ".md"} {`
               - To: `for _, ext := range []string{".yaml"} {`

            7. **pkg/api/global_events.go:104** — Update outdated comment
               - Change: `// "impl_list_updated" whenever a .md file is created or renamed into place.`
               - To: `// "impl_list_updated" whenever a .yaml file is created or renamed into place.`

            **Test Fixtures (Priority 3 - After Production Code):**

            8. Update all test files to use `.yaml` extension:
               - pkg/api/impl_edit_test.go:83
               - cmd/saw/commands_test.go (multiple references)
               - cmd/saw/wave_loop_test.go:32,64
               - pkg/api/wave_runner_test.go:32,64
               - cmd/saw/merge_cmd_test.go:20,33

            ## Interfaces to Implement

            None. This is cleanup work with no new interfaces.

            ## Interfaces to Call

            Existing Go standard library:
            - `filepath.Join(dir, file string) string` — path construction
            - `os.Stat(path string) (os.FileInfo, error)` — file existence check
            - `os.CreateTemp(dir, pattern string) (*os.File, error)` — temp file creation

            ## Tests to Write

            No new tests required. Existing tests verify correct behavior:

            1. **TestHandlePutImplRaw** — Verifies PUT /api/impl/{slug}/raw saves to `.yaml`
            2. **TestRunScout_PromptIncludesFeature** — Verifies scout creates `.yaml` files
            3. **TestRunWave_MissingImpl** — Verifies wave runner looks for `.yaml` first
            4. **TestHandleScaffoldRerun** — Verifies scaffold agent resolves `.yaml` path

            Run the full test suite after changes to ensure no regressions.

            ## Verification Gate

            ```bash
            cd /Users/dayna.blackwell/code/scout-and-wave-web
            go build ./...
            go vet ./...
            go test ./...
            ```

            All tests must pass. Pay special attention to:
            - `pkg/api/impl_edit_test.go` — File path assertions
            - `cmd/saw/commands_test.go` — Scout command output path
            - `pkg/api/wave_runner_test.go` — IMPL doc resolution

            ## Constraints

            1. **No fallback logic** — `.yaml` is the only supported format. Do NOT add
               "try .yaml, then try .md" logic. Remove all existing fallbacks.

            2. **Atomic changes** — Each location is a simple string replacement. Do not
               refactor surrounding code or add new abstractions.

            3. **Comment accuracy** — The global_events.go comment update is required for
               correctness. Outdated comments are tech debt.

            4. **Test fixture consistency** — Every test file that references `.md` must
               be updated. Inconsistent test fixtures cause confusion and false negatives.

            5. **Repository boundary** — Agent A owns scout-and-wave-web ONLY. Do not
               touch scout-and-wave-go. That repo is Agent B's responsibility.
          files:
