            Use `grep -n "Check [0-9]"` to find the current last check number,
            then use the next available number. Do NOT renumber existing checks.

            ### File 1: validate_agent_launch hook

            Read the file first. Find the last check number with:
            ```bash
            grep -n "Check [0-9]" implementations/claude-code/hooks/validate_agent_launch
            ```

            Add the new integration-agent check AFTER the last existing check and
            BEFORE the final `exit 0` line.

            **New section to add:**

            ```bash
            # --- Check N: Integration-agent reference injection ---
            # (Replace N with the actual next check number found in the file)
            # When launching an integration agent, inject reference files via updatedInput.
            # Both reference files are always injected — no conditional injection.

            is_integration=false
            if [[ "$subagent_type" == "integration-agent" ]] || [[ "$description" =~ \[SAW:integration ]]; then
              is_integration=true
            fi

            if [[ "$is_integration" == "true" ]]; then
              ref_dir=""
              skill_dir="${CLAUDE_SKILL_DIR:-${HOME}/.claude/skills/saw}"
              if [[ -d "${skill_dir}/references" ]]; then
                ref_dir="${skill_dir}/references"
              fi

              if [[ -n "$ref_dir" ]]; then
                inject_content=""

                ref_file="${ref_dir}/integration-connectors-reference.md"
                if [[ -f "$ref_file" ]] && ! echo "$prompt" | grep -q '<!-- injected: references/integration-connectors-reference.md -->'; then
                  inject_content+="<!-- injected: references/integration-connectors-reference.md -->"$'\n'
                  inject_content+="$(command cat "$ref_file")"$'\n\n'
                fi

                ref_file="${ref_dir}/integration-agent-completion-report.md"
                if [[ -f "$ref_file" ]] && ! echo "$prompt" | grep -q '<!-- injected: references/integration-agent-completion-report.md -->'; then
                  inject_content+="<!-- injected: references/integration-agent-completion-report.md -->"$'\n'
                  inject_content+="$(command cat "$ref_file")"$'\n\n'
                fi

                # Prepend injected content to the agent's prompt via updatedInput
                if [[ -n "$inject_content" ]]; then
                  jq -n --arg inject "$inject_content" --arg orig "$prompt" \
                    '{"hookSpecificOutput": {"hookEventName": "PreToolUse", "permissionDecision": "allow", "updatedInput": {"prompt": ($inject + "\n\n" + $orig)}}}'
                  exit 0
                fi
              fi
            fi
            ```

            **Notes:**
            - Use `command cat` (not bare `cat`) — avoids brewprune-shim issues.
            - `\[SAW:integration` — backslash before bracket is intentional bash regex escaping.
            - Number the check comment based on what's actually in the file when you edit it.
            - **updatedInput, NOT additionalContext.** PreToolUse `additionalContext` goes
              to the orchestrator, not the subagent. Use `updatedInput.prompt` to prepend
              reference content into the agent's initial prompt. Include
              `permissionDecision: "allow"` alongside `updatedInput`.

