    File decomposition: 4 distinct files across 3 agents with disjoint ownership.
    Two new reference files (Agent A), one modified core prompt (Agent B), one
    modified hook plus 2 doc files (Agent C). Simpler than other extraction IMPLs
    — only 2 reference files, no conditional injection.

    Investigation-first: None. Extraction boundaries are precisely defined with
    line ranges from the current integration-agent.md (229 lines).

    Interface discoverability: Yes. Dedup marker format and extraction boundaries
    are specified upfront. Uses the same pattern as the four blueprint IMPLs
    (scout, wave-agent, critic-agent, planner).

    Pre-implementation status: Fresh feature, nothing implemented yet. The
    integration-agent subagent_type is not present in validate_agent_launch checks 9+
    (current last check is 8; other 4 IMPLs add 9-12).

    Parallelization value: Wave 1 agents A/B work in parallel with fully disjoint
    file ownership (A creates reference files, B does NOT modify integration-agent.md
    yet — it reads the original). Wave 2 Agent C wires the hook and updates docs.

    Key constraint: Wave 2 Agent C modifies validate_agent_launch, the same file
    modified by Wave 2 agents in the other 4 IMPLs. These Wave 2 agents must run
    sequentially across all 5 extraction IMPLs to avoid merge conflicts.

    Estimated times:
    - Agent execution: ~5 min (2 wave 1 agents + 1 wave 2 agent, ~4 min avg)
    - Merge and verification: ~2 min
    Total SAW time: ~7 min
