interface_contracts:
    - name: Dedup marker format (integration-agent)
      description: |
        HTML comment markers wrapping injected reference content. Used by
        validate_agent_launch hook to avoid double-injection.
      definition: |
        Format: <!-- injected: references/integration-connectors-reference.md -->
                <!-- injected: references/integration-agent-completion-report.md -->

        The hook checks the agent prompt for these markers before injecting.
        The integration-agent.md core file instructs: "skip reading reference if
        marker already in context."
      location: implementations/claude-code/hooks/validate_agent_launch
    - name: Reference file back-link headers (integration-agent)
      description: |
        Each extracted reference file begins with a back-link comment indicating
        it is injected by validate_agent_launch.
      definition: |
        For integration-connectors-reference.md:
          First line: <!-- This file is injected by validate_agent_launch. Core workflow is in integration-agent.md. -->

        For integration-agent-completion-report.md:
          First line: <!-- This file is injected by validate_agent_launch. -->
      location: implementations/claude-code/prompts/references/
    - name: Integration-agent core reference loading block
      description: |
        Block in slim integration-agent.md that instructs the agent about reference
        files and dedup behavior.
      definition: |
        ## Reference Files

        The following reference files contain detailed background and completion
        instructions. They are normally injected by the validate_agent_launch hook
        before this prompt is delivered.

        **Dedup check:** If you see `<!-- injected: references/integration-connectors-reference.md -->`
        markers in your context, the content is already loaded. Do NOT re-read
        those files.

        If the markers are absent (e.g., hook not installed), read these files:
        1. `${CLAUDE_SKILL_DIR}/references/integration-connectors-reference.md` —
           Background on integration_connectors, AllowedPathPrefixes,
           relationship with type: integration waves, YAML examples, and common
           wiring patterns. Always required.
        2. `${CLAUDE_SKILL_DIR}/references/integration-agent-completion-report.md` —
           sawtools set-completion command examples for complete and partial status.
           Always required.

        ---
      location: implementations/claude-code/prompts/agents/integration-agent.md
    - name: Hook injection for integration-agent subagent_type
      description: |
        New check in validate_agent_launch that detects integration-agent launches
        and injects both reference files. Both files are always injected — there
        is no conditional injection for integration-agent.
      definition: |
        Detection: If description contains "[SAW:integration" OR tool_input contains
        "subagent_type: integration-agent" OR the prompt contains
        "# Integration Agent: Post-Merge Wiring":

        1. Resolve reference directory
        2. Always inject: integration-connectors-reference.md,
           integration-agent-completion-report.md
        3. Dedup: skip injection if <!-- injected: references/integration-connectors-reference.md -->
           already in prompt
        4. Output: JSON using updatedInput to prepend reference content into the
           agent's prompt: {"hookSpecificOutput": {"hookEventName": "PreToolUse",
           "permissionDecision": "allow", "updatedInput": {"prompt": "<injected>\n\n<orig>"}}}
      location: implementations/claude-code/hooks/validate_agent_launch
