interface_contracts:
    - name: ProtocolErrorExplainer
      description: |
        Function that translates protocol error codes (E16, I1, E21A, etc.)
        into plain-English explanations with remediation steps.
      definition: |
        // ExplainProtocolError returns a human-readable explanation for a
        // SAW protocol error code. Returns nil if code is unknown.
        func ExplainProtocolError(code string) *ProtocolErrorInfo

        // ProtocolErrorInfo holds the structured explanation for a protocol error.
        type ProtocolErrorInfo struct {
            Code        string   // e.g. "E16", "I1", "E21A"
            Title       string   // short name, e.g. "Validation Failure"
            PlainText   string   // 1-2 sentence plain-English explanation
            Remediation []string // ordered steps to fix
            SeeAlso     string   // link to protocol doc section
        }

        // AllProtocolErrors returns all known error explanations.
        func AllProtocolErrors() []ProtocolErrorInfo
      location: pkg/errparse/protocol_errors.go
    - name: VerifyInstallCmd
      description: |
        CLI command that checks all SAW prerequisites are met:
        sawtools on PATH, skill files symlinked, repos cloned,
        git version sufficient, Claude Code permissions.
      definition: |
        // newVerifyInstallCmd returns a cobra.Command for "sawtools verify-install".
        // Checks:
        //   1. sawtools binary is on PATH and executable
        //   2. ~/.claude/skills/saw/ directory exists with expected symlinks
        //   3. Git version >= 2.20 (worktree support)
        //   4. saw.config.json exists and has valid repos entries
        //   5. All configured repo paths exist on disk
        // Output: JSON with per-check pass/fail + overall verdict.
        func newVerifyInstallCmd() *cobra.Command
      location: cmd/saw/verify_install_cmd.go
