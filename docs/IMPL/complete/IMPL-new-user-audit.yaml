            ```

            Populate with explanations for at least these codes:
            - **I1**: Disjoint File Ownership — "Two agents tried to modify the same file."
              Remediation: "Check file_ownership in the IMPL doc. Each file must be assigned to exactly one agent per wave."
            - **I2**: Cross-Wave Dependencies Only — "An agent depends on another agent in the same wave."
              Remediation: "Move the dependent agent to a later wave, or remove the dependency."
            - **I3**: 1-Indexed Waves — "Wave numbering starts at 0 instead of 1."
              Remediation: "Change wave numbers to start at 1."
            - **I4**: Scout Write Boundaries — "Scout agent tried to write source code."
              Remediation: "Scout agents only write IMPL docs (docs/IMPL/IMPL-*.yaml)."
            - **I5**: Agent Commit Verification — "Agent did not commit its changes."
              Remediation: "Ensure each agent commits all changes before completion."
            - **I6**: Role Separation — "Orchestrator is performing agent work directly."
              Remediation: "Launch the appropriate agent type instead of implementing directly."
            - **E2**: Interface Freeze — "Interface changed after worktrees were created."
              Remediation: "Delete worktrees, update interfaces, recreate worktrees."
            - **E16**: IMPL Validation — "IMPL doc has structural errors."
              Remediation: "Run sawtools validate --fix to auto-correct common issues."
            - **E20**: Stub Scan — "Implementation contains stub/placeholder code."
              Remediation: "Replace TODO/FIXME/stub markers with real implementation."
            - **E21**: Quality Gate Failure — "Build, test, or lint check failed."
              Remediation: "Fix the failing check. Run the gate command manually to see details."
            - **E21A**: Baseline Gate — "Quality gate was already failing before agent work."
              Remediation: "Fix pre-existing failures first, or mark as known issue."
            - **E25**: Integration Gap — "Exported function not wired into caller code."
              Remediation: "Add integration_connectors or create an integration wave."
            - **E37**: Critic Review — "Pre-wave brief review found issues."
              Remediation: "Address critic findings before launching wave agents."

            Use a package-level map[string]ProtocolErrorInfo for lookup.
