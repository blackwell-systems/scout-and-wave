pre_mortem:
    overall_risk: low
    rows:
        - scenario: Bedrock or OpenAI backend tests fail after dedup integration
          likelihood: low
          impact: medium
          mitigation: |
            Follow api/client.go pattern exactly. Dedup middleware is transparent and
            doesn't modify tool semantics — only intercepts Read results. If tests fail,
            verify middleware order matches api/client.go (dedup before constraints/timing).
        - scenario: Runner.DedupStats() returns nil unexpectedly in orchestrator
          likelihood: low
          impact: low
          mitigation: |
            Type assertion in Runner.DedupStats() provides backward compatibility. If
            backend doesn't implement DedupStats, method returns nil gracefully. Orchestrator
            checks for nil before populating report field.
        - scenario: Stats not persisted to IMPL doc after agent completion
          likelihood: medium
          impact: high
          mitigation: |
            This is the primary integration gap being fixed. Agent D must place stats
            collection BEFORE report persistence (lines 857-869). Test by running a
            wave with API backend and verifying completion_reports[agent].dedup_stats
            field is populated in the saved IMPL doc.
        - scenario: OpenAI backend has different buildWorkshop structure than API backend
          likelihood: low
          impact: low
          mitigation: |
            Current openai/client.go shows buildWorkshop at line 73 with standard pattern.
            If structure differs, adapt dedup wrapper placement to occur after base
            workshop creation and before other middleware (WithTiming).
