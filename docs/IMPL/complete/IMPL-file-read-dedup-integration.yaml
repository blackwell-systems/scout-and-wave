            # Agent A: Integrate Dedup Cache into Bedrock Backend

            ## What to Implement
            Add dedup cache middleware to the Bedrock backend client, following the
            exact pattern already implemented in `pkg/agent/backend/api/client.go`.

            ## Interfaces to Consume
            - `dedup.WithDedup(w)` — wraps a Workshop to add dedup middleware
            - `dedup.Cache.Stats()` — returns dedup metrics

            ## Implementation Steps
            1. Import `github.com/blackwell-systems/scout-and-wave-go/pkg/agent/dedup`
            2. Add `dedupCache *dedup.Cache` field to `Client` struct (after `commitTracker`)
            3. In `buildWorkshop()` method (line ~236):
               - After creating base workshop `w`, wrap it: `w, c.dedupCache = dedup.WithDedup(w)`
               - Place this BEFORE the `WithConstraints` middleware (same order as api/client.go)
            4. Add `DedupStats()` method to Client (mirror api/client.go lines 117-125):
               ```go
               func (c *Client) DedupStats() *dedup.Stats {
                   if c.dedupCache == nil {
                       return nil
                   }
                   stats := c.dedupCache.Stats()
                   return &stats
               }
               ```

            ## Tests
            - `go test ./pkg/agent/backend/bedrock` — verify existing tests still pass
            - No new tests needed (dedup is tested in pkg/agent/dedup/cache_test.go)

            ## Verification Gate
            ```bash
            cd /Users/dayna.blackwell/code/scout-and-wave-go
            go build ./...
            go vet ./pkg/agent/backend/bedrock
            go test ./pkg/agent/backend/bedrock -timeout 30s
            ```

            ## Constraints
            - Do NOT modify any dedup package files (cache.go, middleware.go)
            - Follow api/client.go pattern exactly (lines 18, 40, 84-94, 117-125)
            - Preserve all existing Bedrock backend functionality
            - DedupStats() must return nil if dedupCache is nil (thread-safe)

            ## Files
            - Modify: `pkg/agent/backend/bedrock/client.go`
            - Reference: `pkg/agent/backend/api/client.go` (dedup integration pattern)
