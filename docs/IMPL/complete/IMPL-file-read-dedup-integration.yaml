            # Agent D: Collect DedupStats in Orchestrator

            ## What to Implement
            In the orchestrator's `launchAgent()` function, retrieve dedup stats from
            the runner after agent execution and populate the completion report before
            saving to the IMPL doc. This is the critical missing integration point.

            ## Interfaces to Consume
            - `Runner.DedupStats()` — returns dedup metrics (implemented by Agent C)
            - `protocol.CompletionReport.DedupStats` field — already exists in types.go

            ## Implementation Steps
            1. Locate the completion report creation in `launchAgent()` (around line 844)
            2. After the `report` variable is created or populated (line 844-851), add:
               ```go
               // Populate dedup stats if available
               if r.runner != nil {
                   if stats := r.runner.DedupStats(); stats != nil {
                       report.DedupStats = stats
                   }
               }
               ```
            3. Place this BEFORE the report persistence block (lines 857-869) so the
               stats are included when saved to the IMPL doc

            ## Tests
            - `go test ./pkg/orchestrator` — verify existing orchestrator tests pass
            - Integration test: Run a wave with API backend and verify DedupStats appear
              in the saved completion report

            ## Verification Gate
            ```bash
            cd /Users/dayna.blackwell/code/scout-and-wave-go
            go build ./...
            go vet ./pkg/orchestrator
            go test ./pkg/orchestrator -timeout 60s
            ```

            ## Constraints
            - Only modify lines 844-856 (completion report creation block)
            - Do NOT modify report persistence logic (lines 857-869)
            - Handle nil runner gracefully (orchestrator may not always have runner set)
            - Preserve all existing completion report fields

            ## Files
            - Modify: `pkg/orchestrator/orchestrator.go`
          files:
            - pkg/orchestrator/orchestrator.go
          dependencies:
