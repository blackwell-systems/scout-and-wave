        - id: C
          task: |
            # Agent C: Expose DedupStats from Runner

            ## What to Implement
            Add a `DedupStats()` method to the Runner that retrieves dedup stats from
            the backend after agent execution. This enables the orchestrator to collect
            and persist stats in completion reports.

            ## Interfaces to Consume
            - `backend.Backend.DedupStats()` — backend interface method (implemented by
              api, bedrock, openai clients)

            ## Implementation Steps
            1. Add `DedupStats()` method to Runner (after line 109):
               ```go
               // DedupStats returns dedup metrics from the most recent agent execution.
               // Returns nil if the backend does not implement DedupStats or no execution occurred.
               func (r *Runner) DedupStats() *dedup.Stats {
                   type dedupStatsProvider interface {
                       DedupStats() *dedup.Stats
                   }
                   if provider, ok := r.client.(dedupStatsProvider); ok {
                       return provider.DedupStats()
                   }
                   return nil
               }
               ```
            2. Import `github.com/blackwell-systems/scout-and-wave-go/pkg/agent/dedup`
               at the top of the file

            ## Tests
            - `go test ./pkg/agent` — verify existing runner tests still pass
            - The method uses type assertion to avoid breaking backends that don't
              implement DedupStats yet

            ## Verification Gate
            ```bash
            cd /Users/dayna.blackwell/code/scout-and-wave-go
            go build ./...
            go vet ./pkg/agent
            go test ./pkg/agent -timeout 30s
            ```

            ## Constraints
            - Do NOT modify backend interface (backend.Backend) — use type assertion
            - Method must return nil for backends without DedupStats (backward compatible)
            - Do NOT modify Execute/ExecuteStreaming methods — this is stats retrieval only

            ## Files
            - Modify: `pkg/agent/runner.go`
          files:
            - pkg/agent/runner.go
