    - number: 2
      agents:
        - id: D
          task: |
            ## What to Implement

            Enhance the web API resume flow with two changes:

            **1. Update handleInterruptedSessions (resume_handler.go):**
            Modify the existing handler to use `resume.DetectWithConfig()` instead of
            calling `resume.Detect()` per-repo in a loop. Use `s.getConfiguredRepos()`
            (already defined on Server — do NOT re-read saw.config.json inline) to get
            the repo list, extract the paths, and pass as `[]string` to `DetectWithConfig`.
            This fixes cross-repo worktree detection (Issue 1) from the web side.

            **2. Create handleResumeExecution (resume_action.go):**
            New POST /api/wave/{slug}/resume endpoint that performs intelligent resume:
            - Extract `slug` from the URL path parameter
            - Call `resume.DetectWithConfig(repoPaths)` (using `s.getConfiguredRepos()` for paths)
            - Filter results to find the single `SessionState` where `session.IMPLSlug == slug`.
              If zero match, return 404. If multiple match (same slug in two repos), return 409.
            - Determine which agents in the current wave need re-launch:
              * Agents with completion reports status "complete" -> skip
              * Agents with dirty worktrees (has_changes=true) -> re-launch in existing worktree
              * Agents with clean worktrees or no worktree -> fresh re-launch
            - Use `engine.RunSingleAgent(ctx, opts, waveNum, agentLetter, prefix, onEvent)` for
              each agent. **Important:** `RunSingleAgent` always creates a new worktree. For
              agents with an existing dirty worktree, set the worktree path on the orchestrator
              before calling RunSingleAgent by calling `opts.ExistingWorktreePaths[letter] = path`
              if that map field exists, or pass the path via a prompt prefix note. If the engine
              does not support existing-worktree resumption yet, document this as a known limitation
              and launch fresh (the dirty worktree data is still surfaced to the user for awareness).
            - Publish SSE events: "resume_started", "agent_resumed", "resume_complete"
            - Return 202 Accepted immediately, run in background goroutine

            **3. Register the route in server.go:**
            In `New()` (or wherever routes are registered), add:
            ```go
            mux.HandleFunc("POST /api/wave/{slug}/resume", s.handleResumeExecution)
            ```
            Read server.go first to find the exact registration pattern used for other /api/wave/ routes.

            ## Interfaces to Implement
            - `func (s *Server) handleResumeExecution(w http.ResponseWriter, r *http.Request)`

            ## Interfaces to Call
            - `resume.DetectWithConfig(repoPaths)` — from Agent A (Wave 1, scout-and-wave-go)
            - `resume.ClassifyWorktrees(paths, manifest)` — from Agent B (Wave 1)
            - `resume.LoadAgentSessions(stateDir, slug)` — from Agent C (Wave 1)
            - `engine.RunSingleAgent(ctx, opts, wave, letter, prefix, publisher)` — existing
            - `protocol.Load(implPath)` — existing
            - `s.resolveIMPLPath(slug)` — existing on Server
            - `s.makePublisher(slug)` — existing on Server

            ## Tests to Write
            1. TestHandleResumeExecution_NoInterruptedSession — returns 404 when no interrupted session found
            2. TestHandleResumeExecution_Accepted — returns 202 for valid slug with interrupted session
            3. TestHandleInterruptedSessions_UsesDetectWithConfig — verify it calls DetectWithConfig

            ## Verification Gate
            ```bash
            cd /Users/dayna.blackwell/code/scout-and-wave-web
            go build ./...
            go vet ./...
            go test ./pkg/api/ -run TestHandleResume -v
            ```

            ## Constraints
            - Modify server.go to register the route — this is in your file ownership
            - handleResumeExecution must use `s.activeRuns.LoadOrStore(slug, struct{}{})` (atomic,
              not `Load`) to claim the run slot before launching any goroutine. Call
              `defer s.activeRuns.Delete(slug)` inside the background goroutine. This mirrors
              wave_runner.go line ~40 exactly.
            - Use `RunSingleAgent` (not `RunSingleWave`) to launch individual agents
            - Use `s.getConfiguredRepos()` for repo paths — do NOT read saw.config.json inline
            - The resume_handler.go modification must remain backward-compatible: if
              DetectWithConfig returns an error, fall back to the original per-repo Detect() loop
