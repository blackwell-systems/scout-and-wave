pre_mortem:
    overall_risk: medium
    rows:
        - scenario: Agent A's struct definitions and Agent B/C's usage compile independently but have field name mismatches at merge
          likelihood: low
          impact: high
          mitigation: Interface contracts specify exact field names and JSON tags. All three agents are in the same Go package so compilation catches mismatches immediately at merge.
        - scenario: Cross-repo git worktree list returns worktrees from repos where the user has unrelated SAW work, polluting results
          likelihood: medium
          impact: low
          mitigation: Slug-scoped branch filtering (saw/{slug}/wave{N}-agent-{ID}) already exists in detect.go. DetectWithConfig inherits this filtering.
        - scenario: Agent D's resume endpoint conflicts with existing handleWaveStart race condition on s.activeRuns
          likelihood: medium
          impact: medium
          mitigation: Resume handler must check s.activeRuns.LoadOrStore (same pattern as handleWaveStart). Specified in agent constraints.
        - scenario: Frontend build fails because types.ts changes from Agent E conflict with other in-progress web work
          likelihood: low
          impact: medium
          mitigation: Agent E only adds optional fields and new interfaces to types.ts. Additive-only changes minimize conflict risk.
known_issues:
    - title: scout-and-wave-web uses local replace directive for scout-and-wave-go
      description: go.mod has 'replace github.com/blackwell-systems/scout-and-wave-go => /Users/dayna.blackwell/code/scout-and-wave-go'. Wave 1 changes to scout-and-wave-go are immediately visible to Wave 2 agents in scout-and-wave-web without a version bump.
      status: By design — local development workflow
      workaround: Ensure Wave 1 is fully merged before Wave 2 agents build.
    - title: SaveAgentSession is not called by the engine launcher — AgentSessions map will be empty until wired
      description: |
        Agent C implements SaveAgentSession/LoadAgentSessions correctly, but nothing in
        pkg/engine/runner.go or pkg/orchestrator/orchestrator.go calls SaveAgentSession when
        an agent subprocess is launched. As a result, LoadAgentSessions always returns an
        empty map and the 'Resume (continue N agents)' flow cannot identify which Claude
        session to resume.
      status: Known post-merge integration gap
      workaround: |
        After this IMPL merges, wire SaveAgentSession in the engine's agent launch path.
        Location: pkg/engine/runner.go, after the agent subprocess is started (line ~120 approx).
        Call:
          resume.SaveAgentSession(stateDir, slug, resume.AgentSession{
              AgentID:      letter,
              WaveNum:      waveNum,
              WorktreePath: worktreePath,
              LastActive:   time.Now().Format(time.RFC3339),
          })
        The session ID (Claude Code session ID) is not available at launch time in the current
        engine; that is a separate enhancement. For now, SessionID can be empty string.
    - title: RunSingleAgent always creates a new worktree — true in-session resume not yet supported
      description: |
        The handleResumeExecution handler identifies agents with dirty worktrees (uncommitted work)
        and intends to resume them in their existing worktree. However, RunSingleAgent calls
        orchestrator.RunAgent which unconditionally creates a new worktree. There is no
        ExistingWorktreePaths field on RunWaveOpts yet.
      status: Known limitation — degrades gracefully
      workaround: |
        The feature still provides value: dirty worktree data is surfaced to the user,
        and re-launch is correct even if it doesn't continue the original session context.
        True in-session resume requires a future engine enhancement to pass existing worktree
        paths to RunSingleAgent.
