interface_contracts:
    - name: SessionState (extended)
      description: |
        The existing SessionState struct gains new fields for dirty worktree
        classification, agent session IDs, and per-worktree agent mapping.
        All new fields are omitempty for backward compatibility.
      definition: |
        // Added to existing SessionState in pkg/resume/detect.go:
        type SessionState struct {
            // ... existing fields unchanged ...
            DirtyWorktrees  []DirtyWorktree         `json:"dirty_worktrees,omitempty"`
            AgentSessions   map[string]AgentSession  `json:"agent_sessions,omitempty"`
        }

        type DirtyWorktree struct {
            Path       string `json:"path"`
            Branch     string `json:"branch"`
            AgentID    string `json:"agent_id"`
            WaveNum    int    `json:"wave_num"`
            HasChanges bool   `json:"has_changes"`  // uncommitted modifications
        }

        type AgentSession struct {
            AgentID       string `json:"agent_id"`
            SessionID     string `json:"session_id"`      // Claude Code session ID
            WaveNum       int    `json:"wave_num"`
            WorktreePath  string `json:"worktree_path"`
            LastActive    string `json:"last_active"`      // RFC3339 timestamp
        }
      location: pkg/resume/detect.go
    - name: DetectWithConfig
      description: |
        New function that accepts a list of repo paths (from saw.config.json)
        and scans worktrees across all repos for the given IMPL manifest.
        Called by the web app's resume handler instead of per-repo Detect().
      definition: |
        func DetectWithConfig(repoPaths []string) ([]SessionState, error)
      location: pkg/resume/detect.go
    - name: ClassifyWorktrees
      description: |
        Inspects each worktree path to determine if it has uncommitted changes
        (dirty) or is clean. Uses git status --porcelain on the worktree path.
      definition: |
        func ClassifyWorktrees(worktreePaths []string, manifest *protocol.IMPLManifest) ([]DirtyWorktree, error)
      location: pkg/resume/worktree_status.go
    - name: SaveAgentSession / LoadAgentSessions
      description: |
        Persists and loads agent session IDs to/from .saw-state/sessions/{slug}.json.
        SaveAgentSession is called by the engine when launching an agent.
        LoadAgentSessions is called by Detect to populate SessionState.AgentSessions.
      definition: |
        func SaveAgentSession(stateDir string, slug string, session AgentSession) error
        func LoadAgentSessions(stateDir string, slug string) (map[string]AgentSession, error)
      location: pkg/resume/sessions.go
    - name: handleResumeExecution
      description: |
        New POST /api/wave/{slug}/resume endpoint. Loads SessionState, determines
        which agents need re-launch (dirty worktrees = resume, clean = skip),
        and calls engine.RunSingleWave with only the pending agents.
      definition: |
        func (s *Server) handleResumeExecution(w http.ResponseWriter, r *http.Request)
      location: pkg/api/resume_action.go
    - name: InterruptedSession (TypeScript, extended)
      description: |
        Frontend type gains dirty_worktrees and agent_sessions fields
        to support the enhanced resume UI.
      definition: |
        // Added to existing InterruptedSession in web/src/types.ts:
        interface DirtyWorktree {
          path: string
          branch: string
          agent_id: string
          wave_num: number
          has_changes: boolean
        }
        interface AgentSessionInfo {
          agent_id: string
          session_id: string
          wave_num: number
          worktree_path: string
          last_active: string
        }
        // Extend InterruptedSession:
        dirty_worktrees?: DirtyWorktree[]
        agent_sessions?: Record<string, AgentSessionInfo>
      location: web/src/types.ts
waves:
    - number: 1
      agents:
        - id: A
          task: |
            ## What to Implement

            Extend the resume detection system to support cross-repo worktree scanning
            and improve wave inference when no completion reports exist.

            **Cross-repo detection (Issue 1):**
            Add `DetectWithConfig(repoPaths []string) ([]SessionState, error)` that accepts
            a list of repo paths and runs `git worktree list --porcelain` in ALL repos,
            not just the IMPL's own repo. For each IMPL manifest found (by scanning each
            repo's `docs/IMPL/` directory), aggregate worktrees from **all** repos by
            matching the slug-scoped branch pattern `saw/{slug}/wave{N}-agent-{ID}`.

            **Critical:** The internal `detectOrphanedWorktrees(repoPath, manifest)` function
            currently receives a single `repoPath`. You must change its signature to:
            ```go
            func detectOrphanedWorktrees(repoPaths []string, manifest *protocol.IMPLManifest) ([]string, error)
            ```
            It must loop over all `repoPaths` and run `git worktree list --porcelain` in each,
            collecting matching branches across all repos. Without this change, `DetectWithConfig`
            silently only scans the manifest's home repo.

            The existing `Detect(repoPath string)` function must remain for backward
            compatibility but should internally call `DetectWithConfig` with a
            single-element slice: `DetectWithConfig([]string{repoPath})`.

            **Wave inference from worktrees (Issue 2):**
            Modify `determineCurrentWave()` to fall back to worktree branch names when
            no completion reports exist. If completion reports give wave 0 but orphaned
            worktrees exist with branch names matching `wave{N}-agent-{ID}`, extract the
            wave number from the branch name and use the highest as currentWave. This
            means agents were launched but none completed yet.

            **SessionState extensions:**
            Add two new fields to SessionState:
            - `DirtyWorktrees []DirtyWorktree` (json:"dirty_worktrees,omitempty")
            - `AgentSessions map[string]AgentSession` (json:"agent_sessions,omitempty")

            Define the DirtyWorktree and AgentSession structs per the interface contract.
            These are populated by Agents B and C respectively, but the struct definitions
            live here since SessionState is in this file.

            **Action misclassification fix (partial, Issue 3):**
            Update `buildActionAndCommand()` so that when orphaned worktrees exist,
            the suggested action distinguishes between dirty and clean worktrees.
            Add a `dirtyWorktrees []DirtyWorktree` parameter to `buildActionAndCommand`:
            ```go
            func buildActionAndCommand(manifest *protocol.IMPLManifest, orphaned []string, dirtyWorktrees []DirtyWorktree) (string, string)
            ```
            Logic:
            - If ANY DirtyWorktree has `HasChanges: true` -> "Resume wave N (agents have uncommitted work)"
            - If ALL worktrees are clean -> "Clean up orphaned worktrees, then resume wave N"

            **Critical call order in `buildSessionState`:**
            1. Call `detectOrphanedWorktrees(allRepoPaths, manifest)` → `orphaned []string`
            2. Call `ClassifyWorktrees(orphaned, manifest)` → `dirty []DirtyWorktree`
            3. Call `buildActionAndCommand(manifest, orphaned, dirty)` → action/command strings
            4. Assemble `SessionState{..., DirtyWorktrees: dirty}` using the result from step 2

            ClassifyWorktrees and LoadAgentSessions are in the same package (pkg/resume).
            They will be defined by Agents B and C respectively, compiled together at merge.
            Use them as forward references — do not stub them.

            Note: The worktree fallback uses the **lowest** wave number with orphaned worktrees,
            not the highest. If wave 1 and wave 2 both have orphaned worktrees, wave 1 is
            incomplete — return wave 1 as the current wave.

            ## Interfaces to Implement
            - `func DetectWithConfig(repoPaths []string) ([]SessionState, error)`
            - `func detectOrphanedWorktrees(repoPaths []string, manifest *protocol.IMPLManifest) ([]string, error)` — updated signature
            - `func buildActionAndCommand(manifest *protocol.IMPLManifest, orphaned []string, dirtyWorktrees []DirtyWorktree) (string, string)` — updated signature
            - `type DirtyWorktree struct { ... }` and `type AgentSession struct { ... }`
            - Extended `determineCurrentWave()` with worktree fallback (use lowest incomplete wave, not highest)

            ## Interfaces to Call
            - `protocol.Load(implPath)` — existing, unchanged
            - `ClassifyWorktrees(paths, manifest)` — from Agent B (same package, will compile together)
            - `LoadAgentSessions(stateDir, slug)` — from Agent C (same package)

            ## Tests to Write
            1. TestDetectWithConfig_MultipleRepos — verify worktrees from sibling repos are found
            2. TestDetermineCurrentWave_FallbackToWorktrees — wave inferred from branch names when no reports
            3. TestBuildAction_DirtyWorktrees — "Resume" vs "Clean up" based on dirty status
            4. TestDetectWithConfig_EmptyRepoList — returns empty, no error

            ## Verification Gate
            ```bash
            cd /Users/dayna.blackwell/code/scout-and-wave-go
            go build ./...
            go vet ./...
            go test ./pkg/resume/ -v
            ```

            ## Constraints
            - Do NOT break the existing Detect(repoPath) signature; it must remain backward compatible
            - All new JSON fields must use omitempty
            - The DirtyWorktree and AgentSession structs must match the interface contract exactly
            - ClassifyWorktrees and LoadAgentSessions are in the same package but different files
              (Agent B and C); use forward references — they will compile together at merge time
          files:
            - pkg/resume/detect.go
            - pkg/resume/detect_test.go
        - id: B
          task: |
            ## What to Implement

            Create `pkg/resume/worktree_status.go` with dirty worktree classification.

            **ClassifyWorktrees function:**
            Given a list of worktree paths and a manifest, check each worktree for
            uncommitted changes using `git -C <path> status --porcelain`. Parse the
            worktree's branch name to extract agent ID and wave number using the
            existing `worktreePattern` regex from detect.go (same package, accessible).

            Return a `[]DirtyWorktree` where each entry has:
            - Path: the worktree filesystem path
            - Branch: the branch name
            - AgentID: extracted from branch pattern
            - WaveNum: extracted from branch pattern
            - HasChanges: true if `git status --porcelain` returns non-empty output

            Handle edge cases:
            - Worktree path does not exist (skip, do not error)
            - git command fails (treat as not dirty, log warning)
            - Branch name does not match SAW pattern (skip)
            - **Slug filtering (required):** Only include worktrees where the branch name
              matches `saw/{manifest.FeatureSlug}/wave{N}-agent-{ID}` or the legacy
              unscoped `wave{N}-agent-{ID}` pattern. Reject branches belonging to other
              slugs to prevent cross-IMPL contamination.
            - **Locked worktrees:** If the worktree is locked (present in `git worktree list`
              output but has a `locked` reason), treat it as `HasChanges: true` —
              conservatively assume work exists rather than risk losing it.

            ## Interfaces to Implement
            - `func ClassifyWorktrees(worktreePaths []string, manifest *protocol.IMPLManifest) ([]DirtyWorktree, error)`

            ## Interfaces to Call
            - `worktreePattern` regex — defined in detect.go (same package)
            - `git -C <path> status --porcelain` via os/exec
            - `protocol.IMPLManifest` — for slug filtering

            ## Tests to Write
            1. TestClassifyWorktrees_DirtyWorktree — create a git repo + worktree with uncommitted file, verify HasChanges=true
            2. TestClassifyWorktrees_CleanWorktree — worktree with no changes, verify HasChanges=false
            3. TestClassifyWorktrees_NonexistentPath — path does not exist, returns empty slice (no error)
            4. TestClassifyWorktrees_MixedDirtyClean — 2 worktrees, one dirty one clean, verify correct classification

            ## Verification Gate
