    File decomposition: 6 distinct files across 4 agents with disjoint ownership.
    Three new reference files (extract from scout.md), one modified core prompt
    (scout.md slim-down), one modified hook (validate_agent_launch), one modified
    skill file (saw-skill.md routing table update).

    Investigation-first: None. Extraction boundaries are precisely defined in the
    feature description with line ranges.

    Interface discoverability: Yes. The dedup marker format (<!-- injected: X -->)
    and extraction boundaries are specified upfront. File paths are known.

    Pre-implementation status: Fresh feature, nothing implemented yet.

    Parallelization value: This is documentation/prompt editing work with no
    build/test cycles. However, 4 agents across 2 waves with disjoint file
    ownership means clear coordination value. The extraction boundaries are
    well-defined and agents can work independently within their wave.

    Estimated times:
    - Scout phase: ~8 min (dependency mapping, interface contracts, IMPL doc)
    - Agent execution: ~8 min (4 agents in wave 1, 1 agent in wave 2, ~5 min avg)
    - Merge & verification: ~3 min
    Total SAW time: ~19 min

    Sequential baseline: ~25 min (5 agents x 5 min avg)
    Time savings: ~6 min (24% faster)

    Recommendation: Clear coordination value. The IMPL doc ensures extraction
    boundaries are consistent across all agents and no content is duplicated
    or lost.
