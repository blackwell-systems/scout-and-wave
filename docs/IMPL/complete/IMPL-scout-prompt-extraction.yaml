            The scout detection is gated behind explicit checks (description pattern,
            prompt content). Non-scout agents skip the entire injection block.
            Existing checks 1-8 are not modified.
        - scenario: Dedup markers not recognized due to whitespace or encoding differences
          likelihood: low
          impact: low
          mitigation: |
            Markers use a simple grep-based check. The exact marker format is
            specified in the interface contract and used consistently across
            all files.
