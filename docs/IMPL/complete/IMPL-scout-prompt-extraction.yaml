interface_contracts:
    - name: Dedup marker format
      description: |
        HTML comment markers wrapping injected reference content. Used by
        validate_agent_launch hook to avoid double-injection, and by scout.md
        to skip reading references already in context.
      definition: |
        Format: <!-- injected: references/scout-{name}.md -->
        Where {name} is one of: suitability-gate, implementation-process, program-contracts

        The hook checks the agent prompt for these markers before injecting.
        The scout.md core file instructs: "skip reading reference if marker already in context."
      location: implementations/claude-code/hooks/validate_agent_launch
    - name: Reference file back-link header
      description: |
        Each extracted reference file begins with a back-link comment indicating
        it is part of the scout agent procedure, not a standalone skill.
      definition: |
        First line of each reference file:
        <!-- Part of scout agent procedure. Loaded by validate_agent_launch hook. -->
      location: implementations/claude-code/prompts/references/
    - name: Scout core reference loading block
      description: |
        Block in slim scout.md that instructs the agent about reference files
        and dedup behavior.
      definition: |
        ## Reference Files

        The following reference files contain detailed procedure steps. They are
        normally injected by the validate_agent_launch hook before this prompt
        is delivered. If you see `<!-- injected: references/scout-X.md -->` markers
        in your context, the content is already loaded — do not re-read those files.

        If the markers are absent (e.g., hook not installed), read these files:
        - `${CLAUDE_SKILL_DIR}/references/scout-suitability-gate.md` — 5-question suitability checklist
        - `${CLAUDE_SKILL_DIR}/references/scout-implementation-process.md` — Steps 1-17 for IMPL doc production
        - `${CLAUDE_SKILL_DIR}/references/scout-program-contracts.md` — Program contract handling (only when --program flag present)
      location: implementations/claude-code/prompts/agents/scout.md
    - name: Hook injection for scout subagent_type
      description: |
        New check in validate_agent_launch that detects scout agent launches
        and injects reference file contents into the prompt via hook output.
      definition: |
        Detection: Parse subagent_type from tool_input or description.
        If description contains "[SAW:scout" OR tool_input contains "subagent_type: scout"
        OR the prompt contains "# Scout Agent: Pre-Flight Dependency Mapping":

        1. Resolve reference directory: find scout-and-wave repo references/ dir
        2. Always inject: scout-suitability-gate.md, scout-implementation-process.md
        3. Conditionally inject scout-program-contracts.md (when "--program" in prompt)
        4. Dedup: skip injection if <!-- injected: references/scout-X.md --> already in prompt
        5. Output: JSON using PreToolUse updatedInput to prepend injected content to
           the agent's prompt parameter (NOT additionalContext — that goes to the
           orchestrator, not the subagent):
           {"hookSpecificOutput": {"hookEventName": "PreToolUse",
            "permissionDecision": "allow",
            "updatedInput": {"prompt": "<injected>\n\n<original-prompt>"}}}
      location: implementations/claude-code/hooks/validate_agent_launch
