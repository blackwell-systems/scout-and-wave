            **New section: Scout reference injection (Check 9)**

            ```bash
            # --- Check 9: Scout reference injection ---
            # When launching a scout agent, inject reference files as additionalContext
            # This provides the suitability gate and implementation process without
            # the scout needing to read them manually.

            # Detect scout agent type from description or prompt
            is_scout=false
            if [[ "$description" =~ \[SAW:scout ]] || \
               [[ "$prompt" =~ "subagent_type: scout" ]] || \
               [[ "$prompt" =~ "# Scout Agent: Pre-Flight Dependency Mapping" ]]; then
              is_scout=true
            fi

            if [[ "$is_scout" == "true" ]]; then
              # Resolve references directory
              ref_dir=""
              # Try skill directory first
              skill_dir="${CLAUDE_SKILL_DIR:-${HOME}/.claude/skills/saw}"
              if [[ -d "${skill_dir}/references" ]]; then
                ref_dir="${skill_dir}/references"
              fi

              if [[ -n "$ref_dir" ]]; then
                inject_content=""

                # Always inject suitability gate
                ref_file="${ref_dir}/scout-suitability-gate.md"
                if [[ -f "$ref_file" ]] && ! echo "$prompt" | grep -q '<!-- injected: references/scout-suitability-gate.md -->'; then
                  inject_content+="<!-- injected: references/scout-suitability-gate.md -->"$'\n'
                  inject_content+="$(cat "$ref_file")"$'\n\n'
                fi

                # Always inject implementation process
                ref_file="${ref_dir}/scout-implementation-process.md"
                if [[ -f "$ref_file" ]] && ! echo "$prompt" | grep -q '<!-- injected: references/scout-implementation-process.md -->'; then
                  inject_content+="<!-- injected: references/scout-implementation-process.md -->"$'\n'
                  inject_content+="$(cat "$ref_file")"$'\n\n'
                fi

                # Conditionally inject program contracts (only with --program flag)
                if echo "$prompt" | grep -q '\-\-program'; then
                  ref_file="${ref_dir}/scout-program-contracts.md"
                  if [[ -f "$ref_file" ]] && ! echo "$prompt" | grep -q '<!-- injected: references/scout-program-contracts.md -->'; then
                    inject_content+="<!-- injected: references/scout-program-contracts.md -->"$'\n'
                    inject_content+="$(cat "$ref_file")"$'\n\n'
                  fi
                fi

                # Prepend injected content to the agent's prompt via updatedInput
                if [[ -n "$inject_content" ]]; then
                  jq -n --arg inject "$inject_content" --arg orig "$prompt" \
                    '{"hookSpecificOutput": {"hookEventName": "PreToolUse", "permissionDecision": "allow", "updatedInput": {"prompt": ($inject + "\n\n" + $orig)}}}'
                  exit 0
                fi
              fi
            fi
            ```

            **IMPORTANT implementation notes:**
            - Use `command cat` (not bare `cat`) for reading reference files — avoids
              brewprune-shim issues. The existing `input=$(cat)` at line 32 reads from
              stdin; leave it as-is.
            - The dedup check uses grep on `$prompt` (the original agent prompt, parsed
              from the hook's JSON input at the top of the hook). If the marker is already
              present, skip that reference file.
            - **updatedInput, NOT additionalContext.** PreToolUse `additionalContext`
              injects into the orchestrator's context, not the subagent being launched.
              The correct mechanism is `updatedInput.prompt` — this modifies the Agent
              tool's `prompt` parameter before execution, so the subagent receives the
              reference content as part of its initial context.
            - `permissionDecision: "allow"` is required alongside `updatedInput` to
              signal the hook approves the tool call with the modified input.
            - The `$prompt` jq variable holds the original prompt string; concatenate
              injected content before it so reference files appear before the task.

