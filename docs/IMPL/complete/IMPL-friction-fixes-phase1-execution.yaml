suitability_assessment: |
    All five suitability gate questions resolve cleanly:

    **Q1: File decomposition** — Yes. 4 friction items map to 8 distinct files across 2 repos
    with no conflicts. Agents A/D/E (Wave 1) work in scout-and-wave-go. Agents B/C (Wave 2)
    work in scout-and-wave-go. Agent F (Wave 2) works in scout-and-wave (protocol docs only).

    **Q2: Investigation-first** — No investigation needed. All issues have known root
    causes from dogfooding execution. F2: prepare-wave blocks on "ISSUES" verdict without
    checking severity (ROADMAP P5). F3: close-impl state transition warning. F4: finalize-wave
    single-repo limitation.

    **Q3: Interface discoverability** — Yes. F2 requires CriticGatePasses helper (Wave 1
    Agent A), consumed by Wave 2 Agents B/C. F3 and F4 are independent changes.

    **Q4: Pre-implementation status check** — All TODO except F1. F1 already implemented
    (set-impl-state command exists at cmd/sawtools/set_impl_state_cmd.go). F2/F3/F4 confirmed
    missing via grep.

    **Q5: Parallelization value** — High. Wave 1: 3 parallel agents (A/D/E) × 5 min = 15 min
    wall time. Wave 2: 3 parallel agents (B/C/F) × 4 min = 4 min wall time. Sequential would
    be 6 agents × 6 min = 36 min. SAW overhead ~8 min. Net: 27 min SAW vs 36 min sequential,
    25% faster. Agent F (docs) runs alongside B/C with no additional wall time.

    **Estimated times:**
    - Scout phase: ~3 min (8 files, 1 interface contract)
    - Wave 1 execution: ~15 min (3 agents × 5 min avg, parallel)
    - Wave 2 execution: ~4 min (3 agents × 4 min avg, parallel; B/C wait for A, F waits for A/D/E)
    - Merge & verification: ~4 min (2 waves)
    Total SAW time: ~26 min

    Sequential baseline: ~36 min (6 agents × 6 min avg sequential time)
    Time savings: ~10 min (28% faster)

    Recommendation: Marginal speed gains, but coordination value justifies SAW.
