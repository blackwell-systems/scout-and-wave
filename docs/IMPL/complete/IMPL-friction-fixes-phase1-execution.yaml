            This is the shared E37 enforcement logic for both prepare-wave and prepare-tier.

            **Interface contract:** Implement the `CriticGatePasses` signature exactly as
            shown in interface_contracts above. Return `true` when the critic gate passes
            (PASS verdict, or ISSUES with warnings-only in auto mode), `false` otherwise.

            **Tests:** Create `pkg/protocol/critic_gate_test.go` with test cases:
            - `TestCriticGatePasses_PassVerdict` — PASS verdict returns true
            - `TestCriticGatePasses_IssuesWithErrorsBlocks` — ISSUES with severity:error returns false
            - `TestCriticGatePasses_IssuesWithWarningsOnlyAutoMode` — ISSUES with severity:warning returns true when autoMode=true
            - `TestCriticGatePasses_IssuesWithWarningsOnlyManualMode` — ISSUES with severity:warning returns false when autoMode=false
            - `TestCriticGatePasses_NoCriticReport` — nil CriticReport returns false
            - `TestCriticGatePasses_MixedSeverity` — ISSUES with 2 warnings + 1 error returns false

            **Verification gate:**
            ```bash
            cd $SAW_WORKTREE_ROOT
            go build ./pkg/protocol
            go test ./pkg/protocol -run TestCriticGatePasses
            go vet ./pkg/protocol
            ```

