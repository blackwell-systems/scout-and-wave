            ```markdown
            ## E46: Test File Cascade Detection

            **Trigger:** Scout planning phase (step 4: dependency analysis) OR
            pre-wave validation (E35 detection)

            **Required Action:** When an interface contract involves signature changes
            (parameter modifications, return type migration, method removal), detect test
            files that reference the interface and ensure they are assigned to an agent
            in the same wave.

            **Detection layers:**

            1. **Scout-time (primary):** During dependency analysis, Scout scans for
               `*_test.go` files that reference changed interfaces:
               - For each interface contract with signature change keywords ("migrate",
                 "update signature", "change return type")
               - Run: `find <package-dir> -name "*_test.go" -exec grep -l "InterfaceName" {} \;`
               - Assign orphaned test files to interface-changing agent OR create
                 dedicated test-update agent

            2. **Pre-wave validation (E35 extension):** `sawtools pre-wave-validate`
               runs E35 detection, which includes test cascade detection via
               `detectTestCascades()`. Reports orphaned test files as E35Gap entries
               with CalledFrom pointing to test file locations.

            3. **Post-merge verification (future work):** Documented as third detection
               layer, but not implemented in this IMPL. Future enhancement: add
               `VerifyTestCompilation()` to finalize-wave workflow to run
               `go test -compile-only` and catch missed test cascades before quality gates.

            **Rationale:** Interface signature changes break test files that call the
            interface, but test files are often not included in file_ownership because
            Scout focuses on implementation files. Example from deps-review-fixes IMPL:
            Agent B changed LockFileParser.Parse signature, but 4 test files
            (cargolock_test.go, gosum_test.go, packagelock_test.go, poetrylock_test.go)
            were orphaned, causing 30 min of manual post-merge fixes.

            **Failure Handling:**
            - Scout-time detection prevents the issue (test files assigned to agent)
            - E35 pre-wave validation catches missed cases (blocks wave launch)
            - Post-merge verification is final safety net (blocks merge if tests don't compile)

            **Related Rules:** E35 (same-package caller detection), E3 (pre-launch
            ownership verification)

            ---
            ```

