pre_mortem:
    overall_risk: low
    rows:
        - scenario: E35 detection performance degrades on large repos (scanning all test files)
          likelihood: low
          impact: medium
          mitigation: detectTestCascades skips test files in same-package folders already scanned by E35. If performance issue observed, add caching or limit scan to modified packages only.
        - scenario: Scout test cascade heuristic produces false positives (non-interface grep matches)
          likelihood: medium
          impact: low
          mitigation: Scout instructions include "When to skip" guidance (additive-only changes don't need cascade check). False positives caught by human review of IMPL doc before wave launch.
        - scenario: Post-merge test compilation check fails on non-Go repos
          likelihood: low
          impact: low
          mitigation: VerifyTestCompilation checks for go.mod before running test compilation. Returns nil for non-Go projects.
        - scenario: Test cascade detection misses test files in subdirectories
          likelihood: low
          impact: medium
          mitigation: detectTestCascades uses filepath.Glob with "*_test.go" pattern in package directory. If subdirectory tests exist, Scout instructions note to check pkg/ and internal/ subdirs.
