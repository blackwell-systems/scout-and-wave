pre_mortem:
    overall_risk: low
    rows:
        - scenario: Agent D depends on Agent C's types across wave boundary
          likelihood: low
          impact: medium
          mitigation: |
            Agent C (Wave 2) defines types in program_types.go. Agent D (Wave 3)
            imports them. The interface contract specifies exact struct definitions.
            Wave ordering ensures C merges before D starts.
        - scenario: Cross-repo merge coordination
          likelihood: low
          impact: low
          mitigation: |
            Wave 1 (protocol repo) and Waves 2-3 (Go SDK repo) are in different
            repos. No merge conflicts possible across repos. Within Go SDK, agents
            C and D are in sequential waves with disjoint files.
        - scenario: run-scout skip logic breaks existing program execution
          likelihood: low
          impact: high
          mitigation: |
            Skip logic only activates when IMPL doc exists AND has state
            SCOUT_COMPLETE or later. New IMPLs (status pending, no file) are
            unaffected. Agent D must add tests verifying the skip-only-when-safe
            behavior.
        - scenario: P1 overlap detection false positives with cross-repo file ownership
          likelihood: medium
          impact: low
          mitigation: |
            ValidateProgramImportMode must respect repo field in file_ownership.
            Same filename in different repos is not a conflict (per E3). Agent C's
            tests must cover this case.
