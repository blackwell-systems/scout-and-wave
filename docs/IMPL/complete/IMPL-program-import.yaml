       SDK agents (Wave 2/3). Build/test cycle for Go SDK is >30s. 3+ files per agent.

    Estimated times:
    - Scout phase: ~8 min (dependency mapping, cross-repo interface contracts)
    - Agent execution: ~18 min (4 agents, 3 waves, ~8 min avg per agent)
    - Merge and verification: ~5 min
    Total SAW time: ~31 min

    Sequential baseline: ~40 min (4 agents x 10 min avg)
    Time savings: ~9 min (23% faster)

    Recommendation: Clear speedup. Protocol and SDK work is fully independent in Wave 1.
    Wave 2 (types+validation) unblocks Wave 3 (commands).
