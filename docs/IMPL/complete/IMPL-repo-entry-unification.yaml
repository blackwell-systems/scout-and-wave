            ## Delete service.RepoEntry and migrate pkg/service to config types

            **Context:** The web app's `pkg/service/config_service.go` defines its
            own `RepoEntry`, `SAWConfig`, and all sub-types (AgentConfig, QualityConfig,
            AppearConfig, ProvidersConfig, etc.). These duplicate the unified types
            now in `github.com/blackwell-systems/scout-and-wave-go/pkg/config`.

            **What to implement:**

            1. DELETE all duplicate type definitions from `pkg/service/config_service.go`:
               - RepoEntry, RepoConfig, SAWConfig, AgentConfig, QualityConfig,
                 CodeReviewCfg, AppearConfig, ProvidersConfig, AnthropicProviderConfig,
                 OpenAIProviderConfig, BedrockProviderConfig
            2. Add import: `"github.com/blackwell-systems/scout-and-wave-go/pkg/config"`
            3. Replace `service.GetConfig()` to delegate to `config.Load()`:
               ```go
               func GetConfig(deps Deps) (*config.SAWConfig, error) {
                   r := config.Load(deps.RepoPath)
                   if !r.IsSuccess() {
                       return nil, fmt.Errorf("%s", r.Errors[0].Message)
                   }
                   return r.GetData(), nil
               }
               ```
            4. Update `SaveConfig` to delegate to `config.Save()`.
            5. Update `GetConfiguredRepos` to return `[]config.RepoEntry`.
            6. Update `ValidateModelName` — keep in service (it's validation logic),
