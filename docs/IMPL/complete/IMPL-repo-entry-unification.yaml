interface_contracts:
    - name: config.RepoEntry
      description: Unified repo entry type created by config-state-unification, consumed by all agents in this IMPL
      definition: |
        // Already exists in pkg/config/config.go after config-state-unification completes.
        // This IMPL does NOT redefine it — agents import it.
        type RepoEntry struct {
            Name         string `json:"name"`
            Path         string `json:"path"`
            BuildCommand string `json:"build_command,omitempty"`
            TestCommand  string `json:"test_command,omitempty"`
        }
      location: pkg/config/config.go
    - name: config.Load
      description: Unified config loader created by config-state-unification, replaces inline os.ReadFile+json.Unmarshal
      definition: |
        // Already exists in pkg/config/config.go after config-state-unification completes.
        func Load(startDir string) result.Result[*SAWConfig]
      location: pkg/config/config.go
    - name: protocol.RepoEntry removal
      description: Delete protocol.RepoEntry and update all callers to use config.RepoEntry
      definition: |
        // DELETE from pkg/protocol/repo_resolve.go:
        //   type RepoEntry struct { ... }
        //
        // All function signatures change from:
        //   func Foo(..., configRepos []RepoEntry) ...
        // to:
        //   func Foo(..., configRepos []config.RepoEntry) ...
        //
        // Affected functions in pkg/protocol/:
        //   - ResolveTargetRepos(manifest, fallbackPath, configRepos []config.RepoEntry)
        //   - ValidateRepoMatch(manifest, worktreePath, configRepos []config.RepoEntry)
        //   - ValidateFileExistenceMultiRepo(m, primaryPath, configRepos []config.RepoEntry)
        //   - RunCrossRepoBaselineGates(manifest, wave, targetRepos, configRepos []config.RepoEntry)
        //   - ResolveAgentRepo(fileOwnership []FileOwnership, agentID string, fallbackRoot string, repos []config.RepoEntry)
      location: pkg/protocol/repo_resolve.go
    - name: service.RepoEntry removal
      description: Delete service.RepoEntry and all duplicate types in web app, use config.RepoEntry
      definition: |
        // DELETE from pkg/service/config_service.go:
        //   type RepoEntry struct { Name string; Path string }
        //   type SAWConfig struct { ... }  (and all sub-types)
        //
        // DELETE from pkg/api/types.go:
        //   type RepoEntry struct { Name string; Path string }
        //   type SAWConfig struct { ... }  (and all sub-types)
        //
        // Replace with imports from config package:
        //   import "github.com/blackwell-systems/scout-and-wave-go/pkg/config"
        //   // Use config.RepoEntry, config.SAWConfig everywhere
      location: pkg/service/config_service.go
waves:
    - number: 1
      agents:
        - id: A
          task: |
            ## Delete protocol.RepoEntry and migrate all pkg/protocol callers

            **Context:** config-state-unification has created `pkg/config/config.go`
            with a unified `config.RepoEntry` type (same fields: Name, Path,
            BuildCommand, TestCommand). The old `protocol.RepoEntry` in
            `pkg/protocol/repo_resolve.go` is now redundant.

            **What to implement:**

            1. DELETE the `RepoEntry` struct from `pkg/protocol/repo_resolve.go` (lines 9-16).
            2. Add `import "github.com/blackwell-systems/scout-and-wave-go/pkg/config"`
               to every file that previously used `protocol.RepoEntry`.
            3. Update ALL function signatures to use `config.RepoEntry`:
               - `ResolveTargetRepos(manifest, fallbackPath, configRepos []config.RepoEntry)`
               - `ValidateRepoMatch(manifest, worktreePath, configRepos []config.RepoEntry)`
               - `ValidateFileExistenceMultiRepo(m, primaryPath, configRepos []config.RepoEntry)`
               - `RunCrossRepoBaselineGates(manifest, wave, targetRepos, configRepos []config.RepoEntry)`
               - `ResolveAgentRepo(fileOwnership []FileOwnership, agentID string, fallbackRoot string, repos []config.RepoEntry)`
            4. Update all internal usages (e.g., `configLookup := make(map[string]config.RepoEntry, ...)`).
            5. Update ALL test files to construct `config.RepoEntry{}` instead of `protocol.RepoEntry{}`.

            **Files:**
            - pkg/protocol/repo_resolve.go — delete RepoEntry struct, update function sigs
            - pkg/protocol/repo_resolve_test.go — update test constructors
            - pkg/protocol/multi_repo.go — update function sig
            - pkg/protocol/multi_repo_test.go — update test constructors
            - pkg/protocol/baseline_gates.go — update RunCrossRepoBaselineGates sig + body
            - pkg/protocol/baseline_gates_test.go — update test constructors
            - pkg/protocol/file_existence_validator.go — update ValidateFileExistenceMultiRepo sig
            - pkg/protocol/file_existence_validator_test.go — update test constructors

            **Constraints:**
            - No type aliases. No backward compatibility shims. Clean break.
            - Do NOT touch cmd/saw/ files — Agent B handles those.
            - config.RepoEntry has the same JSON tags as protocol.RepoEntry, so
              no serialization changes are needed.

