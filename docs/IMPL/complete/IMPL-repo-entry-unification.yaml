title: RepoEntry Unification & Inline Config Migration
feature_slug: repo-entry-unification
verdict: SUITABLE
suitability_assessment: |
    Suitability gate analysis:

    1. File decomposition: YES. Work spans 2 repos (SDK + web), ~30 files. Clean
       separation: SDK protocol package changes (delete type + update callers),
       SDK CLI migration, web service layer migration, web API handler migration,
       web API handler migration (cont'd), and TypeScript type update. No single
       file bottleneck — callers are spread across many independent files.

    2. Investigation-first items: NONE. All callers identified via grep. The
       protocol.RepoEntry struct and all inline saw.config.json readers are
       fully mapped. No unknown behavior.

    3. Interface discoverability: YES. The interface is already defined by
       config-state-unification: config.RepoEntry, config.Load(), config.SAWConfig.
       This IMPL consumes those interfaces — it does not define new ones.

    4. Pre-implementation status: DEPENDS on config-state-unification completing
       first. That IMPL creates pkg/config/config.go with the unified types.
       This IMPL is a follow-up that migrates all callers to use those types.

    5. Parallelization value: HIGH. 30+ files across 2 repos. Build/test cycle
       >30s for both repos. 5 agents with 3-6 files each across 2 waves. Clear
       speedup over sequential.

    Estimated times:
    - Scout phase: ~8 min
    - Agent execution: ~20 min (5 agents, ~8 min avg, 2 waves with parallelism)
    - Merge & verification: ~5 min
    Total SAW time: ~33 min

    Sequential baseline: ~40 min (5 agents x 8 min avg)
    Time savings: ~7 min (18% faster)

    Recommendation: Clear speedup. Proceed.

    DEPENDENCY: This IMPL MUST execute after config-state-unification completes.
    Wave 1 of config-state-unification creates pkg/config/config.go with
    config.RepoEntry, config.Load(), config.SAWConfig. This IMPL consumes those.
