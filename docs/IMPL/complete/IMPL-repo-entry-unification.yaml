            **What to implement:**

            1. DELETE the `loadSAWConfigRepos` function from `cmd/saw/prepare_wave.go`.
            2. Replace all calls to `loadSAWConfigRepos(configPath)` with:
               ```go
               cfgResult := config.Load(repoPath)
               var configRepos []config.RepoEntry
               if cfgResult.IsSuccess() {
                   configRepos = cfgResult.GetData().Repos
               }
               ```
            3. Update imports: remove `protocol` import if no longer needed,
