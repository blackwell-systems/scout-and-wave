completion_date: "2026-03-23"
title: "Wire Integration Validation into Automated Workflows and Web UI"
feature_slug: integration-wiring-completeness
verdict: SUITABLE_WITH_CAVEATS
state: COMPLETE

suitability_assessment: |
  Analysis of the four requested changes against the current codebase:

  1. finalize-wave batch (SDK): ALREADY DONE. finalize_wave.go lines 311-326 already
     call protocol.ValidateIntegration as Step 3.5a (pre-merge, informational). Lines
     328-354 also run ValidateWiringDeclarations as Step 3.5b. The web wave_runner.go
     lines 548-597 also runs both checks with SSE events. No new work needed here.

  2. Web API endpoint: ALREADY DONE. validation_handlers.go already serves
     GET /api/impl/{slug}/validate-integration?wave=N and
     GET /api/impl/{slug}/validate-wiring. Routes registered in server.go line 186.
     Tests exist in validation_handlers_test.go. No new work needed here.

  3. Frontend component: PARTIAL. ValidationPanel.tsx exists with full UI for both
     integration and wiring validation results. Tests exist. BUT the component is NOT
     imported or rendered in any parent component (ReviewScreen.tsx does not import it).
     The apiClient.ts already has validateIntegration() and validateWiring() methods.

  4. Skill routing: ALREADY DONE. saw-skill.md line 276 references E25/E26/E35 and
     directs the orchestrator to read failure-routing.md. The failure-routing.md reference
     has the full validate-integration flow documented.

  5. extractConnectors stub: PARTIAL. integration_runner.go line 229 has extractConnectors
     always returning nil with a TODO comment, despite IntegrationConnectors being a real
     field on IMPLManifest (types.go line 45). This breaks the integration agent prompt.

  Summary: 2 of 4 items are fully done, 2 are partial. The remaining work is:
  - Wire ValidationPanel into ReviewScreen.tsx (frontend integration)
  - Fix extractConnectors to read manifest.IntegrationConnectors (SDK bug fix)
  Both are small, independent changes.

  CAVEAT: This is low parallelization value — only 2 small changes across 2 repos.
  The IMPL doc provides coordination value (tracking, audit trail) but SAW overhead
  exceeds parallelization benefit for this scope. Recommend sequential implementation
  if speed is the priority.

  Estimated times:
  - Scout phase: ~5 min
  - Agent execution: ~5 min (2 agents x 3 min avg, single wave)
  - Merge and verification: ~3 min
  Total SAW time: ~13 min
  Sequential baseline: ~8 min (2 changes x 4 min avg)
  Time savings: -5 min (slower due to SAW overhead)
  Recommendation: Marginal gains. Value is coordination/audit, not speed.

