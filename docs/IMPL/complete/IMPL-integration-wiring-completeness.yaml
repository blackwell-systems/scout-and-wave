interface_contracts:
  - name: extractConnectors
    description: |
      Fix extractConnectors to return manifest.IntegrationConnectors instead of nil.
      This is an existing unexported function in integration_runner.go that currently
      has a stub implementation returning nil.
    definition: |
      func extractConnectors(manifest *protocol.IMPLManifest) []protocol.IntegrationConnector {
          return manifest.IntegrationConnectors
      }
    location: pkg/engine/integration_runner.go
  - name: ValidationPanel rendering
    description: |
      Import and render ValidationPanel in ReviewScreen.tsx within the wave execution
      view section, after the agent cards and before the chat panel.
    definition: |
      import ValidationPanel from './ValidationPanel'
      // Render: <ValidationPanel slug={slug} currentWave={currentWave} />
    location: web/src/components/ReviewScreen.tsx

waves:
  - number: 1
    agents:
      - id: A
        task: |
          ## What to implement

          Wire the existing ValidationPanel component into ReviewScreen.tsx so users
          can see integration validation results during wave execution.

          ## Files to modify

          - `web/src/components/ReviewScreen.tsx` — import and render ValidationPanel

          ## Steps

          1. Add `import ValidationPanel from './ValidationPanel'` to ReviewScreen.tsx
          2. Find the section after CriticReviewPanel / agent cards where validation
             results would be contextually appropriate (near wave execution controls)
          3. Render `<ValidationPanel slug={slug} currentWave={currentWave} />` where
             `slug` is the current IMPL slug and `currentWave` is the active wave number
          4. Ensure the component only renders when an IMPL is selected (guard with slug check)

          ## Interface contracts

          ValidationPanel already accepts `{ slug: string; currentWave?: number }` props.
          The apiClient already has validateIntegration() and validateWiring() methods.
          No new interfaces needed.

          ## Tests

          Verify the existing ValidationPanel.test.tsx tests still pass. Add a check
          that ReviewScreen renders the ValidationPanel when a slug and wave are present.

          ## Verification gate

          ```bash
          cd web && npm test -- --passWithNoTests ValidationPanel
          ```

          ## Constraints

          - Do NOT modify ValidationPanel.tsx itself — only wire it into ReviewScreen
          - Use the existing slug and currentWave values already available in ReviewScreen
          - Follow the existing component composition pattern in ReviewScreen
        files:
          - web/src/components/ReviewScreen.tsx
        dependencies: []

      - id: B
        task: |
          ## What to implement

          Fix the extractConnectors function in integration_runner.go to actually read
          IntegrationConnectors from the manifest instead of returning nil.

          ## Files to modify

          - `pkg/engine/integration_runner.go` — fix extractConnectors function

          ## Steps

          1. Find the `extractConnectors` function (around line 225)
          2. Replace the nil return with `return manifest.IntegrationConnectors`
          3. Remove the TODO comment about Agent G adding the field (it already exists)
          4. The IntegrationConnectors field is already on IMPLManifest at types.go line 45

          ## Interface contracts

          The function signature stays the same:
          ```go
          func extractConnectors(manifest *protocol.IMPLManifest) []protocol.IntegrationConnector
          ```

          The IntegrationConnector type already exists in protocol/integration_types.go:
          ```go
          type IntegrationConnector struct {
              File   string `yaml:"file" json:"file"`
              Reason string `yaml:"reason,omitempty" json:"reason,omitempty"`
          }
          ```

          ## Tests

          Add a test in integration_runner_test.go that verifies extractConnectors
          returns the manifest's IntegrationConnectors slice (non-nil case and nil case).

          ## Verification gate

          ```bash
          go test ./pkg/engine/ -run TestExtractConnectors -v
          ```

          ## Constraints

          - Do NOT change the function signature
          - Do NOT modify any other functions in integration_runner.go
          - The fix is a one-line change plus removing the stale comment
        files:
          - pkg/engine/integration_runner.go
        dependencies: []

