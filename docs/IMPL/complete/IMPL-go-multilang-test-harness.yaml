            ## MCP client API (confirmed from go-sdk v1.4.1 source)
            ```go
            // Create client
            client := mcp.NewClient(&mcp.Implementation{Name: "test", Version: "1.0"}, nil)

            // Create transport
            transport := &mcp.CommandTransport{
                Command: exec.Command(binaryPath, langID, lspBinaryPath, serverArgs...),
            }
            // Set env on the command if needed (e.g. JAVA_HOME):
            transport.Command.Env = append(os.Environ(), "JAVA_HOME=...")

            // Connect (returns *mcp.ClientSession)
            session, err := client.Connect(ctx, transport, nil)
            if err != nil { ... }
            defer session.Close()

            // Call a tool
            res, err := session.CallTool(ctx, &mcp.CallToolParams{
                Name:      "start_lsp",
                Arguments: map[string]any{"root_dir": fixtureDir},
            })
            if err != nil { ... }
            // Access text content:
            text := res.Content[0].(*mcp.TextContent).Text
            ```

            ## Helper: fixtureDir
            The test must resolve fixture paths relative to the test file's location.
            Use runtime.Caller(0) to get the test file's directory, then construct
            fixture paths relative to that:
            ```go
            func testDir(t *testing.T) string {
                t.Helper()
                _, filename, _, ok := runtime.Caller(0)
                if !ok {
                    t.Fatal("runtime.Caller failed")
                }
                return filepath.Dir(filename)
            }
            ```
            Fixture base = filepath.Join(testDir(t), "fixtures")
            TypeScript fixture = filepath.Join(testDir(t), "fixtures", "typescript")

