              file: filepath.Join(fixtureBase, "php", "Person.php")
              hoverLine: 6, hoverColumn: 7
              definitionLine: 20, definitionColumn: 24
              callSiteLine: 27, callSiteColumn: 14
              referenceLine: 6, referenceColumn: 7
              completionLine: 26, completionColumn: 22
              workspaceSymbol: "Person", supportsFormatting: false
              secondFile: filepath.Join(fixtureBase, "php", "Greeter.php")
              symbolName: "Person"

            ## buildBinary helper
            Reuse the buildBinary helper pattern from integration_test.go but define a
            separate package-level var to cache the binary path so it is built once:
            ```go
            var (
                multilangBinaryOnce sync.Once
                multilangBinaryPath string
            )

            func getMultilangBinary(t *testing.T) string {
                t.Helper()
                multilangBinaryOnce.Do(func() {
                    tmp, err := os.MkdirTemp("", "lsp-mcp-go-multi-*")
                    if err != nil {
                        return
                    }
                    p := filepath.Join(tmp, "lsp-mcp-go")
                    cmd := exec.Command("go", "build", "-o", p, "./cmd/lsp-mcp-go")
                    cmd.Env = append(os.Environ(), "GOWORK=off")
                    cmd.Dir = filepath.Join(filepath.Dir(p), "..", "..", "..")
                    // We need the repo root; use runtime.Caller to find test file dir
                    // then go up two levels: test/ -> repo root
                    multilangBinaryPath = p
                })
                return multilangBinaryPath
            }
            ```
            Note: The repo root is two directories above the test file
            (test/multi_lang_test.go → test/ → repo root). Use runtime.Caller(0) to
            get the test file path, then filepath.Dir twice to reach repo root.
            Set cmd.Dir to repo root before running go build.

            ## TestMultiLanguage function structure
            ```go
            func TestMultiLanguage(t *testing.T) {
                t.Parallel()

                fixtureBase := filepath.Join(testDir(t), "fixtures")
                binaryPath := getMultilangBinary(t)
                if binaryPath == "" {
                    t.Skip("failed to build lsp-mcp-go binary")
                }

                languages := buildLanguageConfigs(fixtureBase)

                // Collect results for summary table
                type langResult struct {
                    name  string
                    tier1 string // "pass", "fail", "skip"
                    tier2 []toolResult
                }
                results := make([]langResult, 0, len(languages))

                // Run subtests sequentially (LSP servers can collide when run in parallel)
                for _, lang := range languages {
                    lang := lang // capture loop var
                    t.Run(lang.name, func(t *testing.T) {
                        // Do NOT call t.Parallel() here — run sequentially
                        r := runLanguageTest(t, binaryPath, lang)
                        results = append(results, langResult{
                            name:  lang.name,
                            tier1: r.tier1,
                            tier2: r.tier2,
                        })
                    })
                }

                printMultiLangSummary(t, results)
            }
            ```

            ## runLanguageTest function
            This function runs Tier 1 + Tier 2 tests for a single language. Signature:
            ```go
            type langTestResult struct {
                tier1 string       // "pass", "fail", "skip"
                tier2 []toolResult
            }

            func runLanguageTest(t *testing.T, binaryPath string, lang langConfig) langTestResult {
            ```

            Logic flow:
            1. Check binary with exec.LookPath(lang.binary):
               - if err != nil: t.Skipf("skipping %s: %s not found on PATH", lang.name, lang.binary)
            2. Build exec.Command:
               ```go
               args := append([]string{lang.id, binaryPath_resolved}, lang.serverArgs...)
               cmd := exec.Command(binaryPath, args...)
               if lang.javaHome != "" {
                   cmd.Env = append(os.Environ(), "JAVA_HOME="+lang.javaHome)
               }
               ```
               Wait — the command is the lsp-mcp-go binary, and its args are:
               <lang-id> <lsp-binary-path> [lsp-server-args...]
               where lsp-binary-path is the full resolved path from exec.LookPath.
            3. Create timeout context:
               - Java: 120s timeout
               - Others: 30s timeout
            4. Connect via mcp.CommandTransport:
               ```go
               client := mcp.NewClient(&mcp.Implementation{Name: "multi-lang-test", Version: "1.0"}, nil)
               transport := &mcp.CommandTransport{Command: cmd}
               session, err := client.Connect(ctx, transport, nil)
               if err != nil {
                   t.Errorf("failed to connect MCP session for %s: %v", lang.name, err)
                   return langTestResult{tier1: "fail"}
               }
               defer session.Close()
               ```
            5. Tier 1 — start_lsp:
               Call start_lsp with Arguments: map[string]any{"root_dir": lang.fixture}
               Assert content is non-empty.
            6. LSP init wait: Java = 120s sleep, others = 4s sleep.
               Use time.Sleep(initWait).
            7. Tier 1 — open_document:
               Call open_document with Arguments: map[string]any{"file_path": lang.file, "language_id": lang.id}
            8. Sleep 3s for diagnostics to settle.
            9. Tier 1 — get_diagnostics:
               Call get_diagnostics with Arguments: map[string]any{"file_path": lang.file}
               Parse JSON from content[0].(*mcp.TextContent).Text into []any to get count.
               Store diagnostic count.
            10. Tier 1 — get_info_on_location (hover):
               Call get_info_on_location with:
               map[string]any{
                   "file_path": lang.file,
                   "language_id": lang.id,
                   "line": lang.hoverLine,
                   "column": lang.hoverColumn,
               }
               Assert content non-empty and text length > 0.
               If Tier 1 passes: mark tier1 = "pass"
            11. Tier 2 — run all 6 helper functions (see below), collecting []toolResult
            12. Return langTestResult{tier1: "pass", tier2: tier2Results}

            On any Tier 1 error: log t.Errorf, set tier1 = "fail", return early without
            running Tier 2.

            ## Tier 2 helper functions
            Each takes (t *testing.T, ctx context.Context, session *mcp.ClientSession, lang langConfig)
            and returns toolResult.

            ### testDocumentSymbols
            - CallTool: name="get_document_symbols", Arguments: {file_path, language_id}
            - Parse JSON array from text
            - Assert array non-empty
            - Assert at least one entry with "name" field containing lang.symbolName
            - Return toolResult{tool: "get_document_symbols", ...}

            ### testGoToDefinition
            - CallTool: name="go_to_definition"
            - Arguments: {file_path: callSiteFile (or lang.file if empty), language_id, line: callSiteLine, column: callSiteColumn}
            - Parse JSON from text (may be object or array)
            - Extract first element if array
            - Assert result has "file" or "uri" field (non-empty)
            - Assert result line is within ±1 of lang.definitionLine
              (check "line" field; if absent, check "range.start.line" + 1)
            - Return toolResult{tool: "go_to_definition", ...}

            ### testGetReferences
            - If lang.secondFile != "": first open_document for secondFile with sleep 2s
            - CallTool: name="get_references"
            - Arguments: {file_path: lang.file, language_id, line: referenceLine, column: referenceColumn, include_declaration: true}
            - Parse JSON array
            - Assert length >= 2 if secondFile non-empty, else >= 1
            - Return toolResult{tool: "get_references", ...}

            ### testGetCompletions
            - CallTool: name="get_completions"
            - Arguments: {file_path: completionFile (or lang.file), language_id, line: completionLine, column: completionColumn}
            - Parse JSON array
            - Assert non-empty
            - Return toolResult{tool: "get_completions", ...}

            ### testWorkspaceSymbols
            - CallTool: name="get_workspace_symbols"
            - Arguments: {query: lang.workspaceSymbol}
            - Parse JSON array
            - Assert non-empty
            - Assert at least one entry whose "name" field contains lang.workspaceSymbol
            - Return toolResult{tool: "get_workspace_symbols", ...}

            ### testFormatDocument
            - If !lang.supportsFormatting: return toolResult{tool: "format_document", status: "skip", detail: "not supported"}
            - CallTool: name="format_document", Arguments: {file_path: lang.file, language_id}
            - Attempt to parse JSON array (empty array is fine — file already formatted)
            - If parse fails, treat as empty array (acceptable)
            - Assert no CallTool error
            - Return toolResult{tool: "format_document", status: "pass", ...}

            ### testGoToDeclaration (C only)
            - If lang.id != "c": return toolResult{tool: "go_to_declaration", status: "skip", detail: "not applicable"}
            - First open_document for filepath.Join(lang.fixture, "person.h") with sleep 1s
            - CallTool: name="go_to_declaration"
            - Arguments: {file_path: lang.file, language_id, line: declarationLine, column: declarationColumn}
            - Parse JSON (object or array)
            - Extract first element if array
            - Assert file field ends with "person.h"
            - Return toolResult{tool: "go_to_declaration", ...}

            ## printMultiLangSummary
            Print after all subtests complete. Format matches TypeScript:
            ```
            Language     | T1 | symbols | definition | references | completions | workspace | format
            -------------|----|---------|-----------:|------------|-------------|-----------|-------
            TypeScript   | ✓  |  ✓  |  ✓  |  ✓  |  ✓  |  ✓  |  ✓  |
            ...
            ```
            Use t.Logf to print the table so it appears in verbose test output.
            Status symbols: pass = "✓", skip = "-", fail = "✗"

            ## Error handling conventions
            - All toolResult errors use err.Error() as detail
            - JSON parse errors: return toolResult with status "fail" and detail
              "failed to parse <tool> response: <raw text>"
            - MCP CallTool errors: status "fail", detail err.Error()
            - Always check res.IsError before accessing content

            ## Additional: check res.IsError
            After every CallTool, check:
            ```go
            if res.IsError {
                return toolResult{tool: ..., status: "fail", detail: fmt.Sprintf("tool returned IsError=true: %v", res.Content)}
            }
            ```

            ## Verification gate
            ```bash
            # 1. File compiles
            cd /Users/dayna.blackwell/code/LSP-MCP-GO && GOWORK=off go build ./...
            # expected: exits 0

            # 2. Vet passes
            cd /Users/dayna.blackwell/code/LSP-MCP-GO && GOWORK=off go vet ./...
            # expected: exits 0

            # 3. Test file is in correct package
            grep "^package main_test" /Users/dayna.blackwell/code/LSP-MCP-GO/test/multi_lang_test.go
            # expected: prints the line

            # 4. TestMultiLanguage function exists
            grep "^func TestMultiLanguage(" /Users/dayna.blackwell/code/LSP-MCP-GO/test/multi_lang_test.go
            # expected: prints the line

            # 5. langConfig struct exists
            grep "type langConfig struct" /Users/dayna.blackwell/code/LSP-MCP-GO/test/multi_lang_test.go
            # expected: prints the line

            # 6. All 7 languages present in configs
            grep -c '"typescript"\|"python"\|"go"\|"rust"\|"java"\|"c"\|"php"' /Users/dayna.blackwell/code/LSP-MCP-GO/test/multi_lang_test.go
            # expected: 7 (one match per language id)
            ```

            ## Constraints
            - Do NOT modify integration_test.go or any existing files
            - Do NOT add a t.Parallel() call inside the per-language t.Run subtests
              (top-level t.Parallel() is fine; subtests must run sequentially)
            - Do NOT modify files outside your ownership list (test/multi_lang_test.go only)
            - Use sync.Once for binary build caching (add "sync" to imports)
            - GOWORK=off on all go build/test commands
          files:
            - test/multi_lang_test.go
