    overall_risk: low
    rows:
        - scenario: Agent A copies compile_commands.json verbatim with "/placeholder" directory, which makes clangd unable to index the fixture. C tests would fail silently at runtime with "no compile commands found".
          likelihood: medium
          impact: medium
          mitigation: Agent A's brief explicitly requires replacing "/placeholder" with the absolute path. Verification gate (step 3) greps for "LSP-MCP-GO" in the written file.
        - scenario: Agent B uses t.Parallel() inside the per-language subtests, causing LSP server port/process collisions. Tests would intermittently fail with connection errors.
          likelihood: medium
          impact: high
          mitigation: 'Constraint is explicit in Agent B''s brief: "Do NOT call t.Parallel() inside the per-language t.Run subtests." Outer t.Parallel() at TestMultiLanguage level is correct and expected.'
        - scenario: Agent B hardcodes fixture paths as string literals (e.g. "/Users/dayna.blackwell/...") instead of computing them from runtime.Caller(0). Test would fail on any other machine.
          likelihood: low
          impact: high
          mitigation: Brief explicitly specifies the testDir() + runtime.Caller(0) pattern and the buildLanguageConfigs(fixtureBase string) signature. No absolute user-specific paths should appear in the Go source.
        - scenario: Agent B calls res.Content[0].(*mcp.TextContent).Text without type-asserting safely, causing a nil pointer panic when a tool returns non-text content or empty content.
          likelihood: medium
          impact: medium
          mitigation: Brief includes the IsError check pattern and instructs checking content length before indexing. Agent should use len(res.Content) > 0 guard.
        - scenario: Agent A accidentally copies rust/target/ or java/target/ directories, adding hundreds of compiled artifacts to the Go repo.
          likelihood: low
          impact: medium
          mitigation: 'Brief lists explicit files (not directory rsync). Verification gate checks for absence of target/ dirs (find ... -name target | wc -l expected: 0).'
        - scenario: Agent B uses a different struct name (e.g. languageConfig instead of langConfig) or omits fields like declarationLine/declarationColumn, causing a compile error when the C go_to_declaration test references those fields.
          likelihood: low
          impact: low
          mitigation: Interface contract for langConfig lists all fields explicitly. Verification gate includes go build check.
