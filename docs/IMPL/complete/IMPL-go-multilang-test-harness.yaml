interface_contracts:
    - name: mcp.NewClient
      description: Creates a new MCP client
      definition: |
        func NewClient(impl *mcp.Implementation, options *mcp.ClientOptions) *mcp.Client
        // Usage:
        client := mcp.NewClient(&mcp.Implementation{Name: "test", Version: "1.0"}, nil)
      location: github.com/modelcontextprotocol/go-sdk/mcp/client.go:44
    - name: mcp.CommandTransport
      description: Transport that runs a command and communicates over stdin/stdout
      definition: |
        type CommandTransport struct {
            Command           *exec.Cmd
            TerminateDuration time.Duration
        }
        // Usage:
        transport := &mcp.CommandTransport{Command: exec.Command(binaryPath, langID, lspBinaryPath, serverArgs...)}
      location: github.com/modelcontextprotocol/go-sdk/mcp/cmd.go:20
    - name: Client.Connect
      description: Connects client to a server over the given transport; returns a ClientSession
      definition: |
        func (c *mcp.Client) Connect(ctx context.Context, t mcp.Transport, opts *mcp.ClientSessionOptions) (*mcp.ClientSession, error)
      location: github.com/modelcontextprotocol/go-sdk/mcp/client.go:255
    - name: ClientSession.CallTool
      description: Calls a named tool on the connected MCP server
      definition: |
        func (cs *mcp.ClientSession) CallTool(ctx context.Context, params *mcp.CallToolParams) (*mcp.CallToolResult, error)

        type CallToolParams struct {
            Name      string `json:"name"`
            Arguments any    `json:"arguments,omitempty"`
        }

        type CallToolResult struct {
            Content     []mcp.Content `json:"content"`
            IsError     bool          `json:"isError,omitempty"`
        }

        // Extracting text from result:
        text := res.Content[0].(*mcp.TextContent).Text
      location: github.com/modelcontextprotocol/go-sdk/mcp/client.go:989
    - name: ClientSession.Close
      description: Closes the MCP session; should be called via defer
      definition: |
        func (cs *mcp.ClientSession) Close() error
      location: github.com/modelcontextprotocol/go-sdk/mcp/client.go:341
    - name: langConfig
      description: Per-language test configuration struct holding fixture paths and position metadata
      definition: |
        type langConfig struct {
            name              string
            id                string
            binary            string
            serverArgs        []string
            javaHome          string // optional; set for java only
            fixture           string // absolute path to fixture directory
            file              string // absolute path to primary source file
            hoverLine         int
            hoverColumn       int
            definitionLine    int
            definitionColumn  int
            callSiteLine      int
            callSiteColumn    int
            callSiteFile      string // optional; defaults to .file if empty
            referenceLine     int
            referenceColumn   int
            completionLine    int
            completionColumn  int
            completionFile    string // optional; defaults to .file if empty
            workspaceSymbol   string
            supportsFormatting bool
            secondFile        string // optional; path to cross-file fixture
            symbolName        string
            declarationLine   int    // C only
            declarationColumn int    // C only
        }
      location: test/multi_lang_test.go
    - name: toolResult
      description: Result of a single Tier 2 tool test
      definition: |
        type toolResult struct {
            tool   string
            status string // "pass", "fail", "skip"
            detail string
        }
      location: test/multi_lang_test.go
