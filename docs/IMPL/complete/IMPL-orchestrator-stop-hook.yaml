            ## Task: Write the saw_orchestrator_stop hook script

            Create a new Stop hook at `implementations/claude-code/hooks/saw_orchestrator_stop`.
            This hook fires when the Claude session is about to stop (the user ends the conversation
            or Claude completes its response). It warns when active SAW work is in progress so the
            user can decide to resume.

            ### File to create
            - `implementations/claude-code/hooks/saw_orchestrator_stop`

            ### Hook behavior

            The Stop event JSON from Claude Code contains a `stop_hook_active` field that is `true`
            when the stop hook is already running (re-entrant call). ALWAYS check this first and
            exit 0 immediately if true — this prevents infinite re-trigger loops.

            **Two checks to perform (both are fast, local-only, no network):**

            **Check 1 — Active IMPL doc:**
            Scan `docs/IMPL/IMPL-*.yaml` (NOT `docs/IMPL/complete/`) for any IMPL where the
            `state` field is `WAVE_PENDING` or `WAVE_EXECUTING`. Use grep, not sawtools, so the
            hook has no external dependencies beyond bash and grep.

            Look for lines matching: `^state: (WAVE_PENDING|WAVE_EXECUTING)`

            Collect the matching filenames (extract the slug from the path).

            **Check 2 — Active worktrees:**
            Check if `.claude/worktrees/saw/` exists and contains any subdirectory entries.
            List them. These are slugs of features with active worktrees.

            **Decision logic:**
            - If `stop_hook_active` is true → exit 0, no output
            - If NEITHER check found anything → exit 0, no output
            - If EITHER check found something → emit systemMessage warning and exit 0

            **Output format (when warning):**

            ```json
            {
              "hookSpecificOutput": {
                "hookEventName": "Stop",
                "systemMessage": "SAW WARNING: Active orchestration detected. Run /saw status or /saw wave to resume.\n\nActive IMPL docs: <comma-separated slugs with states>\nActive worktrees: <comma-separated slugs or 'none'>"
              }
            }
            ```

            If only one check fired, list the other as "none" or omit it.

            ### Implementation notes

            - The hook is ALWAYS non-blocking (exit 0 always, even on errors)
            - Use `set -uo pipefail` (NOT `-e` — the hook must never fatal-exit)
            - Repo root detection: walk up from `$PWD` checking for `.git` directory
            - The grep for IMPL state should be robust: use `grep -l` to find files first,
              then extract state and slug
            - Slug extraction: basename of path with `IMPL-` prefix and `.yaml` suffix stripped
            - Handle missing directories gracefully (no docs/IMPL/ = no active IMPLs)
            - Emit all output to stdout (systemMessage format); errors to /dev/null or stderr
            - The hook runs synchronously (not async) — keep it fast (< 1 second)

            ### Script header template (follow this pattern)

            ```bash
            #!/usr/bin/env bash
            # saw_orchestrator_stop - Stop hook: warn when session ends with active SAW orchestration
            # Stop lifecycle hook — runs synchronously, exit 0 always (warn-only)
            #
            # Checks:
            #   1. Active IMPL docs (state: WAVE_PENDING or WAVE_EXECUTING)
            #   2. Active worktrees under .claude/worktrees/saw/
            # If either check fires, emits systemMessage warning to stdout.
            # Uses stop_hook_active field to prevent re-trigger loops.
            ```

            ### Verification gate

            After writing the script:
            ```bash
