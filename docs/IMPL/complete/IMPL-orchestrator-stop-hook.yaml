              | bash implementations/claude-code/hooks/saw_orchestrator_stop
            echo "exit: $?"  # exit: 0, no stdout output

            # Test: no active IMPLs should produce no output and exit 0
            echo '{"stop_hook_active":false,"session_id":"test"}' \
              | bash implementations/claude-code/hooks/saw_orchestrator_stop
            echo "exit: $?"  # exit: 0

            # Verify script is executable
            chmod +x implementations/claude-code/hooks/saw_orchestrator_stop
            ls -la implementations/claude-code/hooks/saw_orchestrator_stop | grep -q "^-rwx"
            echo "executable: $?"  # 0
            ```

            ### Constraints
            - Do NOT make the hook blocking (do not use exit 2 or exit 1)
            - Do NOT call sawtools — use bash builtins and grep only
            - Do NOT modify install.sh, README.md, or any other file
            - Do NOT create any file other than `implementations/claude-code/hooks/saw_orchestrator_stop`
