interface_contracts:
    - name: saw_orchestrator_stop
      description: |-
        Stop hook that warns when a Claude session ends with an active SAW orchestration
        in progress (IMPL in WAVE_PENDING or WAVE_EXECUTING state, or worktrees present).
      definition: |-
        Input (stdin): JSON with Claude Code Stop event fields
          {
            "stop_hook_active": bool,   // true if already inside a stop hook — skip to prevent loops
            "session_id": string,
            ...
          }

        Checks:
          1. Active IMPL doc: docs/IMPL/IMPL-*.yaml with state WAVE_PENDING or WAVE_EXECUTING
          2. Active worktrees: .claude/worktrees/saw/<slug>/ directories exist

        Output on active session (exit 0, systemMessage, non-blocking):
          {
            "hookSpecificOutput": {
              "hookEventName": "Stop",
              "systemMessage": "SAW session in progress: <slug> is <state>. Run /saw status to resume. Active worktrees: <list>."
            }
          }

        Output on clean session: exit 0, no output
        Output when stop_hook_active=true: exit 0, no output (loop prevention)

        Exit codes:
          0 — Always (warn-only, never blocks stopping)
      location: implementations/claude-code/hooks/saw_orchestrator_stop
