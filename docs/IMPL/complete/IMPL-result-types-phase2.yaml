interface_contracts:
    - name: Delete backward-compat aliases
      description: |
        Remove all 11 type aliases from pkg/protocol. Every reference to the
        *Result alias name must be updated to the *Data name in all files.
      definition: |
        DELETE these lines (do NOT replace with anything):
          type VerifyCommitsResult = VerifyCommitsData       (commit_verify.go)
          type CreateWorktreesResult = CreateWorktreesData   (worktree.go)
          type MergeAgentsResult = MergeAgentsData           (merge_agents.go)
          type ScanStubsResult = ScanStubsData               (stubs.go)
          type VerifyBuildResult = VerifyBuildData           (verify_build.go)
          type CleanupResult = CleanupData                   (cleanup.go)
          type CriticResult = CriticData                     (critic.go)
          type ImportIMPLsResult = ImportIMPLsData           (program_types.go)
          type TierGateResult = TierGateData                 (program_tier_types.go)
          type FreezeContractsResult = FreezeContractsData   (program_tier_types.go)
          type ProgramStatusResult = ProgramStatusData       (program_tier_types.go)
      location: pkg/protocol/*.go (scout-and-wave-go)
    - name: Rename StaleCleanupResult to StaleCleanupData
      description: |
        Rename the struct definition and update all references.
        This type was missed in Phase 1 (no alias exists yet).
      definition: |
        // In pkg/protocol/stale_worktree.go:
        type StaleCleanupData struct {
            Cleaned   []string `json:"cleaned"`
            Failed    []StaleCleanupFailure `json:"failed,omitempty"`
            Skipped   []string `json:"skipped,omitempty"`
        }
      location: pkg/protocol/stale_worktree.go
    - name: Migrate remaining functions to result.Result[T]
      description: |
        Change function signatures from (*OldResult, error) to result.Result[*Data].
        Use result.NewSuccess, result.NewFailure, result.NewPartial.
        Convert Go errors to result.StructuredError with appropriate severity.
      definition: |
        Example pattern:
          // BEFORE:
          func FreezeContracts(...) (*FreezeContractsResult, error) {
              result := &FreezeContractsResult{...}
              if err != nil { return nil, err }
              return result, nil
          }
          // AFTER:
          func FreezeContracts(...) result.Result[*FreezeContractsData] {
              data := &FreezeContractsData{...}
              if err != nil {
                  return result.NewFailure[*FreezeContractsData]([]result.StructuredError{{
                      Code: "E_FREEZE", Message: err.Error(), Severity: "fatal",
                  }})
              }
              return result.NewSuccess(data)
          }
      location: pkg/protocol/*.go (scout-and-wave-go)
    - name: Update IMPLManifest struct fields
      description: |
        Update types.go fields that reference old alias names to use *Data names.
      definition: |
        // In pkg/protocol/types.go:
        WiringValidationReports map[string]*WiringValidationData `yaml:"wiring_validation_reports,omitempty" json:"wiring_validation_reports,omitempty"`
        StubReports             map[string]*ScanStubsData        `yaml:"stub_reports,omitempty" json:"stub_reports,omitempty"`
        CriticReport            *CriticData                      `yaml:"critic_report,omitempty" json:"critic_report,omitempty"`
      location: pkg/protocol/types.go
