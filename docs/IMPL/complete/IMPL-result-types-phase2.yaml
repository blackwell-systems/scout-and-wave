pre_mortem:
    overall_risk: medium
    rows:
        - scenario: Wave 1 agents produce incompatible renames (e.g., Agent A deletes alias before Agent D renames the underlying type)
          likelihood: low
          impact: high
          mitigation: |
            Wave 1 agents have disjoint file ownership. Agent A only deletes alias lines
            and updates types.go. Agents B/C/D rename structs in their own files. The merge
            combines both — alias deletion + struct rename — atomically.
        - scenario: Web repo go.mod not updated after Wave 1 merge, causing Wave 2 Agent H to fail
          likelihood: medium
          impact: high
          mitigation: |
            Agent H's task explicitly includes updating go.mod dependency.
            The orchestrator should merge Wave 1 and push scout-and-wave-go
            before launching Wave 2 Agent H.
        - scenario: Missed callers — some file references old *Result name but was not found by grep
          likelihood: low
          impact: medium
          mitigation: |
            Post-merge quality gate runs `go build ./...` across both repos.
            Any missed reference will cause a compile error caught immediately.
            The fix is mechanical (rename the type reference).
        - scenario: Test assertions check for specific type names in JSON output
          likelihood: low
          impact: low
          mitigation: |
            JSON tags use yaml/json struct tags (e.g., `json:"cleanup_result"`),
            which are independent of Go type names. Renaming Go types does not
            change JSON wire format.
        - scenario: Engine functions that return result.Result but callers expect (*T, error) pattern
          likelihood: medium
          impact: medium
          mitigation: |
            Agent task prompts include explicit caller update patterns showing
            how to convert from result.Result to error handling for CLI output.
            Each agent's verification gate compiles the package.
