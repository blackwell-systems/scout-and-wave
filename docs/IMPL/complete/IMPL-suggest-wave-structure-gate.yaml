pre_mortem:
    overall_risk: low
    rows:
        - scenario: |
            repoRoot resolution differs between the test environment and real execution.
            Tests use `os.Getwd()` fallback (no `repository` field in fixture), which
            points at the Go repo root — SuggestWaveStructure will scan real owned files
            listed in the fixture. If the owned files don't exist on disk, fileContainsSymbol
            returns false for all, producing zero problems (safe — tests pass).
          likelihood: low
          impact: low
          mitigation: |
            Use `action: new` in test fixtures so files don't need to exist.
            SuggestWaveStructure's fileContainsSymbol silently returns false on open errors,
            so missing files produce zero problems, not panics.
        - scenario: |
            V047_TRIVIAL_SCOPE warning fires because this IMPL has 1 agent and 2 files.
            sawtools validate will warn but not block.
          likelihood: high
          impact: low
          mitigation: |
            Acknowledged. V047 is a warning code (advisory), not an error. It does not
            block wave execution.
        - scenario: |
            The `manifest` variable is declared in Step 2 (E35 detection path) but
            agent may accidentally re-declare it in Step 4 with `:=`, causing a
            compile error.
          likelihood: low
          impact: medium
          mitigation: |
            Agent brief explicitly says "reuse repoRoot" and shows the call site without
            redeclaring manifest. The agent should use the `manifest` and `repoRoot`
            variables already in scope from Steps 2-3.
