          task: |
            ## Step 4: Wire SuggestWaveStructure into pre-wave-validate

            ### What to implement

            In `cmd/sawtools/pre_wave_validate_cmd.go`:

            **1. Add `WaveStructureCheckResult` struct** (after `TestCascadeCheckResult`):
            ```go
            // WaveStructureCheckResult holds the result of the suggest-wave-structure pre-flight gate.
            type WaveStructureCheckResult struct {
                Passed   bool                             `json:"passed"`
                Problems []protocol.WaveStructureProblem `json:"problems"`
            }
            ```

            **2. Add `WaveStructure` field to `PreWaveValidateResult`**:
            ```go
            type PreWaveValidateResult struct {
                Validation    protocol.FullValidateData `json:"validation"`
                E35Gaps       E35GapsResult             `json:"e35_gaps"`
                TestCascade   TestCascadeCheckResult    `json:"test_cascade"`
                WaveStructure WaveStructureCheckResult  `json:"wave_structure"` // Step 4
            }
            ```

            **3. Add Step 4 logic in `RunE`**, after the existing Step 3 block and before
            the "Combine results" comment. Insert:
            ```go
            // Step 4: Run wave structure check
            waveStructureRes := protocol.SuggestWaveStructure(context.TODO(), manifest, repoRoot)
            var waveStructureResult WaveStructureCheckResult
            if waveStructureRes.IsFatal() {
                // Log but don't fail — fatal means the check itself errored (e.g. nil manifest),
                // not that problems were found.
                fmt.Fprintf(os.Stderr, "pre-wave-validate: wave structure check failed: %v\n", waveStructureRes.Errors)
                waveStructureResult = WaveStructureCheckResult{Passed: true, Problems: nil}
            } else {
                problems := waveStructureRes.GetData()
                waveStructureResult = WaveStructureCheckResult{
                    Passed:   len(problems) == 0,
                    Problems: problems,
                }
            }
            ```

            **4. Update the "Combine results" block** to include the new field:
            ```go
            output := PreWaveValidateResult{
                Validation: validateRes.GetData(),
                E35Gaps: E35GapsResult{
                    Passed: len(e35Gaps) == 0,
                    Gaps:   e35Gaps,
                },
                TestCascade:   testCascadeResult,
                WaveStructure: waveStructureResult, // Step 4
            }
            ```

            **5. Update the exit-1 condition** to include wave structure failures:
            ```go
            if !output.Validation.Valid || !output.E35Gaps.Passed || !output.TestCascade.Passed || !output.WaveStructure.Passed {
                return fmt.Errorf("pre-wave validation failed")
            }
            ```

            **6. Update the Long description** of the command to document Step 4:
            Add `  3. E46 test cascade detection` and `  4. Wave structure check (X004/X005)`
            to the list in the `Long:` field so users see all four steps in --help output.

            ### Test file: `cmd/sawtools/pre_wave_validate_cmd_test.go`

            Create this file. Pattern the test style after `pre_wave_gate_cmd_test.go`
            (temp dir fixtures, `cmd.Execute()`, JSON unmarshal into result struct).

            Write these test cases:

            **TestPreWaveValidateCmd_StepFour_NoProblemsMani** — a valid IMPL with no
            interface contracts and a single wave. Call the command with `--wave 1`.
            Assert `wave_structure.passed == true` and `wave_structure.problems` is
            empty (or nil/[]).

            **TestPreWaveValidateCmd_StepFour_PassedField** — same minimal IMPL as above.
            Assert that the JSON output contains a `"wave_structure"` key (unmarshal to
            `map[string]interface{}` and check key presence).

            **TestPreWaveValidateCmd_MissingWaveFlag** — call the command without
            `--wave` flag; assert that `cmd.Execute()` returns an error (the flag is
            required).

            For the IMPL fixtures, use the same minimal-valid IMPL format shown in
            `pre_wave_gate_cmd_test.go`: two agents, two files, wave 1, verdict SUITABLE,
            no repository field (so repoRoot falls through to os.Getwd()).

            ### Verification gate
            ```
            go build ./cmd/sawtools/...
            go vet ./cmd/sawtools/...
            go test ./cmd/sawtools/... -run TestPreWaveValidate
            ```

            ### Constraints
            - Do NOT modify `pkg/protocol/suggest_wave_structure.go` — it is correct as-is.
            - Do NOT modify `cmd/sawtools/suggest_wave_structure_cmd.go` — standalone command is unchanged.
            - The `repoRoot` variable is already determined in Steps 1-2 of the existing
