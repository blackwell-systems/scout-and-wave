pre_mortem:
    overall_risk: low
    rows:
        - scenario: Agent A and B both consume FormatPhaseProgress across wave boundary
          likelihood: low
          impact: low
          mitigation: |
            FormatPhaseProgress is produced by Agent B and consumed by Agent A in the
            same wave. Since they own disjoint files this is safe — Agent A just needs
            to call the function. If Agent B's implementation differs from the contract,
            wave 2 tests (Agent C) will catch it.
        - scenario: HandleBackCommand phase regression logic is incorrect
          likelihood: medium
          impact: medium
          mitigation: |
            Agent C writes explicit cross-phase back tests. If phase regression is
            wrong, tests will fail and agent can iterate. The logic is deterministic
            (recompute phase from SpecData state) so it is testable.
        - scenario: Answer() validation changes break existing test expectations
          likelihood: low
          impact: low
          mitigation: |
            Existing tests in interview_cmd_test.go use a mockManager that bypasses
            Answer() validation entirely. Only Agent C's new tests exercise real
            validation. No existing tests should break.
        - scenario: init() ordering between compiler.go and deterministic.go
          likelihood: low
          impact: high
          mitigation: |
            Go init() functions within a package run in source file order (alphabetical).
            compiler.go runs before deterministic.go, so RegisterCompiler will set
            compileFunc before any code in deterministic.go could use it. The cmd/saw
            init() runs after all pkg/interview init() functions since it imports the
            package. No ordering issue.
