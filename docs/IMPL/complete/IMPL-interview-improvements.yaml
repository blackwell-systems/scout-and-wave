interface_contracts:
    - name: init() in interview_cmd.go
      description: |
        Package-level init function that wires newDeterministicManagerFunc
        to interview.NewDeterministicManager, fixing the P0 nil panic.
      definition: |
        func init() {
            newDeterministicManagerFunc = func(docsDir string) interview.Manager {
                return interview.NewDeterministicManager(docsDir)
            }
        }
      location: cmd/saw/interview_cmd.go
    - name: init() in compiler.go
      description: |
        Package-level init function that registers CompileToRequirements
        with the deterministic manager's compileFunc variable.
      definition: |
        func init() {
            RegisterCompiler(CompileToRequirements)
        }
      location: pkg/interview/compiler.go
    - name: ValidateRequiredField
      description: |
        Validates that a required field answer is not empty/whitespace.
        Returns an error message string if invalid, empty string if valid.
        Called by Answer() before recording the turn.
      definition: |
        func ValidateRequiredField(q *InterviewQuestion, answer string) string
        // Returns "" if valid, or error message like
        // "This field is required. Please provide an answer."
        // Checks: q.Required && strings.TrimSpace(answer) == ""
      location: pkg/interview/deterministic.go
    - name: HandleBackCommand
      description: |
        Detects "back" answer and reverts to previous question by
        removing the last history entry and decrementing cursor.
        Returns true if back was handled (caller should re-generate question).
      definition: |
        func HandleBackCommand(doc *InterviewDoc, answer string) bool
        // Returns true if answer is "back" (case-insensitive).
        // Reverts: remove last History entry, decrement QuestionCursor,
        // clear the SpecData field that was populated by that answer,
        // revert Phase if needed via checkPhaseTransition logic.
      location: pkg/interview/deterministic.go
    - name: FormatPhaseProgress
      description: |
        Generates phase-aware progress string like "[Overview: 2/4 | Next: Scope]"
        instead of naive percentage.
      definition: |
        func FormatPhaseProgress(doc *InterviewDoc) string
        // Returns string like "[Overview: 2/4 | Next: Scope]"
        // Counts questions in current phase, shows position within phase,
        // shows next phase name (or "Done" if in review).
      location: pkg/interview/phase_questions.go
    - name: PreviewRequirements
      description: |
        Generates a preview of the compiled REQUIREMENTS.md content
        for display before the final confirmation question.
      definition: |
        func PreviewRequirements(doc *InterviewDoc) (string, error)
        // Calls CompileToRequirements and returns the content string.
        // Used by the CLI to show preview before "Ready to generate?" prompt.
      location: pkg/interview/compiler.go
waves:
    - number: 1
      agents:
        - id: A
          task: |
            ## P0 Init Wiring + P1 Preview and Progress Display

            ### What to implement

            **P0.1 — Add init() to cmd/saw/interview_cmd.go:**
            Add a package-level init() function that wires `newDeterministicManagerFunc`
            to `interview.NewDeterministicManager`. This fixes the runtime panic at line 191.

            ```go
            func init() {
                newDeterministicManagerFunc = func(docsDir string) interview.Manager {
                    return interview.NewDeterministicManager(docsDir)
                }
            }
            ```

            **P0.2 — Add init() to pkg/interview/compiler.go:**
            Add a package-level init() function that calls RegisterCompiler:

            ```go
            func init() {
                RegisterCompiler(CompileToRequirements)
            }
            ```

            **P1.4 — Add PreviewRequirements to compiler.go:**
            Add a `PreviewRequirements(doc *InterviewDoc) (string, error)` function
            that calls `CompileToRequirements` and returns the preview content.

            **P1.7 — Update progress display in interview_cmd.go:**
            Replace the naive percentage display (lines 105-114) with a call to
            `interview.FormatPhaseProgress(doc)` (implemented by Agent B).
            Change the format from:
              `[Phase: Overview | Q 1/18 | 5%]`
            to use the return value of FormatPhaseProgress:
              `[Overview: 2/4 | Next: Scope]`

            Also, before the final confirmation question (when question.FieldName == "_confirm"),
            call `interview.PreviewRequirements(doc)` and print the preview content
            with a header like "--- Preview of REQUIREMENTS.md ---".

            ### Interfaces to consume
            - `interview.FormatPhaseProgress(doc *InterviewDoc) string` — from Agent B
              (wave 1, same wave but no file conflict — this function lives in
              phase_questions.go which Agent B owns)
            - `interview.NewDeterministicManager` — already exists in deterministic.go

            ### Tests
            No new test files — Agent C (wave 2) handles test updates.
            Verify manually that `go build ./cmd/saw/...` succeeds.

            ### Verification gate
            ```bash
            go build ./cmd/saw/... && go vet ./cmd/saw/... && go vet ./pkg/interview/...
            ```

            ### Constraints
            - Do NOT modify types.go
            - Do NOT modify deterministic.go or phase_questions.go (owned by Agent B)
            - The init() in interview_cmd.go must use the Manager interface return type
              (not *DeterministicManager) to match the existing variable declaration
            - Keep PreviewRequirements simple — just delegate to CompileToRequirements
          files:
            - cmd/saw/interview_cmd.go
            - pkg/interview/compiler.go
        - id: B
          task: |
            ## P1 UX Improvements — Validation, Back, Hints, Phase Progress

            ### What to implement

            **P1.3 — Required field validation in deterministic.go:**
            Add a `ValidateRequiredField(q *InterviewQuestion, answer string) string`
            function. Returns empty string if valid, error message if the answer is
            empty/whitespace for a required question.

            Modify the `Answer()` method: before recording the turn, call
            `ValidateRequiredField`. If it returns a non-empty string, do NOT advance
            the cursor or record the turn. Instead, return the same question again
            with the error message prepended to the question text (or set in the
            Hint field). The caller (CLI) will re-display the question.

            The Answer() method currently returns `(*InterviewDoc, *InterviewQuestion, error)`.
            When validation fails, return `(doc, sameQuestion, nil)` — NOT an error.
            The question's Hint field should contain the validation error message.
            The CLI already prints hints (line 116-118 of interview_cmd.go).

            **P1.5 — Skip hints in phase_questions.go:**
            For each question definition in `phaseQuestions` where `Required: false`,
            append " (or type 'skip' to skip)" to the Text field if it doesn't
            already contain that text. This can be done directly in the var declaration.

            Review current questions — some already have "(or 'skip')" in their text.
            Normalize to "(or type 'skip' to skip)" for consistency across all optional
            questions. Remove the existing "(or 'skip')" variants and use the consistent
            phrasing.

            **P1.6 — Back/undo in deterministic.go:**
            Add `HandleBackCommand(doc *InterviewDoc, answer string) bool`.
            When the user types "back" (case-insensitive, trimmed):
            1. If QuestionCursor == 0, return false (can't go back from first question)
            2. Remove the last entry from doc.History
            3. Decrement doc.QuestionCursor
            4. Clear the SpecData field that was populated by the removed answer
               (use the question's Phase and FieldName to determine which field to nil/empty)
            5. Recalculate doc.Phase by checking phase transitions from the beginning
            6. Return true

            Integrate into Answer(): at the top of Answer(), check if answer is "back".
            If HandleBackCommand returns true, regenerate the current question and
            return it. Do not record a turn.

            **P1.7 — Phase-aware progress in phase_questions.go:**
            Add `FormatPhaseProgress(doc *InterviewDoc) string`.
            Count total questions in current phase and position within that phase.
            Format: "[Overview: 2/4 | Next: Scope]"
            For the last phase (Review), show "Next: Done" instead of next phase name.

            Helper: add `questionsInPhase(phase InterviewPhase) int` to count
            entries in phaseQuestions matching the phase.
            Add `nextPhase(phase InterviewPhase) string` to return the display
            name of the next phase.

            ### Interfaces to produce
            - `ValidateRequiredField(q *InterviewQuestion, answer string) string`
            - `HandleBackCommand(doc *InterviewDoc, answer string) bool`
            - `FormatPhaseProgress(doc *InterviewDoc) string`

            ### Tests
            No test files — Agent C (wave 2) writes all tests.

            ### Verification gate
            ```bash
            go build ./pkg/interview/... && go vet ./pkg/interview/...
            ```

            ### Constraints
            - Do NOT modify types.go (no struct changes needed)
            - Do NOT modify compiler.go or interview_cmd.go (owned by Agent A)
            - The Answer() signature must not change
            - HandleBackCommand must handle phase regression correctly:
              if going back crosses a phase boundary, the Phase field must revert
            - ValidateRequiredField must not treat "skip" as empty for optional fields
              (but "skip" on a required field IS invalid and should show error)
          files:
            - pkg/interview/deterministic.go
            - pkg/interview/phase_questions.go
