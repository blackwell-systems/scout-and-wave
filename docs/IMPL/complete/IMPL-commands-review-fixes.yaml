interface_contracts:
    - name: CIParser interface
      description: |
        Parser interface for CI systems (GitHub Actions, GitLab CI, CircleCI).
        Currently returns (*CommandSet, error). Must be updated to return
        Result[ParseCIData] for protocol conformance.
      definition: |
        // Before (Wave 0):
        type CIParser interface {
            ParseCI(repoRoot string) (*CommandSet, error)
            Priority() int
        }

        // After (Wave 1):
        type ParseCIData struct {
            CommandSet *CommandSet
        }
        type CIParser interface {
            ParseCI(repoRoot string) result.Result[ParseCIData]
            Priority() int
        }
      location: pkg/commands/types.go
    - name: BuildSystemParser interface
      description: |
        Parser interface for build systems (Makefile, package.json, etc.).
        Currently returns (*CommandSet, error). Must be updated to return
        Result[ParseBuildSystemData] for protocol conformance.
      definition: |
        // Before (Wave 0):
        type BuildSystemParser interface {
            ParseBuildSystem(repoRoot string) (*CommandSet, error)
            Priority() int
        }

        // After (Wave 1):
        type ParseBuildSystemData struct {
            CommandSet *CommandSet
        }
        type BuildSystemParser interface {
            ParseBuildSystem(repoRoot string) result.Result[ParseBuildSystemData]
            Priority() int
        }
      location: pkg/commands/types.go
    - name: GithubActionsParser.ParseCI
      description: |
        Implementation of CIParser interface for GitHub Actions workflows.
        Must be updated to return Result[ParseCIData] matching the interface.
      definition: |
        // After Wave 1:
        func (p *GithubActionsParser) ParseCI(repoRoot string) result.Result[ParseCIData]
      location: pkg/commands/github_actions.go
    - name: GithubActionsParser.parseWorkflowFile
      description: |
        Helper that parses a single GitHub Actions workflow file. Currently
        returns ([]string, error). Must be updated to return Result[ParseWorkflowData]
        for protocol conformance.
      definition: |
        // Before:
        func (p *GithubActionsParser) parseWorkflowFile(path string) ([]string, error)

        // After Wave 1:
        type ParseWorkflowData struct {
            Commands []string
        }
        func (p *GithubActionsParser) parseWorkflowFile(path string) result.Result[ParseWorkflowData]
      location: pkg/commands/github_actions.go
    - name: MakefileParser.ParseBuildSystem
      description: |
        Implementation of BuildSystemParser interface for Makefile.
        Must be updated to return Result[ParseBuildSystemData] matching the interface.
      definition: |
        // After Wave 1:
        func (p *MakefileParser) ParseBuildSystem(repoRoot string) result.Result[ParseBuildSystemData]
      location: pkg/commands/makefile.go
    - name: PackageJSONParser.ParseBuildSystem
      description: |
        Implementation of BuildSystemParser interface for package.json.
        Must be updated to return Result[ParseBuildSystemData] matching the interface.
      definition: |
        // After Wave 1:
        func (p *PackageJSONParser) ParseBuildSystem(repoRoot string) result.Result[ParseBuildSystemData]
      location: pkg/commands/package_json.go
    - name: LanguageDefaults
      description: |
        Variable holding the language defaults implementation. Currently returns
        (*CommandSet, error). Must be updated to return Result[LanguageDefaultsData]
        for protocol conformance. This is a var (not a method) to allow test replacement.
      definition: |
        // Before:
        var LanguageDefaults = func(repoRoot string) (*CommandSet, error)

        // After Wave 1:
        type LanguageDefaultsData struct {
            CommandSet *CommandSet
        }
        var LanguageDefaults = func(repoRoot string) result.Result[LanguageDefaultsData]

        // Implementation (languageDefaultsImpl):
        func languageDefaultsImpl(repoRoot string) result.Result[LanguageDefaultsData]
      location: pkg/commands/defaults.go
    - name: Command extraction error codes
      description: |
        New error codes for command extraction failures. Must be added to
