pre_mortem:
    overall_risk: low
    rows:
        - scenario: |
            Agent C references lsp.LSPClient methods (PrepareTypeHierarchy, GetSupertypes,
            GetSubtypes) that Agent B hasn't merged yet. The file compiles in isolation
            because the method calls are inside function bodies (not in interface or type
            assertions), but if Agent C's worktree runs `go build` before merge it will fail.
          likelihood: medium
          impact: low
          mitigation: |
            Agent C's verification gate uses `go build ./internal/tools/...` which will
            resolve the missing methods as undefined if run before merge. The task prompt
            explicitly notes this: "will compile once both Agent A and B have been merged."
            Agent C should run `go vet` checks and confirm the logic is correct; the build
            gate passes post-merge in Wave 2 integration.
        - scenario: |
            TypeScript-language-server may return IsError=true or an empty items array for
            typeHierarchy on the `Person` interface. TypeScript interfaces don't have a classic
            supertypes chain in the same way classes do, so the server may decline to return
            a type hierarchy item.
          likelihood: medium
          impact: low
          mitigation: |
            The testTypeHierarchy helper uses skip (not fail) on empty items or IsError=true.
            This prevents the integration test from flaking; we get "skip" rather than "fail"
            if the server doesn't support typeHierarchy for that position. The Java case with
            jdtls is more reliable (java.lang.Object is always a supertype of a concrete class).
        - scenario: |
            Agent D edits multi_lang_test.go and accidentally breaks the existing test
            structure (e.g., modifying the tier2Results slice incorrectly).
          likelihood: low
          impact: medium
          mitigation: |
            Agent D's task prompt gives exact verbatim before/after text for every
            edit. The verification gate checks `go build ./...` and grep counts. The
            multi_lang_test.go is not a unit test (it requires LSP binaries), so
            `go build` is sufficient for CI validation.
        - scenario: |
            The `typeHierarchy` capability key used in hasCapability check ("typeHierarchyProvider")
            may differ between servers. jdtls advertises `typeHierarchyProvider: true`; gopls
            may use a different key.
          likelihood: low
          impact: low
          mitigation: |
            The capability check in PrepareTypeHierarchy uses `c.hasCapability("typeHierarchyProvider")`.
            If a server doesn't advertise this key, the method returns an empty slice and the
            tool handler returns a "No type hierarchy item found" text result (not an error).
            This is the same graceful fallback pattern used by PrepareCallHierarchy. No fix needed.
