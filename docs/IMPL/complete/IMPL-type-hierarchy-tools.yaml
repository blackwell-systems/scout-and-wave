interface_contracts:
    - name: TypeHierarchyItem
      description: |
        LSP 3.17 TypeHierarchyItem. Structurally identical to CallHierarchyItem.
        Defined in internal/types/types.go. Referenced by Agent B (client) and Agent C (tool handler).
      definition: |
        // TypeHierarchyItem represents a single node in a type hierarchy graph.
        // See LSP 3.17 § TypeHierarchyItem.
        type TypeHierarchyItem struct {
            Name           string      `json:"name"`
            Kind           SymbolKind  `json:"kind"`
            Tags           []SymbolTag `json:"tags,omitempty"`
            Detail         *string     `json:"detail,omitempty"`
            URI            string      `json:"uri"`
            Range          Range       `json:"range"`
            SelectionRange Range       `json:"selectionRange"`
            Data           interface{} `json:"data,omitempty"`
        }
      location: internal/types/types.go
    - name: PrepareTypeHierarchy
      description: |
        LSP client method for textDocument/prepareTypeHierarchy.
        Sends the LSP request and returns a slice of TypeHierarchyItem.
        Mirrors PrepareCallHierarchy in signature and capability-check pattern.
      definition: |
        func (c *LSPClient) PrepareTypeHierarchy(ctx context.Context, uri string, pos types.Position) ([]types.TypeHierarchyItem, error)
      location: internal/lsp/client.go
    - name: GetSupertypes
      description: |
        LSP client method for typeHierarchy/supertypes.
        Returns the supertypes (parent classes/interfaces) of the given item.
      definition: |
        func (c *LSPClient) GetSupertypes(ctx context.Context, item types.TypeHierarchyItem) ([]types.TypeHierarchyItem, error)
      location: internal/lsp/client.go
    - name: GetSubtypes
      description: |
        LSP client method for typeHierarchy/subtypes.
        Returns the subtypes (subclasses/implementations) of the given item.
      definition: |
        func (c *LSPClient) GetSubtypes(ctx context.Context, item types.TypeHierarchyItem) ([]types.TypeHierarchyItem, error)
      location: internal/lsp/client.go
    - name: HandleTypeHierarchy
      description: |
        MCP tool handler. Accepts file_path, language_id, line, column, and direction
        ("supertypes", "subtypes", or "both"). Prepares the item then fetches the
        requested direction(s). Returns JSON-encoded typeHierarchyResult.
        Mirror of HandleCallHierarchy.
      definition: |
        func HandleTypeHierarchy(ctx context.Context, client *lsp.LSPClient, args map[string]interface{}) (types.ToolResult, error)
      location: internal/tools/typehierarchy.go
