interface_contracts:
    - name: critic-impl-commit-check
      description: |
        Shell logic contract for critic commit verification. Both hooks implement this
        same logical check. The check must be idempotent (safe to run multiple times).
      definition: |
        # Given: impl_path (absolute path to IMPL doc, already verified to exist)
        # Given: repo_root (directory containing the IMPL doc's git repo)
        #
        # 1. Run: git -C <repo_root> status --porcelain <impl_path>
        #    - Output is empty if clean, non-empty if dirty (modified or staged-not-committed)
        # 2. If dirty:
        #    - Print to stderr: "E48: Critic agent must commit IMPL doc changes before stopping."
        #    - Print to stderr: "     Run: git -C <repo_root> add <impl_path> && git -C <repo_root> commit -m 'chore: critic report for <slug> [SAW:critic:<slug>]'"
        #    - Exit 2
        # 3. If clean: exit 0 (allow)
        #
        # Repo root derivation from impl_path:
        #   Use git -C <dir-of-impl_path> rev-parse --show-toplevel
      location: hooks/saw-critic-impl-commit.sh
    - name: critic-commit-message-format
      description: Canonical git commit message format for critic agents committing the IMPL doc.
      definition: |
        "chore: critic report for <slug> [SAW:critic:<slug>]"
        # Where <slug> is the feature slug extracted from the IMPL doc filename:
        #   basename "$impl_path" .yaml | sed 's/^IMPL-//'
      location: implementations/claude-code/prompts/agents/critic-agent.md
