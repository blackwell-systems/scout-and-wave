title: Critic Agent IMPL Commit Enforcement (E48)
feature_slug: critic-impl-commit
verdict: SUITABLE
suitability_assessment: |
    File decomposition: Changes span 5 distinct files across two categories — hook
    infrastructure (saw-critic-impl-commit.sh, validate_agent_completion, install.sh)
    and documentation (critic-agent.md, execution-rules.md). These are fully
    independent; hook shell code, existing hook modification, install registration,
    agent protocol definition, and protocol rules each require different expertise
    and touch disjoint lines.

    Investigation status: Root cause is clear. The critic's SubagentStop validation
    (validate_agent_completion, critic case, Step 6) verifies that critic_report
    content is present but does NOT verify the IMPL doc changes are committed to git.
    Wave agents have this check (lines 301-321 of validate_agent_completion); critics
    do not. The fix is well-understood.

    Interface discoverability: All interfaces are existing shell conventions — no new
    cross-agent types needed. The commit check pattern already exists in the wave
    agent branch of validate_agent_completion and can be replicated for critics.

    Parallelization: 5 files, 4 agents, mix of new file creation and targeted edits.
    Build cycles are fast (shell scripts, no compilation). High parallelization value
    due to full disjoint ownership.

    Estimated times:
    - Scout phase: ~15 min
    - Agent execution: ~4 agents x ~8 min = ~32 min, parallelized to ~8 min
    - Merge and verification: ~5 min
    Total SAW time: ~28 min
    Sequential baseline: ~40 min
    Time savings: ~12 min (30% faster)
