            The `implementations/claude-code/hooks/validate_agent_completion` hook (Agent B's file)
            already handles critic validation (checking critic_report content). This new hook
            is a companion enforcement that checks the commit state — parallel to how
            `saw-worktree-boundary.sh` is a separate PreToolUse enforcement alongside the
            main hook infrastructure.

            Critic agents run on the MAIN BRANCH (not a worktree). The IMPL doc path comes
            from `.saw-state/active-impl` or from the agent description string.

            ## What to implement

            Create `/Users/dayna.blackwell/code/scout-and-wave/hooks/saw-critic-impl-commit.sh`
            with this exact logic:

            1. Read JSON from stdin (SubagentStop payload).
            2. Parse `agent_description` from JSON using python3 (same pattern as `saw-worktree-boundary.sh`).
            3. If description does NOT match `[SAW:critic:*]` pattern → exit 0 immediately.
            4. If it IS a critic agent:
               a. Find IMPL doc path:
                  - First check `.saw-state/active-impl` in cwd, then walk up to repo root.
                  - Then try extracting from `agent_description` via grep for `docs/IMPL/IMPL-*.yaml`.
                  - If still not found, exit 2 with error "E48: Cannot locate IMPL doc for critic agent".
               b. Derive repo root: `git -C "$(dirname "$impl_path")" rev-parse --show-toplevel`
               c. Check if IMPL doc is dirty:
                  `git -C "$repo_root" status --porcelain "$impl_path"`
                  - Also check staged but not committed:
                    `git -C "$repo_root" diff --cached --name-only`
               d. If dirty (unstaged OR staged-but-not-committed):
                  - Print error to stderr including the exact commit command to run
                  - Exit 2
               e. If clean → exit 0

            ## File header and exit codes
            Follow the exact style of `hooks/saw-worktree-boundary.sh`:
            ```bash
