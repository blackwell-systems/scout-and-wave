interface_contracts:
    - name: analyzer.AnalyzeDeps
      description: |
        Analyzes Go repository dependencies and produces dependency graph with wave candidates.
        Used by analyze-deps command (H3).
      definition: |
        func AnalyzeDeps(repoRoot string, targetFiles []string) (*DepGraphResult, error)
      location: github.com/blackwell-systems/scout-and-wave-go/pkg/analyzer
    - name: analyzer.DetectCascades
      description: |
        Detects cascade candidates from type renames via AST analysis.
        Used by detect-cascades command (M2).
      definition: |
        func DetectCascades(repoRoot string, renames []RenameInfo) (*CascadeResult, error)
      location: github.com/blackwell-systems/scout-and-wave-go/pkg/analyzer
    - name: suitability.AnalyzeSuitability
      description: |
        Scans codebase for pre-implementation status of requirements.
        Used by analyze-suitability command (H1a).
      definition: |
        func AnalyzeSuitability(requirementsFile string, repoRoot string) (*SuitabilityResult, error)
      location: github.com/blackwell-systems/scout-and-wave-go/pkg/suitability
    - name: commands.ExtractCommands
      description: |
        Extracts build/test/lint/format commands from CI configs and manifests.
        Used by extract-commands command (H2).
      definition: |
        func ExtractCommands(repoRoot string) (*CommandsResult, error)
      location: github.com/blackwell-systems/scout-and-wave-go/pkg/commands
    - name: scaffold.DetectScaffolds
      description: |
        Detects shared types that need scaffold files from interface contracts.
        Used by detect-scaffolds command (H4).
      definition: |
        func DetectScaffolds(implPath string) (*ScaffoldResult, error)
      location: github.com/blackwell-systems/scout-and-wave-go/pkg/scaffold
waves:
    - number: 1
      agents:
        - id: A
          task: |
            ## What to Implement
            Register the existing `detect-cascades` command in the SDK CLI main.go.
            The command implementation already exists at `cmd/saw/detect_cascades_cmd.go`,
            but it's not registered in the main command dispatcher.

            ## Interfaces to Implement
            None — command already exists, only needs registration.

            ## Interfaces to Call
            - `newDetectCascadesCmd()` — existing command constructor from detect_cascades_cmd.go

            ## Tests to Write
            No new tests needed — command already has tests at detect_cascades_cmd_test.go.
            Verify existing tests still pass after registration.

            ## Verification Gate
            ```bash
            cd /Users/dayna.blackwell/code/scout-and-wave-go
            go build -o /tmp/sawtools ./cmd/saw
            /tmp/sawtools detect-cascades --help
            go test ./cmd/saw -run TestDetectCascades
            ```

            ## Constraints
            - ONLY modify main.go — do NOT touch detect_cascades_cmd.go or tests
            - Add registration in alphabetical order after `newDebugJournalCmd()`
            - Use exact pattern: `newDetectCascadesCmd(),` (note comma)
          files:
            - scout-and-wave-go/cmd/saw/main.go
        - id: B
          task: |
            ## What to Implement
            Add 5 scout automation commands to the web CLI that delegate to scout-and-wave-go packages:
            1. analyze-deps (H3) — delegates to pkg/analyzer
            2. analyze-suitability (H1a) — delegates to pkg/suitability
            3. detect-cascades (M2) — delegates to pkg/analyzer
            4. detect-scaffolds (H4) — delegates to pkg/scaffold
            5. extract-commands (H2) — delegates to pkg/commands

            These are thin wrappers following the same pattern as existing web CLI commands
            (validate.go, extract.go, etc.).

            ## Interfaces to Implement
            Five new command functions matching the existing pattern:
            - `runAnalyzeDeps(args []string) error`
            - `runAnalyzeSuitability(args []string) error`
            - `runDetectCascades(args []string) error`
            - `runDetectScaffolds(args []string) error`
            - `runExtractCommands(args []string) error`

            ## Interfaces to Call
            All interfaces are from scout-and-wave-go:
            - `analyzer.AnalyzeDeps(repoRoot, targetFiles)`
            - `suitability.AnalyzeSuitability(requirementsFile, repoRoot)`
            - `analyzer.DetectCascades(repoRoot, renames)`
            - `scaffold.DetectScaffolds(implPath)`
            - `commands.ExtractCommands(repoRoot)`

            ## Tests to Write
            No tests needed — these are delegation commands. The SDK already has full test
            coverage for all underlying packages. Web CLI tests focus on HTTP/SSE handlers,
            not command delegation.

            ## Verification Gate
            ```bash
            cd /Users/dayna.blackwell/code/scout-and-wave-web
            go build -o /tmp/saw ./cmd/saw
            /tmp/saw analyze-deps --help
            /tmp/saw analyze-suitability --help
            /tmp/saw detect-cascades --help
            /tmp/saw detect-scaffolds --help
            /tmp/saw extract-commands --help
            go test ./cmd/saw
            ```

            ## Constraints
            - Follow existing command patterns (see validate.go, extract.go, completion.go)
            - Use simple switch-based argument parsing (no cobra/pflag in web CLI)
            - Import SDK packages directly: `github.com/blackwell-systems/scout-and-wave-go/pkg/*`
            - Add registrations to main.go in alphabetical order
            - YAML output for all commands (consistency with SDK commands)
            - No heredoc for help text — use simple string literals
          files:
            - scout-and-wave-web/cmd/saw/main.go
            - scout-and-wave-web/cmd/saw/analyze_deps.go
            - scout-and-wave-web/cmd/saw/analyze_suitability.go
            - scout-and-wave-web/cmd/saw/detect_cascades.go
            - scout-and-wave-web/cmd/saw/detect_scaffolds.go
            - scout-and-wave-web/cmd/saw/extract_commands.go
      base_commit: 4fd0fde6af062aac14fa5c7e7f948752d8581cd1
    - number: 2
      agents:
        - id: C
          task: |
            ## What to Implement
            Integrate the 5 scout automation tools into engine.RunScout() to run BEFORE
            launching the Scout agent. Call each tool, collect results, and pass them to
            the Scout agent as additional context in the prompt.

            Call order (all tools are best-effort, continue on error):
            1. **extract-commands (H2)** — detect build/test/lint commands
            2. **analyze-suitability (H1a)** — if feature description contains a requirements
               file path pattern (e.g., "audit.md", "requirements.txt", ends with .md/.txt),
               treat it as requirements file and run suitability analysis
            3. **analyze-deps (H3)** — if suitability scan found files to modify, pass them
               as targetFiles; otherwise scan full repo (empty targetFiles = all Go files)
            4. **detect-scaffolds (H4)** — skip at scout time (no IMPL doc exists yet to analyze)
            5. **detect-cascades (M2)** — skip at scout time (no type renames defined yet)

            Add a new section to the Scout prompt AFTER the feature description and BEFORE
            scout.md contents:

            ```markdown
            ## Automation Analysis Results

            ### Build/Test Commands (H2)
            <YAML output from commands.ExtractCommands, or "Not detected" if error>

            ### Pre-Implementation Status (H1a)
            <YAML output from suitability.AnalyzeSuitability, or "Skipped - no requirements file" if N/A>

            ### Dependency Analysis (H3)
            <YAML output from analyzer.AnalyzeDeps, or "Analysis failed: <error>" if error>

            Use these results to:
            - Populate quality_gates and test_command from H2 output
            - Adjust agent prompts based on H1a status (DONE = add tests, TODO = implement)
            - Use H3 wave_candidate field to assign wave numbers
            - Document pre-implementation findings in suitability assessment
            ```

            ## Interfaces to Implement
            None — only calling existing functions.

            ## Interfaces to Call
            From scout-and-wave-go packages:
            - `commands.ExtractCommands(opts.RepoPath)`
            - `suitability.AnalyzeSuitability(requirementsFile, opts.RepoPath)` (conditional)
            - `analyzer.AnalyzeDeps(opts.RepoPath, targetFiles)`

            ## Tests to Write
            1. TestRunScout_AutomationIntegration — verify automation results are included in prompt
            2. TestRunScout_AutomationFailure — verify Scout still launches if tools fail

            ## Verification Gate
            ```bash
            cd /Users/dayna.blackwell/code/scout-and-wave-go
            go build -o /tmp/sawtools ./cmd/saw
            go test ./pkg/engine -run TestRunScout
            ```

            ## Constraints
            - All automation tool calls are best-effort — if a tool fails, log the error
              and continue (don't block Scout launch)
            - Only run analyze-suitability if feature description references a file path
              (heuristic: contains ".md" or ".txt" substring)
            - Pass H3 targetFiles from H1a results if available, empty slice otherwise
            - Insert automation section AFTER feature description, BEFORE scout.md content
            - Keep existing I6 enforcement and CONTEXT.md prepending logic unchanged
          files:
            - scout-and-wave-go/pkg/engine/runner.go
          dependencies:
            - A
        - id: D
          task: |
            ## What to Implement
            Update the saw-skill.md Scout flow (section starting "If the argument matches
            `scout <feature-description>`") to call sawtools automation commands BEFORE
            launching the Scout agent via Agent tool.

            Add a new step between "Validate the repo is a Git repository" and "Launch Scout agent":

            **Step: Run automation tools (best-effort)**

            Call these sawtools commands in order, capturing output:
            1. `sawtools extract-commands "<repo-path>"` (H2)
            2. `sawtools analyze-suitability "<feature-description>" --repo-root "<repo-path>"` (H1a)
               - Only if feature description is a file path ending in .md/.txt
               - If feature is plain text, skip this step
            3. `sawtools analyze-deps "<repo-path>" --files "<files-from-H1a>"` (H3)
               - If H1a found files, pass them via --files flag (comma-separated)
               - Otherwise omit --files to scan full repo
            4. Skip detect-scaffolds (H4) and detect-cascades (M2) — no IMPL doc exists yet

            All commands are best-effort. If a command fails (exit code 1), log the error
            and continue — do not block Scout launch.

            After collecting results, create a temporary file with automation analysis:
            ```bash
            cat > /tmp/scout-automation-$$.md << 'EOF'
            ## Automation Analysis Results

            ### Build/Test Commands (H2)
            <paste YAML output or "Not detected">

            ### Pre-Implementation Status (H1a)
            <paste YAML output or "Skipped - no requirements file">

            ### Dependency Analysis (H3)
            <paste YAML output or "Analysis failed: <error>">

            Use these results to:
            - Populate quality_gates and test_command from H2 output
            - Adjust agent prompts based on H1a DONE/PARTIAL/TODO status
            - Use H3 wave_candidate field to assign wave numbers
            - Document pre-implementation findings in suitability assessment
            EOF
            ```

            Then prepend this file to the Scout agent prompt (AFTER the existing CONTEXT.md
            prepending if present, BEFORE scout.md contents).

            ## Interfaces to Implement
            None — only Bash commands calling sawtools.

            ## Interfaces to Call
            Via Bash tool:
            - `sawtools extract-commands <repo-path>`
            - `sawtools analyze-suitability <file> --repo-root <repo>`
            - `sawtools analyze-deps <repo> --files <files>`

            ## Tests to Write
            No tests needed — saw-skill.md is a prompt file, not executable code.
            Manual verification: run `/saw scout <feature>` and check Scout agent receives
            automation results in its prompt.

            ## Verification Gate
            ```bash
            cd /Users/dayna.blackwell/code/scout-and-wave
            # Verify file syntax
            grep -A 20 "Step: Run automation tools" implementations/claude-code/prompts/saw-skill.md
            # Manual test: launch Claude Code session and run `/saw scout "test feature"`
            ```

            ## Constraints
            - Insert automation step AFTER git validation, BEFORE Scout agent launch
            - All sawtools calls must handle errors gracefully (if exit code 1, continue)
            - Use temporary file for automation results (avoid massive heredoc in prompt)
            - Prepend automation results AFTER CONTEXT.md (if present), BEFORE scout.md
            - Do NOT modify any other saw-skill.md sections (bootstrap, wave, status)
            - Keep existing model selection, IMPL discovery, and I6 enforcement unchanged
          files:
            - implementations/claude-code/prompts/saw-skill.md
          dependencies:
            - B
