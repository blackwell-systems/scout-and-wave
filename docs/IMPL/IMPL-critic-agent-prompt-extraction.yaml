interface_contracts:
    - name: Dedup marker format (critic-agent)
      description: |
        HTML comment markers wrapping injected reference content. Used by
        validate_agent_launch hook to avoid double-injection.
      definition: |
        Format: <!-- injected: references/critic-agent-{name}.md -->
        Where {name} is one of: verification-checks, completion-format

        The hook checks the agent prompt for these markers before injecting.
        The critic-agent.md core file instructs: "skip reading reference if
        marker already in context."
      location: implementations/claude-code/hooks/validate_agent_launch
    - name: Reference file back-link header (critic-agent)
      description: |
        Each extracted reference file begins with a back-link comment indicating
        it is part of the critic agent procedure.
      definition: |
        First line of each reference file:
        <!-- Part of critic-agent procedure. Loaded by validate_agent_launch hook. -->
      location: implementations/claude-code/prompts/references/
    - name: Critic-agent core reference loading block
      description: |
        Block in slim critic-agent.md that instructs the agent about reference
        files and dedup behavior.
      definition: |
        ## Reference Files

        The following reference files contain detailed procedure steps. They are
        normally injected by the validate_agent_launch hook before this prompt
        is delivered. If you see `<!-- injected: references/critic-agent-X.md -->`
        markers in your context, the content is already loaded — do not re-read
        those files.

        If the markers are absent (e.g., hook not installed), read these files:
        - `${CLAUDE_SKILL_DIR}/references/critic-agent-verification-checks.md` —
          The 7-check verification procedure (file existence, symbol accuracy,
          pattern accuracy, interface consistency, import chains, side effects,
          complexity balance). Always required.
        - `${CLAUDE_SKILL_DIR}/references/critic-agent-completion-format.md` —
          `sawtools set-critic-review` command reference and output format summary.
          Always required.
      location: implementations/claude-code/prompts/agents/critic-agent.md
    - name: Hook injection for critic-agent subagent_type
      description: |
        New check in validate_agent_launch that detects critic-agent launches
        and injects both reference files. Both files are always injected — there
        is no conditional injection for critic-agent.
      definition: |
        Detection: If description contains "[SAW:critic" OR tool_input contains
        "subagent_type: critic-agent" OR the prompt contains
        "# Critic Agent: Pre-Wave Brief Review":

        1. Resolve reference directory
        2. Always inject: critic-agent-verification-checks.md,
           critic-agent-completion-format.md
        3. Dedup: skip injection if <!-- injected: references/critic-agent-X.md -->
           already in prompt
        4. Output: JSON using updatedInput to prepend reference content into the
           agent's prompt: {"hookSpecificOutput": {"hookEventName": "PreToolUse",
           "permissionDecision": "allow", "updatedInput": {"prompt": "<injected>\n\n<orig>"}}}
      location: implementations/claude-code/hooks/validate_agent_launch
