    - number: 2
      agents:
        - id: D
          task: |
            ## What to implement

            Modify SIX files to complete the hook-enforced context injection for
            critic-agent launches.

            **Important context:** The scout extraction IMPL and wave-agent extraction IMPL
            are running in parallel with this IMPL. When you read validate_agent_launch,
            it may already have some additional checks (scout's Check 9, wave-agent's
            Check 10). Either way, add the critic-agent injection as the NEXT check after
            whatever is already there, BEFORE the final exit 0 block. Use `grep -n` to find
            the current structure before editing.

            ### File 1: validate_agent_launch hook

            Modify `implementations/claude-code/hooks/validate_agent_launch` to add
            critic-agent reference injection.

            Read the file first. Find the last check number already present. Add the new
            critic check AFTER the last existing check and BEFORE the final exit 0 block.

            **New section: Critic-agent reference injection**

            ```bash
            # --- Check 11: Critic-agent reference injection ---
            # (Number may differ if scout/wave-agent checks were added concurrently)
            # When launching a critic agent, inject reference files as additionalContext.
            # Both reference files are always injected — no conditional injection.

            is_critic=false
            if [[ "$description" =~ \[SAW:critic ]] || \
               [[ "$prompt" =~ "subagent_type: critic-agent" ]] || \
               [[ "$prompt" =~ "# Critic Agent: Pre-Wave Brief Review" ]]; then
              is_critic=true
            fi

            if [[ "$is_critic" == "true" ]]; then
              ref_dir=""
              skill_dir="${CLAUDE_SKILL_DIR:-${HOME}/.claude/skills/saw}"
              if [[ -d "${skill_dir}/references" ]]; then
                ref_dir="${skill_dir}/references"
              fi

              if [[ -n "$ref_dir" ]]; then
                inject_content=""

                ref_file="${ref_dir}/critic-agent-verification-checks.md"
                if [[ -f "$ref_file" ]] && ! echo "$prompt" | grep -q '<!-- injected: references/critic-agent-verification-checks.md -->'; then
                  inject_content+="<!-- injected: references/critic-agent-verification-checks.md -->"$'\n'
                  inject_content+="$(command cat "$ref_file")"$'\n\n'
                fi

                ref_file="${ref_dir}/critic-agent-completion-format.md"
                if [[ -f "$ref_file" ]] && ! echo "$prompt" | grep -q '<!-- injected: references/critic-agent-completion-format.md -->'; then
                  inject_content+="<!-- injected: references/critic-agent-completion-format.md -->"$'\n'
                  inject_content+="$(command cat "$ref_file")"$'\n\n'
                fi

                # Prepend injected content to the agent's prompt via updatedInput
                if [[ -n "$inject_content" ]]; then
                  jq -n --arg inject "$inject_content" --arg orig "$prompt" \
                    '{"hookSpecificOutput": {"hookEventName": "PreToolUse", "permissionDecision": "allow", "updatedInput": {"prompt": ($inject + "\n\n" + $orig)}}}'
                  exit 0
                fi
              fi
            fi
            ```

            **Notes:**
            - Use `command cat` (not bare `cat`) — avoids brewprune-shim issues.
            - `\[SAW:critic` — backslash before bracket is intentional bash regex escaping.
            - Number the check comment based on what's actually in the file when you edit it.
            - **updatedInput, NOT additionalContext.** PreToolUse `additionalContext` goes
              to the orchestrator, not the subagent. Use `updatedInput.prompt` to prepend
              reference content into the agent's initial prompt. Include
              `permissionDecision: "allow"` alongside `updatedInput`.

            ### File 2: saw-skill.md

            Add two rows to the On-Demand References table:
            ```
            | Critic agent launch (always) | Injected by `validate_agent_launch` hook: `references/critic-agent-verification-checks.md` |
            | Critic agent launch (always) | Injected by `validate_agent_launch` hook: `references/critic-agent-completion-format.md` |
            ```

            Append to the paragraph following the table:
            "Critic agent reference files are also injected automatically by the
            `validate_agent_launch` hook."

            ### File 3: implementations/claude-code/prompts/README.md

            Add 2 new critic-agent reference files to the directory tree under `references/`:
