            - Check 3: pattern_accuracy
            - Check 4: interface_consistency (with Go-specific notes)
            - Check 5: import_chains
            - Check 6: side_effect_completeness (cobra.Command, HTTP route, React, Go type)
            - Check 7: complexity_balance (8-file threshold, 40% threshold, advisory note)

            ### File structure

            Start the file with:
            ```
            <!-- Part of critic-agent procedure. Loaded by validate_agent_launch hook. -->
            # Verification Checks (Step 2)
            ```

            Then include ALL content from lines 51-122, preserving exact formatting,
            markdown structure, and indentation. Do NOT paraphrase — extract verbatim.
            Do NOT include the `## Step 2: For Each Agent, Run 6 Verification Checks`
            header itself (line 51) since the file's own header replaces it.

            The section starts with "Process agents one at a time."
            and ends with "They do not block a PASS verdict."

