title: Extract critic-agent prompt into layered progressive disclosure
feature_slug: critic-agent-prompt-extraction
verdict: SUITABLE
suitability_assessment: |
    File decomposition: 5 distinct files across 4 agents with disjoint ownership.
    Two new reference files (extract from critic-agent.md), one modified core prompt
    (critic-agent.md slim-down), one modified hook (validate_agent_launch), and
    4 doc updates.

    Investigation-first: None. Extraction boundaries are precisely defined with
    line ranges from the current critic-agent.md (192 lines).

    Interface discoverability: Yes. Dedup marker format and extraction boundaries
    are specified upfront. Uses the same pattern as IMPL-scout-prompt-extraction
    and IMPL-wave-agent-prompt-extraction.

    Pre-implementation status: Fresh feature, nothing implemented yet.

    Parallelization value: Same extraction pattern. Wave 1 agents A/B/C can work
    in parallel with fully disjoint file ownership. Wave 2 Agent D wires the hook
    and updates docs.

    Estimated times:
    - Agent execution: ~6 min (3 wave 1 agents + 1 wave 2 agent, ~4 min avg)
    - Merge & verification: ~2 min
    Total SAW time: ~8 min

    Note: Critic-agent has no conditional reference (unlike scout's --program or
    wave-agent's frozen contracts). Both reference files are always injected.
test_command: 'echo ''docs-only: no tests'''
lint_command: none
