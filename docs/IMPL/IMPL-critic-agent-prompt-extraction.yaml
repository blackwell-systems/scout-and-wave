                ├── critic-agent-verification-checks.md  ← NEW
                └── critic-agent-completion-format.md    ← NEW
            ```

            Update the On-Demand References table to add 2 rows for critic-agent references
            with trigger "Critic agent launch (hook-injected)".

            Update the critic-agent.md description in the Agent Type Definitions table:
            "Slim identity core (~75 lines). Verification checks (7 checks) and completion
            format extracted to `references/critic-agent-*.md` and injected by
            `validate_agent_launch` hook. Never modifies source files."

            ### File 4: docs/INSTALLATION.md

            Add 2 new critic-agent reference files to the symlink tree under `references/`:
            ```
            │   ├── critic-agent-verification-checks.md -> prompts/references/critic-agent-verification-checks.md
            │   └── critic-agent-completion-format.md -> prompts/references/critic-agent-completion-format.md
            ```

            ### File 5: implementations/claude-code/hooks/README.md

            Add documentation for the critic-agent reference injection check to the
            validate_agent_launch section:
            - What it does: detects critic-agent launches, injects both reference files
            - Detection signals: `[SAW:critic` in description, `subagent_type: critic-agent`,
              or `# Critic Agent: Pre-Wave Brief Review` in prompt
            - Always-injected: verification-checks, completion-format (no conditional)
            - Dedup marker format: `<!-- injected: references/critic-agent-X.md -->`

            ### File 6: docs/skills-progressive-disclosure.md

            Extend the section noting the agent prompt extraction pattern to include
            critic-agent as a third agent type using progressive disclosure. The pattern
            is now applied to all three core SAW agent types: scout, wave-agent,
            and critic-agent.

            ### Verification

            1. `bash -n implementations/claude-code/hooks/validate_agent_launch` — valid syntax
            2. Earlier checks unchanged
            3. saw-skill.md On-Demand References table has the critic-agent rows
            4. Dedup checks present for both critic reference files
            5. `command cat` used (not bare `cat`)

            ### Constraints
            - Do NOT modify earlier checks in validate_agent_launch
            - Do NOT undo changes from scout or wave-agent IMPLs — extend them
            - Non-critic agents must still pass through with exit 0
          files:
            - implementations/claude-code/hooks/validate_agent_launch
            - implementations/claude-code/prompts/saw-skill.md
            - implementations/claude-code/prompts/README.md
            - docs/INSTALLATION.md
            - implementations/claude-code/hooks/README.md
            - docs/skills-progressive-disclosure.md
          dependencies:
            - A
            - B
            - C
quality_gates:
    level: standard
    gates:
        - type: custom
          command: 'echo ''docs-only: no compilation'''
          required: true
pre_mortem:
    overall_risk: low
    rows:
        - scenario: Three Agent Ds modifying validate_agent_launch concurrently
          likelihood: high
          impact: medium
          mitigation: |
            All three extraction IMPLs have Agent D in wave 2. They CANNOT run
            concurrently since they share validate_agent_launch. The brief explicitly
            instructs reading the file first and adding after whatever checks exist.
            Schedule Agent D runs sequentially across the three IMPLs.
        - scenario: Verdict Thresholds content accidentally extracted to File 1
          likelihood: low
          impact: low
          mitigation: |
            Agent B brief explicitly excludes lines 160-168 (Verdict Thresholds)
            from extraction. Agent C's verification checks that no set-critic-review
            command or output template remains (those go in File 2, not core).
        - scenario: brewprune-shim breaks command cat in hook
          likelihood: medium
          impact: medium
          mitigation: |
            Agent D brief explicitly instructs `command cat` (not bare `cat`).
            Documented in project memory.
