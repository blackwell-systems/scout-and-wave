          task: |
            ## Context

            You are working in the Go engine repo at `/Users/dayna.blackwell/workspace/code/scout-and-wave-go`.
            Your owned files are `pkg/result/codes.go` and `pkg/result/result.go`.
            All changes are internal to the `result` package. The sole external caller of the
            renamed constants is `pkg/notify/dispatcher.go`, which references them by constant name
            (not raw string) — the rename is transparent and requires no update to that file.

            ## What to implement

            ### codes.go — P0-1: Rename dispatch constants (lines 159–161)

            Currently:
            ```go
            CodeDispatchNoAdapters = "DISPATCH_NO_ADAPTERS"
            CodeDispatchAllFailed  = "DISPATCH_ALL_FAILED"
            ```

            Replace with:
            ```go
            // CodeDispatchNoAdapters is emitted by Dispatcher.Dispatch when no adapters are registered.
            CodeDispatchNoAdapters = "N086_DISPATCH_NO_ADAPTERS"
            // CodeDispatchAllFailed is emitted by Dispatcher.Dispatch when all adapters fail.
            CodeDispatchAllFailed = "N087_DISPATCH_ALL_FAILED"
            ```

            Both constants remain in the same `const` block (Engine error codes N001-N099).
            Keep the existing comment lines above each constant.

            ### codes.go — P0-2: Delete the SV01-SV05 const block (lines 309–316)

            Delete the entire block:
            ```go
            // Scaffold validation error codes (SV01-SV10)
            const (
                CodeScaffoldSyntaxFail   = "SV01_SYNTAX_FAIL"        // go/parser failed
                CodeScaffoldImportFail   = "SV02_IMPORT_FAIL"        // missing imports detected
                CodeScaffoldBuildFail    = "SV03_BUILD_FAIL"         // build command failed
                CodeScaffoldParseFail    = "SV04_PARSE_FAIL"         // AST parse error (distinct from syntax fail)
                CodeScaffoldProtocolLoad = "SV05_PROTOCOL_LOAD_FAIL" // IMPL doc load failed
            )
            ```

            These constants have zero callers. Three of the five (SV01_INVALID_ENUM,
            SV01_INVALID_PATH, SV01_CROSS_FIELD) were already migrated to V036-V038
            per inline comments on lines 59–66. The remaining two are unused dead code.

            ### codes.go — P2-1: Add missing ranges to package doc comment (lines 1–20)

            The package doc comment currently lists these ranges (among others):
            ```
            //	Q001-Q099: Queue errors
            //	R001-R099: Retry errors
            ```
            Both are MISSING from the current doc comment. Add them after the existing
            `X001-X099` line so the full set is documented. Insert:
            ```go
            //	Q001-Q099: Queue errors
            //	R001-R099: Retry errors
            ```

            ### codes.go — P2-2: Fix inline range comment (line 154)

            Current comment:
            ```go
            // N018-N084: Engine operation codes (renamed to follow Nxxx_DESCRIPTION pattern)
            ```

            After P0-1 adds N086 and N087, update to:
            ```go
            // N018-N087: Engine operation codes (renamed to follow Nxxx_DESCRIPTION pattern)
            ```

            Note: N085 (CodeConfigIOFailed) already exists in the block. The range
            should extend to N087 after this change.

            ### result.go — P1-2: Rename `warnings` parameter in NewPartial (line 126)

            Current signature:
            ```go
            func NewPartial[T any](data T, warnings []SAWError) Result[T] {
                return Result[T]{
                    Data:   &data,
                    Errors: warnings,
                    Code:   "PARTIAL",
                }
            }
            ```

            Rename the parameter `warnings` to `errs` in both the signature and the
            function body. The type does not change. No callers need updating (this is
            a parameter name, not an exported identifier). Result:
            ```go
            func NewPartial[T any](data T, errs []SAWError) Result[T] {
                return Result[T]{
                    Data:   &data,
                    Errors: errs,
                    Code:   "PARTIAL",
                }
            }
            ```

            Also update the package-level doc comment on `result.go` line 7 which says
            "warnings in Errors" — change to "errors in Errors".

            ## Verification gate

            ```bash
            cd /Users/dayna.blackwell/workspace/code/scout-and-wave-go
            go build ./pkg/result/...
            go vet ./pkg/result/...
            go test ./pkg/result/... -v
            ```

            The build must pass. All existing tests must pass. The renamed constants
            must compile; confirm `pkg/notify/dispatcher.go` still builds:
            ```bash
            go build ./pkg/notify/...
            ```

