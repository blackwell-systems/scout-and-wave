            ### codes_test.go — P0-3: Add dispatch codes to TestNCodesFollowNamingPattern

            The test at lines 11–98 in `codes_test.go` checks N-range constants but
            omits `CodeDispatchNoAdapters` and `CodeDispatchAllFailed`. Add both
            constants to the `ncodes` slice immediately after `CodeContextCancelled`:

            ```go
            {"CodeDispatchNoAdapters", CodeDispatchNoAdapters},
