pre_mortem:
    overall_risk: low
    rows:
        - scenario: Agent B's TestAllCodesAreUnique includes SV constants that Agent A deleted
          likelihood: medium
          impact: high
          mitigation: |
            Agent B's brief explicitly lists the post-Agent-A constant set and instructs
            not to include the five SV constants (CodeScaffoldSyntaxFail etc). Agents
            work in separate worktrees so cannot see each other's changes at runtime,
            but the brief specifies the exact expected state. The verification gate runs
