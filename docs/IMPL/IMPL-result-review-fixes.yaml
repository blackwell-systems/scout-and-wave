            ```

            ### codes_test.go — P2-3: Strengthen regex in TestNCodesFollowNamingPattern

            The test currently checks:
            - `len(tc.value) < 5` — too short
            - `tc.value[0] != 'N'` — starts with N
            - `!strings.Contains(tc.value, "_")` — has underscore

            Replace the entire per-test body (lines 84–97) with a regexp check:

            ```go
            import "regexp"

            var nCodePattern = regexp.MustCompile(`^[A-Z][0-9]{3}_[A-Z0-9_]+$`)

            // Inside the test loop:
            for _, tc := range ncodes {
                t.Run(tc.name, func(t *testing.T) {
                    if !nCodePattern.MatchString(tc.value) {
                        t.Errorf("%s = %q: does not match pattern ^[A-Z][0-9]{3}_[A-Z0-9_]+$", tc.name, tc.value)
                    }
                })
            }
            ```

            Declare `nCodePattern` as a package-level var above the test function
            (or inside the function — either is fine). Remove the `strings` import
            if it is no longer used after this change; add the `regexp` import.

