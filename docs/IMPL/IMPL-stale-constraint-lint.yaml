interface_contracts:
    - name: StaleConstraintWarning
      description: |-
        Struct representing a single stale-constraint detection result.
        Emitted when an agent's task text mentions a file path that belongs
        to a different agent's file_ownership entry.
      definition: |
        type StaleConstraintWarning struct {
            AgentID       string `json:"agent_id"`
            MentionedFile string `json:"mentioned_file"`
            OwnedByAgent  string `json:"owned_by_agent"`
            Message       string `json:"message"`
        }
      location: pkg/protocol/stale_constraint.go
    - name: DetectStaleConstraints
      description: |-
        Scans all agent task texts in the manifest for file path references
        that are owned by a different agent. Returns one warning per match.
        Files not in any agent's ownership produce no warning (by design).
        This is a pure in-memory check тАФ no filesystem access required.
      definition: |
        func DetectStaleConstraints(m *IMPLManifest) []StaleConstraintWarning
      location: pkg/protocol/stale_constraint.go
waves:
    - number: 1
      agents:
        - id: A
          task: |
            ## Context

            You are implementing a stale-constraint lint check for the pre-wave-validate
            pipeline. When a Scout moves a file from one agent to another mid-IMPL, the
            old agent's Constraints section can still reference the file. This check
            detects that pattern at pre-wave-validate time.

            ## What to implement

            Create two new files in `pkg/protocol/`:

            ### File 1: `pkg/protocol/stale_constraint.go`

            Package: `protocol`

            Implement the following exported type and function:

            ```go
            // StaleConstraintWarning is emitted when an agent's task text references a
            // file path that is owned by a different agent in the manifest.
            type StaleConstraintWarning struct {
                AgentID       string `json:"agent_id"`
                MentionedFile string `json:"mentioned_file"`
                OwnedByAgent  string `json:"owned_by_agent"`
                Message       string `json:"message"`
            }

            // DetectStaleConstraints scans each agent's task text for file path references
            // that appear in another agent's file_ownership, emitting a warning for each match.
            // Returns nil if no stale references are found.
            func DetectStaleConstraints(m *IMPLManifest) []StaleConstraintWarning
            ```

            **Detection algorithm:**

            1. Build a map from file path тЖТ agent ID using `m.FileOwnership`.
               Each file path appears at most once (I1 enforces disjoint ownership).

            2. For each agent in `m.Waves`, extract the agent's `Task` text and scan
               it for file path references using the regex below.

            3. For each extracted path, check whether it appears in the ownership map
               AND is owned by a different agent. If so, emit a `StaleConstraintWarning`.

            4. A file not in any agent's ownership produces NO warning тАФ this avoids
               false positives for files mentioned as context (e.g. "see also README.md").

            **File path extraction regex** (design for low false-positive rate):

            The regex must match paths that look like file references, not version strings
            or URLs. Use this pattern as the starting point:

            ```
            (?:^|[\s`'"(])([a-zA-Z0-9_\-./]+\.(?:go|md|sh|yaml|yml|ts|js|py|rs|toml|json|txt))(?:$|[\s`'")\]:,])
            ```

            Constraints on the regex:
            - MUST require a recognized extension from the list above
            - MUST NOT match `v1.0.go` style version strings тАФ exclude paths where the
              base filename looks like a semver component (starts with a digit followed
              by only dots and digits, e.g. `1.2.3`)
            - MUST NOT match URLs (paths containing `://`)
            - Paths may include `/` separators (e.g. `pkg/engine/manager.go`)
            - Single-component names without `/` are acceptable IF they have a recognized
              extension (e.g. `manager.go`)
            - Deduplicate extracted paths per agent before checking ownership

            After extracting candidate paths from task text, normalize them:
            - Strip leading `./` if present
            - Keep as-is otherwise (do not try to resolve relative paths)

            **False-positive avoidance:**
            - The regex uses boundary anchors (whitespace/punctuation) on both sides
            - Version strings like `v0.13.0` are not matched because `.0` is not in the
              extension list
            - Import paths like `github.com/foo/bar` are not matched because `com`, `foo`,
              `bar` have no recognized extension (unless someone names a file `bar.go`,
              which IS valid and should be matched)

            **Message format** for each warning:
            ```
            Agent <AgentID> task mentions `<MentionedFile>` which is owned by Agent <OwnedByAgent> тАФ possible stale constraint text
            ```

            ### File 2: `pkg/protocol/stale_constraint_test.go`

            Package: `protocol`

            Write tests covering:

            1. **Stale constraint detected**: Two agents A and B. Agent A owns `pkg/engine/manager.go`.
               Agent B's task text says "In manager.go, ONLY edit the LanguageIDFromPath switch."
               Expect one warning: AgentID=B, MentionedFile=`manager.go`,
               OwnedByAgent=A.

            2. **Path not owned by anyone тАФ no warning**: Agent A owns `pkg/engine/manager.go`.
               Agent B's task text mentions `README.md`. `README.md` is not in any agent's
               file_ownership. Expect no warnings.

            3. **Agent mentions its own file тАФ no warning**: Agent A owns `pkg/engine/manager.go`
               and its task text mentions `manager.go`. Expect no warnings (own file reference
               is not stale).

            4. **Cross-wave stale reference detected**: Agent A (wave 1) owns `cmd/sawtools/main.go`.
               Agent B (wave 2) task text mentions `cmd/sawtools/main.go`. Expect one warning.
               (Wave number does not exempt a reference тАФ ownership is ownership.)

            5. **Nil manifest тАФ no panic**: Call `DetectStaleConstraints(nil)` and expect
               it to return nil without panicking.

            6. **Full path match**: Agent A owns `pkg/engine/manager.go`. Agent B's task
               mentions the full path `pkg/engine/manager.go`. Expect one warning
               (full path lookup works, not just basename).

            Each test should use a minimal `&IMPLManifest{}` literal тАФ no YAML files needed.

            ## Imports required

            ```go
            import (
                "regexp"
                "strings"
            )
            ```

            No filesystem access, no exec calls. Pure in-memory.

            ## Verification gate

            ```
            GOWORK=off go build ./pkg/protocol/...
            GOWORK=off go vet ./pkg/protocol/...
            GOWORK=off go test ./pkg/protocol/ -run TestDetectStaleConstraints -v
            ```

            Expected: all 6 test cases pass. Zero build errors.

            Postcondition checks:
            ```
            # StaleConstraintWarning type exists in the new file
            grep -c "StaleConstraintWarning" /Users/dayna.blackwell/code/scout-and-wave-go/pkg/protocol/stale_constraint.go
            # expected: 2 (type declaration + field usage or return type)

            # DetectStaleConstraints function exists
            grep -c "func DetectStaleConstraints" /Users/dayna.blackwell/code/scout-and-wave-go/pkg/protocol/stale_constraint.go
            # expected: 1

            # Test file has 6 test cases (or at least 5)
            grep -c "func Test" /Users/dayna.blackwell/code/scout-and-wave-go/pkg/protocol/stale_constraint_test.go
            # expected: >= 5
            ```

            ## Constraints

            - Do NOT modify any existing files. Create only the two new files listed above.
            - Do NOT add filesystem access or exec calls тАФ this is a pure in-memory scan.
            - Do NOT worry about wiring into pre_wave_validate_cmd.go тАФ that is Agent B's job
              in Wave 2. Your deliverable is the function and its tests only.
            - If the stale_constraint.go scaffold file already exists (created by the
              Scaffold Agent), overwrite it with the complete implementation тАФ the scaffold
              is just a type stub.
          files:
            - pkg/protocol/stale_constraint.go
            - pkg/protocol/stale_constraint_test.go
    - number: 2
      agents:
        - id: B
