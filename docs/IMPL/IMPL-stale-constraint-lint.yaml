pre_mortem:
    overall_risk: low
    rows:
        - scenario: |-
            Agent A's file path regex is too broad and matches version strings like
            `v0.13.0` or Go import paths like `result.go`, producing false-positive
            warnings that annoy users.
          likelihood: medium
          impact: medium
          mitigation: |-
            The regex requires a recognized extension from a fixed list (go, md, sh, yaml,
            yml, ts, js, py, rs, toml, json, txt). Version strings like `v0.13.0` end in `.0`
            which is not in the list. The boundary anchors (whitespace/punctuation on both
            sides) prevent mid-word matches. Test case 2 (unowned file reference) explicitly
            verifies no false positive for README.md. If false positives emerge post-ship,
            the check is WARNING-only so users can ignore them without breaking.
        - scenario: |-
            Agent B uses `StaleConstraintsResult` before Agent A's work is merged,
            causing a compile error in the worktree.
          likelihood: low
          impact: high
          mitigation: |-
            Agent B is in Wave 2, which only runs after Agent A's Wave 1 has been merged.
            The scaffold stub in stale_constraint.go ensures the type compiles even before
            Agent A's full implementation is merged. Wave sequencing enforces the dependency.
        - scenario: |-
            Agent B accidentally adds stale-constraint failures to the exit-code condition,
            making the check an error instead of a warning.
          likelihood: low
          impact: medium
          mitigation: |-
            The agent brief explicitly states "Do NOT add || !output.StaleConstraints.Passed"
            in bold constraints. The test verifies the exit code is zero even when warnings
            are present (cmd.Execute() returns nil). Post-merge build+test gate will catch
            any exit-code regression.
        - scenario: |-
            The stale-constraint check matches a file mentioned in the task as documentation
            context (e.g. "see pkg/engine/runner.go for the pattern to follow"), not as a
            constraint. This is a false positive of a different kind тАФ the file IS owned by
            another agent, but the reference is informational.
          likelihood: medium
          impact: low
          mitigation: |-
            This is an accepted limitation. The check is WARNING-only, so false positives
            of this kind are visible but harmless. The message says "possible stale constraint
            text" which leaves room for the human to decide. No suppression mechanism is
            planned at this stage.
