interface_contracts:
    - name: newAutoCmd
      description: |-
        New cobra subcommand for sawtools auto. Wraps run-scout + confirm + run-wave.
        Follows the same pattern as newRunScoutCmd in run_scout_cmd.go.
        Uses protocol.Load (context, path) to read the IMPL manifest after Scout completes.
      definition: |-
        func newAutoCmd() *cobra.Command
        // Flags:
        //   --repo-dir string    Repository root (shared package-level var, default: current directory)
        //   --saw-repo string    SAW protocol repo path
        //   --scout-model string Scout model override
        //   --wave-model string  Wave model override (reserved)
        //   --timeout int        Scout timeout in minutes (default: 10)
        //   --skip-confirm bool  Skip human confirmation prompt (expert/CI use only)
        //
        // Engine calls used:
        //   engine.RunScoutFull(ctx, RunScoutFullOpts{...}, streamFn) -> (*RunScoutFullResult, error)
        //   protocol.Load(ctx, implPath) -> (*IMPLManifest, error)  [pkg/protocol/manifest.go:62]
        //   engine.RunWaveFull(ctx, RunWaveFullOpts{ManifestPath, RepoPath, WaveNum}) -> (*WaveResult, error)
      location: cmd/sawtools/auto_cmd.go
    - name: saw-auto invocation mode entry
      description: |-
        New row to add to the Invocation Modes table in saw-skill.md, plus
        a new "Auto Flow" section describing the step-by-step logic.
      definition: |-
        Invocation Modes table row (add after /saw wave row):
          | `/saw auto [--model <m>] [--skip-confirm] "<feature>"` | Scout + confirm + wave in one command |

        New "Auto Flow" section content (add after Invocation Modes table, before Pre-flight Validation):

        **Auto flow** (`auto <feature-description>`):
        Collapses scout -> review -> wave into a single command. Human confirmation is
        preserved -- /saw auto eliminates command overhead, not the review step.

        1. Launch Scout agent (same as Scout flow step 1). Inform user.
        2. When Scout completes, read IMPL doc.
        3. If NOT_SUITABLE: report verdict, reason, and suggested alternative. Stop.
        4. E16+E35: Validate IMPL doc (same as Scout flow step 3).
        5. Critic Gate E37 (same as Scout flow step 4).
        6. Report: verdict, wave structure summary, file ownership count, interface contract
           count. If SUITABLE_WITH_CAVEATS, show caveats explicitly before confirmation.
        7. Scaffold Agent (conditional, same as Scout flow step 6).
        8. Ask: "Proceed with wave execution? [y/N]"
           - N: "Auto flow cancelled. Review the IMPL doc and run /saw wave when ready." Stop.
           - Y: continue.
        9. Execute waves with --auto behavior (I3: each wave waits for prior wave to merge
           and verify). Equivalent to /saw wave --auto starting at Wave 1.
        10. On any wave failure: stop and report. Do not proceed.
        11. On completion: report result (same as standard wave completion).

        --skip-confirm flag (expert/CI only): omits step 8. Removes human checkpoint.
        NOT recommended for regular use.
      location: implementations/claude-code/prompts/saw-skill.md
