title: Add /saw auto command
feature_slug: saw-auto-command
verdict: SUITABLE
suitability_assessment: |-
    /saw auto is a new entry point that collapses scout -> review -> wave into one command.
    All five suitability preconditions hold:

    1. File decomposition: Work splits cleanly across two repos and three agents. Agent A
       owns behavior-critical skill and inject-context files in scout-and-wave. Agent A2
       owns three documentation files (README.md, POSITION.md,
       docs/skills-progressive-disclosure.md) in scout-and-wave. Agent B owns the new Go
       subcommand file and main.go registration in scout-and-wave-go. No shared files.
       CHANGELOG.md is updated post-merge (it is 2396 lines; assigning it to any agent
       would exceed the V048 LOC budget of 2000 lines).

    2. No investigation-first blockers: The design is fully specified. The Go command pattern
       is established (run_scout_cmd.go is the direct model). No root-cause analysis needed.

    3. Interface discoverability: The skill changes are self-contained prose additions. The Go
       command's signature follows the existing cobra pattern -- no cross-agent interface needed.

    4. Pre-implementation status: /saw auto does not exist in any file. 100% TODO.

    5. Parallelization value: Two repos, independent tech stacks (markdown vs Go). Full
       independence -- single wave with three parallel agents.

    Estimated times:
    - Scout phase: ~8 min (dependency mapping, interface contracts, IMPL doc)
    - Agent execution: ~15 min (3 agents x ~7-8 min avg, running in parallel)
    - Merge and verification: ~3 min
    Total SAW time: ~26 min

    Sequential baseline: ~20 min (one agent at a time)
    Time savings: ~6 min net. Modest but the cross-repo isolation and coordination artifact
    also provide value as an audit trail.

    Recommendation: SUITABLE. Proceed with 3 parallel agents.
