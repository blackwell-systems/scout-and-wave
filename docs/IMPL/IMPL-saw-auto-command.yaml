pre_mortem:
    overall_risk: low
    rows:
        - scenario: |-
            RunScoutFullOpts or RunWaveFullOpts field names differ from the template.
            For example, WaveNum might be named Wave, or SAWRepoPath might be absent.
          likelihood: low
          impact: medium
          mitigation: |-
            Agent B is explicitly instructed to read run_scout_cmd.go and run_wave_cmd.go
            before writing auto_cmd.go and to adapt field names to match actual types.
        - scenario: protocol.Load signature differs from (ctx, path) or returns a different error type.
          likelihood: low
          impact: low
          mitigation: |-
            The function signature was verified during scouting: pkg/protocol/manifest.go:62
            shows `func Load(ctx context.Context, path string) (*IMPLManifest, error)`.
            Agent B brief uses this exact signature.
        - scenario: |-
            The Invocation Modes table in saw-skill.md has a different column count or
            format than the brief assumes (e.g., a third column for "available since").
          likelihood: low
          impact: low
          mitigation: |-
            Agent A reads the actual file before editing and adapts to the real format.
            The brief gives the content; the agent must fit it to the existing structure.
        - scenario: |-
            saw-skill.md symlink -- the file at ~/.claude/skills/saw/SKILL.md is a symlink
            to the repo source. Agent A must edit the repo source only; the symlink propagates.
            If the agent tries to edit the symlink target directly it may edit the wrong path.
          likelihood: low
          impact: low
          mitigation: |-
            Brief instructs Agent A to edit implementations/claude-code/prompts/saw-skill.md
            (repo source). The symlink propagates changes automatically.
        - scenario: |-
            CHANGELOG.md version number is 0.77.0 or higher by execution time if another
            change was committed after scouting.
          likelihood: low
          impact: low
          mitigation: |-
            Post-merge checklist instructs the orchestrator to read CHANGELOG.md first and
            use the next available version number.
