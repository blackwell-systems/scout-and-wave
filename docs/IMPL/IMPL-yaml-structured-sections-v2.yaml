# Scaffolds
scaffolds:
  - file_path: "/Users/dayna.blackwell/code/scout-and-wave-go/pkg/protocol/types_sections.go"
    contents: |
      package protocol

      // StubReport represents the structured stub detection report for a wave.
      type StubReport struct {
          Status       string     `yaml:"status" json:"status"` // "stubs_detected" | "clean"
          ScannedFiles int        `yaml:"scanned_files" json:"scanned_files"`
          Stubs        []StubHit  `yaml:"stubs" json:"stubs"`
      }

      // StubHit represents a single detected stub pattern (NOTE: different from stubs.go StubHit).
      type StubHit struct {
          File    string `yaml:"file" json:"file"`
          Line    int    `yaml:"line" json:"line"`
          Pattern string `yaml:"pattern" json:"pattern"`
          Context string `yaml:"context" json:"context"`
      }

      // PostMergeChecklist represents the structured post-merge checklist.
      type PostMergeChecklist struct {
          Groups []ChecklistGroup `yaml:"groups" json:"groups"`
      }

      // ChecklistGroup represents a named group of checklist items.
      type ChecklistGroup struct {
          Heading string          `yaml:"heading" json:"heading"`
          Items   []ChecklistItem `yaml:"items" json:"items"`
      }

      // ChecklistItem represents a single checklist item with checked state.
      type ChecklistItem struct {
          Text    string `yaml:"text" json:"text"`
          Checked bool   `yaml:"checked" json:"checked"`
      }
    import_path: "github.com/blackwell-systems/scout-and-wave-go/pkg/protocol"
    status: "pending"

# Interface Contracts

interface_contracts:
  - name: "StubReport YAML Schema"
    description: "Structured stub report format output by scan-stubs.sh, wrapped by stubs.go"
    definition: |
      ```yaml type=impl-stub-report
      status: stubs_detected  # or: clean
      scanned_files: 14
      stubs:
        - file: pkg/api/handler.go
          line: 42
          pattern: TODO
          context: "// TODO: implement error handling"
      ```
    location: "protocol/message-formats.md"

  - name: "QualityGates YAML Schema"
    description: "Quality gates with typed-block fence (parser already handles unfenced YAML)"
    definition: |
      ```yaml type=impl-quality-gates
      level: standard
      gates:
        - type: build
          command: go build ./...
          required: true
        - type: test
          command: go test ./...
          required: true
      ```
    location: "protocol/message-formats.md"

  - name: "PostMergeChecklist YAML Schema"
    description: "Post-merge checklist with grouped items"
    definition: |
      ```yaml type=impl-post-merge-checklist
      groups:
        - heading: Verification
          items:
            - text: Run integration tests
              checked: false
            - text: Check monitoring
              checked: false
      ```
    location: "protocol/message-formats.md"

  - name: "KnownIssues YAML Schema"
    description: "Known issues array with title/status/description/workaround"
    definition: |
      ```yaml type=impl-known-issues
      issues:
        - title: Package import fails
          status: pre-existing
          description: Import resolution breaks on Windows
          workaround: Use forward slashes
      ```
    location: "protocol/message-formats.md"

  - name: "extractTypedBlock Helper"
    description: "Reusable helper to extract typed blocks from scanner"
    definition: |
      func extractTypedBlock(scanner *bufio.Scanner, blockType string) ([]string, bool) {
        // Returns block lines and success flag
        // Used by all typed-block parsers
      }
    location: "pkg/protocol/parser.go"

