title: 'saw init — Zero-Config Project Initialization Command'
feature_slug: saw-init
verdict: SUITABLE
suitability_assessment: |-
  File decomposition: 3 distinct files change with clean disjoint ownership.
  Agent A owns the new command file (init_cmd.go) and its test file.
  Agent B owns main.go (registration) and can be its own integration wave.
  No two agents need to write to the same file simultaneously.

  Investigation-first items: None. The feature is fully specified in the design doc
  (onboarding-improvement-plan.md §4.1). No root-cause analysis required.

  Interface discoverability: The cross-agent interface is trivial — Agent A defines
  newInitCmd() and Agent B registers it in main.go. The signature is predictable
  before implementation starts.

  Pre-implementation status: No existing `init` command in sawtools. The feature is
  entirely TODO. The pkg/commands and pkg/config packages that init_cmd.go will reuse
  already exist and are stable.

  Parallelization value: Two agents with a sequential dependency (A then B). The
  build/test cycle for Go is moderate (~10-15s). With only 2 agents and a single
  dependency edge, the parallelization benefit is marginal but the IMPL doc provides
  value as an audit trail and integration spec. The integration wave (Wave 2) is tiny
  (1 file, 1 line change) so the total elapsed time is dominated by Agent A's work.

  Recommendation: Proceed as SUITABLE. Wave 1 has one substantive agent; Wave 2 is
  a 5-minute integration step. Total SAW time ~20 min vs ~20 min sequential — no
  meaningful speedup, but coordination value is present.

  Estimated times:
  - Scout phase: ~15 min
  - Agent execution: Wave 1 ~15 min (Agent A), Wave 2 ~5 min (Agent B, integration)
  - Merge and verification: ~5 min
  Total SAW time: ~35 min

  Sequential baseline: ~20 min (both agents sequential, no coordination overhead)
  Recommendation: Marginal parallelization gains; proceed for coordination and audit value.

test_command: go test ./...
lint_command: go vet ./...
state: SCOUT_PENDING

quality_gates:
  level: standard
  gates:
    - type: build
      command: go build ./...
      required: true
    - type: lint
      command: go vet ./...
      required: true
    - type: test
      command: go test ./cmd/sawtools/... -run TestInit
      required: true

scaffolds: []

file_ownership:
  - file: cmd/sawtools/init_cmd.go
    agent: A
    wave: 1
    action: new
    repo: scout-and-wave-go
    depends_on: []
  - file: cmd/sawtools/init_cmd_test.go
    agent: A
    wave: 1
    action: new
    repo: scout-and-wave-go
    depends_on: []
  - file: cmd/sawtools/main.go
    agent: B
    wave: 2
    action: modify
    repo: scout-and-wave-go
    depends_on:
      - A

interface_contracts:
  - name: newInitCmd
    description: |-
      Returns the cobra.Command for `sawtools init`. Registered in main.go via
      rootCmd.AddCommand(newInitCmd()). Takes no constructor arguments; flags
      are defined internally on the returned command.
    definition: |
      func newInitCmd() *cobra.Command
    location: cmd/sawtools/init_cmd.go

  - name: detectProject
    description: |-
      Scans repoDir for known marker files and returns a DetectedProject
      describing the language, build command, test command, and detected
      project name. Uses os.Stat priority ordering across known marker files.
    definition: |
      type DetectedProject struct {
          Name      string // base name of repoDir
          Language  string // "go", "rust", "node", "python", "ruby", "makefile", "unknown"
          Build     string // detected build command, empty if none
          Test      string // detected test command, empty if none
          Detected  bool   // true when values came from auto-detection
      }

      func detectProject(repoDir string) DetectedProject
    location: cmd/sawtools/init_cmd.go

  - name: generateConfig
    description: |-
      Converts a DetectedProject into a SAWConfig suitable for writing to
      saw.config.json. Sets repos, agent.scout_model, agent.wave_model.
      Does NOT include quality.build or quality.test — those fields are
      not in the SAWConfig schema (build/test commands live in saw.config.json
      as top-level keys "build" and "test" with "detected" markers, written
      as raw JSON by the command, not via SAWConfig).
    definition: |
      func generateConfig(repoDir string, project DetectedProject) *config.SAWConfig
    location: cmd/sawtools/init_cmd.go

waves:
  - number: 1
    agents:
      - id: A
        task: |-
          ## Context

          You are implementing `sawtools init` — a zero-config project initialization
          command for the sawtools CLI. This is a new command in
          `cmd/sawtools/init_cmd.go` (package main).

          ## What to implement

          ### File: cmd/sawtools/init_cmd.go

          Implement `newInitCmd() *cobra.Command` following the same pattern as
          other commands in this package (e.g., verify_install_cmd.go,
          install_hooks_cmd.go). The command signature is:

          ```
          sawtools init [--repo <path>] [--force]
          ```

          **Flags:**
          - `--repo <path>` — directory to initialize (default: current working directory)
          - `--force` — overwrite existing saw.config.json

          **Behavior (in order):**

          1. Resolve the target directory (--repo flag or os.Getwd()).

          2. Check if saw.config.json already exists at that path. If it exists and
             --force is NOT set, print an error message and return a non-nil error:
             ```
             saw.config.json already exists at <path>. Use --force to overwrite.
             ```

          3. Call detectProject(repoDir) — see below.

          4. Call generateConfig(repoDir, project) to build a *config.SAWConfig.

          5. Write saw.config.json using config.Save(repoDir, cfg).
             Additionally, the output JSON must include top-level "build" and "test"
             keys with "detected": true markers that are NOT part of SAWConfig.
             To achieve this, after config.Save writes the base config, re-read the
             file, unmarshal into map[string]json.RawMessage, add the "build" and
             "test" keys (marshaled from anonymous structs), then write back atomically
             using os.CreateTemp + os.Rename.

             The "build" and "test" keys look like:
             ```json
             "build": {"command": "go build ./...", "detected": true},
             "test":  {"command": "go test ./...",  "detected": true}
             ```
             If the detected commands are empty strings, omit the respective key.

          6. Call runInstallChecks() (already defined in verify_install_cmd.go in the
             same package) and call printHumanOutput(cmd, result) to display results.
             If the verdict is "FAIL", print the sawtools install instructions after
             the checks:
             ```
             sawtools not found. Install it:
               go install github.com/blackwell-systems/scout-and-wave-go/cmd/sawtools@latest

             Or build from source:
               git clone https://github.com/blackwell-systems/scout-and-wave-go.git
               cd scout-and-wave-go && go build -o ~/.local/bin/sawtools ./cmd/sawtools
             ```

          7. Print next steps:
             ```
             SAW initialized for <project.Name> (<project.Language>).

             Quick start:
               saw plan "describe your feature"     Create an implementation plan
               saw serve                            Open the web dashboard

             Learn more:
               saw help                             All commands
             ```
             Use fmt.Fprintf(cmd.OutOrStdout(), ...) for all output so tests can
             capture it.

          ### Helper functions to implement

          **detectProject(repoDir string) DetectedProject**

          Check for marker files in repoDir in this priority order:
          1. go.mod → language "go", build "go build ./...", test "go test ./..."
          2. Cargo.toml → language "rust", build "cargo build", test "cargo test"
          3. package.json → language "node", build "npm run build", test "npm test"
          4. pyproject.toml OR requirements.txt → language "python", build "", test "pytest"
          5. Gemfile → language "ruby", build "", test "bundle exec rspec"
          6. Makefile (with no language marker above) → language "makefile", build "make", test "make test"
          7. None found → language "unknown", build "", test ""

          Use os.Stat for each check. Set Detected: true whenever commands are set.
          Set Name to filepath.Base(repoDir).

          You may optionally use the pkg/commands extractor for Go/Rust/Node/Python
          detection (it already handles those toolchains), but the direct os.Stat
          approach is simpler and avoids an import cycle risk. Use whichever is cleaner.

          **generateConfig(repoDir string, project DetectedProject) *config.SAWConfig**

          Returns a *config.SAWConfig with:
          ```go
          &config.SAWConfig{
              Repos: []config.RepoEntry{
                  {Name: project.Name, Path: repoDir},
              },
              Agent: config.AgentConfig{
                  ScoutModel: "claude-sonnet-4-6",
                  WaveModel:  "claude-sonnet-4-6",
              },
          }
          ```

          ### DetectedProject struct

          Define it in init_cmd.go (unexported fields are fine; the struct itself
          is package-level so tests can reference it):
          ```go
          type DetectedProject struct {
              Name     string
              Language string
              Build    string
              Test     string
              Detected bool
          }
          ```

          ## Imports

          You will need:
          - "encoding/json"
          - "fmt"
          - "os"
          - "path/filepath"
          - "github.com/blackwell-systems/scout-and-wave-go/pkg/config"
          - "github.com/spf13/cobra"

          ## File: cmd/sawtools/init_cmd_test.go

          Write table-driven tests covering:

          1. **TestDetectProject** — create temp dirs with marker files, verify
             language, build, and test fields are set correctly for each language.
             Test cases: go.mod, Cargo.toml, package.json, pyproject.toml, Gemfile,
             Makefile-only, and empty dir (unknown).

          2. **TestInitCmd_AlreadyExists** — create a temp dir with an existing
             saw.config.json, run the command without --force, expect non-nil error.

          3. **TestInitCmd_Force** — same setup, run with --force, expect success
             and that saw.config.json is overwritten.

          4. **TestInitCmd_WritesConfig** — create a temp dir with go.mod, run init,
             read back saw.config.json, verify:
             - repos[0].name == basename of temp dir
             - repos[0].path == temp dir path
             - agent.scout_model == "claude-sonnet-4-6"
             - build.command == "go build ./..."
             - build.detected == true
             - test.command == "go test ./..."
             - test.detected == true

          5. **TestInitCmd_Output** — run init in a Go project temp dir, capture
             cmd.OutOrStdout() output, verify it contains "SAW initialized" and
             the project name.

          Use standard library testing patterns. For command execution in tests,
          create the cobra command via newInitCmd(), set its output writer, and call
          cmd.Execute() or cmd.RunE directly.

          ## Verification gate

          After implementation:
          ```
          go build ./cmd/sawtools/...
          go vet ./cmd/sawtools/...
          go test ./cmd/sawtools/... -run TestInit -v
          ```
        files:
          - cmd/sawtools/init_cmd.go
          - cmd/sawtools/init_cmd_test.go
        dependencies: []

  - number: 2
    type: integration
    agents:
      - id: B
        task: |-
          ## Context

          Agent A has implemented newInitCmd() in cmd/sawtools/init_cmd.go.
          Your task is to register it in main.go so it is reachable as
          `sawtools init`.

          ## What to implement

          ### File: cmd/sawtools/main.go

          Add newInitCmd() to the rootCmd.AddCommand(...) call. Place it near
          the other lifecycle/setup commands — after newVerifyInstallCmd() is a
          natural location:

          ```go
          newVerifyInstallCmd(),
          newInitCmd(),           // zero-config project initialization
          ```

          Do NOT modify any other part of main.go. The file has ~114 lines;
          you are adding exactly 1 line plus a comment.

          ## Verification gate

          ```
          go build ./cmd/sawtools/...
          go vet ./cmd/sawtools/...
          sawtools init --help
          ```

          The last command should print usage for the init subcommand.
        files:
          - cmd/sawtools/main.go
        dependencies:
          - A

pre_mortem:
  overall_risk: low
  rows:
    - scenario: |-
        The "build" and "test" keys with "detected" markers are not part of
        SAWConfig, so config.Save will not write them. Agent A must do a
        second merge pass after Save. If this two-phase write has a bug,
        the output config may be missing the build/test keys or the file
        may be left in an inconsistent state.
      likelihood: medium
      impact: low
      mitigation: |-
        Agent A's test TestInitCmd_WritesConfig explicitly verifies the
        build.detected and test.command fields are present in the written JSON.
        If those assertions fail, the agent will fix the write logic before
        completing.

    - scenario: |-
        detectProject uses os.Stat priority ordering. If a project has both
        go.mod and package.json (common in monorepos with embedded frontends),
        Go will win because it is checked first. This may surprise users with
        Node-primary projects that also have go.mod for tooling.
      likelihood: low
      impact: low
      mitigation: |-
        The design spec does not address priority conflicts. The Go-wins ordering
        matches the majority of projects this tool targets. The --force flag and
        direct saw.config.json editing remain available for overrides.

    - scenario: |-
        runInstallChecks() is defined in verify_install_cmd.go in the same
        package (main). If the function signature or behavior changes in a
        future PR that merges before this one, Agent A's call site may fail
        to compile.
      likelihood: low
      impact: medium
      mitigation: |-
        Both files are in package main in the same directory. The function
        signature is stable (returns installResult, no arguments). If it changes,
        the compile error is caught immediately by the build gate.
