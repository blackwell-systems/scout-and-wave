            | failure_reason | Response |
            |----------------|----------|
            | `lsp_unavailable` | LSP server not running. Run `sawtools start-lsp <workspace>` and retry `sawtools contract-builder <impl>`. |
            | `hint_unresolvable: <hint_id>` | The inferred_signature for hint N could not be LSP-verified. Edit the `integration_hints[N].inferred_signature` field in the IMPL doc with the correct signature, then rerun. |
            | `build_failed` | Generated contract stubs do not compile. Run `sawtools contract-builder <impl> --dry-run` to see stub contents; revise the relevant hint's `inferred_signature`. |
