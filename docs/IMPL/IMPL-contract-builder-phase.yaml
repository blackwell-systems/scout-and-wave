scaffolds:
    - file_path: pkg/protocol/contract_builder_types.go
      contents: |-
        package protocol

        // IntegrationHint describes a cross-agent call boundary that the Scout
        // identified during suitability analysis. The Contract Builder agent reads
        // these hints and produces typed contract stubs.
        type IntegrationHint struct {
          HintID            string `yaml:"hint_id" json:"hint_id"`
          CallerAgent       string `yaml:"caller_agent" json:"caller_agent"`
          CalleeAgent       string `yaml:"callee_agent" json:"callee_agent"`
          CallSiteFile      string `yaml:"call_site_file" json:"call_site_file"`
          CallSiteLine      int    `yaml:"call_site_line,omitempty" json:"call_site_line,omitempty"`
          InferredSignature string `yaml:"inferred_signature" json:"inferred_signature"`
          HintType          string `yaml:"hint_type" json:"hint_type"` // "function"|"interface"|"event"|"error"
        }

        // ContractBuilderResult records the outcome of a Contract Builder phase run.
        type ContractBuilderResult struct {
          Status           string   `yaml:"status" json:"status"` // "complete"|"partial"|"failed"
          ContractsEmitted []string `yaml:"contracts_emitted,omitempty" json:"contracts_emitted,omitempty"`
          HintsResolved    int      `yaml:"hints_resolved" json:"hints_resolved"`
          HintsTotal       int      `yaml:"hints_total" json:"hints_total"`
          CommitSHA        string   `yaml:"commit_sha,omitempty" json:"commit_sha,omitempty"`
          FailureReason    string   `yaml:"failure_reason,omitempty" json:"failure_reason,omitempty"`
          Timestamp        string   `yaml:"timestamp,omitempty" json:"timestamp,omitempty"`
        }

        // ContractBuilderData contains metadata from a successful RunContractBuilder operation.
        type ContractBuilderData struct {
          IMPLPath      string `json:"impl_path"`
          HintsFound    int    `json:"hints_found"`
          HintsResolved int    `json:"hints_resolved"`
        }
      import_path: github.com/blackwell-systems/scout-and-wave-go/pkg/protocol
      status: pending
