interface_contracts:
    - name: IntegrationHint
      description: |-
        Structured cross-agent boundary hint emitted by Scout in the IMPL doc.
        Describes the caller side, callee side, and inferred type signature of a
        cross-agent API boundary. Consumed by the Contract Builder agent.
      definition: |-
        type IntegrationHint struct {
          HintID            string `yaml:"hint_id" json:"hint_id"`
          CallerAgent       string `yaml:"caller_agent" json:"caller_agent"`
          CalleeAgent       string `yaml:"callee_agent" json:"callee_agent"`
          CallSiteFile      string `yaml:"call_site_file" json:"call_site_file"`
          CallSiteLine      int    `yaml:"call_site_line,omitempty" json:"call_site_line,omitempty"`
          InferredSignature string `yaml:"inferred_signature" json:"inferred_signature"`
          HintType          string `yaml:"hint_type" json:"hint_type"` // "function"|"interface"|"event"|"error"
        }
      location: pkg/protocol/contract_builder_types.go
    - name: ContractBuilderResult
      description: |-
        Records the outcome of a Contract Builder phase run. Written to the IMPL
        doc under contract_builder_result field. Read by the Orchestrator to determine
        whether to proceed to Wave preparation.
      definition: |-
        type ContractBuilderResult struct {
          Status           string   `yaml:"status" json:"status"` // "complete"|"partial"|"failed"
          ContractsEmitted []string `yaml:"contracts_emitted,omitempty" json:"contracts_emitted,omitempty"`
          HintsResolved    int      `yaml:"hints_resolved" json:"hints_resolved"`
          HintsTotal       int      `yaml:"hints_total" json:"hints_total"`
          CommitSHA        string   `yaml:"commit_sha,omitempty" json:"commit_sha,omitempty"`
          FailureReason    string   `yaml:"failure_reason,omitempty" json:"failure_reason,omitempty"`
          Timestamp        string   `yaml:"timestamp,omitempty" json:"timestamp,omitempty"`
        }
      location: pkg/protocol/contract_builder_types.go
    - name: ContractBuilderData
      description: |-
        Return payload from RunContractBuilder. Matches pattern of ScaffoldData in
        pkg/engine/runner_data_types.go.
      definition: |-
        type ContractBuilderData struct {
          IMPLPath      string `json:"impl_path"`
          HintsFound    int    `json:"hints_found"`
          HintsResolved int    `json:"hints_resolved"`
        }
      location: pkg/protocol/contract_builder_types.go
    - name: IMPLManifest.IntegrationHints
      description: |-
        New field on IMPLManifest: IntegrationHints and ContractBuilderResult.
        Written by Scout (hints) and Contract Builder agent (result). Both optional.
      definition: |-
        // Add to IMPLManifest struct in pkg/protocol/types.go, after InterfaceContracts field:
        IntegrationHints      []IntegrationHint          `yaml:"integration_hints,omitempty" json:"integration_hints,omitempty"`
        ContractBuilderResult *ContractBuilderResult     `yaml:"contract_builder_result,omitempty" json:"contract_builder_result,omitempty"`
      location: pkg/protocol/types.go
    - name: RunContractBuilder
      description: |-
        Engine-level function that launches the Contract Builder agent. Reads
        integration_hints from the IMPL doc, runs the agent, and updates
        contract_builder_result in the IMPL doc. Pattern matches RunScaffold.
      definition: |-
        type RunContractBuilderOpts struct {
          Ctx         context.Context
          ImplPath    string
          RepoPath    string
          SAWRepoPath string
          Model       string
          OnEvent     func(Event)
        }

        func RunContractBuilder(opts RunContractBuilderOpts) result.Result[protocol.ContractBuilderData]
      location: pkg/engine/contract_builder.go
    - name: handleContractBuilderRun
      description: |-
        HTTP handler for POST /api/impl/{slug}/contract-builder. Pattern matches
        handleScaffoldRerun in scaffold_handler.go.
      definition: |-
        type ContractBuilderRunResponse struct {
          RunID string `json:"run_id"`
        }

        func (s *Server) handleContractBuilderRun(w http.ResponseWriter, r *http.Request)
      location: pkg/api/contract_builder_handler.go
    - name: SSE events for Contract Builder
      description: |-
        SSE events published to the wave broker during Contract Builder execution.
        Consumed by the WaveBoard ContractBuilderCard component.
      definition: |-
        // contract_builder_started — payload: {impl_path string, hints_count int}
        // contract_builder_progress — payload: {chunk string}
        // contract_builder_complete — payload: {impl_path string, hints_resolved int, commit_sha string}
        // contract_builder_failed — payload: {impl_path string, error string}
        // contract_builder_cancelled — payload: {run_id string, slug string}
      location: pkg/api/contract_builder_handler.go
    - name: ContractBuilderCard
      description: React component displayed in WaveBoard alongside ScaffoldCard.
      definition: |-
        interface ContractBuilderCardProps {
          status: 'idle' | 'running' | 'complete' | 'failed'
          hintsCount: number
          hintsResolved: number
          output: string
          error?: string
        }

        export default function ContractBuilderCard(props: ContractBuilderCardProps): JSX.Element
      location: web/src/components/wave/ContractBuilderCard.tsx
