            package engine

            // RunContractBuilderOpts holds parameters for RunContractBuilder.
            type RunContractBuilderOpts struct {
              Ctx         context.Context
              ImplPath    string
              RepoPath    string
              SAWRepoPath string
              Model       string
              OnEvent     func(Event)
            }

