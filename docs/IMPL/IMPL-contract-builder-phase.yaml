pre_mortem:
    overall_risk: medium
    rows:
        - scenario: |-
            Agent D modifies types.go to add IMPLManifest fields but the type definitions
            (IntegrationHint, ContractBuilderResult) are in the scaffold file — Agent D might
            try to redefine them in types.go, causing duplicate declarations.
          likelihood: medium
          impact: high
          mitigation: |-
            Agent D brief explicitly says to read the scaffold first. The scaffold file
            already contains the canonical definitions. Agent D only adds IMPLManifest
            field references (not new type declarations) in types.go.
        - scenario: |-
            Agent E's RunContractBuilder function return type uses protocol.ContractBuilderData
            but the type isn't fully exported with the right JSON tags when Agent E builds.
          likelihood: low
          impact: medium
          mitigation: |-
            ContractBuilderData is defined in the scaffold (Wave 0) and completed by Agent D
            (Wave 1). Wave 2 agents depend on Wave 1 completing. The scaffold ensures the type
            exists before any Wave 1 agent starts.
        - scenario: |-
            Agent F fails to register the contract-builder command in root.go, so the command
            compiles but is unreachable via CLI.
          likelihood: low
          impact: medium
          mitigation: |-
            Agent F owns root.go. Brief explicitly says to read root.go first and follow the
            exact pattern for registering existing commands. Postcondition grep verifies registration.
        - scenario: Agent G adds E48 to execution-rules.md at the wrong location (mid-file, not after E47).
          likelihood: low
          impact: low
          mitigation: |-
            Brief uses exact grep anchor for E47 section and says append after the last line of
            that section. Postcondition verifies `grep -c "^## E[0-9]" == 54`.
        - scenario: |-
            Wave 3 web agents (F and H) import engine types that aren't yet published because
            go.work resolves to a stale local checkout.
          likelihood: low
          impact: high
          mitigation: |-
            Both agents use `GOWORK=off` in all build/test commands, forcing module resolution
            via the local go.mod. Changes from Wave 2 are already merged to main before Wave 3
            launches (I3 wave sequencing invariant).
        - scenario: |-
            Agent I cannot safely add contract_builder_result field access in WaveBoard.tsx
            because the TypeScript interface type IMPLDocResponse doesn't include it.
          likelihood: medium
          impact: medium
          mitigation: |-
            Agent I brief says to use optional chaining and add contract_builder_result to
            IMPLDocResponse in types.ts if needed. Optional chaining prevents runtime errors
            even without explicit type addition.
        - scenario: |-
            Agents C and G both reference the contract-builder flow with slightly different
            naming conventions (e.g., "Contract Builder" vs "contract-builder") creating
            inconsistency across docs.
          likelihood: medium
          impact: low
          mitigation: |-
            Interface contracts define exact names. Agents use exact verbatim text anchors
            for insertion points. Post-merge human review catches any naming drift.
known_issues:
    - title: Brief validator false positive for Agent G (cross-repo path resolution)
      description: |-
        The sawtools validate-briefs command cannot resolve file paths for cross-repo IMPL docs
        that use short repo names (e.g., repo: scout-and-wave) in file_ownership entries.
        The briefResolveFilePath function uses fo.Repo as a literal directory prefix, producing
        relative paths like "scout-and-wave/implementations/..." that don't exist on disk.
        This causes Agent G's symbol checks to fail even though the symbols (FAILED, committed,
        complete, partial, failed) do exist in saw-skill.md and pre-wave-validation.md.
        This is a known tool limitation for cross-repo IMPLs.
      status: pre-existing tool limitation — does not block wave execution
      workaround: Brief validator step in finalize-scout reports exit 1 but errors are false positives. Structural validation (sawtools validate) passes. Proceed to human review.
