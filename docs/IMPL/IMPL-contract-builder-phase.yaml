            4. Locate `contract-builder.md` prompt via SAW_REPO env var (same as scaffold runner)
            5. Publish `contract_builder_started` event: `struct{ IMPLPath string; HintsCount int }{...}`
            6. Launch Contract Builder agent (same agent.Run pattern as scaffold in runner.go)
            7. On failure: publish `contract_builder_failed`, return failure result
            8. On success: publish `contract_builder_complete`, return `ContractBuilderData{...}`

