# Pre-Mortem

pre_mortem:
  overall_risk: "medium"
  rows:
    - scenario: "Scout outputs YAML schema in one format, parser expects different field names"
      likelihood: "medium"
      impact: "high"
      mitigation: "Agent A defines canonical schemas in message-formats.md. Agent D creates Go types with exact yaml tags. Agent B copies schemas from message-formats.md into Scout prompt verbatim. Agent E's parser tests verify round-trip."
    - scenario: "scan-stubs.sh outputs YAML with unescaped special characters in context field, breaking parser"
      likelihood: "medium"
      impact: "medium"
      mitigation: "Agent C must properly escape YAML special characters (quotes, colons, newlines) in context field. Agent E's test includes stub with special chars."
    - scenario: "TypeScript YAML parsing fails on typed block fence markers (```yaml type=...)"
      likelihood: "low"
      impact: "medium"
      mitigation: "Agent F/G/H must strip fence markers before parsing: `const yamlText = stubReportText.replace(/^```yaml.*\\n|```$/gm, '').trim();`"
    - scenario: "Backward compatibility breaks existing IMPL docs that use markdown format"
      likelihood: "low"
      impact: "high"
      mitigation: "Agent E adds fallback logic in parser: try extractTypedBlock first, if missing fall back to old markdown parsing functions. Existing docs continue to work."
    - scenario: "Cross-repo wave coordination fails — Agent B updates Scout prompt before Agent A documents schemas"
      likelihood: "low"
      impact: "medium"
      mitigation: "Wave structure enforces dependency: Agent B depends on Agent A. Agent B reads protocol/message-formats.md to extract schemas."
    - scenario: "UI panels parse YAML but API still serves markdown blobs"
      likelihood: "low"
      impact: "high"
      mitigation: "Agent E updates parser.go which feeds the API. Wave 2 agents (F/G/H) depend on Agent E completing. Test by running web UI against live API."

