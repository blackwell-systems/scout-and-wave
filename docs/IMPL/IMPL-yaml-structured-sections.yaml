    agents:
      - id: "A"
        task: |
          ## What to Implement
          Update protocol documentation to specify YAML typed-block format for 4 sections that are currently markdown prose/tables: Stub Report, Quality Gates, Post-Merge Checklist, and Known Issues.

          ## Interfaces to Implement
          None (documentation only).

          ## Interfaces to Call
          None.

          ## Tests to Write
          None (documentation changes verified by human review).

          ## Verification Gate
          ```bash
          cd /Users/dayna.blackwell/code/scout-and-wave
          # No build/test for markdown — verify by reading files
          cat protocol/execution-rules.md | grep -A 20 "E20:"
          cat protocol/execution-rules.md | grep -A 20 "E21:"
          cat protocol/message-formats.md | grep -A 30 "Stub Report Section Format"
          cat protocol/message-formats.md | grep -A 30 "Quality Gates Section Format"
          ```

          ## Constraints
          - E20 (stub detection) and E21 (quality gates) already exist in execution-rules.md — update their descriptions to reference typed blocks instead of markdown tables
          - Add new sections to message-formats.md: "Stub Report Section Format" and "Post-Merge Checklist Section Format"
          - Update existing "Quality Gates Section Format" and "Known Issues" sections to show YAML typed-block syntax
          - All 4 schemas must use `type=impl-*` annotation on opening fence
          - Schema field names must match Go struct field names (yaml tags) from types_sections.go scaffold
          - Document that these sections are machine-parsed (validator scope includes them)

        files:
          - "protocol/execution-rules.md"
          - "protocol/message-formats.md"
        dependencies: []

      - id: "B"
        task: |
          ## What to Implement
          Update Scout prompt (agents/scout.md) to output 4 sections as YAML typed blocks instead of markdown prose/tables: Stub Report (when Scout writes it directly), Quality Gates, Post-Merge Checklist, Known Issues.

          ## Interfaces to Implement
          None (prompt changes).

          ## Interfaces to Call
          YAML schemas from protocol/message-formats.md (defined by Agent A).

          ## Tests to Write
          None (prompt changes verified by generating a test IMPL doc).

          ## Verification Gate
          ```bash
          cd /Users/dayna.blackwell/code/scout-and-wave
          # Verify Scout prompt includes YAML schemas for all 4 sections
          grep -A 10 "type=impl-stub-report" agents/scout.md
          grep -A 10 "type=impl-quality-gates" agents/scout.md
          grep -A 10 "type=impl-post-merge-checklist" agents/scout.md
          grep -A 10 "type=impl-known-issues" agents/scout.md
