# Scaffolds
scaffolds:
  - file_path: "/Users/dayna.blackwell/code/scout-and-wave-go/pkg/protocol/types_sections.go"
    contents: |
      package protocol

      // StubReport represents the structured stub detection report for a wave.
      type StubReport struct {
          Status       string     `yaml:"status" json:"status"` // "stubs_detected" | "clean"
          ScannedFiles int        `yaml:"scanned_files" json:"scanned_files"`
          Stubs        []StubHit  `yaml:"stubs" json:"stubs"`
      }

      // StubHit represents a single detected stub pattern.
      type StubHit struct {
          File    string `yaml:"file" json:"file"`
          Line    int    `yaml:"line" json:"line"`
          Pattern string `yaml:"pattern" json:"pattern"`
          Context string `yaml:"context" json:"context"`
      }

      // PostMergeChecklist represents the structured post-merge checklist.
      type PostMergeChecklist struct {
          Groups []ChecklistGroup `yaml:"groups" json:"groups"`
      }

      // ChecklistGroup represents a named group of checklist items.
      type ChecklistGroup struct {
          Heading string          `yaml:"heading" json:"heading"`
          Items   []ChecklistItem `yaml:"items" json:"items"`
      }

      // ChecklistItem represents a single checklist item with checked state.
      type ChecklistItem struct {
          Text    string `yaml:"text" json:"text"`
          Checked bool   `yaml:"checked" json:"checked"`
      }
    import_path: "github.com/blackwell-systems/scout-and-wave-go/pkg/protocol"
    status: "pending"

# Interface Contracts

## StubReport YAML Schema
Scout and stubs.go will output:
```yaml
## Stub Report — Wave N

```yaml type=impl-stub-report
status: stubs_detected  # or: clean
scanned_files: 14
stubs:
  - file: pkg/api/handler.go
    line: 42
    pattern: TODO
    context: "// TODO: implement error handling"
  - file: pkg/models/user.go
    line: 89
    pattern: panic
    context: "panic(\"not implemented\")"
```
```

Parser extracts via `extractTypedBlock(scanner, "impl-stub-report")` and unmarshals into `StubReport`.

## QualityGates YAML Schema (already exists in types.go)
No new types needed — `QualityGates` and `QualityGate` structs already exist.
Scout outputs as:
```yaml
## Quality Gates

```yaml type=impl-quality-gates
level: standard  # quick, standard, full
gates:
  - type: build
    command: go test ./...
    required: true
    description: Run all tests
  - type: lint
    command: golangci-lint run
    required: false
    description: Lint check
```
```

Parser already extracts `QualityGates` — Wave 1 agents update Scout prompt to output typed block instead of prose.

## PostMergeChecklist YAML Schema
Scout outputs:
```yaml
## Post-Merge Checklist

```yaml type=impl-post-merge-checklist
groups:
  - heading: Verification
    items:
      - text: Run integration tests
        checked: false
      - text: Check monitoring dashboards
        checked: false
  - heading: Deployment
    items:
      - text: Update changelog
        checked: false
      - text: Tag release
        checked: true
```
```

Parser extracts via `extractTypedBlock` and unmarshals into `PostMergeChecklist`.

## KnownIssues YAML Schema (already exists in types.go)
No new types needed — `KnownIssue` struct already exists.
Scout outputs as:
```yaml
## Known Issues

```yaml type=impl-known-issues
issues:
  - title: Package import fails on Windows
    status: pre-existing  # new, pre-existing, resolved, mitigated
    description: The import path resolution breaks on Windows due to path separators
    workaround: Use forward slashes in import paths
```
```

Parser extracts as `[]KnownIssue` (existing type already has fields).

