          ## Constraints
          - Scout already outputs Quality Gates as markdown bullets — change to YAML typed block
          - Known Issues currently output as markdown with **bold** headings — change to YAML typed block with title/status/description/workaround fields
          - Post-Merge Checklist is optional (Scout may omit it) — when present, output as YAML typed block
          - Stub Report is written by Orchestrator via stubs.go, not Scout — Scout prompt should document the format but not generate it
          - All 4 typed blocks must match schemas from message-formats.md exactly

