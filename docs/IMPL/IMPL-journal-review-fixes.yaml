              - `RestoreCheckpoint` — `CHECKPOINT_FAILED` (parse metadata) → `result.CodeJournalCheckpointCreateFailed`
              - `DeleteCheckpoint` — `CHECKPOINT_NOT_FOUND` → `result.CodeJournalCheckpointNotFound`
