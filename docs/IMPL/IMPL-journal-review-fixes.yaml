            ### What to implement in `pkg/journal/observer.go`

            **1. Replace all inline `"JOURNAL_ERROR"` code strings with J-range constants.**

            In `saveCursor`, `appendToIndex`, and `updateRecent`:
            - `saveCursor` — marshal and write failures: use `result.CodeJournalObserverCursorFailed`
            - `appendToIndex` — open and encode failures: use `result.CodeJournalObserverAppendFailed`
            - `updateRecent` — marshal and write failures: use `result.CodeJournalObserverUpdateFailed`

            **2. Unexport `SaveCursorData` → `saveCursorData`, `AppendData` → `appendData`,
            `UpdateData` → `updateData`.**

            Rename the 3 exported result payload types to unexported within `observer.go`.
            Update all type references:
            - `result.Result[SaveCursorData]` → `result.Result[saveCursorData]`
            - `result.NewFailure[SaveCursorData]` → `result.NewFailure[saveCursorData]`
            - `result.NewSuccess(SaveCursorData{...})` → `result.NewSuccess(saveCursorData{...})`
            - Same pattern for `AppendData` → `appendData` and `UpdateData` → `updateData`

            **3. Migrate `NewObserver` to return `result.Result[*JournalObserver]`.**

            Current signature: `func NewObserver(projectRoot string, agentID string) (*JournalObserver, error)`
            New signature: `func NewObserver(projectRoot string, agentID string) result.Result[*JournalObserver]`

            Replace all `return nil, fmt.Errorf(...)` with
