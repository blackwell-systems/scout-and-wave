              - `DeleteCheckpoint` — `CHECKPOINT_FAILED` (delete metadata file) → `result.CodeJournalCheckpointDeleteFailed`

            **2. Rename `Checkpoint` struct → `CheckpointRecord`.**

            The `Checkpoint` struct (on-disk representation, fields: Name, Timestamp,
