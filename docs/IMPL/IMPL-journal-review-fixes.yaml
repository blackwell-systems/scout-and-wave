interface_contracts:
    - name: NewObserver
      description: |-
        Creates a journal observer instance for an agent. Signature changes
        from (*JournalObserver, error) to result.Result[*JournalObserver].
        AgentID mutation fix: store original agentID in a new RawAgentID field
        and do not overwrite AgentID after wave-prefix strip.
      definition: |
        func NewObserver(projectRoot string, agentID string) result.Result[*JournalObserver]
      location: pkg/journal/observer.go
    - name: Sync
      description: |-
        Incrementally reads session log and extracts tool entries.
        Signature changes from (*SyncResult, error) to result.Result[*SyncResult].
      definition: |
        func (o *JournalObserver) Sync() result.Result[*SyncResult]
      location: pkg/journal/observer.go
    - name: LoadJournal
      description: |-
        Reads all entries from index.jsonl.
        Signature changes from ([]ToolEntry, error) to result.Result[[]ToolEntry].
      definition: |
        func (o *JournalObserver) LoadJournal() result.Result[[]ToolEntry]
      location: pkg/journal/observer.go
    - name: GenerateContextMethod
      description: |-
        Method wrapper on JournalObserver that calls LoadJournal and the
        package-level GenerateContext. Changes from (string, error) to
        result.Result[string].
      definition: |
        func (o *JournalObserver) GenerateContext() result.Result[string]
      location: pkg/journal/observer.go
    - name: GenerateContext
      description: |-
        Package-level function. The error return is always nil; drop it
        entirely and return string. 2 external callers must be updated.
      definition: |
        func GenerateContext(entries []ToolEntry, maxEntries int) string
      location: pkg/journal/context.go
    - name: ListCheckpoints
      description: |-
        Returns all checkpoints sorted by timestamp.
        Signature changes from ([]Checkpoint, error) to
        result.Result[[]CheckpointRecord]. The Checkpoint struct is renamed
        to CheckpointRecord to distinguish on-disk record from result payload.
      definition: |
        func (o *JournalObserver) ListCheckpoints() result.Result[[]CheckpointRecord]
      location: pkg/journal/checkpoint.go
    - name: ListArchives
      description: |-
        Returns metadata for all archived journals.
        Signature changes from ([]ArchiveMetadata, error) to
        result.Result[[]ArchiveMetadata].
      definition: |
        func ListArchives(repoPath string) result.Result[[]ArchiveMetadata]
      location: pkg/journal/archive.go
    - name: JournalObserverStruct
      description: |-
        Adds RawAgentID field to preserve the original caller-provided agentID
        (before wave-prefix strip in NewObserver). No other public field changes.
      definition: |
        type JournalObserver struct {
            ProjectRoot string
            JournalDir  string
            AgentID     string
            RawAgentID  string  // new: original agentID before wave-prefix strip
            CursorPath  string
            IndexPath   string
            RecentPath  string
            ResultsDir  string
            logger      *slog.Logger
        }
      location: pkg/journal/observer.go
    - name: CheckpointRecord
      description: |-
        Rename of the Checkpoint struct (on-disk representation).
        CheckpointData (result payload) already has the same fields; renaming
        Checkpoint → CheckpointRecord clarifies the distinction.
      definition: |
        type CheckpointRecord struct {
            Name         string    `json:"name"`
            Timestamp    time.Time `json:"timestamp"`
            EntryCount   int       `json:"entry_count"`
            SnapshotPath string    `json:"snapshot_path"`
        }
      location: pkg/journal/checkpoint.go
    - name: JErrorCodes
      description: |-
        New J001-J014 constants in pkg/result/codes.go for journal domain errors.
        The package doc comment gains a J001-J099 line.
      definition: |
        const (
            CodeJournalArchiveCreateFailed  = "J001_ARCHIVE_CREATE_FAILED"
            CodeJournalArchiveMetaFailed    = "J002_ARCHIVE_META_FAILED"
            CodeJournalArchiveExtractFailed = "J003_ARCHIVE_EXTRACT_FAILED"
            CodeJournalArchiveListFailed    = "J004_ARCHIVE_LIST_FAILED"
            CodeJournalArchiveCleanupFailed = "J005_ARCHIVE_CLEANUP_FAILED"
            CodeJournalCheckpointInvalidName    = "J006_CHECKPOINT_INVALID_NAME"
            CodeJournalCheckpointCreateFailed   = "J007_CHECKPOINT_CREATE_FAILED"
            CodeJournalCheckpointAlreadyExists  = "J008_CHECKPOINT_ALREADY_EXISTS"
            CodeJournalCheckpointNotFound       = "J009_CHECKPOINT_NOT_FOUND"
            CodeJournalCheckpointCopyFailed     = "J010_CHECKPOINT_COPY_FAILED"
            CodeJournalCheckpointDeleteFailed   = "J011_CHECKPOINT_DELETE_FAILED"
            CodeJournalObserverCursorFailed     = "J012_OBSERVER_CURSOR_FAILED"
            CodeJournalObserverAppendFailed     = "J013_OBSERVER_APPEND_FAILED"
            CodeJournalObserverUpdateFailed     = "J014_OBSERVER_UPDATE_FAILED"
        )
      location: pkg/result/codes.go
