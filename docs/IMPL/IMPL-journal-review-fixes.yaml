            (or `result.CodeJournalObserverCursorFailed` for the directory creation failures).
            Use `result.CodeJournalObserverCursorFailed` for all MkdirAll failures in NewObserver.
            Replace `return o, nil` with `return result.NewSuccess(o)`.

            **4. Fix agentID mutation bug.**

            In `NewObserver`, the current code strips the wave prefix from `agentID` and
            mutates the local variable. This causes `AgentID` in the returned struct to
            differ from what the caller passed in. Fix:

            - Store the original agentID in a new `RawAgentID` field before any mutation.
            - Use the stripped agentID only for `JournalDir` and `ResultsDir` path construction.
            - Set `AgentID` to the *stripped* agentID (preserving current behavior for
              downstream code that expects `agent-A` not `wave2-agent-A`).
            - Set `RawAgentID` to the original argument so callers can recover the full
              wave-prefixed form if needed.

            The `JournalObserver` struct gains a new exported field:
            ```go
            RawAgentID string
            ```
            Add it after the `AgentID` field.

            **5. Migrate `Sync` to return `result.Result[*SyncResult]`.**

            Current signature: `func (o *JournalObserver) Sync() (*SyncResult, error)`
            New signature: `func (o *JournalObserver) Sync() result.Result[*SyncResult]`

            All `return nil, fmt.Errorf(...)` become `result.NewFailure[*SyncResult]`.
            Use these codes:
            - Find session file failure: `result.CodeJournalObserverCursorFailed`
            - Load cursor failure: `result.CodeJournalObserverCursorFailed`
            - Open session file failure: `result.CodeJournalObserverCursorFailed`
            - Seek failure: `result.CodeJournalObserverCursorFailed`
            - Scanner error: `result.CodeJournalObserverAppendFailed`
            - Save cursor failure: handled internally (already returns result type)
            - Append to index failure: handled internally (already returns result type)
            - Update recent failure: handled internally (already returns result type)

            The "fresh session" return becomes `result.NewSuccess(&SyncResult{...})`.
            The final `return result, nil` → find the local variable named `result` in
            Sync and rename it to avoid collision with the `result` package import;
