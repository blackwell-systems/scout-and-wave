            - `result.Result[CopyData]` → `result.Result[copyData]`
            - `result.NewFailure[CopyData]` → `result.NewFailure[copyData]`
            - `result.NewSuccess(CopyData{...})` → `result.NewSuccess(copyData{...})`

            ### What to implement in `pkg/journal/checkpoint_test.go`

            Ensure all existing tests compile after the `Checkpoint` → `CheckpointRecord`
