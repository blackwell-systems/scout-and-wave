            ## Task: Canonicalize observer.go — error codes, unexport types, migrate signatures, fix bugs, add tests

            You are working in the `scout-and-wave-go` repository.
            Wave 2 is complete:
            - Agent B changed `archive.go` (J-codes, unexported `createTarData`/`writeMetaData`,
              `ListArchives` now returns `result.Result[[]ArchiveMetadata]`)
            - Agent C changed `checkpoint.go` (J-codes, `Checkpoint` → `CheckpointRecord`,
