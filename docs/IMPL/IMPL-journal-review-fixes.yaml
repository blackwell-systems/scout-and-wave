            ## Task: Canonicalize archive.go — error codes, unexport internals, migrate ListArchives

            You are working in the `scout-and-wave-go` repository.
            Wave 1 (Agent A) has already added J-range constants to `pkg/result/codes.go`.

            ### What to implement in `pkg/journal/archive.go`

            **1. Replace all inline `"JOURNAL_ERROR"` code strings with J-range constants.**

            There are 7 call sites that use `"JOURNAL_ERROR"` in `Archive`, `CleanupExpired`,
            and `Extract`. Map them as follows:

            - `Archive` — parse failure (wave/agent from path): use `result.CodeJournalArchiveCreateFailed`
            - `Archive` — create archive directory failure: use `result.CodeJournalArchiveCreateFailed`
            - `Archive` — archive already exists: use `result.CodeJournalArchiveCreateFailed`
            - `Archive` — calculating journal stats failure: use `result.CodeJournalArchiveCreateFailed`
            - `Archive` — create tar.gz failure: use `result.CodeJournalArchiveCreateFailed`
            - `Archive` — stat archive failure: use `result.CodeJournalArchiveCreateFailed`
            - `Archive` — writing metadata failure: use `result.CodeJournalArchiveMetaFailed`
            - `CleanupExpired` — listing archives failure: use `result.CodeJournalArchiveCleanupFailed`
            - `CleanupExpired` — removing archive/metadata failures: use `result.CodeJournalArchiveCleanupFailed`
            - `Extract` — all error sites: use `result.CodeJournalArchiveExtractFailed`

            For `createTarGz` (internal helper), replace all `"JOURNAL_ERROR"` with
            `result.CodeJournalArchiveCreateFailed`.
            For `writeMetadataAtomic` (internal helper), replace all `"JOURNAL_ERROR"` with
            `result.CodeJournalArchiveMetaFailed`.

            **2. Migrate `ListArchives` to return `result.Result[[]ArchiveMetadata]`.**

            Current signature: `func ListArchives(repoPath string) ([]ArchiveMetadata, error)`
            New signature: `func ListArchives(repoPath string) result.Result[[]ArchiveMetadata]`

            Replace all `return nil, fmt.Errorf(...)` with `result.NewFailure[[]ArchiveMetadata]`
            using `result.CodeJournalArchiveListFailed`. Replace `return []ArchiveMetadata{}, nil`
            with `result.NewSuccess([]ArchiveMetadata{})`. The final `return archives, nil` becomes
            `return result.NewSuccess(archives)`.

            **3. Update `CleanupExpired` to consume the new `ListArchives` signature.**

            `CleanupExpired` currently calls `ListArchives` and checks `if err != nil`. Replace that
            pattern with the result-type idiom:
            ```go
            listRes := ListArchives(repoPath)
            if listRes.IsFatal() {
                return result.NewFailure[CleanupData]([]result.SAWError{{
                    Code:     result.CodeJournalArchiveCleanupFailed,
                    Message:  fmt.Sprintf("listing archives: %s", listRes.Errors[0].Message),
                    Severity: "fatal",
                }})
            }
            archives := listRes.Data
            ```

            **4. Unexport `CreateTarData` → `createTarData` and `WriteMetaData` → `writeMetaData`.**

            Rename the two exported result payload types to unexported. Update all usages within
            `archive.go`:
            - `result.Result[CreateTarData]` → `result.Result[createTarData]`
            - `result.Result[WriteMetaData]` → `result.Result[writeMetaData]`
            - `result.NewFailure[CreateTarData]` → `result.NewFailure[createTarData]`
            - `result.NewFailure[WriteMetaData]` → `result.NewFailure[writeMetaData]`
            - `result.NewSuccess(CreateTarData{...})` → `result.NewSuccess(createTarData{...})`
            - `result.NewSuccess(WriteMetaData{...})` → `result.NewSuccess(writeMetaData{...})`

            ### What to implement in `pkg/journal/archive_test.go`

            No new tests are required for this agent. Ensure the existing archive tests
            still compile and pass after the type renames. If the test file references
            `CreateTarData` or `WriteMetaData` directly, update those references too
            (unlikely since they are private helpers, but verify).

            ### Verification gate

            ```
            go build ./pkg/journal/...
            go vet ./pkg/journal/...
            go test ./pkg/journal/... -run TestArchive -v
            ```
