        - id: C
          task: |
            ## Task: Canonicalize checkpoint.go — error codes, unexport CopyData, migrate ListCheckpoints, rename Checkpoint→CheckpointRecord

            You are working in the `scout-and-wave-go` repository.
            Wave 1 (Agent A) has already added J-range constants to `pkg/result/codes.go`.

            ### What to implement in `pkg/journal/checkpoint.go`

            **1. Replace all inline error code strings with J-range constants.**

            Map the existing strings as follows (all in the `Checkpoint`, `RestoreCheckpoint`,
