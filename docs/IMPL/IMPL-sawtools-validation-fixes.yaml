            ## Role
            Fix close-impl to stage the deletion of the original IMPL path after archiving,
            so the single close-impl commit includes: deletion of old path + new archived
            path + CONTEXT.md update.

            ## Repo
            All your files are in /Users/dayna.blackwell/code/scout-and-wave-go

            ## Context

            `close-impl` archives the IMPL doc from `docs/IMPL/IMPL-<slug>.yaml` to
            `docs/IMPL/complete/IMPL-<slug>.yaml` using `os.Rename`. After the rename,
            git sees a deleted file at the original path and a new untracked file at the
            complete/ path. The current command outputs a JSON summary to stdout but does
            NOT commit anything. The Orchestrator is supposed to commit, but after archive
            git shows the original path as a "deleted" file (D in git status) that must be
            explicitly staged with `git rm` before committing.

            The fix: after the `ArchiveIMPL` call succeeds, call `git rm <originalPath>`
            to stage the deletion, then call `git add <archivedPath>` to stage the new
            archived file, then if CONTEXT.md was updated call `git add <contextPath>`,
            then commit with a standard message. The commit should use --no-verify (the
            existing `git.Commit` function already does this).

            The entire Step 5 (close-impl creates the commit) replaces the manual sequence.
            The JSON output should include a new `committed` field with the commit SHA.

            ## What to Change

            ### File 1: internal/git/commands.go

            Read the file fully. Find the `Add` function (it calls `git add` for specific
            paths). Add a new `Rm` function immediately after `Add`:

            Insert after this exact text:
            ```
            // Add stages the given file paths for commit in the repository at repoPath.
            // Unlike AddAll, this stages only the specified paths (not all changes).
            func Add(repoPath string, paths ...string) error {
            	args := append([]string{"add"}, paths...)
            	_, err := Run(repoPath, args...)
            	if err != nil {
            		return fmt.Errorf("git add failed: %w", err)
            	}
            	return nil
            }
            ```

            Insert this new function after the closing brace:
            ```go
            // Rm stages the deletion of the given file paths via `git rm` in the repository
            // at repoPath. Returns an error if any path is not tracked or git fails.
            func Rm(repoPath string, paths ...string) error {
            	args := append([]string{"rm", "--"}, paths...)
            	_, err := Run(repoPath, args...)
            	if err != nil {
            		return fmt.Errorf("git rm failed: %w", err)
            	}
            	return nil
            }
            ```

