            func TestDetectBriefOwnershipDivergence_AllOwned(t *testing.T) {
            	manifest := &IMPLManifest{
            		FileOwnership: []FileOwnership{
            			{File: "pkg/a.go", Agent: "A", Wave: 1},
            			{File: "pkg/b.go", Agent: "A", Wave: 1},
