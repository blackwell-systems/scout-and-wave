        - id: B
          task: |
            ## Role
            Fix validate-briefs cross-repo path resolution bug: `briefResolveFilePath`
            uses `fo.Repo` as a literal path prefix instead of looking it up in
            saw.config.json to get the absolute path.

            ## Repo
            All your files are in /Users/dayna.blackwell/code/scout-and-wave-go

            ## Context

            The bug is in `pkg/protocol/brief_validator.go`, function `briefResolveFilePath`. When a `FileOwnership` entry has `repo: scout-and-wave-go`, the
            current code does:

            ```go
            func briefResolveFilePath(fo FileOwnership, defaultRepoRoot string) string {
                repoRoot := defaultRepoRoot
                if fo.Repo != "" {
                    repoRoot = fo.Repo   // BUG: "scout-and-wave-go" is a name, not a path
                }
                if repoRoot != "" && !strings.HasPrefix(fo.File, "/") {
                    return repoRoot + "/" + fo.File
                }
                return fo.File
            }
            ```

            This produces paths like `scout-and-wave-go/cmd/sawtools/foo.go` (relative,
            incorrect) instead of `/Users/dayna.blackwell/code/scout-and-wave-go/cmd/sawtools/foo.go`
            (absolute, correct).

            The fix: `briefResolveFilePath` needs access to a repo name→path lookup. The
            lookup should be built from `saw.config.json` (using `pkg/config.Load`) called
            from the `ValidateBriefs` function. The lookup is then passed into
            `briefResolveFilePath`.

            The `pkg/config` package is already available:
            `github.com/blackwell-systems/scout-and-wave-go/pkg/config`
            It provides `config.Load(startDir string)` which walks up to find saw.config.json
            and returns `*config.SAWConfig` with a `Repos []config.RepoEntry` field where
            each entry has `Name` and `Path` fields.

            ## What to Change

            ### File 1: pkg/protocol/brief_validator.go

            Read the entire file first.

            **Change 1: Update briefResolveFilePath signature and logic.**

            Find the current function:
            ```go
            // briefResolveFilePath builds the absolute file path from a FileOwnership entry,
            // using the repo root when available.
            func briefResolveFilePath(fo FileOwnership, defaultRepoRoot string) string {
            	repoRoot := defaultRepoRoot
            	if fo.Repo != "" {
            		repoRoot = fo.Repo
            	}
            	if repoRoot != "" && !strings.HasPrefix(fo.File, "/") {
            		return repoRoot + "/" + fo.File
            	}
            	return fo.File
            }
            ```

            Replace with:
            ```go
            // briefResolveFilePath builds the absolute file path from a FileOwnership entry.
            // If fo.Repo is set, it is looked up in configRepos to get the absolute path.
            // Falls back to defaultRepoRoot if the repo name is not found in configRepos.
            func briefResolveFilePath(fo FileOwnership, defaultRepoRoot string, configRepos map[string]string) string {
            	repoRoot := defaultRepoRoot
            	if fo.Repo != "" {
            		if p, ok := configRepos[fo.Repo]; ok {
            			repoRoot = p
            		} else {
            			// repo name not found in config; leave as defaultRepoRoot (fallback)
            			// This handles tests and single-repo cases where configRepos is empty.
            		}
            	}
            	if repoRoot != "" && !strings.HasPrefix(fo.File, "/") {
            		return repoRoot + "/" + fo.File
            	}
            	return fo.File
            }
            ```

            **Change 2: Build configRepos map in ValidateBriefs and pass it to briefResolveFilePath.**

            Read the ValidateBriefs function. Find the section that determines repoRoot:

            ```go
            	// Determine repo root for resolving file paths.
            	repoRoot := manifest.Repository
            	if repoRoot == "" && len(manifest.Repositories) > 0 {
            		repoRoot = manifest.Repositories[0]
            	}
            ```

            Add config lookup after that block. Insert after the closing of that if block:
            ```go
            	// Build repo name -> absolute path lookup from saw.config.json.
            	// Walk up from the IMPL doc location to find saw.config.json.
            	configRepos := make(map[string]string)
            	implDir := filepath.Dir(implPath)
