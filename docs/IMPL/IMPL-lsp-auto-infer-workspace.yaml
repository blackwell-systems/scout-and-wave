            - `close_document` handler: `clientForFile(resolver, cs, args.FilePath)`
            - `get_diagnostics` handler: `clientForFile(resolver, cs, args.FilePath)`
            - `get_info_on_location` handler: `clientForFile(resolver, cs, args.FilePath)`
            - `get_completions` handler: `clientForFile(resolver, cs, args.FilePath)`
            - `get_signature_help` handler: `clientForFile(resolver, cs, args.FilePath)`
            - `get_code_actions` handler: `clientForFile(resolver, cs, args.FilePath)`
            - `get_document_symbols` handler: `clientForFile(resolver, cs, args.FilePath)`
            - `get_references` handler: `clientForFile(resolver, cs, args.FilePath)`
            - `go_to_definition` handler: `clientForFile(resolver, cs, args.FilePath)`
            - `go_to_type_definition` handler: `clientForFile(resolver, cs, args.FilePath)`
            - `go_to_implementation` handler: `clientForFile(resolver, cs, args.FilePath)`
            - `go_to_declaration` handler: `clientForFile(resolver, cs, args.FilePath)`
            - symbol-refactor handler: `clientForFile(resolver, cs, args.FilePath)`
            - prepare-refactor handler: `clientForFile(resolver, cs, args.FilePath)`
            - `format_document` handler: `clientForFile(resolver, cs, args.FilePath)`
            - `format_range` handler: `clientForFile(resolver, cs, args.FilePath)`
            - `call_hierarchy` handler — currently calls `cs.get()` directly; this tool
              DOES have `file_path`, so switch to `clientForFileWithAutoInit(args.FilePath)`.
            - `get_semantic_tokens` handler — currently calls `cs.get()` directly; this
              tool DOES have `file_path`, so switch to `clientForFileWithAutoInit(args.FilePath)`.

            Tools that do NOT have a `file_path` (leave these using `cs.get()` or keep as-is):
            - `get_workspace_symbols` — no file_path, uses cs.get() — leave unchanged
            - `apply_edit` — no file_path, uses cs.get() — leave unchanged
            - `execute_command` — no file_path, uses cs.get() — leave unchanged
            - `did_change_watched_files` — no file_path, uses cs.get() — leave unchanged
            - `set_log_level` — no file_path, uses cs.get() — leave unchanged

            ### Step 4: Add required import

            Add `"github.com/blackwell-systems/lsp-mcp-go/internal/config"` to the import
