title: LSP Auto-Infer Workspace Root from File Path
feature_slug: lsp-auto-infer-workspace
verdict: SUITABLE
suitability_assessment: |
    Two-file decomposition is clean and disjoint:
    - Agent A: new helper `internal/config/infer.go` + tests
    - Agent B: modified `cmd/lsp-mcp-go/server.go` adding auto-init logic that calls
      Agent A's helper

    Interface is fully definable before implementation starts: the
    `inferWorkspaceRoot(filePath string) (root, languageID string, err error)` signature
    is specified here and Agent B imports it. No investigation-first work is required —
    the feature is greenfield with a clear spec.

    Pre-implementation status: no portion of this feature exists yet. The current
    `clientForFile` helper has no auto-init logic; it returns whatever the resolver
    holds without attempting to start anything.

    Parallelization value: wave 1 is a single agent (inference helper + tests), wave 2
    is a single agent (server wiring). Two sequential waves rather than parallel, but
    the agent tasks are non-trivial (filesystem walking logic + thread-safety + tests),
    build cycle is >5s, and the IMPL doc provides a useful coordination artifact and
    audit trail. SUITABLE.

    Estimated times:
    - Scout phase: ~10 min
    - Agent execution: ~15 min (2 agents × ~7 min avg, sequential waves)
    - Merge and verification: ~5 min
    Total SAW time: ~30 min

    Sequential baseline: ~20 min
    Time savings: marginal; primary value is coordination and audit trail.
    Recommendation: Proceed. Two-wave decomposition with clear interface contract.
test_command: env GOWORK=off go test ./internal/... ./cmd/... ./extensions/... .
