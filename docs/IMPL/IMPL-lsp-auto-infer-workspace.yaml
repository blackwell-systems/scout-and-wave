pre_mortem:
    overall_risk: low
    rows:
        - scenario: |
            Agent B cannot call config.inferWorkspaceRoot because it is unexported.
            Agent B may attempt to duplicate the logic or cause a compilation error.
          likelihood: high
          impact: medium
          mitigation: |
            Agent B's task explicitly instructs adding an exported InferWorkspaceRoot
            wrapper to internal/config/infer.go (which Agent A created in Wave 1).
            Agent B owns infer.go in Wave 2 ownership for this exact addition.
        - scenario: |
            Concurrent tool calls both reach autoInitClient and race to call StartAll,
            causing a double-init or a use-after-free on the LSPClient process.
          likelihood: medium
          impact: high
          mitigation: |
            The autoInitClient implementation uses a double-checked locking pattern
            with initMu (sync.Mutex). Only one goroutine calls StartAll; others wait
            and then return the initialized client. The design is explicitly specified
            in the interface contract.
        - scenario: |
            call_hierarchy and get_semantic_tokens currently use cs.get() directly
            (not clientForFile). Agent B may miss switching these two tools, leaving
            them without auto-init even though they have file_path arguments.
          likelihood: medium
          impact: low
          mitigation: |
            Agent B's task explicitly calls out these two tools by name as requiring
            the switch to clientForFileWithAutoInit, with a note that they "currently
            call cs.get() directly".
        - scenario: |
            strings.HasPrefix path comparison incorrectly rejects a valid file when
            rootDir ends in "/" or the file path uses a different form of the same path.
          likelihood: low
          impact: low
          mitigation: |
            The containment check uses `rootDir + "/"` as the prefix which is standard
            practice for absolute path containment. Edge case: file IS the root dir itself
            (rootDir == filePath). This edge case falls through to re-init, which is
            harmless since StartAll is idempotent within a session.
state: "REVIEWED"
