interface_contracts:
    - name: MergeTarget field threading
      description: |
        The MergeTarget field flows through the wave lifecycle to control where agent
        branches merge. Empty string means merge to current HEAD (backward compatible
        default, equivalent to main). Non-empty means merge to the specified branch.
      definition: |
        // In RunWaveFullOpts (pkg/engine/run_wave_full.go):
        type RunWaveFullOpts struct {
            ManifestPath string
            RepoPath     string
            WaveNum      int
            MergeTarget  string // target branch for merge; empty = HEAD (default)
        }

        // In FinalizeWaveOpts (pkg/engine/finalize.go):
        type FinalizeWaveOpts struct {
            IMPLPath   string
            RepoPath   string
            WaveNum    int
            MergeTarget string // target branch for merge; empty = HEAD (default)
            ObsEmitter *observability.Emitter
        }

        // In MergeAgents (pkg/protocol/merge_agents.go) — new signature:
        func MergeAgents(manifestPath string, waveNum int, repoDir string, mergeTarget string) (*MergeAgentsResult, error)

        // In git.MergeNoFF (internal/git/commands.go) — already merges into HEAD.
        // When MergeTarget is non-empty, caller must checkout target branch before merge.
      location: pkg/engine/run_wave_full.go
    - name: E28 IMPL branch isolation
      description: |
        Protocol specification for how the tier execution loop creates IMPL branches
        and threads MergeTarget through wave execution. This is the protocol-level
        contract that the engine implements.
      definition: |
        E28 amendment: Before executing waves for an IMPL in a program tier, the
        Orchestrator creates a long-lived IMPL branch using ProgramBranchName().
        All wave merges for that IMPL target the IMPL branch instead of main.
        After ALL IMPLs in the tier complete, finalize-tier merges IMPL branches
        to main in sequence.

        Branch lifecycle:
        1. CreateProgramWorktrees creates IMPL branch (already exists)
        2. RunWaveFull receives MergeTarget = IMPL branch name
        3. FinalizeWave/MergeAgents checks out MergeTarget before merging agent branches
        4. FinalizeTier merges IMPL branches to main (already exists)
      location: protocol/execution-rules.md
    - name: finalize-wave --merge-target flag
      description: |
        CLI flag for the finalize-wave command to specify merge target branch.
      definition: |
        // cmd/saw/finalize_wave.go — new flag:
        cmd.Flags().StringVar(&mergeTarget, "merge-target", "", "Target branch for merge (default: current HEAD)")

        // Passed to protocol.MergeAgents as the mergeTarget parameter.
      location: cmd/saw/finalize_wave.go
    - name: prepare-wave --merge-target flag
      description: |
        CLI flag for prepare-wave to run baseline verification against the IMPL branch.
      definition: |
        // cmd/saw/prepare_wave.go — new flag:
        cmd.Flags().StringVar(&mergeTarget, "merge-target", "", "Baseline branch for verification (default: current HEAD)")

        // When set, checkout merge-target before running baseline gates.
      location: cmd/saw/prepare_wave.go
waves:
    - number: 1
      agents:
        - id: A
          task: |
            ## What to Implement

            Update the SAW protocol specification to document IMPL branch isolation
            for program-tier execution. This is the authoritative spec that all
            engine implementation follows.

            **Files to modify:**

            1. **protocol/execution-rules.md** — Amend E28 (Tier Execution Loop):
               - Add a new subsection "E28B: IMPL Branch Isolation" that specifies:
                 - Before executing waves for an IMPL in a program tier, the Orchestrator
                   MUST create a long-lived IMPL branch using `ProgramBranchName()` format:
                   `saw/program/{slug}/tier{N}-impl-{implSlug}`
                 - All wave merges for that IMPL target the IMPL branch (not main)
                 - The IMPL branch is the baseline for prepare-wave verification
                 - After ALL IMPLs in the tier complete, `finalize-tier` merges IMPL
                   branches to main in sequence, then runs the tier gate
               - Add the branch lifecycle diagram:
                 ```
                 main ──────────────────────────────────────> (tier gate) ──>
                   \                                         /
                    └─ IMPL-A branch ── wave1 ── wave2 ──┘
                    └─ IMPL-B branch ── wave1 ──────────┘
                 ```
               - Document the MergeTarget threading: RunTierLoop -> RunWaveFull ->
                 FinalizeWave -> MergeAgents. Default empty string = merge to HEAD
                 (backward compatible).
               - Document that prepare-wave baseline verification runs against the
                 IMPL branch when inside a program context.

            2. **protocol/invariants.md** — Add P5 invariant:
               - **P5: IMPL Branch Isolation** — Within a program tier, each IMPL's
                 wave merges target the IMPL's dedicated branch, not main. Main is
                 only updated by finalize-tier after all IMPLs in the tier complete.
               - Add to the Protocol Violations table: "IMPL wave merged to main
                 during tier execution" | P5 | "Other IMPLs see partial state,
                 potential breakage"
               - Add to Protocol Guarantees: "No IMPL's in-progress wave merge can
                 break another IMPL's work within the same tier"

            **Constraints:**
            - Do NOT change any existing E28/E29/E30 rule numbers or semantics
            - E28B is a NEW subsection under E28, not a replacement
            - P5 follows existing numbering (P1-P4 exist in program-invariants.md;
              P5 goes in invariants.md since it's a
              cross-cutting safety property)
            - Keep the same prose style as existing rules
            - Reference existing functions by name (ProgramBranchName, FinalizeTier)

            ## Tests
            - N/A (protocol documentation only)

            ## Verification Gate
            - Verify no broken markdown links
            - Verify E28B subsection exists after E28A
            - Verify P5 appears in invariants.md
          files:
            - protocol/execution-rules.md
            - protocol/invariants.md
        - id: B
          task: |
            ## What to Implement

            Update the saw-skill.md orchestrator prompt to reflect IMPL branch
            isolation in the program execute flow.

            **File to modify: implementations/claude-code/prompts/saw-skill.md**

            In the `/saw program execute` section, update **Step 3b: IMPL Execution**:

            1. Before the "For each reviewed IMPL in tier N" loop, add:
               ```
               **Step 3a.5: Create IMPL Branches**

               Create long-lived IMPL branches for all IMPLs in the tier:
               ```bash
               sawtools create-program-worktrees "<manifest-path>" --tier N --repo-dir "<repo-path>"
               ```
               Each IMPL gets a branch: `saw/program/{slug}/tier{N}-impl-{implSlug}`.
               These branches are the merge targets for all wave executions within
               the IMPL — waves merge to the IMPL branch, NOT to main.
               ```

            2. In Step 3b, update the wave execution to pass --merge-target:
               ```
               - For each reviewed IMPL in tier N:
                 - Compute IMPL branch: `saw/program/{slug}/tier{N}-impl-{implSlug}`
                 - Execute the full IMPL lifecycle with IMPL branch as merge target:
                   - prepare-wave: `sawtools prepare-wave <impl-doc> --wave W --merge-target <impl-branch>`
                   - finalize-wave: `sawtools finalize-wave <impl-doc> --wave W --merge-target <impl-branch>`
                 - Waves merge to the IMPL branch, isolating each IMPL's work
               ```

            3. In Step 3b.5 (Tier Merge), clarify that finalize-tier merges IMPL
               branches (not agent branches) to main. The existing text is close
               but should explicitly say "IMPL branches" not "worktree branches".

            4. Add a note after Step 3b.5:
               ```
               **Backward compatibility:** When running outside a program context
               (standard `/saw wave` flow), MergeTarget is empty and waves merge
               to HEAD as before. The IMPL branch model only activates during
               `/saw program execute`.
               ```

            5. In the sawtools reference list, add entries:
               - `sawtools create-program-worktrees <manifest> --tier N` — create
                 IMPL branches for a program tier
               - Update `sawtools finalize-wave` entry to mention `--merge-target` flag
               - Update `sawtools prepare-wave` entry to mention `--merge-target` flag

            **Constraints:**
            - Do NOT change any command names or existing flag semantics
            - Keep the existing document structure and style
            - Maintain backward compatibility language throughout
          files:
            - implementations/claude-code/prompts/saw-skill.md
