pre_mortem:
    overall_risk: medium
    rows:
        - scenario: Agent D adds MergeTarget to RunWaveFullOpts but Agent C references it before Agent D's wave completes
          likelihood: low
          impact: low
          mitigation: Both agents are in Wave 2 and work in separate files. Agent C references the field name but Agent D defines it. The struct field addition is a compile-time dependency resolved at merge.
        - scenario: Agent E changes MergeAgents signature but callers in other agents' files still use old 3-arg version
          likelihood: medium
          impact: high
          mitigation: Agent D must update its MergeAgents calls in finalize.go and run_wave_full.go to pass mergeTarget. Both D and E are in Wave 2; after merge, go build catches any signature mismatch immediately.
        - scenario: git checkout to merge target branch fails because branch doesn't exist
          likelihood: medium
          impact: medium
          mitigation: Agent C creates IMPL branches before wave execution. Agent E's MergeAgents should validate branch existence before checkout and return a clear error if missing.
        - scenario: Backward compatibility break — non-program waves fail because MergeAgents now requires 4 args
          likelihood: low
          impact: high
          mitigation: All existing callers are updated in Wave 2. Empty string default preserves existing behavior. Post-merge test suite catches any missed callsites.
        - scenario: Web app (Wave 3) imports updated scout-and-wave-go but go.mod replace directive points to old version
          likelihood: medium
          impact: medium
          mitigation: Wave 3 agents should verify go.mod replace directives point to the correct local path before building.
