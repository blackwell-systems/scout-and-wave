title: 'Program-Tier Isolation: IMPL branch model for safe parallel IMPL execution'
feature_slug: program-tier-isolation
verdict: SUITABLE
suitability_assessment: |
    **Verdict:** SUITABLE

    This feature decomposes cleanly across three repositories (protocol, engine/SDK, web app)
    with a natural wave ordering: protocol spec leads (Wave 1), engine implements (Wave 2),
    web app consumes (Wave 3). File ownership is fully disjoint — no two agents touch the
    same file. Interface contracts are discoverable: the core change is threading a MergeTarget
    string through existing function signatures. No investigation-first blockers exist; the
    existing code is well-structured with clear extension points.

    The parallelization value is high within waves: Wave 1 has 2 independent protocol doc
    agents, Wave 2 has 3 independent engine agents working in separate packages, and Wave 3
    has 2 independent web agents. Build/test cycles are >30s for the Go repos.

    **Estimated times:**
    - Scout phase: ~10 min
    - Wave 1 execution: ~8 min (2 agents in parallel, protocol docs)
    - Wave 2 execution: ~15 min (3 agents in parallel, Go engine)
    - Wave 3 execution: ~10 min (2 agents in parallel, web app)
    - Merge & verify: ~5 min per wave (15 min total)
    - Total (SAW): ~48 min
    - Sequential baseline: ~90 min (7 agents x ~13 min avg)
    - Time savings: ~42 min (47% faster)

    **Recommendation:** Proceed. Clear speedup from 3-wave parallelization across repos.
