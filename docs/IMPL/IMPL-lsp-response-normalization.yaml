pre_mortem:
    overall_risk: low
    rows:
        - scenario: |-
            CodeAction discriminator fails for edge-case servers that omit "kind" on CodeActions
            (kind is optional per spec) and also happen to have a string "command" field.
            The discriminator in NormalizeCodeActions relies on checking whether the "command"
            field is a JSON string vs object. A bare Command always has a string "command"
            field; a CodeAction with an embedded Command object always has an object. This is
            reliable per spec, but a malformed server could confuse the heuristic.
          likelihood: low
          impact: low
          mitigation: |-
            Document the discriminator logic clearly in normalize.go. If command field is a
            JSON string → bare Command. If command field is a JSON object or absent → CodeAction.
            Log a warning (using the logging package) when an item cannot be classified and
            skip it rather than returning an error, to avoid breaking the entire response.
        - scenario: |-
            Two-pass SymbolInformation reconstruction maps children to wrong parents when
            two symbols have the same name in different scopes (e.g., two methods both named
            "String" on different types). The name→node map uses last-write-wins, so the
            second "String" overwrites the first, and both items' children get parented to
            the second "String".
          likelihood: medium
          impact: low
          mitigation: |-
            This is a known limitation of the two-pass approach — containerName is just a
            string, so collision is unavoidable without more information. The feature spec
            explicitly calls for this approach ("reconstruct parent-child tree from containerName;
            anything unresolved becomes root-level with no children"). Document the limitation
            in a comment in NormalizeDocumentSymbols. The result is still structurally valid;
            it may just have slightly wrong tree shape for duplicate-name symbols.
        - scenario: |-
            Agent B edits WithDocument type parameters incorrectly, causing a compile error.
            The generic constraint T any is flexible, but mismatching the callback return type
            with the outer variable declaration produces a type inference error.
          likelihood: low
          impact: low
          mitigation: |-
            Agent B's task provides exact verbatim before/after text for each WithDocument call.
            The verification gate runs go build immediately — compile errors surface within
            seconds of the edit.
        - scenario: |-
            resources.go requires an explicit import change or type assertion after
            GetCompletion return type changes, causing a compile error Agent B misses.
          likelihood: low
          impact: low
          mitigation: |-
            Agent B's task explicitly instructs running GOWORK=off go build ./internal/resources/...
            after the Wave 1 merge and before any edits. If there is a compile error, the agent
            investigates and fixes it. The json.Marshal call is type-agnostic, so in practice
            no change should be needed.
