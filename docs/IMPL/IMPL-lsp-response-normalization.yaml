interface_contracts:
    - name: DocumentSymbol
      description: |-
        Hierarchical document symbol shape (richer of the two LSP variants).
        New type added to internal/types/types.go. Used as the canonical return
        type for GetDocumentSymbols after normalization.
      definition: |
        // DocumentSymbol is the hierarchical variant of a document symbol.
        // See LSP 3.17 § DocumentSymbol.
        type DocumentSymbol struct {
            Name           string           `json:"name"`
            Detail         string           `json:"detail,omitempty"`
            Kind           SymbolKind       `json:"kind"`
            Tags           []SymbolTag      `json:"tags,omitempty"`
            Deprecated     bool             `json:"deprecated,omitempty"`
            Range          Range            `json:"range"`
            SelectionRange Range            `json:"selectionRange"`
            Children       []DocumentSymbol `json:"children,omitempty"`
        }
      location: internal/types/types.go
    - name: CompletionItem
      description: |-
        Single completion item. New type added to internal/types/types.go.
        Matches LSP CompletionItem; fields beyond label/kind are kept as
        interface{} or *string to stay flexible across server implementations.
      definition: |
        // CompletionItem represents a single completion suggestion.
        // See LSP 3.17 § CompletionItem.
        type CompletionItem struct {
            Label               string      `json:"label"`
            Kind                *int        `json:"kind,omitempty"`
            Tags                []SymbolTag `json:"tags,omitempty"`
            Detail              *string     `json:"detail,omitempty"`
            Documentation       interface{} `json:"documentation,omitempty"`
            Deprecated          bool        `json:"deprecated,omitempty"`
            Preselect           bool        `json:"preselect,omitempty"`
            SortText            *string     `json:"sortText,omitempty"`
            FilterText          *string     `json:"filterText,omitempty"`
            InsertText          *string     `json:"insertText,omitempty"`
            InsertTextFormat    *int        `json:"insertTextFormat,omitempty"`
            TextEdit            interface{} `json:"textEdit,omitempty"`
            AdditionalTextEdits []TextEdit  `json:"additionalTextEdits,omitempty"`
            CommitCharacters    []string    `json:"commitCharacters,omitempty"`
            Command             *Command    `json:"command,omitempty"`
            Data                interface{} `json:"data,omitempty"`
        }
      location: internal/types/types.go
    - name: CompletionList
      description: |-
        Canonical completion response wrapper. New type added to internal/types/types.go.
        GetCompletion always returns this; bare CompletionItem[] is wrapped with
        isIncomplete=false. This is the type both analysis.go and resources.go receive.
      definition: |
        // CompletionList is the canonical completion response.
        // See LSP 3.17 § CompletionList.
        type CompletionList struct {
            IsIncomplete bool             `json:"isIncomplete"`
            Items        []CompletionItem `json:"items"`
        }
      location: internal/types/types.go
    - name: Command
      description: |-
        LSP Command type. New type in internal/types/types.go. Used as the flat
        (non-CodeAction) variant that GetCodeActions normalizes away. Also embedded
        in CompletionItem.Command and CodeAction.Command.
      definition: |
        // Command is an LSP workspace command (used both standalone and embedded).
        // See LSP 3.17 § Command.
        type Command struct {
            Title     string        `json:"title"`
            Command   string        `json:"command"`
            Arguments []interface{} `json:"arguments,omitempty"`
        }
      location: internal/types/types.go
    - name: CodeAction
      description: |-
        Canonical code action shape. New type in internal/types/types.go.
        GetCodeActions always returns []CodeAction; bare Command items are
        synthesized into CodeAction{Title: cmd.Title, Command: &cmd}.
        Discriminator: CodeAction has a "kind" field; Command does not.
        Note: "kind" is optional in CodeAction per spec, so discrimination uses
        presence of "title" + absence of "command" (string field) as the primary
        heuristic, falling back to checking whether "kind" is present.
      definition: |
        // CodeAction is the canonical code action shape.
        // See LSP 3.17 § CodeAction.
        type CodeAction struct {
            Title       string        `json:"title"`
            Kind        *string       `json:"kind,omitempty"`
            Diagnostics []LSPDiagnostic `json:"diagnostics,omitempty"`
            IsPreferred *bool         `json:"isPreferred,omitempty"`
            Disabled    *struct {
                Reason string `json:"reason"`
            } `json:"disabled,omitempty"`
            Edit    interface{} `json:"edit,omitempty"`
            Command *Command    `json:"command,omitempty"`
            Data    interface{} `json:"data,omitempty"`
        }
      location: internal/types/types.go
    - name: NormalizeDocumentSymbols
      description: |-
        Core normalization function in new file internal/lsp/normalize.go.
        Accepts raw JSON from the LSP server (DocumentSymbol[] or SymbolInformation[]).
        Discriminates by presence of "selectionRange" field (DocumentSymbol has it;
        SymbolInformation does not — SymbolInformation has "location" instead).
        For SymbolInformation[], two-pass reconstruction:
          Pass 1: unmarshal each item, synthesize selectionRange=range (from location.range),
                  build name->*DocumentSymbol map.
          Pass 2: for each item with containerName, find parent by name in map and append
                  as child; items with no resolvable parent become root-level nodes.
      definition: |
        // NormalizeDocumentSymbols converts a raw LSP documentSymbol response
        // (DocumentSymbol[] | SymbolInformation[]) into []types.DocumentSymbol.
        func NormalizeDocumentSymbols(raw json.RawMessage) ([]types.DocumentSymbol, error)
      location: internal/lsp/normalize.go
    - name: NormalizeCompletion
      description: |-
        Core normalization function in new file internal/lsp/normalize.go.
        Accepts raw JSON (CompletionList | CompletionItem[]).
        Discriminates by attempting unmarshal into struct with "items" field
        (CompletionList). If items field is non-nil, it is a CompletionList.
        Otherwise unmarshal as []CompletionItem and wrap with IsIncomplete=false.
      definition: |
        // NormalizeCompletion converts a raw LSP completion response
        // (CompletionList | CompletionItem[]) into types.CompletionList.
        func NormalizeCompletion(raw json.RawMessage) (types.CompletionList, error)
      location: internal/lsp/normalize.go
    - name: NormalizeCodeActions
      description: |-
        Core normalization function in new file internal/lsp/normalize.go.
        Accepts raw JSON ((Command | CodeAction)[]).
        Discriminates per item: if item has a "command" field that is a string
        (not an object), it is a Command — synthesize CodeAction{Title, Command: &cmd}.
        If item has a "title" field and no string "command" field, it is a CodeAction —
        unmarshal directly. Items that fail both paths are dropped with a log warning.
        Returns []types.CodeAction (never nil; empty slice on empty input).
      definition: |
        // NormalizeCodeActions converts a raw LSP codeAction response
        // ((Command | CodeAction)[]) into []types.CodeAction.
        func NormalizeCodeActions(raw json.RawMessage) ([]types.CodeAction, error)
      location: internal/lsp/normalize.go
    - name: LSPClient.GetDocumentSymbols
      description: |-
        Updated signature for client.GetDocumentSymbols. Returns []types.DocumentSymbol
        instead of []interface{}. Calls NormalizeDocumentSymbols internally.
        Callers: internal/tools/analysis.go HandleGetDocumentSymbols.
      definition: |
        func (c *LSPClient) GetDocumentSymbols(ctx context.Context, uri string) ([]types.DocumentSymbol, error)
      location: internal/lsp/client.go
    - name: LSPClient.GetCompletion
      description: |-
        Updated signature for client.GetCompletion. Returns types.CompletionList
        instead of []interface{}. Calls NormalizeCompletion internally.
        Callers: internal/tools/analysis.go HandleGetCompletions,
                 internal/resources/resources.go HandleCompletionsResource.
      definition: |
        func (c *LSPClient) GetCompletion(ctx context.Context, uri string, pos types.Position) (types.CompletionList, error)
      location: internal/lsp/client.go
    - name: LSPClient.GetCodeActions
      description: |-
        Updated signature for client.GetCodeActions. Returns []types.CodeAction
        instead of []interface{}. Calls NormalizeCodeActions internally.
        Callers: internal/tools/analysis.go HandleGetCodeActions.
      definition: |
        func (c *LSPClient) GetCodeActions(ctx context.Context, uri string, rng types.Range) ([]types.CodeAction, error)
      location: internal/lsp/client.go
