title: LSP Union Response Normalization
feature_slug: lsp-response-normalization
verdict: SUITABLE
suitability_assessment: |
    Work decomposes into two disjoint waves with a clear interface boundary:

    Wave 1 (Agent A) owns the LSP layer: new types in internal/types/types.go,
    the normalization functions in new file internal/lsp/normalize.go, and the
    updated method signatures in internal/lsp/client.go. These three files have
    no dependency on the tool/resource layer.

    Wave 2 (Agent B) owns the consumer layer: internal/tools/analysis.go (three
    handlers switch from []interface{} to concrete types), internal/resources/resources.go
    (HandleCompletionsResource uses the new CompletionList return type), and unit
    tests for the normalization logic in internal/lsp/normalize_test.go.

    Interface contracts are fully specifiable before implementation: the three
    normalization function signatures are determined by the LSP spec (discriminator
    fields are well-known), and the three updated client method signatures follow
    from the feature description.

    Parallelization value: moderate. The two waves run sequentially, but Agent A
    has ~4 files of non-trivial logic (two-pass tree reconstruction for DocumentSymbol,
    discriminated union dispatch for CodeAction). Build+test cycles run independently
    per worktree. Sequential baseline ~25 min; SAW ~15 min (10 min Agent A, 5 min
    Agent B after merge).

    No investigation-first items. No unknown root causes. All five suitability
    questions resolve cleanly.

    Estimated times:
    - Scout phase: ~10 min
    - Agent execution: Wave 1 ~10 min, Wave 2 ~5 min (post-merge of Wave 1)
    - Merge and verification: ~3 min
    Total SAW time: ~18 min
    Sequential baseline: ~25 min
    Time savings: ~7 min (28% faster). Clear speedup given non-trivial normalization logic.
