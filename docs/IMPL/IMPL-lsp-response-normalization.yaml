            2. Update internal/resources/resources.go — HandleCompletionsResource uses CompletionList.
            3. Write unit tests in internal/lsp/normalize_test.go for the three Normalize* functions.

            ## Repo root
            /Users/dayna.blackwell/workspace/code/LSP-MCP-GO

            All commands must be run with GOWORK=off.

            ## New types available (from Wave 1)
            After Wave 1 merges, the following types exist in internal/types/types.go:
            - types.DocumentSymbol — hierarchical symbol with selectionRange + children
            - types.CompletionItem — single completion suggestion
            - types.CompletionList — {IsIncomplete bool, Items []CompletionItem}
            - types.Command — {Title, Command string, Arguments []interface{}}
            - types.CodeAction — {Title, Kind *string, Command *Command, Edit interface{}, ...}

            And in internal/lsp/normalize.go (package lsp):
            - lsp.NormalizeDocumentSymbols(json.RawMessage) ([]types.DocumentSymbol, error)
            - lsp.NormalizeCompletion(json.RawMessage) (types.CompletionList, error)
            - lsp.NormalizeCodeActions(json.RawMessage) ([]types.CodeAction, error)

            ## Step 1: Update internal/tools/analysis.go

            Three handlers need updating. The changes are straightforward: update the
            WithDocument type parameter and the marshal call.

            **HandleGetCompletions** — change from `[]interface{}` to `types.CompletionList`:

            Find this exact text in analysis.go:
            ```go
            	result, wErr := WithDocument[[]interface{}](ctx, client, filePath, languageID, func(fileURI string) ([]interface{}, error) {
            		pos := types.Position{Line: line - 1, Character: col - 1}
            		return client.GetCompletion(ctx, fileURI, pos)
            	})
            	if wErr != nil {
            		return types.ErrorResult(fmt.Sprintf("get_completions: %s", wErr)), nil
            	}

            	data, mErr := json.Marshal(result)
            ```
            Replace with:
            ```go
            	result, wErr := WithDocument[types.CompletionList](ctx, client, filePath, languageID, func(fileURI string) (types.CompletionList, error) {
            		pos := types.Position{Line: line - 1, Character: col - 1}
            		return client.GetCompletion(ctx, fileURI, pos)
            	})
            	if wErr != nil {
            		return types.ErrorResult(fmt.Sprintf("get_completions: %s", wErr)), nil
            	}

            	data, mErr := json.Marshal(result)
            ```

            **HandleGetCodeActions** — change from `[]interface{}` to `[]types.CodeAction`:

            Find this exact text in analysis.go:
            ```go
            	result, wErr := WithDocument[[]interface{}](ctx, client, filePath, languageID, func(fileURI string) ([]interface{}, error) {
            		return client.GetCodeActions(ctx, fileURI, rng)
            	})
            	if wErr != nil {
            		return types.ErrorResult(fmt.Sprintf("get_code_actions: %s", wErr)), nil
            	}
            ```
            Replace with:
            ```go
            	result, wErr := WithDocument[[]types.CodeAction](ctx, client, filePath, languageID, func(fileURI string) ([]types.CodeAction, error) {
            		return client.GetCodeActions(ctx, fileURI, rng)
            	})
            	if wErr != nil {
            		return types.ErrorResult(fmt.Sprintf("get_code_actions: %s", wErr)), nil
            	}
            ```

            **HandleGetDocumentSymbols** — change from `[]interface{}` to `[]types.DocumentSymbol`:

            Find this exact text in analysis.go:
            ```go
            	result, wErr := WithDocument[[]interface{}](ctx, client, filePath, languageID, func(fileURI string) ([]interface{}, error) {
            		return client.GetDocumentSymbols(ctx, fileURI)
            	})
            	if wErr != nil {
            		return types.ErrorResult(fmt.Sprintf("get_document_symbols: %s", wErr)), nil
            	}
            ```
            Replace with:
            ```go
            	result, wErr := WithDocument[[]types.DocumentSymbol](ctx, client, filePath, languageID, func(fileURI string) ([]types.DocumentSymbol, error) {
            		return client.GetDocumentSymbols(ctx, fileURI)
            	})
            	if wErr != nil {
            		return types.ErrorResult(fmt.Sprintf("get_document_symbols: %s", wErr)), nil
            	}
            ```

            ## Step 2: Update internal/resources/resources.go

            The HandleCompletionsResource function calls client.GetCompletion and marshals
            the result. The return type changes from []interface{} to types.CompletionList,
            but the marshal call is identical — json.Marshal works on both. The only change
            needed is that the compiler will now require an import for the types package if
            it is not already imported, and the variable type changes implicitly.

            Find this exact text in resources.go:
            ```go
            	completions, err := client.GetCompletion(ctx, fileURI, pos)
            	if err != nil {
            		return ResourceResult{}, fmt.Errorf("get completions: %w", err)
            	}

            	text, err := json.Marshal(completions)
            ```
            The code is correct as-is after Wave 1 (GetCompletion now returns types.CompletionList
            which marshals to the same JSON the caller already expected). Verify the file compiles:
            ```bash
            cd /Users/dayna.blackwell/workspace/code/LSP-MCP-GO
            GOWORK=off go build ./internal/resources/...
            ```
            If there are no compilation errors, no text change is needed in resources.go.
            If there IS a compilation error (unlikely but possible if the types package import
            path changed), add the missing import.

            In practice, because resources.go only calls client.GetCompletion and json.Marshal
            on the result (no type assertion or []interface{} cast), it will compile without
            changes. Confirm, then move on.

            ## Step 3: Write internal/lsp/normalize_test.go

            Create a new file `internal/lsp/normalize_test.go` in package `lsp_test`
            (external test package; same directory as normalize.go).

            Import:
            ```go
            import (
                "encoding/json"
                "testing"

                "github.com/blackwell-systems/lsp-mcp-go/internal/lsp"
                "github.com/blackwell-systems/lsp-mcp-go/internal/types"
            )
            ```

            Write the following tests:

            ### TestNormalizeDocumentSymbols_Null
            Input: nil RawMessage.
            Assert: returns empty slice, nil error.

            ### TestNormalizeDocumentSymbols_EmptyArray
            Input: json.RawMessage(`[]`).
            Assert: returns empty slice, nil error.

            ### TestNormalizeDocumentSymbols_DocumentSymbolVariant
            Input: JSON array with one DocumentSymbol object that has a "selectionRange" field:
            ```json
            [{"name":"Foo","kind":5,"range":{"start":{"line":0,"character":0},"end":{"line":10,"character":1}},"selectionRange":{"start":{"line":0,"character":5},"end":{"line":0,"character":8}}}]
            ```
            Assert:
            - len(result) == 1
            - result[0].Name == "Foo"
            - result[0].SelectionRange.Start.Line == 0 && result[0].SelectionRange.Start.Character == 5
            - result[0].Children == nil or len(result[0].Children) == 0

            ### TestNormalizeDocumentSymbols_SymbolInformationVariant
            Input: JSON array with two SymbolInformation objects — one root, one child:
            ```json
            [
              {"name":"MyStruct","kind":5,"location":{"uri":"file:///foo.go","range":{"start":{"line":0,"character":0},"end":{"line":5,"character":1}}}},
              {"name":"MyField","kind":8,"location":{"uri":"file:///foo.go","range":{"start":{"line":1,"character":1},"end":{"line":1,"character":10}}},"containerName":"MyStruct"}
            ]
            ```
            Assert:
            - len(result) == 1 (MyStruct is root)
            - result[0].Name == "MyStruct"
            - result[0].SelectionRange == result[0].Range (synthesized from location.range)
            - len(result[0].Children) == 1
            - result[0].Children[0].Name == "MyField"

            ### TestNormalizeCompletion_Null
            Input: nil RawMessage.
            Assert: returns CompletionList{Items non-nil but empty}, nil error.

            ### TestNormalizeCompletion_BareArray
            Input: JSON array of two completion items:
            ```json
            [{"label":"fmt"},{"label":"os"}]
            ```
            Assert:
            - result.IsIncomplete == false
            - len(result.Items) == 2
            - result.Items[0].Label == "fmt"

            ### TestNormalizeCompletion_CompletionList
            Input: CompletionList JSON:
            ```json
            {"isIncomplete":true,"items":[{"label":"Printf"},{"label":"Println"}]}
            ```
            Assert:
            - result.IsIncomplete == true
            - len(result.Items) == 2
            - result.Items[0].Label == "Printf"

            ### TestNormalizeCodeActions_Null
            Input: nil RawMessage.
            Assert: returns non-nil empty slice, nil error.

            ### TestNormalizeCodeActions_BareCommands
            Input: JSON array of one Command (discriminated by string "command" field):
            ```json
            [{"title":"Format Document","command":"editor.action.formatDocument"}]
            ```
            Assert:
            - len(result) == 1
            - result[0].Title == "Format Document"
            - result[0].Command != nil
            - result[0].Command.Command == "editor.action.formatDocument"
            - result[0].Kind == nil (synthesized CodeAction has no kind)

            ### TestNormalizeCodeActions_CodeActions
            Input: JSON array of one CodeAction (has "kind" field):
            ```json
            [{"title":"Add import","kind":"quickfix","command":{"title":"Add import","command":"go.add.import","arguments":["fmt"]}}]
            ```
            Assert:
            - len(result) == 1
            - result[0].Title == "Add import"
            - result[0].Kind != nil && *result[0].Kind == "quickfix"
            - result[0].Command != nil
            - result[0].Command.Command == "go.add.import"

            ### TestNormalizeCodeActions_Mixed
            Input: JSON array with one bare Command followed by one CodeAction:
            ```json
            [
              {"title":"Run","command":"test.run"},
              {"title":"Fix error","kind":"quickfix"}
            ]
            ```
            Assert:
            - len(result) == 2
            - result[0].Title == "Run" && result[0].Kind == nil
            - result[1].Title == "Fix error" && *result[1].Kind == "quickfix"

