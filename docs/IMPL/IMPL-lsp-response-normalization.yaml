            ### Step 2: Create internal/lsp/normalize.go

            Create a new file `internal/lsp/normalize.go` in package `lsp`. This file
            contains three pure functions that take `json.RawMessage` and return concrete types.
            The functions import `encoding/json` and `github.com/blackwell-systems/lsp-mcp-go/internal/types`.

            #### NormalizeDocumentSymbols

            Logic:
            1. If raw is nil or "null", return empty slice, nil.
            2. Attempt to unmarshal the first element (if array is non-empty) as a probe object:
               ```go
               var probe []json.RawMessage
               ```
               If the array is empty, return empty slice, nil.
            3. Unmarshal probe[0] into a struct with just `SelectionRange *json.RawMessage json:"selectionRange"`.
               If SelectionRange is non-nil, the server returned DocumentSymbol[] — unmarshal
               the whole array directly as []types.DocumentSymbol and return.
            4. Otherwise (SymbolInformation variant), unmarshal as []types.SymbolInformation.
               Two-pass tree reconstruction:
               Pass 1: For each SymbolInformation item, create DocumentSymbol:
                 - Name = item.Name, Kind = item.Kind, Tags = item.Tags
                 - Range = item.Location.Range
                 - SelectionRange = item.Location.Range  (synthesized)
                 - Children = nil
                 Build a map[string]*DocumentSymbol keyed by Name (last write wins on duplicates).
               Pass 2: For each item (same order), if ContainerName is non-nil and non-empty,
                 look up parent in the name map. If found, append the child's DocumentSymbol
                 pointer to parent.Children. If not found, append to root slice.
                 Items with nil or empty ContainerName always go to root slice.
               Return the root slice (items appended in Pass 2 order), nil.

            #### NormalizeCompletion

            Logic:
            1. If raw is nil or "null", return CompletionList{Items: []CompletionItem{}}, nil.
            2. Attempt unmarshal into struct{ Items []json.RawMessage `json:"items"` }.
               If Items is non-nil (even empty slice), the server returned a CompletionList.
               Unmarshal raw as:
               ```go
               var cl struct {
                   IsIncomplete bool                    `json:"isIncomplete"`
                   Items        []types.CompletionItem  `json:"items"`
               }
               ```
               Return types.CompletionList{IsIncomplete: cl.IsIncomplete, Items: cl.Items}, nil.
            3. Otherwise, attempt unmarshal as []types.CompletionItem.
               Return types.CompletionList{IsIncomplete: false, Items: items}, nil.
            4. On all unmarshal errors, return zero value and the error.

            #### NormalizeCodeActions

            Logic:
            1. If raw is nil or "null", return []types.CodeAction{}, nil.
            2. Unmarshal as []json.RawMessage. If error, return nil and error.
            3. For each element:
               a. Unmarshal into a discriminator struct:
                  ```go
                  var disc struct {
                      Title   string          `json:"title"`
                      Command json.RawMessage `json:"command"`
                      Kind    *string         `json:"kind"`
                  }
                  ```
               b. Determine shape:
                  - If disc.Command is non-nil and NOT a JSON object (i.e., first non-whitespace
                    byte is `"` or it is a plain string), it is a bare Command.
                    Unmarshal the element as types.Command and synthesize:
                    types.CodeAction{Title: cmd.Title, Command: &cmd}
                  - Otherwise (disc.Kind != nil, or disc.Command is object/absent, or
                    disc.Title is set with object/nil command), treat as CodeAction.
                    Unmarshal element directly as types.CodeAction.
               c. Append result to output slice.
            4. Return output slice (never nil; use []types.CodeAction{} if empty), nil.

            Note on discriminator: the spec says Command has a string `command` field
            (the command identifier) while CodeAction has an object `command` field
            (a nested Command object). Checking whether the raw `command` value starts
            with `"` (after trimming whitespace) is the reliable discriminator.

