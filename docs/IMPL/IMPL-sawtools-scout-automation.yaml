            - `list-error-ranges` — wraps `protocol.ListErrorRanges`
            - `suggest-wave-structure` — wraps `protocol.SuggestWaveStructure`

            Wave 1 (Agents A, B, C) must be merged before this wave starts.
            The library functions `CheckCallers`, `ListErrorRanges`, and `SuggestWaveStructure`
