pre_mortem:
    overall_risk: medium
    rows:
        - scenario: |-
            Wave 1 library functions use `filepath.Walk` which may be slow on large
            repos; the <2s performance requirement could be violated on very large codebases.
          likelihood: low
          impact: medium
          mitigation: |-
            Implement a depth-first walk with early termination on context cancellation.
            Skip vendor/, node_modules/, and .git/ directories. If still too slow, add
            --include-dirs flag to limit scope. The requirement is for typical repos; document
            the caveat in the Long help text.
        - scenario: |-
            Agent F modifies prepare_wave.go to add the validate-contracts pre-flight and
            must move the `projectRoot` declaration earlier. If Agent F misreads the current
            code structure, it may introduce a build error or change behavior.
          likelihood: medium
          impact: high
          mitigation: |-
            Agent F brief explicitly states the current ordering and final ordering. The
            brief includes the exact block to move verbatim. Critic Check 3 will verify the
            pattern matches. If in doubt, Agent F should run `go build ./cmd/sawtools/...`
            before committing.
        - scenario: |-
            Wave 1 introduces new types in pkg/protocol/.
            If two Wave 1 agents accidentally define the same type name, merge will fail.
          likelihood: low
          impact: high
          mitigation: |-
            Interface contracts explicitly assign each type to a specific file:
            CallerSite/ErrorCodeRange in check_callers.go (Agent A),
            WaveStructureProblem in suggest_wave_structure.go (Agent B),
            TestCascadeError in check_test_cascade.go (Agent C).
            No shared types are needed — each command has its own output type.
        - scenario: |-
            The `SuggestWaveStructure` implementation relies on heuristic keyword scanning
            of agent task text to identify "changed symbols". False negatives (missed keywords)
            produce no output, which is safe but unhelpful.
          likelihood: medium
          impact: low
          mitigation: |-
            Document clearly in the command's Long help that detection is keyword-driven.
            The command is a Scout aid, not a hard gate — it supplements rather than
            replaces human review. False negatives do not block wave execution.
        - scenario: |-
            Documentation agents G, H, I are modifying files in the scout-and-wave repo
            (not scout-and-wave-go). If the human reviewer runs quality gates for
            scout-and-wave-go only, doc changes could be missed.
          likelihood: low
          impact: low
          mitigation: |-
            Quality gates are scoped to scout-and-wave-go for Go code. Documentation
            changes are verified via targeted grep checks in each agent's verification gate.
            The post-merge checklist should include reviewing all three doc files.
