interface_contracts:
    - name: CallerSite
      description: A single call site of a function/method found during whole-repo scan.
      definition: |
        // CallerSite represents one location where a function/method is called.
        type CallerSite struct {
            File    string `json:"file"`    // repo-relative path
            Line    int    `json:"line"`    // 1-indexed line number
            Context string `json:"context"` // surrounding line content (trimmed)
        }
      location: pkg/protocol/check_callers.go
    - name: CheckCallers
      description: |-
        Find all call sites of a named function or method across the entire repo,
        including test files. Returns Result[[]CallerSite].
      definition: |
        // CheckCallers scans repoDir for all call sites of symbolName.
        // symbolName may be a plain function name ("GetData") or a method call
        // expression ("cache.Get") — both styles are matched via regex grep.
        // Test files are included in the scan. Returns every (file, line, context)
        // tuple where symbolName appears as a call expression.
        func CheckCallers(ctx context.Context, repoDir, symbolName string) result.Result[[]CallerSite]
      location: pkg/protocol/check_callers.go
    - name: ErrorCodeRange
      description: One allocated error code range from pkg/result/codes.go.
      definition: |
        // ErrorCodeRange describes a single allocated error code prefix range.
        type ErrorCodeRange struct {
            Prefix      string `json:"prefix"`      // e.g. "V", "K", "C"
            Start       int    `json:"start"`       // first code number in range (1-indexed)
            End         int    `json:"end"`         // last code number in range (inclusive)
            Description string `json:"description"` // e.g. "Validation errors"
        }
      location: pkg/protocol/check_callers.go
    - name: ListErrorRanges
      description: |-
        Scan pkg/result/codes.go and return all allocated error code ranges.
        Lets Scout and agents choose unoccupied ranges without guessing.
      definition: |
        // ListErrorRanges parses the package-doc comment block in pkg/result/codes.go
        // and returns all declared error code ranges.
        // Returns Result[[]ErrorCodeRange].
        func ListErrorRanges(ctx context.Context, repoDir string) result.Result[[]ErrorCodeRange]
      location: pkg/protocol/check_callers.go
    - name: TestCascadeError
      description: A test file that calls a changed symbol but is not in any agent's ownership.
      definition: |
        // TestCascadeError represents an orphaned test file found during cascade check.
        type TestCascadeError struct {
            Symbol     string   `json:"symbol"`      // function/method name that changed
            TestFile   string   `json:"test_file"`   // repo-relative path to *_test.go
            Line       int      `json:"line"`        // line in test file
            Context    string   `json:"context"`     // surrounding line content
            Agents     []string `json:"agents"`      // agents that own the symbol definition
        }
      location: pkg/protocol/check_test_cascade.go
    - name: CheckTestCascade
      description: |-
        Pre-flight gate: verify that every _test.go file calling a symbol whose
        signature changes is assigned to an agent in file_ownership.
        Run after IMPL doc is written, before E37.
      definition: |
        // CheckTestCascade detects orphaned test call sites for changed symbols.
        // For each file in m.FileOwnership, it identifies function/method names
        // that the owning agent is changing (based on agent task keywords:
        // "change signature", "migrate", "update signature", "change return type",
        // "rename"). For each such symbol it runs a whole-repo grep restricted to
        // *_test.go files. Any test file calling the symbol that is NOT in
        // m.FileOwnership is reported as a TestCascadeError.
        //
        // Returns Result[[]TestCascadeError].
        // Returns SUCCESS with empty slice when no orphaned test callers found.
        // Returns PARTIAL with warnings when symbol extraction was ambiguous.
        // Returns FATAL when repoDir is unreadable or manifest is nil.
        func CheckTestCascade(ctx context.Context, m *IMPLManifest, repoDir string) result.Result[[]TestCascadeError]
      location: pkg/protocol/check_test_cascade.go
    - name: WaveStructureProblem
      description: A wave structure issue where callers of a changed interface are in the wrong wave.
      definition: |
        // WaveStructureProblem describes an E21A-inducing IMPL pattern.
        type WaveStructureProblem struct {
            Symbol        string   `json:"symbol"`         // changed function/type name
            ChangedInWave int      `json:"changed_in_wave"` // wave where signature change occurs
            CallerWave    int      `json:"caller_wave"`    // wave where callers live (problematic)
            CallerFiles   []string `json:"caller_files"`   // files with unprotected callers
            Message       string   `json:"message"`        // description of the problem
        }
      location: pkg/protocol/suggest_wave_structure.go
    - name: SuggestWaveStructure
      description: |-
        Validate that all callers of any changed interface are in the same wave as
        the change or in a downstream wave with correct depends_on.
      definition: |
        // SuggestWaveStructure validates wave structure safety for interface changes.
        // For each interface contract or file in m, it identifies exported symbols
        // whose signatures change relative to the current codebase. For each such
        // symbol it finds all callers in m.FileOwnership and checks:
        //   1. If callers are in an earlier wave than the definition: error.
        //   2. If callers are in the same wave as the definition but a different
        //      agent with no bridge pattern: warning.
        //   3. If callers are in a later wave but depends_on does not include the
        //      defining agent: error.
        // Returns Result[[]WaveStructureProblem].
        func SuggestWaveStructure(ctx context.Context, m *IMPLManifest, repoDir string) result.Result[[]WaveStructureProblem]
      location: pkg/protocol/suggest_wave_structure.go
waves:
    - number: 1
      agents:
        - id: A
          task: |
            ## Context
            You are implementing two new library functions in `pkg/protocol/` for the
            sawtools-scout-automation feature. These functions help Scout agents perform
            deterministic symbol lookup during IMPL planning. All code must use the
            `result.Result[T]` pattern (not `(T, error)`) and must be fast (<2s).

            ## Files to Create
            - `pkg/protocol/check_callers.go` — `CheckCallers` and `ListErrorRanges` functions
            - `pkg/protocol/check_callers_test.go` — tests for both functions

            ## Interface Contracts

            ### CallerSite
            ```go
            type CallerSite struct {
                File    string `json:"file"`    // repo-relative path
                Line    int    `json:"line"`    // 1-indexed line number
                Context string `json:"context"` // surrounding line content (trimmed)
            }
            ```

            ### CheckCallers
            ```go
            // CheckCallers scans repoDir for all call sites of symbolName.
            // symbolName may be a plain function name ("GetData") or a method call
            // expression ("cache.Get") — both styles are matched via regex grep.
            // Test files are included in the scan. Returns every (file, line, context)
            // tuple where symbolName appears as a call expression.
            func CheckCallers(ctx context.Context, repoDir, symbolName string) result.Result[[]CallerSite]
            ```

            Implementation notes:
            - Use `filepath.Walk` to scan all `.go` files under repoDir (do NOT skip _test.go)
            - Skip `vendor/` and `.git/` directories
            - For each file, read lines and scan for `symbolName` as a substring (simple string scan is sufficient)
            - The `Context` field should be the full trimmed line content where symbolName appears
            - On empty symbolName: return `result.NewFailure` with a `result.NewFatal("X001_INVALID_INPUT", "symbolName must not be empty")`
            - On repoDir unreadable: return `result.NewFailure` with `result.NewFatal("X001_INVALID_INPUT", ...)`
            - On success: return `result.NewSuccess(sites)` where sites is `[]CallerSite`
            - If no callers found, return `result.NewSuccess([]CallerSite{})` (empty, not nil)

            ### ErrorCodeRange
            ```go
            type ErrorCodeRange struct {
                Prefix      string `json:"prefix"`      // e.g. "V", "K", "C"
                Start       int    `json:"start"`       // first code number in range (1-indexed)
                End         int    `json:"end"`         // last code number in range (inclusive)
                Description string `json:"description"` // e.g. "Validation errors"
            }
            ```

            ### ListErrorRanges
            ```go
            // ListErrorRanges parses the package-doc comment block in pkg/result/codes.go
            // and returns all declared error code ranges.
            func ListErrorRanges(ctx context.Context, repoDir string) result.Result[[]ErrorCodeRange]
            ```

            Implementation notes:
            - Read the file at `filepath.Join(repoDir, "pkg/result/codes.go")`
            - Parse the package doc comment (the `//` lines before `package result`)
            - Each range line has the format: `\tPREFIX001-PREFIX099: Description`
            - Use a regex: `\t([A-Z]+)(\d+)-[A-Z]+(\d+):\s*(.+)`
            - Parse Prefix, Start, End, Description from each match
            - Return `result.NewSuccess(ranges)` on success
            - On file read error: return `result.NewFailure` with `result.NewFatal("X002_FILE_READ", ...)`

            ## Imports required
            ```go
            import (
                "bufio"
                "context"
                "os"
                "path/filepath"
                "regexp"
                "strconv"
                "strings"

                "github.com/blackwell-systems/scout-and-wave-go/pkg/result"
            )
            ```
            Package declaration: `package protocol`

            ## Tests
            In `pkg/protocol/check_callers_test.go`:
            - Test `CheckCallers` with a temp directory containing a simple Go file that calls a known function
            - Test that `CheckCallers` includes test files (create a `*_test.go` in temp dir)
            - Test that empty symbolName returns FATAL result
            - Test `ListErrorRanges` against the actual `pkg/result/codes.go` in the repo
              (use `../../../` relative path from test dir, or pass repoDir as the test repo root)
            - Verify at least the V, W, B, G, A, N, K, C code ranges are returned

            ## Verification Gate
            ```bash
            cd /Users/dayna.blackwell/workspace/code/scout-and-wave-go
            go build ./pkg/protocol/...
            go vet ./pkg/protocol/...
            go test ./pkg/protocol/... -run TestCheckCallers -run TestListErrorRanges -v
            ```
