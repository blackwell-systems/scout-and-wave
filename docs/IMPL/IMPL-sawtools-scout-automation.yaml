            - pkg/protocol/check_callers_test.go
        - id: B
          task: |
            ## Context
            You are implementing `SuggestWaveStructure` library function in `pkg/protocol/`
            for the sawtools-scout-automation feature. This function validates that callers
            of changed interface symbols are in the correct downstream waves. All code must
            use `result.Result[T]` (not `(T, error)`).

            ## Files to Create
            - `pkg/protocol/suggest_wave_structure.go`
            - `pkg/protocol/suggest_wave_structure_test.go`

            ### WaveStructureProblem
            ```go
            type WaveStructureProblem struct {
                Symbol        string   `json:"symbol"`
                ChangedInWave int      `json:"changed_in_wave"`
                CallerWave    int      `json:"caller_wave"`
                CallerFiles   []string `json:"caller_files"`
                Message       string   `json:"message"`
            }
            ```

            ### SuggestWaveStructure
            ```go
            func SuggestWaveStructure(ctx context.Context, m *IMPLManifest, repoDir string) result.Result[[]WaveStructureProblem]
            ```

            Implementation algorithm:
            1. Build a map: `symbolDefinedInWave map[string]int` and `symbolOwnerAgent map[string]string`
               - For each `FileOwnership` entry, if the agent's task (from the corresponding Wave.Agents entry)
                 contains keywords "migrate", "update signature", "change return type", "rename",
                 extract the symbol names from the task text using a heuristic: find backtick-quoted names like
                 `` `SymbolName` `` or function names in parentheses.
            2. For each `InterfaceContract`, the contract's `Location` is the defining file.
               Find the wave for that file from `FileOwnership`. Record `symbolDefinedInWave[contract.Name] = wave`.
            3. For each symbol in `symbolDefinedInWave`, grep for callers in other files in `m.FileOwnership`.
               For each caller file, look up its wave. Check:
               - `callerWave < definedInWave`: definite error (caller in earlier wave)
               - `callerWave == definedInWave`: check if the caller's agent lists the defining agent in `depends_on`; if not, warning
               - `callerWave > definedInWave`: verify the caller's wave agents have `depends_on` referencing the defining wave's agents; if not, error
            4. Return `result.NewSuccess(problems)` — empty slice means clean.

            ## Imports required
            ```go
            import (
                "bufio"
                "context"
                "os"
                "path/filepath"
                "regexp"
                "strings"

                "github.com/blackwell-systems/scout-and-wave-go/pkg/result"
            )
            ```
            Package declaration: `package protocol`

            ## Tests
            In `pkg/protocol/suggest_wave_structure_test.go`:
            - Test `SuggestWaveStructure` with a simple manifest where callers are in a downstream wave with correct depends_on — expect no problems
            - Test with callers in an earlier wave than the definition — expect at least one WaveStructureProblem
            - Test with nil manifest returns FATAL result

            ## Verification Gate
            ```bash
            cd /Users/dayna.blackwell/workspace/code/scout-and-wave-go
            go build ./pkg/protocol/...
            go vet ./pkg/protocol/...
            go test ./pkg/protocol/... -run TestSuggestWaveStructure -v
            ```
          files:
            - pkg/protocol/suggest_wave_structure.go
            - pkg/protocol/suggest_wave_structure_test.go
        - id: C
          task: |
            ## Context
            You are implementing `CheckTestCascade` in `pkg/protocol/` and adding new error
