title: sawtools Pre-Wave Scout Automation
feature_slug: sawtools-scout-automation
verdict: SUITABLE
suitability_assessment: |
    Four new sawtools commands decompose Scout judgment calls into deterministic
    static analysis. The work is cleanly parallelizable across two repos:
    Go library functions (pkg/protocol) and CLI command wires (cmd/sawtools) are
    independent, as are the documentation updates (scout-and-wave protocol repo).

    NOTE: A fifth command (validate-contracts) was originally in scope but conflicts
    with the existing IMPL-validate-briefs.yaml (SCOUT_PENDING). validate-briefs covers
    symbol lookup from brief text; validate-contracts is essentially the same capability
    scoped to interface_contracts. Resolution: execute validate-briefs first (extend it
    with result_code_semantics check type), then this IMPL provides the remaining four
    commands. validate-contracts functionality will land via validate-briefs.

    File decomposition: 2 library files (Wave 1), 4 CLI command files + 2 integration
    edits (Wave 2), 5 documentation files (Wave 3). Disjoint ownership is achievable
    with one exception resolved: main.go registers all new commands and is owned by
    one agent in Wave 2.

    No investigation-first items. No root cause analysis required — the feature
    requirements are fully specified.

    Interface discoverability: All cross-agent interfaces can be defined upfront. Wave
    1 library functions return Result[T] types that Wave 2 CLI commands call. Types
    are fully specifiable.

    Pre-implementation status: None of the five new commands exist. pkg/result/codes.go
    needs new error code ranges (X-series for contract validation). All doc files exist
    and need targeted additions.

    Parallelization value: HIGH. Go build/test cycle is >30s across the full suite. Wave
    1 has 3 independent agents; Wave 2 has 3 independent agents; Wave 3 has 3 independent
    documentation agents. Maximum parallelism at each wave.

    Estimated times:
    - Scout phase: ~15 min (cross-repo, 5 new commands with interface contracts)
    - Agent execution: ~10 min (3 waves x ~12 min avg, parallel within each wave)
    - Merge and verification: ~5 min
    Total SAW time: ~30 min
    Sequential baseline: ~9 agents x 15 min = ~135 min
    Time savings: ~105 min (78% faster)
    Recommendation: Clear speedup. Proceed.
