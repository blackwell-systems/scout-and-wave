            - `pkg/protocol/check_test_cascade.go` — new file
            - `pkg/protocol/check_test_cascade_test.go` — new file

            ## pkg/result/codes.go Changes

            The package doc comment at the top of codes.go lists allocated ranges. Add a new range
            for scout automation static analysis errors. The next available prefix after the existing
            ranges is "X" (X001-X099: Scout automation static analysis errors).

            1. Add to the package-doc comment block (the `//` lines before `package result`):
               ```
               //	X001-X099: Scout automation static analysis errors (check-callers, check-test-cascade, suggest-wave-structure)
               ```
            2. Add a new `const` block at the end of the file:
               ```go
               // Scout automation error codes (X001-X099)
               const (
                   // CodeCheckCallerInvalidInput is emitted when check-callers receives invalid input
                   CodeCheckCallerInvalidInput = "X001_INVALID_INPUT"
                   // CodeCheckCallerFileRead is emitted when a file cannot be read during caller scan
                   CodeCheckCallerFileRead = "X002_FILE_READ"
                   // CodeTestCascadeOrphan is emitted when a test file calls a changed symbol but is not assigned to any agent
                   CodeTestCascadeOrphan = "X003_TEST_CASCADE_ORPHAN"
                   // CodeWaveStructureCallerBefore is emitted when callers of a changed symbol are in an earlier wave
                   CodeWaveStructureCallerBefore = "X004_WAVE_STRUCTURE_CALLER_BEFORE"
                   // CodeWaveStructureMissingDep is emitted when callers in a later wave lack depends_on for the changing agent
                   CodeWaveStructureMissingDep = "X005_WAVE_STRUCTURE_MISSING_DEP"
               )
               ```

            ## pkg/protocol/check_test_cascade.go

            ### TestCascadeError
            ```go
            type TestCascadeError struct {
                Symbol   string   `json:"symbol"`    // function/method name that changed
                TestFile string   `json:"test_file"` // repo-relative path to *_test.go
                Line     int      `json:"line"`      // line in test file
                Context  string   `json:"context"`   // surrounding line content
                Agents   []string `json:"agents"`    // agents that own the symbol definition
            }
            ```

            ### CheckTestCascade
            ```go
            func CheckTestCascade(ctx context.Context, m *IMPLManifest, repoDir string) result.Result[[]TestCascadeError]
            ```

            Implementation algorithm:
            1. Build a set of owned test files: `ownedTestFiles map[string]bool` from `m.FileOwnership` where file ends in `_test.go`
            2. Build a map of `changedSymbols map[string][]string` (symbol -> owning agent IDs):
               - For each FileOwnership entry, find the corresponding agent task text in `m.Waves`
               - If the task text contains change keywords ("change signature", "migrate",
                 "update signature", "change return type", "rename", "changed signature"):
                 extract backtick-quoted names `` `Name` `` from the task
               - Map each extracted name to the owning agent
            3. Build an owned files set: `ownedFiles map[string]bool` from all `m.FileOwnership`
            4. For each `(symbol, agents)` in `changedSymbols`:
               - Walk `repoDir` looking for `*_test.go` files
               - For each test file, scan lines for the symbol name as a substring
               - If the test file path (repo-relative) is NOT in `ownedFiles`:
                 append a `TestCascadeError`
            5. Return `result.NewSuccess(errors)` — empty slice is the happy path
            6. Return `result.NewFailure` only for nil manifest or unreadable repoDir

