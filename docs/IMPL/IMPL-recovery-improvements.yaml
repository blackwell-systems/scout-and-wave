            ## Role
            Implement the sawtools reconcile-state command.

            ## What to implement

            ### File: cmd/sawtools/reconcile_state_cmd.go

            New cobra command with Use: "reconcile-state <manifest-path>" that:

            1. Loads the IMPL manifest from the given path using protocol.Load.
            2. Iterates over ALL waves and agents in the manifest.
            3. For each agent, checks git state in each repo. Use config.Load to
               resolve repo names from file_ownership.Repo to absolute paths, the same
               pattern as engine.ExtractReposFromManifest in pkg/engine/finalize.go.
               Check: does protocol.BranchName(slug, wave, agentID) exist via git.BranchExists?
               Check: is the branch merged into HEAD using git.IsAncestor with the SHA from
               the completion report?
               Check: does a completion report exist in manifest.CompletionReports[agentID]?
               Check: is the completion report's commit SHA reachable from HEAD?
               Also check legacy branch via protocol.LegacyBranchName(wave, agentID).
            4. Additional checks:
               - Is manifest.CriticReport non-nil and non-empty? If so, critic has run.
               - Is the current state already COMPLETE? If yes: no-op, print message, exit 0.
            5. Derive the correct ProtocolState from observations:
               - WAVE_VERIFIED: all agents in highest-numbered wave have reports AND all
                 completion report commits are reachable from HEAD.
               - WAVE_EXECUTING: any agent has a branch OR any agent has a completion
                 report (but not all do, or branches still exist).
               - REVIEWED: CriticReport is non-nil with non-empty Verdict AND current state
                 is SCOUT_PENDING or SCOUT_VALIDATING.
               - SCOUT_PENDING: no completion reports, no branches, no critic report.
               - Otherwise: keep current state (no change, emit warning).
            6. If derived state differs from current state:
               - Write it using protocol.SetImplState with Commit set to false.
               - Print to stderr: "reconcile-state: state changed: OLD -> NEW"
            7. Marshal ReconcileStateResult as JSON and print to stdout.
            8. Print a human-readable summary to stderr with per-agent status,
               what state was derived and why, and what action to take next.

            The command must be idempotent and safe to run at any time.

            For cross-repo IMPLs: use config.Load(filepath.Dir(manifestPath)) to resolve
            repo names to absolute paths. Check git state in all repos.

            ### File: cmd/sawtools/reconcile_state_cmd_test.go

            Tests in package main (same pattern as close_impl_cmd_test.go):

            TestReconcileState_AllComplete: IMPL with 2 agents both having completion reports,
            commits reachable from HEAD, branches deleted. Expected derived state: WAVE_VERIFIED.

            TestReconcileState_NoProgress: IMPL in SCOUT_PENDING, no branches, no reports.
            Expected: state unchanged (SCOUT_PENDING, state_changed: false).

            TestReconcileState_PartialProgress: IMPL with 2 agents, only 1 has a completion
            report. Expected derived state: WAVE_EXECUTING.

            TestReconcileState_CriticReportPresent: IMPL in SCOUT_PENDING with CriticReport
            set and a non-empty Verdict. Expected derived state: REVIEWED.

            TestReconcileState_AlreadyComplete: IMPL in COMPLETE state. Should return early
            with no state change, state_changed: false.

            Use git.Run to create real temp git repos with commits so git.IsAncestor works.
            Pattern: git -C dir init, git -C dir add, git -C dir commit in t.TempDir().

