    - name: ReconcileStateResult
      description: Output type for the reconcile-state command. Returned as JSON on stdout.
      definition: |
        type ReconcileStateResult struct {
            PreviousState     string             `json:"previous_state"`
            DerivedState      string             `json:"derived_state"`
            StateChanged      bool               `json:"state_changed"`
            Evidence          []string           `json:"evidence"`
            RecommendedAction string             `json:"recommended_action"`
            AgentSummary      []AgentObservation `json:"agent_summary"`
        }

        type AgentObservation struct {
            ID              string `json:"id"`
            Wave            int    `json:"wave"`
            BranchExists    bool   `json:"branch_exists"`
            BranchMerged    bool   `json:"branch_merged"`
            HasReport       bool   `json:"has_report"`
            CommitReachable bool   `json:"commit_reachable"`
        }
      location: cmd/sawtools/reconcile_state_cmd.go
    - name: AgentStatusRow
      description: One row in the agent-status table output. Combines IMPL doc data with git state.
      definition: |
        type AgentStatusRow struct {
            ID          string `json:"id"`
