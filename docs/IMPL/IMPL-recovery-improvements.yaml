            ## What to implement

            ### File: cmd/sawtools/agent_status_cmd.go

            New cobra command with Use: "agent-status <manifest-path>" that reads the
            IMPL doc and git state, then prints a table or JSON.

            Default table output format:
            ```
            IMPL: fix-inspector-findings  State: WAVE_EXECUTING

            Agent  Role    Branch                       Commits  Report  Status
            A      wave1   saw/slug/wave1-agent-A       1        yes     complete
            B      wave1   saw/slug/wave1-agent-B       0        no      in_progress
            critic critic  (main)                       1        yes     complete
            ```

            Table fields:
            - Agent: ID from manifest (e.g., "A", "B")
            - Role: "wave1", "wave2", etc. for wave agents; "critic" for the critic row
            - Branch: protocol.BranchName result, or "(main)" for critic row
            - Commits: count via git.CommitCount(repoPath, "HEAD", branch); 0 if branch absent
            - Report: "yes" if manifest.CompletionReports[agentID] exists, else "no"
            - Status: "complete" if HasReport AND commits > 0 AND branch merged or absent with
              reachable SHA; "in_progress" if branch exists AND commits > 0 AND no report;
              "blocked" if report status is "blocked" or "partial"; "not_started" otherwise

            Critic row: if manifest.CriticReport is non-nil and non-empty, add a row with:
            ID "critic", Role "critic", Branch "(main)". For Commits, use git.LogOneline to
            count commits matching [SAW:critic:<slug>] since the wave's base commit
