interface_contracts:
    - name: CodeSessionSaveFailed
      description: |
        New error code constant for all SaveAgentSession, LoadAgentSessions,
        and DetectWithConfig failure paths. Assigned N088 (N086 and N087 reserved
        by concurrent result-review-fixes IMPL).
      definition: |
        // CodeSessionSaveFailed is emitted for session persistence and load failures
        // in pkg/resume (SaveAgentSession, LoadAgentSessions, DetectWithConfig).
        CodeSessionSaveFailed = "N088_SESSION_SAVE_FAILED"
      location: pkg/result/codes.go
    - name: LoadAgentSessions
      description: |
        Changed from (map[string]AgentSession, error) to result.Result[map[string]AgentSession].
        Returns a successful Result with an empty map when the file does not exist.
        Returns a fatal Result with CodeSessionSaveFailed on I/O or JSON parse failure.
      definition: |
        func LoadAgentSessions(stateDir string, slug string) result.Result[map[string]AgentSession]
      location: pkg/resume/sessions.go
    - name: ClassifyWorktrees
      description: |
        Removes the dead error return — every failure was already silently swallowed.
        New signature drops the ([]DirtyWorktree, error) in favour of []DirtyWorktree.
        The local variable named 'result' (lines 53, 94, 103) is renamed to 'classified'
        to avoid shadowing the result package identifier.
      definition: |
        func ClassifyWorktrees(worktreePaths []string, manifest *protocol.IMPLManifest, logger *slog.Logger) []DirtyWorktree
      location: pkg/resume/worktree_status.go
    - name: Detect
      description: |
        Changed from ([]SessionState, error) to result.Result[[]SessionState].
        Delegates to DetectWithConfig. Callers must unpack with .IsSuccess()/.GetData().
      definition: |
        func Detect(ctx context.Context, repoPath string) result.Result[[]SessionState]
      location: pkg/resume/detect.go
    - name: DetectWithConfig
      description: |
        Changed from ([]SessionState, error) to result.Result[[]SessionState].
        The inline fmt.Errorf at line 83 is replaced with
        result.NewFailure[[]SessionState]([]result.SAWError{
            result.NewFatal(result.CodeSessionSaveFailed, msg).WithContext("implDir", implDir).WithCause(err),
        }).
      definition: |
        func DetectWithConfig(ctx context.Context, repoPaths []string) result.Result[[]SessionState]
      location: pkg/resume/detect.go
waves:
    - number: 1
      agents:
        - id: A
          task: |
            ## Agent A — Add CodeSessionSaveFailed error code constant

            **Repo:** `scout-and-wave-go`
            **File to modify:** `pkg/result/codes.go`

            ### What to implement

            Add a single new error code constant for the resume domain to the
            Engine error codes (N001-N099) block in `pkg/result/codes.go`.

            The highest currently assigned N-code is N085 (`CodeConfigIOFailed`).
            N086 and N087 are reserved by a concurrent `result-review-fixes` IMPL.
            Assign the new resume constant to **N088**.

            Add this constant at the end of the `// Engine error codes (N001-N099)`
            const block, immediately after `CodeConfigIOFailed = "N085_CONFIG_IO_FAILED"`:

            ```go
            // N088: session save/load failed in pkg/resume (SaveAgentSession, LoadAgentSessions, DetectWithConfig)
            CodeSessionSaveFailed = "N088_SESSION_SAVE_FAILED"
            ```

            Do not add any new const blocks. Do not modify any existing constants.
            Do not change the package comment or the range documentation at the top
            of the file.

            ### Interface contract

            ```go
            CodeSessionSaveFailed = "N088_SESSION_SAVE_FAILED"
            ```

            Location: `pkg/result/codes.go`, end of N001-N099 const block.

            ### Tests

            No test file exists for codes.go and none is required — constants are
            verified transitively by the consumer tests in pkg/resume.

            ### Verification gate

            ```
            go build ./pkg/result/...
            go vet ./pkg/result/...
            ```

            ### Constraints

            - Do NOT modify any existing constants.
            - Do NOT change N086 or N087 (reserved for concurrent IMPL).
            - Do NOT skip the comment line explaining what N088 covers.
          files:
            - pkg/result/codes.go
          context_source: prepared-brief
    - number: 2
      agents:
        - id: B
          task: |
            ## Agent B — Fix sessions.go: LoadAgentSessions return type + SaveAgentSession error construction

            **Repo:** `scout-and-wave-go`
            **Files to modify:** `pkg/resume/sessions.go`, `pkg/resume/sessions_test.go`

            ### Prerequisites

            Agent A has added `result.CodeSessionSaveFailed = "N088_SESSION_SAVE_FAILED"` to
            `pkg/result/codes.go`. Use this constant for all error codes in this file.

            ### What to implement

            #### 1. Change LoadAgentSessions return type (P0-3)

            Current signature (sessions.go:113):
            ```go
            func LoadAgentSessions(stateDir string, slug string) (map[string]AgentSession, error)
            ```

            New signature:
            ```go
            func LoadAgentSessions(stateDir string, slug string) result.Result[map[string]AgentSession]
            ```

            Replace the function body:
            - `os.IsNotExist(err)` path → `result.NewSuccess(map[string]AgentSession{})`
            - I/O error path → `result.NewFailure[map[string]AgentSession]([]result.SAWError{ result.NewFatal(result.CodeSessionSaveFailed, fmt.Sprintf("resume.LoadAgentSessions: reading %s: %v", path, err)).WithContext("slug", slug).WithCause(err) })`
            - JSON unmarshal error path → `result.NewFailure[map[string]AgentSession]([]result.SAWError{ result.NewFatal(result.CodeSessionSaveFailed, fmt.Sprintf("resume.LoadAgentSessions: parsing %s: %v", path, err)).WithContext("slug", slug).WithCause(err) })`
            - Success path (nil sessions guard + return) → `result.NewSuccess(sessions)` (keep the nil guard for sessions before wrapping)

            #### 2. Fix SaveAgentSession error construction (P1-1)

            Five error sites in SaveAgentSession (lines 33-41, 49-57, 65-73, 79-87, 93-101)
            all use inline `result.SAWError{Code: "SESSION_SAVE_FAILED", ...}` literals.
            Replace all five with the canonical builder pattern:

            ```go
            result.NewFatal(result.CodeSessionSaveFailed, "<existing message>").WithContext("slug", slug).WithCause(err)
            ```

            The error messages themselves stay unchanged. Only the construction pattern changes.

            The call to `LoadAgentSessions` inside `SaveAgentSession` at line 47 must be
            updated to unpack the new Result return:
            ```go
            loadRes := LoadAgentSessions(stateDir, slug)
            if !loadRes.IsSuccess() {
                return result.NewFailure[SaveSessionData](loadRes.Errors)
            }
            existing := loadRes.GetData()
            ```

            #### 3. Imports

            Remove `"fmt"` from imports if it is no longer used after the changes.
            Ensure `"github.com/blackwell-systems/scout-and-wave-go/pkg/result"` is imported.

            ### Tests — sessions_test.go

            Update the existing test `TestLoadAgentSessions_FileNotExist` (sessions_test.go:101):
            - Change `sessions, err := LoadAgentSessions(...)` to `res := LoadAgentSessions(...)`
            - Assert `res.IsSuccess()` instead of `err == nil`
            - Extract sessions via `sessions := res.GetData()`

            Update `TestSaveAndLoadAgentSession` and `TestSaveAgentSession_UpdateExisting`:
            - Same pattern: unpack LoadAgentSessions result with `.IsSuccess()` / `.GetData()`

            Update `TestSaveAgentSession_FailureReturnsFatal` (sessions_test.go:177):
            - The test already checks `sawErr.Code != "SESSION_SAVE_FAILED"` — update the
              expected code string to `result.CodeSessionSaveFailed` (import pkg/result)
              so the test is not a raw string literal check.

            Add one new test `TestLoadAgentSessions_CorruptedJSON`:
            ```go
            func TestLoadAgentSessions_CorruptedJSON(t *testing.T) {
                stateDir := t.TempDir()
                slug := "corrupt"
                // Write malformed JSON to the sessions file.
                sessionsDir := filepath.Join(stateDir, "sessions")
                if err := os.MkdirAll(sessionsDir, 0o755); err != nil {
                    t.Fatal(err)
                }
                bad := filepath.Join(sessionsDir, slug+".json")
                if err := os.WriteFile(bad, []byte("{not valid json"), 0o644); err != nil {
                    t.Fatal(err)
                }
                res := LoadAgentSessions(stateDir, slug)
                if res.IsSuccess() {
                    t.Fatal("expected failure for corrupted JSON, got success")
                }
                if len(res.Errors) == 0 {
                    t.Fatal("expected at least one error")
                }
                if res.Errors[0].Code != result.CodeSessionSaveFailed {
                    t.Errorf("code = %q, want %q", res.Errors[0].Code, result.CodeSessionSaveFailed)
                }
            }
            ```

            ### Verification gate

            ```
            go build ./pkg/resume/...
            go vet ./pkg/resume/...
            go test ./pkg/resume/... -run TestSave -v
            go test ./pkg/resume/... -run TestLoad -v
            ```

            ### Constraints

            - Keep ALL existing test assertions; only adapt the call sites that changed.
            - Do NOT change `SaveAgentSession`'s return type (already correct: `result.Result[SaveSessionData]`).
            - Do NOT touch detect.go or worktree_status.go — those are other agents' files.
            - The `sessions_test.go` tests call `LoadAgentSessions` directly and must compile.
          files:
            - pkg/resume/sessions.go
            - pkg/resume/sessions_test.go
        - id: C
          task: |
            ## Agent C — Fix worktree_status.go: remove dead error return, inline helpers, rename local var

            **Repo:** `scout-and-wave-go`
            **Files to modify:** `pkg/resume/worktree_status.go`, `pkg/resume/worktree_status_test.go`

            ### What to implement

            #### 1. Remove dead error return from ClassifyWorktrees (P1-2)

            Current signature (worktree_status.go:39):
            ```go
            func ClassifyWorktrees(worktreePaths []string, manifest *protocol.IMPLManifest, logger *slog.Logger) ([]DirtyWorktree, error)
            ```

            New signature:
            ```go
            func ClassifyWorktrees(worktreePaths []string, manifest *protocol.IMPLManifest, logger *slog.Logger) []DirtyWorktree
            ```

            All `return result, nil` statements become `return result`.
            The single `return []DirtyWorktree{}, nil` (if present) becomes `return []DirtyWorktree{}`.
            The nil-guard at the end (`if result == nil { result = []DirtyWorktree{} }`) stays.

            #### 2. Rename local variable 'result' to 'classified' (P1-3)

            The local variable named `result` at lines 53, 94, 103 shadows the `result`
            package name. Rename all occurrences within ClassifyWorktrees:
            - `var result []DirtyWorktree` → `var classified []DirtyWorktree`
            - `result = append(result, DirtyWorktree{...})` → `classified = append(classified, DirtyWorktree{...})`
            - `if result == nil { result = []DirtyWorktree{} }` → `if classified == nil { classified = []DirtyWorktree{} }`
            - `return result, nil` → `return classified`

            Note: the `result` package is NOT imported in worktree_status.go — but the rename
            is still important for clarity as the package is used in the same package (resume).

            #### 3. Inline loggerFrom helper (P2-1)

            The `loggerFrom` helper (worktree_status.go:16-21) is a 3-line private function
            called in exactly 2 places in this file:
            - line 40: `log := loggerFrom(logger)` in ClassifyWorktrees
            - line 113: `log := loggerFrom(logger)` in isWorktreeDirty

            Inline at both call sites. Replace each `log := loggerFrom(logger)` with:
            ```go
            log := logger
            if log == nil {
                log = slog.Default()
            }
            ```

            Then delete the `loggerFrom` function entirely.

            #### 4. Inline branchViaSymbolicRef wrapper (P2-2)

            The `branchViaSymbolicRef` wrapper (worktree_status.go:160-166) is a single-line
            wrapper around `git.SymbolicRef`. It is called in two places inside
            `resolveWorktreeBranch`:
            - line 139: `return branchViaSymbolicRef(path)` (no .git at all — fallback)
            - line 156: `return branchViaSymbolicRef(path)` (linked worktree)

            Replace each call site with the inlined body:
            ```go
            branch, err := git.SymbolicRef(path)
            if err != nil {
                return ""
            }
            return branch
            ```

            Then delete the `branchViaSymbolicRef` function entirely.

            Note: both call sites are `return branchViaSymbolicRef(path)` at the end of
            control flow branches, so inline correctly as full blocks, not single expressions.

            ### Tests — worktree_status_test.go

            Update all test calls to ClassifyWorktrees to drop the second return value.
            There are 5 call sites in the test file (TestClassifyWorktrees_DirtyWorktree,
            TestClassifyWorktrees_CleanWorktree, TestClassifyWorktrees_NonexistentPath,
            TestClassifyWorktrees_MixedDirtyClean, TestClassifyWorktrees_SlugFiltering).

            Change each from:
            ```go
            result, err := ClassifyWorktrees(...)
            if err != nil {
                t.Fatalf("unexpected error: %v", err)
            }
            ```
            to:
            ```go
            result := ClassifyWorktrees(...)
            ```

            Add one new test `TestClassifyWorktrees_LockedWorktree`:
            ```go
            // TestClassifyWorktrees_LockedWorktree verifies that a locked worktree is
            // conservatively treated as dirty (HasChanges=true) even with no uncommitted files.
            func TestClassifyWorktrees_LockedWorktree(t *testing.T) {
                repo := makeTestRepo(t)
                wtDir := t.TempDir()
                wtPath := filepath.Join(wtDir, "wt-locked")
                branch := "saw/my-slug/wave1-agent-A"
                addWorktree(t, repo, wtPath, branch)

                // Lock the worktree.
                lockCmd := exec.Command("git", "-C", repo, "worktree", "lock", wtPath)
                if out, err := lockCmd.CombinedOutput(); err != nil {
                    t.Skipf("git worktree lock not supported: %v\n%s", err, out)
                }
                t.Cleanup(func() {
                    exec.Command("git", "-C", repo, "worktree", "unlock", wtPath).Run()
                })

                manifest := makeManifest("my-slug")
                result := ClassifyWorktrees([]string{wtPath}, manifest, nil)

                if len(result) != 1 {
                    t.Fatalf("expected 1 result, got %d", len(result))
                }
                if !result[0].HasChanges {
                    t.Error("locked worktree should be treated as dirty (HasChanges=true)")
                }
            }
            ```
            Add `"os/exec"` to imports if not already present (it is present — makeTestRepo uses it).

            ### Verification gate

            ```
            go build ./pkg/resume/...
            go vet ./pkg/resume/...
            go test ./pkg/resume/... -run TestClassify -v
            ```

            ### Constraints

            - Do NOT change ClassifyWorktrees' exported behaviour — only remove the dead error return.
            - Do NOT touch detect.go, sessions.go, or their test files.
            - The detect.go call site at line 168 (`dirty, _ := ClassifyWorktrees(...)`) will be
              updated by Agent D — do not modify detect.go.
          files:
            - pkg/resume/worktree_status.go
            - pkg/resume/worktree_status_test.go
