            ## Agent D — Fix detect.go: signature changes for Detect/DetectWithConfig, unpack Results, remove dead guard, pass pre-computed failed slice

            **Repo:** `scout-and-wave-go`
            **Files to modify:** `pkg/resume/detect.go`, `pkg/resume/detect_test.go`

            ### Prerequisites

            - Agent B has changed `LoadAgentSessions` to return `result.Result[map[string]AgentSession]`.
            - Agent C has changed `ClassifyWorktrees` to return `[]DirtyWorktree` (no error).

            ### What to implement

            #### 1. Change Detect return type (P0-1)

            Current (detect.go:59):
            ```go
            func Detect(ctx context.Context, repoPath string) ([]SessionState, error) {
                return DetectWithConfig(ctx, []string{repoPath})
            }
            ```

            New:
            ```go
            func Detect(ctx context.Context, repoPath string) result.Result[[]SessionState] {
                return DetectWithConfig(ctx, []string{repoPath})
            }
            ```

            #### 2. Change DetectWithConfig return type (P0-2)

            Current (detect.go:68):
            ```go
            func DetectWithConfig(ctx context.Context, repoPaths []string) ([]SessionState, error)
            ```

            New:
            ```go
            func DetectWithConfig(ctx context.Context, repoPaths []string) result.Result[[]SessionState]
            ```

            Update the function body:
            - Early return at line 70 (`return []SessionState{}, nil`) →
              `return result.NewSuccess([]SessionState{})`
            - Error return at line 83 (inline `fmt.Errorf`) →
              ```go
              return result.NewFailure[[]SessionState]([]result.SAWError{
                  result.NewFatal(result.CodeSessionSaveFailed,
                      fmt.Sprintf("resume.DetectWithConfig: reading %s: %v", implDir, err)).
                      WithContext("implDir", implDir).WithCause(err),
              })
              ```
            - Final return at line 130 (`return sessions, nil`) →
              `return result.NewSuccess(sessions)`

            #### 3. Unpack LoadAgentSessions result in buildSessionState (P0-3 caller)

            In `buildSessionState` at lines 185-189:

            Current:
            ```go
            if len(repoPaths) > 0 {
                stateDir := protocol.SAWStateDir(repoPaths[0])
                if loaded, err := LoadAgentSessions(stateDir, manifest.FeatureSlug); err == nil {
                    agentSessions = loaded
                }
            }
            ```

            New (the `if len(repoPaths) > 0` guard stays — this is in buildSessionState,
            not the dead guard in detectOrphanedWorktrees):
            ```go
            if len(repoPaths) > 0 {
                stateDir := protocol.SAWStateDir(repoPaths[0])
                if loadRes := LoadAgentSessions(stateDir, manifest.FeatureSlug); loadRes.IsSuccess() {
                    agentSessions = loadRes.GetData()
                }
            }
            ```

            #### 4. Update ClassifyWorktrees call site (P1-2 caller)

            In `buildSessionState` at line 168:

            Current:
            ```go
            dirty, _ := ClassifyWorktrees(orphaned, manifest, nil)
            ```

            New:
            ```go
            dirty := ClassifyWorktrees(orphaned, manifest, nil)
            ```

            #### 5. Remove dead guard in detectOrphanedWorktrees (P2-4)

            In `detectOrphanedWorktrees`, the guard at line 185:
            ```go
            if len(repoPaths) > 0 {
            ```
            is unreachable — the caller (`buildSessionState`) checks `len(repoPaths) > 0`
            before calling `detectOrphanedWorktrees` (via the `orphaned, _ := detectOrphanedWorktrees(repoPaths, manifest)` call at line 161). However, looking at the actual code, `detectOrphanedWorktrees` itself iterates over `repoPaths` with `for _, repoPath := range repoPaths` and the `if len(repoPaths) > 0` guard at line 185 is inside `buildSessionState` for the LoadAgentSessions call — NOT inside detectOrphanedWorktrees.

            Re-check: P2-4 says the dead guard is `if len(repoPaths) > 0` at detect.go:185
            which is inside `buildSessionState`. The reviewer says the caller already guards
            this (referring to the outer function `buildSessionState` receiving repoPaths
            that was already checked). Actually, looking at the code: `buildSessionState`
            receives repoPaths parameter and uses it directly. The guard at line 185 is in
            `buildSessionState` around the LoadAgentSessions call. This IS necessary because
            buildSessionState could be called with an empty repoPaths slice.

            RESOLUTION: Read detect.go carefully. If the guard at the stated line is truly
            unreachable (e.g., the function already returned early if repoPaths is empty),
            remove it. If it is reachable and meaningful, leave it and document why the
            finding was incorrect. Do NOT blindly remove a guard that is actually needed.

            #### 6. Pass pre-computed failed slice to buildActionAndCommandInternal (P2-3)

            `buildActionAndCommandInternal` at detect.go:285-297 re-walks `manifest.Waves`
            to recompute the `failed []string` slice that was already computed in
            `buildSessionState` at detect.go:140-158.

            Change `buildActionAndCommandInternal` signature to accept the pre-computed
            failed slice:

            Current:
            ```go
            func buildActionAndCommandInternal(
                implPath string,
                manifest *protocol.IMPLManifest,
                orphaned []string,
                dirtyWorktrees []DirtyWorktree,
                completed []string,
                currentWave int,
            ) (string, string)
            ```

            New:
            ```go
            func buildActionAndCommandInternal(
                implPath string,
                manifest *protocol.IMPLManifest,
                orphaned []string,
                dirtyWorktrees []DirtyWorktree,
                completed []string,
                failed []string,
                currentWave int,
            ) (string, string)
            ```

            Delete the re-walk block inside buildActionAndCommandInternal (lines 285-297):
            ```go
            // Delete this block:
            var failed []string
            for _, wave := range manifest.Waves {
                for _, agent := range wave.Agents {
                    report, exists := manifest.CompletionReports[agent.ID]
                    if !exists {
                        continue
                    }
                    if report.Status == protocol.StatusPartial || report.Status == protocol.StatusBlocked {
                        failed = append(failed, agent.ID)
                    }
                }
            }
            ```

            The `failed` variable in the function body now refers to the parameter.

            Update the call site in `buildSessionState` at line 171:

            Current:
            ```go
            suggestedAction, resumeCommand := buildActionAndCommandInternal(implPath, manifest, orphaned, dirty, completed, currentWave)
            ```

            New:
            ```go
            suggestedAction, resumeCommand := buildActionAndCommandInternal(implPath, manifest, orphaned, dirty, completed, failed, currentWave)
            ```

            #### 7. Add result package import

            Add `"github.com/blackwell-systems/scout-and-wave-go/pkg/result"` to the import
            block in detect.go.

            ### Tests — detect_test.go

            Update all test calls to `Detect` and `DetectWithConfig` that use `sessions, err := ...`:

            Change pattern:
            ```go
