title: Canonicalize pkg/resume based on deep review findings
feature_slug: resume-review-fixes
verdict: SUITABLE
suitability_assessment: |
    All five suitability questions resolve cleanly.

    File decomposition: 9 files change across 4 independent concerns — error
    code constants, sessions.go, worktree_status.go, and detect.go. Ownership
    is disjoint in every wave. Two caller files (resume_detect_cmd.go,
    prepare.go) update independently in a final wave.

    No investigation-first items: findings are pre-digested with grep evidence.
    All root causes confirmed.

    Interface discoverability: all cross-agent interfaces can be defined before
    implementation starts. LoadAgentSessions changes from (T,error) to Result[T];
    ClassifyWorktrees drops its dead error return; Detect/DetectWithConfig change
    from (T,error) to Result[T]. These are the only cross-boundary surfaces.

    Pre-implementation status: reviewer agent confirmed all findings are TODO.
    No findings are already fixed.

    Parallelization value: Wave 2 runs B and C concurrently (independent
    packages). Wave 4 runs E and F concurrently. Build/test cycle ~10-20s.
    Moderate parallel value.

    Wave structure:
      Wave 1: [A] — add CodeSessionSaveFailed to codes.go (prerequisite constant)
      Wave 2: [B] [C] — sessions.go + worktree_status.go fixes (independent, use new constant)
      Wave 3: [D] — detect.go fixes (consumes B's LoadAgentSessions Result + C's ClassifyWorktrees)
      Wave 4: [E] [F] — caller updates (unpack Detect Result return)

    Estimated times:
    - Scout phase: ~15 min (reading 9 files, digesting review findings, writing manifest)
    - Agent execution: ~35 min (6 agents × ~6 min avg, accounting for wave sequencing)
    - Merge & verification: ~5 min
    Total SAW time: ~55 min

    Sequential baseline: ~60 min (6 × ~10 min sequential)
    Time savings: moderate; primary value is coordination clarity and audit trail.

    Recommendation: Proceed. Parallel waves B+C and E+F provide clear speedup;
    the multi-wave DAG enforces correct ordering of signature dependencies.

    Note on N-code reservation: N086 and N087 are reserved by the concurrent
    result-review-fixes IMPL. Resume error codes start at N088.
