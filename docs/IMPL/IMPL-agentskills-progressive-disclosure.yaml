interface_contracts:
  - name: PatternDetector::extract_subcommands
    description: Extract subcommand names from argument-hint field
    definition: |
      pub fn extract_subcommands(content: &str) -> Result<Vec<String>, Error>

      Parses YAML frontmatter, extracts `argument-hint:` field, and returns list of
      subcommands (e.g., ["scout", "wave", "status", "bootstrap", "interview"] from
      "/saw [scout|wave|status] ...").

      Returns Vec<String> of normalized subcommand names (lowercase, no delimiters).
    location: src/upgrade/pattern_detector.rs

  - name: PatternDetector::extract_agent_types
    description: Extract agent types from allowed-tools Agent() calls
    definition: |
      pub fn extract_agent_types(content: &str) -> Result<Vec<String>, Error>

      Parses `allowed-tools:` field and extracts `subagent_type` values from
      `Agent(subagent_type=X)` patterns. Returns Vec<String> of agent type names
      (e.g., ["scout", "wave-agent", "integration-agent"]).
    location: src/upgrade/pattern_detector.rs

  - name: SemanticAnalyzer::analyze_section
    description: Use Claude API to determine section routing intent
    definition: |
      pub struct SectionIntent {
          pub is_command_specific: bool,
          pub command: Option<String>,
          pub is_agent_specific: bool,
          pub agent_type: Option<String>,
          pub is_conditional: bool,
          pub condition_pattern: Option<String>,
          pub reasoning: String,
      }

      pub async fn analyze_section(
          &self,
          section_header: &str,
          section_content: &str
      ) -> Result<SectionIntent, Error>

      Sends section to Claude API with prompt: "This is a section from an Agent Skill.
      Determine if it is: (1) command-specific (used for one subcommand), (2) agent-specific
      (used by one agent type), (3) conditional (only loaded when prompt matches pattern),
      or (4) always-loaded. Respond with structured JSON."

      Returns SectionIntent with routing classification and reasoning.
    location: src/upgrade/semantic_analyzer.rs

  - name: RoutingGraph::build
    description: Build routing graph from patterns and semantic analysis
    definition: |
      pub struct RoutingNode {
          pub reference_file: String,
          pub trigger_patterns: Vec<String>,
          pub agent_types: Vec<String>,
          pub condition_pattern: Option<String>,
      }

      pub struct RoutingGraph {
          pub nodes: Vec<RoutingNode>,
      }

      pub fn build(
          subcommands: &[String],
          agent_types: &[String],
          sections: &[(String, String, SectionIntent)]
      ) -> RoutingGraph

      Builds routing graph from pattern detector output and semantic analysis results.
      Maps each reference file to:
      - Trigger patterns (from subcommands or section headers)
      - Agent types (from extract_agent_types or semantic analysis)
      - Conditional pattern (from semantic analysis)
    location: src/upgrade/routing_graph.rs

  - name: FrontmatterGen::generate_triggers
    description: Generate triggers YAML from routing graph
    definition: |
      pub fn generate_triggers(graph: &RoutingGraph) -> String

      Generates YAML for triggers: field from routing graph nodes.
      Each node with trigger_patterns becomes a trigger entry with optional inject: path.
      Returns YAML string with proper indentation.
    location: src/upgrade/frontmatter_gen.rs

  - name: FrontmatterGen::generate_agent_references
    description: Generate agent-references YAML from routing graph
    definition: |
      pub fn generate_agent_references(graph: &RoutingGraph) -> String

      Generates YAML for agent-references: field from routing graph nodes.
      Each node with agent_types becomes an agent-references entry with:
      - agent-type: <type>
        inject: references/<file>.md
        when: <pattern> (optional, from condition_pattern)

      Returns YAML string with proper indentation.
    location: src/upgrade/frontmatter_gen.rs

  - name: ScriptBundler::bundle_saw_script
    description: Copy SAW inject-agent-context script to target skill
    definition: |
      pub fn bundle_saw_script(target_scripts_dir: &Path) -> Result<(), Error>

      Copies /Users/dayna.blackwell/code/scout-and-wave/implementations/claude-code/prompts/scripts/inject-agent-context
      to target_scripts_dir/inject-agent-context. Preserves shebang and executable permissions.

      Returns Ok(()) on success, Error on IO failure.
    location: src/upgrade/generator.rs

