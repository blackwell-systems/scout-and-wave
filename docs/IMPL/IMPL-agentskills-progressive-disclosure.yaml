title: 'Enhance agentskills upgrade to SAW-quality progressive disclosure'
feature_slug: agentskills-progressive-disclosure
verdict: SUITABLE
suitability_assessment: |
  Five-question suitability gate:

  1. File decomposition: YES. Work decomposes into 8-10 files (4 new modules, 5 modified files)
     with disjoint ownership across 2 waves. New files: pattern_detector.rs, semantic_analyzer.rs,
     routing_graph.rs, frontmatter_gen.rs. Modified: analyzer.rs, splitter.rs, generator.rs,
     upgrade.rs, models.rs.

  2. Investigation: NO blockers. SAW reference implementation exists and is well-documented.
     Pattern extraction from YAML frontmatter is deterministic. Claude API integration
     is straightforward.

  3. Interface discoverability: YES. All cross-agent interfaces can be defined now:
     - PatternDetector::extract_subcommands/extract_agent_types
     - SemanticAnalyzer::analyze_section
     - RoutingGraph::build
     - FrontmatterGen::generate
     - ScriptBundler::bundle_saw_script

  4. Pre-implementation status: ~20% complete. Mechanical splitter exists but lacks
     SAW-level intelligence (pattern detection, semantic analysis, routing graph,
     conditional injection).

  5. Parallelization value: Moderate. Fast Rust compile (~1s) reduces speed benefit,
     but coordination value is high. IMPL doc prevents "forgot to wire X into Y"
     integration failures when adding 4 new modules to existing upgrade pipeline.

  Estimated times:
  - Scout phase: ~8 min (dependency mapping, interface contracts, IMPL doc)
  - Agent execution: ~15 min (6 agents × 2.5 min avg, 2 waves with parallelism)
  - Merge & verification: ~4 min
  Total SAW time: ~27 min

  Sequential baseline: ~35 min (6 agents × 6 min avg sequential time)
  Time savings: ~8 min (23% faster)

  Recommendation: Clear speedup + coordination benefit. The IMPL doc provides audit trail
  for integrating multiple new modules with existing upgrade pipeline.
