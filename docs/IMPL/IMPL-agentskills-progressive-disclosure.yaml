pre_mortem:
  overall_risk: medium
  rows:
    - scenario: Claude API rate limits block semantic analysis during upgrade
      likelihood: medium
      impact: medium
      mitigation: |
        Add retry logic with exponential backoff in SemanticAnalyzer::analyze_section.
        Fall back to mechanical splitter if API unavailable. Document API key requirement
        in README and --help text.

    - scenario: SAW script path hardcoded in generator breaks on user machines
      likelihood: high
      impact: low
      mitigation: |
        Acceptable for v1 — this tool is in same repo ecosystem. Future enhancement:
        add --saw-script-path flag to upgrade command or detect via CLAUDE_SKILL_DIR env var.

    - scenario: Semantic analysis misclassifies section intent
      likelihood: medium
      impact: medium
      mitigation: |
        Interactive mode (--interactive flag) shows reasoning and preview before applying.
        User can abort if classification looks wrong. Add --dry-run-with-reasoning flag
        to show semantic analysis without applying changes.

    - scenario: Frontmatter generation produces invalid YAML indentation
      likelihood: low
