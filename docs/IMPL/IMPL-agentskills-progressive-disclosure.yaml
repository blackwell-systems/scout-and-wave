             - Extract `argument-hint:` field value
             - Use regex to detect subcommand names in patterns like:
               - `[scout|wave|status]`
               - `(bootstrap <name> | scout <feature> | wave)`
             - Return Vec<String> of normalized names (lowercase, trimmed)

          2. `extract_agent_types(content: &str) -> Result<Vec<String>, Error>`
             - Parse YAML frontmatter using serde_yaml
             - Extract `allowed-tools:` field value (pipe-delimited string or array)
             - Use regex to extract `subagent_type=X` from `Agent(subagent_type=X)` patterns
             - Return Vec<String> of agent type names

