interface_contracts:
    - name: uriToFilePath
      description: |
        Convert a file:// URI to an absolute filesystem path using URL parsing.
        Replaces 7 ad-hoc URI stripping patterns (uri.replace(/^file:\/\//, ""),
        uri.slice(7), etc.) with a single canonical implementation.
      definition: |
        export function uriToFilePath(uri: string): string {
          return new URL(uri).pathname;
        }
      location: src/shared/utils.ts
    - name: checkLspClientInitialized
      description: |
        Assert that an LSPClient reference is non-null. Throws if null.
        Moved from src/tools/index.ts to src/shared/utils.ts to eliminate
        the peer-layer violation where src/resources/index.ts imported from
        src/tools/index.ts.
      definition: |
        export const checkLspClientInitialized = (lspClient: LSPClient | null): void => {
          if (!lspClient) {
            throw new Error("LSP server not ready yet â€“ initialization is still in progress or failed.");
          }
        };
      location: src/shared/utils.ts
    - name: createFileUri
      description: |
        Create a file:// URI from a filesystem path. Moved from src/tools/index.ts
        to src/shared/utils.ts. Signature unchanged.
      definition: |
        export const createFileUri = (filePath: string): string => {
          return `file://${path.resolve(filePath)}`;
        };
      location: src/shared/utils.ts
    - name: withDocument
      description: |
        Execute an LSP operation that requires a document to be open.
        Encapsulates the 4-step pattern: checkLspClientInitialized -> readFile
        -> createFileUri -> openDocument -> callback. Used by 16 of 24 handlers.
      definition: |
        async function withDocument<T>(
          getLspClient: () => LSPClient | null,
          filePath: string,
          languageId: string,
          callback: (lspClient: LSPClient, fileUri: string) => Promise<T>,
        ): Promise<T> {
          const lspClient = getLspClient();
          checkLspClientInitialized(lspClient);
          const fileContent = await fs.readFile(filePath, "utf-8");
          const fileUri = createFileUri(filePath);
          await lspClient!.openDocument(fileUri, fileContent, languageId);
          return callback(lspClient!, fileUri);
        }
      location: src/tools/index.ts
