            ## What to implement

            Apply three bug fixes to src/lspClient.ts:

            ### Fix 1: Remove JSON brace-trimming heuristic (Bug 1, lines 149-170)

            The current code checks whether the content ends with "}" and if not,
            searches for the last "}" to truncate to. This corrupts array-valued LSP
            responses (Location[] from references/implementations ends with "]" not "}").
            Content-Length is authoritative â€” trust it.

            Find and remove this entire block. Replace it with a single unconditional
            buffer advance. The exact text to locate and remove:

            ```typescript
            // Make the parsing more robust by ensuring content ends with a closing brace
            if (content[content.length - 1] !== "}") {
              debug("Content doesn't end with '}', adjusting...");
              const lastBraceIndex = content.lastIndexOf("}");
              if (lastBraceIndex !== -1) {
                const actualContentLength = lastBraceIndex + 1;
                debug(
                  `Adjusted content length from ${contentLength} to ${actualContentLength}`,
                );
                content = content.substring(0, actualContentLength);
                // Update buffer position based on actual content length
                this.buffer = this.buffer.substring(headerEnd + actualContentLength);
              } else {
                debug("No closing brace found, using original content length");
                // No closing brace found, use original approach
                this.buffer = this.buffer.substring(headerEnd + contentLength);
              }
            } else {
              debug("Content ends with '}', no adjustment needed");
              // Content looks good, remove precisely this processed message from buffer
              this.buffer = this.buffer.substring(headerEnd + contentLength);
            }
            ```

            Replace the entire if/else block above with:
            ```typescript
            this.buffer = this.buffer.substring(headerEnd + contentLength);
            ```

            The variable `content` is already assigned on the line above the removed block:
            `let content = this.buffer.substring(headerEnd, headerEnd + contentLength);`
            Change `let` to `const` since content is no longer reassigned.

            ### Fix 2: initialized race (Bug 2, line 578-579)

            The current code:
            ```typescript
            this.sendNotification("initialized", {});
            this.initialized = true;
            ```

            Swap the order so the flag is set before the notification is sent:
            ```typescript
            this.initialized = true;
            this.sendNotification("initialized", {});
            ```

            ### Fix 3: sendNotification silent failure (Bug 4, lines 457-461)

            The current code returns silently when `this.process` is null:
            ```typescript
            if (!this.process) {
              console.error("LSP server not initialized yet");
              return;
            }
            ```

            Replace with a thrown error to match all other `if (!this.process)` guards:
            ```typescript
            if (!this.process) {
              throw new Error("LSP server not initialized yet");
            }
            ```

