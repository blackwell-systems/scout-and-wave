title: 'Friction Fixes Phase 2: prepare-wave commit-state default + run-critic agent-tool backend'
feature_slug: friction-fixes-phase2
verdict: SUITABLE
suitability_assessment: |
    Two independent dogfooding friction points with disjoint file ownership:

    Fix 1 (prepare-wave --commit-state default): Changes default value of one flag in
    cmd/sawtools/prepare_wave.go plus docstring update in pkg/engine/step_types.go plus
    test addition. File set is fully independent from Fix 2.

    Fix 2 (run-critic --backend agent-tool): Updates saw-skill.md (protocol repo) and
    run_critic_cmd_test.go (Go engine repo). The engine-side BuildCriticPrompt function
    is already implemented and working. The gap is missing test coverage and the
    Orchestrator skill still uses the subprocess pattern that fails in Claude Code.

    Parallelization value: SUITABLE. Two agents with disjoint file sets. Build cycle
    for Go is ~30s+. Protocol docs changes are markdown-only and fast.

    Estimated times:
    - Scout phase: ~10 min
    - Agent execution: ~2 agents x ~10 min avg, parallel = ~10 min
    - Merge & verification: ~3 min
    Total SAW time: ~23 min

    Sequential baseline: ~2 x 10 min = ~20 min
    Recommendation: Marginal parallel gain; clean coordination artifact justifies SAW.
