title: Centralize IMPL Doc Validation Logic
feature_slug: centralize-validation
verdict: NOT_SUITABLE
state: NOT_SUITABLE

suitability_assessment: |
  ASSESSMENT: The centralized validation function already exists.

  protocol.FullValidate() in pkg/protocol/full_validate.go (scout-and-wave-go)
  is the single entry point for IMPL doc validation. It runs all checks:
  Load, auto-fix, duplicate key detection, unknown key detection, struct-level
  invariant checks (with solver option), and E16 typed-block validation.

  The web API already uses it correctly:
  - scout-and-wave-web/pkg/api/impl_handlers.go defines ValidateManifest()
    which wraps protocol.FullValidate() and returns structured results.

  Remaining duplication is limited to 2 CLI validate commands:

  1. sawtools validate (cmd/sawtools/validate_cmd.go) — duplicates the entire
     FullValidate logic inline (~100 lines). Should call protocol.FullValidate()
     and format the result as JSON. This is a single-file change.

  2. saw validate (scout-and-wave-web/cmd/saw/validate.go) — only calls
     Load() + Validate(), missing duplicate key check, unknown key check,
     and typed-block validation. Should call protocol.FullValidate() and
     format the result for terminal output. This is a single-file change.

  Other call sites that use protocol.Validate() directly (engine/prepare.go,
  hooks/prelaunch_gate.go, engine/scout_correction_loop.go) are NOT duplication.
  They intentionally call the lower-level Validate() to filter for specific
  error codes (e.g., I1 violations only) as part of targeted pre-flight checks.
  These should continue using the granular API.

  WHY NOT SUITABLE FOR SAW:

  1. File decomposition: Only 2 files need changes, and they are in different
     repositories. Each is a ~20-line change (replace inline logic with a
     FullValidate call + format output). This is 10-15 minutes of sequential
     work.

  2. Parallelization value: Zero. Two trivial changes in different repos
     cannot meaningfully benefit from parallel execution. SAW overhead
     (Scout analysis, worktree creation, merge verification) would exceed
     the implementation time by 5-10x.

  3. No interface contracts needed: The interface already exists
     (protocol.FullValidate). The work is purely "call the existing function
     instead of reimplementing it."

  RECOMMENDATION: Implement sequentially.

  Step 1: In scout-and-wave-go, update cmd/sawtools/validate_cmd.go to call
  protocol.FullValidate() and map the result to the existing validateFixOutput
  JSON structure. Run go test ./cmd/sawtools/ -run TestValidate.

  Step 2: In scout-and-wave-web, update cmd/saw/validate.go to call
  protocol.FullValidate() and format errors for terminal output.
  Run go test ./cmd/saw/ -run TestValidate.

  Estimated sequential time: ~15 minutes total.
  Estimated SAW time: ~25 minutes (Scout + 1 agent per repo + merge).
  SAW overhead dominates — no parallelization benefit.

