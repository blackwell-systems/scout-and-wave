pre_mortem:
    overall_risk: low
    rows:
        - scenario: |-
            Filter C (deletion-context) splits on ". " and misses sentences ending with
            punctuation other than period (e.g., "!" or "?"), leaving some deletion symbols
            unflagged.
          likelihood: low
          impact: low
          mitigation: |-
            The common case is period or newline delimiters in brief text. The fix covers
            the overwhelming majority. Edge cases can be addressed in a follow-up.
        - scenario: |-
            `goKeywordsAndBuiltins` contains "delete" â€” `delete` is a Go builtin but is
            also a deletion verb used in Filter C logic. If an agent brief says
            `delete(myMap, key)`, the symbol "delete" would be filtered by Filter B
            before Filter C runs, but Filter C wouldn't see it either. No false positive;
            no regression.
          likelihood: low
          impact: low
          mitigation: |-
            Filter order (C before B) means deletion-context detection runs on the raw
            collected symbols before keyword filter. "delete" as a keyword is in Filter B,
            which runs after C. The interaction is benign.
        - scenario: |-
            Mixed agent (some action:new, some action:modify) with symbols only in the
            modify file. The allNew guard doesn't fire; per-file short-circuit correctly
            skips new files. Existing symbols in modify files are still checked.
          likelihood: medium
          impact: low
          mitigation: |-
            The allNew guard is additive. The existing per-file short-circuit handles
            mixed agents correctly. No regression expected; covered by existing
            TestValidateBriefs_NewFileSkipped test.
        - scenario: |-
            A legitimate missing symbol coincidentally appears in a deletion sentence
            (e.g., "Delete the old usage and add `MyNewSymbol`"). Filter C incorrectly
            exempts MyNewSymbol.
          likelihood: low
          impact: medium
          mitigation: |-
            Filter C is conservative: deletion sentences are identified by verb presence.
            Complex sentences mixing deletion and addition are uncommon in practice.
            If needed, a follow-up can refine sentence segmentation to noun-phrase scope.
state: "REVIEWED"
injection_method: hook
