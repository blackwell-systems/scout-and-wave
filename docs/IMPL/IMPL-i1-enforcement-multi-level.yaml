title: Multi-Level I1 (Disjoint File Ownership) Enforcement
feature_slug: i1-enforcement-multi-level
verdict: SUITABLE
suitability_assessment: |
    **Problem:** Critic gate passed with 3 agents owning the same file (checker_test.go owned by agents A, G, H), violating I1 but not caught.

    **Suitability assessment:**

    1. **File decomposition:** 5 distinct files across 3 repos will be modified. Each enforcement layer touches different files:
       - E16 validation: pkg/protocol/validation.go (Go SDK)
       - Runtime enforcement: pkg/engine/prepare.go (Go SDK)
       - Critic agent: implementations/claude-code/prompts/agents/critic-agent.md (protocol)
       - Scout agent: implementations/claude-code/prompts/agents/scout.md (protocol)
       - Invariants doc: protocol/invariants.md (protocol)
       All changes are independent and can be parallelized.

    2. **Investigation-first items:** None. The I1 check already exists in validation.go (validateI1DisjointOwnership function). We're adding defensive checks in additional layers, not debugging a failure.

    3. **Interface discoverability:** No new cross-agent interfaces. Each agent adds a check to an existing pipeline stage.

    4. **Pre-implementation status check:** I1 validation already implemented in pkg/protocol/validation.go:78-111 (validateI1DisjointOwnership). Critic agent has 8 existing checks. Runtime enforcement in prepare.go has no I1 fast-fail check yet (gap).

    5. **Parallelization value check:**
       - Build/test cycle: 120s (go test ./...) — high parallelization benefit
       - Files per agent: 1-2 files per agent
       - Agent independence: Wave 1 fully parallel (2 agents), Wave 2 fully parallel (3 agents)
       - Task complexity: Adds validation logic to existing pipelines (non-trivial)

    **Estimated times:**
    - Scout phase: ~8 min (multi-repo analysis, cross-repo coordination)
    - Agent execution: ~12 min (5 agents × 3 min avg, 2 waves accounting for parallelism)
    - Merge & verification: ~4 min
    Total SAW time: ~24 min

    Sequential baseline: ~25 min (5 agents × 5 min avg sequential time)
    Time savings: ~1 min (4% faster)

    **Recommendation:** Marginal speed gains, but high coordination value. The IMPL doc serves as an audit trail of defense-in-depth enforcement layers and ensures all 5 layers are implemented consistently. Proceed.
