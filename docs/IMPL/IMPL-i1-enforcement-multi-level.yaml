pre_mortem:
    overall_risk: low
    rows:
        - scenario: E16 validation already catches I1 violations; new checks may be redundant
          likelihood: medium
          impact: low
          mitigation: Verified that validateI1DisjointOwnership exists in validation.go:78-111. New layers add defense-in-depth but don't duplicate logic. Each layer checks at a different lifecycle stage (planning, pre-wave, runtime, merge, post-completion).
        - scenario: Cross-repo file ownership complicates I1 validation (repo field may be missing)
          likelihood: low
          impact: medium
          mitigation: I1 check already handles cross-repo via file path comparison only. Repo field is metadata for UI display, not part of uniqueness check. validateI1DisjointOwnership uses (wave, file) as key, not (wave, repo, file).
        - scenario: Critic agent Check 9 duplicates E16 validation work
          likelihood: high
          impact: low
          mitigation: 'Acceptable duplication. Critic runs after Scout, before wave execution. E16 runs at prepare-wave time. Both are needed: critic catches planning errors at review time; E16 catches gaps that passed review.'
        - scenario: PrepareWave runtime check may slow down wave launches
          likelihood: low
          impact: low
          mitigation: I1 check is O(n) where n = number of file_ownership entries in wave. Typical wave has 10-30 entries. Check runs once at prepare-wave start, adds <1ms overhead.
