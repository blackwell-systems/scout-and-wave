waves:
    - number: 1
      agents:
        - id: A
          task: |
            **Role:** Add duplicate file ownership check to E16 validation (already exists; verify it's working correctly).

            **What to implement:**

            Read pkg/protocol/validation.go and verify that the existing validateI1DisjointOwnership function (lines 78-111) correctly detects duplicate file ownership within the same wave. The function already exists and works as follows:

            1. Builds a map of (wave, file) → agents
            2. Checks for multiple owners in same wave
            3. Returns CodeDisjointOwnership error if duplicates found

            Your task: Add a test case to pkg/protocol/validation_test.go (or full_validate_test.go if that's where I1 tests live) that verifies the I1 check catches duplicate ownership:

            ```go
            func TestValidateI1DisjointOwnership_CatchesDuplicates(t *testing.T) {
                m := &IMPLManifest{
                    FeatureSlug: "test-i1",
                    FileOwnership: []FileOwnershipEntry{
                        {File: "checker_test.go", Agent: "A", Wave: 1},
                        {File: "checker_test.go", Agent: "G", Wave: 1},
                        {File: "checker_test.go", Agent: "H", Wave: 1},
                    },
                    Waves: []Wave{
                        {Number: 1, Agents: []AgentSpec{
                            {ID: "A", Files: []string{"checker_test.go"}},
                            {ID: "G", Files: []string{"checker_test.go"}},
                            {ID: "H", Files: []string{"checker_test.go"}},
                        }},
                    },
                }
                errs := validateI1DisjointOwnership(m, "test-i1")
                if len(errs) == 0 {
                    t.Fatal("expected I1 violation error, got none")
                }
                foundDisjoint := false
                for _, e := range errs {
                    if e.Code == result.CodeDisjointOwnership {
                        foundDisjoint = true
                        break
                    }
                }
                if !foundDisjoint {
                    t.Errorf("expected CodeDisjointOwnership error, got: %v", errs)
                }
            }
            ```

            Run `go test ./pkg/protocol/... -run TestValidateI1` to verify the test passes.

            **Verification gate:**
            ```bash
            cd /Users/dayna.blackwell/code/scout-and-wave-go
            go build ./pkg/protocol/...
            go vet ./pkg/protocol/...
            go test ./pkg/protocol/... -run TestValidateI1 -timeout 30s
            ```

            **Constraints:**
            - The existing validateI1DisjointOwnership function is correct; do not modify it
            - Only add test coverage to verify it works
            - If validation_test.go doesn't exist, create it in pkg/protocol/
          files:
            - pkg/protocol/validation.go
        - id: B
          task: |
            **Role:** Add fast-fail I1 check early in PrepareWave runtime enforcement.

            **What to implement:**

            Read pkg/engine/prepare.go and note that there's already an I1 check at line 537 (labeled "I1 disjoint ownership verification (E3)"). That check runs late in the pipeline, after many steps have already completed. Your task is to add an EARLIER fast-fail check that runs immediately after the manifest is loaded (around line 184, after "load_manifest" step completes).

            **Part 1: Add public wrapper function to pkg/protocol/validation.go**

            The existing validateI1DisjointOwnership function (line 80) is private. Add a public wrapper after it:

            ```go
            // ValidateI1DisjointOwnership is a public wrapper around validateI1DisjointOwnership
            // for use by prepare-wave runtime enforcement. It validates I1 compliance for a
            // specific wave number by filtering the file_ownership table.
            func ValidateI1DisjointOwnership(m *IMPLManifest, waveNum int) []result.SAWError {
                // Build a filtered manifest with only this wave's ownership entries
                filtered := &IMPLManifest{
                    FeatureSlug: m.FeatureSlug,
                    FileOwnership: []FileOwnershipEntry{},
                }
                for _, fo := range m.FileOwnership {
                    if fo.Wave == waveNum {
                        filtered.FileOwnership = append(filtered.FileOwnership, fo)
                    }
                }
                return validateI1DisjointOwnership(filtered, m.FeatureSlug)
            }
            ```

            **Part 2: Add early I1 check to pkg/engine/prepare.go**

            Insert after line 184 (after "load_manifest" recordStep call), before the wave_sequencing check:

            ```go
            // Step: I1 fast-fail check (early detection)
            // This runs before wave_sequencing and other expensive operations to catch
            // Scout planning errors immediately. The existing I1 check at line 537 remains
            // as defense-in-depth but runs later in the pipeline.
            i1Errs := protocol.ValidateI1DisjointOwnership(doc, opts.WaveNum)
            if len(i1Errs) > 0 {
                var errMsgs []string
                for _, e := range i1Errs {
                    errMsgs = append(errMsgs, e.Message)
                }
                detail := fmt.Sprintf("I1 violation detected: %s", strings.Join(errMsgs, "; "))
                recordStep(res, opts.OnEvent, "i1_fast_fail", "failed", detail)
                return res, fmt.Errorf("I1 violation: %s", detail)
            }
            recordStep(res, opts.OnEvent, "i1_fast_fail", "success", "No duplicate file ownership (early check)")
            ```

            **Verification gate:**
            ```bash
            cd /Users/dayna.blackwell/code/scout-and-wave-go
            go build ./pkg/protocol/...
            go build ./pkg/engine/...
            go vet ./pkg/protocol/...
            go vet ./pkg/engine/...
            go test ./pkg/engine/... -run TestPrepareWave -timeout 30s
            ```

            **Constraints:**
            - Add the public wrapper function ValidateI1DisjointOwnership to pkg/protocol/validation.go
            - Insert the early I1 check after line 184 (after load_manifest completes)
            - Use recordStep with step name "i1_fast_fail" to distinguish from existing I1 check at line 537
            - Do NOT remove the existing I1 check at line 537 (both checks provide defense-in-depth)
          files:
            - pkg/engine/prepare.go
