# IMPL: resumable-wave-sessions
title: "Resumable Wave Sessions"
feature_slug: "resumable-wave-sessions"
verdict: "SUITABLE"
test_command: "go test ./..."
lint_command: "go vet ./..."
state: "SCOUT_PENDING"

# Suitability Assessment
# ----------------------
# Verdict: SUITABLE
#
# 1. File decomposition: YES — Work decomposes into 5 distinct areas across 2 repos:
#    (a) cross-repo worktree detection in pkg/resume/detect.go + new config loader,
#    (b) dirty worktree classification in new pkg/resume/worktree_status.go,
#    (c) agent session ID persistence in new pkg/resume/sessions.go,
#    (d) web API resume endpoint in pkg/api/resume_handler.go + new resume_action.go,
#    (e) frontend ResumeBanner upgrade + new ResumeButton in web/src/components/.
#    All agents have disjoint file ownership.
#
# 2. Investigation-first: NO — All five issues are well-characterized with clear
#    code paths identified. No unknown root causes.
#
# 3. Interface discoverability: YES — The SessionState struct is the shared contract.
#    New fields (DirtyWorktrees, AgentSessionIDs, WorktreeAgentMap) extend it with
#    backward-compatible additions. Cross-agent interfaces are fully specifiable.
#
# 4. Pre-implementation status check:
#    Total items: 5 (one per known issue in the feature description)
#    Already implemented (DONE): 0
#    Partially implemented (PARTIAL): 1 (wave inference from worktrees — runWaveLoop
#      already has waveAgentsHaveCommitsWithManifest but resume.Detect does not use it)
#    Not implemented (TO-DO): 4
#
# 5. Parallelization value: HIGH — Two repos with independent build/test cycles
#    (go test takes >30s in each). 5 agents across 2 waves with 3 agents in Wave 1
#    running fully in parallel. Each agent touches 2-3 files.
#
# Estimated times:
# - Scout phase: ~8 min (cross-repo dependency mapping, interface contracts)
# - Agent execution: ~15 min (3 Wave 1 agents parallel ~8 min + 2 Wave 2 agents parallel ~7 min)
# - Merge & verification: ~5 min (2 waves x 2.5 min)
# Total SAW time: ~28 min
#
# Sequential baseline: ~50 min (5 agents x 10 min avg)
# Time savings: ~22 min (~44% faster)
# Recommendation: Clear speedup. Proceed.

suitability_assessment: |
  SUITABLE. Five well-characterized issues decompose cleanly into 5 agents with
  disjoint file ownership across 2 repos. Cross-repo build/test cycles amplify
  parallelization benefit. Wave 1 handles all backend detection logic (3 agents
  in parallel), Wave 2 handles web API and frontend (2 agents, depends on new
  SessionState fields from Wave 1).

