# No scaffolds needed — all shared types are extensions to the existing
# SessionState struct in pkg/resume/detect.go, owned by Agent A.

interface_contracts:
  - name: "SessionState (extended)"
    description: |
      The existing SessionState struct gains new fields for dirty worktree
      classification, agent session IDs, and per-worktree agent mapping.
      All new fields are omitempty for backward compatibility.
    definition: |
      // Added to existing SessionState in pkg/resume/detect.go:
      type SessionState struct {
          // ... existing fields unchanged ...
          DirtyWorktrees  []DirtyWorktree         `json:"dirty_worktrees,omitempty"`
          AgentSessions   map[string]AgentSession  `json:"agent_sessions,omitempty"`
      }

      type DirtyWorktree struct {
          Path       string `json:"path"`
          Branch     string `json:"branch"`
          AgentID    string `json:"agent_id"`
          WaveNum    int    `json:"wave_num"`
          HasChanges bool   `json:"has_changes"`  // uncommitted modifications
      }

      type AgentSession struct {
          AgentID       string `json:"agent_id"`
          SessionID     string `json:"session_id"`      // Claude Code session ID
          WaveNum       int    `json:"wave_num"`
          WorktreePath  string `json:"worktree_path"`
          LastActive    string `json:"last_active"`      // RFC3339 timestamp
      }
    location: "pkg/resume/detect.go"

  - name: "DetectWithConfig"
    description: |
      New function that accepts a list of repo paths (from saw.config.json)
      and scans worktrees across all repos for the given IMPL manifest.
      Called by the web app's resume handler instead of per-repo Detect().
    definition: |
      func DetectWithConfig(repoPaths []string) ([]SessionState, error)
    location: "pkg/resume/detect.go"

  - name: "ClassifyWorktrees"
    description: |
      Inspects each worktree path to determine if it has uncommitted changes
      (dirty) or is clean. Uses git status --porcelain on the worktree path.
    definition: |
      func ClassifyWorktrees(worktreePaths []string, manifest *protocol.IMPLManifest) ([]DirtyWorktree, error)
    location: "pkg/resume/worktree_status.go"

  - name: "SaveAgentSession / LoadAgentSessions"
    description: |
      Persists and loads agent session IDs to/from .saw-state/sessions/{slug}.json.
      SaveAgentSession is called by the engine when launching an agent.
      LoadAgentSessions is called by Detect to populate SessionState.AgentSessions.
    definition: |
      func SaveAgentSession(stateDir string, slug string, session AgentSession) error
      func LoadAgentSessions(stateDir string, slug string) (map[string]AgentSession, error)
    location: "pkg/resume/sessions.go"

  - name: "handleResumeExecution"
    description: |
      New POST /api/wave/{slug}/resume endpoint. Loads SessionState, determines
      which agents need re-launch (dirty worktrees = resume, clean = skip),
      and calls engine.RunSingleWave with only the pending agents.
    definition: |
      func (s *Server) handleResumeExecution(w http.ResponseWriter, r *http.Request)
    location: "pkg/api/resume_action.go"
    # integration: register route in pkg/api/server.go

  - name: "InterruptedSession (TypeScript, extended)"
    description: |
      Frontend type gains dirty_worktrees and agent_sessions fields
      to support the enhanced resume UI.
    definition: |
      // Added to existing InterruptedSession in web/src/types.ts:
      interface DirtyWorktree {
        path: string
        branch: string
        agent_id: string
        wave_num: number
        has_changes: boolean
      }
      interface AgentSessionInfo {
        agent_id: string
        session_id: string
        wave_num: number
        worktree_path: string
        last_active: string
      }
      // Extend InterruptedSession:
      dirty_worktrees?: DirtyWorktree[]
      agent_sessions?: Record<string, AgentSessionInfo>
    location: "web/src/types.ts"

