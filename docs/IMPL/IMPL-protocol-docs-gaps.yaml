            // After line 418: collect file ownership for tier
            tierFileOwnership[tier] = append(tierFileOwnership[tier], impl)

            // NEW: After collecting all IMPLs for tier, validate P1 disjointness
            for tier, implsInTier := range tierFileOwnership {
                p1Errs := ValidateP1FileDisjointness(tier, implsInTier)
                errs = append(errs, p1Errs...)
            }
            ```

            **Step 3: Add test cases**
            Location: pkg/protocol/program_validation_test.go (after TestValidateProgramImportMode_P1FileOverlap, around line 805)

            Add test case:
            ```go
            func TestValidateP1FileDisjointness_SameTier(t *testing.T) {
                impl1 := &IMPLManifest{
                    FeatureSlug: "feature-a",
                    FileOwnership: []FileOwnership{{File: "pkg/shared.go", Agent: "A"}},
                }
                impl2 := &IMPLManifest{
                    FeatureSlug: "feature-b",
                    FileOwnership: []FileOwnership{{File: "pkg/shared.go", Agent: "B"}},
                }

                errs := ValidateP1FileDisjointness(1, []*IMPLManifest{impl1, impl2})

                if len(errs) != 1 {
                    t.Fatalf("expected 1 error, got %d", len(errs))
                }
                if errs[0].Code != "P1_FILE_OVERLAP" {
                    t.Errorf("expected P1_FILE_OVERLAP, got %s", errs[0].Code)
                }
            }
            ```

            **Step 4: Update import-impls command**
            Location: cmd/saw/import_impls_cmd.go (verify ValidateImportedIMPLs is called, around line 80-100)

