scaffolds:
    - file: pkg/service/events.go
      contents: |
        package service

        // Event represents a typed event with a channel, event name, and data payload.
        type Event struct {
            Channel string
            Name    string
            Data    interface{}
        }

        // EventPublisher abstracts event delivery from transport (SSE, Wails, etc.).
        type EventPublisher interface {
            // Publish sends an event to all subscribers on the given channel.
            Publish(channel string, event Event)
            // Subscribe returns a channel that receives events for the given channel,
            // and a cancel function to unsubscribe.
            Subscribe(channel string) (<-chan Event, func())
        }
      import_path: github.com/blackwell-systems/scout-and-wave-web/pkg/service
      status: committed (488a3f3)
    - file: pkg/service/service.go
      contents: |
        package service

        // Deps holds shared dependencies injected into all service functions.
        // This avoids passing the full Server struct into the service layer.
        type Deps struct {
            // RepoPath is the default repository root path.
            RepoPath string
            // IMPLDir is the directory containing IMPL documents.
            IMPLDir string
            // Publisher is the event transport abstraction.
            Publisher EventPublisher
            // ConfigPath returns the path to saw.config.json for a given repo.
            ConfigPath func(repoPath string) string
        }
      import_path: github.com/blackwell-systems/scout-and-wave-web/pkg/service
      status: committed (488a3f3)
