        - id: G
          task: |
            ## Agent G — Frontend Event Transport Abstraction

            **What to implement:**
            Create `web/src/lib/eventTransport.ts` — an abstraction layer over EventSource
            that can be swapped for a Wails runtime transport in the future.

            **Interface:**
            ```typescript
            export interface EventTransport {
              subscribe(channel: string, handler: (event: { name: string; data: any }) => void): () => void
              close(): void
            }
            export function createSSETransport(): EventTransport
            ```

            **Channel naming convention:**
            - `global` maps to `new EventSource('/api/events')`
            - `wave:{slug}` maps to `new EventSource('/api/wave/{slug}/events')`
            - `scout:{runId}` maps to `new EventSource('/api/scout/{runId}/events')`
            - `revise:{slug}:{runId}` maps to revise events endpoint
            - `chat:{slug}:{runId}` maps to chat events endpoint
            - `planner:{runId}` maps to planner events endpoint
            - `program` maps to `new EventSource('/api/program/events')`
            - `daemon` maps to `new EventSource('/api/daemon/events')`

            The SSE implementation should:
            1. Parse the channel name to determine the EventSource URL
            2. Manage ref-counting per channel (same pattern as waveEventStore.ts)
            3. Parse SSE events into `{ name: string; data: any }` format
            4. Handle reconnection automatically (EventSource does this natively)

            **Do NOT refactor existing consumers yet** — this file provides the interface and
            SSE implementation. A future IMPL will migrate consumers.

            **Tests:**
            Write `web/src/lib/eventTransport.test.ts`:
            - Test channel URL mapping
            - Test subscribe/unsubscribe ref counting
            - Test close() cleans up all connections

            **Verification gate:**
            ```
            cd web && npx tsc --noEmit
            ```

            **Constraints:**
            - Do NOT modify existing files (apiClient.ts, web/src/stores/waveEventStore.ts, useGlobalEvents.ts)
            - Export the EventTransport interface for future Wails transport implementation
          files:
            - web/src/lib/eventTransport.ts
            - web/src/lib/eventTransport.test.ts
