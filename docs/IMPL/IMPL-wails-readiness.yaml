interface_contracts:
    - name: EventPublisher
      description: |
        Core abstraction for event transport. SSE implementation wraps existing
        sseBroker and globalBroker. Future Wails implementation wraps runtime.EventsEmit().
      definition: |
        type Event struct {
            Channel string
            Name    string
            Data    interface{}
        }
        type EventPublisher interface {
            Publish(channel string, event Event)
            Subscribe(channel string) (<-chan Event, func())
        }
      location: pkg/service/events.go
    - name: Deps
      description: |
        Shared dependency struct injected into service functions, replacing direct
        Server field access.
      definition: |
        type Deps struct {
            RepoPath   string
            IMPLDir    string
            Publisher  EventPublisher
            ConfigPath func(repoPath string) string
        }
      location: pkg/service/service.go
    - name: WaveService
      description: |
        Extracted wave orchestration business logic. StartWave returns immediately
        after launching a goroutine; it communicates progress via EventPublisher.
      definition: |
        func StartWave(deps Deps, slug string) error
        func StopWave(deps Deps, slug string) error
        func ProceedGate(deps Deps, slug string) error
        func RerunAgent(deps Deps, slug string, wave int, agent string, scopeHint string) error
        func FinalizeWave(deps Deps, slug string, wave int) error
      location: pkg/service/wave_service.go
    - name: ScoutService
      description: |
        Extracted scout agent launching logic.
      definition: |
        func StartScout(deps Deps, feature string, repo string) (runID string, err error)
        func CancelScout(deps Deps, runID string) error
      location: pkg/service/scout_service.go
    - name: ImplService
      description: |
        Extracted IMPL document CRUD operations.
      definition: |
        func ListImpls(deps Deps) ([]ImplListEntry, error)
        func GetImpl(deps Deps, slug string) (*protocol.IMPLManifest, string, RepoEntry, error)
        func ApproveImpl(deps Deps, slug string) error
        func RejectImpl(deps Deps, slug string) error
        func DeleteImpl(deps Deps, slug string) error
        func ArchiveImpl(deps Deps, slug string) error
      location: pkg/service/impl_service.go
    - name: MergeService
      description: |
        Extracted merge/test/fix business logic.
      definition: |
        func MergeWave(deps Deps, slug string, wave int) error
        func RunTests(deps Deps, slug string, wave int) error
        func FixBuild(deps Deps, slug string, wave int, errorLog string, gateType string) error
        func AbortMerge(deps Deps, slug string) error
      location: pkg/service/merge_service.go
    - name: ConfigService
      description: |
        Extracted config read/write operations.
      definition: |
        func GetConfig(deps Deps) (*SAWConfig, error)
        func SaveConfig(deps Deps, cfg *SAWConfig) error
        func GetConfiguredRepos(deps Deps) []RepoEntry
      location: pkg/service/config_service.go
    - name: ProgramService
      description: |
        Extracted program lifecycle management.
      definition: |
        func ListPrograms(deps Deps) ([]ProgramDiscovery, error)
        func GetProgramStatus(deps Deps, slug string) (*protocol.ProgramStatusResult, error)
        func ExecuteTier(deps Deps, slug string, tier int, auto bool) error
        func ReplanProgram(deps Deps, slug string, reason string, failedTier int) error
      location: pkg/service/program_service.go
    - name: SSEPublisher
      description: |
        SSE implementation of EventPublisher. Wraps existing sseBroker and globalBroker
        to maintain current behavior while satisfying the EventPublisher interface.
      definition: |
        type SSEPublisher struct { ... }
        func NewSSEPublisher(broker *sseBroker, globalBroker *globalBroker) *SSEPublisher
        func (p *SSEPublisher) Publish(channel string, event Event)
        func (p *SSEPublisher) Subscribe(channel string) (<-chan Event, func())
      location: pkg/api/sse_publisher.go
    - name: EventTransport
      description: |
        Frontend event transport abstraction. Wraps EventSource for SSE transport;
        future Wails transport would wrap wails runtime events.
      definition: |
        interface EventTransport {
          subscribe(channel: string, handler: (event: { name: string; data: any }) => void): () => void
          close(): void
        }
        function createSSETransport(): EventTransport
      location: web/src/lib/eventTransport.ts
    - name: BuildTagInterface
      description: |
        Build-tag-gated asset serving. The web build tag embeds static files;
        the wails build tag provides a no-op (assets served by Wails runtime).
      definition: |
        func StaticFS() (fs.FS, error)
      location: build/web.go
waves:
    - number: 1
      agents:
        - id: A
          task: |
            ## Agent A — Wave Service Extraction

            **What to implement:**
            Create `pkg/service/wave_service.go` containing the business logic currently in
            `pkg/api/wave_runner.go`. Extract `runWaveLoop`, `runFinalizeSteps`, and related
            orchestration into service functions that accept `Deps` and plain Go types.

            **Key functions to extract:**
            - `StartWave(deps Deps, slug string) error` — loads IMPL manifest, resolves paths,
              launches wave execution goroutine. Publishes events via `deps.Publisher`.
            - `StopWave(deps Deps, slug string) error` — cancels a running wave execution goroutine.
            - `ProceedGate(deps Deps, slug string) error` — sends proceed signal to gate channel.
            - `RerunAgent(deps Deps, slug string, wave int, agent string, scopeHint string) error`
            - `FinalizeWave(deps Deps, slug string, wave int) error` — retry finalization pipeline.

            The `runWaveLoop` function currently reads `saw.config.json` for model names, loads
            manifests via `protocol.Load`, calls `engine.RunScaffold`, `engine.RunSingleWave`,
            and the full finalize pipeline. Move all this logic to `wave_service.go`. The function
            should accept a `publish func(event string, data interface{})` that the caller provides
            (in Wave 2, the HTTP handler will wire this to SSEPublisher).

            **Important:** Keep `gateChannels` sync.Map as package-level state in the service package.
            Keep `fallbackSAWConfig` pattern for cross-repo model resolution.

            **Interfaces (from scaffold):**
            - Use `Deps` from `pkg/service/service.go`
            - Use `EventPublisher` from `pkg/service/events.go`

            **Tests:**
            Write `pkg/service/wave_service_test.go` with unit tests:
            - TestStartWave_PublishesRunStarted — verify event published
            - TestProceedGate_UnblocksChannel — verify gate channel signaling
            - TestStartWave_AlreadyRunning — verify duplicate prevention

            **Verification gate:**
            ```
            go build ./pkg/service/... && go test ./pkg/service/ -run TestWave -v
            ```

            **Constraints:**
            - Do NOT modify any files in `pkg/api/` — only create new files in `pkg/service/`
            - Do NOT add Wails dependencies
            - Import `engine` and `protocol` packages from scout-and-wave-go as needed
            - Functions must accept plain Go types, not http.Request/ResponseWriter
          files:
            - pkg/service/wave_service.go
            - pkg/service/wave_service_test.go
