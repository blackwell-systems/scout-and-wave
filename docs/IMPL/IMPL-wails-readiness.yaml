title: Wails Readiness — Service Layer, Event Transport Abstraction, Build Pipeline
<!-- SAW:COMPLETE 2026-03-20 -->
feature_slug: wails-readiness
verdict: SUITABLE
suitability_assessment: |
    **File decomposition:** 6 new service files (pkg/service/), 2 new event abstraction files,
    1 new frontend transport file, 2 build tag files, plus refactoring 6+ existing handler files.
    Work decomposes cleanly into 14 agents with disjoint file ownership.

    **Investigation-first items:** None. The codebase is well-understood; this is pure refactoring.

    **Interface discoverability:** Yes. The EventPublisher interface and service function signatures
    can be defined upfront from the existing handler code. Business logic boundaries are clear.

    **Pre-implementation status:** All work is TODO. No prior Wails preparation exists.

    **Parallelization value:** High. 14 agents across 2 waves, each touching 2-3 files. Go build
    cycle is ~10s, tests ~30s. Clear speedup from parallel execution.

    Estimated times:
    - Scout phase: ~10 min
    - Agent execution: ~15 min (9 agents Wave 1, 5 agents Wave 2, ~5 min avg parallel)
    - Merge & verification: ~5 min
    Total SAW time: ~30 min

    Sequential baseline: ~80 min (14 agents x ~6 min avg)
    Time savings: ~50 min (63% faster)

    Recommendation: Clear speedup. Proceed.
