        - id: I
          task: |
            ## Agent I — SSE Publisher Adapter

            **What to implement:**
            Create `pkg/api/sse_publisher.go` — the SSE implementation of the
            `service.EventPublisher` interface. This adapter wraps the existing `sseBroker`
            and `globalBroker` to route events from service functions to SSE streams.

            **Implementation:**
            ```go
            type SSEPublisher struct {
                broker       *sseBroker
                globalBroker *globalBroker
            }

            func NewSSEPublisher(broker *sseBroker, globalBroker *globalBroker) *SSEPublisher

            func (p *SSEPublisher) Publish(channel string, event service.Event) {
                // Route based on channel:
                // "global" or "global:*" -> globalBroker.broadcast or broadcastJSON
                // "wave:{slug}" -> broker.Publish(slug, SSEEvent{...})
                // "scout:{runID}" -> broker.Publish("scout-"+runID, SSEEvent{...})
            }

            func (p *SSEPublisher) Subscribe(channel string) (<-chan service.Event, func()) {
                // Parse channel name and delegate to appropriate broker's subscribe method.
            }
            ```

            **Channel routing rules:**
            - Channels starting with "global" use globalBroker
            - Channels starting with "wave:" use sseBroker with slug from channel name
            - Channels starting with "scout:" use sseBroker with "scout-"+runID key
            - Other channels use sseBroker with channel name as key

            **Tests:**
            Write `pkg/api/sse_publisher_test.go`:
            - TestSSEPublisher_GlobalChannel
            - TestSSEPublisher_WaveChannel
            - TestSSEPublisher_Subscribe

            **Verification gate:**
            ```
            go build ./pkg/api/... && go test ./pkg/api/ -run TestSSEPublisher -v
            ```

            **Constraints:**
            - Import `pkg/service` for the EventPublisher interface and Event type
            - Do NOT modify existing broker types — wrap them
            - This file only creates NEW files, does not modify existing ones
          files:
            - pkg/api/sse_publisher.go
            - pkg/api/sse_publisher_test.go
