title: Move Wave Agent Isolation Check from Field 0 to SubagentStart Hook
feature_slug: field-zero-hook-migration
verdict: SUITABLE
suitability_assessment: |
    The work decomposes cleanly into 2 disjoint agents:
      Agent A: create the new hook script (new file)
      Agent B: update agent-template.md + wave-agent.md (existing files, no overlap with A)

    Suitability check:
    1. File decomposition: 3 files change, all disjoint across 2 agents.
    2. No investigation-first items: the existing validate_agent_isolation hook
       demonstrates the SubagentStart event and env-var patterns exactly. The
       design is fully specified.
    3. Interface contracts: the hook receives input via stdin (JSON) and env vars;
       behavior is fully specified in the feature description. No ambiguity.
    4. Implementation status: validate_agent_isolation (SubagentStart hook) already
       exists and does Phase 2-style work via `sawtools verify-isolation`. The new
       hook replaces that with a self-contained pure-bash implementation (no sawtools
       dependency). Field 0 in agent-template.md is currently ~65 lines. The
       wave-agent.md progress tracker references Field 0 and also needs updating.
       settings.json already has SubagentStart hooks; the new hook needs to be added
       there and in install.sh's hook registration list (Agent B scope).
    5. Parallelization value: Both agents touch independent files. Total sequential
       time ~20 min. Parallel time ~12 min (both agents can work simultaneously).
       Modest speedup plus coordination artifact value.

    Pre-implementation status check:
    - validate_agent_isolation exists and is registered — it does Phase 2-style
      verification via `sawtools verify-isolation`. The new hook replaces/augments
      this with pure-bash logic that does not depend on sawtools.
    - Field 0 in agent-template.md is present at lines 50-115 (~65 lines of bash
      isolation enforcement). Phase 1 removes most of this.
    - wave-agent.md progress tracker at line 231 says "Field 0: Verify isolation"
      — needs updating to reflect hook-based enforcement.
    - install.sh (root-level) registers hooks; Agent B must add the new hook there.

    Estimated times:
    - Scout phase: ~15 min
    - Agent execution: ~2 agents × ~10 min, accounting for parallelism = ~12 min
    - Merge and verification: ~3 min
    Total SAW time: ~30 min

    Sequential baseline: ~25 min (small, focused changes)
    Recommendation: Marginal speed gain; primary value is coordination artifact.
