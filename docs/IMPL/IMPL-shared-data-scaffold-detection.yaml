    - number: 2
      agents:
        - id: D
          task: |
            ## What to implement

            Create pkg/analyzer/shared_types.go implementing DetectSharedTypes function.
            This function scans an IMPL doc and detects data structures that 2+ agents
            reference, returning scaffold candidates for Scout to review.

            ## Interface to implement

            See interface_contracts section for DetectSharedTypes signature. Key requirements:
            - Input: *protocol.IMPLManifest, repoRoot string
            - Output: []SharedTypeCandidate, error
            - Detection heuristics: scan agent task prompts for import statements and type
              references where the imported file is in another agent's file_ownership

            ## Implementation approach

            1. **Parse agent tasks:** For each agent in each wave, extract text from the
               `task` field. Look for patterns:
               - Go: `import "path/to/package"` or type references in function signatures
               - Rust: `use crate::module::Type` or `pub use X from Y`
               - TypeScript: `import { Type } from "./module"`
               - Python: `from module import Type`

            2. **Cross-reference file_ownership:** When Agent B's task mentions importing
               from path X, check if any agent owns a file matching X. If yes, that file
               is a candidate for shared type scaffolding.

            3. **Extract type names:** Parse the import statement to extract type names.
               Example: "import PreviewData from crate::models" → type_name: PreviewData,
               defining_file: src/models.rs (resolved from file_ownership for Agent A).

            4. **Deduplicate and count references:** Build a map of type_name → list of
               agents that reference it. If len(referencing_agents) >= 2, add to candidates.

            5. **Also check interface_contracts:** If a type appears in interface_contracts
               AND appears in 2+ agent tasks (even without explicit imports), add it to
               candidates. This catches cases where Scout already documented the type but
               didn't add it to scaffolds.

            ## Edge cases to handle

            - **Type already exists in codebase:** If defining_file already exists and contains
              the type (check via AST parsing or grep), mark reason as "type exists but not
              scaffolded; verify agents import correctly".
            - **Circular references:** Agent A imports from B, B imports from A. Return error
              explaining the circular dependency — this is a planning error Scout must fix.
            - **External dependencies:** Skip types from external packages (check if file path
              starts with go.mod module path for local packages only).

            ## Tests to write

            Create pkg/analyzer/shared_types_test.go:
            - TestDetectSharedTypes_BasicCase: Agent A owns models.rs, Agent B task imports
              PreviewData from models → candidate emitted
            - TestDetectSharedTypes_NoSharing: Each agent imports only from external packages
              → no candidates
            - TestDetectSharedTypes_MultipleRefs: Agent A owns X, Agents B and C both import
              from X → one candidate with 2 referencing agents
            - TestDetectSharedTypes_TypeExistsInCodebase: Type already defined in existing file
              → candidate with "exists" reason
            - TestDetectSharedTypes_CircularDep: A imports from B, B imports from A → error

            ## Pre-implementation check

            Verify CI exists before starting work:
            ```bash
            ls .github/workflows/
            ```
            If workflows exist, review test.yml or ci.yml to understand test execution pattern.

            ## Verification gate

            Run in worktree:
            ```bash
            go build ./pkg/analyzer
            go test ./pkg/analyzer -run TestDetectSharedTypes
            go vet ./pkg/analyzer
            ```

            All must pass before committing.

            ## Constraints

            - Do not modify existing pkg/analyzer/analyzer.go (import detection)
            - DetectSharedTypes is a pure function (no side effects, no file writes)
            - Return empty slice (not nil) when no candidates found
            - Error only on malformed IMPL doc or missing file_ownership data

            ## Completion report

            Append structured completion report to IMPL doc:
            ```yaml
            completion_reports:
              D:
                status: complete|partial|blocked
                branch: saw/shared-data-scaffold-detection/wave2-agent-D
                commit: <sha>
                files_changed: [pkg/analyzer/shared_types.go, pkg/analyzer/shared_types_test.go]
                tests_added: [TestDetectSharedTypes_BasicCase, TestDetectSharedTypes_NoSharing, TestDetectSharedTypes_MultipleRefs, TestDetectSharedTypes_TypeExistsInCodebase, TestDetectSharedTypes_CircularDep]
                verification: PASS|FAIL
                summary: |
                  Implemented DetectSharedTypes with 5 test cases. Handles basic detection,
                  multi-agent references, circular deps, and existing types.
            ```
          files:
            - pkg/analyzer/shared_types.go
            - pkg/analyzer/shared_types_test.go
        - id: E
          task: |
            ## What to implement

            Create cmd/sawtools/detect_shared_types_cmd.go implementing the CLI command that
            Scout will invoke. Wraps DetectSharedTypes function from pkg/analyzer.

            ## Interface to implement

            See interface_contracts section for CLI command signature. Key requirements:
            - Input: <impl-doc-path> as positional arg, --format flag (yaml or json)
            - Output: YAML or JSON to stdout with shared_types array
            - Exit code 0 on success (even if no candidates), 1 on error

            ## Implementation approach

            1. **Parse CLI args:** Use cobra to define command with:
               - Use: "detect-shared-types <impl-doc-path>"
               - Flags: --format (default: yaml)
               - Args: cobra.ExactArgs(1)

            2. **Load IMPL doc:** Use protocol.LoadIMPLManifest(implDocPath) to read and
               parse the YAML file.

            3. **Determine repo root:** Use filepath.Dir(implDocPath) to get the directory
               containing the IMPL doc, then walk up to find repository root (directory
               containing go.mod, Cargo.toml, package.json, or .git directory). Alternatively,
               use manifest.Repository field if populated.

            4. **Call DetectSharedTypes:** Pass manifest and repoRoot to analyzer.DetectSharedTypes.

            5. **Format output:** Marshal candidates to YAML or JSON based on --format flag.
               Use yaml.Marshal or json.Marshal from encoding/* packages.

            6. **Write to stdout:** Print formatted output. Scout will parse this output and
               merge it into the Scaffolds section.

            ## Error handling

            - IMPL doc not found: "error: IMPL doc not found at <path>"
            - IMPL doc malformed: "error: failed to parse IMPL doc: <details>"
            - Repo root not found: "error: could not determine repo root from <path>"
            - DetectSharedTypes returns error: "error: detection failed: <details>"

            ## Tests to write

            Create cmd/sawtools/detect_shared_types_cmd_test.go:
            - TestDetectSharedTypesCmd_ValidInput: Runs command with valid IMPL doc → exit 0,
              YAML output matches expected structure
            - TestDetectSharedTypesCmd_NoCandidates: IMPL doc with no shared types → exit 0,
              empty shared_types array
            - TestDetectSharedTypesCmd_JSONFormat: --format json flag → JSON output
            - TestDetectSharedTypesCmd_MissingFile: IMPL doc doesn't exist → exit 1, error message

            ## Integration with main CLI

            Add command to cmd/sawtools/main.go rootCmd:
            ```go
            rootCmd.AddCommand(newDetectSharedTypesCmd())
            ```

            Check main.go to see where other analyze-* commands are registered and follow
            the same pattern.

            ## Verification gate

            Run in worktree:
            ```bash
            go build ./cmd/sawtools
            go test ./cmd/sawtools -run TestDetectSharedTypesCmd
            ./sawtools detect-shared-types <test-impl-doc> --format yaml
            ```

            All must pass. Final command should print valid YAML with shared_types key.

            ## Constraints

            - Do not modify pkg/analyzer (Agent D owns that)
            - Command name must be "detect-shared-types" (no aliases)
            - Output format must match schema in interface_contracts section
            - Do not write files — only read IMPL doc and write to stdout

            ## Completion report

            Append structured completion report to IMPL doc:
            ```yaml
            completion_reports:
              E:
                status: complete|partial|blocked
                branch: saw/shared-data-scaffold-detection/wave2-agent-E
                commit: <sha>
                files_changed: [cmd/sawtools/detect_shared_types_cmd.go, cmd/sawtools/detect_shared_types_cmd_test.go, cmd/sawtools/main.go]
                tests_added: [TestDetectSharedTypesCmd_ValidInput, TestDetectSharedTypesCmd_NoCandidates, TestDetectSharedTypesCmd_JSONFormat, TestDetectSharedTypesCmd_MissingFile]
                verification: PASS|FAIL
                summary: |
                  Implemented detect-shared-types CLI command with 4 test cases. Integrated
                  into sawtools main command. Outputs YAML/JSON to stdout for Scout consumption.
            ```
          files:
            - cmd/sawtools/detect_shared_types_cmd.go
            - cmd/sawtools/detect_shared_types_cmd_test.go
            - cmd/sawtools/main.go
    - number: 3
      agents:
        - id: F
