title: Expand Scaffold Agent trigger to include shared data structures
feature_slug: shared-data-scaffold-detection
verdict: SUITABLE
suitability_assessment: |
    Q1: File decomposition — Yes. The work spans 3 repositories but decomposes cleanly:

    scout-and-wave (protocol repo):
    - protocol/invariants.md (I2 clarification)
    - protocol/execution-rules.md (update or new E-rule for scaffold detection)
    - protocol/procedures.md (Procedure 2: Scaffold Agent section update)
    - implementations/claude-code/prompts/agents/scout.md (update step 6 detection logic)
    - implementations/claude-code/prompts/references/scout-implementation-process.md (update step 6)

    scout-and-wave-go (engine/SDK):
    - pkg/analyzer/analyzer.go (add type reference detection beyond imports)
    - pkg/analyzer/shared_types.go (new: detect types referenced by 2+ agents)
    - cmd/sawtools/detect_shared_types_cmd.go (new: CLI command for Scout to invoke)
    - pkg/protocol/types.go (possibly extend Scaffold schema if needed)

    scout-and-wave-web (web app):
    - No changes expected (engine does the work, web just displays scaffolds section)

    No conflicting modifications. Each repo's files have clear ownership boundaries.

    Q2: Investigation-first items — No. The feature is well-understood from the dry-run-preview
    failure case. We know exactly what to detect: when Agent B imports types from Agent A's
    file_ownership, Scout should create a scaffold for those types.

    Q3: Interface discoverability — Yes. Key interfaces are clear:
    - sawtools detect-shared-types <impl-doc> → YAML output with scaffold candidates
    - Scout calls this after creating initial agent prompts but before finalizing IMPL doc
    - Output schema: {file: path, types: [name1, name2], referencing_agents: [A, B]}

    Q4: Pre-implementation status check — Greenfield feature. Scout currently detects shared
    types only when they appear in interface_contracts (step 6 heuristic). This extends detection
    to "Agent B's brief says 'import X from crate::models' where models.rs is in Agent A's
    file_ownership".

    Q5: Parallelization value — Low to moderate. This is mostly documentation + one focused
    Go implementation file. Build/test cycles are fast (<10s for protocol docs, ~15-20s for Go).
    Main value is coordination across 3 repos and ensuring protocol-engine-docs stay aligned.

    Estimated times:
    - Scout phase: ~10 min (cross-repo analysis, understanding current scaffold logic)
    - Wave 1 (protocol docs): ~8 min (3 agents, parallel, mostly markdown)
    - Wave 2 (Go implementation): ~15 min (2 agents, parallel, shared_types.go + CLI command)
    - Wave 3 (integration validation): ~5 min (1 agent, update Scout prompt to call new tool)
    - Merge & verification: ~5 min per wave (~15 min total across 3 waves)
    Total: ~53 min

    Sequential baseline: ~45 min (mostly sequential anyway due to cross-repo coordination)

    Recommendation: SUITABLE WITH CAVEATS. Parallelization gains are minimal (~15% speedup),
    but the IMPL doc provides high value as:
    1. Cross-repo coordination specification (prevents protocol-engine drift)
    2. Interface contract documentation for the new detection API
    3. Audit trail showing which E-rule governs this behavior
    4. Progress tracker across 3 repos with different merge dependencies

    The coordination value justifies SAW even with marginal speed gains.
