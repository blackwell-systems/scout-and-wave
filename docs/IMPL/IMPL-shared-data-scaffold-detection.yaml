          task: |
            ## What to implement

            Strengthen I2 (Interface Contracts Precede Parallel Implementation) to explicitly
            cover shared data structures, not just function/method signatures. Clarify that
            "interface contracts" includes structs, enums, type aliases, and traits when they
            are referenced by 2+ agents.

            ## File to modify

            protocol/invariants.md (I2 section, lines 56-71)

            ## Changes required

            1. **Expand I2's scope statement** (after line 57):
               Current: "The Scout defines all interfaces that cross agent boundaries"
               Add: "This includes function signatures, method contracts, AND shared data
               structures (structs, enums, type aliases, traits) referenced by 2+ agents."

            2. **Add new paragraph after "Mechanism:" section** (after line 67):
               ```
               **Shared Data Structure Detection:** Scout detects types that multiple agents
               reference by scanning agent task prompts for import statements, type references,
               and data structure definitions. When Agent B imports a type from a file in
               Agent A's ownership, Scout creates a scaffold for that type to prevent duplicate
               definitions and I1 violations.

               Detection applies to:
               - Structs/classes defined in one agent's file and imported by another
               - Enums/sum types used across agent boundaries
               - Type aliases shared between agents
               - Traits/interfaces implemented or consumed by multiple agents

               Does NOT apply to:
               - Types from external dependencies (stdlib, third-party packages)
               - Types in existing codebase files not owned by any agent
               - Types mentioned in only one agent's task (no cross-agent dependency)
               ```

            3. **Update "Related Rules"** (line 70):
               Add reference to the new E-rule created by Agent B: "See E2 (interface freeze),
               E8 (same-wave interface failure handling), and E45 (shared data structure
               scaffold detection)"

            ## Constraints

            - Do not renumber I2 or change its formal statement
            - Keep existing mechanism description intact
            - New content must integrate smoothly with existing I2 text
            - Cross-reference E45 (Shared Data Structure Scaffold Detection) created by Agent B

            ## Verification

            Read protocol/invariants.md in full after changes. Verify:
            - I2's scope now explicitly includes data structures
            - New detection paragraph appears after Mechanism section
            - Related Rules includes cross-reference to Agent B's E-rule
