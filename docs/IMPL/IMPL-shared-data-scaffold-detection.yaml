interface_contracts:
    - name: DetectSharedTypes
      description: Analyzes IMPL doc and detects data structures referenced by 2+ agents
      definition: |
        // pkg/analyzer/shared_types.go

        package analyzer

        import "github.com/blackwell-systems/scout-and-wave-go/pkg/protocol"

        // SharedTypeCandidate represents a type that should be scaffolded because
        // multiple agents reference it.
        type SharedTypeCandidate struct {
            TypeName          string   `json:"type_name" yaml:"type_name"`
            DefiningAgent     string   `json:"defining_agent" yaml:"defining_agent"`
            DefiningFile      string   `json:"defining_file" yaml:"defining_file"`
            ReferencingAgents []string `json:"referencing_agents" yaml:"referencing_agents"`
            ReferencingFiles  []string `json:"referencing_files" yaml:"referencing_files"`
            Reason            string   `json:"reason" yaml:"reason"`
        }

        // DetectSharedTypes scans an IMPL doc's file_ownership, interface_contracts,
        // and agent task prompts to find types that multiple agents reference.
        // Returns scaffold candidates with metadata for Scout to review.
        //
        // Detection heuristics:
        // 1. Agent A owns file X, Agent B's task says "import Type from X"
        // 2. Type appears in interface_contracts AND 2+ agents reference it in tasks
        // 3. Same struct name mentioned in multiple agents' "Interfaces to implement"
        //
        // Does NOT trigger for:
        // - Types imported from external packages (stdlib, third-party deps)
        // - Types in files not owned by any agent (existing codebase infrastructure)
        // - Types mentioned in only one agent's task
        func DetectSharedTypes(manifest *protocol.IMPLManifest, repoRoot string) ([]SharedTypeCandidate, error)
      location: pkg/analyzer/shared_types.go
    - name: detect-shared-types CLI command
      description: CLI wrapper for DetectSharedTypes, invoked by Scout agent
      definition: |
        # cmd/sawtools/detect_shared_types_cmd.go

        sawtools detect-shared-types <impl-doc-path> [--format yaml|json]

        Reads IMPL doc, analyzes agent tasks and file ownership, outputs scaffold candidates.

        Output format (YAML):
        ```yaml
        shared_types:
          - type_name: PreviewData
            defining_agent: A
            defining_file: src/models.rs
            referencing_agents: [B, C]
            referencing_files: [src/upgrade/splitter.rs, src/upgrade/mod.rs]
            reason: "Agent B task says 'import PreviewData from crate::models'; Agent C task says 'use PreviewData from models'"
          - type_name: SectionTiming
            defining_agent: A
            defining_file: src/models.rs
            referencing_agents: [B]
            referencing_files: [src/upgrade/splitter.rs]
            reason: "Agent B task says 'import SectionTiming from crate::models'"
        ```

        Exit code 0 if analysis succeeds (even if no candidates found).
        Exit code 1 if IMPL doc is malformed or repo root cannot be determined.
      location: cmd/sawtools/detect_shared_types_cmd.go
