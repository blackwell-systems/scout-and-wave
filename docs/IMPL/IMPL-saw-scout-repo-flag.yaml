pre_mortem:
    overall_risk: medium
    rows:
        - scenario: Agent A edits saw-skill.md but omits the auto flow update — the auto command also launches a scout and would not benefit from --repo parsing, causing the flag to be silently ignored when using /saw auto --repo.
          likelihood: medium
          impact: medium
          mitigation: Agent A's task includes updating the argument-hint for auto and states that --repo parsing applies to both scout and auto args. The Invocation Modes table update is explicitly scoped to the scout row; the auto row's --skip-confirm position makes --repo natural to add there too. Agent A should double-check the auto flow section.
        - scenario: Agent B makes the scout.md change unconditional — the scout always looks for an "IMPL Output Path" section and errors when absent, breaking the default behavior.
          likelihood: low
          impact: high
          mitigation: Agent B's instruction explicitly says "if present, write to that path". The wording "check your context for..." is conditional. The fallback default path remains in the text.
        - scenario: Agent C adds the new field to RunScoutFullOpts but forgets to wire it into the local implPath variable before scoutOpts is constructed in RunScoutFull. The inner ScoutCorrectionLoop would still use the slug-derived path.
          likelihood: low
          impact: high
          mitigation: The override block is inserted immediately after implPath is computed, before scoutOpts is constructed. Agent C's task shows the exact insertion point. The override sets implPath to the explicit value, which then flows into scoutOpts.IMPLOutPath naturally.
        - scenario: I6 validation (ValidateScoutWrites) rejects the cross-repo write when --repo points to a different repo than session cwd, because it checks writes within opts.RepoPath.
          likelihood: low
          impact: medium
          mitigation: I6 uses opts.RepoPath (the target repo) as the boundary, not the session cwd. When the caller sets RepoPath to the target repo (via --repo-dir), the write to target-repo/docs/IMPL/ is within bounds. No engine changes needed for I6.
        - scenario: The slug generated by the Orchestrator in the skill (to construct the IMPL output path) differs from the slug generateSlug() computes in the engine, causing a path mismatch.
          likelihood: low
          impact: medium
          mitigation: When --repo is provided, the Orchestrator passes the explicit path to the scout agent via the prompt. The scout writes to that exact path regardless of its internal slug generation. There is no mismatch because the scout follows the injected path instruction.
        - scenario: Agent E's hook uses python3 for JSON parsing, but python3 is not in PATH in the Claude Code hook execution environment, causing the hook to silently fail to extract file_path and always exit 0.
          likelihood: low
          impact: medium
          mitigation: The hook falls back gracefully (empty file_path → exit 0, allow). The claude Code environment has python3 available on macOS. If python3 is unavailable the hook becomes a no-op rather than blocking legitimate writes. Agent E can add a fallback using grep/sed if needed, but keep it simple first.
        - scenario: Agent E modifies ~/.claude/settings.json but inserts the JSON entry with a syntax error (missing comma, extra brace), breaking all hook execution for the user.
          likelihood: medium
          impact: high
          mitigation: Agent E must validate the JSON after editing. The task includes reading the current settings.json first and using Edit tool with exact string match. After editing, run `python3 -m json.tool ~/.claude/settings.json` to verify syntax before committing.
        - scenario: Agent F's .saw-worktree-env write adds a fatal error path instead of a warning, causing prepare-wave to fail for all subsequent waves when the hooks directory is not writable.
          likelihood: low
          impact: high
          mitigation: The task explicitly specifies non-fatal behavior — use fmt.Fprintf(os.Stderr, "warning:...") and continue without returning an error. The code template in the task shows this pattern.
        - scenario: Agent G updates wave-agent.md but the exact text it searches for has minor whitespace or punctuation differences from what's actually in the file, causing the Edit to fail and the agent to hallucinate a replacement.
          likelihood: medium
          impact: low
          mitigation: Agent G must Read the exact current text of wave-agent.md before writing the Edit. The task provides verbatim text blocks to match. Agent G should verify matches before applying edits and check postconditions after.
        - scenario: The settings.json entry Agent E adds uses the repo-local path (scout-and-wave/hooks/saw-worktree-boundary.sh relative) instead of an absolute path, causing the hook to fail silently when Claude Code runs from a different cwd.
          likelihood: medium
          impact: medium
          mitigation: Agent E's task explicitly uses the absolute path /Users/dayna.blackwell/code/scout-and-wave/hooks/saw-worktree-boundary.sh in the settings.json entry. The task shows the exact JSON to insert with the absolute path.
