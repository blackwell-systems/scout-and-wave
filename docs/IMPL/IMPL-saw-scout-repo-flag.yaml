interface_contracts:
    - name: RunScoutFullOpts.ImplOutputPath field
      description: |
        Optional explicit IMPL output path field added to RunScoutFullOpts.
        When non-empty, overrides the default path derivation
        (repoPath + /docs/IMPL/IMPL-slug.yaml). Allows the caller to place
        the IMPL doc in a different repo than repoPath.
      definition: |
        // New field in RunScoutFullOpts (pkg/engine/scout_run.go) between RepoPath and SAWRepoPath:
        ImplOutputPath string
        // optional: explicit IMPL output path; overrides default derivation
      location: pkg/engine/scout_run.go
    - name: --impl-output-path CLI flag
      description: |
        New CLI flag on sawtools run-scout. When set, passes the value as
        the ImplOutputPath field of RunScoutFullOpts instead of deriving from
        --repo-dir + slug.
      definition: |
        // New flag in cmd/sawtools/run_scout_cmd.go:
        // cmd.Flags().StringVar(&implOutputPath, "impl-output-path", "", "...")
      location: cmd/sawtools/run_scout_cmd.go
    - name: --repo flag on /saw scout skill command
      description: |
        New optional flag on /saw scout (and /saw auto) skill invocations. When set,
        the Orchestrator derives the IMPL output path as repo/docs/IMPL/IMPL-slug.yaml
        and passes it explicitly in the scout agent launch prompt. All subsequent
        sawtools calls receive --repo-dir pointing to that repo.
      definition: |
        # Parsing rule in saw-skill.md Execution Logic section:
        # Parse --repo <path> from scout/auto args before --model and feature description.
        # When present:
        #   target repo = <path> (absolute)
        #   implOutputPath = <path>/docs/IMPL/IMPL-<slug>.yaml
        # When absent:
        #   behavior unchanged (scout derives from cwd)
      location: implementations/claude-code/prompts/saw-skill.md
    - name: Scout agent IMPL output path injection
      description: |
        When the Orchestrator knows the explicit IMPL output path (because --repo was provided),
        it injects an "IMPL Output Path" section into the scout agent launch prompt.
        The scout agent must write to that exact path when the section is present.
      definition: |
        # Scout agent launch prompt fragment (when --repo is provided):
        ## IMPL Output Path
        /absolute/path/to/target-repo/docs/IMPL/IMPL-slug.yaml
      location: implementations/claude-code/prompts/agents/scout.md
    - name: SAW_WORKTREE_ROOT env var
      description: |
        Environment variable injected by prepare-wave (Go engine) into the agent worktree
        context. Set to the absolute path of the agent's assigned worktree directory.
        When non-empty, saw-worktree-boundary.sh uses this to hard-deny Write/Edit/MultiEdit
        calls whose target path resolves to the main repo instead of the worktree.
        When not set (solo wave, integration wave, orchestrator context): hook is no-op.
      definition: |
        # Written to .saw-worktree-env file in each agent worktree during prepare-wave:
        SAW_WORKTREE_ROOT=/absolute/path/to/.claude/worktrees/saw/<slug>/wave<N>-agent-<ID>
      location: pkg/engine/prepare.go
    - name: hooks/saw-worktree-boundary.sh
      description: |
        Shell script PreToolUse hook that hard-denies Write/Edit/MultiEdit calls when
        the target file path resolves to the main repo (any path under the main repo root
        but NOT under SAW_WORKTREE_ROOT). Fast pure-shell implementation with no subprocess chains.
        Exit 0 = allow, exit 2 = hard block with actionable error message.
      definition: |
        #!/usr/bin/env bash
        # If SAW_WORKTREE_ROOT not set: exit 0 (no-op)
        # Read file_path from stdin JSON (.tool_input.file_path)
        # Resolve relative paths against cwd before comparing
        # If path is under main repo but not under SAW_WORKTREE_ROOT: exit 2
        # Error message format: "[SAW] Write blocked: <path> is in main repo, not agent worktree. Use: <SAW_WORKTREE_ROOT>/..."
      location: hooks/saw-worktree-boundary.sh
