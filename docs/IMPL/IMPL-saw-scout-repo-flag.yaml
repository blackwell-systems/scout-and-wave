title: Add --repo flag to /saw scout command
feature_slug: saw-scout-repo-flag
verdict: SUITABLE
suitability_assessment: |
    The feature spans two repos (scout-and-wave protocol repo and scout-and-wave-go engine repo)
    with clearly independent file ownership. Changes decompose cleanly:
    - Agent A: Update the skill prompt (saw-skill.md) to parse --repo and propagate derived IMPL
      path and --repo-dir to all subsequent sawtools calls.
    - Agent B: Update the scout agent brief (scout.md) to accept an explicit IMPL output path
      when one is provided in the prompt context.
    - Agent C: Go engine changes — add ImplOutputPath field to RunScoutFullOpts struct and update
      run_scout_cmd.go to accept --impl-output-path flag for explicit IMPL path override.
    - Agent D: Protocol docs (docs/architecture.md, docs/QUICKSTART-CLI.md) — update examples
      to show the new flag.

    Pre-implementation check: The sawtools run-scout command already has --repo-dir. The gap is
    purely in the skill's scout flow (arg parsing + prompt construction) and the scout agent
    brief (which currently hardcodes "write to docs/IMPL/IMPL-<slug>.yaml" without an
    override path).

    This is a cross-repo IMPL (scout-and-wave protocol repo + scout-and-wave-go engine repo).
    Quality gates run in scout-and-wave-go only (Go compilation/tests). Protocol/skill files
    are prose/YAML with no build system.

    Estimated times:
    - Scout phase: ~20 min
    - Agent execution: ~4 agents x ~10 min avg = 40 min, with full Wave 1 parallelism ~10 min
    - Merge and verification: ~5 min
    Total SAW time: ~35 min
    Sequential baseline: ~60 min
    Time savings: ~25 min (40% faster)
    Recommendation: Clear speedup with 4 independent agents across 2 repos.

    Wave 2 addition (worktree boundary enforcement):
    - Agent E: New hooks/saw-worktree-boundary.sh shell script + hook registration in global settings.json
    - Agent F: Go engine prepare-wave env injection of SAW_WORKTREE_ROOT into agent worktree context
    - Agent G: Protocol doc updates — E43 description update + wave-agent.md note
    Wave 2 is independent of Wave 1 (disjoint files, different feature area).
test_command: go test ./... -timeout 120s
lint_command: go vet ./...
