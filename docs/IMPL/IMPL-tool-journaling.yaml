# Pre-Mortem
pre_mortem:
  overall_risk: "medium"
  rows:
    - scenario: "Claude Code session log format changes between versions, breaking JSONL parsing"
      likelihood: "low"
      impact: "high"
      mitigation: "Add version detection and format validation. If parse fails, log warning and continue without journal (non-fatal). Include format version field in ToolEntry."
    - scenario: "Session log file is rotated/deleted while observer is tailing it"
      likelihood: "medium"
      impact: "low"
      mitigation: "Detect file rotation via cursor.SessionFile mismatch. Start fresh from new log. Lost entries are acceptable (journal is best-effort recovery, not guaranteed capture)."
    - scenario: "Journal file grows to >100MB in long-running waves (14+ agents, 8+ hours)"
      likelihood: "medium"
      impact: "medium"
      mitigation: "Monitor journal size in tests. If >10MB, emit warning. Recent.json cache keeps only last 30 events for fast access. Archive compresses ~10:1."
    - scenario: "Context generation regex fails to parse test output from unknown test framework"
