# Waves
waves:
  - number: 1
    agents:
      - id: "A"
        task: |
          ## What to Implement
          Core journal observer that tails Claude Code session logs (`~/.claude/projects/<project>/*.jsonl`) and extracts tool execution history. This is the foundation for compaction safety — when agents lose context after compaction, the journal provides execution history recovery.

          Implement `pkg/journal/observer.go` with `JournalObserver` type and methods:
          - `NewObserver(projectRoot Path, agentID string)` — creates journal instance for agent
          - `Sync()` — incrementally reads session log from cursor position, extracts tool_use/tool_result entries, appends to index.jsonl
          - `findLatestSessionFile()` — locates ~/.claude/projects/<project-hash>/*.jsonl by mtime
          - `loadCursor()` / `saveCursor()` — tracks read position in session log
          - `appendToIndex()` — writes new entries to index.jsonl (append-only)
          - `updateRecent()` — maintains recent.json cache (last 30 events as JSON array)

          File structure created by observer:
          ```
          .saw-state/wave1/agent-A/
          ├── cursor.json              # SessionCursor struct
          ├── index.jsonl              # ToolEntry per line (append-only)
          ├── recent.json              # Last 30 entries (JSON array)
          └── tool-results/
              ├── toolu_abc123.txt     # Full output for tool use abc123
              └── toolu_def456.txt
          ```

          Session log parsing: Extract `tool_use` and `tool_result` blocks from Claude Code JSONL format. Each line is a JSON object with `type`, `timestamp`, and `content` fields. Tool blocks are nested in `content.messages[].content[]` arrays.

          Also implement `pkg/journal/doc.go` with package-level documentation explaining the external log observer architecture and why it doesn't require backend modifications.

          ## Interfaces to Implement
          From scaffold file `pkg/journal/types.go`:
          - `SessionCursor` struct (session_file, offset fields)
          - `ToolEntry` struct (timestamp, kind, tool_name, tool_use_id, input, content_file, preview, truncated)
          - `SyncResult` struct (new_tool_uses, new_tool_results, new_bytes)

          Define in observer.go:
          ```go
          type JournalObserver struct {
              ProjectRoot Path
              JournalDir  Path
              AgentID     string
              cursorPath  Path
              indexPath   Path
              recentPath  Path
              resultsDir  Path
          }

          func NewObserver(projectRoot Path, agentID string) (*JournalObserver, error)
          func (o *JournalObserver) Sync() (*SyncResult, error)
          func (o *JournalObserver) findLatestSessionFile() (Path, error)
          func (o *JournalObserver) loadCursor() (*SessionCursor, error)
          func (o *JournalObserver) saveCursor(cursor *SessionCursor) error
          func (o *JournalObserver) appendToIndex(entries []ToolEntry) error
          func (o *JournalObserver) updateRecent(newEntries []ToolEntry) error
          ```

          ## Interfaces to Call
          Standard library only:
          - `os.ReadFile`, `os.WriteFile` for cursor/recent persistence
          - `bufio.Scanner` for JSONL line-by-line reading
          - `encoding/json` for parsing Claude Code session log format
          - `filepath.Glob` to find session files
          - `os.Stat` for mtime comparison

          ## Tests to Write
          1. `TestNewObserver_CreatesDirectories` - verify .saw-state/wave{N}/agent-{ID}/ structure created
          2. `TestSync_FirstRun` - empty journal, processes session log from start
          3. `TestSync_Incremental` - cursor tracks position, only new entries processed
          4. `TestSync_SessionFileChanged` - new Claude Code session, cursor resets
          5. `TestFindLatestSessionFile_SelectsMostRecent` - multiple .jsonl files, picks latest by mtime
          6. `TestAppendToIndex_PreservesExisting` - append-only semantics
          7. `TestUpdateRecent_MaintainsLast30` - sliding window of recent events
          8. `TestSync_ExtractsToolBlocks` - parses tool_use and tool_result from Claude Code format
          9. `TestSync_SavesFullOutputToFiles` - tool results written to tool-results/ directory

          ## Verification Gate
          ```bash
          cd /Users/dayna.blackwell/code/scout-and-wave-go
          go build ./pkg/journal/...
          go vet ./pkg/journal/...
          go test ./pkg/journal/observer_test.go -v
          ```

          ## Constraints
          - Do NOT modify any backend code (this is external observer pattern)
          - Session log path: `~/.claude/projects/<project-hash>/<session-id>.jsonl`
          - Project hash computation: use filepath.Base of project root for simplicity (real implementation can hash later)
          - Index must be append-only (no in-place edits to index.jsonl)
          - Cursor must survive process restart (persisted to cursor.json after each sync)
          - Handle malformed session log lines gracefully (skip and continue)
          - Tool result content >10KB should be truncated in preview field but stored fully in tool-results/ files
        files:
          - "pkg/journal/observer.go"
          - "pkg/journal/observer_test.go"
          - "pkg/journal/doc.go"

