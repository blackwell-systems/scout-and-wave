          - `ListCheckpoints()` — returns all checkpoints with metadata (name, timestamp, entry count)
          - `RestoreCheckpoint(name string)` — rolls back journal to checkpoint state
          - `DeleteCheckpoint(name string)` — removes checkpoint files

