# Suitability Assessment
suitability_assessment: |
  **File decomposition:** 8 distinct workstreams with disjoint file ownership. Core journal package, engine integration, API handlers, web UI, CLI tooling, protocol docs, and tests all have independent file scopes.

  **Investigation:** None required. Architecture fully specified in ROADMAP.md with code examples, struct definitions, and integration points.

  **Interfaces:** Fully discoverable. JournalObserver type, SessionCursor schema, integration hooks in runner.go, and API endpoints all defined in ROADMAP.

  **Pre-implementation status:** New feature. No existing journal code. All items are TO-DO.

  **Parallelization value:** High. Complex logic (JSONL parsing, context generation), medium build cycles (10-60s), and clear boundaries between agents. Wave 1 creates foundation; Wave 2+ integrations are parallel within waves.

# Scaffolds
scaffolds:
  - file_path: "pkg/journal/types.go"
    contents: |
      package journal

      import "time"

      // SessionCursor tracks read position in Claude Code session log
      type SessionCursor struct {
          SessionFile string `json:"session_file"` // e.g., "1a2b3c4d.jsonl"
          Offset      int64  `json:"offset"`       // Byte offset in file
      }

      // ToolEntry represents a single tool use or tool result in the journal
      type ToolEntry struct {
          Timestamp   time.Time              `json:"ts"`
          Kind        string                 `json:"kind"` // "tool_use" or "tool_result"
          ToolName    string                 `json:"tool_name,omitempty"`
          ToolUseID   string                 `json:"tool_use_id"`
          Input       map[string]interface{} `json:"input,omitempty"`
          ContentFile string                 `json:"content_file,omitempty"` // Path to full output
          Preview     string                 `json:"preview,omitempty"`      // First 800 chars
          Truncated   bool                   `json:"truncated,omitempty"`
      }

      // SyncResult summarizes a journal sync operation
      type SyncResult struct {
          NewToolUses    int
          NewToolResults int
          NewBytes       int64
      }
    import_path: "github.com/blackwell-systems/scout-and-wave-go/pkg/journal"
    status: "committed (d465224)"

# Interface Contracts
interface_contracts:
  - name: "JournalObserver"
    description: "Core journal observer that tails Claude Code session logs and extracts tool execution history"
    definition: |
      type JournalObserver struct {
          ProjectRoot Path
          JournalDir  Path
          AgentID     string
          cursorPath  Path
          indexPath   Path
          recentPath  Path
          resultsDir  Path
      }

      func NewObserver(projectRoot Path, agentID string) (*JournalObserver, error)
      func (o *JournalObserver) Sync() (*SyncResult, error)
      func (o *JournalObserver) GenerateContext() (string, error)
      func (o *JournalObserver) Checkpoint(name string) error
      func (o *JournalObserver) Archive() error
    location: "pkg/journal/observer.go"

  - name: "ContextGenerator"
    description: "Analyzes journal entries and produces markdown summary for agent context injection"
    definition: |
      func GenerateContext(entries []ToolEntry, maxEntries int) (string, error)
      func extractFilesModified(entries []ToolEntry) []FileModification
      func extractTestResults(entries []ToolEntry) []TestRun
      func extractGitCommits(entries []ToolEntry) []GitCommit
    location: "pkg/journal/context.go"

  - name: "CheckpointManager"
    description: "Creates named snapshots of journal state at key milestones"
    definition: |
      type Checkpoint struct {
          Name      string    `json:"name"`
          Timestamp time.Time `json:"timestamp"`
          EntryCount int      `json:"entry_count"`
          SnapshotPath string `json:"snapshot_path"`
      }

      func (o *JournalObserver) Checkpoint(name string) error
      func (o *JournalObserver) ListCheckpoints() ([]Checkpoint, error)
      func (o *JournalObserver) RestoreCheckpoint(name string) error
    location: "pkg/journal/checkpoint.go"

  - name: "ArchivePolicy"
    description: "Compresses journals after wave merge and handles retention policy"
    definition: |
      func (o *JournalObserver) Archive() error
      func CleanupExpired(repoPath string, retentionDays int) error
    location: "pkg/journal/archive.go"

  - name: "DebugJournalCommand"
    description: "CLI command to inspect journal contents for debugging failed agents"
    definition: |
      func debugJournalCommand(agentPath string, opts DebugOpts) error

      type DebugOpts struct {
          Summary      bool
          FailuresOnly bool
          Last         int
          Export       string // HTML timeline export path
      }
    location: "cmd/saw/debug_journal.go"

  - name: "JournalAPIHandlers"
    description: "Web API endpoints for journal browsing in Observatory UI"
    definition: |
      GET  /api/journal/:wave/:agent          // Get full journal (JSONL)
      GET  /api/journal/:wave/:agent/summary  // Get context.md
      GET  /api/journal/:wave/:agent/checkpoints // List checkpoints
      POST /api/journal/:wave/:agent/restore  // Restore from checkpoint
    location: "pkg/api/journal_handler.go"

