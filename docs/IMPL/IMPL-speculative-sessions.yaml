interface_contracts:
    - name: SessionManager
      description: |
        Manages session lifecycle. Holds a map of active sessions and the
        SessionExecutor for serialized LSP access. All public methods are
        thread-safe.
      definition: |
        type SessionManager struct {
            sessions map[string]*SimulationSession
            executor SessionExecutor
            resolver lsp.ClientResolver
            mu       sync.RWMutex
        }

        func NewSessionManager(resolver lsp.ClientResolver) *SessionManager
        func (m *SessionManager) CreateSession(ctx context.Context, workspaceRoot, language string) (string, error)
        func (m *SessionManager) GetSession(sessionID string) (*SimulationSession, error)
        func (m *SessionManager) ApplyEdit(ctx context.Context, sessionID, fileURI string, rng types.Range, newText string) (*EditResult, error)
        func (m *SessionManager) Evaluate(ctx context.Context, sessionID string, scope string, timeoutMs int) (*EvaluationResult, error)
        func (m *SessionManager) SimulateChain(ctx context.Context, sessionID string, edits []ChainEdit, timeoutMs int) (*ChainResult, error)
        func (m *SessionManager) Commit(ctx context.Context, sessionID string, target string, apply bool) (*CommitResult, error)
        func (m *SessionManager) Discard(ctx context.Context, sessionID string) error
        func (m *SessionManager) Destroy(ctx context.Context, sessionID string) error
      location: internal/session/manager.go
    - name: SessionExecutor
      description: |
        Abstracts LSP access serialization. V1 uses SerializedExecutor with
        a per-server mutex. Future IsolatedExecutor can provide per-session LSP.
      definition: |
        type SessionExecutor interface {
            Acquire(ctx context.Context, session *SimulationSession) error
            Release(session *SimulationSession)
        }

        type SerializedExecutor struct {
            mu sync.Mutex
        }

        func NewSerializedExecutor() *SerializedExecutor
        func (e *SerializedExecutor) Acquire(ctx context.Context, s *SimulationSession) error
        func (e *SerializedExecutor) Release(s *SimulationSession)
      location: internal/session/executor.go
    - name: DiagnosticDiffer
      description: |
        Computes the diff between baseline and post-simulation diagnostics.
        Two diagnostics match if range, message, severity, and source are equal.
      definition: |
        func DiffDiagnostics(baseline, current []types.LSPDiagnostic) (introduced, resolved []DiagnosticEntry)
        func DiagnosticsEqual(a, b types.LSPDiagnostic) bool
        func SeverityString(severity int) string
      location: internal/session/differ.go
    - name: SimulationToolHandlers
      description: |
        MCP tool handler functions for all 8 simulation tools. Follow the existing
        pattern: accept (ctx, client/manager, args) and return (types.ToolResult, error).
      definition: |
        func HandleCreateSimulationSession(ctx context.Context, mgr *session.SessionManager, args map[string]interface{}) (types.ToolResult, error)
        func HandleSimulateEdit(ctx context.Context, mgr *session.SessionManager, args map[string]interface{}) (types.ToolResult, error)
        func HandleEvaluateSession(ctx context.Context, mgr *session.SessionManager, args map[string]interface{}) (types.ToolResult, error)
        func HandleSimulateChain(ctx context.Context, mgr *session.SessionManager, args map[string]interface{}) (types.ToolResult, error)
        func HandleCommitSession(ctx context.Context, mgr *session.SessionManager, args map[string]interface{}) (types.ToolResult, error)
        func HandleDiscardSession(ctx context.Context, mgr *session.SessionManager, args map[string]interface{}) (types.ToolResult, error)
        func HandleDestroySession(ctx context.Context, mgr *session.SessionManager, args map[string]interface{}) (types.ToolResult, error)
        func HandleSimulateEditAtomic(ctx context.Context, mgr *session.SessionManager, args map[string]interface{}) (types.ToolResult, error)
      location: internal/tools/simulation.go
