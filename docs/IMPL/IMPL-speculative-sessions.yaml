verdict: SUITABLE
suitability_assessment: |
    All five suitability criteria pass cleanly:

    1. File decomposition: The feature decomposes into 4 disjoint file groups:
       (a) session types in internal/session/types.go, (b) session manager + executor
       in internal/session/manager.go, (c) diagnostic differ in internal/session/differ.go,
       (d) MCP tool handlers in internal/tools/simulation.go, (e) tool registration in
       cmd/lsp-mcp-go/server.go, (f) tests split per component. 4+ agents with no file overlap.

    2. Investigation-first: None required. The design spec (docs/speculative-execution.md)
       is comprehensive with all contracts, invariants, and failure semantics resolved.

    3. Interface discoverability: All cross-agent interfaces are fully defined in the spec:
       SessionManager, SimulationSession, SessionExecutor, DiagnosticDiffer, and the 7 MCP
       tool signatures. No ambiguity.

    4. Pre-implementation status: Entirely greenfield. No existing code to check against.

    5. Parallelization value: Go build+test cycle ~10s. 4 agents each creating 2-3 new files
       with non-trivial logic (state machines, mutex serialization, diagnostic diffing).
       Clear speedup over sequential.

    Estimated times:
    - Scout phase: ~10 min
    - Agent execution: ~15 min (4 agents x 10 min avg, 1 wave parallel + 1 integration wave)
    - Merge and verification: ~5 min
    Total SAW time: ~30 min

    Sequential baseline: ~40 min (4 agents x 10 min avg sequential)
    Time savings: ~10 min (25% faster)

    Recommendation: Clear speedup. Proceed.
