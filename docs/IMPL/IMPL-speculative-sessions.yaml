          task: |
            ## Agent A: Session Types, Executor, and Diagnostic Differ

            ### What to implement

            Create the `internal/session/` package with three files containing the
            foundational types, the executor abstraction, and the diagnostic differ.

            **File 1: `internal/session/types.go`**

            The scaffold has pre-created this file with all type definitions. Review the
            scaffold contents and ensure all types are correct and complete. The scaffold
            includes: SessionStatus enum, Confidence enum, AppliedEdit, DiagnosticsSnapshot,
            EvaluationResult, DiagnosticEntry, EditResult, ChainEdit, ChainStepResult,
            ChainResult, CommitResult, SessionExecutor interface, SimulationSession struct,
            and helper methods (MarkDirty, IsDirty, IsTerminal).

            Your task is to:
            1. Review the scaffold and fix any issues (remove the `var _ = ...` import guards,
               ensure proper formatting)
            2. Ensure all JSON tags are correct per the design spec at `docs/speculative-execution.md`
            3. Add any missing types you discover while implementing the other files

            **File 2: `internal/session/executor.go`**

            Define the `SessionExecutor` interface and the V1 `SerializedExecutor`:

            ```go
            package session

            import (
            	"context"
            	"sync"
            )

            // SerializedExecutor is the V1 implementation of SessionExecutor.
            // It serializes all session operations through a single mutex,
            // ensuring only one session mutates LSP state at a time.
            type SerializedExecutor struct {
            	mu sync.Mutex
            }

            // NewSerializedExecutor creates a new SerializedExecutor.
            func NewSerializedExecutor() *SerializedExecutor {
            	return &SerializedExecutor{}
            }

            // Acquire locks the executor for exclusive session access.
            func (e *SerializedExecutor) Acquire(ctx context.Context, s *SimulationSession) error {
            	e.mu.Lock()
            	return nil
            }

            // Release unlocks the executor after session operation completes.
            func (e *SerializedExecutor) Release(s *SimulationSession) {
            	e.mu.Unlock()
            }
            ```

            **File 3: `internal/session/differ.go`**

            Implement diagnostic diffing per the spec's "Diagnostic Diffing" section.

            Two diagnostics are identical if ALL of these match:
            - `Range.Start` (line + character)
            - `Range.End` (line + character)
            - `Message` (exact string)
            - `Severity` (int value)
            - `Source` (ignored if absent in either — i.e., if either has empty Source, skip Source comparison)

            Functions to implement:

            ```go
            // DiagnosticsEqual reports whether two LSP diagnostics are semantically identical.
            func DiagnosticsEqual(a, b types.LSPDiagnostic) bool

            // DiffDiagnostics computes introduced and resolved diagnostics between baseline and current.
            func DiffDiagnostics(baseline, current []types.LSPDiagnostic) (introduced, resolved []DiagnosticEntry)

            // SeverityString converts an LSP severity int to a human-readable string.
            func SeverityString(severity int) string
            ```

            `DiffDiagnostics` algorithm:
            - `introduced`: present in `current` but not matched by any in `baseline`
            - `resolved`: present in `baseline` but not matched by any in `current`
            - Use O(n*m) comparison with `DiagnosticsEqual` (n and m are typically small)
            - Convert `types.LSPDiagnostic` to `DiagnosticEntry` using 1-indexed line/col
              (add 1 to the 0-indexed LSP Range.Start positions)

            `SeverityString` mapping: 1="error", 2="warning", 3="info", 4="hint", default="unknown"

            **File 4: `internal/session/differ_test.go`**

            Test the differ thoroughly:
            - `TestDiagnosticsEqual_Match` — identical diagnostics return true
            - `TestDiagnosticsEqual_DifferentMessage` — message mismatch returns false
            - `TestDiagnosticsEqual_DifferentRange` — range mismatch returns false
            - `TestDiagnosticsEqual_SourceIgnoredWhenAbsent` — empty source on either side still matches
            - `TestDiffDiagnostics_NewErrors` — new errors appear in introduced
            - `TestDiffDiagnostics_ResolvedErrors` — removed errors appear in resolved
            - `TestDiffDiagnostics_NoChange` — identical lists produce empty slices
            - `TestDiffDiagnostics_Mixed` — some introduced, some resolved, some unchanged
            - `TestSeverityString` — all 4 severity levels map correctly

            ### Constraints
            - Do NOT import `internal/tools` — types flow the other direction
            - Do NOT create `internal/session/manager.go` — that is Agent B's file
            - Do NOT modify any files outside the ownership list
          files:
            - internal/session/types.go
            - internal/session/executor.go
            - internal/session/differ.go
            - internal/session/differ_test.go
        - id: B
          task: |
            ## Agent B: Session Manager

            ### What to implement

            Create `internal/session/manager.go` and `internal/session/manager_test.go`.
            This is the core session lifecycle engine.

            The scaffold file `internal/session/types.go` will exist before your worktree
            is created. All types (SimulationSession, SessionStatus, etc.) are defined there.
            Code against those types directly — they are in the same package `session`.

            **SessionManager struct and constructor:**

            ```go
            type SessionManager struct {
            	sessions map[string]*SimulationSession
            	executor SessionExecutor
            	resolver lsp.ClientResolver
            	mu       sync.RWMutex
            }

            func NewSessionManager(resolver lsp.ClientResolver) *SessionManager {
            	return &SessionManager{
            		sessions: make(map[string]*SimulationSession),
            		executor: NewSerializedExecutor(),
            		resolver: resolver,
            	}
            }
            ```

            **Methods to implement:**

            1. `CreateSession(ctx context.Context, workspaceRoot, language string) (string, error)`
               - Generate session ID: use `crypto/rand` to produce 16 random bytes, hex-encode.
                 ```go
                 b := make([]byte, 16)
                 if _, err := rand.Read(b); err != nil {
                 	return "", fmt.Errorf("generating session ID: %w", err)
                 }
                 id := hex.EncodeToString(b)
                 ```
               - Create `SimulationSession` with Status=StatusCreated, empty maps for Baselines,
                 Versions, Contents, Edits
               - Resolve LSP client: `m.resolver.DefaultClient()`. Return error if nil.
               - Store in sessions map under write lock
               - Log: `logging.Log(logging.LevelDebug, "session.created: "+id)`
               - Return id, nil

            2. `GetSession(sessionID string) (*SimulationSession, error)`
               - RLock, lookup, RUnlock
               - Return `fmt.Errorf("session not found: %s", sessionID)` if missing

            3. `ApplyEdit(ctx context.Context, sessionID, fileURI string, rng types.Range, newText string) (*EditResult, error)`
               - GetSession, check not terminal/dirty
               - `m.executor.Acquire(ctx, session)` / `defer m.executor.Release(session)`
               - Lazy baseline: if `session.Baselines[fileURI]` not set:
                 - Call `lsp.WaitForDiagnostics(ctx, session.Client, []string{fileURI}, 3000)`
                 - Snapshot: `session.Baselines[fileURI] = DiagnosticsSnapshot{URI: fileURI, Diagnostics: session.Client.GetDiagnostics(fileURI), Confidence: ConfidenceHigh}`
                 - Read file content from disk: parse fileURI to path, `os.ReadFile`, store in `session.Contents[fileURI]`
                 - Open the document: `session.Client.OpenDocument(ctx, fileURI, content, session.Language)`
               - Increment version: `session.Versions[fileURI]++`
               - Apply range edit in-memory: `session.Contents[fileURI] = applyRangeEdit(session.Contents[fileURI], rng, newText)`
               - Send to LSP via: `session.Client.OpenDocument(ctx, fileURI, session.Contents[fileURI], session.Language)`
                 (OpenDocument sends didChange when already open)
               - Record edit: append to `session.Edits`
               - Set `session.Status = StatusMutated`
               - Log: `logging.Log(logging.LevelDebug, fmt.Sprintf("session.edit_applied: %s file=%s version=%d", sessionID, fileURI, session.Versions[fileURI]))`
               - Return `&EditResult{SessionID: sessionID, EditApplied: true, VersionAfter: session.Versions[fileURI]}`

            4. `Evaluate(ctx context.Context, sessionID, scope string, timeoutMs int) (*EvaluationResult, error)`
               - Defaults: scope="" means "file", timeoutMs=0 means 3000 (file) or 8000 (workspace)
               - GetSession, verify status in (StatusMutated, StatusEvaluated)
               - Set `session.Status = StatusEvaluating`
               - `m.executor.Acquire` / `defer m.executor.Release`
               - Start timer: `start := time.Now()`
               - For each file in `session.Baselines`:
                 - `lsp.WaitForDiagnostics(ctx, session.Client, []string{uri}, timeoutMs)`
                 - `current := session.Client.GetDiagnostics(uri)`
                 - `introduced, resolved := DiffDiagnostics(baseline.Diagnostics, current)`
                 - Aggregate into result slices
               - `netDelta := len(allIntroduced) - len(allResolved)`
               - Determine confidence: "high" for file scope, "eventual" for workspace,
                 "partial" if WaitForDiagnostics timed out
               - `session.Status = StatusEvaluated`
               - Log evaluation complete
               - Return result with `DurationMs: time.Since(start).Milliseconds()`

            5. `SimulateChain(ctx context.Context, sessionID string, edits []ChainEdit, timeoutMs int) (*ChainResult, error)`
               - For i, edit := range edits:
                 - `m.ApplyEdit(ctx, sessionID, edit.FileURI, edit.Range, edit.NewText)`
                 - `evalResult, _ := m.Evaluate(ctx, sessionID, "file", timeoutMs)`
                 - Record ChainStepResult{Step: i+1, NetDelta: evalResult.NetDelta, ErrorsIntroduced: evalResult.ErrorsIntroduced}
               - Compute SafeToApplyThroughStep: iterate backwards from last step, find last step where NetDelta==0
               - CumulativeDelta: final NetDelta after all steps

            6. `Commit(ctx context.Context, sessionID, target string, apply bool) (*CommitResult, error)`
               - GetSession, verify status in (StatusMutated, StatusEvaluated) — not dirty, not created
               - Build workspace edit patch: map of fileURI -> content from session.Contents
               - If apply: write each file to disk via `os.WriteFile`, notify LSP
               - Set `session.Status = StatusCommitted`
               - Log `session.committed`
               - Return CommitResult

            7. `Discard(ctx context.Context, sessionID string) error`
               - GetSession, verify not terminal
               - For each file in session.Contents:
                 - Read original content from disk
                 - `session.Client.OpenDocument(ctx, fileURI, originalContent, session.Language)` to revert
                 - If error: `session.MarkDirty(err)`, return error
               - `session.Status = StatusDiscarded`
               - Log `session.discarded`

            8. `Destroy(ctx context.Context, sessionID string) error`
               - Write-lock sessions map
               - Set `session.Status = StatusDestroyed`
               - `delete(m.sessions, sessionID)`
               - Log `session.destroyed`

            **Helper function:**

            ```go
            // applyRangeEdit applies a range edit to content in-memory and returns the new content.
            func applyRangeEdit(content string, rng types.Range, newText string) string {
            	lines := strings.Split(content, "\n")
            	// ... same algorithm as LSPClient.applyEditsToFile but for a single edit
            }
            ```

            Follow the algorithm in `internal/lsp/client.go` `applyEditsToFile` method (lines 1487-1539),
            adapted for a single edit on in-memory content.

            **File 2: `internal/session/manager_test.go`**

            Unit tests:
            - `TestNewSessionManager` — verify non-nil manager created
            - `TestCreateSession_ReturnsID` — use a nil resolver (will return error for nil client)
            - `TestGetSession_NotFound` — verify error for unknown ID
            - `TestApplyRangeEdit_SingleLine` — replace text in middle of a line
            - `TestApplyRangeEdit_MultiLine` — replace across multiple lines
            - `TestApplyRangeEdit_Insert` — insert with empty range (start == end)
            - `TestApplyRangeEdit_Delete` — replace with empty newText
            - `TestSessionDirtyState_BlocksCommit` — manually set dirty, verify commit fails

            ### Constraints
            - Do NOT modify `internal/lsp/client.go` — use public OpenDocument API for didChange
            - Do NOT create `internal/session/types.go` or `internal/session/differ.go` — Agent A
            - Do NOT create `internal/tools/simulation.go` — Agent C
