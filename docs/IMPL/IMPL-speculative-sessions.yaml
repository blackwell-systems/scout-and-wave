            **Handler functions to implement:**

            All handlers follow the existing pattern in `internal/tools/`:
            - Accept `(ctx context.Context, mgr *session.SessionManager, args map[string]interface{})`
            - Return `(types.ToolResult, error)`
            - Validate arguments first, return `types.ErrorResult(...)` for bad input
            - On success, JSON-marshal the result and return `types.TextResult(string(data))`

            1. **`HandleCreateSimulationSession`**
               - Extract `workspace_root` (string, required), `language` (string, required)
               - Validate: `ValidateFilePath(workspaceRoot, "")` for path safety
               - Call `mgr.CreateSession(ctx, workspaceRoot, language)`
               - Return JSON: `{"session_id": "<id>", "status": "created"}`

            2. **`HandleSimulateEdit`**
               - Extract `session_id` (string, required)
               - Extract `file_path` (string, required) — convert to URI: `CreateFileURI(filePath)`
               - Extract range via `extractRange(args)` — returns 0-indexed types.Range
               - Extract `new_text` (string, required)
               - Call `mgr.ApplyEdit(ctx, sessionID, fileURI, rng, newText)`
               - Return JSON-marshaled `*session.EditResult`

            3. **`HandleEvaluateSession`**
               - Extract `session_id` (required)
               - Extract `scope` (optional, default "file")
               - Extract `timeout_ms` (optional int, default 0)
               - Call `mgr.Evaluate(ctx, sessionID, scope, timeoutMs)`
               - Return JSON-marshaled `*session.EvaluationResult`

            4. **`HandleSimulateChain`**
               - Extract `session_id` (required)
               - Extract `edits` (required, `[]interface{}` — array of objects)
               - Parse each edit: extract `file_path`, range fields, `new_text`
               - Convert each to `session.ChainEdit{FileURI: CreateFileURI(fp), Range: rng, NewText: text}`
               - Extract `timeout_ms` (optional)
               - Call `mgr.SimulateChain(ctx, sessionID, chainEdits, timeoutMs)`
               - Return JSON-marshaled `*session.ChainResult`

            5. **`HandleCommitSession`**
               - Extract `session_id` (required), `target` (optional string), `apply` (optional bool)
               - Call `mgr.Commit(ctx, sessionID, target, apply)`
               - Return JSON-marshaled `*session.CommitResult`

            6. **`HandleDiscardSession`**
               - Extract `session_id` (required)
               - Call `mgr.Discard(ctx, sessionID)`
               - Return JSON: `{"session_id": "<id>", "status": "discarded"}`

            7. **`HandleDestroySession`**
               - Extract `session_id` (required)
               - Call `mgr.Destroy(ctx, sessionID)`
               - Return JSON: `{"session_id": "<id>", "status": "destroyed"}`

            8. **`HandleSimulateEditAtomic`**
               - Extract all args: `workspace_root`, `language`, `file_path`, range, `new_text`,
                 optional `scope`, `timeout_ms`
               - Validate file_path
               - `sid, err := mgr.CreateSession(ctx, workspaceRoot, language)`
               - `defer mgr.Destroy(ctx, sid)`
               - `fileURI := CreateFileURI(filePath)`
               - `_, err = mgr.ApplyEdit(ctx, sid, fileURI, rng, newText)`
               - `result, err := mgr.Evaluate(ctx, sid, scope, timeoutMs)`
               - Return JSON-marshaled `*session.EvaluationResult`

