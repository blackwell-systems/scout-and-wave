title: Deep Review and Fixes for pkg/tools Package
feature_slug: tools-review-fixes
verdict: SUITABLE
suitability_assessment: |
    The pkg/tools package review is well-suited for SAW parallelization:

    1. **File decomposition**: 18 files (9 implementation + 9 test) can be split across
       multiple agents with disjoint ownership. Review work naturally decomposes into:
       - Error code standardization (hardcoded "TOOL_ALREADY_REGISTERED" → result/codes.go)
       - Test coverage improvements (0% functions: adapters, middleware helpers, Namespace, executors)
       - Dead code analysis (Namespace() method appears unused)
       - Consistency review (error handling patterns, naming conventions)

    2. **No investigation required**: Package behavior is well-documented through tests
       (45.9% coverage). All interfaces are discoverable from existing usage in
       pkg/agent/backend. ToolExecutor.Execute signature is stable.

    3. **Interface contracts**: All public methods have clear signatures. The Workshop.Register
       method already uses Result[RegisterData] correctly. ToolExecutor.Execute returns
       (string, error) intentionally — tools serialize errors as strings for AI consumption,
       not structured Result[T]. This is NOT a migration candidate.

    4. **Pre-implementation status**: pkg/tools is fully implemented and actively used by
       all agent backends (Anthropic, OpenAI, Bedrock, CLI). This is a quality/consistency
       improvement task, not new development.

    5. **Parallelization value**: Moderate. Build/test cycle is ~1-2s (Go), but agents are
       independent and review tasks are substantial enough to benefit from concurrent execution.
       Coordination value is high — IMPL doc serves as review audit trail.

    **Estimated times:**
    - Scout phase: ~10 min (review + dependency mapping + coverage analysis)
    - Agent execution: 4 agents × 10 min = ~15 min parallel (vs ~40 min sequential)
    - Merge & verification: ~3 min
    - Total SAW time: ~28 min vs ~53 min sequential baseline
    - Time savings: ~25 min (47% faster)

    **Review findings summary:**
    - TOOL_ALREADY_REGISTERED hardcoded in workshop.go:42 (should be in result/codes.go)
    - I1_VIOLATION, I2_VIOLATION, I6_VIOLATION error codes are intentional (protocol invariants)
    - Namespace() method has 0% coverage and appears unused outside pkg/tools (dead code candidate)
    - Adapter Serialize() methods have 0% coverage but are actively used (need tests)
    - TimingMiddleware, PermissionMiddleware, WithTiming, WithPermissions, ReadOnlyTools: 0% coverage
    - BashExecutor.Execute has only 18.8% coverage (git ownership checks untested)
    - EditExecutor, GlobExecutor, GrepExecutor: 0% coverage (critical file operations)
    - FileWriteExecutor: 41.7% coverage (missing error path tests)
    - Default middleware stubs (defaultOwnershipMiddleware, etc.) have 0% coverage but are expected
      (they're replaced at init time; testing them would test nothing)
