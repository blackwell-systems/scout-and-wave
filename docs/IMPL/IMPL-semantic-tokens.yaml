          ## 2. Create internal/tools/semantic_tokens.go

          Create the file with this exact content:

          ```go
          package tools

          import (
          	"context"
          	"encoding/json"
          	"fmt"

          	"github.com/blackwell-systems/lsp-mcp-go/internal/lsp"
          	"github.com/blackwell-systems/lsp-mcp-go/internal/types"
          )

          // HandleGetSemanticTokens retrieves semantic tokens for a range in a document.
          // Uses textDocument/semanticTokens/range (or full as fallback).
          // Returns an array of SemanticToken objects with 1-based positions and
          // human-readable token type and modifier names.
          func HandleGetSemanticTokens(ctx context.Context, client *lsp.LSPClient, args map[string]interface{}) (types.ToolResult, error) {
          	if err := CheckInitialized(client); err != nil {
          		return types.ErrorResult(err.Error()), nil
          	}

          	filePath, ok := args["file_path"].(string)
          	if !ok || filePath == "" {
          		return types.ErrorResult("file_path is required"), nil
          	}

          	rng, err := extractRange(args)
          	if err != nil {
          		return types.ErrorResult(err.Error()), nil
          	}

          	languageID, _ := args["language_id"].(string)
          	if languageID == "" {
          		languageID = "plaintext"
          	}

          	tokens, wErr := WithDocument[[]types.SemanticToken](ctx, client, filePath, languageID, func(fileURI string) ([]types.SemanticToken, error) {
          		return client.GetSemanticTokens(ctx, fileURI, rng)
          	})
          	if wErr != nil {
          		return types.ErrorResult(fmt.Sprintf("get_semantic_tokens: %s", wErr)), nil
          	}

          	if len(tokens) == 0 {
          		return types.TextResult("No semantic tokens found in the specified range. The language server may not support semantic tokens, or there are no tokens in this range."), nil
          	}

          	data, mErr := json.Marshal(tokens)
          	if mErr != nil {
          		return types.ErrorResult(fmt.Sprintf("marshaling semantic tokens: %s", mErr)), nil
          	}
          	return types.TextResult(string(data)), nil
          }
          ```

          ## 3. Create internal/tools/semantic_tokens_test.go

          Create the file with the following unit tests. Tests follow the same
          patterns as `internal/tools/tools_test.go` — nil client returns IsError,
          validation errors surface as IsError (not Go errors), helper functions
          tested directly.

          ```go
          package tools

          import (
          	"context"
          	"testing"
          )

          // TestHandleGetSemanticTokens_NilClient verifies that a nil client returns
          // IsError=true without panicking.
          func TestHandleGetSemanticTokens_NilClient(t *testing.T) {
          	ctx := context.Background()
          	args := map[string]interface{}{
          		"file_path":    "/some/file.go",
          		"start_line":   float64(1),
          		"start_column": float64(1),
          		"end_line":     float64(10),
          		"end_column":   float64(1),
          	}
          	result, err := HandleGetSemanticTokens(ctx, newNilClient(), args)
          	if err != nil {
          		t.Fatalf("unexpected Go error: %v", err)
          	}
          	if !result.IsError {
          		t.Errorf("expected IsError=true for nil client, got false; text: %s", result.Content[0].Text)
          	}
          }

          // TestHandleGetSemanticTokens_MissingFilePath verifies that an empty file_path
          // returns IsError=true (validation fires before client check if client is nil,
          // but nil client fires first; test via nil client path is sufficient to verify
          // the handler returns ErrorResult not a Go error).
          func TestHandleGetSemanticTokens_MissingFilePath(t *testing.T) {
          	ctx := context.Background()
          	args := map[string]interface{}{
          		"start_line":   float64(1),
          		"start_column": float64(1),
          		"end_line":     float64(10),
          		"end_column":   float64(1),
          	}
          	result, err := HandleGetSemanticTokens(ctx, newNilClient(), args)
          	if err != nil {
          		t.Fatalf("unexpected Go error: %v", err)
          	}
          	if !result.IsError {
          		t.Errorf("expected IsError=true, got false")
          	}
          }

          // TestHandleGetSemanticTokens_InvalidRange verifies that start_line > end_line
          // is rejected. Uses nil client (CheckInitialized fires first) to confirm
          // no panic. Range validation is separately tested via extractRange.
          func TestHandleGetSemanticTokens_InvalidRange(t *testing.T) {
          	ctx := context.Background()
          	args := map[string]interface{}{
          		"file_path":    "/some/file.go",
          		"start_line":   float64(10),
          		"start_column": float64(1),
          		"end_line":     float64(5),
          		"end_column":   float64(1),
          	}
          	result, err := HandleGetSemanticTokens(ctx, newNilClient(), args)
          	if err != nil {
          		t.Fatalf("unexpected Go error: %v", err)
          	}
          	if !result.IsError {
          		t.Errorf("expected IsError=true for nil client, got false")
          	}
          }
          ```

