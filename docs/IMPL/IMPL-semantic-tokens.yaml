          ```go
          // SemanticToken is a single decoded semantic token returned by get_semantic_tokens.
          // Line and Character are 1-based, matching this server's position convention.
          // TokenType is a human-readable name (e.g., "function", "variable", "keyword").
          // Modifiers is the list of active modifier names (e.g., ["readonly", "static"]).
          type SemanticToken struct {
          	Line      int      `json:"line"`
          	Character int      `json:"character"`
          	Length    int      `json:"length"`
          	TokenType string   `json:"tokenType"`
          	Modifiers []string `json:"modifiers"`
          }
