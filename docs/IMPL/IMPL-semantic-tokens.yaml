title: 'Semantic Tokens MCP Tool for lsp-mcp-go'
feature_slug: semantic-tokens
verdict: SUITABLE
suitability_assessment: |
  This feature adds a single new MCP tool (get_semantic_tokens) backed by two
  new files and modifications to two existing files. The work decomposes cleanly
  into two independent parallel tasks with a thin integration wave:

  1. Agent A owns the LSP client change (adding legend storage + GetSemanticTokens
     method to internal/lsp/client.go).
  2. Agent B owns the new tool handler (internal/tools/semantic_tokens.go) and its
     unit tests (internal/tools/semantic_tokens_test.go). Agent B defines the
     SemanticToken type in internal/types/types.go.
  3. Wave 2 (integration) wires the new handler into cmd/lsp-mcp-go/server.go
     and updates the tool-count comment.

  File decomposition: disjoint — client.go (A), types.go (B), new handler file (B),
  new test file (B), server.go (integration wave).

  Interface discoverability: the contract between A and B is a single method
  signature on LSPClient. This is fully specifiable before implementation begins.

  Parallelization value: Both agents have non-trivial logic. Agent A must decode
  the semanticTokensProvider capability correctly (bool | object | absent) and
  store the legend under a new mutex-protected field. Agent B must implement the
  delta-encoding decoder (5-integer tuples) and format output. Build+test cycles
  for Go are fast (~5s), but the implementation tasks themselves are 15-20 min
  each, making parallel execution worthwhile.

  Estimated times:
  - Scout phase: ~15 min (complete)
  - Agent execution: ~20 min (2 parallel agents × ~20 min avg)
  - Integration wave: ~10 min (1 agent, server.go wiring)
  - Merge and verification: ~5 min
  Total SAW time: ~50 min

  Sequential baseline: ~60 min (3 tasks × ~20 min)
  Time savings: ~10 min (modest, coordination value is primary benefit here)

  Recommendation: Clear speedup for agent execution phase; coordination value
  high due to interface contract between client and tool layers.

