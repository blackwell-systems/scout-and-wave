pre_mortem:
  overall_risk: low
  rows:
    - scenario: |-
        Agent A places SemanticToken struct definition in client.go or types.go
        instead of leaving it for Agent B, causing duplicate declaration at merge.
      likelihood: medium
      impact: high
      mitigation: |-
        The scaffold pre-defines SemanticToken in types.go. Agent A's brief
        explicitly prohibits defining the struct and instructs the agent to
        reference types.SemanticToken as if it exists. The scaffold resolves the
        compile-time dependency.

    - scenario: |-
        The capability check logic is wrong: semanticTokensProvider can be bool
        (true), a full options object, or absent. If Agent A only handles the
        object case, servers that return `semanticTokensProvider: true` will
        silently return empty tokens because GetSemanticTokens returns early.
      likelihood: medium
      impact: medium
      mitigation: |-
        Agent A's brief includes the switch statement that handles both `bool`
        and `map[string]interface{}` cases. The bool case falls back to full
        (not range). The brief is explicit about this logic.

    - scenario: |-
        Delta-decoding bug: when deltaLine > 0, prevChar must reset to deltaChar
        (absolute on the new line), not increment from the previous character.
        A naive implementation that always does prevChar += deltaChar produces
        wrong absolute positions.
      likelihood: medium
      impact: high
      mitigation: |-
        Agent A's brief provides the complete decodeSemanticTokens implementation
        verbatim, including the if/else branch on deltaLine. No re-implementation
        is needed.

    - scenario: |-
        Agent C's server.go registration fails to compile because types.SemanticToken
        or HandleGetSemanticTokens are not yet merged when Agent C runs (integration
        wave runs after Wave 1 merges, so this should not occur — but if Wave 1
        merge is partial, it will).
      likelihood: low
      impact: medium
      mitigation: |-
        Wave 2 is an integration wave that runs only after Wave 1 completes and
        merges. The orchestrator enforces this sequencing.

    - scenario: |-
        Legend is populated but has wrong structure because gopls returns
        semanticTokensProvider as a nested object where the legend is at
        capabilities.semanticTokensProvider.legend (not at the top level).
        Agent A must handle both shapes.
      likelihood: medium
      impact: medium
      mitigation: |-
        Agent A's brief handles both shapes: it tries `legend.Legend.TokenTypes`
        first (the nested case) and falls back to `legend.TokenTypes` (the
        flat case). The JSON struct in the brief covers both layouts.

known_issues:
  - title: validate_briefs false positives on cross-repo IMPL
    description: |-
      finalize-scout validate_briefs reports false positives for Agents A and C.
      Two categories: (1) symbols that exist in the target files (Initialize, LSPClient,
      requestTimeouts, getCapabilityRaw, initParams, Run, CallHierarchyArgs) cannot be
      found because this is a cross-repo IMPL and paths resolve under LSP-MCP-GO, not
      scout-and-wave. Manual verification confirms all symbols exist. (2) New symbols
      to be created (decodeSemanticTokens, SemanticToken, GetSemanticTokensArgs,
      get_semantic_tokens) do not exist yet by design. The IMPL doc is correct.
      This is a known tool limitation on cross-repo IMPLs.
