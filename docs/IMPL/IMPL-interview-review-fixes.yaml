      definition: |-
        // StartData holds the result payload returned by Manager.Start.
        type StartData struct {
            Doc      *InterviewDoc
            Question *InterviewQuestion
        }
      location: pkg/interview/types.go
    - name: ResumeData
      description: Return payload for Manager.Resume, defined in pkg/interview/types.go.
      definition: |-
        // ResumeData holds the result payload returned by Manager.Resume.
        type ResumeData struct {
            Doc      *InterviewDoc
            Question *InterviewQuestion // nil when Status == "complete"
        }
      location: pkg/interview/types.go
    - name: AnswerData
      description: Return payload for Manager.Answer, defined in pkg/interview/types.go.
      definition: |-
        // AnswerData holds the result payload returned by Manager.Answer.
        type AnswerData struct {
            Doc      *InterviewDoc
            Question *InterviewQuestion // nil when PhaseComplete reached
        }
      location: pkg/interview/types.go
    - name: CompileData
      description: Return payload for Manager.Compile, defined in pkg/interview/types.go.
      definition: |-
        // CompileData holds the result payload returned by Manager.Compile.
        type CompileData struct {
            OutputPath string
        }
      location: pkg/interview/types.go
    - name: SaveDocData
      description: Moved from deterministic.go to types.go alongside other public types.
      definition: |-
        // SaveDocData holds metadata returned from a successful Save call.
        type SaveDocData struct {
            DocPath   string
            Timestamp time.Time
        }
      location: pkg/interview/types.go
    - name: WriteReqData
      description: Moved from compiler.go to types.go alongside other public types.
      definition: |-
        // WriteReqData holds metadata returned from a successful WriteRequirementsFile call.
        type WriteReqData struct {
            OutputPath string
            LineCount  int
        }
      location: pkg/interview/types.go
    - name: Manager
      description: |-
        Updated Manager interface — all four methods now return result.Result[T].
        Save already returns result.Result[SaveDocData] and is unchanged.
      definition: |-
        // Manager is the interface for the interview state machine.
        type Manager interface {
            Start(cfg InterviewConfig) result.Result[StartData]
            Resume(docPath string) result.Result[ResumeData]
            Answer(doc *InterviewDoc, answer string) result.Result[AnswerData]
            Compile(doc *InterviewDoc, outputPath string) result.Result[CompileData]
            Save(doc *InterviewDoc, docPath string) result.Result[SaveDocData]
        }
      location: pkg/interview/types.go
    - name: CompileToRequirements
      description: Converted from (string, error) to result.Result[string].
      definition: func CompileToRequirements(doc *InterviewDoc) result.Result[string]
      location: pkg/interview/compiler.go
