      definition: CodeInterviewSaveFailed = "N089_INTERVIEW_SAVE_FAILED"
      location: pkg/result/codes.go
    - name: CodeRequirementsWriteFailed
      description: New constant N090 in pkg/result/codes.go for requirements write failure.
      definition: CodeRequirementsWriteFailed = "N090_REQUIREMENTS_WRITE_FAILED"
      location: pkg/result/codes.go
