# Pre-Mortem
pre_mortem:
  overall_risk: medium
  rows:
    - scenario: "Scaffold file (program_types.go) has wrong field tags or types"
      likelihood: medium
      impact: high
      mitigation: |
        Scaffold contents are derived directly from the design doc Section 3.1
        schema. Wave 2 agents will catch compilation errors immediately.
        Scaffold Agent can be re-run if needed.
    - scenario: "Planner agent prompt is too long for model context"
      likelihood: low
      impact: medium
      mitigation: |
        The planner.md prompt includes a full example manifest which adds bulk.
        If context is an issue, the example can be truncated. The PROGRAM manifest
        schema doc (Agent A) serves as the canonical reference.
    - scenario: "Validation rules miss edge cases in P1 enforcement"
      likelihood: medium
      impact: low
      mitigation: |
        P1 validation is straightforward graph analysis (check depends_on within
        same tier). Test suite covers the key scenarios. Additional edge cases
        can be added in Phase 2 when tier execution exercises validation.
    - scenario: "saw-skill.md merge conflict with concurrent protocol changes"
      likelihood: medium
      impact: low
      mitigation: |
        Agent H only appends new sections to saw-skill.md. Append-only changes
        are low-conflict. If concurrent changes land first, the merge is
        straightforward.

