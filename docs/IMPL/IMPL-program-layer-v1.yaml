# Waves
waves:
  - number: 1
    agents:
      - id: A
        task: |
          ## What to Implement

          Create `protocol/program-manifest.md` — the canonical schema specification
          for the PROGRAM manifest YAML format. This is the protocol-level reference
          that the Go SDK implements against.

          ## Content to Write

          Document the full PROGRAM manifest schema as specified in Section 3.1 of
          `docs/program-layer-roadmap.md`. The doc must cover:

          1. **File location convention:** `docs/PROGRAM-<name>.yaml`
          2. **Top-level fields:** title, program_slug, state, created, updated, requirements
          3. **program_contracts section:** Full schema for cross-IMPL interface contracts
             including name, description, definition, consumers (impl + usage), location, freeze_at
          4. **impls section:** Schema for IMPL entries including slug, title, tier,
             depends_on, estimated_agents, estimated_waves, key_outputs, status
          5. **tiers section:** Schema for tier groupings (number, impls array, description)
          6. **tier_gates section:** Reuses existing QualityGate schema from IMPL docs
          7. **completion section:** tiers_complete, tiers_total, impls_complete, impls_total,
             total_agents, total_waves
          8. **pre_mortem section:** Reuses existing PreMortemRow schema from IMPL docs
          9. **State enum values:** PLANNING, VALIDATING, REVIEWED, SCAFFOLD,
             TIER_EXECUTING, TIER_VERIFIED, COMPLETE, BLOCKED, NOT_SUITABLE
          10. **IMPL status enum values:** pending, scouting, reviewed, executing, complete

          Include a full example manifest (use the example from the design doc Section 3.1).

          Document the relationship between PROGRAM manifests and IMPL docs:
          - PROGRAM manifest references IMPL docs by slug
          - IMPL docs are produced by Scout agents, not the Planner
          - Tiers are analogous to waves (same-tier IMPLs execute in parallel)

          ## Style and Format

          Follow the existing protocol doc style in `protocol/invariants.md` and
          `protocol/state-machine.md`:
          - Start with a title and version number (0.1.0)
          - Use markdown with clear section headers
          - Include tables for field reference
          - Cross-reference related docs (invariants, state machine, participants)

          ## Verification Gate
          - File exists and is valid markdown
          - Contains all 10 content items listed above
          - Example manifest is syntactically valid YAML

          ## Constraints
          - Do NOT define invariants (that is Agent B's job)
          - Do NOT modify any existing protocol docs
          - Reference the design doc but do not duplicate its prose verbatim
        files:
          - protocol/program-manifest.md

      - id: B
        task: |
          ## What to Implement

          Create `protocol/program-invariants.md` — the formal specification of
          program-level invariants P1-P4 as defined in Section 6 of
          `docs/program-layer-roadmap.md`.

          ## Content to Write

          Define four invariants following the structure of `protocol/invariants.md`:

          **P1: IMPL Independence Within a Tier**
          - Formal statement: No two IMPLs in the same tier may have a dependency relationship
          - Enforcement: Planner defines tiers; Orchestrator validates no IMPL in tier N
            has depends_on referencing an IMPL also in tier N
          - Rationale: Same principle as I1 but at IMPL level
          - Related rules: reference future E-numbers for program execution

          **P2: Program Contracts Precede Tier Execution**
          - All cross-IMPL types must be defined, materialized as code, and frozen
            before any Scout in the consuming tier begins
          - Extension of I2 to program level
          - Enforcement: Orchestrator verifies program contract files exist and are
            committed before launching Scouts

          **P3: Tier Sequencing**
          - Tier N+1 does not begin until all Tier N IMPLs complete, tier gates pass,
            and program contracts freeze
          - Extension of I3 to program level

          **P4: PROGRAM Manifest is Source of Truth**
          - Single source of truth for IMPL ordering, cross-IMPL dependencies,
            program contracts, and tier completion status
          - Extension of I4 to program level

          For each invariant include: formal statement, enforcement mechanism,
          rationale, and cross-references to existing I1-I6 invariants and the
          program manifest schema doc.

          **Enforcement mechanisms must be concrete and mechanical:**
          - P1: `ValidateProgram()` checks depends_on within same tier; Planner
            correction loop (like E16 for Scout) retries up to 3 times on P1 violation
          - P2: Orchestrator verifies program contract scaffold files are committed
            before launching any Scout in consuming tier (analogous to scaffold
            check before worktree creation)
          - P3: Orchestrator checks all Tier N IMPL states == "complete" and
            tier gate commands pass before advancing to Tier N+1
          - P4: Orchestrator reads PROGRAM manifest for all tier/IMPL ordering
            decisions; never infers from IMPL docs alone

          Program-level execution rules (E27+) are deferred to Phase 2.
          Phase 1 defines invariants only; enforcement is documented so Phase 2
          implementors know exactly what to build.

          Add a "Relationship to IMPL-Level Invariants" section showing the mapping:
          P1 maps to I1, P2 maps to I2, P3 maps to I3, P4 maps to I4.

          ## Verification Gate
          - File exists and is valid markdown
          - All four invariants P1-P4 are defined with formal statements
          - Cross-references to protocol/invariants.md are present

          ## Constraints
          - Do NOT modify protocol/invariants.md (that file covers I1-I6 only)
          - Do NOT define the PROGRAM manifest schema (that is Agent A's job)
          - Follow the existing invariant document structure exactly
        files:
          - protocol/program-invariants.md

      - id: C
        task: |
          ## What to Implement

          Update two existing protocol docs to reference the Program Layer:

          **1. protocol/participants.md — Add Planner role**

          Add a new "## Planner" section after the Integration Agent section,
          following the exact structure of existing participant definitions. Include:

          - **Execution mode:** Asynchronous
          - **Responsibilities:** Analyzes REQUIREMENTS.md and existing codebase,
            identifies feature boundaries, defines cross-feature dependencies and
            program contracts, produces PROGRAM manifest. A "super-Scout" at project
            scope rather than feature scope.
          - **Required capabilities:** Read requirements + source, analyze project
            structure, identify cross-feature deps, define program contracts,
            produce PROGRAM manifest, run program-level suitability assessment
          - **Forbidden actions:** Write IMPL docs, write source code, launch agents,
            modify existing source files
          - Update the opening sentence count from "five" to "six" participant roles
          - Update the I6 section to mention the Planner role

          **2. protocol/state-machine.md — Add Program states reference**

          Add a new section "## Program State Machine" at the end (before References)
          that briefly describes the program-level states and points to
          `protocol/program-invariants.md` for full invariant definitions. Include:

          - List of program states: PROGRAM_PLANNING, PROGRAM_VALIDATING,
            PROGRAM_REVIEWED, PROGRAM_SCAFFOLD, TIER_EXECUTING, TIER_VERIFIED,
            PROGRAM_COMPLETE, PROGRAM_BLOCKED, PROGRAM_NOT_SUITABLE
          - Note that these are an outer loop containing the existing IMPL state machine
          - State that full program execution rules will be defined in Phase 2
          - Cross-reference protocol/program-manifest.md and protocol/program-invariants.md

          ## Interfaces to Call
          - Read existing protocol/participants.md for current structure
          - Read existing protocol/state-machine.md for current structure

          ## Verification Gate
          - Both files parse as valid markdown
          - Planner section exists in participants.md with all required subsections
          - Program State Machine section exists in state-machine.md
          - Participant count updated from "five" to "six"

          ## Constraints
          - Do NOT remove or rewrite existing content — only ADD new sections
          - Preserve all existing cross-references
          - Follow the exact formatting patterns of existing sections
          - The Planner section must match the structure of Scout/Wave Agent sections
        files:
          - protocol/participants.md
          - protocol/state-machine.md

      - id: D
        task: |
          ## What to Implement

          Create `implementations/claude-code/prompts/agents/planner.md` — the
          Planner agent system prompt following the 9-field agent template format
          used by existing agent prompts.

          ## Content to Write

          The Planner agent prompt must follow the same structure as
          `implementations/claude-code/prompts/agents/scout.md` but adapted for
          project-level decomposition:

          **Role and Identity:**
          - "You are the Planner agent for Scout-and-Wave"
          - Your job is to decompose a project into features (IMPL docs) organized
            into tiers for parallel execution

          **Input:**
          - REQUIREMENTS.md (or project description)
          - Existing codebase (for refactors)
          - Optional CONTEXT.md

          **Output:**
          - PROGRAM manifest at `docs/PROGRAM-<name>.yaml`

          **Suitability Gate (program-level):**
          Answer 4 questions before producing the manifest:
          1. Feature independence: Can the project decompose into 3+ features?
          2. Tier depth: Are there at least 2 tiers?
          3. Shared types: Are there cross-feature types needing formal contracts?
          4. Scale justification: Is total estimated work >8 agents?

          Verdicts: PROGRAM_SUITABLE, SINGLE_IMPL_SUFFICIENT, NOT_DECOMPOSABLE

          **PROGRAM Manifest Production:**
          - Identify natural feature boundaries (packages, services, layers)
          - Define cross-IMPL dependencies
          - Group into tiers (independent features in same tier)
          - Define program contracts for shared types
          - Estimate agent count and wave count per IMPL
          - Define tier gates

          **Constraints:**
          - Do NOT write IMPL docs (Scout does that)
          - Do NOT write source code
          - Do NOT launch agents
          - PROGRAM manifest is a roadmap, not an executor (Level A)
          - Follow invariants P1-P4

          Reference existing agent prompts for formatting style. The prompt should
          be self-contained — a model receiving it should be able to produce a valid
          PROGRAM manifest without external docs.

          ## Verification Gate
          - File exists and is valid markdown
          - Contains suitability gate with 4 questions and 3 verdicts
          - Contains PROGRAM manifest schema reference
          - Contains constraints section with forbidden actions

          ## Constraints
          - Follow the formatting style of existing agent prompts in the same directory
          - Do NOT modify any existing agent prompt files
          - The prompt must reference P1-P4 by number
          - Include a full example PROGRAM manifest in the prompt
        files:
          - implementations/claude-code/prompts/agents/planner.md

  - number: 2
    agents:
      - id: E
        task: |
          ## What to Implement

          Create `pkg/protocol/program_validation.go` and its test file — the
          validation logic for PROGRAM manifests, analogous to the existing
          `pkg/protocol/validation.go` for IMPL manifests.

          ## Interfaces to Implement

          ```go
          func ValidateProgram(manifest *PROGRAMManifest) []ValidationError
          ```

          ## Validation Rules

          Implement the following checks:

          1. **Required fields:** title, program_slug, state must be non-empty
          2. **State enum:** Must be one of the ProgramState constants
          3. **IMPL status enum:** Each impl.Status must be one of:
             pending, scouting, reviewed, executing, complete
          4. **P1 enforcement — IMPL independence within a tier:**
             For each tier, verify no IMPL in the tier has depends_on referencing
             another IMPL in the same tier. Return a ValidationError with
             code "P1_VIOLATION" if found.
          5. **Tier-IMPL consistency:** Every IMPL slug must appear in exactly one tier.
             Every tier must reference only IMPLs defined in the impls section.
          6. **Dependency validity:** All depends_on references must point to
             existing IMPL slugs.
          7. **Tier ordering:** If IMPL-A depends on IMPL-B, A's tier must be
             strictly greater than B's tier.
          8. **Program contract consumers:** Each consumer.Impl must reference
             an existing IMPL slug.
          9. **Slug format:** program_slug and impl slugs must be kebab-case
             (lowercase letters, digits, hyphens only).
          10. **Completion bounds:** tiers_complete <= tiers_total,
              impls_complete <= impls_total.

          ## Tests to Write

          1. TestValidateProgram_ValidManifest - valid manifest returns no errors
          2. TestValidateProgram_MissingRequiredFields - empty title/slug/state
          3. TestValidateProgram_InvalidState - unknown state string
          4. TestValidateProgram_P1Violation - same-tier dependency
          5. TestValidateProgram_TierIMPLMismatch - IMPL not in any tier
          6. TestValidateProgram_InvalidDependency - depends_on nonexistent IMPL
          7. TestValidateProgram_TierOrderViolation - dep in same or later tier
          8. TestValidateProgram_InvalidConsumer - consumer references unknown IMPL
          9. TestValidateProgram_InvalidSlugFormat - uppercase or special chars
          10. TestValidateProgram_CompletionBounds - complete > total

