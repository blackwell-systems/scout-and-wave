    description: |
      Core Go struct representing the PROGRAM manifest. Defined in scaffold.
      All Wave 2 and Wave 3 agents depend on this type.
    definition: |
      See scaffold file pkg/protocol/program_types.go for full definition.
      Key types: PROGRAMManifest, ProgramState, ProgramContract,
      ProgramIMPL, ProgramTier, ProgramCompletion.
    location: "pkg/protocol/program_types.go"

  - name: ValidateProgram
    description: |
      Validates a PROGRAMManifest against the schema rules including
      P1 (IMPL independence within tier) and tier ordering correctness.
    definition: |
      func ValidateProgram(manifest *PROGRAMManifest) []ValidationError
    location: "pkg/protocol/program_validation.go"

  - name: ParseProgramManifest
    description: |
      Parses a PROGRAM YAML file from disk into a PROGRAMManifest struct.
    definition: |
      func ParseProgramManifest(path string) (*PROGRAMManifest, error)
    location: "pkg/protocol/program_parser.go"

  - name: ListPrograms
    description: |
      Discovers PROGRAM manifest files in a directory.
    definition: |
      func ListPrograms(dir string) ([]ProgramDiscovery, error)

      type ProgramDiscovery struct {
        Path    string       `json:"path"`
        Slug    string       `json:"slug"`
        State   ProgramState `json:"state"`
        Title   string       `json:"title"`
      }
    location: "pkg/protocol/program_discovery.go"

