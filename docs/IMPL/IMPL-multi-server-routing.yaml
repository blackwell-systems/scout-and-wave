interface_contracts:
  - name: ClientResolver
    description: |-
      Interface for routing tool calls to the right LSPClient by file path.
      Defined in scaffold internal/lsp/resolver.go. Used by server.go (Agent C)
      and main.go (Agent B). Implemented by ServerManager (Agent A).
    definition: |
      type ClientResolver interface {
          ClientForFile(filePath string) *LSPClient
          DefaultClient() *LSPClient
          AllClients() []*LSPClient
          Shutdown(ctx context.Context) error
      }
    location: internal/lsp/resolver.go

  - name: ServerManager
    description: |-
      Implements ClientResolver. Holds a slice of managedClient entries with
      their extension sets. Created by Agent A in internal/lsp/manager.go.
      Used by main.go (Agent B) after config parsing.
    definition: |
      // NewSingleServerManager wraps a single *LSPClient to satisfy ClientResolver.
      // Used for the legacy single-server invocation mode.
      func NewSingleServerManager(client *LSPClient) *ServerManager

      // NewMultiServerManager creates a ServerManager from multiple ServerEntry
      // configs. Does NOT start servers — deferred to StartAll.
      func NewMultiServerManager(entries []config.ServerEntry) *ServerManager

      // StartAll starts all configured LSP servers with the given root directory.
      // Called from start_lsp tool handler in multi-server mode, or from main
      // after initialization.
      func (m *ServerManager) StartAll(ctx context.Context, rootDir string) error

      // ClientForFile satisfies ClientResolver. Routes by filepath.Ext.
      // Falls back to DefaultClient if extension is not mapped.
      func (m *ServerManager) ClientForFile(filePath string) *LSPClient

      // DefaultClient returns the first managed client (index 0).
      func (m *ServerManager) DefaultClient() *LSPClient

      // AllClients returns all non-nil client pointers.
      func (m *ServerManager) AllClients() []*LSPClient

      // Shutdown gracefully shuts down all managed LSP clients.
      func (m *ServerManager) Shutdown(ctx context.Context) error
    location: internal/lsp/manager.go

  - name: ParseArgs
    description: |-
      Parses command-line arguments into ParseResult. Handles three modes:
      legacy, multi-arg, and config file. Defined in config/parse.go by Agent A.
    definition: |
      // ParseResult holds the outcome of argument parsing.
      type ParseResult struct {
          // Single-server fields (backward compat)
          IsSingleServer bool
          LanguageID     string
          ServerPath     string
          ServerArgs     []string

          // Multi-server field
          Config *Config
      }

      // ParseArgs parses os.Args[1:].
      // Mode 1 — legacy: lsp-mcp-go <language-id> <binary> [args...]
      //   Detected when len>=2 AND args[0] contains no ":"
      // Mode 2 — multi-arg: lsp-mcp-go go:gopls typescript:tsserver,--stdio
      //   Detected when args[0] contains ":"
      // Mode 3 — config file: lsp-mcp-go --config /path/to/lsp-mcp.json
      func ParseArgs(args []string) (ParseResult, error)

      // LoadConfig reads and parses a JSON config file.
      // Format: {"servers": [{"extensions":["go"],"command":["gopls"]}]}
      func LoadConfig(path string) (*Config, error)
    location: internal/config/parse.go

  - name: Run
    description: |-
      MCP server entry point in server.go. Signature changes from *lsp.LSPClient
      to lsp.ClientResolver. Agent C updates the declaration; Agent B updates
      the call site in main.go.
    definition: |
      // Old signature (to be replaced by Agent C):
      // func Run(ctx context.Context, lspClient *lsp.LSPClient, registry *extensions.ExtensionRegistry, serverPath string, serverArgs []string) error

      // New signature:
      func Run(ctx context.Context, resolver lsp.ClientResolver, registry *extensions.ExtensionRegistry, serverPath string, serverArgs []string) error
    location: cmd/lsp-mcp-go/server.go

waves:
  - number: 1
    agents:
      - id: A
        task: |
          ## Agent A: ServerManager + Config Parsing

          ### Context
          You are implementing the core multi-server infrastructure for lsp-mcp-go.
          Two scaffold files already exist (created by Scaffold Agent before your
          worktree opened):
          - /Users/dayna.blackwell/code/LSP-MCP-GO/internal/lsp/resolver.go
            Contains the ClientResolver interface.
          - /Users/dayna.blackwell/code/LSP-MCP-GO/internal/config/config.go
            Contains ServerEntry and Config types.

          Reference implementations (read-only, do not modify):
          - /Users/dayna.blackwell/code/competitors/lsp-mcp/src/lsp-manager.ts — extensionToLsp map pattern
          - /Users/dayna.blackwell/code/competitors/mcp-lsp-bridge/lsp_config.example.json — comprehensive extension_language_map
          - /Users/dayna.blackwell/code/competitors/cclsp/src/language-servers.ts — extensions per server entry

          ### Files to create
          - /Users/dayna.blackwell/code/LSP-MCP-GO/internal/lsp/manager.go
          - /Users/dayna.blackwell/code/LSP-MCP-GO/internal/config/parse.go

          Also create test files:
          - /Users/dayna.blackwell/code/LSP-MCP-GO/internal/lsp/manager_test.go
          - /Users/dayna.blackwell/code/LSP-MCP-GO/internal/config/parse_test.go

          ### internal/lsp/manager.go — package lsp

          Implement `ServerManager` which satisfies `ClientResolver` (already defined
          in resolver.go).

          ```go
          package lsp

          import (
              "context"
              "fmt"
              "path/filepath"
              "strings"
              "sync"

              "github.com/blackwell-systems/lsp-mcp-go/internal/config"
              "github.com/blackwell-systems/lsp-mcp-go/internal/logging"
          )

          type ServerManager struct {
              mu      sync.RWMutex
              entries []*managedEntry
          }

          type managedEntry struct {
              client     *LSPClient
              extensions map[string]bool // lowercase, no dot; e.g. "go", "ts", "tsx"
              languageID string
              // preserved for StartAll
              command []string
          }
          ```

          Implement:
          - `NewSingleServerManager(client *LSPClient) *ServerManager`
            Creates one managedEntry with empty extensions (matches any file — fallback).
          - `NewMultiServerManager(entries []config.ServerEntry) *ServerManager`
            For each entry: builds extensions map (lowercase, strip leading dot if present),
            infers languageID via InferLanguageID(entry) if entry.LanguageID is empty.
            Sets entry.command = entry.Command. Does NOT call NewLSPClient yet.
          - `(m *ServerManager) StartAll(ctx context.Context, rootDir string) error`
            For each managedEntry: NewLSPClient(e.command[0], e.command[1:]),
            Initialize(ctx, rootDir), store in e.client.
            Returns first error.
          - `(m *ServerManager) ClientForFile(filePath string) *LSPClient`
            ext := strings.TrimPrefix(strings.ToLower(filepath.Ext(filePath)), ".")
            Iterates entries: returns first e.client where e.extensions[ext] is true.
            Falls back to DefaultClient() if no match (or empty ext).
          - `(m *ServerManager) DefaultClient() *LSPClient`
            Returns m.entries[0].client if len > 0, else nil.
          - `(m *ServerManager) AllClients() []*LSPClient`
            Returns non-nil clients from all entries.
          - `(m *ServerManager) Shutdown(ctx context.Context) error`
            Calls Shutdown on each non-nil client; returns last error.

          Also add unexported helper:
          ```go
          // InferLanguageID returns a reasonable language ID from the server entry.
          // If LanguageID is set, return it. Otherwise use Extensions[0] or "unknown".
          // Mapping follows mcp-lsp-bridge convention:
          // "ts" -> "typescript", "tsx" -> "typescript", "js" -> "javascript",
          // "jsx" -> "javascript", "py" -> "python", "rs" -> "rust",
          // "hs" -> "haskell", "lhs" -> "haskell", "rb" -> "ruby",
          // "cs" -> "csharp", "kt" -> "kotlin", "kts" -> "kotlin",
          // "ml" -> "ocaml", "mli" -> "ocaml" — everything else returns ext as-is.
          func inferLanguageID(entry config.ServerEntry) string
          ```

          ### internal/config/parse.go — package config

          Implement `ParseResult`, `ParseArgs`, and `LoadConfig`.

          `ParseArgs(args []string) (ParseResult, error)`:
          1. len(args) == 0: return error with usage message
          2. args[0] == "--config": LoadConfig(args[1]); return ParseResult{Config: cfg}
          3. len(args) >= 2 AND !strings.Contains(args[0], ":"): legacy mode.
             Return ParseResult{IsSingleServer: true, LanguageID: args[0],
             ServerPath: args[1], ServerArgs: args[2:]}.
             Validate ServerPath exists with os.Stat.
          4. Otherwise: multi-arg mode. Each arg is "language-id:binary,arg1,arg2...".
             Split on first ":" to get languageID and rest.
             Split rest on "," for command (command[0] = binary, rest = args).
             Use the built-in extension map from mcp-lsp-bridge to assign extensions
             based on languageID:
               go -> ["go"]
               typescript -> ["ts","tsx"]
               javascript -> ["js","jsx","mjs","cjs"]
               python -> ["py","pyw"]
               rust -> ["rs"]
               java -> ["java"]
               cpp -> ["cpp","cc","cxx","c++","hpp","hxx"]
               c -> ["c","h"]
               csharp -> ["cs","csx"]
               ruby -> ["rb","rake","gemspec"]
               php -> ["php","phtml"]
               swift -> ["swift"]
               kotlin -> ["kt","kts"]
               lua -> ["lua"]
               haskell -> ["hs","lhs"]
               ocaml -> ["ml","mli"]
               zig -> ["zig"]
               scala -> ["scala","sc","sbt"]
               (default) -> [languageID]
             Return ParseResult{Config: &Config{Servers: entries}}

          `LoadConfig(path string) (*Config, error)`:
          os.ReadFile(path), json.Unmarshal into &Config{}, return pointer.

          ### Tests

          internal/config/parse_test.go:
          - TestParseArgs_Legacy: args ["go", "/usr/bin/gopls"] → IsSingleServer=true
          - TestParseArgs_MultiArg: args ["go:gopls", "typescript:typescript-language-server,--stdio"]
            → Config with 2 entries, first has Extensions=["go"], second has Extensions=["ts","tsx"]
          - TestParseArgs_ConfigFlag: write temp JSON, args ["--config", path]
            → Config loaded correctly
          - TestParseArgs_Empty: 0 args → error
          - TestLoadConfig_Valid: write {"servers":[{"extensions":["go"],"command":["gopls"]}]},
            LoadConfig → Config.Servers[0].Extensions=["go"]
          - TestLoadConfig_Missing: nonexistent path → error

          internal/lsp/manager_test.go:
          - TestNewSingleServerManager_ClientForFile: creates manager with fake client,
            verifies ClientForFile("/any/file.go") returns same client
          - TestClientForFile_ExtensionMatch: manager with two entries (go, ts),
            ClientForFile("/foo.ts") returns ts client
          - TestClientForFile_Fallback: unknown extension returns default
          - TestServerManager_AllClients: returns all non-nil clients
          - TestInferLanguageID: ts -> "typescript", go -> "go", rs -> "rust"

          For manager tests, use a table-driven test with a mock/stub client that is
          just a *LSPClient pointer (the value; not started). Create via
          &LSPClient{serverPath: "fake"} using the exported constructor is preferred —
          but since NewLSPClient is the public constructor, use it:
          NewLSPClient("fake", nil).

          ### Verification gate
          ```
