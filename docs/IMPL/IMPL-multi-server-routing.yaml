pre_mortem:
  overall_risk: medium
  rows:
    - scenario: |-
        Agent B updates Run() call in main.go to pass lsp.ClientResolver, but
        Agent C's server.go (same wave, different worktree) still has the old
        signature func Run(ctx, lspClient *lsp.LSPClient, ...). Post-merge: type
        mismatch compilation failure.
      likelihood: high
      impact: high
      mitigation: |-
        Both agents are given the exact new Run() signature. Agent B's brief
        says "update the call site"; Agent C's brief says "change the declaration".
        The scaffold ClientResolver interface exists in both worktrees independently.
        Post-merge build gate catches mismatch immediately. If it occurs, the fix
        is a one-line change to server.go's func Run signature.

    - scenario: |-
        Scaffold Agent does not commit internal/config/config.go before worktrees
        open. Agent A's parse.go imports config.ServerEntry and cannot compile.
        Agent B's main.go imports config.ParseArgs and cannot compile.
      likelihood: high
      impact: high
      mitigation: |-
        Orchestrator must create scaffolds and commit them to main branch before
        opening any Wave 1 worktrees. This is the standard scaffold workflow. The
        pre_mortem documents it explicitly so the Orchestrator is aware.

    - scenario: |-
        Multi-arg parsing with comma as arg separator fails for binary paths
        containing commas (unlikely but possible on unusual systems).
      likelihood: low
      impact: low
      mitigation: |-
        Document this limitation in ParseArgs godoc. Config file mode (--config)
        handles complex cases without this restriction.

    - scenario: |-
        In multi-server mode, start_lsp tool only restarts the first (default)
        server. Users expecting per-language restart will be confused.
      likelihood: medium
      impact: low
      mitigation: |-
        Acceptable for v1. start_lsp tool description in server.go can note that
        in multi-server mode it reinitializes the primary server only. Per-server
        restart is future work.

    - scenario: |-
        Agent A writes inferLanguageID as an unexported function in manager.go.
        If it is also needed by parse.go (same package config), the function would
        need to be in a shared file. But manager.go is in package lsp and parse.go
        is in package config — they are separate packages, so no conflict.
      likelihood: low
      impact: low
      mitigation: |-
        The extension map for multi-arg mode is inline in ParseArgs (package config).
        inferLanguageID in manager.go is used for LanguageID inference in package lsp.
        These are separate functions in separate packages — no conflict.

