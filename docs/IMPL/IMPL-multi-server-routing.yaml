          Find this exact text:
          ```go
          func runWithRecovery(ctx context.Context, lspClient *lsp.LSPClient, registry *extensions.ExtensionRegistry, serverPath string, serverArgs []string) (runErr error) {
          	defer func() {
          		if r := recover(); r != nil {
