        files:
          - internal/lsp/manager.go
          - internal/config/parse.go
        dependencies: []

      - id: B
        task: |
          ## Agent B: main.go — multi-server argument parsing + startup

          ### Context
          Scaffold files already exist (Scaffold Agent created them before this worktree):
          - internal/lsp/resolver.go — ClientResolver interface
          - internal/config/config.go — ServerEntry, Config types

          Agent A (parallel worktree) is implementing internal/lsp/manager.go and
          internal/config/parse.go. You must import and use them. They compile
          correctly against the scaffold types, so import paths work in your worktree.

          ### File to modify
          /Users/dayna.blackwell/code/LSP-MCP-GO/cmd/lsp-mcp-go/main.go

          ### Current main.go content
          The file currently does:
          1. Parses args[0]=languageID, args[1]=serverPath, args[2:]=serverArgs
          2. Validates serverPath with os.Stat
          3. Creates lsp.NewLSPClient(serverPath, serverArgs)
          4. Creates extensions.NewRegistry(), activates languageID
          5. Signal handling with lspClient.Shutdown(shutdownCtx)
          6. Calls runWithRecovery(ctx, lspClient, registry, serverPath, serverArgs)
