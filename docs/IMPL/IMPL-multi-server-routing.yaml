title: 'Multi-Server Routing'
feature_slug: multi-server-routing
verdict: SUITABLE
suitability_assessment: |
  All five suitability questions resolve cleanly.

  1. File decomposition: 4 distinct files change with disjoint ownership.
     Agent A owns the new internal/lsp/manager.go and internal/config/parse.go.
     Agent B owns cmd/lsp-mcp-go/main.go.
     Agent C owns cmd/lsp-mcp-go/server.go.
     Scaffold Agent creates internal/lsp/resolver.go and internal/config/config.go
     before worktrees open. No cross-agent file conflicts.

  2. Investigation-first: None needed. This is a pure feature addition with
     a well-understood design. The existing LSPClient already works; we add a
     manager layer on top.

  3. Interface discoverability: The ClientResolver interface (ClientForFile)
     can be fully defined before agents start. Both Agent B and Agent C depend
     on it, so it goes into a scaffold file.

  4. Pre-implementation status: Multi-server routing does not exist yet.
     The codebase has exactly one LSPClient, wired directly into clientState.
     All work is TODO.

  5. Parallelization value: 3 agents, each owning 1-2 files with non-trivial
     logic (config parsing, manager lifecycle, tool dispatch refactor). Go build
     is fast (~2s) but task complexity is moderate. Clear speedup over sequential.

  Reference implementations analyzed:
  - /competitors/cclsp: TypeScript, cclsp.json format with extensions+command per entry
  - /competitors/lsp-mcp: TypeScript LspManager with extensionToLsp map
  - /competitors/mcp-lsp-bridge: Go, uses extension_language_map -> language -> server
    indirection. The bridge.go routes by filepath.Ext. Their extension_language_map
    (dot-prefixed, e.g. ".go" -> "go") is the definitive reference for which
    file extensions map to which language IDs. Agent A uses this as the built-in
    extension map. The cclsp.json format (extensions[] + command[] per server entry)
    is simpler and is our primary config format.

  Design choice: Both Option A (config file) and Option B (multi-arg) are
  supported. Option B (e.g. "go:gopls typescript:typescript-language-server,--stdio")
  is the primary mode — it requires no config file on disk and is ergonomic for
  simple cases. Option A ("--config /path/to/lsp-mcp.json") serves complex cases
  with many servers or per-server options. Config file format matches cclsp.json.
  Single-server legacy invocation ("lsp-mcp-go go gopls") remains backward-compatible.

  Pre-existing test failure: TestWaitForDiagnostics_SettlesAfterQuietWindow in
  internal/lsp fails before this change. Agents must not attempt to fix it.
  Quality gates exclude internal/lsp tests to avoid false positives.

  Estimated times:
  - Scout phase: ~15 min (dependency mapping, interface contracts, IMPL doc)
  - Agent execution: ~3 agents x 15 min avg, accounting for Wave 1 parallelism = ~15 min
  - Merge and verification: ~5 min
  Total SAW time: ~35 min
  Sequential baseline: ~45 min (3 x 15 min sequential)
  Time savings: ~10 min (22% faster)
  Recommendation: Clear speedup plus coordination value from explicit interface contracts.

