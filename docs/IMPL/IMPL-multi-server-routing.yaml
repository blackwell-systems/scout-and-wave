# Scaffold files must be created by the Scaffold Agent BEFORE worktrees open.
# Both main.go (Agent B) and server.go (Agent C) import lsp.ClientResolver.
# internal/config/parse.go (Agent A) imports config.ServerEntry and config.Config.
scaffolds:
  - file_path: internal/lsp/resolver.go
    import_path: github.com/blackwell-systems/lsp-mcp-go/internal/lsp
    status: committed (4589e65)
    contents: |
      package lsp

      import "context"

      // ClientResolver resolves the appropriate LSPClient for a given file path.
      // In single-server mode the manager returns the same client regardless of path.
      // In multi-server mode it routes by file extension.
      type ClientResolver interface {
          // ClientForFile returns the LSPClient that should handle operations for
          // the given absolute file path. Falls back to DefaultClient if the extension
          // is not mapped. Returns nil only if the manager holds zero clients.
          ClientForFile(filePath string) *LSPClient

          // DefaultClient returns the primary (or only) LSPClient.
          // Used for tools that are not file-specific (e.g. get_workspace_symbols).
          DefaultClient() *LSPClient

          // AllClients returns all managed clients, including nil entries filtered out.
          AllClients() []*LSPClient

          // Shutdown gracefully shuts down all managed LSP clients.
          Shutdown(ctx context.Context) error
      }

  - file_path: internal/config/config.go
    import_path: github.com/blackwell-systems/lsp-mcp-go/internal/config
    status: committed (4589e65)
    contents: |
      // Package config holds types and parsing for multi-server configuration.
      package config

      // ServerEntry describes one language server to launch.
      // The format matches cclsp.json: extensions[] + command[].
      type ServerEntry struct {
          // Extensions is the list of file extensions this server handles (without dot).
          // e.g. ["go"] or ["ts", "tsx", "js", "jsx"]
          Extensions []string `json:"extensions"`

          // Command is [binary, arg1, arg2, ...].
          // e.g. ["gopls"] or ["typescript-language-server", "--stdio"]
          Command []string `json:"command"`

          // LanguageID is used when opening documents (e.g. "go", "typescript").
          // If empty, inferred from Extensions[0] via the built-in extension map.
          LanguageID string `json:"language_id,omitempty"`
      }

      // Config is the top-level multi-server configuration.
      // File format: {"servers": [{...}, ...]}
      type Config struct {
          Servers []ServerEntry `json:"servers"`
      }

