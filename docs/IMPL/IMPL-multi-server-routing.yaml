          ### Constraints
          - Do NOT modify any existing files.
          - Do NOT redefine ClientResolver — it exists in resolver.go (scaffold).
          - Do NOT redefine ServerEntry or Config — they exist in config.go (scaffold).
          - Do NOT modify files under test/ directory.
