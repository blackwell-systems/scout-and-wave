pre_mortem:
  overall_risk: medium
  rows:
    - scenario: "RunTierGate gate commands fail due to working directory issues"
      likelihood: medium
      impact: medium
      mitigation: |
        Gate commands run in repoPath working directory. Tests use simple
        commands (echo, false) to validate execution logic without real builds.
        Production gate commands are user-defined in the PROGRAM manifest.
    - scenario: "FreezeContracts git status check unreliable in test environments"
      likelihood: medium
      impact: low
      mitigation: |
        Tests use t.TempDir() with git init to create real git repos.
        The freeze logic uses git status --porcelain which is stable and scriptable.
    - scenario: "RunScout prompt injection of program contracts is too large for context"
      likelihood: low
      impact: medium
      mitigation: |
        Program contracts are typically 5-15 type definitions. The injected
        markdown section adds ~500-2000 tokens. If context pressure is an issue,
        the contracts can be written to a file that Scout reads instead.
    - scenario: "saw-skill.md merge conflict with concurrent protocol changes"
      likelihood: medium
      impact: low
      mitigation: |
        Agent F only adds new sections and updates existing tables/lists.
        Append-only changes are low-conflict. Same mitigation as Phase 1.
    - scenario: "Wave 2 CLI commands cannot compile because Wave 1 library functions have unexpected signatures"
      likelihood: low
      impact: high
      mitigation: |
        Interface contracts define exact function signatures. Scaffold types
        ensure shared types compile. Wave 2 agents verify Wave 1 code compiles
        before starting (pre-wave gate).

