waves:
  - number: 1
    agents:
      - id: A
        task: |
          ## What to Implement

          Add execution rules E28-E32 to `protocol/execution-rules.md` in the
          scout-and-wave repo. These define program-level orchestrator behavior
          for tier-gated execution (Level B).

          ## Content to Write

          Append five new execution rules after E27, following the exact style
          and format of existing rules (trigger, required action, rationale,
          related rules):

          **E28: Tier Execution Loop**
          - Trigger: PROGRAM manifest state transitions to TIER_EXECUTING
          - Required Action: Orchestrator reads current tier from PROGRAM manifest,
            launches Scout agents for all IMPLs in the tier with status "pending"
            (in parallel, using existing /saw scout flow per IMPL). Each Scout
            receives the --program flag pointing to the PROGRAM manifest so it
            can consume frozen program contracts as immutable inputs. After all
            IMPLs in the tier are scouted and reviewed, execute each IMPL's waves
            using the standard /saw wave --auto flow. Track IMPL completion.
            When all IMPLs in the tier reach "complete", transition to tier gate.
          - Relationship to E1: Scout launches are async (E1 applies)
          - Relationship to P1/P3: Tier structure is defined by PROGRAM manifest

          **E29: Tier Gate Verification**
          - Trigger: All IMPLs in a tier reach "complete"
          - Required Action: Run `sawtools tier-gate <manifest> --tier N`.
            This verifies all IMPLs are complete and runs the tier_gates quality
            gate commands from the PROGRAM manifest. If all gates pass, mark
            tier as verified. If any required gate fails, enter PROGRAM_BLOCKED.
          - Enforcement of P3: Tier N+1 does not begin until tier gate passes

          **E30: Program Contract Freezing**
          - Trigger: Tier gate passes (E29)
          - Required Action: Run `sawtools freeze-contracts <manifest> --tier N`.
            This identifies program contracts whose freeze_at matches the
            completing tier, verifies their source files exist and are committed,
            and marks them as frozen. Frozen contracts are immutable — any IMPL
            in a later tier that attempts to redefine a frozen contract violates P2.
          - Enforcement of P2: Contracts are frozen before next tier's Scouts launch
          - Human gate: After freezing, pause for human review before advancing
            to next tier (unless --auto mode is active)

          **E31: Parallel Scout Launching**
          - Trigger: Orchestrator is about to scout all IMPLs in a tier
          - Required Action: Launch one Scout agent per IMPL in the tier,
            all in parallel (E1 applies). Each Scout receives:
            (a) the feature description from the PROGRAM manifest's IMPL entry
            (b) --program flag with path to PROGRAM manifest
            (c) standard Scout inputs (codebase access, CONTEXT.md)
            Scout agents are independent — they do not coordinate with each other.
            The orchestrator waits for all Scouts to complete, then validates
            each IMPL doc (E16), then presents all for human review.
          - Relationship to E16: Each IMPL doc is validated independently
          - Relationship to P2: Scouts receive frozen contracts and must not redefine them

          **E32: Cross-IMPL Progress Tracking**
          - Trigger: Any IMPL within a PROGRAM changes state
          - Required Action: Orchestrator updates the PROGRAM manifest's
            impl status field and completion counters. Run
            `sawtools program-status <manifest>` to get a structured report.
            When reporting status to the user, show tier-level progress
            (how many IMPLs in each tier are complete) and overall progress.
          - Enforcement of P4: PROGRAM manifest is always up to date

          Also update the Cross-References section at the bottom of the file to
          reference E28-E32 with brief descriptions.

          Update the version number in the file header (increment minor version).

          Update the Overview section to change "E1-E26" to "E1-E32" (or whatever
          the current range says, extend it to E32).

          ## Verification Gate
          - File is valid markdown
          - E28-E32 sections exist with trigger, required action, and related rules
          - Cross-references section updated
          - Version number incremented

          ## Constraints
          - Do NOT modify any existing E1-E27 rules
          - Only APPEND new sections and update cross-references/version
          - Follow the exact formatting pattern of existing rules
          - Each rule must reference the specific P-invariant it enforces
          - Each rule must reference the sawtools command that implements it
        files:
          - protocol/execution-rules.md

      - id: B
        task: |
          ## What to Implement

          Create `pkg/protocol/program_tier_gate.go` and its test file — the
          tier gate verification logic that checks all IMPLs in a tier are
          complete and runs tier-level quality gates.

          ## Interfaces to Implement

          ```go
          func RunTierGate(manifest *PROGRAMManifest, tierNumber int, repoPath string) (*TierGateResult, error)
          ```

          ## Implementation Details

          1. Find the tier in manifest.Tiers matching tierNumber. Error if not found.
          2. For each IMPL slug in the tier, find the matching ProgramIMPL.
             Check that its Status == "complete". Collect all statuses into
             ImplStatuses in the result.
          3. Set AllImplsDone = true only if all IMPLs have status "complete".
          4. If AllImplsDone is false, return result with Passed=false (tier cannot
             advance if not all IMPLs are done).
          5. If AllImplsDone is true, run each gate in manifest.TierGates:
             - Execute the command via os/exec in repoPath working directory
             - Capture stdout+stderr
             - Record pass/fail in GateResults
             - If a required gate fails, Passed=false
          6. Return the complete TierGateResult.

          ## Interfaces to Call
          - PROGRAMManifest, ProgramTier, ProgramIMPL from pkg/protocol/program_types.go
          - TierGateResult, GateResult, ImplTierStatus from pkg/protocol/program_tier_types.go (scaffold)
          - QualityGate from pkg/protocol/types.go (existing)

          ## Tests to Write
          1. TestRunTierGate_AllComplete_GatesPass - happy path
          2. TestRunTierGate_NotAllComplete - IMPL still executing
          3. TestRunTierGate_GateFails_Required - required gate fails blocks
          4. TestRunTierGate_GateFails_NotRequired - optional gate fail is warning
          5. TestRunTierGate_InvalidTier - tier number not found
          6. TestRunTierGate_NoGates - tier with no tier_gates still passes

          For tests that run commands, use `echo "ok"` or `false` as gate
          commands to simulate pass/fail without real builds.

          ## Verification Gate
          ```bash
          cd /Users/dayna.blackwell/code/scout-and-wave-go && go build ./...
          cd /Users/dayna.blackwell/code/scout-and-wave-go && go vet ./...
          cd /Users/dayna.blackwell/code/scout-and-wave-go && go test ./pkg/protocol/ -run TestRunTierGate
          ```

          ## Constraints
          - Follow the coding style of existing pkg/protocol/ files
          - Use os/exec for running gate commands (same pattern as run_gates.go if it exists)
          - Set a 5-minute timeout on each gate command
          - Return all gate results even if one fails (do not short-circuit)
        files:
          - pkg/protocol/program_tier_gate.go
          - pkg/protocol/program_tier_gate_test.go

      - id: C
        task: |
          ## What to Implement

          Create `pkg/protocol/program_freeze.go` and its test file — the
          contract freezing logic that verifies and marks program contracts
          as frozen at tier boundaries.

          ## Interfaces to Implement

          ```go
          func FreezeContracts(manifest *PROGRAMManifest, tierNumber int, repoPath string) (*FreezeContractsResult, error)
          ```

          ## Implementation Details

          1. Identify which contracts should freeze at this tier boundary.
             A contract freezes if its FreezeAt field contains a reference to
             an IMPL that is in the completing tier. Match by checking if any
             IMPL slug in the tier appears in the contract's FreezeAt string
             (e.g., "IMPL-auth completion" contains "auth").
          2. For each contract to freeze:
             a. Check if the file at contract.Location exists in repoPath
             b. Check if the file is committed (run `git status --porcelain <file>`
                in repoPath; if output is empty, file is committed)
             c. Record in FrozenContract: Name, Location, FreezeAt, FileExists, Committed
          3. Contracts where FileExists && Committed are successfully frozen.
             Contracts where !FileExists or !Committed are errors.
          4. Contracts whose FreezeAt does not match this tier are skipped
             (recorded in ContractsSkipped).
          5. Success is true only if all matching contracts are successfully frozen.

          ## Interfaces to Call
          - PROGRAMManifest, ProgramContract from pkg/protocol/program_types.go
          - FreezeContractsResult, FrozenContract from pkg/protocol/program_tier_types.go (scaffold)

          ## Tests to Write
          1. TestFreezeContracts_AllFrozen - happy path, files exist and committed
          2. TestFreezeContracts_FileNotFound - contract file missing
          3. TestFreezeContracts_NotCommitted - contract file exists but uncommitted
          4. TestFreezeContracts_NoMatchingContracts - no contracts freeze at this tier
          5. TestFreezeContracts_PartialMatch - some contracts freeze, others skip
          6. TestFreezeContracts_EmptyFreezeAt - contracts with empty freeze_at are skipped

          Use t.TempDir() with git init for filesystem/git tests.

          ## Verification Gate
          ```bash
          cd /Users/dayna.blackwell/code/scout-and-wave-go && go build ./...
          cd /Users/dayna.blackwell/code/scout-and-wave-go && go vet ./...
          cd /Users/dayna.blackwell/code/scout-and-wave-go && go test ./pkg/protocol/ -run TestFreezeContracts
          ```

          ## Constraints
          - Use os/exec for git commands (same pattern as internal/git/ package)
          - Match by substring: if any IMPL slug in the completing tier appears
            in the FreezeAt string, that contract freezes
          - Do NOT modify the manifest on disk — return the result and let the
            caller (CLI command) handle persistence
        files:
          - pkg/protocol/program_freeze.go
          - pkg/protocol/program_freeze_test.go

      - id: D
        task: |
          ## What to Implement

          Create `pkg/protocol/program_status.go` and its test file — the
          program status computation logic that produces a comprehensive
          status report from a PROGRAM manifest.

          ## Interfaces to Implement

          ```go
          func GetProgramStatus(manifest *PROGRAMManifest, repoPath string) (*ProgramStatusResult, error)
          ```

          ## Implementation Details

          1. Set ProgramSlug, Title, State, Completion from manifest fields.
          2. Determine CurrentTier: the lowest-numbered tier that has at least
             one IMPL with status != "complete". If all tiers complete,
             CurrentTier = manifest.Completion.TiersTotal.
          3. Build TierStatuses: for each tier, collect IMPL statuses.
             A tier is Complete if all its IMPLs have status "complete".
             Optionally, cross-reference IMPL docs on disk at
             repoPath/docs/IMPL/IMPL-<slug>.yaml to get real-time wave progress
             (but gracefully handle missing IMPL docs — they may not be scouted yet).
          4. Build ContractStatuses: for each program contract, determine if it
             is frozen. A contract is frozen if its FreezeAt references an IMPL
             in a completed tier (all IMPLs in that tier have status "complete").
             FrozenAtTier is the tier number where it was frozen.
          5. Update Completion fields: count tiers_complete and impls_complete
             from the actual IMPL statuses (not just the manifest's cached values).

          ## Interfaces to Call
          - PROGRAMManifest and all sub-types from pkg/protocol/program_types.go
          - ProgramStatusResult, TierStatusDetail, ContractStatus from
            pkg/protocol/program_tier_types.go (scaffold)

          ## Tests to Write
          1. TestGetProgramStatus_AllPending - fresh program, nothing started
          2. TestGetProgramStatus_Tier1InProgress - some tier 1 IMPLs executing
          3. TestGetProgramStatus_Tier1Complete - all tier 1 done, tier 2 pending
          4. TestGetProgramStatus_AllComplete - entire program done
          5. TestGetProgramStatus_ContractFreezing - correct freeze detection
          6. TestGetProgramStatus_CompletionCounts - verify computed counts

          ## Verification Gate
          ```bash
          cd /Users/dayna.blackwell/code/scout-and-wave-go && go build ./...
          cd /Users/dayna.blackwell/code/scout-and-wave-go && go vet ./...
          cd /Users/dayna.blackwell/code/scout-and-wave-go && go test ./pkg/protocol/ -run TestGetProgramStatus
          ```

          ## Constraints
          - Do NOT shell out to git or run commands — this is pure data computation
