          - pkg/protocol/program_status_test.go

      - id: E
        task: |
          ## What to Implement

          Add the `ProgramManifestPath` field to `RunScoutOpts` in
          `pkg/engine/engine.go` and update `RunScout` in `pkg/engine/runner.go`
