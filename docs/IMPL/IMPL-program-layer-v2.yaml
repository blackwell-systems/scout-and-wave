scaffolds:
  - file_path: pkg/protocol/program_tier_types.go
    contents: |
      package protocol

      // TierGateResult is the output of running tier-level quality gates.
      type TierGateResult struct {
        TierNumber    int              `json:"tier_number"`
        Passed        bool             `json:"passed"`
        GateResults   []GateResult     `json:"gate_results"`
        ImplStatuses  []ImplTierStatus `json:"impl_statuses"`
        AllImplsDone  bool             `json:"all_impls_done"`
      }

      // GateResult captures the result of a single quality gate execution.
      type GateResult struct {
        Type     string `json:"type"`
        Command  string `json:"command"`
        Passed   bool   `json:"passed"`
        Output   string `json:"output,omitempty"`
        Required bool   `json:"required"`
      }

      // ImplTierStatus captures the status of a single IMPL within a tier.
      type ImplTierStatus struct {
        Slug   string `json:"slug"`
        Status string `json:"status"`
      }

      // FreezeContractsResult is the output of freezing program contracts at a tier boundary.
      type FreezeContractsResult struct {
        TierNumber       int                    `json:"tier_number"`
        ContractsFrozen  []FrozenContract       `json:"contracts_frozen"`
        ContractsSkipped []string               `json:"contracts_skipped"`
        Success          bool                   `json:"success"`
        Errors           []string               `json:"errors,omitempty"`
      }

      // FrozenContract captures details about a single frozen contract.
      type FrozenContract struct {
        Name       string `json:"name"`
        Location   string `json:"location"`
        FreezeAt   string `json:"freeze_at"`
        FileExists bool   `json:"file_exists"`
        Committed  bool   `json:"committed"`
      }

      // ProgramStatusResult is the full status report for a PROGRAM manifest.
      type ProgramStatusResult struct {
        ProgramSlug      string               `json:"program_slug"`
        Title            string               `json:"title"`
        State            ProgramState         `json:"state"`
        CurrentTier      int                  `json:"current_tier"`
        TierStatuses     []TierStatusDetail   `json:"tier_statuses"`
        ContractStatuses []ContractStatus     `json:"contract_statuses"`
        Completion       ProgramCompletion    `json:"completion"`
      }

      // TierStatusDetail provides detailed status for a single tier.
      type TierStatusDetail struct {
        Number       int              `json:"number"`
        Description  string           `json:"description,omitempty"`
        ImplStatuses []ImplTierStatus `json:"impl_statuses"`
        Complete     bool             `json:"complete"`
      }

      // ContractStatus tracks freeze state of a program contract.
      type ContractStatus struct {
        Name       string `json:"name"`
        Location   string `json:"location"`
        FreezeAt   string `json:"freeze_at"`
        Frozen     bool   `json:"frozen"`
        FrozenAtTier int  `json:"frozen_at_tier,omitempty"`
      }
    import_path: github.com/blackwell-systems/scout-and-wave-go/pkg/protocol
    status: pending

interface_contracts:
  - name: RunTierGate
    description: |
      Verifies that all IMPLs in a tier are complete and runs the tier-level
      quality gates defined in the PROGRAM manifest. Returns structured result
      with per-gate and per-IMPL status.
    definition: |
      func RunTierGate(manifest *PROGRAMManifest, tierNumber int, repoPath string) (*TierGateResult, error)
    location: pkg/protocol/program_tier_gate.go

  - name: FreezeContracts
    description: |
      Freezes program contracts at a tier boundary. Verifies that contract
      source files exist and are committed to HEAD. Updates the manifest's
      contract state. Returns structured result listing which contracts were
      frozen and any errors.
    definition: |
      func FreezeContracts(manifest *PROGRAMManifest, tierNumber int, repoPath string) (*FreezeContractsResult, error)
    location: pkg/protocol/program_freeze.go

  - name: GetProgramStatus
    description: |
      Reads a PROGRAM manifest and computes the full status report including
      current tier, per-tier IMPL statuses, contract freeze states, and
      completion tracking. Cross-references IMPL docs on disk for real-time
      status.
    definition: |
      func GetProgramStatus(manifest *PROGRAMManifest, repoPath string) (*ProgramStatusResult, error)
    location: pkg/protocol/program_status.go

  - name: RunScoutOpts.ProgramManifestPath
    description: |
      New field on the existing RunScoutOpts struct. When set, the Scout
      receives program contracts as immutable inputs. The engine reads the
      PROGRAM manifest and injects frozen contracts into the Scout prompt.
    definition: |
      // Added to existing RunScoutOpts in pkg/engine/engine.go:
      ProgramManifestPath string // optional: path to PROGRAM manifest; Scout receives frozen contracts as input
    location: pkg/engine/engine.go

