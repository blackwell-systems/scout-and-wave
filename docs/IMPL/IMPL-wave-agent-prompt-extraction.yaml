suitability_assessment: |
    File decomposition: 6 distinct files across 4 agents with disjoint ownership.
    Four new reference files (extract from wave-agent.md), one modified core prompt
    (wave-agent.md slim-down), one modified hook (validate_agent_launch), one modified
    skill file (saw-skill.md routing table update), and 4 doc updates.

    Investigation-first: None. Extraction boundaries are precisely defined with
    line ranges from the current wave-agent.md (333 lines).

    Interface discoverability: Yes. Dedup marker format and extraction boundaries
    are specified upfront. File paths are known.

    Pre-implementation status: Fresh feature, nothing implemented yet. Uses the
    exact same pattern as IMPL-scout-prompt-extraction as blueprint.

    Parallelization value: Same as scout extraction — documentation/prompt editing
    with disjoint file ownership. 3 wave 1 agents (A/B/C) can extract in parallel
    with no overlap. Wave 2 (D) wires the hook and updates docs.

    Estimated times:
    - Scout phase: 0 min (IMPL produced directly as blueprint)
    - Agent execution: ~8 min (3 agents in wave 1, 1 agent in wave 2, ~5 min avg)
    - Merge & verification: ~3 min
    Total SAW time: ~11 min

    Recommendation: Clear coordination value. Same pattern as scout extraction;
    well-understood approach with validated interface contracts.
