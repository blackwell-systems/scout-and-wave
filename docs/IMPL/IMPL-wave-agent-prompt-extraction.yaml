interface_contracts:
    - name: Dedup marker format (wave-agent)
      description: |
        HTML comment markers wrapping injected reference content. Used by
        validate_agent_launch hook to avoid double-injection, and by wave-agent.md
        to skip reading references already in context.
      definition: |
        Format: <!-- injected: references/wave-agent-{name}.md -->
        Where {name} is one of: worktree-isolation, completion-report,
        build-diagnosis, program-contracts

        The hook checks the agent prompt for these markers before injecting.
        The wave-agent.md core file instructs: "skip reading reference if marker
        already in context."
      location: implementations/claude-code/hooks/validate_agent_launch
    - name: Reference file back-link header (wave-agent)
      description: |
        Each extracted reference file begins with a back-link comment indicating
        it is part of the wave agent procedure, not a standalone skill.
      definition: |
        First line of each reference file:
        <!-- Part of wave-agent procedure. Loaded by validate_agent_launch hook. -->
      location: implementations/claude-code/prompts/references/
    - name: Wave-agent core reference loading block
      description: |
        Block in slim wave-agent.md that instructs the agent about reference files
        and dedup behavior.
      definition: |
        ## Reference Files

        The following reference files contain detailed procedure steps. They are
        normally injected by the validate_agent_launch hook before this prompt
        is delivered. If you see `<!-- injected: references/wave-agent-X.md -->`
        markers in your context, the content is already loaded — do not re-read
        those files.

        If the markers are absent (e.g., hook not installed), read these files:
        - `${CLAUDE_SKILL_DIR}/references/wave-agent-worktree-isolation.md` — Worktree
          isolation protocol (Steps 0/0.5, absolute path patterns, go.mod warning)
        - `${CLAUDE_SKILL_DIR}/references/wave-agent-completion-report.md` — Full
          `sawtools set-completion` reference with examples for all status/failure types
        - `${CLAUDE_SKILL_DIR}/references/wave-agent-build-diagnosis.md` — H7 build
          failure diagnosis tool usage (all languages)
        - `${CLAUDE_SKILL_DIR}/references/wave-agent-program-contracts.md` — Program
          contract handling rules. Only required when IMPL has `frozen_contracts_hash`
          or interface contracts with `frozen: true`.
      location: implementations/claude-code/prompts/agents/wave-agent.md
    - name: Hook injection for wave-agent subagent_type
      description: |
        New check in validate_agent_launch (Check 10) that detects wave-agent launches
        and injects reference file contents into the prompt via hook output.
        Added after scout's Check 9 and before the final exit 0 block.
      definition: |
        Detection: Parse subagent_type from tool_input or description.
        If description contains "[SAW:wave" OR tool_input contains "subagent_type: wave-agent"
        OR the prompt contains "# Wave Agent: Parallel Implementation":

        1. Resolve reference directory: find scout-and-wave repo references/ dir
        2. Always inject: wave-agent-worktree-isolation.md, wave-agent-completion-report.md,
           wave-agent-build-diagnosis.md
        3. Conditionally inject wave-agent-program-contracts.md (when
           "frozen_contracts_hash" OR "frozen: true" appears in prompt)
        4. Dedup: skip injection if <!-- injected: references/wave-agent-X.md -->
           already in prompt
        5. Output: JSON using updatedInput to prepend reference content into the
           agent's prompt: {"hookSpecificOutput": {"hookEventName": "PreToolUse",
           "permissionDecision": "allow", "updatedInput": {"prompt": "<injected>\n\n<orig>"}}}
      location: implementations/claude-code/hooks/validate_agent_launch
