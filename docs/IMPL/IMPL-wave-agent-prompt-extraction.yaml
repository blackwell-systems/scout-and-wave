            **New section: Wave-agent reference injection (Check 10)**

            ```bash
            # --- Check 10: Wave-agent reference injection ---
            # When launching a wave agent, inject reference files as additionalContext
            # This provides worktree isolation protocol, completion report, and build
            # diagnosis without the agent needing to read them manually.

            # Detect wave agent type from description or prompt
            is_wave_agent=false
            if [[ "$description" =~ \[SAW:wave ]] || \
               [[ "$prompt" =~ "subagent_type: wave-agent" ]] || \
               [[ "$prompt" =~ "# Wave Agent: Parallel Implementation" ]]; then
              is_wave_agent=true
            fi

            if [[ "$is_wave_agent" == "true" ]]; then
              # Resolve references directory
              ref_dir=""
              skill_dir="${CLAUDE_SKILL_DIR:-${HOME}/.claude/skills/saw}"
              if [[ -d "${skill_dir}/references" ]]; then
                ref_dir="${skill_dir}/references"
              fi

              if [[ -n "$ref_dir" ]]; then
                inject_content=""

                # Always inject worktree isolation protocol
                ref_file="${ref_dir}/wave-agent-worktree-isolation.md"
                if [[ -f "$ref_file" ]] && ! echo "$prompt" | grep -q '<!-- injected: references/wave-agent-worktree-isolation.md -->'; then
                  inject_content+="<!-- injected: references/wave-agent-worktree-isolation.md -->"$'\n'
                  inject_content+="$(command cat "$ref_file")"$'\n\n'
                fi

                # Always inject completion report
                ref_file="${ref_dir}/wave-agent-completion-report.md"
                if [[ -f "$ref_file" ]] && ! echo "$prompt" | grep -q '<!-- injected: references/wave-agent-completion-report.md -->'; then
                  inject_content+="<!-- injected: references/wave-agent-completion-report.md -->"$'\n'
                  inject_content+="$(command cat "$ref_file")"$'\n\n'
                fi

                # Always inject build diagnosis
                ref_file="${ref_dir}/wave-agent-build-diagnosis.md"
                if [[ -f "$ref_file" ]] && ! echo "$prompt" | grep -q '<!-- injected: references/wave-agent-build-diagnosis.md -->'; then
                  inject_content+="<!-- injected: references/wave-agent-build-diagnosis.md -->"$'\n'
                  inject_content+="$(command cat "$ref_file")"$'\n\n'
                fi

                # Conditionally inject program contracts (only when frozen contracts present)
                if echo "$prompt" | grep -qE 'frozen_contracts_hash|frozen: true'; then
                  ref_file="${ref_dir}/wave-agent-program-contracts.md"
                  if [[ -f "$ref_file" ]] && ! echo "$prompt" | grep -q '<!-- injected: references/wave-agent-program-contracts.md -->'; then
                    inject_content+="<!-- injected: references/wave-agent-program-contracts.md -->"$'\n'
                    inject_content+="$(command cat "$ref_file")"$'\n\n'
                  fi
                fi

                # Prepend injected content to the agent's prompt via updatedInput
                if [[ -n "$inject_content" ]]; then
                  jq -n --arg inject "$inject_content" --arg orig "$prompt" \
                    '{"hookSpecificOutput": {"hookEventName": "PreToolUse", "permissionDecision": "allow", "updatedInput": {"prompt": ($inject + "\n\n" + $orig)}}}'
                  exit 0
                fi
              fi
            fi
            ```

            **IMPORTANT implementation notes:**
            - Use `command cat` (not bare `cat`) for reading reference files — avoids
              brewprune-shim issues (documented in project memory).
            - The existing `input=$(cat)` at the top of the hook reads from stdin —
              leave it exactly as-is.
            - **updatedInput, NOT additionalContext.** PreToolUse `additionalContext`
              goes to the orchestrator's context, not the subagent. Use `updatedInput.prompt`
              to prepend reference content directly into the agent's initial prompt.
              Include `permissionDecision: "allow"` alongside `updatedInput`.
            - The `[SAW:wave` detection pattern uses backslash before the bracket in
              the `[[ =~ ]]` test: `\[SAW:wave` — this is intentional bash regex escaping.
            - Non-wave agents (solo agents, integration agents) skip this block entirely
              since detection is gated.
            - If scout's Check 9 is already present, add Check 10 directly after it.
              If not yet present, add as Check 9. Number the comment accordingly.

