            ## What to implement

            Create `pkg/protocol/brief_validator.go` — the core validation logic for
            agent briefs. This file does not exist yet; create it from scratch.

            The package is `protocol`. Module: `github.com/blackwell-systems/scout-and-wave-go`.

            ## Read these files first (do not skip)

            Before writing any code, read these files to understand patterns:
            - `/Users/dayna.blackwell/code/scout-and-wave-go/pkg/protocol/critic.go` (lines 1-183 for validation types pattern)
            - `/Users/dayna.blackwell/code/scout-and-wave-go/pkg/protocol/types.go` (lines 1-100 for IMPLManifest struct)
            - `/Users/dayna.blackwell/code/scout-and-wave-go/pkg/protocol/full_validate.go` (lines 12-30 for validation result struct pattern)

            ## Types and functions to define

            ### BriefValidationData
            The top-level result struct returned by ValidateBriefs.

            ```go
            type BriefValidationData struct {
                Valid         bool                     `json:"valid"`
                AgentResults  map[string]AgentBriefResult `json:"agent_results"`
                Summary       string                   `json:"summary"`
            }
            ```

            ### AgentBriefResult
            Per-agent validation result.

            ```go
            type AgentBriefResult struct {
                AgentID       string              `json:"agent_id"`
                Passed        bool                `json:"passed"`
                Issues        []BriefIssue        `json:"issues"`
            }
            ```

            ### BriefIssue
            A single validation failure with context and suggestions.

            ```go
            type BriefIssue struct {
                Check         string   `json:"check"`        // "symbol_missing" | "line_invalid"
                Severity      string   `json:"severity"`     // "error" | "warning"
                Description   string   `json:"description"`
                File          string   `json:"file,omitempty"`
                Symbol        string   `json:"symbol,omitempty"`
                LineNumber    int      `json:"line_number,omitempty"`
                Suggestions   []string `json:"suggestions,omitempty"`
            }
            ```

            ### ValidateBriefs
            Main exported function. Load IMPL manifest, iterate over all waves and agents,
            validate each agent's brief. Return aggregated results.

            Algorithm:
            1. Load manifest via `protocol.Load(ctx, implPath)`
            2. For each wave in manifest.Waves:
               For each agent in wave.Agents:
                 a. Extract symbols from agent.Task via extractSymbols(agent.Task)
                 b. Extract line references via extractLineReferences(agent.Task)
                 c. For each symbol:
                    - Find which file it's in (check agent.Files or use grep across owned files)
                    - Call checkSymbolExists(file, symbol)
                    - If not found and file is not action:new, add BriefIssue
                 d. For each line reference:
                    - Call checkLineValid(file, lineNum)
                    - If invalid, add BriefIssue
                 e. Aggregate issues into AgentBriefResult
            3. Overall Valid = all agents passed
            4. Generate summary: "N agents validated, M issues found"

            ### extractSymbols
            Parse task text for symbol references. Patterns:
            - Backticks: `SymbolName` (most common in briefs)
            - Code blocks: ```type X struct```, ```func Y()```
            - Method calls: `obj.Method()`

            Use regex to extract. Return deduplicated list.

            Regex patterns:
            - `\x60([A-Z][a-zA-Z0-9_]*)\x60` for type names
            - `\x60([a-z][a-zA-Z0-9_]*)\x60` for function/variable names
            - `type ([A-Z][a-zA-Z0-9_]*) struct` for struct declarations
            - `func ([a-z][a-zA-Z0-9_]*)` for function declarations

            ### extractLineReferences
            Parse task text for line number mentions. Patterns:
            - "around line N"
            - "at line N"
            - "line N"
            - "lines N-M"

            Use regex: `(?i)(around line|at line|line)\s+(\d+)`
            Extract file context from surrounding text (look for file paths in same paragraph).

            Return map[filePath][]lineNumber.

            ### checkSymbolExists
            Use exec.Command to run grep. Command:
            ```
            grep -n "symbol" filePath
            ```

            If grep exits 0, symbol found. Return (true, nil).
            If grep exits non-0, symbol not found. Run fuzzy match:
            - Read file content
            - Find all identifiers via regex
            - Use Levenshtein distance (or simple string similarity) to suggest alternatives
            - Return (false, suggestions)

            Limit suggestions to top 3 matches.

            ### checkLineValid
            Use exec.Command to run wc:
            ```
            wc -l filePath
            ```

            Parse output to get line count. Return lineCount >= lineNum.

            ## Tests

            Create `pkg/protocol/brief_validator_test.go` with:

            1. TestExtractSymbols: verify symbol extraction from sample task text
            2. TestExtractLineReferences: verify line number extraction
            3. TestCheckSymbolExists: create temp file with known symbols, verify detection
            4. TestCheckLineValid: create temp file with N lines, verify line counting
            5. TestValidateBriefs: end-to-end test with sample IMPL manifest

            Use testify/assert for assertions. Follow existing test patterns in
            pkg/protocol/*_test.go files.

            ## Error handling

            - If manifest load fails, return error immediately (fatal)
            - If agent has no owned files, skip validation (warn in summary)
            - If file does not exist on disk and action:new, skip symbol checks (agent will create)
            - If grep fails (permission denied, file not found), treat as error and add BriefIssue

            ## Cross-repo handling

            Agent briefs may reference files in different repos. Check FileOwnership.Repo field.
            If set, construct full path: join manifest.Repository (or from manifest.Repositories
            slice) with FileOwnership.File.

            If Repo field is empty, assume same repo as IMPL doc location.

            ## Verification gate

            After implementation:
            1. go build ./... (must compile)
            2. go vet ./... (must pass)
            3. go test ./pkg/protocol -run TestValidateBriefs (must pass)

            ## Constraints

            - Pure language-agnostic validation (no AST parsing, only grep/wc)
            - Fast execution (<2s for typical IMPL with 4-6 agents)
            - Actionable suggestions when symbols missing (fuzzy match alternatives)
            - No external dependencies beyond stdlib (os/exec, regexp, io)
          files:
            - pkg/protocol/brief_validator.go
            - pkg/protocol/brief_validator_test.go
