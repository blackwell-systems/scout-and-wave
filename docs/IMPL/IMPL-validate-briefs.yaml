pre_mortem:
    overall_risk: low
    rows:
        - scenario: Symbol extraction regex misses some patterns (e.g. symbols in nested code blocks, multi-line declarations)
          likelihood: medium
          impact: low
          mitigation: |-
            Start with common patterns (backticks, simple code blocks). Add more patterns
            iteratively based on real-world failures. False negatives (missed symbols) are
            not blocking — the critic gate still catches them. This command is an optimization
            to reduce critic round trips, not a replacement.
        - scenario: Cross-repo file path resolution fails when Repo field is set but manifest.Repositories is empty
          likelihood: low
          impact: medium
          mitigation: |-
            Agent A must handle this case: if FileOwnership.Repo is set but manifest.Repositories
            is empty, fall back to inferring repo root from manifest location. Document this
            behavior in the code comments and tests.
        - scenario: Large IMPL manifests (10+ agents) cause validate-briefs to exceed 2s target
          likelihood: low
          impact: low
          mitigation: |-
            The command runs sequentially (one agent at a time). If performance becomes an
            issue, parallelize validation across agents using goroutines. For v1, sequential
            is acceptable — even 5s is much faster than a full critic cycle.
        - scenario: Scout agent forgets to run validate-briefs in step 17 (human error if auto-execution not enforced)
          likelihood: low
          impact: low
          mitigation: |-
            The step 17 update makes the command invocation explicit and mandatory. If Scout
            skips it, the critic gate will still catch errors (defense-in-depth). Future
            improvement: add validate-briefs to pre-wave-validate as a hard gate.
